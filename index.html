사는 혹 뛰어서 연못에 있으면 허물이 없을 것이다. 或:혹 혹   躍:뛸 약   淵: 못 연 양이 네 번째 구사는 초구 ․ 구사효가 변하면 양이 음으로 바뀌어 내호괘가 태 ( 兌 ) ☱ 가 되니 연못이 나오고 , 외호괘는 이 ( 離 ) ☲ 로 밝은 덕을 갖춘 상이며 , 외괘가 손 ( 巽 ) ☴ 이니 구오 대인이 되어 하늘로 오르지 못하고 혹 연못에 들어갈 수도 있는 상이다 . 구사가 음 자리에 양으로 있어 자리가 마땅하지 않기 때문에 , 도약하여 승천하는 용이 되지 않을 수도 있다 . 구사가 변하면 외괘가 손 ( 巽 ) ☴ 으로 되어 겸손하게 순응해야 함을 나타내고 있다 . 한편 구오는 천하를 다스리는 대인이니 구오가 변하면 이 ( 離 ) ☲ 가 되어 밝은 문명일 뿐이요 ,", "오효": "九五는 飛龍在天이니 利見大人이니라. 구오    비룡재천      이견대인 구오는 나는 용이 하늘에 있으니 대인을 봄이 이롭다. 飛:날 비 구오는 양자리에 양으로 바른 자리에 있고 , 또한 외괘에서 중을 얻었으니 중정 ( 中正 ) 한 상태이다 . 그러니 덕과 기량을 갖춘 용이 승천하는 것과도 같다 . 그렇지만 구오 자신을 보필하여 천하사 ( 天下事 ) 를 같이 도모할 대인 ( 구오가 변하여 양이 음으로 바뀌면 외괘가 이 ( 離 ) ☲ 로 되니 밝은 문명으로 천하를 비추는 상이 된다 . 구오의 비룡 ( 飛龍 ) 이 하늘에 있다는 것은 천지일월과 그 덕을 합하고 밝음을 합한 대인이 사시 ( 四時 ) 와 더불어 천시 ( 天時 ) 에 따르고 귀신과 더불어 길흉을 합하여 천하의 일을 만들어 가는 것이다 . 亢龍有悔는 盈不可久也오 항룡유회    영불가구야 높은 용이 후회가 있음은 차서 가히 오래하지 못함이요 盈:찰 영   久: 오랠 구", "상효": "上九는 亢龍이니 有悔리라. 상구    항룡      유회 상구는 높은 용이니 뉘우침이 있을 것이다. 亢:지나칠 항   悔: 뉘우칠 회 맨 위에 있는 상구는 음 자리에 양으로 있어 자리가 마땅하지 않고 , 또한 상구효가 변하면 양이 음으로 되어 외괘가 태 ( 兌 ) ☱ 가 되니 석양 ( 夕陽 ) 으로 해가 기우는 상이다 . 그러니 때가 이미 기우는데도 불구하고 , 지나치게 높은 데 처하여 뉘우침이 있게 된다 . 용구사 用九는 見群龍호대 无首하면 吉하리라. 용구    견군룡      무수       길 용구는 뭇 용을 보되(뭇 용이 나타나되) 머리함이 없으면 길할 것이다. 群:무리 군   无:없을 무   首:머리 수   吉:길할 길 용구 ( 用九 ) 라는 것은 중천건괘 초효에서 상효에 이르기까지 구양 ( 九陽 ) 을 쓰는 것을 말한다 . 중천건괘 초구에서 상구까지 여섯 양의 용이 나타나니 모두가 양강 ( 陽剛 ) 한 가운데에서 머리하지 않으면 , 즉 앞서지 않으면 길하다 . 이는 동중정 ( 動中靜 ) 의 자연원리이며 심법 ( 心法 ) 이다 . 중천건괘는 그 괘체가 순양 ( 純陽 ) 으로 강하다 . 모두가 양강 ( 陽剛 ) 하여 발동하는 때에 순한 법도를 생각해야 하니 , 상구는 맨 위에 처하여 지나치게 높아진 것이니 상구가 변하면 태 ( 兌 ) ☱ 가 되어 날이 저물고 한 시대가 저무는 것이다 . 이는 주역 384 효 전체에 내재된 양효 ( 陽爻 ) 에 두루 통하는 이치이기도 하다 . 양 ( 陽 ) 의 상황은 강하여 발동하는 것이 되지만 , 항상 중도에서 벗어나지 않는 동중정 ( 動中靜 ) 의 심법 ( 心法 ) 이 요구된다 . 상구의 항룡 ( 亢龍 ) 은 달이 차면 기울고 양기운의 여름이 극하면 음기운의 가을이 오며 , 마음에 욕심이 가득하면 더 이상 받아들일 수 없어 쇠락하게 되니 가히 오래 지속될 수 없는 것이다 . 용구상사 用九는 天德은 不可爲首也라. 용구    천덕    불가위수야 구를 쓰는 것(용구)은 하늘의 덕은 가히 머리할 수 없는 것이다. 태양을 중심으로 공전하고 자전하고 있는 항성은 모두가 쉼 없는 운행을 하고 있다 . 그러나 이 중에 어느 하나라도 앞서게 되면 우주의 조화를 잃게 될 것이다 . 원형이정의 사덕도 어느 하나라도 지나치게 되면 자연의 조화를 잃게 된다 . 이러한 하늘의 이치에 따라서 인간사회에서도 군자에게는 감히 머리함이 없는 겸손함이 요구된다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 113 ∼ 122 쪽 ."}}, {"num": 2, "ko": "중지곤", "hanja": "重地坤", "lines": [0, 0, 0, 0, 0, 0], "url": "https://soosanss.tistory.com/154", "post_id": 154, "gwaui": "대지가 모든 만물을 싣고 있듯이 두터운 덕으로 만물을 포용하라 ( 厚德載物 ).", "gwamyung": "내괘와 외괘가 모두 땅 ( ☷ ) 으로 , 땅이 거듭되어 있으므로 ‘ 중지곤 ’ 이라 한다 . ‘ 중지 ( 重地 ) ’ 는 내괘와 외괘가 땅으로 거듭되어 있는 괘의 상 ( 象 ) 을 표현한 것이고 , ‘ 곤 ( 坤 ) ’ 은 땅이 거듭하여 여섯 효가 모두 음기운으로 이루어진 괘의 이름을 나타낸 것이다 . 즉 괘의 이름은 ‘ 곤 ( 坤 ) ’ 이요 곤괘의 형상은 ‘ 중지 ( 重地 ) ’ 이다 . 따라서 ‘ 중지곤 ’ 괘라 할 때 내괘와 외괘가 모두 순음으로 되어 있는 괘 기운의 양상을 떠올려야 한다 . 중천건괘 다음에 중지곤괘를 둔 이유는 하늘이 있기에 땅이 있고 그 땅 위에 만물이 있기 때문이다 . 하늘이 열리고 ( 天開於子 ) 땅이 생겼다 ( 地闢於丑 ). 우리가 삶의 터전으로 하고 있는 이 지구를 생각하자 . 태양을 중심으로 지구가 자전과 공전을 하면서 나타나는 춘하추동 ( 春夏秋冬 ) 의 사계절 변화원리에 맞추어 표상한 것이 후천팔괘 ( 後天八卦 ) 이다 . 후천팔괘를 연상하자 .", "seogwa": "", "gwasa": "坤은 元코 亨코 利코 牝馬之貞이니 君子의 有攸往이니라. 곤    원    형   이    빈마지정       군자    유유왕 先하면 迷하고 後하면 得하리니 主利하니라. 선       미      후       득         주리 西南은 得朋이오 東北은 喪朋이니 安貞하야 吉하니라. 서남    득붕      동북    상붕       안정       길 곤은 크고 형통하고 이롭고 암말(빈마)의 바름이니, 군자의 갈 바가 있다. 먼저 하면 미혹되고 뒤에 하면 얻을 것이니, 이로움을 주장한다. 서남방은 벗을 얻고 동북방은 벗을 잃으니, 편안히 바르게 해서 길하다. 牝:암컷 빈   攸:바 유   往:갈 왕   迷:미혹할 미   得:얻을 득   朋:벗 붕   喪:잃을 상 하늘의 원기 ( 元氣 ) 를 땅이 받아들여 만물을 낳게 되니 , 땅을 상징하는 순음 ( 純陰 ) 의 중지곤괘에도 원형이정의 사덕 ( 四德 ) 이 갖추어져 있다 . 그렇지만 순양 ( 純陽 ) 으로 강함을 주장하는 중천건 ( 重 天乾 ) 에 비하여 중지곤 ( 重地 坤 ) 은 순음 ( 純陰 ) 으로 순 ( 順 ) 함의 덕이 강조된다 . 이 우주에서 태양을 중심으로 무한히 공전하고 자전하고 있는 지구가 순한 덕을 잃고 강하게만 움직인다면 , 지구 위의 만물은 생존해 나가기가 어려울 것이다 . 음 ( 陰 ) 의 순함이 있기에 양 ( 陽 ) 이 나아갈 바가 있다 . 그래서 곤은 크고 형통하고 암말 ( 牝馬 ) 의 바름이 이로우니 , 군자가 갈 바를 두게 되는 것이다 . 중천건괘는 하늘을 상징하니 신비스러운 용 ( 龍 ) 으로 취상하였고 , 중지곤괘는 땅을 상징하니 땅에 사는 대표적인 동물 가운데 암말 ( 牝馬 ) 로 취상한 것이다 . 지도 ( 地道 ) 인 음 ( 陰 ) 은 순하게 천도 ( 天道 ) 인 양 ( 陽 ) 을 따라야 하니 , 지도인 음이 천도보다 먼저 하면 혼미하게 되고 , 천도에 뒤따르면 그 공덕을 얻게 되는데 , 그 공덕이란 양 ( 陽 ) 이 주관하는 봄 ․ 여름의 원형 ( 元亨 ) 을 바탕으로 음 ( 陰 ) 이 주관하는 가을 ․ 겨울의 이정 ( 利貞 ) 을 이루는 것이다 . 그래서 이로움을 주장한다고 ( 主利 ) 한 것이다 . 중지곤은 땅을 의미하기에 땅의 형세를 보면 , 동북방은 지세 ( 地勢 ) 가 험하고 서남방은 지세가 순하다 . 따라서 음기 ( 陰氣 ) 를 위주로 할 때 , 동북방에 가면 음의 벗을 잃게 되고 서남방은 벗을 얻게 되는데 , 음 ( 陰 ) 의 순한 덕을 간직하여 편안히 바르게 하면 길하게 된다 . 후천팔괘의 계절과 방위를 생각하자 . 를 다시 설명한 글이 단전이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 至哉라 坤元이여. 단왈 지재    곤원 萬物이 資生하나니 乃順承天이니 坤厚載物이 德合无疆하며 만물    자생         내순승천       곤후재물    덕합무강 含弘光大하야 品物이 咸亨하나니라. 함홍광대       품물    함형 牝馬는 地類니 行地无疆하며 柔順利貞이 君子攸行이라. 빈마    지류    행지무강      유순이정    군자유행 先하면 迷하야 失道하고 後하면 順하야 得常하리니 선      미       실도       후       순      득상 西南得朋은 乃與類行이오 東北喪朋은 乃終有慶하리니 서남득붕    내여유행       동북상붕   내종유경 安貞之吉이 應地无疆이니라. 안정지길    응지무강 단전에 말하였다. “지극하다. 곤의 원이여！ 만물이 바탕하여 생하니, 이에 순하게 하늘을 이으니, 곤이 두터워 만물을 실음이 덕이 지경이 없음에 합하며, 머금으며 넓으며 빛나며 커서 품물(만물)이 다 형통하다. 암말은 땅의 무리니 땅을 다님에 지경이 없으며, 유순하고 이정함이 군자의 행하는 바이다. 먼저 하면 미혹되서 도를 잃고 뒤에 하면 순해서 떳떳함을 얻을 것이니, 서남에서 벗을 얻음은 이에 무리와 더불어 행함이요, 동북에서 벗을 잃음은 이에 마침내 경사가 있을 것이니, 안정하여 길함이 땅의 지경이 없음에 응한다. 至:지극할 지   哉:어조사 재   資:바탕 자   承:이을 승   厚:두터울 후  載:실을 재   疆:지경 강   含:머금을 함 弘:넓을 홍   咸:다 함  迷:미혹할 미   常:떳떳할 상   慶:경사 경   應:응할 응 태극 ( 太極 ) 에서 건곤 ( 乾坤 ) 음양 ( 陰陽 ) 이 나오니 , 곤 ( 坤 ) 에도 태극의 원기가 내재되어 있다 . 원 ( 元 ) 을 바탕으로 만물이 생화하는데 , 이는 순하게 천도를 잇는 것이다 . 땅은 두터워서 만물을 싣고 있으니 그 덕이 무한하며 , 곤 ( 坤 ) 의 덕이 머금고 넓고 빛나고 커서 만물이 다 형통하게 된다 . 암말은 땅의 대표적인 무리인데 땅에서 다님이 지경이 없으며 , 유순하고 이정 ( 利貞 ) 함이 바로 군자가 체득해 나가야 할 바이다 . 음이 양보다 앞서면 천도를 어기게 되어 아득해지고 , 양보다 뒤에 하면 순하게 떳떳한 도를 얻게 된다 . 서남방은 유순한 지세에 음의 무리 ( 陰類 ) 가 모여 있으니 벗과 더불어 행하게 된다 . 한편 , 동북방은 험한 지세에 양의 무리 ( 陽類 ) 만 있어 음의 벗을 잃게 되지만 , 이는 음기운이 양기운을 만나 화합하는 것이니 결국에는 경사가 있는 것이다 . 결국 편안하고 바르게 하여 길함이 땅의 지경이 없는 데에 응하는 것이다 . 후천팔괘는 계절과 방위를 표상한 것이다 . 방위를 살펴보면 서남방의 음괘와 동북방의 양괘로 구분되어 있음을 알 수 있다 . 우선 서남방을 보면 동남방의 손괘 ☴ ( 장녀 ) ․ 남방의 이괘 ☲ ( 중녀 ) ․ 서남방의 곤괘 ☷ ( 모 ) ․ 서방의 태괘 ☱ ( 소녀 ) 가 모두 음괘로 이루어져 있으니 , 이를 ‘ 서남득붕 ( 西南得朋 ) ’ 이라 한 것이다 . 한편 동북방을 보면 동방의 진괘 ☳ ( 장남 ) ․ 동북방의 간괘 ☶ ( 소남 ) ․ 북방의 감괘 ☵ ( 중남 ) ․ 서북방의 건괘 ☰ ( 부 ) 가 모두 양괘로 이루어져 있으니 , 이를 ‘ 동북상붕 ( 東北喪朋 ) ’ 이라 한 것이다 . 이러한 곤 ( 坤 ) 의 도를 군자는 어떻게 따라야 하는가 . 괘상전은 다음과 같이 표현하고 있다 .", "gwasangsa": "象曰 地勢 坤이니 君子 以하야 厚德으로 載物하나니라. 상왈 지세 곤       군자 이      후덕       재물 상전에 말하였다. “땅의 형세가 곤이니, 군자가 이를 본받아 두터운 덕으로 만물을 실어야 한다.” 중천건괘는 순양으로 하늘을 표상한 것이고 , 중지곤괘는 순음으로 땅을 표상한 것이다 . 그러니 땅의 형세가 곤 ( 坤 ) 이다 . 이 땅에는 인간을 포함하여 식물 ․ 동물 등의 만물이 실려 있다 . 군자는 이러한 땅의 형세와 기운을 본받아 덕을 두텁게 하여 만물을 포용해야 한다 . 그러니 인종 , 민족 , 종족 , 국가 , 종교 등으로 나뉘어 있는 이 지상의 인류를 어떻게 포용해야 하는가 ? 이것이 이 시대를 살아가는 군자의 과업 ( 課業 ) 이다 . 효사와 효상사 初六은 履霜하면 堅冰이 至하나니라. 초륙    이상       견빙    지", "hyosa": {"초효": "초육은 순음 ( 純陰 ) 으로 되어 있는 중지곤괘의 맨 아래에 있다 . 곤 ( 坤 ) 은 땅의 형세라 하였다 . 지구가 공전하면서 나타나는 계절변화 , 즉 춘하추동 사시에 있어 음기 ( 陰氣 ) 가 응결되는 자연현상이 서리 ( 霜 ) 이다 . 맨 아래에서 음기인 서리가 엉기니 , 그 서리를 밟아 가면 굳은 얼음이 된다 . 역은 천지의 법도에 준하는 것이다 ( ｢ 계사상전 ｣ 제 4 장 : 易 이 與天地準 이라 ). 음양 기운의 승강 ( 昇降 ) 법칙에 있어 , 중지곤괘는 음력 10 월 ( 孟冬 ) 에 해당한다 . 음력 10 월에 순음의 기운이 충만하게 되니 , 음력 11 월 ( 仲冬 , 동짓달 ) 이 되면 일양 ( 一陽 ) 이 생하여 음을 엉겨 나간다 . 그렇다면 인간은 마치 서리가 굳어 얼음이 되듯이 , 이 땅에서 역사를 이루어 가고 있다 . 서리가 얼음으로 되는 과정을 어떻게 이루어야 하는가 ? 바로 곤 ( 坤 ) 의 순한 덕으로 이루어야 함을 말한다 . 초육 효사에 대하여 효상전은 다음과 같이 설명하고 있다 . 象曰 履霜堅冰은 陰始凝也니 馴致其道하야 至堅冰也하나니라. 상왈 이상견빙    음시응야    순치기도      지견빙야 상전에 말하였다. “서리를 밟으면 굳은 얼음이 이르는 것은 음이 비로소 엉기는 것이니, 그 도를 순하게 이루어서 굳은 얼음에 이르게 한다.” 凝:엉길 응  馴:길들일 순  致:이룰 치  至: 이를 지 서리를 밟으면 굳은 얼음이 이른다는 것은 곤괘의 첫 음이 비로소 엉김을 말한다 . 그러니 처음 엉길 때에 그 엉기는 도 ( 道 ) 를 순하게 이루어서 바르게 굳은 얼음으로 이르게 해야 한다 . 六二는 直方大라 不習이라도 无不利하니라.", "이효": "육이    직방대   불습          무불리 육이는 곧고 모나고 크다. 익히지 않아도 이롭지 않음이 없다. 直:곧을 직   方:모 방   習: 익힐 습 음이 두 번째 육이는 음자리에 음으로 처하여 , 자리가 바르고 또한 내괘의 중을 얻고 있으니 중정 ( 中正 ) 하게 곤 ( 坤 ) 의 도를 잇는 상이다 . 그러니 곤 ( 坤 ) 의 덕을 그대로 이어 받아 곧고 방정하고 큰 덕을 지니고 있다 . 이렇게 곤도 ( 坤道 ) 를 이어 받으니 , 따로 익히지 않아도 저절로 이루어져 이롭지 않음이 없다 . 육이 효사에 대하여 효상전은 다음과 같이 설명하고 있다 . 象曰 六二之動이 直以方也니 不習无不利는 地道 光也라. 상왈 육이지동    직이방야    불습무불리    지도 광야 상전에 말하였다. “육이의 움직임이 곧고 방정하니, 익히지 않아도 이롭지 않음이 없는 것은 땅의 도가 빛나는 것이다.” 육이효가 변하면 음이 양으로 되면서 내괘가 감 ( ☵ ) 이 되고 내호괘가 진 ( ☳ ) 이 된다 . 중정한 도를 지키면서도 때로는 우레 ☳ 처럼 곧고 방정한 도를 펼치고 , ‘ 익히지 않아도 이롭지 않음이 없다 ’ 는 것은 중정하게 곤의 도를 이음이 빛나는 것을 말한다 . 六三은 含章可貞이니 或從王事하야 无成有終이니라.", "삼효": "육삼    함장가정      혹종왕사       무성유종 육삼은 빛남을 머금어 가히 바르게 하니, 혹 왕의 일을 좇아서 이룸은 없되 마침은 있다. 含:머금을 함   章:빛날 장   或:혹 혹   從:좇을 종 순음의 곤괘에서 육삼효는 양 자리에 음으로 있어서 양 ( 陽 ) 의 빛남을 머금고 있는 상이다 . 육삼효가 변하면 내괘가 간 ☶ 이 되고 내호괘가 감 ☵ 이 되며 외호괘는 진 ☳ 이 된다 . 따라서 내호괘 감 ☵ 으로 빛을 머금고 , 간 ☶ 으로 그쳐 바르게 하면서도 진 ☳ 으로 혹 왕의 일을 좇아서 행하지만 , 본괘 자체가 하늘의 뒤를 잇는 곤 ( 坤 ) 의 도이기에 스스로 이루고자 할 수는 없으며 다만 마무리를 하게 되는 것이다 . 육삼 효사에 대하여 효상전은 다음과 같이 설명하고 있다 . 象曰 含章可貞이나 以時發也오 或從王事는 知光大也라. 상왈 함장가정       이시발야    혹종왕사    지광대야 상전에 말하였다. “빛남을 머금어 가히 바르게 하지만 때로 발하고, 혹 왕의 일을 좇음은 앎이 빛나고 큰 것이다.” 육삼효가 양 자리에 음으로 있어 빛남을 머금어 가히 바르게 하고 있지만 , 그저 가만히 있는 것만은 아니다 . 육삼효가 변한 외호괘가 진 ☳ 이 되니 , 때가 요구하면 펴 나가기도 한다 . 그래서 혹 왕의 일을 좇아서 하되 스스로 이루고자 하지 않고 다만 마침을 두는 것은 그 앎 , 지혜가 광대하기 때문이다 . 六四는 括囊이면 无咎며 无譽리라.", "사효": "육사    괄낭      무구    무예 육사는 주머니를 매면 허물이 없으며 명예로움도 없을 것이다. 括:묶을 괄   囊:주머니 낭   譽: 기릴 예 음이 네 번째 육사는 중지곤의 외괘 음자리에 거하여 내괘의 세 음효를 잘 이끌어야 하는 자리이다 . 나라로 친다면 백성을 다스리는 대신이라고 볼 수 있다 . 육사효가 변하면 음이 양으로 바뀌니 내괘는 곤 ☷ 이요 , 내호괘는 간 ☶ 이요 , 외호괘는 감 ☵ 이요 , 외괘는 진 ☳ 의 상이 된다 . 따라서 내괘 곤 ☷ 의 백성을 간 ☶ 의 두터운 덕으로 잘 감싸 안아야 하니 ‘ 괄낭 ( 括囊 ) ’ 이라 한 것이다 . 두터운 덕으로 백성을 포용하니 허물은 없으며 , 그 일이 육사 대신 ( 大臣 ) 이 해야 할 소명이기에 명예가 될 것은 아니다 . 한편 육사효가 변하면 지괘 ( 之卦 ) 가 뇌지예 ( 雷地豫 ) 괘가 되는데 , ‘ 예 ( 豫 ) ’ 는 즐거운 것이고 미리 예측하는 것이기도 하다 . 육사효가 변하면 외괘가 진 ☳ 으로 발동하게 되어 즐거움이 지나치거나 혹은 예측한 바를 함부로 발설하여 흉하게 될 가능성이 있기 때문에 외호괘의 감 ☵ 으로 ‘ 입 주머니를 매라 ( 括囊 ) ’ 고 하는 것이다 . 육사효는 중지곤의 내괘에서 외괘로 넘어간 첫 자리이다 . 내괘와 외괘 , 하늘과 땅 , 인군과 백성이 교류하는 중요한 자리에 있다 . 이에 대해 효상전은 다음과 같이 설명하고 있다 . 象曰 括囊无咎는 愼不害也라. 상왈 괄낭무구    신불해야 상전에 말하였다. “주머니를 매서 허물이 없는 것은 삼가면 해롭지 않은 것이다.” 愼: 삼갈 신 육사가 나라와 백성을 이어주는 역할을 하는 대신으로서 처신을 삼가 잘하면 자기 자신뿐만이 아니라 나라도 백성도 해롭지 않게 된다 . 六五는 黃裳이면 元吉이리라.", "오효": "육오    황상      원길 육오는 누런 치마면 크게 길할 것이다. 黃:누를 황   裳: 치마 상 음이 다섯 번째 육오는 중지곤괘 외괘에서 중을 지키고 있는 자리이다 . 오행원리에서 황색 ( 黃色 ) 은 중앙을 의미하기 때문에 , ‘ 누렇다 ’ 는 것은 외괘의 중을 지켜 중도 ( 中道 ) 를 행해야 한다는 것을 의미한다 . ‘ 의상 ( 衣裳 ) ’ 에서 윗옷을 ‘ 의 ( 衣 ) ’ 라 하고 아래옷을 ‘ 상 ( 裳 ) ’ 이라 한다 . 따라서 ‘ 누런 치마 ( 黃裳 ) ’ 는 아래에 있는 신하로서 중도로써 왕을 섬겨야 함을 의미한다 . 중지곤괘와 중천건괘는 서로 응하는 관계에 있는데 , 중천건괘 구오효가 천하를 다스리는 대인 ( 왕 ) 을 의미한다면 , 중지곤괘 육오효는 건괘 구오 대인을 중도 ( 中道 ) 로 섬기는 신하를 의미한다 . 따라서 중지곤괘 육오효가 ‘ 크게 길하다 ’ 고 하여 왕이 되어 천하를 경륜하고자 한다면 이는 신하로서의 본분을 망각하는 것이다 . 주자 ( 朱子 ) 는 ｢ 본의 ｣ ( 本義 ) 에서 다음과 같이 설명하고 있다 . 《춘추전》소공(昭公) 12년조에 〈남괴〉가 장차 반란을 일으키려 할 때, 점을 해서 이 효를 얻어 “크게 길하다”고 하니, 〈자복혜백〉이 말하되 “충성되고 미더운 일이면 옳지만, 그렇지 않으면 반드시 패할 것이다. 밖이 강하고 안으로 온순한 것은 충성이고, 화합해서 바름을 따르는 것은 신의이다. 그러므로 ‘누런 치마면 길하다’고 하였으니, ‘황’은 중앙의 색이고 ‘상’은 아래를 꾸미는 것이며, ‘원’은 착함의 어른이다. 마음(中)이 충성되지 않으면 그 색(黃)을 얻지 못하고, 아래에서 공손하지 않으면 그 꾸밈을 얻지 못할 것이며, 일이 선하지 않으면 그 지극함(결과)을 얻지 못한다. 또한 역(易)이라는 것은 험한 일(부정한 일)을 점칠 수 없으니, 3가지(忠․共․善)에서 빠짐이 있으면 점쳐서 이 효를 얻었다 하더라도 점괘대로 안된다”라고 하더니, 후에 과연 〈남괴〉가 패하였으니, 이것으로 점치는 법을 볼 수 있다.(春秋傳에 南蒯 將叛할새 筮得此爻하야 以爲大吉이라하여늘 子服惠伯이 曰忠信之事則可커니와 不然이면 必敗하리라. 外强內溫은 忠也요 和以率貞은 信也라. 故로 曰黃裳元吉이라하니 黃은 中之色也요 裳은 下之飾也요 元은 善之長也라. 中不忠이면 不得其色이요 下不共이면 不得其飾이요 事不善이면 不得其極이라. 且夫易은 不可以占險일새 三者 有闕이면 筮雖當이라도 未也라하더니 後에 蒯 果敗하니 此可以見占法矣로다.) 육오 효사에 대해 효상전은 다음과 같이 설명하고 있다 . 象曰 黃裳元吉은 文在中也라. 상왈 황상원길    문재중야 상전에 말하였다. “누런 치마면 크게 길한 것은 문채가 가운데 있는 것이다.” ‘ 누런 치마면 크게 길하다 ’ 는 것은 육오 군자가 신하로서 중도 ( 中道 ) 있게 위와 아래를 잘 화합하니 , 그 아름다운 문채가 중심에 있는 것이다 . 上六은 龍戰于野하니 其血이 玄黃이로다. 상륙    용전우야      기혈    현황", "상효": "상육은 용이 들에서 싸우니 그 피가 검고 누르도다. 戰:싸울 전   野:들 야   玄: 검을 현 순음의 중지곤괘에서 상육은 맨 위에 있기 때문에 음 기운이 극한 상태에 이른 것이다 . 천기 ( 天氣 ) 와 지기 ( 地氣 ) 는 상호 교류를 통하여 만물을 화육해야 하는데 , 중지곤괘 상육효는 바로 천기와 지기의 교감작용이 일어나는 현상을 말하고 있다 . 용은 중천건괘의 여섯 용이고 , 들 ( 野 ) 은 중지곤괘의 땅을 의미한다 . 땅의 음기가 맨 위에서 극한 상태에 있으면서 하늘의 양기를 불러들이니 , 하늘의 여섯 용이 땅에 내려와 음기와 교감하는 것이 ‘ 용전우야 ’ 이다 . 땅의 누런 음기와 하늘의 검은 양기가 섞이게 되니 , 그 정혈 ( 精血 ) 이 검고 누런 ( 玄黃 ) 색으로 된다 . 상육효에 대해 효상전은 다음과 같이 설명하고 있다 . 象曰 龍戰于野는 其道 窮也라. 상왈 용전우야    기도 궁야 상전에 말하였다. “용이 들에서 싸우는 것은 그 도가 궁한 것이다.” 窮:다할 궁 ‘ 용이 들에서 싸운다 ’ 는 것은 음의 도가 극해서 궁해졌기 때문이다 . 상황과 기운이 극에 이르면 변화를 모색해야 한다 . 용육사·용육상사 用六은 利永貞하니라. 용륙    이영정 용육은 오래 바르게 함이 이롭다. 중지곤괘의 여섯 음을 씀에 있어서 , 음은 순한 덕을 갖추어야 하니 오래 바르게 함이 이롭다 . 이는 64 괘 384 효 가운데 절반인 192 효의 음효 모두에 해당하는 일반적인 원칙이라고도 할 수 있다 . 이에 대해 상전은 다음과 설명하고 있다 . 象曰 用六永貞은 以大終也라. 상왈 용륙영정    이대종야 상전에 말하였다. “용육이 오래 바르게 하면 이로운 것은 크게 마치는 것이다.” 음의 도는 양보다 앞서 주도해 나가는 것이 아니라 , 양보다 뒤에 해서 양이 이루는 것을 마쳐야 한다 . ‘ 앞서면 아득하고 뒤에 하면 얻는다 ’ 라고 했고 , ‘ 혹 왕의 일을 좇더라고 이룸은 없고 마침을 둔다 ’ 라고 했으며 , ‘ 누런 치마면 길하다 ’ 고 하였다 . 음으로서 길이 바르게 하면 양 ( 陽 ) 의 일 , 즉 하늘의 역사를 땅에서 크게 마치게 된다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 137 ∼ 147 쪽 ."}}, {"num": 3, "ko": "수뢰둔", "hanja": "水雷屯", "lines": [1, 0, 0, 0, 1, 0], "url": "https://soosanss.tistory.com/155", "post_id": 155, "gwaui": "천지가 열리니 만물을 창조하고 세상을 일으켜 천하를 다스리라 ( 創世經綸 ).", "gwamyung": "외괘가 감수 ( 坎水 ) ☵ , 내괘가 진뢰 ( 震雷 ) ☳ 로 이루어진 괘의 명칭을 ‘ 둔 ( 屯 ) ’ 이라 한다 . ‘ 屯 ’ 은 ‘ 준 ’ 과 ‘ 둔 ’ 의 음이 있으나 ‘ 둔 ’ 으로 발음한다 . 천지가 창조되어 중천건 하늘과 중지곤 땅의 기운이 교감하여 만물이 생하는 어려운 상황을 의미한다 . 하늘의 양기운과 땅의 음기운이 중지곤괘 상육효에서 교감하면서 ( 龍戰于野 ) 만물이 나오게 되는데 , 인간을 포함한 만물이 처음 생하는 데에는 탄생의 고통과 더불어 험난한 세상을 경륜해 나가야 하는 어려움이 있다 . 이러한 어려움은 사업을 처음 구상하고 시작할 때에도 마찬가지이다 . 내괘 진 ( 震 ) ☳ 은 천기와 지기가 교감하여 땅 아래에 양기가 포태되어 태동하는 기운을 상징하며 , 외괘 감 ( 坎 ) ☵ 은 앞으로의 험난함을 상징한다 .", "seogwa": "｢ 전 ｣ ( 序卦傳 ) 은 중천건괘와 중지곤괘 다음에 수뢰둔괘가 온 이유를 다음과 같이 설명하고 있다 . 有天地然後에 萬物이 生焉하니 유천지연후    만물    생언 盈天地之間者 唯萬物이라 영천지지간자 유만물 故로 受之以屯하니 屯者는 盈也니 屯者는 物之始生也라. 고    수지이둔       둔자   영야    둔자    물지시생야 천지가 있고 난 뒤에 만물이 생하니, 천지 사이에 가득 찬 것이 오직 만물이다. 그러므로 둔으로 받으니, 둔은 가득 참이니 둔은 물건이 처음으로 생기는 것이다. 焉:어조사 언  盈:찰 영  唯:오직 유  受:받을 수  屯:어려울 둔  始:처음 시 하늘과 땅이 생긴 연후에 천지 기운의 교감으로 만물이 나오게 된다 . 천지 사이에 가득 찬 것은 만물이다 . 또한 천기는 아래로 내려오고 ( 天氣下降 ) 지기는 위로 올라가 ( 地氣上昇 ) 교감하여 만물을 생화하는 기틀을 이루게 되니 , 이 천지기운의 엉김으로 만물이 나오게 된다 . 남자와 여자의 교감으로 남정 ( 男精 ) 과 여혈 ( 女血 ) 이 그 기운을 얽으니 , 새로운 생명이 탄생하는 것과 같다 .", "gwasa": "屯은 元亨코 利貞하니 勿用有攸往이오 利建侯하니라. 둔    원형    이정      물용유유왕       이건후 둔은 크게 형통하고 바르게 함이 이로우니, 가는 바를 두지 말고 제후를 세움이 이롭다. 屯:어려울 둔   勿:말 물   用:써 용   攸:바 유   建:세울 건   侯:제후 후 하늘과 땅의 덕 , 즉 원형이정 ( 元亨利貞 ) 의 사덕을 그대로 부여받아 정기 ( 精氣 ) 가 쌓이니 크게 형통하고 바르게 함이 이롭다 . 그러나 천지 기운이 엉겨 만물이 처음 나오는 때이므로 , 스스로 갈 수는 없고 잘 이끌어 줄 수 있는 제후 ( 諸侯 ) 를 세워야 한다 . 를 풀이한 단전 ( 彖傳 ) 은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 屯은 剛柔 始交而難生하며 動乎險中하니 단왈 둔    강유 시교이난생      동호험중 大亨貞은 雷雨之動이 滿盈일새라. 대형정    뇌우지동    만영 天造草昧에는 宜建侯오 而不寧이니라. 천조초매       의건후   이불녕 단전에 말하였다. “둔은 강과 유가 처음 사귀어 어렵게 나오며 험한 가운데 움직이니, 크게 형통하고 바른 것은 우레와 비의 움직임이 가득하기 때문이다. 하늘이 초매를 짓는 데는 마땅히 제후를 세워야 하고, 편안하지 못하다.” 交:사귈 교   難:어려울 난   險:험할 험   滿:찰 만   造:지을 조   草:풀 초   昧:어두울 매   宜:마땅할 의   寧:편안할 녕 하늘의 강한 양 기운과 땅의 부드러운 음 기운이 처음 사귀니 , 만물이 어렵게 나오고 험한 가운데 움직이게 되지만 , 만물을 생화하기 위한 천지기운이 우레와 비의 움직임으로 가득하기에 크게 형통하고 바르게 해야 이롭다 . 그러니 천지가 창조되어 만물이 생화하고 인류의 역사가 비롯되는 이 때에 세상을 이끌어 가고 경륜해 나갈 수 있는 제후를 세워야 한다 . 그러나 만들어 가야 할 앞으로의 역사가 아득하니 마음이 편하지 못하다 . 어떠한 일을 처음 시작할 때 역시 마찬가지이다 .", "gwasangsa": "象曰 雲雷 屯이니 君子 以하야 經綸하나니라. 상왈 운뢰 둔       군자 이      경륜 상전에 말하였다. “구름과 우레가 둔이니, 군자가 이를 본받아 경륜해 나간다.” 雲:구름 운   雷:우뢰 뢰   經:다스릴 경   綸: 다스릴 륜 내괘가 진 ☳ 이니 우레의 기운이며 , 외호괘가 간 ☶ 이고 외괘가 감 ☵ 으로 산 위에 걸쳐 있는 물 기운은 구름이니 , 구름과 우레의 기운이 가득한 상이 ‘ 둔 ’ 이다 . 군자는 이러한 기운의 상을 보고 , 앞으로의 역사를 경륜해 나간다 . 내괘 진뢰 ☳ 는 모든 것이 새롭게 시작되어 경륜해 나가야 하는 상황을 의미하고 , 외괘 감수 ☵ 는 앞으로 헤쳐 나가야 할 어려움을 나타내고 있다 . 이러한 둔괘에 있어 초효에서 상효까지 각각의 때와 위치에 따라 해야 할 바는 다르다 . 효사 및 효상사", "hyosa": {"초효": "初九는 磐桓이니 利居貞하며 利建侯하니라. 초구    반환       이거정      이건후 초구는 반환함(머뭇거림)이니, 바른 데에 거처함이 이로우며 제후를 세움이 이롭다. 磐:머뭇거릴 반, 너럭바위 반   桓:머뭇거릴 환, 푯말 환, 굳셀 환 수뢰둔괘 초구는 천기와 지기가 교합하여 생명이 탄생하고 사업을 시작하는 단계이다 . 그러나 외호괘가 간 ☶ 이고 외괘가 감 ☵ 으로 험준한 산에 구름이 걸려 있어 앞길이 아득한 상이니 , 어떻게 나가야 할 바를 몰라 머뭇거리게 되는 상황이다 . 이런 상황에서는 그 자리에 바르게 거처하여 기운을 기르고 도움을 받을 수 있는 제후를 세우는 것이 이롭다 . 둔괘에서는 구오효가 초구를 이끌어 줄 제후가 된다 . 이에 대해 효상전은 다음과 같이 설명하고 있다 . 象曰 雖磐桓하나 志行正也며 以貴下賤하니 大得民也로다. 상왈 수반환       지행정야   이귀하천       대득민야 상전에 말하였다. “비록 머뭇거리나 뜻이 바름을 행하며, 귀함으로써 천한 데에 아래 하니, 크게 백성을 얻도다.” 雖:비록 수   志:뜻 지   貴:귀할 귀   賤:천할 천   得:얻을 득 초구는 비록 경륜이 미미하여 어찌할 바를 몰라 머뭇거리지만 뜻은 바르게 행하고 , 또한 하늘의 정기를 받아 고귀한 뜻을 가지고 있으면서도 내호괘 곤 ☷ ( 백성 ) 의 아래에 처하여 기운을 기르고 경륜해 나가니 , 나중에는 크게 백성을 얻는 인재가 된다 . 六二는 屯如邅如하며 乘馬班如하니 匪寇면 婚媾리니 초구 ) 과 정응 관계에 있는 양 ( 초구 ’ 때문에 주저함이 원인이 되어 한 때 기회를 놓치면 10 년이란 세월을 허비하게 된다 . ‘ 자 ( 字 ) ’ 는 여자가 시집가는 것을 뜻한다 . 《 예기 ( 禮記 ) 》 에 여자가 ‘ 시집가는 것을 허락함에 비녀를 꼽고 자 ( 字 ) 를 지어준다 ’ ( 女子 許嫁 笄而字 ) 고 하였다 . 象曰 六二之難은 乘剛也오 十年乃字는 反常也라. 상왈 육이지난    승강야    십년내자    반상야 상전에 말하였다. “육이의 어려움은 강을 탔기 때문이고, 십 년 만에 시집감은 떳떳함으로 돌아오는 것이다.” 難:어려울 난   反:돌아올 반   常:떳떳할 상 초구와 혼인을 구해서 가는 것은 밝게 처신하는 것이다 .", "이효": "육이    둔여전여      승마반여       비구    혼구 女子 貞하야 不字라가 十年에야 乃字로다. 여자 정      부자       십년       내자 육이는 어려운 듯 머뭇거리는 듯 하며, 말을 타도 말이 서성거리니, 도적이 아니면 청혼해 오리니, 여자가 곧아서 시집가지 않다가 십년에야 이에 시집가도다. 邅:머뭇거릴 전   乘:탈 승   班:서성거릴 반   匪:아닐 비   婚:혼인할 혼  媾:혼인할 구   字: 시집갈 자 두 번째 음 ‘ 육이 ’ 는 중정한 음으로 외괘에서 중정한 양 ‘ 육이가 어려움을 겪고 있는 것은 정응인 구오 양이 있음에도 불구하고 바로 아래에 초구 양 ( 강 ) 이 있어 마음이 흔들리기 때문이고 , ‘ 십 년 만에 시집감 ’ 은 정응인 구오와 만나는 떳떳함을 회복하는 것이다 . 六三은 卽鹿无虞라 惟入于林中이니", "삼효": "육삼    즉록무우   유입우임중 君子 幾하야 不如舍니 往하면 吝하리라. 군자 기       불여사    왕      인 육삼은 사슴사냥에 나아가나 우인(虞人 : 몰이꾼)이 없다. 오직 숲 속으로 들어가니, 군자가 기미를 보아서 그치는 것만 같지 못하니, 가면 인색할 것이다. 卽:나아갈 즉   鹿:사슴 록   虞:벼슬이름 우(산과 연못을 맡은 벼슬 : 몰이꾼)  幾:기미 기   舍:집 사, 머무를 사, 폐할 사 吝:아낄 린(인색함, 주저함) 세 번째 음 ‘ 육삼 ’ 은 양자리에 음으로 처하여 위가 바르지 못하고 , 외호괘가 간 ☶ 으로 산이 되는데 상효가 같은 음으로 정응이 되지 않아 도와주는 관리 ( 몰이꾼 ) 도 없이 혼자 숲 속으로 들어가는 형국이다 . 이러한 때에 군자라면 기미를 잘 파악하여 더 이상 진행하지 말아야 하며 , 그렇지 않고 가게 되면 인색한 상황을 만나게 된다 . 象曰 卽鹿无虞는 以從禽也오 君子舍之는 往하면 吝窮也라. 상왈 즉록무우    이종금야    군자사지    왕      인궁야 상전에 말하였다. “사슴사냥에 나아가 몰이꾼이 없는 것은 새를 좇음이요, 군자가 그치는 것은 가면 인색하여 궁하게 된다.” 禽:날짐승 금   窮:궁할 궁 즉 , 자신의 처지가 마땅하지 않은 상황에 있으면서 허황된 꿈을 꾸는 것이니 , 마치 사슴을 잡으려고 산에 갔다가 새를 좇는 격이고 , 만일 계속 가게 되면 인색하여 궁하게 된다 . 이러한 상황에서 군자는 하고자 하던 일을 그쳐야 한다 . 六四는 乘馬班如니 求婚媾하야 往하면 吉하야 无不利하리라.", "사효": "육사    승마반여    구혼구      왕       길       무불리 육사는 말을 탔다가 서성거리니, 혼인을 구하여 가면, 길해서 이롭지 않음이 없을 것이다. 求:구할 구   往:갈 왕 네 번째 음 ‘ 육사 ’ 는 외괘의 감 ☵ 에 있어 어두운 상태이니 역시 일을 주저하게 된다 . 또한 정응 관계인 초구가 있음에도 불구하고 바로 위에 있는 구오 양에 마음을 두기도 한다 . 그러나 정응 관계로서 육사 자신에게 필요한 상대인 초구를 만나야 하니 , 가서 만나게 되면 길하여 모든 일이 이롭게 된다 . 象曰 求而往은 明也라. 상왈 구이왕    명야 상전에 말하였다. “구하여 감은 밝게 하는 것이다.” 육사는 음자리에 음으로 위가 마땅하고 정응인 초구와 잘 응하니 ,", "오효": "구오 ’ 와 잘 응하고 있다 . 그런데 음 자리에 음으로 거하여 유순하니 결단을 내리지 못하고 외호괘가 간 ☶ 으로 험준한 산에 막혀 그쳐 있으니 가기도 어려운 상황이다 . 또한 바로 아래에 있는 양 ( 구오 ) 사이에서 자신의 선택을 주저하는 상이다 . 결국에는 중정으로 응하고 있는 구오 양을 만나게 되지만 , ‘ 九五는 屯其膏니 小貞이면 吉코 大貞이면 凶하리라. 구오    둔기고    소정      길     대정      흉 구오는 그 고택(膏澤:은혜)이 어려우니, 조금 바르게 하면 길하고 크게 고집하면 흉할 것이다. 膏:기름 고(은혜, 고택 ) 구오는 외괘에서 중정한 자리에 있어 둔괘 전체의 상황을 이끌어 가는 위치에 있지만 , 지도자로서의 은덕을 베푸는 역할을 고집하기가 어려운 상황이다 . 외괘가 감괘 ☵ 로 어두운 상황일뿐더러 둔괘에서 구오는 초구를 도와 일을 풀어 나가야 하는 역할 , 즉 제후로서의 역할을 해야 한다 . 때문에 지도자로서의 역할을 고집하지 말고 겸손하고 유연하게 대처하면 길하지만 , 인군 ( 통치자 ) 으로서의 자리를 고집하면 오히려 일을 그르쳐 흉하게 된다 . 象曰 屯其膏는 施 未光也라. 상왈 둔기고    시 미광야 상전에 말하였다. “그 고택이 어려운 것은 베풂이 빛나지 못한 것이다.” 施: 베풀 시 둔괘의 상황에서는 초구의 역할이 매우 중요하고 크기 때문에 구오가 인군로서의 역할을 고집하면 그 베푸는 것이 빛나지 못하게 된다 . 上六은 乘馬班如하야 泣血漣如로다. 상륙 자가 경륜을 익힌 스승을 찾아야 올바른 가르침이 베풀어진다 . 오늘날 학생 제자가 올바른 스승을 찾아가는 것이 아니라 , 스승을 자처하는 자가 학생을 끌어 모으기 위해 영업하는 현실이 얼마나 교육의 본질에서 벗어나 있는가를 깊이 생각해볼 필요가 있다 . 교육의 가르침 ( 敎 ) 과 배움 ( 學 ) 에 있어서는 스승과 제자 간에 확고한 믿음이 있어야 하고 그렇지 않으면 교육의 도가 더럽혀진다 . 어려운 상황에서 교육하는 것이니 바르게 해야 이롭다 . 이 괘사를 풀이한 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 蒙은 山下有險하고 險而止 蒙이라. 단왈 몽    산하유험       험이지 몽 蒙亨은 以亨行이니 時中也오 몽형    이형행      시중야 匪我求童蒙童蒙求我는 志應也오 비아구동몽동몽구아    지응야 初筮告은 以剛中也오 초서곡    이강중야 再三瀆瀆則不告은 瀆蒙也일새니 蒙以養正이 聖功也라. 재삼독독즉불곡    독몽야         몽이양정    성공야 단전에 말하였다. “몽은 산 아래에 험함이 있고, 험해서 그침이 몽이다. ‘몽이 형통한 것’은 형통함으로써 행하니 때로 가운데 함이요, ‘내가 동몽을 구하지 않고 동몽이 나를 구하는 것’은 뜻이 응함이요, ‘처음 점해서 알리는 것’은 강하고 가운데 함이요, ‘두 번 세 번 하면 더럽혀서 더럽히면 알려주지 못하는 것’은 몽을 더럽히기 때문이니, 몽으로써 바른 것을 기름이 성스러운 공이다.” 險:험할 험  止:그칠지  志:뜻 지  應:응할 응  養:기를 양  功:공 공 몽은 산 아래에 험함이 있는 상이니 , 험해서 그쳐 있는 것이다 . 즉 둔괘에서 어린 생명이 나오고 새로운 일이 시작되었으나 , 어린 생명이 자라나고 일이 이루어지는 과정에는 높은 산도 있고 험한 물도 있다 . 그러니 몽의 정황에서는 그때그때에 절도 있게 중도를 지켜나가야 형통하다 . 교육은 형이상적 ( 形而上的 ) 인 학문과 형이하적 ( 形而下的 ) 인 세상사를 적절하게 조화하는 중도로 이루어져야 한다 . 그래서 교육을 통해 이루어지는 군자의 도는 ‘ 중용 ( 中庸 ) ’ 에 있다 . 《 중용 ( 中庸 ) 》 제 2 장의 다음 글을 음미해 보자 . 중니(孔子의 字)께서 말씀하셨다. “군자는 중용을 하고 소인은 중용에 반한다. 군자의 중용은 군자이면서 때로 중을 하는 것이요, 소인이 중용에 반함은 소인이면서 거리낌(기탄)이 없는 것이다.”(仲尼曰 君子는 中庸이오 小人은 反中庸이니라. 君子之中庸也는 君子而時中이오 小人之(反)中庸也는 小人而無忌憚也니라.) 가르침을 구하는 자와 가르치는 자는 뜻이 잘 응해야 하고 서로의 의지가 강하게 부합되어야 할 것이니 , 이러한 뜻이 부합되어 바름을 길러 나간다면 성인 ( 聖人 ) 으로서의 공력이 있는 것이다 .", "gwasangsa": "象曰 山下出泉이 蒙이니 君子 以하야 果行하며 育德하나니라. 상왈 산하출천    몽      군자 이       과행       육덕 상전에 말하였다. “산 아래에 샘이 나는 것이 몽이니, 군자가 이를 본받아 과감히 행하며 덕을 기른다.” 出:날 출   泉:샘 천   果:과당성있을 과(실과 과)   育: 기를 육 몽은 산 아래에 샘물이 솟아나는 것과 같으니 , 군자는 이러한 기운의 양상을 보고 과감하게 행동하고 덕을 길러나가야 한다 . 가르치는 자와 배우는 자는 모두가 의심과 주저함을 버리고 과단성 있게 행해야 하며 , 또한 세상을 포용하며 경륜해 나갈 수 있는 덕을 길러야 한다 . 그러면 가르침을 전하고 배움을 구하는 교육의 도를 나타내는 몽괘 여섯 효의 각 정황을 살펴보기로 한다 . 효사 및 효상사 初六은 發蒙호대 利用刑人하야 用說桎梏이니 以往이면 吝하리라. 초륙    발몽      이용형인       용탈질곡       이왕       인", "hyosa": {"초효": "초육은 몽매함을 일으키되 사람에게 형벌을 쓰고서 질곡을 벗김이 이로우니, (형벌로써만) 가면 인색할 것이다. 發:일으킬 발   用:써 용(以)   刑: 형벌 형   說:벗을 탈(말씀 설, 달랠 세, 기뻐할 열)   桎:차꼬 질(족쇄)   梏:수갑 곡 초육은 양자리에 음으로 있어 위가 부당한데다 몽괘의 아래에 처하여 가르침을 받아야 하는 자이다 . 교육을 하는데 어리석음을 깨우치기 위해 때로는 체벌 ( 體罰 ) 등의 형벌을 사용하여야 하지만 , 덕 ( 德 ) 의 교화가 없이 형벌로만 하면 교육의 도가 인색하게 된다 . ‘ 질 ’ ( 桎 ) 은 족쇄이고 , ‘ 곡 ’ ( 梏 ) 은 수갑이다 . 사회를 유지함에 있어서도 질서유지와 안전을 위해서는 형벌을 써야 하지만 , 형벌만 고집하게 되면 오히려 올바른 사회정의를 구현할 수 없다 . 象曰 利用刑人은 以正法也라. 상왈 이용형인   이정법야 상전에 말하였다. “사람에게 형벌을 씀이 이로운 것은 그렇게 하여 법을 바르게 하는 것이다.” 형벌을 쓰되 질곡을 벗김이 이롭다는 것은 , 그 형벌을 사용하는 것이 몽매함을 일깨워주고 사회질서를 유지하기 위함이니 , 법을 바르게 하는데 목적이 있다 . 초육과 육삼은 구이 양과 가깝고 ,", "이효": "九二는 包蒙이면 吉하고 納婦면 吉하리니 子 克家로다. 구이    포몽      길       납부    길          자 극가 구이는 몽매함을 감싸면 길하고 아내를 얻으면 길할 것이니, 자식이 집을 다스리도다. 包:쌀 포   納:들일 납   婦:아내 부   克:능할 극(이길 극, 다스릴 극 ) 양이 두 번째 구이는 내괘의 중을 지키고 있어 , 중도로써 가르침을 전하는 자리가 된다 . 또한 내호괘가 진 ☳ 장남이니 응하는 관계인 외괘 육오의 아내를 맞이하여 집안을 잘 다스리는 상황이 된다 . 구이 양 ( 陽 ) 은 가르침을 전하는 스승으로 초육 , 구이는 스승으로서의 역할을 하고 상구는 몽매한 자들을 선도해야 하는 자리이다 . 그래서 ‘ 몽매함을 친다 ( 擊蒙 ) ’ 고 했는데 , 이는 상구 양이 몽매한 음들이 교육을 잘 안받고 탈선행위 ( 도적질 ) 를 하는 것을 막는 것이다 . 그러나 상구가 음자리에 양으로 있기 때문에 지나치다 보면 , 오히려 상구 스스로가 도적질을 할 우려가 있기 때문에 ‘ 도적이 됨이 이롭지 않다 ’ 고 하였다 . 象曰 利用禦寇는 上下 順也라. 상왈 이용어구    상하 순야 상전에 말하였다. “도적을 막음이 이로운 것은 위와 아래가 순해서이다.” 몽매한 자가 교육을 잘 받을 수 있게 탈선행위 ( 도적질 ) 를 막는 것이 이롭다고 한 것은 위 ( 외괘 ) 와 아래 ( 내괘 ) 의 모든 음들이 순하기 때문이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 163 ∼ 170 쪽 .", "삼효": "육삼 , 육삼    물용취녀    견금부      불유궁       무유리 육삼은 여자를 취하지 말아야 하니, 돈 있는 사내를 보고 몸을 두지 못하니, 이로울 바가 없다. 勿:말 물   用:써 용(以)   取:취할 취   夫:사내 부   躬:몸 궁   攸:바 유 육삼은 양자리에 음으로 있어 위가 부당하고 중도 얻지 못했으니 , 자기 자신의 분수를 모르고 사사로운 이익을 따라 경망스럽게 처신하는 상태가 된다 . 그래서 육삼 음이 상구 양과 정응 관계에 있으면서도 아래에 있는 구이 양에게 몸을 두게 되니 , 이러한 여자를 아내로 맞이할 수는 없다 . 교육으로 본다면 , 스승과 제자와의 관계는 진실한 뜻이 합해져야 하는데 , 제자가 자기 분수를 모르고 스승을 배반하거나 다른 스승 찾아가기를 번갈아 하게 되면 올바른 교육의 도가 이루어지지 않는다 . 象曰 勿用取女는 行이 不順也라. 상왈 물용취녀    행    불순야 상전에 말하였다. “여자를 취하지 말라는 것은 행실이 순하지 않아서이다.” 육삼과 같은 여자를 취하지 말라는 것은 그 행실이 순하지 못하여 가정도 잘 꾸리지 못하고 올바른 교육도 이루어지지 않기 때문이다 . 六四는 困蒙이니 吝토다.", "사효": "육사 , 육사   곤몽       인 육사는 몽매함에 곤궁하니 인색하도다. 困:곤할 곤 음이 네 번째 육사는 가르침을 받아야 하는 상황이나 홀로 스승에게서 멀어진 상태이다 . 육사는 스승인 구이와 멀리 떨어져 있고 또한 응하는 관계인 초육도 몽매한 음이다 . 그래서 배우고자 하여도 스승을 찾을 수 없는 곤궁한 상태이니 인색하다 . 마치 가정형편이 어려워 정상적인 교육과정을 이수하지 못하고 독학 ( 獨學 ) 하거나 , 참다운 스승을 찾지 못하여 어렵게 공부하는 것과 같다 . 象曰 困蒙之吝은 獨遠實也라. 상왈 곤몽지린    독원실야 상전에 말하였다. “곤몽의 인색한 것은 홀로 실상에서 멀어서이다.” 육사는 홀로 실상 , 즉 스승인 구이 양에서 멀리 떨어져 있기 때문에 곤궁하고 인색한 것이다 . 六五는 童蒙이니 吉하니라.", "오효": "육오의 뭇 음 ( 陰 ) 들을 교육시키는 주체가 된다 . 象曰 子克家는 剛柔 接也라. 상왈 자극가    강유 접야 상전에 말하였다. “자식이 집을 다스리는 것은 강과 유가 만나는 것이다.” 接: 사귈 접 ‘ 집안을 잘 다스린다는 것 ’ 은 구이 강 ( 剛 ) 이 내괘에서 중을 얻었고 육오 유 ( 柔 ) 가 외괘에서 중을 얻어 서로 만나니 , 중도를 지켜 잘 다스린다는 말이다 . 六三은 勿用取女니 見金夫하고 不有躬하니 无攸利하니라. 육오는 구이와 잘 응하고 있으나 , 육오    동몽      길 육오는 아이의 몽매함이니 길하다. 육오는 양 자리에 음으로 있으나 , 외괘의 중을 지키고 있어 천하를 다스릴 수 있는 자리이기도 하다 . 그러나 어린 몽괘의 상황에서는 지도자로서의 역할을 수행할 수 없으니 , 응하고 있는 스승 구이에게 순하게 가르침을 받아야 한다 . 象曰 童蒙之吉은 順以巽也일새라. 상왈 동몽지길    순이손야 상전에 말하였다. “아이의 몽매함이 길한 것은 순하고 공손하기 때문이다.” 順:순할 순   巽:공손할 손 외괘가 간 ☶ 으로 산처럼 후덕한 가운데 , 육오 음이 변하면 외괘가 손 ☴ 으로 되니 겸손하게 중도를 지켜 나가는 상이다 .", "상효": "上九는 擊蒙이니 不利爲寇오 利禦寇하니라. 상구    격몽       불리위구   이어구 상구는 몽매함을 치니, 도적이 됨이 이롭지 않고 도적을 막음이 이롭다. 擊:칠 격   寇:도적 구   禦:막을 어 상구는 몽괘의 마지막 음자리에 양으로 와 있고 중을 얻지 못하여 지나치게 강하게 할 우려가 있다 . 몽괘에서는 상구 양과 구이 양이 유약하고 몽매한 음을 다스리는 역할을 하는데 ,"}}, {"num": 5, "ko": "수천수", "hanja": "水天需", "lines": [1, 1, 1, 0, 1, 0], "url": "https://soosanss.tistory.com/157", "post_id": 157, "gwaui": "밖에 험한 상황이 있으니 안으로 힘을 기르고 여유로운 마음으로 기다리라 ( 飮食宴樂 ).", "gwamyung": "외괘가 감수 ( 坎水 ) ☵ , 내괘가 건천 ( 乾天 ) ☰ 으로 이루어진 괘의 명칭을 ‘ 수 ( 需 ) ’ 라고 한다 . ‘ 수 ( 需 ) ’ 는 음식을 먹으면서 기다린다는 뜻이다 . 천지 기운의 교감으로 만물이 어렵게 나와 어린 상태이니 , ‘ 몽괘 ’ 에서는 정신적인 교육을 받는 것이고 ‘ 수괘 ’ 에서는 음식으로 보양하면서 현실적인 능력을 키우며 때가 되기를 기다린다 . ‘ 수뢰둔 ’ 괘에서 만물이 나오고 창업을 하여 ‘ 산수몽 ’ 괘에서 정신적인 교육을 받고 ‘ 수천수 ’ 괘에서 내괘가 건 ☰ 으로 건실하게 되었지만 , 아직 외괘가 감 ☵ 으로 앞의 상황이 험한 상태이니 때를 기다리는 것이다 .", "seogwa": "｢ 전 ｣ 은 산수몽괘 다음에 수천수괘를 둔 이유를 다음과 같이 설명하고 있다 . 物穉不可不養也라 故로 受之以需하니 需者는 飮食之道也라. 물치불가불양야    고    수지이수      수자    음식지도야 물건이 어리면 가히 기르지 않을 수 없다. 그러므로 수(需)로써 받으니 수(需)는 음식의 도이다. 穉:어릴 치   養:기를 양   飮: 마실 음 물건이 어렵게 나와 어린 상태이므로 길러야 하니 , ‘ 몽괘 ’ 에서는 정신적인 교육을 받고 ‘ 수괘 ’ 에서는 음식으로써 체력을 키우며 때를 기다리는 것이다 .", "gwasa": "需는 有孚하야 光亨코 貞吉하니 利涉大川하니라. 수    유부       광형   정길       이섭대천 ‘수’는 믿음이 있어서, 빛나고 형통하고 바르게 하여 길하니, 큰 내를 건넘이 이롭다. 需:기다릴 수(구할 수)   孚:미쁠 부   涉: 건널 섭 내괘가 건천 ☰ 으로 건실하니 믿음이 있고 또한 빛나고 형통하지만 외괘가 감수 ☵ 로 험하니 바르게 함이 이롭다 . 그러나 큰 내는 반드시 건너가야 하듯이 험한 상황을 극복해야 이롭다 . 특히 수괘의 여섯 효 가운데 양자리에 양으로 와서 제 자리를 얻고 외괘의 중을 지킨 ‘", "danssa": "는 다음과 같이 설명하고 있다 . 단전 彖曰 需는 須也니 險이 在前也니 단왈 수    수야    험    재전야 剛健而不陷하니 其義 不困窮矣라. 강건이불함       기의 불곤궁의 需有孚光亨貞吉은 位乎天位하야 以正中也오 수유부광형정길    위호천위      이정중야 利涉大川은 往有功也라. 이섭대천    왕유공야 단전에 말하였다. “수(需)는 기다림이니 험함이 앞에 있으니, 강하고 굳세어서 빠지지 않으니, 그 뜻이 곤궁하지 않다. ‘수유부광형정길’은 천위(天位)에 자리하여 바르고 가운데 하기 때문이요, ‘이섭대천’은 가서 공이 있는 것이다.” 須:기다릴 수(모름지기 수)   險:험할 험   前:앞 전   陷:빠질 함  矣: 어조사 의 수괘는 기다려야 하는데 그 이유는 외괘 감 ☵ 의 험함이 앞에 있기 때문이다 . 그러나 내괘가 건천 ☰ 으로 강건하고 또한 구오는 외괘 감 ☵ 에 있으나 중정하여 험한 데에 빠지지 않는다 . 이는 천지기운으로 어렵게 나와 ‘ 몽괘 ’ 에서 바른 교육을 받고 ‘ 수괘 ’ 에서 체력과 기운을 강하게 하니 그 뜻이 곤궁하지 않기 때문이다 . 특히 구오는 하늘자리에 거하여 중정하니 , 큰 일을 도모하여 공을 세울 능력이 있는 것이다 .", "gwasangsa": "象曰 雲上於天이 需니 君子 以하야 飮食宴樂하나니라. 상왈 운상어천    수    군자 이      음식연락 상전에 말하였다. “구름이 하늘로 오르는 것이 수(需)니, 군자가 이를 본받아 마시고 먹으며 잔치를 벌여 즐긴다.” 雲:구름 운   上:오를 상   宴:잔치 연   樂:즐길 락 내괘가 건 ( 乾 ) ☰ 이니 하늘이고 , 외괘가 감수 ( 坎水 ) ☵ 이고 외호괘가 이화 ( 離火 ) ☲ 이니 습기가 하늘 위로 오르지만 외호괘 이화 ☲ 의 작용으로 비는 안 오고 구름만 하늘로 오르는 상이다 . 이러한 기운의 양상을 보고 , 군자는 아직 때가 이르지 않았음을 알고 음식으로 잔치벌이면서 굳건하고 중정한 마음으로 때를 기다린다 . 효사 및 효상사", "hyosa": {"초효": "初九는 需于郊라 利用恒이니 无咎리라. 초구    수우교    이용항      무구 초구는 들에서 기다린다. 항상함이 이로우니 허물이 없을 것이다. 郊:들 교(성 밖)   恒: 항상 항 초구는 외괘 감 ☵ 의 험한 곳에서 멀리 떨어져 있으므로 들에서 기다리는 상이다 . 그러나 맨 아래에 있고 중을 얻지 못한 상태에서 양자리에 양으로 와 있어 조동 ( 躁動 ) 할 우려가 있기 때문에 , 항상한 덕을 갖추어야 함을 경계하였다 . 象曰 需于郊는 不犯難行也오 利用恒无咎는 未失常也라. 상왈 수우교    불범난행야    이용항무구    미실상야 상전에 말하였다. “들에서 기다리는 것은 어려움을 범하지 않고 행함이요, 항상함이 이로워서 허물이 없는 것은 떳떳함을 잃지 않는 것이다.” 犯:범할 범   難:어려울 난   常:떳떳할 상 ‘ 들에서 기다리는 것 ’ 은 어려움에 빠지지 않고자 함이고 , ‘ 항상함을 써서 이롭고 허물이 없다 ’ 는 것은 군자로서의 떳떳함을 잃지 않음을 말한다 .", "이효": "九二는 需于沙라. 小有言하나 終吉하리라. 구이    수우사    소유언       종길 구이는 모래밭에서 기다린다. 조금 말이 있으나 마침내 길할 것이다. 沙:모래 사   終: 마침내 종 두 번째 양은 외괘 감수 ( 坎水 ) ☵ 의 험한 데에 비교적 가까워져 모래밭에서 기다리는 상이다 . 그런데 내호괘가 태택 ( 兌澤 ) ☱ 으로 연못이 되고 , 또한 외괘 감 ☵ 에 가까워지니 조심하라는 말을 조금 듣게 된다 . 태 ☱ 는 입 ( 口 ) 이 되고 말하는 것 ( 說 ) 이 되고 작은 것 ( 小 ) 이 되니 , ‘ 소유언 ( 小有言 ) ’ 이라는 뜻이 나온다 . 그러나 구이가 내괘 건 ☰ 체에 중을 지키고 있으니 , 중도로 처신을 잘하면 마침내 길하게 된다 . 象曰 需于沙는 衍으로 在中也니 雖小有言하나 以吉로 終也리라. 상왈 수우사    연       재중야   수소유언       이길    종야 상전에 말하였다. “모래밭에서 기다린다는 것은 너그러움으로 가운데 있는 것이니, 비록 조금 말이 있으나 길함으로 마칠 것이다.” 衍:너그러울 연(넘칠 연)   雖:비록 수 ‘ 모래밭에서 기다린다 ’ 는 것은 구이가 내괘의 중을 지키고 , 음자리에 양으로 있어 너그러움으로 본분을 지키는 것이다 . 그러니 조금 위험하다는 말이 있더라도 처신을 잘하여 길하게 된다 .", "삼효": "九三은 需于泥니 致寇至리라. 구삼    수우니    치구지 구삼은 진흙 밭에서 기다리니, 도적이름을 이룰 것이다. 泥:진흙 니   致:이룰 치(부를 치)   寇:도적 구   至: 이를 지 구삼은 양자리에 양으로 있고 중에서 벗어나 내괘의 극에 있으며 , 아울러 외괘 감 ☵ 의 험한 데에 근접해 있는 상황이다 . 험한 물가에 근접하여 진흙 밭에서 기다리는 상이니 , 위험함을 스스로 초래하게 되어 도적을 부르는 격이다 . 象曰 需于泥는 災在外也라 自我致寇하니 敬愼이면 不敗也리라. 상왈 수우니    재재외야    자아치구       경신      불패야 상전에 말하였다. “진흙 밭에서 기다리는 것은 재앙이 밖에 있는 것이다. 나로 말미암아 도적을 이르게 하니, 공경하고 삼가면 패하지 않을 것이다.” 災:재앙 재   外:바깥 외   自:부터 자   敬:공경할 경   愼:삼갈 신   敗:패할 패 구삼이 외괘 감수 ☵ 의 험한 데에 근접해 있으니 재앙에 가까운 상황이다 . 이는 양자리에 양으로 있어 강하기만 하고 중도를 잃고 지나치게 행하다가 위험을 초래한 격이다 . 그러나 내괘의 양강한 건 ☰ 에 있고 , 구삼이 동하면 음으로 바뀌면서 외호괘가 간 ☶ 으로 되니 그쳐서 삼가고 공경하면 실패함이 없을 것이다 . 六四는 需于血이니 出自穴이로다.", "사효": "육사    수우혈       출자혈 육사는 피에서 기다리니, 구멍으로부터 나오도다. 血:피 혈   穴:구멍 혈 육사는 음자리에 음으로 있고 외괘 감 ☵ 의 험함에 빠진 상태이다 . 외괘 감수 ☵ 에서 음자리에 있으니 ‘ 피 ( 血 ) ’ 라 한 것이고 , 내호괘가 태 ☱ 이니 구멍의 상이 나온다 . 이는 험한 데에 빠짐을 말한다 . 그러나 외호괘가 이화 ☲ 로 밝게 판단할 수 있으니 , 험한 구멍으로부터 나올 수 있다 . 象曰 需于血은 順以聽也라. 상왈 수우혈    순이청야 상전에 말하였다. “피에서 기다리는 것은 순하게 들어서이다.” 聽:들을 청 육사가 험한 데에 빠져 있다가 벗어날 수 있는 것은 음자리에 음으로 있어 순하고 외호괘 이화 ☲ 의 밝음으로 주변의 말을 잘 들어 판단을 잘하기 때문이다 .", "오효": "구오 ’ 는 비록 험한 감 ☵ 의 가운데에 있으나 , 중정하기 때문에 믿음을 두고 빛나고 형통하고 바르게 해서 큰 일을 할 수 있는 주효 ( 主爻 ) 가 된다 . 九五는 需于酒食이니 貞코 吉하니라. 구오    수우주식       정   길 구오는 술과 음식에서 기다리니 바르고 길하다. 酒:술 주 구오는 양자리에 양으로 있어 외괘의 중을 지키니 중정 ( 中正 ) 한 상태이다 . 그래서 정작 외괘 감수 ☵ 의 험한 가운데 있음에도 , 중정한 마음으로 슬기롭게 때를 기다리는 것이다 . 외괘가 감수 ☵ 이니 술과 음식의 상이 나온다 . 군자의 심법 ( 心法 ) 은 어려운 가운데 있으면서도 조급하게 하지 않고 , 중정한 덕으로 때를 판단하여 술과 음식으로 잔치벌이는 여유로움으로 낙천지명 ( 樂天知命 ) 하면서 기다린다 . 그래서 괘사에 표현되어 있듯이 때가 되면 큰 내를 건너는 공을 세울 수 있다 . 象曰 酒食貞吉은 以中正也라. 상왈 주식정길    이중정야 상전에 말하였다. “술과 음식에서 기다려 바르고 길한 것은 가운데하고 바르기 때문이다.” 上六은 入于穴이니 有不速之客三人이 來하리니 敬之면 終吉이리라. 상륙    입우혈       유불속지객삼인    래         경지    종길", "상효": "상육은 구멍에 들어가니, 청하지 않은 손님 세 사람이 올 것이니, 공경하면 마침내 길할 것이다. 穴:구멍 혈   速:부를 속(빠를 속)   客:손 객 상육은 음이 음자리에 있어 구멍 ( 穴 ) 이고 , 상육이 변하면 음이 양으로 바뀌면서 외괘가 손 ☴ 이 되니 구멍에 들어가는 상이다 ( 巽 入也 ). 그런데 청하지 않은 손님이 뜻밖에 오게 되니 , 손 ☴ 의 겸손함으로 공경하면 마침내 길하게 된다 . 청하지 않은 손님이라는 것은 내괘의 양 세 효 ☰ 를 말하는데 , 상육이 동하여 외괘가 손 ☴ 이 되면 험한 것이 사라지게 되어 그동안 때를 기다리던 초구 구이 구삼의 세 사람이 오게 되는 것이다 . 象曰 不速之客來敬之終吉은 雖不當位나 未大失也라. 상왈 불속지객래경지종길    수부당위    미대실야 상전에 말하였다. “‘불속지객래경지종길’은 비록 위는 마땅하지 않으나, 크게 잃지는 않는다.” 雖:비록 수   當:마땅할 당   未: 아닐 미 상육은 맨 위에 있고 음자리에 음으로 거하여 유약하니 뜻밖의 손님 ( 내괘의 세 양효 ) 을 맞이할 수 있는 자격이 안 되기 때문에 ‘ 不當位 ’ 라고 하였다 . 그러나 공경함으로 맞이하게 되면 상육 자신의 본분을 크게 잃지 않는다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 171 ∼ 177 쪽 ."}}, {"num": 6, "ko": "천수송", "hanja": "天水訟", "lines": [0, 1, 0, 1, 1, 1], "url": "https://soosanss.tistory.com/158", "post_id": 158, "gwaui": "상황이 어긋나 분쟁의 기미가 있을 때 전체의 정세를 잘 판단하고 일을 도모하라 ( 作事謀始 ).", "gwamyung": "외괘가 건천 ( 乾天 ) ☰ , 내괘가 감수 ( 坎水 ) ☵ 로 이루어진 괘의 명칭을 ‘ 송 ( 訟 ) ’ 이라 한다 . 다투는 것이다 . 전쟁을 의미하기도 하고 사회생활에서 빚어지는 경쟁의 상황이다 . 천지부모로부터 어렵게 나와 몽매함을 깨우치고 음식으로 체력을 강하게 하면서 기다리던 상황에서 , ‘ 수괘 ( 需卦 ) ’", "seogwa": "｢ 전 ｣ 은 수천수괘 다음에 천수송괘가 온 이유를 다음과 같이 설명하고 있다 . 飮食必有訟이라 故로 受之以訟하고 음식필유송       고    수지이송 음식에는 반드시 송사가 있다. 그러므로 송괘로 받고 천하의 모든 다툼은 음식에서 나오는 것이라 할 수 있다 . 인간이 벌이고 있는 모든 분쟁은 그 명분이 무엇이든 간에 결국 먹고 살기위해 벌이는 것이다 . 음식이란 단지 먹는 것에 한정되는 것이 아니라 , 천연자원 ․ 식량 ․ 식수 ․ 무기 등 생존을 위해 필요한 모든 기본적인 것을 말한다 .", "gwasa": "訟은 有孚나 窒하야 惕하니 中은 吉코 終은 凶하니 송    유부    질      척       중    길    종    흉 利見大人이오 不利涉大川하니라. 이견대인       불리섭대천 송(訟)은 믿음을 두나 막혀서 두려우니, 가운데 함은 길하고 마침까지 하면 흉하니, 대인을 봄이 이롭고, 큰 내를 건넘이 이롭지 않다. 訟:송사할 송   窒:막을 질   惕:두려워할 척   涉: 건널 섭 송사라는 것은 이길 수 있다는 믿음에서 하게 된다 . 특히 내괘의 구이는 양으로 중을 지키고 있고 초효와 삼효의 음에 비해 강함을 믿기 때문에 외괘에서 중정한 구오와 대적하게 된다 . 그러나 내괘 자체가 감수 ☵ 로 험하니 막혀서 두려운 상이다 . 때문에 송사를 하려고 마음먹었다가 중도에 그만 두면 길하지만 , 끝까지 진행하게 되면 결국 흉하게 된다 . 그러니 송사 문제가 있을 때 그 문제를 해결해 줄 수 있는 대인을 만나 조언을 구하는 것이 이롭다 . 송사가 있는 상황에서 큰 일을 도모할 수는 없을 것이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 訟은 上剛下險하야 險而健이 訟이라.
