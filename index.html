  悔:뉘우칠 회   遲:늦을 지·더딜 지 육삼은 양 자리에 음으로 있고 ( 位不當 ) 중에서 벗어나 있다 . 자기 분수를 지키지 못하고 바로 위에 있는 구사 양 ( 陽 ) 에게 잘 보이려고 쳐다본다 . 그러나 구사는 모든 음 ( 陰 ) 에게 공평하게 대하니 , 육삼이 아무리 쳐다보아도 마음을 주지 않는다 . 질질 끌어도 마찬가지이니 , 결국 뉘우침만 있을 뿐이다 . 象曰 盱豫有悔는 位不當也일새라. 상왈 우예유회    위부당야 상전에 말하였다. “쳐다보며 즐거워하여 뉘우침이 있는 것은 위가 당치 않기 때문이다.” 육삼이 아래에서 자꾸 쳐다봐도 얽매이지 않으면서 전체를 조화롭게 하니 크게 얻는다 . 자기가 하는 일에 의심하지 말고 공정하게 해 나가면 , 결국 다섯 음이 구사에게 뜻을 합하게 된다 . 象曰 由豫大有得은 志大行也라. 상왈 유예대유득    지대행야 상전에 말하였다. “말미암아 즐거워하여 크게 얻음이 있음은 뜻이 크게 행해지는 것이다.” 六五는 貞호대 疾하나 恒不死로다.", "사효": "육사효사를 음미해 볼 필요가 있다 . 六四는 括囊이면 无咎며 无譽리라. 육사는 주머니를 매면 허물이 없으며 명예도 없을 것이다. 九四 ) 강이 초육 백성과 잘 응하여 그 뜻이 행해지고 , 괘덕 ( 卦德 ) 으로 보면 내괘의 곤 ☷ 으로 순하고 외괘 진 ☳ 으로 움직여 나가고 있다 . 예괘 ( 豫卦 ) 는 순하게 움직여 나가는 것이 핵심이다 . 우주천지도 순하게 움직여 나가는데 , 하물며 제후를 세우고 군사를 행함에 있어서는 더 말할 나위가 없다 . 천지가 순하게 움직이니 해와 달이 그 운행궤도를 잘 지켜 어긋나지 않고 , 이에 따라 춘하추동 ( 春夏秋冬 ) 사시의 변화도 어긋나지 않는다 . 이러한 법도를 본받아 성인도 순하게 움직이는데 , 가장 중요한 사회의 징표는 형벌 ( 刑罰 ) 이다 . 성인이 순하게 사회를 이끌어 가니 형벌집행도 공명정대 ( 公明正大 ) 하게 이루어져서 백성이 이에 복종한다 . 그러니 예 ( 豫 ) 의 때 ( 상황 ) 와 그 뜻이 크다 . 九四 ) 와 홀로 응하고 있다 . 뇌지예 ( 雷地豫 ) 九四는 由豫라 大有得이니 勿疑면 朋이 盍簪하리라. 구사    유예    대유득      물의    붕    합잠 구사는 말미암아 즐거워한다. 크게 얻음이 있으니, 의심치 말면 벗이 비녀를 합할 것이다. 由:말미암을 유   疑:의심할 의   朋:벗 붕   盍:합할 합   簪:비녀 잠·빠를 잠 구사는 음자리에 양으로 있으나 , 구사 대신이 공정하게 일을 처리해 나가니 육오 인군의 자리가 위협받지는 않는다 . 象曰 六五貞疾은 乘剛也오 恒不死는 中未亡也라. 상왈 육오정질    승강야    항불사    중미망야 상전에 말하였다. “육오가 바르게 하나 병이 있는 것은 강을 타서이고, 항구히 죽지 않는 것은 중이 없어지지 않는 것이다.”", "오효": "육오 유약한 인군의 신하로서 전체를 조화롭게 이끄는 대신이다 . 예악의 각 요소를 조율하고 , 또한 사회의 각 구성원을 조화롭게 하는 자리이기 때문에 즐거움의 원인이 된다 . 육오    정       질      항불사 육오는 바르게 하되 병 들으나 항구히 죽지 않도다. 疾:병 질   恒: 항상 항 육오는 외괘의 중을 얻어 국가사회를 다스리는 인군이다 . 그런데 양 자리에 음으로 있어 유약한데다 아래의 구사 대신이 실질적으로 모든 일을 주도해 나가니 , 육오 인군이 바르게 하려고 해도 구사 때문에 신경을 쓰게 된다 . 그래서 마음의 병이 생기지만 , 육오 왕이 바르게 해도 병이 있는 것은 구사의 강한 대신이 아래에 있어 전체를 주도해 나가기 때문이다 . 그러나 중을 얻어 왕위에 있는 육오가 자리를 잃게 되지는 않는다 . 上六은 冥豫니 成하나 有渝면 无咎리라. 상륙    명예    성      유유    무구", "상효": "상육은 즐거움에 어두워지니, 이루나, 변함이 있으면 허물이 없을 것이다. 冥:어두울 명   渝:변할 유(투) 상육은 즐거운 예괘의 끝에 처해 있다 . 극에 처해 즐거운 데에만 빠져서 어두워지니 , 객관적인 상황을 제대로 파악하지 못한다 . 즐거워하는 그 자체는 이루게 되지만 , 즐거움에만 계속 빠지게 되면 안 좋게 된다 . 그래서 변하면 허물이 없다고 했다 . 象曰 冥豫在上이어니 何可長也리오. 상왈 명예재상         하가장야 상전에 말하였다. “즐거움에 어두워져 위에 있으니, 어찌 가히 오래가겠는가?” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 257 ∼264 쪽 ."}}, {"num": 17, "ko": "택뢰수", "hanja": "澤雷隨", "lines": [1, 0, 0, 1, 1, 0], "url": "https://soosanss.tistory.com/169", "post_id": 169, "gwaui": "즐거운 마음으로 목표달성을 위해 열심히 일한 뒤에는 그동안의 과정을 돌이키면서 편안한 휴식을 취하라 ( 嚮晦宴息 ).", "gwamyung": "외괘가 태택 ( 兌澤 ) ☱ , 내괘가 진뢰 ( 震雷 ) ☳ 로 이루어진 괘의 명칭을 ‘ 수 ( 隨 ) ’ 라고 한다 . ‘ 수 ( 隨 ) ’ 는 따르는 것이다 . 모두가 한 마음으로 구오 왕을 중심으로 따른다 . 연못 속에 진동이 일어나면 물결이 일면서 사방에 퍼지듯이 , 모두가 지도자의 뜻에 따른다 . 내괘가 진 ☳ 이니 온 종일 일을 하다가 , 외괘가 태 ☱ 니 저녁에 잔치를 벌이며 위로하는 상이기도 하다 .", "seogwa": "｢ 전 ｣ 은 뇌지예괘 다음에 택뢰수괘를 둔 이유를 다음과 같이 설명하고 있다 . 豫必有隨라 故로 受之以隨하고 예필유수    고    수지이수 즐거움에는 반드시 따름이 있다. 그러므로 수괘로 받고 모두가 즐겁게 화합을 이루면 한 마음으로 따르게 된다 . 그래서 즐겁다는 예괘 ( 豫卦 ) 다음에 따른다는 수괘 ( 隨卦 ) 를 두었다 .", "gwasa": "隨는 元亨하니 利貞이라 无咎리라. 수    원형      이정       무구 수(隨)는 크게 형통하니 바름이 이롭다. 허물이 없을 것이다. 隨: 따를 수 위에서 태택 ☱ 으로 기뻐하고 아래에서는 진뢰 ☳ 로 움직이니 크게 형통하다 . 그렇지만 움직이며 기뻐하는 상이기에 항상 바르게 함이 이롭다 . 후천팔괘방위로 보면 내괘가 동방 진 ☳ 이니 봄에 양 ( 陽 ) 의 생기로 만물이 화생하여 원형 ( 元 亨 ) 의 덕을 이루고 , 외괘가 서방 태 ☱ 이니 가을에 음 ( 陰 ) 의 기운으로 이정 ( 利貞 ) 의 덕을 이룬다 . 모두가 기뻐하면서 따르니 허물이 없다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 隨는 剛來而下柔하고 動而說이 隨니 大亨코 貞하야 단왈 수    강래이하유      동이열    수    대형    정 无咎하야 而天下 隨時하나니 隨之時義 大矣哉라. 무구       이천하 수시         수지시의 대의재 단전에 말하였다. “수(隨)는 강(剛)이 와서 유(柔)에 아래하고, 움직이고 기뻐함이 수(隨)니, 크게 형통하고 바르게 해서 허물이 없어서 천하가 때를 따르니, 수(隨)의 때와 뜻이 크도다.” 說: 기쁠 열 수괘 ( 隨卦 ) 는 음효 ( 陰爻 ) 가 셋 , 양효 ( 陽爻 ) 가 셋으로 삼음삼양 ( 三陰三陽 ) 괘이다 . 삼음삼양괘의 체 ( 體 ) 는 지천태 ( 地天泰 ) 괘와 천지비 ( 天地否 ) 괘에 있다 . 수괘는 천지기운이 막혀 있는 천지비괘의 상구 양 ( 강 ) 과 초육 음이 자리를 바꾸어 택뢰수괘가 된 것이다 . 즉 천지비괘의 상구 양 ( 강 ) 이 내괘로 와서 육이와 육삼의 음유 ( 陰柔 ) 아래에 있게 되니 , 괘체가 내괘 진 ☳ 으로 움직이면서 외괘 태 ☱ 로 기뻐하는 상이 된다 . 그래서 크게 형통하고 바르게 해서 허물이 없고 , 천하가 그 때를 따르게 되니 , 따르는 때와 뜻이 크다 . 천지비괘와 같이 천지기운이 통하지 못하여 위아래가 막혀 있는 상황을 타개하는 방법 중의 하나는 맨 위에 처하고 있는 상구가 맨 아래로 내려가 아래 백성을 고무 ( 鼓舞 ) 시키고 진작 ( 振作 ) 시키는 것이다 . 마치 기업의 회장이 일반 사원보다 아래에 처하여 사원들을 격려하고 위로하면 , 사원들이 기뻐하면서 사장을 따라 회사를 위해 일을 잘 수행할 수 있는 것과 같다 .", "gwasangsa": "象曰 澤中有雷 隨니 君子 以하야 嚮晦入宴息하나니라. 상왈 택중유뢰 수    군자 이       향회입연식 상전에 말하였다. “연못 가운데 우레가 있는 것이 수(隨)니, 군자가 이를 본받아 그믐을 향하여 들어가서 잔치하고 쉰다.” 嚮:향할 향   晦:그믐 회   宴:잔치 연   息:쉴 식 연못 가운데 우레가 있어 발동하니 , 모두가 그 물결에 따라 움직인다 . 군자는 이러한 상을 보고 내괘 진 ☳ 으로 아침부터 열심히 일하여 외괘 태 ☱ 의 저녁이 되기 전 내호괘 간 ☶ 으로 일을 마치고 , 외호괘 손 ☴ 으로 집 ( 휴식 공간 ) 에 들어가 외괘 태 ☱ 로 저녁에 즐겁게 잔치하며 쉰다 . 효사 및 효상사", "hyosa": {"초효": "初九는 官有渝니 貞이면 吉하니 出門交면 有功하리라. 초구    관유유    정      길       출문교    유공 초구는 관직에 변함이 있으니, 바르게 하면 길하니, 문을 나가 사귀면 공이 있을 것이다. 官:벼슬 관   渝:변할 유(투)   功: 공로 공 초구는 양자리에 양으로 있어 자리가 바르다 . 모두가 즐겁게 움직여 따르는 택뢰수 ( 澤雷隨 ) 괘에서 맨 아래에서 움직이는 초구는 상황에 따라 관직에 변함이 있다 . 왜냐하면 내괘가 진 ☳ 이니 움직여 변하는 것이다 . 그러나 바르게 해야 길하니 , 문 밖에 나가서 적극적으로 사귀면 공이 있다 . 바로 앞에서 살펴 본 뇌지예 ( 雷地豫 ) 괘 상육효에서 ‘ 변함이 있으면 허물이 없다 ( 有渝 无咎 ) ’ 고 했다 . 내호괘가 간 ☶ 이니 문 ( 門 ) 의 형상이고 내괘가 진 ☳ 이니 움직여 문밖을 나서는 상이다 . 象曰 官有渝에 從正이면 吉也니 出門交有功은 不失也라. 상왈 관유유    종정       길야    출문교유공   불실야 상전에 말하였다. “관직에 변함이 있음에 바름을 좇으면 길하니, 문을 나가 사귀어 공이 있음은 잃지 않는 것이다.” 從:좇을 종   失: 잃을 실 관직에 변함이 있을 때에는 바른 것을 좇아야 길하다 . 문 밖을 나가서 사귀어 공이 있다는 것은 자기 자신의 본분을 잃지 않는 것이다 . 六二는 係小子면 失丈夫하리라.", "이효": "육이    계소자    실장부 육이는 소자에게 매이면 장부를 잃을 것이다. 係:맬 계·매일 계   丈: 어른 장 육이는 내괘에서 음자리에 음으로 있어 바르고 중에 있으며 ( 中正 ), 외괘 구오 인군과 정응 ( 正應 ) 하고 있다 . 그런데 아래에 있는 초구 양 ( 陽 ) 때문에 혹 마음이 흔들릴 우려가 있다 . 만일 육이가 초구의 소자 ( 小子 ) 에게 매이면 정응하고 있는 구오 인군을 떠나게 되어 , 육이는 초구에게 흔들리지 말고 구오 인군의 뜻에 따라야 한다 . 象曰 係小子면(는) 弗兼與也라. 상왈 계소자         불겸여야 상전에 말하였다. “소자에게 매이면 아울러 (구오와) 더불지 못한다.” 육이가 초구에게 매이게 되면 , 정작 정응관계에 있는 구오와 더불어 함께하지 못한다 . 주자의 ｢ 본의 ｣ 에는 “ 象曰 係小子 는 弗兼與也 라 ” 로 되어 있으나 , 원문에는 “ 象曰 係小子 면 弗兼與也 라 ” 로 되어 있다 . 六三은 係丈夫하고 失小子하니 隨에 有求를 得하나 利居貞하니라.", "삼효": "육삼    계장부      실소자       수    유구    득       이거정 육삼은 장부(丈夫)에게 매이고 소자(小子)를 잃으니, 따름에 구함이 있음을 얻으나, 바른 데에 거함이 이롭다. 택뢰수괘에서는 지도자의 역할을 하는 구오 인군을 중심으로 모두가 구오의 뜻에 따르고 있다 . 육삼은 중에서 벗어나 있고 ( 不中 ) 양자리에 음으로 있으니 ( 失位 ), 사실 위태로운 자리이다 . 응하는 관계인 상육 역시 음 ( 陰 ) 이니 , 육삼은 자신이 따라야 할 주체를 찾지 못해 어려운 상황에 처할 수도 있다 . 그렇지만 내괘의 초구 소자 ( 小子 ) 에 매이지 않고 외괘의 구사 장부 ( 丈夫 ) 에게 매여 따르니 , 구하는 바를 얻을 수 있다 . 다만 위가 마땅하지 않고 중을 얻지 못했으니 , 바른 데에 거함이 이롭다 . 象曰 係丈夫는 志舍下也라. 상왈 계장부    지사하야 상전에 말하였다. “장부에게 매임은 뜻이 아래를 버리는 것이다.” 舍:버릴 사·집 사 육삼의 뜻은 아래 초구에 매이지 않고 ,", "사효": "구사 장부를 따르는 것이다 . 九四는 隨에 有獲이면 貞이라도 凶하니 有孚코 在道코 以明이면 何咎리오. 구사    수   유획       정          흉       유부   재도    이명       하구 구사는 따름에 얻음이 있으면 바르더라도 흉하니, 믿음을 두고 도에 있고 밝음으로 하면 무슨 허물이 있겠는가? 獲:얻을 획   何: 어찌 하 구사는 대신 자리에 있다 . 내괘의 백성들은 구오 인군을 직접 받들 수 없고 구오 인군의 명을 받은 구사 대신을 따르게 된다 . 이러한 상황에서 구사가 대신 ( 大臣 ) 으로서 나라 일을 하면서 만일 얻는 것이 있다면 , 설사 바르더라도 흉하다 . 나라 일을 하는 대신은 공명정대 ( 公明正大 ) 하고 청렴결백 ( 淸廉潔白 ) 해야 하기 때문에 , 구사는 더욱 조심해야 한다 . 만일 구오 인군에게 믿음을 두고 도로써 처신하고 밝게 집행하면 무슨 허물이 있겠는가 ? 象曰 隨有獲은 其義 凶也오 有孚在道는 明功也라. 상왈 수유획    기의 흉야    유부재도   명공야 상전에 말하였다. “따름에 얻는 것이 있음은 그 뜻이 흉한 것이고, 믿음을 두고 도에 있음은 공을 밝게 하는 것이다.” 만일 구사가 나라 일을 하면서 얻는 것이 있다면 , 이는 구사의 뜻이 흉한 마음을 품었기 때문이다 . 믿음을 두고 도가 있고 밝게 하면 대신으로서의 공을 밝게 하는 것이다 .", "오효": "구오 인군과 더불어 사회를 이끌어 갈 수가 없다 . 九五는 孚于嘉니 吉하니라. 구오    부우가    길 구오는 아름다운 데에 미더우니 길하다. 嘉:아름다울 가 구오는 외괘의 중에 있어 나라를 다스리는 인군이다 . 중정하게 자리를 지키고 정치를 잘 하니 마치 저녁에 황혼을 보듯이 아름답게 하는 것이고 , 백성이 구오 인군을 믿고 따르니 길하다 . 象曰 孚于嘉吉은 位正中也일새라. 상왈 부우가길    위정중야 상전에 말하였다. “아름다운 데에 미더워 길한 것은 자리가 바르고 가운데하기 때문이다.” 上六은 拘係之오 乃從維之니 王用亨于西山이로다. 상륙    구계지    내종유지    왕용형우서산", "상효": "상육은 잡아서 매고 이에 좇아 얽으니, 왕이 서산에서 형통하도다. 拘:잡을 구·취할 구   維:벼리 유·맬 유·얽을 유 택뢰수괘의 맨 위에 처하여 자리는 높으나 , 모두가 구오 인군을 따르니 어느 누구도 상육을 따라주지 않는 상황이다 . 그래서 억지로 잡아서 매고 따르라 하고 따르지 않는 자를 좇아가 얽으며 자기를 따르라고 한다 . 이것은 마치 이미 백성의 신망을 잃은 왕이 해가 저물어 가는 서산에서 왕 자신의 영광스런 옛날을 그리워하는 것과도 같다 . 象曰 拘係之는 上窮也라. 상왈 구계지    상궁야 상전에 말하였다. “잡아서 매는 것은 위에서 궁한 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 265 ∼271 쪽 ."}}, {"num": 18, "ko": "산풍고", "hanja": "山風蠱", "lines": [0, 1, 1, 0, 0, 1], "url": "https://soosanss.tistory.com/170", "post_id": 170, "gwaui": "집안에서나 사회에서나 모든 일은 앞서 행한 사람 ( 조상 ․ 선배 ․ 선임자 ) 들의 일이 이어지고 있는 것이니 , 백성을 진작시키고 덕을 길러 일의 마침과 비롯함을 신중하게 하라 ( 振民育德 ).", "gwamyung": "외괘가 간산 ( 艮山 ) ☶ , 내괘가 손풍 ( 巽風 ) ☴ 으로 이루어진 괘를 ‘ 고 ( 蠱 ) ’ 라고 한다 . 산 아래에 바람이 불어오니 일이 생긴 것이다 . 일은 항상 시작할 때와 마칠 때가 중요하다 . 마치는 것은 선대 ( 先代 ) 의 일이요 , 시작하는 것은 당대 ( 當代 ) 의 일이다 . 당대의 일을 시작함에 선대의 일을 이어받아 마무리를 잘 하는 것이 중요하다 . 역사는 선대 ( 先代 ) 로부터 면면하게 이어져 내려오는 것이다 . 자손 대대로 이어지는 집안의 일도 마찬가지이다 .", "seogwa": "｢ 전 ｣ 은 택뢰수괘 다음에 산풍고괘가 온 이유를 다음과 같이 설명하고 있다 . 以喜隨人者 必有事라 故로 受之以蠱하고 이희수인자 필유사    고    수지이고 기쁨으로써 사람을 따르는 자는 반드시 일이 있다. 그러므로 고괘로 받고", "gwasa": "蠱는 元亨하니 利涉大川이니 先甲三日하며 後甲三日이니라. 고    원형       이섭대천      선갑삼일       후갑삼일 고(蠱)는 크게 형통하니, 큰 내를 건넘이 이로우니, 갑(甲)으로 먼저 삼일을 하며 갑(甲)으로 뒤에 삼일을 한다. 蠱:곡식벌레 고·의심할 고·미혹할 고·일 고   涉:걸어서 건널 섭   甲: 첫째 천간 갑 고 ( 蠱 ) 는 선대의 일을 이어서 하는 것이기에 크게 형통하다 . 큰일을 하는 것이 이로운데 , 일을 시작함에 있어서는 그 전후 ( 前後 ) 를 잘 살펴야 한다 . 갑 ( 甲 ) 이라는 것은 일이 시작되는 시점을 말한다 . 어떤 일이 시작된다는 것은 그 전의 일이 마무리된다는 것을 의미한다 . ‘ 先甲三日 ’ 은 그 전의 일을 잘 마무리하는 것이고 , ‘ 後甲三日 ’ 은 일을 새로 시작할 때의 조심스러운 기간을 말한다 . 《 주역 》 은 음양 ( 陰 陽 ) 기운의 양상으로 자연변화의 원리를 나타내고 있고 , 또한 음양기운의 변화양상은 세상사의 현실적인 변화에도 부합되고 있다 . 세상사의 변화 절도 ( 節度 ) 는 책력 ( 冊曆 ) 으로 나타나고 , 모든 일은 그 책력에 기준하여 비롯함을 정하고 있다 . 우리 동양권에서 책력을 표기하는 기준은 간지 ( 干支 ), 즉 60 갑자였다 . 천간 ( 天干 ) 을 기준으로 할 때 갑 ( 甲 ) 은 일의 시작을 의미한다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 蠱는 剛上而柔下하고 巽而止 蠱라. 단왈 고    강상이유하       손이지 고 蠱 元亨하야 而天下 治也오 利涉大川은 往有事也오 고 원형       이천하 치야   이섭대천    왕유사야 先甲三日後甲三日은 終則有始 天行也라. 선갑삼일후갑삼일    종즉유시 천행야 단전에 말하였다. “고(蠱)는 강(剛)이 위에 하고 유(柔)가 아래하고, 겸손해서 그침이 고(蠱)이다. 고(蠱)가 크게 형통해서 천하가 다스려지고, ‘큰 내를 건넘이 이롭다’는 것은 가서 일이 있는 것이고, ‘갑으로 먼저 삼일을 하고 갑으로 뒤에 삼일을 한다’는 것은 마치면 곧 비롯함이 있음이 하늘의 행함이다.” 巽:겸손할 손   治:다스릴 치   終:마칠 종   始:비롯할 시 택뢰수 ( 澤雷隨 ) 괘와 마찬가지로 산풍고 ( 山風蠱 ) 괘 역시 삼음삼양 ( 三陰三陽 ) 괘이다 . 택뢰수괘는 천지비괘에 그 체를 두고 있지만 , 산풍고괘는 지천태 ( 地 天 泰 ) 괘에 체를 두고 있다 . 지천태괘에서 초구의 양강 ( 陽剛 ) 이 위로 올라가고 상육의 음유 ( 陰柔 ) 가 아래로 내려오니 태평한 세상에 일이 생겼고 , 괘덕으로 보면 내괘 손 ☴ 으로 겸손하고 외괘 간 ☶ 으로 그치는 것이 고 ( 蠱 ) 이다 . 태평한 세상에서는 크게 형통해서 , 천하의 일을 잘 다스려야 한다 . ‘ 큰 내를 건넘이 이롭다 ’ 는 것은 가서 해야 할 큰 일이 있다는 것이고 , ‘ 先甲三日後甲三日 ’ 은 천도의 운행이 마치 지구가 태양 주위를 끊임없이 공전하면서 춘하추동 사시의 변화를 일으키고 , 지구가 자전하면서 낮과 밤의 교차가 끊임없이 일어나듯이 , 마치면 곧 비롯함이 있는 것이다 . 인생사의 모든 일이 다 마찬가지이다 .", "gwasangsa": "象曰 山下有風이 蠱니 君子 以하야 振民하며 育德하나니라. 상왈 산하유풍    고    군자 이      진민       육덕 상전에 말하였다. “산 아래에 바람이 있는 것이 고(蠱)니, 군자가 이를 본받아 백성을 진작시키며 덕을 기른다.” 風:바람 풍   振:떨칠 진   育: 기를 육 고괘 ( 蠱卦 ) 는 산 아래에 바람이 부는 상이다 . 이러한 상을 보고 군자는 내괘 손풍 ( 巽風 ) ☴ 으로 백성을 고무진작 ( 鼓舞振作 ) 시키고 외괘 간산 ( 艮山 ) ☶ 으로 덕을 기른다 . 일을 해 나가는 것은 홀로 하는 것이 아니다 . 자기를 따르는 백성 ( 무리 ) 들을 흥기시켜 일을 바르게 할 수 있도록 해야 하며 , 또한 덕을 길러야 모든 일의 결과가 좋게 된다 . 효사 및 효상사 初六은 幹父之蠱니 有子면 考 无咎하리니 厲하야아 終吉이리라. 초륙    간부지고   유자     고 무구         려          종길", "hyosa": {"초효": "초육은 아버지의 일을 주장하니, 자식이 있으면 죽은 아버지가 허물이 없을 것이니, 위태롭게 여겨야 마침내 길할 것이다. 幹:줄기 간·주장할 간   考:죽은 아비 고   厲: 위태할 려 초육은 양 자리에 음이 있고 응하는 육사도 같은 음이니 , 사실 자식이 없는 상이다 . 선대 아버지의 일을 맡아 일을 해야 하는데 , 만일 자식이 있으면 아버지의 일을 잘 처리해 줄 수 있기 때문에 , 죽은 아버지가 허물이 없게 된다 . 그러나 위가 부당하고 중도 얻지 못한 상황이니 , 위태롭게 여기고 조심스럽게 해야 마침내 길하게 된다 . ‘ 고 ( 考 ) ’ 는 죽은 아버지를 의미한다 . 《 예기 ( 禮記 )》 ｢ 곡례 ( 曲禮 ) 下 第二 ｣ 에 다음의 글이 있다 . 천자가 죽음을 붕(崩)이라 하고, 제후가 죽음을 훙(薨)이라 하고, 대부가 죽음을 졸(卒)이라 하고, 사(士)가 죽음을 불록(不祿)이라 하고, 서인이 죽음을 사(死)라고 한다. 사람이 죽어 상에 있을 때는 시(尸)라 하고, 관에 있을 때는 구(柩)라고 한다. 날짐승이 죽음을 강(降)이라 하고, 들짐승이 죽음을 지(漬)라 하고, 도적이 죽음을 병(兵)이라 한다. 제사를 지냄에 왕의 아버지를 황조고(皇祖考)라 하고, 왕의 어머니를 황조비(皇祖妣)라 하고, 아버지를 황고(皇考)라 하고, 어머니를 황비(皇妣)라 하고, 남편을 황벽(皇辟)이라 한다. 살아서는 부(父)라 하고, 모(母)라 하고, 처(妻)라 하며, 죽어서는 고(考)라 하고, 비(妣)라 하고, 빈(嬪)이라 한다. 오래 살다 죽음을 졸(卒)이라 하고, 단명함을 불록(不祿)이라 한다. (天子死曰崩이요 諸侯曰薨이요 大夫曰卒이요 士曰不祿이요 庶人曰死라 하니라. 在牀曰尸요 在棺曰柩라 하니라. 羽鳥曰降이요 四足曰漬이요 死寇曰兵이라 하니라. 祭에 王父曰皇祖考요 王母曰皇祖妣요 父曰皇考요 母曰皇妣요 夫曰皇辟이라 하니라. 生曰父요 曰母요 曰妻라 하며 死曰考요 曰妣요 曰嬪이라 하니라. 壽考曰卒이요 短折曰不祿이라 하니라.) 象曰 幹父之蠱는 意承考也라. 상왈 간부지고    의승고야 상전에 말하였다. “아버지의 일을 주장함은 뜻이 죽은 아버지를 잇는 것이다.” 意:뜻 의   承: 이을 승", "이효": "九二는 幹母之蠱니 不可貞이니라. 구이    간모지고    불가정 구이는 어머니의 일을 주장하니, 가히 곧게 하지만은 못한다. 구이는 음 자리에 양으로 있지만 , 내괘에서 중도를 얻은 자리이다 . 구이가 음 자리에 있고 응하는 자리도 육오로 음 ( 陰 ) 이니 , 어머니의 일을 맡아 주장한다고 하였다 . 아버지의 일이나 어머니의 일이나 모두 선대 ( 先 代 ) 의 일이다 . 그런데 어머니의 일을 맡아 주장함에 있어서는 고집스럽게 해서는 안 된다고 하였다 . 선대의 일이 후대로 내려온 것이지만 , 선대 ( 先 代 ) 때와 후대 ( 後代 ) 때는 상황이 변해 있다 . 중도 ( 中道 ) 로 그 상황을 잘 파악하여 융통성 있게 해결하라는 의미이다 . 象曰 幹母之蠱는 得中道也라. 상왈 간모지고    득중도야 상전에 말하였다. “어머니의 일을 주장함은 중도를 얻었기 때문이다.”", "삼효": "九三은 幹父之蠱니 小有悔나 无大咎리라. 구삼    간부지고    소유회    무대구 구삼은 아버지의 일을 주장하니, 조금 후회가 있으나 크게 허물은 없을 것이다. 悔:뉘우칠 회   咎: 허물 구 구삼은 양 자리에 양으로 있고 중을 얻지 못하였다 . 응하는 자리가 상구로 같은 양이니 아버지의 일을 맡아 주장하는 격이다 . 그런데 중도를 얻지 못해 지나치게 일을 처리할 수도 있고 , 내호괘가 태 ☱ 이니 조금 후회스런 일을 할 수도 있다 . 그렇지만 선대의 일을 맡아 주장하는 것이니 큰 허물을 짓는 것은 아니다 . 象曰 幹父之蠱는 終无咎也니라. 상왈 간부지고    종무구야 상전에 말하였다. “아버지의 일을 주장함은 마침내 허물이 없다.” 六四는 裕父之蠱니 往하면 見吝하리라.", "사효": "육사    유부지고    왕      견린 육사는 아버지의 일을 여유롭게 하니, 가면 인색함을 볼 것이다. 裕:넉넉할 유·늘어질 유·관대할 유   吝:인색할 린 육사는 음자리에 음으로 있어 지나치게 우유부단 ( 優柔不斷 ) 한 상황이다 . 그러니 선대 아버지의 일을 제때에 해결하지 않아 지지부진 ( 遲遲不進 ) 하고 , 또한 일처리도 정확하게 해결하지 못하고 적당히 한다 . 이렇게 해 나가면 인색하게 된다 . 象曰 裕父之蠱는 往앤 未得也라. 상왈 유부지고    왕    미득야 상전에 말하였다. “아버지의 일을 여유롭게 하는 것은 가면 얻지 못한다.” 아버지의 일을 주장하는데 지지부진하게 적당히 해 가면 , 결국 아무 결과도 얻지 못한다 . 六五는 幹父之蠱니 用譽리라.", "오효": "육오    간부지고    용예 육오는 아버지의 일을 주장하니, 명예로울 것이다. 用:써 용(以)   譽:명예 예·기릴 예 육오는 외괘 간산 ( 艮山 ) ☶ 에서 중을 지키고 있다 . 그야말로 선대 아버지의 일을 중도로 덕이 있게 해결하니 , 명예로울 수밖에 없다 . 산풍고괘 육오효가 변하면 중풍손 ( 重風巽 ) 괘로 된다 . 중도 ( 中道 ) 로 선대의 일을 잘 마무리하니 , 새롭게 상황을 고쳐 나갈 수 있다 . 《 주역》 57 번째에 있는 중풍손괘 구오효사에는 다음과 같이 되어 있다 . 九五는 貞이면 吉하야 悔 亡하야 无不利니 无初有終이라. 先庚三日하며 後庚三日이면 吉하리라 . 구오는 바르게 하면 길하여 뉘우침이 없어져서 이롭지 않음이 없으니, 처음은 없고 마침은 있다. 경(庚)으로 먼저 삼일하며 경(庚)으로 뒤에 삼일 하면 길할 것이다. 象曰 幹父用譽는 承以德也라. 상왈 간부용예    승이덕야 상전에 말하였다. “아버지의 일을 주장해서 명예로운 것은 덕으로 잇기 때문이다.”", "상효": "上九는 不事王侯하고 高尙其事로다. 상구    불사왕후       고상기사 상구는 왕과 제후를 섬기지 않고, 그 일을 높이 숭상하도다. 事:섬길 사·일 사   侯:제후 후   尙: 숭상할 상 상구는 외괘 간산 ( 艮山 ) ☶ 의 끝에 있고 , 고괘 ( 蠱卦 ) 의 맨 위에 있다 . 이러한 상으로 보면 , 상구의 일은 세상사와 무관한 산 속의 일이다 . 또한 음 자리에 양으로 있고 중도 얻지 못한 상태이니 , 선대의 일을 맡아 처리해 갈 수 있는 상황이 아니다 . 그래서 선대 ( 先 代 ) 의 일은 물론 세속사의 왕후 ( 王侯 ) 도 섬기지 않는 상이다 . 오로지 세상사와는 다른 그 어떤 일을 높이 숭상한다 . 산 속의 일이기에 깨달음의 일 ( 得道 ) 일수도 있다 . 다른 한편으로 보면 , 세상 사회의 질서를 무시하고 앞 세대의 일을 순리적으로 처리하지 않으면서 저마다 자기주장만 펴는 혼탁한 사회상일수도 있다 . 象曰 不事王侯는 志可則也라. 상왈 불사왕후    지가칙야 상전에 말하였다. “왕후를 섬기지 않는 것은 뜻이 가히 법할만하다.” 상구가 세속의 왕과 제후를 섬기지 않는 것은 , 상구가 가진 뜻이 가히 지켜야 할 법칙이기 때문이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 272 ∼279 쪽 ."}}, {"num": 19, "ko": "지택임", "hanja": "地澤臨", "lines": [1, 1, 0, 0, 0, 0], "url": "https://soosanss.tistory.com/171", "post_id": 171, "gwaui": "사회를 올바로 이끌어가는 군자는 항상 백성을 올바로 가르치고 끝없이 포용하여야 한다 ( 容民无疆 ).", "gwamyung": "외괘가 곤지 ( 坤地 ) ☷ , 내괘가 태택 ( 兌澤 ) ☱ 으로 이루어진 괘를 ‘ 임 ( 臨 ) ’ 괘라 한다 .", "seogwa": "｢ 전 ｣ 은 산풍고괘 다음에 지택림괘가 온 이유를 다음과 같이 설명하고 있다 . 蠱者는 事也니 有事而後애 可大라 故로 受之以臨하고 고자    사야    유사이후   가대    고    수지이림 고(蠱)는 일이니, 일이 있은 다음에 가히 크게 된다. 그러므로 임(臨)으로써 받고 고 ( 蠱 ) 는 일이다 . 일이 생겨 일을 해결하다보면 사람이 모이고 재물이 모여서 , 일이 더욱 커진다 . 그래서 크게 임한다는 임괘 ( 臨卦 ) 를 고괘 다음에 둔 것이다 .", "gwasa": "臨은 元亨코 利貞하니 至于八月하얀 有凶하리라. 임    원형    이정      지우팔월       유흉 임(臨)은 크게 형통하고 바름이 이로우니, 8월에 이르러선 흉함이 있을 것이다 . 임 ( 臨 ) 은 양 기운이 내괘에서 강하게 임하니 크게 형통하다 . 그러나 때가 되면 다시 음기운이 왕성한 상황이 와서 사회가 피폐해지는 흉함이 있게 되니 , 바르게 해야 이롭다 . 8 월이란 의미는 음기운이 성하게 일어나는 때라는 뜻이고 , 구체적으로 8 월을 나타내는 것으로 이해할 필요는 없다 . 참고로 음양소장의 이치에 따른 12 월괘를 보면 다음과 같다 . 에 대하여 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 臨은 剛浸而長하며 說而順하고 剛中而應하야 大亨以正하니 天之道也라. 단왈 림    강침이장      열이순       강중이응 대형이정       천지도야 至于八月有凶은 消不久也라. 지우팔월유흉    소불구야 단전에 말하였다. “임(臨)은 강이 차츰차츰 길어지며, 기뻐하고 순하고, 강이 가운데하고 응해서 크게 형통하고 바르니, 하늘의 도이다. ‘8월에 이르면 흉함이 있다’는 것은 사라져서 오래하지 못하는 것이다.” 浸:잠길 침·차츰차츰 침   說:기쁠 열   消:사라질 소   久:오랠 구 순음 ( 純陰 ) 의 상황이었던 중지곤 ( 重地坤 ) 에서 일양 ( 一陽 ) 이 생하여 지뢰복 ( 地雷復 ) 이 되고 , 양이 내괘 이효까지 자라서 지택림 ( 地澤臨 ) 이 되니 양강 ( 陽剛 ) 이 점차 자라나게 된다 . 괘덕 ( 卦 德 ) 으로 보면 내괘 태택 ( 兌澤 ) ☱ 으로 기뻐하고 , 외괘 곤지 ( 坤地 ) ☷ 로 순하다 . 또한 구이가 내괘의 중을 얻어 외괘의 육오와 응하여 크게 형통하고 바른 상태이니 , 이것이 하늘의 도인 것이다 . 그렇지만 봄· 여름에 만물을 생화하던 기운도 가을이 되면 숙살 ( 肅殺 ) 기운으로 만물을 죽이듯이 , 양의 기운이 자라나는 것도 때가 되면 사라져서 영구히 오래할 수는 없다 . 이것이 천지자연의 법도이다 .", "gwasangsa": "象曰 澤上有地 臨이니 君子 以하야 敎思 无窮하며 容保民이 无疆하나니라. 상왈 택상유지 림       군자 이       교사 무궁      용보민    무강 상전에 말하였다. “못 위에 땅이 있는 것이 임(臨)이니, 군자가 이를 본받아 가르치는 생각이 다함이 없으며, 백성을 용납해서 보전함이 지경이 없게 한다.” 敎:가르칠 교   思:생각할 사   容:얼굴 용·박아들일 용·용서할 용   保:지킬 보   疆:지경 강 내괘의 연못 ☱ 위에 땅 ☷ 이 있는 것이 임괘 ( 臨卦 ) 의 상이다 . 연못의 기운이 위에 있는 땅을 윤택하게 하여 만물을 생화하듯이 , 군자는 비록 소인이라 하더라도 올바른 이치를 끊임없이 가르쳐 교화시키고 , 아울러 아무 경계가 없고 사심 ( 邪心 ) 이 없이 모든 백성을 용납하고 그 삶을 보전하게 해야 한다 . 내괘의 태택 ☱ 은 가르치는 것이요 , 외괘의 곤지 ☷ 는 모든 것을 용납하여 포용하는 상이다 . 효사 및 효상사", "hyosa": {"초효": "초구의 양과 구이의 양이 내괘의 가운데까지 이르면서 , 양의 기운이 군림하여 밝은 세상을 만들어간다는 뜻이다 . 음효가 넷으로 음의 기운이 많지만 , 내괘의 중효까지 차지한 양의 기운을 음 기운이 제어할 수 없기 때문에 , 양의 기운이 뻗어나가게 된다 . 지택림괘와 반대로 내괘 이효까지 음으로 이루어지고 삼효부터 상효까지 양효로 이루어진 괘는 천산돈 ( 天山遯 ) 괘가 되는데 , 음의 기운이 내괘 중효까지 이르면 상대적으로 많은 양 기운도 자라나는 음 기운을 어찌할 수 없기 때문에 , 양 기운이 도망간다고 하여 ‘ 돈 ( 遯 ) ’ 괘라 한다 . 初九는 咸臨이니 貞하야 吉하니라. 초구    함림       정      길 초구는 느껴서 임하니, 바르게 해서 길하다. 咸:다 함·느낄 함 초구와 구이의 군자는 바른 양 기운으로 소인 ( 小人 ) 의 음 ( 陰 ) 들을 가르치며 용납해야 한다 . 초구는 임괘 ( 臨卦 ) 의 맨 아래에 처하였으나 , 양 자리에 양으로 바른 상태이다 . 또한 초구는 음인 육사와 정응관계에 있으니 ,", "이효": "九二는 咸臨이니 吉하야 无不利하리라. 구이    함림       길      무불리 구이는 느껴서 임하니, 길해서 이롭지 않음이 없을 것이다. 구이는 내괘에서 중을 얻었고 , 또한 외괘의 육오 음과 잘 응하고 있다 . 전체 괘상으로 볼 때 육오는 인군이고 , 구이는 선비에 해당한다 . 구이가 육오 인군과 느껴 임하는 것 ( 咸臨 ) 은 육오 인군의 명 ( 命 ) 에 순종만 하는 것이 아니라 , 때로는 군자로서 인군을 교화시키면서 올바른 사회를 이끌어 가는 역할을 해야 한다 . 구이 군자가 음들을 중도로 잘 교화시키고 포용해 나가니 , 길해서 이롭지 않음이 없다 . 象曰 咸臨吉无不利는 未順命也라. 상왈 함림길무불리    미순명야 상전에 말하였다. “느껴 임해서 길하여 이롭지 않음이 없음은 명에 순종하지만은 않는 것이다.” 구이는 육오 인군의 명에 복종만 하는 것이 아니라 , 때로는 인군을 설득하여 사회를 올바로 이끌어 나가도록 충언 ( 忠言 ) 도 하기 때문에 길하고 이로운 것이다 . 六三은 甘臨이라 无攸利하니 旣憂之라 无咎리라.", "삼효": "육삼    감림      무유리       기우지    무구 육삼은 달게 임한다. 이로울 바가 없으니, 이미 근심한다. 허물이 없을 것이다. 甘:달 감   攸:바 유   旣:이미 기   憂: 근심할 우 육삼은 양자리에 음으로 있고 중도 얻지 못하여 , 자기 본분을 제대로 이행하지 못하는 상태이다 . 음으로 내괘 태 ☱ 의 끝에 처하여 아래의 구이에게 달콤한 감언이설 ( 甘言利說 ) 로 임한다 ( 兌爲口, 兌爲說 ). 바른 도가 아닌 달콤함으로 구이에게 접근하니 , 이러한 상황은 이로울 바가 없다 . 그러나 구이 군자가 중도로 잘 교화하니 , 이에 육삼이 감화를 받아 자신의 처신을 근심하고 , 근심하면 뉘우치니 허물을 면하게 된다 . 象曰 甘臨은 位不當也오 旣憂之하니 咎不長也리라. 상왈 감림    위부당야   기우지       구부장야 상전에 말하였다. “달게 임함은 자리가 마땅하지 않은 것이고, 이미 근심하니 허물이 오래하지 않을 것이다.” 六四는 至臨이니 无咎하니라.", "사효": "육사에게 느껴 임해서 바르게 교화해야 한다 . 그렇지만 외괘에 왕성한 음 기운이 있으니 , 바르게 해야 길하다 . 象曰 咸臨貞吉은 志行正也라. 상왈 함림정길    지행정야 상전에 말하였다. “느껴 임해서 바르게 해서 길함은 뜻이 바름을 행하는 것이다.” 육사    지림       무구 육사는 지극하게 임하니, 허물이 없다. 至:이를 지·지극할지 육사는 음 자리에 음으로 처하여 대신 ( 大臣 ) 으로서의 본분에 맞게 처신한다 . 대신으로서 초구의 백성에게 , 또한 상서로운 초구의 양 기운에 지극하게 임하니 , 허물이 없다 . 象曰 至臨无咎는 位當也일새라. 상왈 지림무구    위당야 상전에 말하였다. “지극하게 임하여 허물이 없음은 자리가 마땅하기 때문이다.” 음 자리에 음으로 자리가 마땅하기 때문에 대신으로서 지극하게 임하는 것이다 . 六五는 知臨이니 大君之宜니 吉하니라.", "오효": "육오    지림       대군지의   길 육오는 지혜롭게 임하니, 대군의 마땅함이니 길하다. 知:알 지·슬기로울지   宜: 마땅할 의 육오는 비록 양 자리에 음으로 와 있지만 외괘에서 중을 얻어 인군의 역할을 하는 자리이다 . 새로운 밝은 기운이 자라나고 있음을 지혜롭게 살펴서 , 육오와 응하고 있는 구이 군자에게 임한다 . 이는 대군 ( 大君 ) 즉 큰 덕을 지닌 인군이라면 마땅히 처신해야 할 도이니 , 길하다 . 그런데 만일 이 자리에 있는 인군이 대군이 아닌 소인 같은 인군이라면 , 주위에 있는 소인들의 장막에 어두워져 올바른 처신을 못하게 될 수 있다 . 육오효가 변하면 수택절 ( 水澤節 ) 괘가 되니 , 절도 있는 지혜가 필요한 상황이다 . 象曰 大君之宜는 行中之謂也라. 상왈 대군지의    행중지위야 상전에 말하였다. “대군의 마땅함이란 중(中)을 행함을 일컫는다.” 謂: 이를 위 上六은 敦臨이니 吉하야 无咎하니라. 상륙    돈림      길       무구", "상효": "상육은 돈독하게 임하니, 길해서 허물이 없다. 敦: 도타울 돈 상육은 양의 기운이 안으로부터 점차 자라나는 임괘 ( 臨卦 ) 의 맨 위에 처해 있다 . 음 자리에 음으로 있어 자리가 바르니 , 새로운 양의 기운이 자라남을 보고 돈독하게 임한다 . 그러니 길해서 허물이 없다 . 보통 다른 괘에는 일반적으로 맨 위에 처해 있는 효가 좋지 않은 상황으로 묘사되는데 , 임괘 ( 臨卦 ) 는 양의 밝은 기운이 크게 임하는 것이기 때문에 , 상육도 이에 감응하여 돈독하게 아래의 양기운에 임하는 양상이 된다 . 象曰 敦臨之吉은 志在內也라. 상왈 돈림지길    지재내야 상전에 말하였다. “돈독하게 임해서 길함은 뜻이 안에 있는 것이다.” 상육이 돈독하게 임해서 길함은 상육의 뜻이 내괘에서 양강 ( 陽剛 ) 한 초구와 구이에게 , 즉 안에 있기 때문이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 280 ∼286 쪽 ."}}, {"num": 20, "ko": "풍지관", "hanja": "風地觀", "lines": [0, 0, 0, 0, 1, 1], "url": "https://soosanss.tistory.com/172", "post_id": 172, "gwaui": "하늘에서 바람이 불면서 천하를 고무 ( 鼓舞 ) 시키듯이 , 민생 ( 民生 ) 을 잘 살펴 올바른 길을 가르치라 ( 觀民設敎 ).", "gwamyung": "외괘가 손풍 ( 巽風 ) ☴ , 내괘가 곤지 ( 坤地 ) ☷ 로 이루어진 괘를 ‘ 관 ( 觀 ) ’ 이라 한다 . 땅 위에 바람이 불어 천하 만물을 고루 만져 주듯이 , 천하 백성을 두루 살펴본다는 뜻이다 . ‘ 관 ( 觀 ) ’ 자는 황새 ( 雚 ) 가 비상하여 천하를 보는 ( 見 ) 상을 취한 것이다 . 아래에 있는 만 백성을 살펴보고 두루 어루만져주는 관세음보살의 마음을 나타내는 상이기도 하다 . 또한 내괘의 음이 자라나서 사효 ( 외괘 초효 ) 까지 이르니 ,", "seogwa": "｢ 전 ｣ 은 지택림괘 다음에 풍지관괘가 온 것을 다음과 같이 설명하고 있다 . 臨者는 大也니 物大然後애 可觀이라 故로 受之以觀하고 임자    대야    물대연후   가관       고    수지이관 임이란 것은 큼이니, 물건이 커진 뒤에 가히 볼 수 있다. 그러므로 관으로 받고 지택림 ( 地澤臨 ) 은 양의 기운이 크게 임하는 것이고 , 물건과 상황이 커지는 것이다 . 이렇게 물건과 상황이 커지면 가히 볼 수 있기 때문에 , 임괘 ( 臨卦 ) 다음에 본다는 관괘 ( 觀卦 ) 를 두었다 .", "gwasa": "觀은 盥而不薦이면 有孚하야 顒若하리라. 관    관이불천      유부       옹약 관(觀)은 세수를 하고 천신하지 않으면, 믿음을 두어서 우러러 볼 것이다. 觀:볼 관   盥:대야 관·씻을 관   薦:올릴 천·천거할 천   顒:엄숙할 옹·우러러볼 옹· 공격할 옹 관 ( 觀 ) 은 정신수양과 관련된 괘이다 . 관 ( 盥 ) 은 세수한다는 뜻이지만 , 술잔을 들고 땅에 부어서 신 ( 神 ) 을 강림하게 하는 것을 의미한다 ( 盥 者 進爵灌地 以降神也 ). 천 ( 薦 ) 이라는 것은 제수 ( 祭需 ) 를 올리는 것이다 . 《 춘추공양전》 에는 희생 ( 犧 牲 ) 이 없이 올리는 제사를 천 ( 薦 ) 이라고 하였다 ( 無牲而祭 謂之薦 ). 정신수양에 있어 중요한 것은 지극한 정성이다 . 제사를 올리기 전에 목욕재계 ( 沐浴齋戒 ) 를 하는 것은 신과 자연에 대한 정성을 지극히 하기 위한 것이다 . 그런데 제사를 올리고 나면 제사의 번거로움과 제사를 끝냈다는 해이한 마음에 정성이 산만해진다 . 그래서 목욕재계를 하고 제수 ( 祭需 ) 를 올리기 전의 마음 상태를 지속하게 가지면 , 돈독한 믿음이 생겨서 하늘과 신을 우러러 보게 된다고 한 것이다 . 정자 ( 程子 ) 는 ｢ 역전 ( 易傳 ) ｣ 에서 다음과 같이 설명하고 있다 . 관(盥)은 제사지내는 처음에 손을 씻고 향술을 땅에 붓는 것이니 신을 구하는 때이고, 천(薦)은 날 것과 익은 것을 올리는 때를 말한 것이다. 관(盥)은 일의 시작이니 사람의 마음이 정성과 엄숙함을 지극히 다할 때이고, 이미 올린 뒤에 예를 자주 해서 번거롭게 되면, 인심이 흩어져서 정성스럽고 한결같음이 처음 세수할 때만 같지 못하다. 단전은 괘사를 다음과 같이 풀이하고 있다 .", "danssa": "彖曰 大觀으로 在上하야 順而巽하고 中正으로 以觀天下니 단왈 대관       재상      순이손       중정       이관천하 觀盥而不薦有孚顒若은 下 觀而化也라. 관관이불천유부옹약    하 관이화야 觀天之神道而四時 不忒하니 관천지신도이사시 불특 聖人이 以神道設敎而天下 服矣니라. 성인    이신도설교이천하 복의 단전에 말하였다. “크게 봄으로 위에 있어서, 순해서 겸손하고, 중정으로 천하를 보니, ‘관이 세수를 하고 올리지 않으면 믿음을 두어서 우러러 본다’는 것은 아래가 보아서 화함이다. 하늘의 신비한 도를 보매 사시가 어긋나지 않으니, 성인이 신비한 도로써 가르침을 베풂에 천하가 복종한다.” 忒: 어긋날 특", "gwasangsa": "象曰 風行地上이 觀이니 先王이 以하야 省方觀民하야 設敎하니라. 상왈 풍행지상    관      선왕    이        성방관민      설교 상전에 말하였다. “바람이 땅위를 행하는 것이 관이니, 선왕이 이를 본받아 방소를 살피고 백성을 보아서 가르침을 베풀었다.” 省:살필 성   方:방소 방   設:베풀 설   敎: 가르칠 교 관괘 ( 觀卦 ) 는 바람이 땅 위로 불어 행하는 상이다 . 이러한 상을 보고 옛 왕은 바람이 천하를 두루 만지며 지나가듯이 , 방방곡곡을 살피고 곳곳에 있는 백성의 상태를 보아서 각각의 상황에 필요한 가르침을 베풀었다 . 관괘 ( 觀卦 ) 는 종교적인 뜻을 담고 있는 괘이기도 하다 . 각각의 상황과 처지를 고려하고 중생 ( 衆生 ) 의 근기에 맞추어 가르침을 베푼 것이 성인 ( 聖人 ) 의 가르침이요 법문이다 . 관괘 ( 觀卦 ) 에서는 우리가 처한 현실을 냉철하게 살피고 또한 나아가야 할 방향을 정확히 알려야 한다 . 종교인 ( 宗敎人 ) 의 바른 자세는 단순한 덕담 ( 德談 ) 과 격언 ( 格言 ) 으로 중생을 매혹시킬 것이 아니라 , 모든 상황에 처하여 진실로 구제할 수 있는 노력과 능력이 있어야 한다 . 효사 및 효상사 初六은 童觀이니 小人은 无咎오 君子는 吝이니라. 초륙    동관      소인    무구    군자    인", "hyosa": {"초효": "초육은 아이의 봄이니, 소인은 허물이 없고 군자는 인색하다. 童:아이 동 초육은 세상을 보는 경지에 있어 맨 아래 단계에 해당한다 . 양 자리에 음으로 있어 자리가 부당하고 , 맨 아래에 있으니 마치 어린 아이가 세상을 보는 것과 같은 좁은 소견을 지니고 있다 . 그러니 소인은 원래 그러한 자이기에 허물될 것은 아니지만 , 만일 군자가 이런 상태라면 인색하다 . 象曰 初六童觀은 小人道也라. 상왈 초육동관    소인도야 상전에 말하였다. “초육의 동관은 소인의 도이다.” 六二는 闚觀이니 利女貞하니라. 초육이 아이가 보는 것과 같다면 ,", "이효": "육이    규관      이녀정 육이는 엿봄이니, 여자의 바름이 이롭다. 闚:엿볼 규 육이는 내괘에서 중정한 자리이나 , 관괘 ( 觀卦 ) 에서는 정신계의 두 번째 단계에 해당한다 . 육이는 겨우 세상 이치를 문틈으로 엿보는 것과 같다 . 따라서 육이가 소인인 음 ( 陰 ) 으로 중정하니 여자의 바름이 이롭다고 하였으나 , 군자가 엿보는 정도라면 역시 추한 상황이다 . 象曰 闚觀女貞이 亦可醜也니라. 상왈 규관여정    역가추야 상전에 말하였다. “엿봄으로 여자가 바름이 또한 가히 추하다.” 六三은 觀我生하야 進退로다.", "삼효": "육삼    관아생      진퇴 육삼은 나의 삶을 보아서 나아가고 물러나도다. 進:나아갈 진   退:물러날 퇴 육삼은 관수행 ( 觀修行 ) 에 있어 중요한 단계이다 . 사실 밖의 경지를 바라보는 것은 누구나 볼 수 있다 . 그렇지만 진정 자기 모습을 본다는 것은 보통 경지가 아니면 볼 수가 없다 . 자아 ( 自我 ) 에 집착되어 본질이 가려진 자기 참모습을 본다는 것은 더 높은 경지로 올라가는 관건 ( 關鍵 ) 이 된다 . 그래서 나의 참모습을 보되 큰 그릇이 안 되면 물러나 정성스럽게 생업에 충실하고 , 큰 일을 할 수 있는 그릇이면 더 나아가 천하를 구제하는 높은 경지로 올라간다 . 육삼이 변하면 풍산점 ( 風山漸 ) 괘가 되니 차츰차츰 나아가야 한다 . 象曰 觀我生進退하니 未失道也라. 상왈 관아생진퇴       미실도야 상전에 말하였다. “나의 삶을 보아 나아가고 물러나니 도를 잃지 않는다.” 자신의 삶을 보아 , 자기의 역량을 깨달아 진퇴 ( 進退 ) 를 결정하니 , 나아가든 물러나든 도를 잃는 것이 아니다 . 六四는 觀國之光이니 利用賓于王하니라. 육삼에서는 자기 자신의 삶을 보는 것이었지만 , 육삼의 ‘ 觀我生 ’ 을 통과하고 육사의 ‘ 觀國之光 ’ 을 거치면서 도탄 ( 塗炭 ) 에 빠진 세상을 두루 살펴보고 ,", "사효": "육사    관국지광      이용빈우왕 육사는 나라의 빛을 보니, 왕에게 손님됨이 이롭다. 賓:손님 빈·묵을 빈·대접할 빈·공경할 빈·인도할 빈 육사는 음자리에 음으로 있고 ( 得位 ) 외괘의 첫 자리이다 . 육사가 변하면 외괘가 건천 ( 乾天 ) ☰ 으로 되니 , 마치 속세를 벗어나 천계 ( 天界 ) 에 입문하는 격이다 . 세상을 크게 잘 헤아리니 , 나라의 재상이 되어 백성을 다스릴 수도 있다 . 육사는 한 단계 더 상승하여 나라 전체의 빛을 본다 . 이 정도로 세상을 보는 경지에 이르면 천상계의 신명 ( 神 明 ) 이 손님으로 대접한다 . 象曰 觀國之光은 尙賓也라. 상왈 관국지광    상빈야 상전에 말하였다. “나라의 빛을 봄은 손님을 숭상하는 것이다.” 尙:숭상할 상", "오효": "구오와 상구의 양 군자가 애틋한 마음으로 천하를 바라보는 것이기도 하다 . 관 ( 觀 ) 은 정신수양을 나타내는 괘이기도 하다 . 내괘의 곤지 ( 坤地 ) ☷ 는 인간의 배를 의미하고 외괘의 손풍 ( 巽風 ) ☴ 은 인간의 호흡 ( 呼吸 ) 이다 . 천지가 바람을 일으켜 기운을 교류하듯이 , 인간은 호흡으로 내기 ( 內氣 ) 와 외기 ( 外氣 ) 를 교류시킨다 . 수양자세에 관한 내용은 중산간 ( 重山艮 ) 괘에서 자세히 살펴보게 된다 . 정신계 ( 精神界 ) 로 들어가는 경지를 단계적으로 표현하고 있는 괘가 관괘 ( 觀卦 ) 이다 . 또한 10 번째의 천택리 ( 天澤履 ) 괘가 인류역사 ( 人類歷史 ) 의 대단원을 돌이켜 보는 괘였다면 , 20 번째의 풍지관 ( 風地觀 ) 괘는 11 번째 지천태 ( 地天泰 ) 괘로부터 19 번째 지택림 ( 地澤臨 ) 괘까지의 사회적 변화양상을 총괄적으로 살펴보는 의미도 된다 . 구오와 상구의 양이 천하를 크게 보기 위해 위에 있다 . 내괘 곤지 ( 坤地 ) ☷ 로 순하고 외괘 손풍 ( 巽風 ) ☴ 으로 겸손하고 , 구오가 외괘에서 중정 ( 中正 ) 하여 천하를 보니 , 아래에 있는 백성들이 제사 올릴 때의 정성스런 마음으로 구오를 바라보면서 교화된다 . 하늘의 신비스런 도를 보니 춘하추동 사시가 어긋나지 않고 , 성인은 신비스런 도로써 가르침을 베푸니 천하 백성이 이에 복종한다 . 九五는 觀我生호대 君子면 无咎리라. 구오    관아생      군자    무구 구오는 나의 삶을 보되, 군자면 허물이 없을 것이다. 구오는 외괘에서 중정 ( 中正 ) 한 자리이다 . 크게 봄으로 위에 있는 자리이다 ( 大觀在上 ). 구오에서는 다시 나 자신이 도탄에 빠진 백성을 구제할 수 있는 역량이 되는가를 돌이켜 본다 . 그래서 구오가 자기 자신의 삶을 보는 것은 , 결국은 천하 백성을 보는 것과 같다 . 물론 감당할 수 있는 그릇 , 즉 군자라면 허물이 없지만 , 만일 소인 ( 小人 ) 이 이 경지에 도달하여 자신을 돌이켜 본다면 인색하게 되거나 흉하게 될 수도 있다 . 소승 ( 小乘 ) 과 대승 ( 大乘 ) 의 차이 , 진정한 종교와 사이비 종교의 차이가 여기에 있다 . 象曰 觀我生은 觀民也라. 상왈 관아생    관민야 상전에 말하였다. “나의 삶을 보는 것은 백성을 보는 것이다.”", "상효": "上九는 觀其生호대 君子면 无咎리라. 상구    관기생       군자    무구 상구는 그 삶을 보되, 군자면 허물이 없을 것이다. 상구는 관괘 ( 觀卦 ) 의 맨 위에 있어 , 저 높은 하늘에서 천하를 바라보는 것이다 . 초효의 백성에서부터 구오의 군자에 이르기까지 , 그 각각의 삶을 두루 보는 최상의 경지이다 . 관세음보살 ( 觀世音菩薩 ) 의 경지이다 . 도탄 ( 塗炭 ) 에 빠져 허우적거리는 천하 백성을 바라보는데 , 어찌 마음이 편하겠는가 ? 이 역시 군자의 심법 ( 心法 ) 을 터득해야 이 경지에 이를 수 있다 . 象曰 觀其生은 志未平也라. 상왈 관기생    지미평야 상전에 말하였다. “그 삶을 보는 것은 뜻이 편안하지 않다.” 平:편안할 평 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 287 ∼294 쪽 ."}}, {"num": 21, "ko": "화뢰서합", "hanja": "火雷噬嗑", "lines": [1, 0, 0, 1, 0, 1], "url": "https://soosanss.tistory.com/173", "post_id": 173, "gwaui": "하늘에는 하늘의 법칙이 있고 지상에는 지상의 법칙이 있으니 , 악함에 대한 징벌을 밝히고 사회의 올바른 법칙을 세워라 ( 明罰勅法 ). 전체구조상 범죄인을 수사하여 죄인을 재판에 넘기는 검찰의 역할을 하는 자리이다 . 양자리에 음으로 있으니 말린 고기포가 되는데 , 이는 육이 경찰이 일단 수사하여 육삼에게 넘어온 것이기에 그동안 딱딱하게 마른 상태로 되었음을 표현한 것이다 . 또한 겉은 부드러운 고기여서 씹다가 속에 있는 딱딱한 독을 만나게 되는 상이다 . 민생의 치안유지를 위한 이러한 역할이 조금 인색하지만 허물이 될 것은 아니다 . 象曰 遇毒은 位不當也일새라. 상왈 우독    위부당야 상전에 말하였다. “독을 만남은 자리가 마땅하지 않기 때문이다.”", "gwamyung": "외괘가 이화 ( 離火 ) ☲ , 내괘가 진뢰 ( 震雷 ) ☳ 로 이루어진 괘를 ‘ 서합 ( 噬嗑 ) ’ 이라 한다 . 괘상 ( 卦象 ) 으로 볼 때 아래턱 (", "seogwa": "｢ 전 ｣ 은 풍지관괘 다음에 화뢰서합괘가 온 것을 다음과 같이 설명하고 있다 . 可觀而後에 有所合이라 故로 受之以噬嗑하고 가관이후    유소합      고    수지이서합 가히 본 다음에 합하는 바가 있다. 그러므로 서합으로 받고 범죄와 형벌을 밝게 하는 것은 구체적인 정황에 임 ( 臨 ) 해서 잘 살펴본 ( 觀 ) 뒤에 죄의 유무를 판단할 ( 噬嗑 ) 수 있다 . 또한 풍지관 ( 風地觀 ) 에서 세상을 어지럽게 하는 소인들을 보면서 , 사회정의를 구현하기 위해 형벌을 사용한다 .", "gwasa": "噬嗑은 亨하니 利用獄하니라. 서합    형       이용옥 서합은 형통하니, 옥을 씀이 이롭다. 噬:씹을 서   嗑:합할 합·말 많을 합   獄:옥 옥 서합 ( 噬嗑 ) 은 사회의 부조리를 잘 씹어 합하고 단죄 ( 斷罪 ) 할 것은 단죄하여 사회정의를 구현하는 것이기에 형통하다 . 또한 외괘의 이화 ( 離火 ) ☲ 로 밝게 판단하고 내괘의 진뢰 ( 震 雷 ) ☳ 로 움직여 나가니 형통하다 . 사회를 어지럽게 하는 범죄를 다스리는 데는 뉘우칠 때까지 사회에서 격리하는 옥 ( 獄 ) 을 쓰는 것이 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 頤中有物일새 曰噬嗑이니 噬嗑하야 而亨하니라. 단왈 이중유물       왈서합      서합       이형 剛柔 分하고 動而明하고 雷電이 合而章하고 강유 분       동이명       뇌전   합이장 柔得中而上行하니 雖不當位나 利用獄也니라. 유득중이상행       수부당위    이용옥야 단전에 말하였다. “턱 가운데 물건이 있기 때문에 이르길 서합(噬嗑)이니, 씹어 합하여 형통하다. 강과 유가 나뉘고, 움직이고 밝고, 우레와 번개가 합하여 빛나고, 유(柔)가 중을 얻어 위로 행하니, 비록 위(位)는 당치 않으나, 옥을 씀이 이롭다.” 頤:턱 이   雷:우뢰 뢰   電:번개 전   章:빛날 장   雖: 비록 수", "gwasangsa": "象曰 雷電이 噬嗑이니 先王이 以하야 明罰勅法하니라. 상왈 뇌전    서합      선왕    이       명벌칙법 상전에 말하였다. “우레와 번개가 서합(噬嗑)이니, 선왕이 이를 본받아 벌을 밝히고 법을 신칙(제정)하였다.” 罰:죄 벌   勅:신칙할 칙·조서 칙 내괘가 진뢰 ( 震雷 ) ☳ 로 우레를 나타내고 , 외괘가 이화 ( 離火 ) ☲ 로 번개를 나타내는 상이 서합 ( 噬嗑 ) 괘이다 . 하늘에서 번개가 번쩍이고 우레가 우르릉거리면 모두가 두려워하듯이 , 옛 왕들은 이러한 서합괘의 상에서 죄가 되는 벌을 세상에 밝게 알리고 처벌원칙을 법으로 제정하였다 . 오늘날 형사법의 대원칙인 죄형법정주의 ( 罪刑法定主義 ) 를 말하는 것이다 . ▣ 주역에서의 범죄와 형벌 《 주역》 64 괘 가운데 범죄 ( 犯罪 ) 와 형벌 ( 刑罰 ) 의 원리를 다루고 있는 대표적인 괘가 네 괘가 있는데 , 상경에 화뢰서합 ( 火雷噬嗑 ) 괘와 산화비 ( 山火賁 ) 괘가 있고 하경에 뇌화풍 ( 雷火豐 ) 괘와 화산려 ( 火山旅 ) 괘가 있다 . 이 가운데 화뢰서합괘는 죄형법정주의의 대원칙을 천명한 괘이고 , 산화비괘는 민사적인 법률관계를 나타내고 있으며 , 뇌화풍괘는 엄격한 형벌을 집행하는 괘이며 , 화산려괘는 유배를 보내는 것으로 오늘날의 법리로 보면 사회격리 차원에서의 보호감호처분이라 할 수 있다 . 그런데 이 네 괘가 모두 형벌은 밝게 해야 한다는 뜻에서 이화 ( 離火 ) ☲ 가 들어 있음을 알 수 있다 . ◈ 화뢰서합괘 여섯효의 구조 화뢰서합 ( 火雷 噬嗑 ) 괘는 범죄를 다루는 사법구조 ( 司法構造 ) 를 나타내고 있다 . 초효와 상효가 범죄인이 되는데 , 초효는 경범죄 ( 輕犯罪 ) 요 상효는 중범죄 ( 重犯罪 ) 를 의미한다 . 이효와 삼효는 범죄인을 체포 ․ 수사하고 기소하는 일선 경찰 ( 警察 ) 과 검찰 ( 檢察 ) 을 의미하고 있다 . 사효와 오효는 죄의 유무를 판단하는 하급심 ( 下級審 ) 과 상급심 ( 上級審 ) 의 재판절차를 나타내고 있다 . 효사 및 효상사", "hyosa": {"초효": "초구 ) 과 위턱 ( 초구는 아래턱이고 상구는 위턱이며 구사 양은 턱 가운데의 물건이 되니 , 서합 ( 噬嗑 ) 괘는 턱 가운데 물건이 있는 상이다 . 그래서 물건을 잘 씹어 합하여 소화가 잘 되게 하는 것이고 , 또한 사회를 잘 조화시키는 것이기에 형통하다 . 서합 ( 噬嗑 ) 괘는 삼음삼양 ( 三陰三陽 ) 괘로 그 체는 천지비 ( 天地否 ) 괘에 있다 . 위와 아래가 막혀서 비색한 때에 올바른 사회를 가꾸어 나가기 위해서는 , 위에만 있는 양강 ( 陽剛 ) 과 아래에만 있는 음유 ( 陰柔 ) 가 나뉘어 , 막힘을 뚫고 움직여서 밝게 해야 하는데 , 마치 우레와 번개가 합하여 빛나는 것과 같이 해야 한다 . 또한 천지비괘의 초육 음 ( 陰 ) 이 구오 양 ( 陽 ) 과 자리를 바꾸어 외괘에서 중을 얻어 위로 올라가니 , 비록 육오가 양자리에 음으로 있어 자리는 마땅하지 않지만 , 유약한 인군으로 세상을 바르게 다스리기 위해서는 옥 ( 獄 ) 을 쓰는 것이 이롭다 . 初九는 屨校하야 滅趾니 无咎하니라. 초구    구교      멸지    무구 초구는 형틀을 신겨서 발을 멸하니 허물이 없다. 屨:신 구·밟을 구   校:학교 교·가르칠 교·질곡 교(차꼬와 수갑·칼의 총칭)  滅:멸할 멸   趾:발 지 초구는 범죄로 치면 경범죄 ( 輕犯罪 ) 에 해당한다 . 마치 바늘도둑이 소도둑으로 되는 것을 미연에 방지하고자 , 형틀 ( 족쇄 足鎖 ) 을 신겨서 다시는 그러한 범죄를 저지르지 못하도록 발을 멸한다 . 내괘 진 ☳ 은 인체에서 발 ( 足 ) 을 의미하고 또한 서합괘의 맨 아래에 있으니 발이 된다 . 공자는 ｢ 계사하전 ｣ 제 5 장에서 다음과 같이 설명하고 있다 . 공자께서 말씀하셨다. “소인은 어질지 못함을 부끄러워하지 않으며, 의롭지 않음을 두려워하지 않는다. 이로움을 보지 않으면 권하지 않으며, 위엄으로 하지 않으면 징계하지 않으니, 조금 징계할 때 크게 경계함이 소인의 복이다. 역에 이르길 ‘형틀을 신겨서 발꿈치를 멸하니 허물이 없다’고 하니 이를 말하는 것이다.” ( 子曰 小人은 不恥不仁하며 不畏不義라. 不見利면 不勸하며 不威면 不懲하나니 小懲而大誡 此 小人之福也라. 易曰 屨校하야 滅趾니 无咎라하니 此之謂也라.) 군자는 어짊과 의로움을 행하지만 , 소인은 어질지 못하고 의롭지 못함을 부끄러워하지도 않고 두려워하지도 않는다 . 그래서 사소한 일에 죄를 짓기 쉬운데 , 이러한 죄를 지을 때 조금 징계하여 크게 경계하지 않으면 큰 죄를 저지를 가능성이 많기 때문에 , 비록 형벌을 받지만 소인에게는 복이 되는 것이다 . 그러나 사회생활에 있어 죄가 되는 경우가 필요이상으로 많다면 , 오히려 국민의 생활이 자유롭지 못하게 된다 . 《 춘추좌씨전 ( 春秋左氏傳 )》 에 “ 나라의 모든 시장에 신 값은 싸고 용 값은 비싸다 ( 國之諸市 屨 賤踊貴 ) ” 는 말이 있는데 , 이는 나라에 죄인이 너무 많아서 발을 잘리는 형벌을 받은 죄인들이 신고 다니는 용 ( 踊 ) 값이 보통 사람이 신고 다니는 신 값보다 비싸다는 뜻으로 , 나라의 법이 혹독함을 비유하는 말이다 . 법의 제정과 집행은 민생 ( 民生 ) 의 자유와 안정에 목적을 두어야 한다 . 象曰 屨校滅趾는 不行也라. 상왈 구교멸지    불행야 상전에 말하였다. “형틀을 신겨 발을 멸함은 행하지 못하게 하는 것이다.” 가벼운 죄를 저지른 죄인에게 족쇄를 채우는 형벌을 주는 것은 더 이상 죄를 짓지 못하게 하기 위한 것이다 . 六二는 噬膚호대 滅鼻니 无咎하니라. 초구의 죄인을 가까이 하여 체포해야 하기 때문이다 . 六三은 噬腊肉하다가 遇毒이니 小吝이나 无咎리라.", "이효": "육이    서부      멸비    무구 육이는 살을 씹되 코를 멸하니, 허물이 없다. 膚:살갗 부   鼻:코 비 육이는 내괘에서 중정 ( 中正 ) 한 자리이다 . 내괘가 진 ☳ 이니 사회 일선에서 치안유지 ( 治安維持 ) 를 위해 일하는 역할이고 , 육이가 변하면 내괘가 태택 ( 兌澤 ) ☱ 이 되니 때로는 숙살지기 ( 肅殺之氣 ) 로 범죄인을 체포하여 내호괘 간산 ( 艮山 ) ☶ 으로 죄인을 가두는 역할을 한다 . 음 자리에 음으로 있으니 아주 부드러운 살인데 , ‘ 살을 씹다가 코를 멸한다 ’ 는 것은 사회 곳곳을 다니며 범죄를 예방하고 단속하다가 때로는 위험을 감수해야 하는 상황을 나타낸다 . 내호괘가 간산 ☶ 이니 인체에서 코의 상이다 . 육이는 오늘날 일선 경찰 ( 警察 ) 의 역할을 나타낸 것으로 볼 수 있다 . 象曰 噬膚滅鼻는 乘剛也일새라. 상왈 서부멸비    승강야 상전에 말하였다. “살을 씹다가 코를 멸함은 강을 탔기 때문이다.” 육이가 살을 씹다가 코를 멸하게 되는 것은 육이 음이 사회 치안을 위해 범죄 현장 곳곳을 다녀야 하고 ,", "삼효": "육삼    서석육         우독       소린       무구 육삼은 말린 고기포를 씹다가 독을 만나니, 조금 인색하나 허물이 없을 것이다. 腊:포 석(말린 고기)    肉:고기 육   遇:만날 우   毒:독 독 육삼은 양자리에 음으로 있어 자리가 부당하고 중에서 벗어난 상태이다 . 그렇지만 육삼은 서합 ( 噬嗑 ) 육삼에서 기소되어 구사 하급심에서 재판을 받고 육오 상급심에서 최종적으로 형벌을 선고받은 중죄인 ( 重罪人 ) 에 해당한다 . 죄가 무거우니 초구의 족쇄 ( 足鎖 ) 와는 달리 항쇄 ( 項鎖 ) 를 목에 메어서 귀를 멸한다고 하였다 . 맨 위에 있으니 목에 메는 것이고 , 외호괘가 감수 ( 坎水 ) ☵ 가 되니 귀를 멸한다고 하였다 ( 坎爲耳 ). 공자는 ｢ 계사하전 ｣ 제 5 장에서 다음과 같이 설명하고 있다 . “착한 것을 쌓지 않으면 족히 명예를 이루지 못하고, 악한 것을 쌓지 않으면 족히 몸을 멸하지 않으니, 소인이 조금 착함으로 유익함이 없다 하여 하지 않으며, 조금 악함으로 상함이 없다 하여 버리지 않는다. 그러므로 악함이 쌓여서 가리지 못하며 죄가 커져서 풀지 못하니, 역에 이르길 ‘형틀을 메어 귀를 멸하니 흉하다’고 하였다.” (善不積이면 不足以成名이오 惡不積이면 不足以滅身이니 小人이 以小善으로 爲无益而弗爲也하며 以小惡으로 爲无傷而弗去也라. 故로 惡積而不可掩이며 罪大而不可解니 易曰 何校하야 滅耳니 凶이라하니라.) 象曰 何校滅耳는 聰不明也일새라. 상왈 하교멸이    총불명야 상전에 말하였다. “형틀을 메어서 귀를 멸함은 총명함이 밝지 못하기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 295 ∼ 303 쪽 .", "사효": "九四는 噬乾胏하야 得金矢나 利艱貞하니 吉하리라. 구사    서간치       득금시    이간정      길 구사는 마른 고기를 씹다가 금과 화살을 얻으나, 어렵고 바르게 함이 이로우니 길할 것이다. 乾:마를 간   胏:포 자·치(뼈가 붙은 마른 고기)   矢:화살 시   艱: 어려울 간 구사는 음자리에 양으로 있다 . 내괘에서 육이와 육삼이 체포해 기소한 범죄인을 외괘의 이화 ( 離火 ) ☲ 로 밝게 판단해야 하는 자리이다 . 경찰과 검찰에서 수사하여 기소하는 동안 딱딱하게 굳은 범죄인을 심리하니 뼈가 붙은 마른 고기를 씹는 상이고 , 금과 화살을 얻는다는 것은 죄의 경중 ( 輕重 ) 을 판단하는 것이다 . 《 주례 ( 周禮 )》 에 “ 소송 ( 訴 訟 ) 에는 화살 100 개를 묶어 가져가고 , 옥사 ( 獄事 ) 에는 금 30 근을 가지고 들어간다 ( 訟入束矢 獄入鈞 金 ) ” 고 하였는데 , 화살을 가져간다는 것은 죄의 유무를 판단하는 것이고 금을 가져가는 것은 형량의 경중을 의미한다 . 오늘날 형법의 원칙상 ‘ 무죄추정 ( 無罪推定 ) 의 원칙 ’ 이 있듯이 , 죄의 유무를 판단하고 형량을 정하는 데에는 추호의 실수가 있어서는 안 된다 . 그래서 어렵게 하고 바르게 해야 이롭고 길하다 . 象曰 利艱貞吉은 未光也라. 상왈 이간정길    미광야 상전에 말하였다. “어렵게 바르게 해야 이롭고 길한 것은 빛나지 못한 것이다.” 인간은 살아가면서 본의 아니게 타인에게 손해를 입힐 수도 있고 때로는 죄를 저지를 수도 있다 . 인간으로서 인간을 심판한다는 것은 그 자체가 광명한 것은 아닐 것이다 . 六五는 噬乾肉하야 得黃金이니 貞厲면 无咎리라. 육사가 하급심 ( 下級審 ) 이라면 육오는 상급심 ( 上級審 ) 이 된다 . 육사 하급심에서 금과 화살을 얻는다고 했으니 화살은 죄의 유무를 판단하는 것이고 , 금은 죄가 있어 옥사의 형량을 정하는 것을 말한다 . 육사에서 죄가 있음이 밝혀졌고 그 죄인을 다시 육오 상급심에서 심리하게 되니 황금을 얻었다고 한 것이다 . 육사와 마찬가지로 사람을 심판하는 것은 바르게 하고 위태로운 마음으로 신중하게 해야 한다 . 象曰 貞厲无咎는 得當也일새라. 상왈 정려무구    득당야 상전에 말하였다. “바르게 하고 위태롭게 여겨야 허물이 없음은 마땅함을 얻었기 때문이다.”", "오효": "육오    서간육       득황금      정려    무구 육오는 마른 고기를 씹어서 황금을 얻으니, 바르게 하고 위태롭게 여기면 허물이 없을 것이다. 黃:누를 황   厲:위태로울 려 육오는 양자리에 음으로 있으나 , 외괘 이화 ( 離火 ) ☲ 의 중을 얻어 범죄의 유무와 그 형량을 최종적으로 판단하는 자리이다 . 육오가 외괘의 중을 얻어 죄인을 심판하는 마땅한 자리에 있기 때문에 바르게 하고 위태롭게 여기면 허물이 없다고 한 것이다 .", "상효": "상구 ) 가운데 있는 구사의 실물 ( 陽 ) 을 씹어 합한다는 의미이다 . 또한 외괘가 불 ☲ 이고 내괘가 우레 ☳ 이니 번개와 천둥을 의미하며 , 이는 사회적으로 범죄를 응징하는 형벌 ( 刑罰 ) 을 뜻한다 . 오늘날 형사법 ( 刑事法 ) 의 대원칙인 죄형법정주의 ( 罪刑法定主義 ) 를 나타낸 대표적인 괘이다 . 上九는 何校하야 滅耳니 凶토다. 상구    하교      멸이    흉 상구는 형틀을 메어서 귀를 멸하니, 흉하도다. 何:멜 하(荷)·어찌 하   耳:귀 이 상구는 육이에서 채포되어 수사를 받고 ,"}}, {"num": 22, "ko": "산화비", "hanja": "山火賁", "lines": [1, 0, 1, 0, 0, 1], "url": "https://soosanss.tistory.com/174", "post_id": 174, "gwaui": "산 아래에 불이 있어 환히 비추고 단풍이 물들면서 아름답게 꾸미듯이 , 나라를 밝게 다스리고 사회를 아름답게 꾸미며 형벌 ( 옥사 ) 을 판단함에는 신중하게 하라 ( 无敢折獄 ).", "gwamyung": "외괘가 간산 ( 艮山 ) ☶ , 내괘가 이화 ( 離火 ) ☲ 로 이루어진 괘를 ‘ 비 ( 賁 ) ’ 라고 한다 . 산 아래에 붉은 단풍이 들면서 아름답게 꾸민다고 하여 ‘ 꾸밀 비 ’ 라고 한다 . 또한 사회를 아름답게 꾸미기 위해서는 혹 있을 수 있는 가벼운 범죄는 엄격하게 처벌하지 말고 사회를 원만하게 이끌어가야 한다 . 범죄인이 많아진다는 것은 법이 잘못돼 있다는 것을 의미할 수도 있다 . 그래서 내괘의 이화 ( 離火 ) ☲ 의 형벌을 외괘 간산 ( 艮山 ) ☶ 으로 그치게 한다는 의미도 된다 .", "seogwa": "｢ 전 ｣ 은 화뢰서합괘 다음에 산화비괘가 온 것을 다음과 같이 설명하고 있다 . 嗑者는 合也니 物不可以苟合而已라 故로 受之以賁하고 합자    합야    물불가이구합이이    고    수지이비 합(嗑)이란 합함이니, 물건이 구차하게 합하지만은 못할 따름이다. 그러므로 비로써 받고 苟:진실로 구·구차할 구   已: 따름 이 서합은 씹어 합하는 것인데 , 모든 물건과 상황이 무작정 합하는 것만은 아니며 서로 꾸미기도 한다 . 또한 무조건 형벌로만 해 나갈 수 없으며 , 때로는 사회의 화합을 위해 형벌을 완화해 나가는 것이 필요하다 . 그래서 화뢰서합괘 다음에 산화비괘를 두었다 .", "gwasa": "賁는 亨하니 小利有攸往하니라. 비    형       소리유유왕 비는 형통하니, 가는 바를 둠이 조금 이롭다. 賁:꾸밀 비·바뀔 비·클 분·날랠 분·땅이름 륙 비 ( 賁 ) 는 사회를 아름답게 꾸미는 것이고 , 가벼운 죄는 화합 차원에서 용서해 주는 것이니 형통하다 . 산 아래에 단풍이 서서히 아름답게 물 드는 것과 같이 , 또한 내괘 이화 ( 離火 ) ☲ 의 별들이 외괘 간산 ( 艮山 ) ☶ 의 북극성을 중심으로 서서히 돌아가듯이 , 가는 바를 둠이 조금 이롭다 . 너무 욕심을 내지 말고 조금씩 나아가라는 뜻이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 賁(亨)는 柔 來而文剛故로 亨하고 단왈 비(형)    유 래이문강고    형 分剛하야上而文柔故로 小利有攸往하니 天文也오 분강      상이문유고    소리유유왕      천문야 文明以止하니 人文也니 문명이지       인문야 觀乎天文하야 以察時變하며 관호천문       이찰시변 觀乎人文하야 以化成天下하나니라. 관호인문       이화성천하 단전에 말하였다. “비(賁)는 유가 와서 강을 빛나게 하는 까닭에 형통하고, 강(剛)을 나누어 올라가서 유(柔)를 빛나게 하는 까닭에 가는 바를 둠이 조금 이로우니 천문이요, 문명해서 그치니 인문이니, 천문을 보아서 때의 변화를 살피며, 인문을 보아서 천하를 화하여 이룬다.” 文:글자 문·문채 문·빛날 문   察:살필 찰 산화비괘도 삼음삼양 ( 三陰三陽 ) 괘로 그 체는 지천태 ( 地天泰 ) 괘에 있다 . 태평한 세상에서 행해지는 사소한 범죄는 사회 화합을 위해 감히 엄격한 형벌로 다스리지 않는다 . 지천태괘에서 구이와 상육이 자리바꿈하여 상육의 음유 ( 陰柔 ) 가 내괘의 가운데로 와서 초효와 삼효의 강 ( 剛 ) 을 꾸며주기 때문에 형통하고 , 내괘의 강은 나뉘어서 구이 강 ( 剛 ) 이 위로 상효자리로 올라가 음유 ( 陰柔 ) 를 꾸며주는 까닭으로 외괘가 간산 ( 艮山 ) ☶ 이 되니 가는 바를 둠이 조금 이롭게 된다 . 우주에서 저마다의 길을 따라 운행하고 있는 별들이 밤하늘을 꾸며주고 있는데 , 지구에서 볼 때 그 별들의 운행은 서서히 조금씩 나아가고 있는 것이 바로 천문 ( 天文 ) 이다 . 또한 내괘 이화 ( 離火 ) ☲ 로 문명하고 외괘 간산 ( 艮山 ) ☶ 으로 그치니 , 문명함이 오래 그쳐 있어 인간사회를 아름답게 하는 것이다 . 이와 같이 천문 ( 天文 ) 을 보아서 춘하추동 사시의 변화를 살피며 , 인문 ( 人文 ) 을 보아서 천하를 화하여 이룬다 . 의서 ( 醫書 ) 의 고전으로 알려지고 있는 《 황제내경소문 ( 黃帝內經 素 問 )》 제 69 편 ｢ 기교변대론 ( 氣交變大論 ) ｣ 에 다음과 같은 내용이 있다 . 帝曰 余聞호대 得其人하야 不敎면 是爲失道라 하고 傳非其人이면 慢泄天寶라 하니 余誠菲德하야 未足以受至道하나 然이나 而衆子哀其不終이라. 願夫子컨대 保於無窮하고 流於無極토록 余司其事하야 則而行之하곤 奈何잇고? 황제가 말하였다. “내가 듣기를 ‘그 사람(참된 사람)을 얻어서 가르치지 않으면 이는 하늘의 도리를 잃은 것이고, 그 사람이 아님에도 전하게 되면 하늘의 보배(寶)를 함부로 누설하는 것이다’라고 하니, 내가 진실로 덕이 없어 지극한 도를 전수 받기에 부족하나, 그러나 백성들이 천수를 누리지 못하는 것을 슬퍼하고 있다. 그대에게 바라건대 영원토록 보존하고 끝이 없이 흐르도록, 내가 그 일을 맡아 법칙으로 하여 행하고자 하는데, 어떻게 해야 하는가?” 岐伯曰 請遂言之也니이다. 《上經》에 曰 夫道者는 上知天文하고 下知地理하며 中知人事하면 可以長久라 하니 此之謂也니이다. 기백이 말하였다. “제가 상세히 말씀드리겠습니다. 《上經》에 이르길 ‘무릇 도(醫道)라는 것은 위로는 천문(天文)을 알고, 아래로는 지리(地理)를 알며, 가운데로는 인사(人事)를 알면, 가히 길고 오래할 것이다’고 하였으니, 바로 이를 말하는 것입니다.” 帝曰 何謂也오? 황제가 말하였다. “무슨 뜻인가?” 岐伯曰 本氣位也니이다. 位天者는 天文也오 位地者는 地理也오 通于人氣之變化者는 人事也니이다. 故로 太過者는 先天하고 不及者는 後天하니 所謂治化而人應之也니이다. 기백이 말하였다. “기(氣)에 근본하여 자리한 것입니다. 하늘에 자리한 것은 천문(天文)이고, 땅에 자리한 것은 지리(地理)이며, 사람 기운의 변화에 통하는 것이 인사(人事)입니다. 그러므로 운기(運氣)가 태과(太過)하면 기후가 계절보다 먼저 이르고, 불급(不及)하면 기후가 계절보다 늦게 이르니, 이른바 다스리고 화하여 사람이 기운에 응하는 것입니다.”", "gwasangsa": "象曰 山下有火 賁니 君子 以하야 明庶政호대 无敢折獄하나니라. 상왈 산하유화 비    군자 이      명서정        무감절옥 상전에 말하였다. “산 아래에 불이 있음이 비(賁)니, 군자가 이를 본받아 뭇 정사를 밝히되 감히 옥을 판단함이 없게 한다.” 庶:많을 서·여러 서   敢:감히 감   折:꺽을 절·결단할 절   獄:감옥 옥 비괘 ( 賁卦 ) 는 산 아래에 불이 있는 상이다 . 군자는 이러한 상을 보아서 , 내괘의 이화 ( 離火 ) ☲ 는 불이고 문명하니 정치를 밝게 하며 , 외괘 간산 ( 艮山 ) ☶ 은 그치는 것이고 덕을 말하니 함부로 옥 ( 獄 ) 을 결정하여 형벌을 내리지 않는다 . 또한 호괘가 뇌수해 ( 雷水解 ) 가 되니 허물은 용서해 주고 죄는 감해 주어야 한다 . 뇌수해괘 괘상사를 참고하여 보자 . 象曰 雷雨作이 解니 君子 以하야 赦過宥罪하나니라. 상전에 말하였다. “우레와 비가 일어남이 해(解)니, 군자가 이를 본받아 허물을 용서하고 죄를 감해준다.” 효사 및 효상사", "hyosa": {"초효": "初九는 賁其趾니 舍車而徒로다. 초구    비기지    사거이도 초구는 그 발을 꾸미니, 수레를 버리고 걸어가도다. 趾:발지   舍:버릴 사·집 사   徒:걸어다닐 도·일꾼 도·징역 도·죄수 도· 다만 도 초구는 비괘에서 맨 아래에 있으니 발을 꾸미는 것과 같다 . 내괘가 이화 ( 離火 ) ☲ 로 속이 비어 있으니 수레의 상이다 . 양이 양자리에 있어 자리가 바른 초구가 외괘의 육사 대신과 정응하여 서로 꾸미고자 하는데 , 바로 위에 육이 음이 있으니 초구가 육이 음과 꾸미려다가 그만둔다 . 즉 초구가 내괘의 수레를 타려는 것은 육이 음과 꾸미려는 것이다 . 그러나 소박하게 있는 그대로 정응인 육사를 만나기 위해 수레를 버리고 걸어간다 . 초구가 변하면 내괘가 간산 ( 艮山 ) ☶ 이 되니 수레를 타지 않고 그치는 것이다 . 초구 백성이 육사 대신을 만나는데 수레를 타고 높은 행세를 할 수 없을 것이다 . 의리상 탈 수 없는 것이다 . 象曰 舍車而徒는 義弗乘也라. 상왈 사거이도    의불승야 상전에 말하였다. “수레를 버리고 걸어감은 의리상 타지 않는 것이다.” 弗:아닐 불   乘:탈 승 六二는 賁其須로다. 초구 양과 상응하는 관계이다 . 그런데 바로 아래에 구삼 양 ( 陽 ) 이 있기 때문에 육사 음이 구삼 양과 꾸미는 듯하다가 정응관계인 초구가 있으니 구삼과 꾸미지 않아 흰듯하게 보이는 것이다 . 초구가 도적이 아니면 청혼하는 것이다 . ‘ 도적이 아니면 청혼한다 ( 匪寇婚 媾 ) ’ 라는 말은 옛날 유목사회 혼인풍습에 약탈혼 ( 掠奪婚 ) 이 있는데 , 남자가 말을 타고 가서 마음에 드는 여자를 약탈해가 혼인하는 것을 말한다 . 그러니 말을 타고 약탈하는 예는 도적의 경우와 혼인의 경우가 있으니 , ‘ 도적이 아니면 청혼하리라 ’ 고 한 것이다 . 여기에서는 서로 음과 양이 정응관계에서 꾸미는 것이니 청혼하는 것이라고 하였다 . 象曰 六四는 當位疑也니 匪寇婚媾는 終无尤也라. 상왈 육사    당위의야    비구혼구    종무우야 상전에 말하였다. “육사는 마땅한 자리를 의심함이니, ‘도적이 아니면 청혼하는 것’은 마침내 허물이 없다.” 疑:의심할 의   尤:더욱 우·허물 우", "이효": "육이    비기수 육이는 그 수염을 꾸미도다. 須:수염 수·기다릴 수·잠깐 수·모름지기 수 육이는 서로 꾸미는 상황에서 응하는 효인 육오가 같은 음 ( 陰 ) 이기에 육오와 꾸미지 못하고 바로 위에 있는 구삼 양과 꾸미게 된다 . 마치 육이가 구삼의 강한 턱에 붙어있는 수염처럼 구삼이 하는 대로 따르며 꾸미는 것이다 . 象曰 賁其須는 與上興也라. 상왈 비기수    여상흥야 상전에 말하였다. “그 수염에 꾸밈은 위와 더불어 흥하는 것이다.” 육이가 수염을 꾸미는 것은 구삼과 더불어 움직이는 것이다 . 육이와 육사 사이에서 빚어지는 오해에서 벗어나 마침내 구삼을 능멸하지 못한다 . 六四는 賁如 皤如하며 白馬 翰如하니 匪寇면 婚媾리라.", "삼효": "九三은 賁如 濡如하니 永貞하면 吉하리라. 구삼    비여 유여       영정      길 구삼은 꾸미는 듯함이 젖는 듯하니, 오래도록 바르게 하면 길할 것이다. 濡: 젖을 유 구삼은 양자리에 양으로 자리는 바르나 중을 얻지 못하였다 . 또한 꾸미는데 있어 응하는 자리인 상구는 같은 양이기 때문에 서로 꾸미지 못한다 . 그래서 구삼은 바로 위아래에 있는 음과 꾸미게 된다 . 즉 구삼이 같은 내괘에 있는 육이와는 내괘 이화 ( 離火 ) ☲ 로 꾸미는 듯하고 , 또 한편으로 외괘에 있는 육사와는 내호괘가 감수 ( 坎水 ) ☵ 이니 젖는 듯 하는 것이다 . 그러니 이런 상황에서는 구삼이 육이와 육사의 두 음 사이에서 지조를 잃은 듯이 보여 다른 사람들로부터 능멸을 받을 우려가 있기 때문에 길이 바르게 해야 길하다고 하였다 . 象曰 永貞之吉은 終莫之陵也니라. 상왈 영정지길    종막지릉야 상전에 말하였다. “오래도록 바르게 해서 길함은 마침내 능멸하지 못한다.” 莫:없을 막·말 막·아득할 막·저물 모   陵:언덕 릉· 업신여길 릉 구삼이 오래도록 바르게 하면 ,", "사효": "육사    비여 파여       백마 한여      비구    혼구 육사는 꾸미는 듯함이 흰 듯하며, 흰말이 나는 듯하니, 도적이 아니면 청혼할 것이다. 皤:흴 파   翰:날개 한·흰말 한·날 한·높을 한   寇:도적 구   媾:화친할 구 육사는 음 자리에 음으로 있어 자리가 마땅하고 , 육사가 변하여 양으로 바뀐 상태에서 외호괘가 태 ☱ 가 되니 , 태 ☱ 는 후천팔괘방위로 서방으로 백색 ( 白色 ) 이 나온다 . 결국 구삼과 꾸미지 않고 순결한 흰말이 되어 나는 듯이 초구와 만나게 되니 , 육사가 음자리에 음으로 마땅한 자리에 있으면서도 , 정응관계인 초구와 상비관계인 구삼이 있으니 , 두 양 사이에서 육사가 자기 자신을 의심하는 것이다 . ‘ 도적이 아니면 청혼한다 ’ 는 것은 마침내 초구를 만나 꾸미기에 허물이 없다 . 六五는 賁于丘園이니 束帛이 戔戔이면 吝하나 終吉이리라.", "오효": "육오    비우구원       속백    잔잔      인       종길 육오는 언덕의 동산에 꾸미니, 비단 묶음이 작으면 인색하나, 마침내 길할 것이다. 丘:언덕 구   園:동산 원   束 : 묵을 속   帛:비단 백   戔:해칠 잔·쌓일 전·적을 전 육오는 양 자리에 음으로 와 외괘의 중을 얻고 있으나 , 내괘의 육이와는 같은 음으로 서로 꾸미지 못한다 . 그래서 육오는 바로 위에 있는 상구 양 ( 陽 ) 을 꾸미게 되는데 , 외괘가 간산 ( 艮山 ) ☶ 이니 상구는 언덕의 동산이 된다 . 육오가 양자리에 음으로 있어 충실한 상태가 아니기 때문에 , 육오가 비단묶음이 작으면 인색하나 길하게 되듯이 ,", "상효": "상구와 꾸미고 혹은 상구에게 청혼하는데 주는 선물인 비단묶음이 작을 수밖에 없다 . 그래서 인색하지만 , 중을 지키고 있으니 마침내 길하게 된다 . 분수에 맞게 소박하게 하라는 뜻이다 . 속백 ( 束帛 ) 은 비단 5 필을 각각 양끝에서 마주 말아 한 묶음으로 한 것을 말하는데 , 나라 사이에 빙문 ( 聘問 ) 하던 예물 ( 禮物 ) 을 뜻한다 . 또한 가례 ( 嘉禮 ) 때 납폐 ( 納幣 ) 로 쓰던 양단 ( 兩端 ) 을 뜻한다 . 그래서 육오효는 왕의 자리로 국가 원수로서 외국과 교류하거나 , 집안의 어른으로 다른 집안과 교류함에 소박하게 한다는 뜻도 있다 . 象曰 六五之吉은 有喜也라. 상왈 육오지길    유희야 상전에 말하였다. “육오의 길함은 기쁨이 있는 것이다.” 喜:기쁠 희 上九는 白賁면 无咎리라. 상구    백비    무구 상구는 희게 꾸미면 허물이 없을 것이다. 상구는 음 자리에 양으로 있고 외괘 간산 ( 艮山 ) ☶ 의 맨 위에 처하여 응하는 자리인 구삼 양과는 같은 양으로 서로 꾸미지 못한다 . 그래서 아래의 육오 음과 꾸미게 되는데 , 상구도 아무 욕심이 없이 있는 그대로 꾸미면 ( 白賁 ) 허물이 없게 된다는 뜻이다 . 象曰 白賁无咎는 上得志也라. 상왈 백비무구    상득지야 상전에 말하였다. “희게 꾸며서 허물이 없음은 위에서 뜻을 얻는 것이다.” 상구가 맨 위에서 있는 그대로의 모습으로 꾸미면 허물이 없고 , 결국 맨 위에서 상구 자신이 품었던 뜻을 얻게 된다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 304 ∼312 쪽 ."}}, {"num": 23, "ko": "산지박", "hanja": "山地剝", "lines": [0, 0, 0, 0, 0, 1], "url": "https://soosanss.tistory.com/175", "post_id": 175, "gwaui": "산이 땅 위에서 천하를 내려보듯이 소인이 득세한 세상에서도 군자는 민생을 두텁게 하고 사회를 안정시키는 노력을 한다 ( 厚下安宅 ). 덕을 보면 내괘 곤지 ( 坤 地 ) ☷ 로 순하고 외괘 간산 ( 艮山 ) ☶ 으로 그쳐있는데 , 이러한 상을 보고 군자는 양 기운과 음 기운이 사라지고 불어나고 차고 비는 자연의 법도를 깨달아 처신한다 . 괘상사를 다시 음미해 보자 . 象曰 地勢 坤이니 君子 以하야 厚德으로 載物하나니라. 상전에 말하였다. “땅의 형세가 곤이니, 군자가 이를 본받아 두터운 덕으로 만물을 싣는다.” 효사 및 효상사 初六은 剝牀以足이니 蔑貞이라 凶토다. 초륙    박상이족      멸정       흉", "gwamyung": "외괘가 간산 ( 艮山 ) ☶ , 내괘가 곤지 ( 坤地 ) ☷ 로 이루어진 괘를 ‘ 박 ( 剝 ) ’ 괘라 한다 . ‘ 박 ( 剝 ) ’ 은 깎인다는 의미로 초효부터 오효까지 자라난 음기운이 마지막 남은 상구 양 ( 陽 ) 을 깎는다는 뜻이다 . 양 ( 陽 ) 입장에서는 아래의 음기운에 의해 깎여나가는 것이다 . 그러나 상구 양 ( 陽 ) 이 소인이냐 군자이냐에 따라 그 결과는 다르다 . 산지박 ( 山地剝 ) 괘는 일양오음 ( 一陽五陰 ) 괘로 중지곤 ( 重地坤 ) 괘 상효와 중천건 ( 重天乾 ) 괘 상효를 아울러 살펴볼 필요가 있다 . 重天乾卦", "seogwa": "｢ 전 ｣ 은 산화비괘 다음에 산지박괘가 온 이유를 다음과 같이 설명하고 있다 . 賁者는 飾也니 致飾然後애 亨則盡矣라 故로 受之以剝하고 비자    식야   치식연후    형즉진의    고     수지이박 비(賁)란 꾸밈이니, 꾸밈을 이룬 다음에 형통하면 다한다. 그러므로 박(剝)으로써 받고 飾:꾸밀 식   致:이룰 치   盡: 다할 진 비괘 ( 賁卦 ) 는 꾸미는 것인데 다 꾸미고 나면 형통하지만 , 더 이상 꾸밀 것이 없기 때문에 깎여나가게 된다 . 그래서 깎인다는 박괘 ( 剝 卦 ) 를 산화비괘 다음에 두었다 .", "gwasa": "剝은 不利有攸往하니라. 박    불리유유왕 박(剝)은 가는 바를 둠이 이롭지 않다. 剝:벗길 박·깎을 박 박괘 ( 剝 卦 ) 는 마지막 남은 양이 아래의 다섯 음에 의해 깎여 나가는 것이기 때문에 , 양 ( 陽 ) 입장에서는 가는 바를 둠이 이롭지 않다 . 그러나 음 ( 陰 ) 의 입장에서는 반대일 것이다 . 《 주역》 은 군자 ( 君子 ) 를 위주로 한 학문이고 군자를 양 ( 陽 ) 으로 비유하고 있다 . 그런데 소인 ( 小人 ) 과 군자 ( 君子 ) 를 음과 양으로 대비시킬 때 , 역동적인 사회의 갈등관계에서 상대적인 관계에 있는 두 양상 , 즉 보수 ( 保守 ) 와 진보 ( 進步 ) 의 양상에서 어디를 군자로 보고 어디를 소인으로 봐야 할 것인가 ? 즉 예컨대, 보수 ( 保守 ) 를 양으로 보고 진보 ( 進步 ) 를 음으로 본다면 , 양을 군자로 보고 음을 소인으로 보는 전통적인 해석에 다소 변화를 주어야 할 것이다 . 전통적인 관념을 이해하면서도 새로운 관점도 염두에 두어야 한다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 剝은 剝也니 柔 變剛也니 단왈 박    박야    유 변강야 不利有攸往은 小人이 長也일새라. 불리유유왕    소인    장야 順而止之는 觀象也니 君子 尙消息盈虛 天行也라. 순이지지    관상야    군자 상소식영허 천행야 단전에 말하였다. “박(剝)은 깎는 것이니, 유(柔)가 강(剛)을 변하게 하니, 가는 바를 둠이 이롭지 않음은 소인이 자라기 때문이다. 순하여 그침은 상을 봄이니, 군자가 사라지고 불어나고 차고 빔을 숭상함이 하늘의 운행이다.” 變:변할 변   攸:바 유   尙:숭상할 상   消:사라질 소   息:자랄 식  盈:찰 영   虛:빌 허 오효까지 자라난 음이 양을 변하게 하여 깎는 것이다 . 마지막 남은 양이 대인 ( 大人 ) 이면 변하지 않고 다섯 음의 무리를 잘 교화시켜 감화시키지만 , 소인 ( 小人 ) 이라면 음의 세력에 편승하여 변하게 된다 . 가는 바를 둠이 이롭지 않다는 것은 음의 세력이 너무 커져 있기 때문이다 .", "gwasangsa": "象曰 山附於地 剝이니 上이 以하야 厚下하야 安宅하나니라. 상왈 산부어지 박       상    이      후하       안택 상전에 말하였다. “산이 땅에 붙어있는 것이 박(剝)이니, 상(위에 있는 군자)이 이를 본받아 아래를 후하게 하여 집을 편안하게 한다.” 附:붙을 부   厚:두터울 후   宅:집 택 박괘 ( 剝 卦 ) 는 내괘가 곤지 ( 坤地 ) ☷ 이고 외괘가 간산 ( 艮山 ) ☶ 으로 산이 땅에 붙어있는 상이다 . 또한 맨 위에 있는 양 ( 陽 ) 이 음에 의해 깎이는 상이다 . 그러면 양 ( 陽 ), 즉 군자 ( 君子 ) 는 어떻게 해야 하는가 ? 두 가지 방법이 있을 것이다 . 하나는 양 ( 陽 ) 자신을 보호하기 위해 음 ( 陰 ) 이 자신을 깎지 못하도록 아래를 두텁게 쌓아서 자기 집을 편안히 하는 것이고 , 또 하나는 후한 덕으로 아래 음을 교화시켜 모두가 사는 집을 편안히 하는 것이다 . 소인 ( 小人 ) 은 자기 자신을 보호하기 위해 두텁게 쌓아 자신을 보호하려다가 결국은 음의 세력에 의해 자기 집을 잃게 될 것이지만 , 군자 ( 君子 ) 는 음의 세력을 덕으로 교화시켜 모두가 사는 집 , 즉 이 세상을 편안하게 한다 . 여기서 산지박괘의 체가 되는 중지곤 ( 重地坤 )", "hyosa": {"초효": "초육은 상을 깎는데 발로써 하니, 바름을 멸한다. 흉하도다. 牀:평상 상   蔑:업신여길 멸·어두울 멸·멸할 멸·깎을 멸 깎여나가는 산지박 ( 山地剝 ) 괘에서 초효는 맨 아래에 있어 평상 ( 平床 ) 으로 보면 다리 ( 발 ) 에 해당한다 . 초효가 변하면 내괘가 진 ☳ 이 되니 발이 나온다 ( 震爲足 ). 양 자리에 음으로 있고 , 중도 못 얻었으며 , 응하는 육사도 같은 음 ( 陰 ) 이니 초효를 도와줄 수가 없다 . 평상의 바른 상태를 멸하는 것이니 흉하다 . 象曰 剝牀以足은 以滅下也라. 상왈 박상이족    이멸하야 상전에 말하였다. “상을 깎는데 발로써 함은 아래를 멸하는 것이다.” 六二는 剝牀以辨이니 蔑貞이라 凶토다.", "이효": "육이    박상이변      멸정       흉 육이는 상을 깎는데 언저리로써 하니, 바름을 멸한다. 흉하도다. 辨:나누일 변·분별할 변(평평한 상판과 다리로 나뉘는 곳으로 상판 언저리를 뜻함) 육이는 내괘에서 중정한 자리이지만 , 박괘 ( 剝卦 ) 의 양상이 깎여나가는 것이고 , 응하는 육오도 같은 음으로 도와주지 못하니 , 평상으로 치면 언저리까지 깎여져서 바름이 멸하는 상태이다 . 일반적으로 내괘에서 두 번째 음 자리에 음이 오면 중정 ( 中正 ) 한 상태이기 때문에 좋은 양상으로 풀이되지만 , 박괘 ( 剝卦 ) 는 전체 기운의 양상이 깎여나가는 것이니 육이효가 중정함에도 불구하고 깎여나가 흉한 상태가 된다 . 象曰 剝牀以辨은 未有與也일새라. 상왈 박상이변    미유여야 상전에 말하였다. “상을 깎는데 언저리로써 함은 더불음이 있지 않기 때문이다.” 육이와 위의 육사 ,", "삼효": "육삼이 언저리로써 깎여나가는 것은 응하는 육오가 같은 음으로 육이와 더불어 도와주지 못하기 때문이다 . 六三은 剝之无咎니라. 육삼    박지무구 육삼은 깎는데 허물이 없다. 육삼은 양자리에 음으로 와 자리가 부당하고 중도 얻지 못하였으나 , 다섯 음 가운데 유일하게 상구 양 ( 陽 ) 과 응하고 있다 . 그래서 상구의 도움을 받아 깎여나가는 허물을 면하게 된다 . 象曰 剝之无咎는 失上下也일새라. 상왈 박지무구    실상하야 상전에 말하였다. “깎는데 허물이 없음은 위와 아래를 잃기 때문이다.” 육삼이 허물을 면하게 되는 것은 상구의 도움으로 같은 음인 아래의 초육 ,", "사효": "육사    박상이부   흉 육사는 상을 깎는데 살로써 하니 흉하다. 膚: 살갗 부 육사는 내괘의 평상을 지나 외괘의 첫 자리이고 음 자리에 음으로 있으니 , 마치 평상 위에 누워 있는 사람의 살에 해당한다 . 깎여나가는 괘에서 드디어 사람의 살이 깎여나가 다치는 상황이니 흉하다 . 육사가 변하면 외괘가 이화 ( 離火 ) ☲ 가 되니 재앙을 의미한다 . 재앙에 절박하게 가까이 있는 상태를 의미한다 . 象曰 剝牀以膚는 切近災也라. 상왈 박상이부    절근재야 상전에 말하였다. “상을 깎는데 살로써 함은 재앙에 절박하게 가까운 것이다.” 切:절박할 절   近:가까울 근   災: 재앙 재 六五는 貫魚하야 以宮人寵이면 无不利리라.", "오효": "육오를 잃고 상구 양과 같이 하기 때문이다 . 六四는 剝牀以膚니 凶하니라. 육오    관어      이궁인총       무불리 육오는 고기를 꿰어서 궁인의 사랑으로써 하면, 이롭지 않음이 없을 것이다. 貫:꿸 관   魚:물고기 어   宮:집 궁   寵:괼(사랑․은총) 총 산지박 ( 山地剝 ) 괘에서 육오는 양자리에 음으로 있어 자리가 부당하나 , 외괘의 중 ( 中 ) 을 얻어 전체를 이끌어가는 왕에 해당한다 . 외괘가 간산 ( 艮山 ) ☶ 이니 깎이는 재앙이 그치는 것이고 , 또한 상구가 바로 위에 있어 교화를 받으니 깎이는 재앙이 없는 자리이기도 하다 . 그런데 왕으로 세상을 다스리는데 초효부터 사효까지의 음 소인들을 어떻게 다스려야 하는가 ? 물고기는 음에 해당하기에 마치 물고기 ( 陰 ) 들을 한결같이 꿰어서 궁녀 ( 宮女 ) 들에게 사랑을 베풀듯이 사랑을 두루 베풀면 음들이 교화를 받아 이롭지 않음이 없게 될 것이다 . 象曰 以宮人寵은 終无尤也리라. 상왈 이궁인총    종무우야 상전에 말하였다. “궁인의 사랑으로써 함은 마침내 허물이 없을 것이다” 尤:허물 우", "상효": "上九는 亢龍이니 有悔리라. 상구는 높은 용이니 뉘우침이 있을 것이다. 重地坤卦 上六 은 龍戰于野하니 其血이 玄黃이로다. 상육은 용이 들에서 싸우니, 그 피가 검고 누렇다. 上九는 碩果不食이니 君子는 得輿하고 小人은 剝廬리라. 상구    석과불식      군자    득여       소인    박려 상구는 큰 열매는 먹지 않으니, 군자는 수레를 얻고 소인은 집을 깎을 것이다. 碩:클 석   果:실과 과   食:먹을 식   輿:수레 여   廬: 오두막집 려 깎여나가는 박괘 ( 剝卦 ) 에서 상구는 양으로 맨 위에 거하고 있다 . 아래에 있는 다섯 음들이 상구를 깎고자 밀려온다 . 그러나 가을의 숙살지기 ( 肅殺之氣 ) 로 잎이 다 떨어지고 열매가 떨어지는 상황에서도 마지막 남은 큰 열매는 먹지 않고 다음 해의 농사를 위한 종자로 써서 다시 큰 수확을 거두는 것이 자연의 이치이다 . 비록 음 기운에 의해 밀려나 맨 위에 있는 유일한 양이라 할지라도 , 군자 ( 君子 ) 라면 음들을 잘 교화시켜 상구 자신을 따르게 하여 큰 수레를 얻게 되지만 , 소인 ( 小 人 ) 은 결국 음에 편승하게 되니 마지막 남은 자신의 초라한 오두막집까지도 깎이게 된다 . 난세 ( 亂世 ) 에 처한 궁박한 상황에서도 소인과 군자의 처세 결과는 다른 것이다 . 성인 ( 聖人 ) 은 결국 거름이 되어 민생구제 ( 民生救濟 ) 의 대도 ( 大道 ) 를 펴게 되니 ‘ 수레를 얻는 상 ’ 이지만 , 소인 ( 小人 ) 은 시류 ( 時流 ) 에 편승하여 온갖 나쁜 짓을 하다가 사라지는 것이다 . 象曰 君子得輿는 民所載也오 小人剝廬는 終不可用也라. 상왈 군자득여    민소재야    소인박려    종불가용야 상전에 말하였다. “군자가 수레를 얻음은 백성을 싣는 것이고, 소인이 집을 깎음은 마침내 가히 쓰지 못하는 것이다.” 載: 실을 재 군자가 큰 수레를 얻는다는 것은 천하 백성을 얻는 것이고 , 소인이 집을 깎게 된다는 것은 끝내 세상을 위해 쓰지 못함을 말한다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 313 ∼320 쪽 ."}}, {"num": 24, "ko": "지뢰복", "hanja": "地雷復", "lines": [1, 0, 0, 0, 0, 0], "url": "https://soosanss.tistory.com/176", "post_id": 176, "gwaui": "암울하고 어두운 상황에서 상서로운 새로운 기운이 들어올 때에는 그 기운을 잘 보전하고 굳게 지켜라 ( 至日閉關 ).", "gwamyung": "외괘가 곤지 ( 坤地 ) ☷ , 내괘가 진뢰 ( 震雷 ) ☳ 로 이루어진 괘를 ‘ 복 ( 復 ) ’ 이라 한다 . 산지박 ( 山地剝 ) 괘에서 박락 ( 剝落 ) 한 상구의 양이 중지곤 ( 重地坤 ) 을 거쳐 지뢰복 ( 地雷復 ) 에서 초구가 되어 다시 양 기운을 회복하게 되는 것이다 . 순음 ( 純陰 ) 의 시절에 잠복하여 있다가 다시 양 기운이 회복하는 것이기에 지극히 조심스러운 보호가 필요하다 . 지뢰복괘의 체는 중지곤괘에 있는데 , 곤괘 초효사를 다시 음미해볼 필요가 있다 . 지뢰복괘는 12 월괘로 음력 11 월 동짓달에 해당한다 . 初六은 履霜하면 堅冰이 至하나니라.", "seogwa": "｢ 전 ｣ 은 산지박괘 다음에 지뢰복괘를 둔 이유를 다음과 같이 설명하고 있다 . 剝者는 剝也니 物不可以終盡이니 剝이 窮上反下라 故로 受之以復하고 박자    박야    물불가이종진       박   궁상반하    고    수지이복 박(剝)이란 깎음이니, 물건이 가히 酒는 味方淡이요 大音은 聲正希라 현주는 맛이 바야흐로 담담하고 대음은 소리가 정히 희미함이라 此言을 如不信커든 更請問包羲하라 이 말을 믿지 못하겠거든 다시 복희씨를 청하여 물어보라", "gwasangsa": "象曰 雷在地中이 復이니 先王이 以하야 상왈 뇌재지중    복       선왕   이 至日에 閉關하야 商旅 不行하며 后不省方하니라. 지일    폐관       상려 불행      후불성방 상전에 말하였다. “우레가 땅 가운데 있음이 복(復)이니, 선왕이 이를 본받아 동짓날에 관문을 닫아 상인과 나그네가 다니지 않으며, 임금이 방소를 살피지 않았다.” 閉:닫을 폐   關:빗장 관   商:장사 상   旅:나그네 려   后:임금 후   省:살필 성 내괘의 진 ☳ 우레가 외괘의 곤 ☷ 가운데에 있는 것이 지뢰복괘의 상이다 . 순음으로 되어 있던 상태에서 드디어 양 기운이 맨 아래에서 회복하게 되니 , 이 양 기운을 지극히 조심스럽게 보호해야 한다 . 그래야 밝은 양 기운이 점차 자라나게 된다 . 선대의 왕들은 바로 이러한 이치를 본받아 삿된 기운이 들어오지 못하도록 일양 ( 一陽 ) 이 처음 생하는 동지 ( 冬至 ) 에 성의 관문을 닫아서 상인이나 나그네가 다니지 못하게 했으며 , 임금 자신도 이 때에는 지방 순시를 하지 않았다 . 이는 상서로운 양 기운을 잘 보호해서 나라의 밝은 기운을 자라나게 하기 위한 것이다 . 인간의 수행 ( 修行 ) 도 마찬가지이다 . 수련을 통해 복부의 맨 아래 ( 下丹田 ) 에서 양의 기운이 태동하면 일체 삿된 기운을 막기 위하여 방사 ( 房事 ) 도 금하면서 양의 기운을 보호해야 한다 . 효사 및 효상사", "hyosa": {"초효": "초육은 서리를 밟으면 굳은 얼음이 이른다. 初九는 不遠復이라 无祗悔니 元吉하니라. 초구    불원복      무지회    원길 초구는 머지않아 회복한다. 뉘우치는데 이름이 없으니, 크게 길하다. 遠:멀 원   祗:공경할 지·이를 지   悔:뉘우칠 회 7 을 주기로 음양기운이 왕래하는 것은 하늘의 법칙이다 . 초구는 음 기운이 왕성한 순음 ( 純陰 ) 의 중지곤 ( 重地坤 ) 에서 맨 아랫자리에서 양 기운으로 회복하였으니 , 마치 본성을 회복하여 뉘우치는데 이름이 없는 것이다 . 본성을 회복하여 밝은 기운이 상서롭게 펼쳐나가게 되니 크게 길하다 . 공자 ( 孔子 ) 는 ｢ 계사하전 ｣ 제 5 장에서 제자 안회 ( 顔回 ) 를 기리며 다음과 같이 설명하였다 . 子曰 顔氏之子 其殆庶幾乎인저. 有不善이면 未嘗不知하며 知之면 未嘗復行也하나니 易曰 不遠復이라 无祗悔니 元吉이라하니라. 공자께서 말씀하셨다. “안씨의 자식(안자)이 거의 (성인에) 가까울 것이다. 착하지 않음이 있으면 일찍이 알지 못하지 않으며, 그것을 알면 일찍이 다시는 행하지 않으니, 역(易)에 이르길 ‘머지않아 회복한다. 뉘우치는데 이름이 없으니 크게 길하다’라고 하였다 .” 象曰 不遠之復은 以脩身也라. 상왈 불원지복    이수신야 상전에 말하였다. “머지않아 회복함은 몸을 닦아서이다.” 脩:포 수·마를 수·닦을 수(修) 머지않아 회복함이 저절로 되는 것은 아니다 . 인간은 수양을 통해 몸을 닦아야 회복할 수 있다 . 몸을 닦아 회복하는 것은 극기복례 ( 克己復禮 ) 요 곧 어짊 ( 仁 ) 을 회복하는 것이다 . 《 논어 ( 論語 )》 ｢ 안연편 ( 顔淵編 ) ｣ 에 보면 안연 ( 顔子 ) 이 공자에게 어짊 ( 仁 ) 을 다음과 같이 묻고 있다 . 顔淵問仁한대 子曰 克己復禮爲仁이니 一日克己復禮면 天下歸仁焉하리니 爲仁由己니 而由人乎哉아? 顔淵曰 請問其目하노이다. 子曰 非禮勿視하며 非禮勿聽하며 非禮勿言하며 非禮勿動이니라. 顔淵曰 回雖不敏이나 請事斯語矣리이다 . 안연이 인(仁)을 묻자, 공자께서 말씀하셨다. “몸(사욕)을 이겨 예에 돌아감이 인(仁)을 하는 것이니, 하루라도 몸을 이겨 예에 돌아가면 천하가 인(仁)에 돌아가게 된다. 인(仁)을 하는 것은 자기 몸에 달려있으니, 남에게 달려있는 것이겠는가?” 안연이 “그 조목을 묻겠습니다”하고 청하자, 공자께서 말씀하셨다. “예가 아니면 보지 말며, 예가 아니면 듣지 말며, 예가 아니면 말하지 말며, 예가 아니면 움직이지 않는 것이다.” 안연이 말하였다. “제(回)가 비록 어리석으나, 청컨대 이 말씀을 따르겠습니다.” 六二는 休復이니 吉하니라. 초구 양이 소인의 본성을 회복시키는 어짊이 있기 때문에 , 이에 감화되어 육이도 아름답게 회복되고 길한 것이다 . 象曰 休復之吉은 以下仁也라. 상왈 휴복지길    이하인야 상전에 말하였다. “아름답게 회복하여 길함은 아래가 어질기 때문이다.” 六三은 頻復이니 厲하나 无咎리라. 초구의 상서로운 기운에 감화되어 순한 중도로 돈독하게 회복하게 된다 . 또한 그동안에 행했던 소인같은 행동을 반성하니 후회가 없어진다 .", "이효": "육이    휴복      길 육이는 아름답게 회복하니 길하다. 休:아름다울 휴·편안할 휴·쉴 휴 육이는 내괘에서 중정한 자리에 있다 . 유약한 소인 ( 小人 ) 의 상태에 있다가 강하고 밝은 양 ( 陽 ) 의 기운이 아래에서 회복되니 , 이에 감화되어 아름답게 본성을 회복한다 .", "삼효": "육삼    빈복      려       무구 육삼은 자주 회복하니, 위태로우나 허물은 없을 것이다. 頻: 자주 빈 육삼은 양자리에 음으로 있고 중도 얻지 못하여 , 제대로 처신하지 못하는 상황이다 . 순음의 상태에 있다가 아래에서 상서로운 양 기운이 생하니 육삼도 이에 감화되어 회복하고자 하지만 , 자리가 부당하고 중에서 벗어나 꾸준하게 회복하지 못한다 . 그래서 회복하기를 반복하게 되니 자주 회복하는 상이다 . 육삼이 변하면 지화명이 ( 地火明夷 ) 괘로 되어 회복되었다가 밝음이 상할 수도 있으니 위태로운 상황이지만 , 회복하고자 하는 의리 그 자체는 허물이 없는 것이다 . 象曰 頻復之厲는 義无咎也니라. 상왈 빈복지려    의무구야 상전에 말하였다. “자주 회복해서 위태로움은 의리가 허물이 없는 것이다.” 六四는 中行호대 獨復이로다.", "사효": "육사    중행      독복 육사는 중으로 행하되 홀로 회복하도다. 獨: 홀로 독 육사는 음 자리에 음으로 제자리에 있고 , 외괘에서 중을 얻지 못하였지만 육이효부터 상육효까지의 다섯 음의 한 가운데에 있다 . 또한 초구 양과 잘 응하고 있으니 , 주위의 음과는 달리 응하는 초구에 감화되어 회복한다 . 육사가 변하면 외괘가 진 ☳ 이 되니 , 역시 외괘에서 양 기운이 회복되는 것이다 . 육사가 중도 ( 中道 ) 로 행하여 홀로 회복하는 것은 초구와 마찬가지로 어짊의 도를 따르기 때문이다 . 象曰 中行獨復은 以從道也라. 상왈 중행독복    이종도야 상전에 말하였다. “중도로 행하여 홀로 회복함은 도를 좇기 때문이다.” 六五는 敦復이니 无悔하니라.", "오효": "육오    돈복      무회 육오는 돈독하게 회복하니 뉘우침이 없다. 敦: 도타울 돈 육오는 외괘 곤지 ( 坤地 ) ☷ 의 가운데에 있어 , 육오 인군이 돈독하게 회복하는 것은 중도로써 스스로의 잘못을 살피기 때문이다 . 象曰 敦復无悔는 中以自考也라. 상왈 돈복무회    중이자고야 상전에 말하였다. “돈독하게 회복하여 뉘우침이 없음은 중도로써 스스로 살피기 때문이다.” 考:상고할 고 上六은 迷復이라 凶하니 有災眚하야 用行師면 終有大敗하고 상륙    미복       흉      유재생       용행사    종유대패 以其國이면 君이 凶하야 至于十年히 不克征하리라. 이기국       군    흉      지우십년    불극정", "상효": "상육은 회복함에 미혹된다. 흉하니, 재앙이 있어서 군사를 행하면 마침내 크게 패함이 있고, 그 나라로 하면 인군이 흉하여 10년에 이르도록 능히 치지 못할 것이다. 迷:헤맬 미·미혹할 미   災:재앙 재(천재)    眚:재앙 생(인재)   敗:패할 패  克:능할 극   征:칠 정 상육은 상서로운 양의 기운이 들어오는 초구와 가장 멀리 떨어져 있다 . 맨 위에 처하여 밝은 세상이 오는 것을 미처 헤아리지 못하니 , 회복함에 미혹된다 . 본성을 회복하지 못하고 또한 세상이 밝게 변하고 있는 것을 헤아리지 못하니 재앙을 받게 된다 . ‘ 재 ( 災 ) ’ 는 인간으로서 어찌할 수 없는 천재 ( 天災 ) 를 말하고 , ‘ 생 ( 眚 ) ’ 은 인간의 잘못으로 초래된 재앙을 말한다 . 자신을 반성하지 못하고 그동안 자신이 해왔던 것을 고집하여 지키고자 억지로 군사를 동원하게 되면 , 결국 크게 패하게 된다 . 만일 이런 자가 나라의 인군자리에 있다면 인군으로서의 역할을 제대로 하지 못하니 흉하고 , 10 년이 되도록 치지 못하여 회복하지 못할 것이다 . 이는 인군의 바른 도에 반하기 때문이다 . 象曰 迷復之凶은 反君道也일새라. 상왈 미복지흉    반군도야 상전에 말하였다. “회복함에 미혹되어 흉함은 인군의 도에 반하기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 321 ∼329 쪽 ."}}, {"num": 25, "ko": "천뢰무망", "hanja": "天雷無妄", "lines": [1, 0, 0, 1, 1, 1], "url": "https://soosanss.tistory.com/177", "post_id": 177, "gwaui": "하늘이 부여한 성품을 바르게 지켜 나가고 , 천도의 변화에 응하여 만물을 기르라 ( 對時育物 ).", "gwamyung": "외괘가 건천 ( 乾天 ) ☰ , 내괘가 진뢰 ( 震雷 ) ☳ 로 이루어진 괘를 ‘ 무망 ( 无妄 ) ’ 이라 한다 . 지뢰복 ( 地雷復 ) 괘는 순음 ( 純陰 ) 의 상태에서 강한 양 ( 陽 ) 기운이 상서롭게 회복함을 나타낸 것이고 , 인간으로 치면 불선 ( 不善 ) 함에 물들어 있다가 착한 본성을 회복하는 것을 의미한다 . 인간이 본성을 회복한다는 것은 하늘로부터 부여받은 천성 ( 天性 ) 을 회복하는 것인데 , 원래 하늘로부터 부여받은 천성은 망령됨이 없다 . 외괘의 건천 ( 乾天 ) ☰ 은 공정무사 ( 公正無私 ) 한 하늘의 모습이며 , 내괘 초구 양은 하늘로부터 부여받은 천성을 의미한다 .", "seogwa": "｢ 전 ｣ 은 지뢰복괘 다음에 천뢰무망괘를 둔 이유를 다음과 같이 설명하고 있다 . 復則不妄矣라 故로 受之以无妄하고 복즉불망의    고    수지입무망 회복되면 망령되지 않는다. 그러므로 무망으로써 받고 유약하고 음울한 기운이 가득하다가 밝고 상서로운 양의 기운이 생하면 , 천성이 회복되어 망령됨이 없어진다 . 그래서 망령됨이 없다는 천뢰무망괘를 지뢰복괘 다음에 두었다 .", "gwasa": "无妄은 元亨하고 利貞하니 其匪正이면 有眚하릴새 不利有攸往하니라. 무망    원형      이정       기비정       유생          불리유유왕 무망(无妄)은 크게 형통하고 바름이 이로우니, 그 바르지 않으면 재앙이 있을 것이니 가는 바를 둠이 이롭지 않다. 妄:망령될 망   匪:아닐 비   眚:눈에 백태 낄 생·재앙 생(人災 ) 천성이 회복되어 망령됨이 없어진 무망 ( 无妄 ) 은 크게 형통하다 . 그렇지만 인생살이에 있어서는 바르게 해야 무망 ( 无妄 ) 이 지속될 수 있으니 , 바르게 해야 이롭다 . 만일 바르게 하지 못하면 망령됨이 있게 되고 , 그로 인한 재앙이 생겨 무슨 일을 하든지 제대로 이루어지지 않으니 , 가는 바를 둠이 이롭지 않다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 无妄은 剛이 自外來而爲主於內하니 動而健하고 단왈 무망    강    자외래이위주어내      동이건 剛中而應하야 大亨以正하니 天之命也라. 강중이응       대형이정      천지명야 其匪正有眚不利有攸往은 无妄之往이 何之矣리오. 기비정유생불리유유왕    무망지왕    하지의 天命不祐를 行矣哉아. 천명불우    행의재 단전에 말하였다. “무망(无妄)은 강(剛)이 밖으로부터 와서 안에서 주장하니, 움직이고 굳건하고, 강이 가운데 하고 응해서 크게 형통해서 바르니 하늘의 명이다. ‘그 바르지 않으면 재앙이 있어 가는 바를 둠이 이롭지 않음’은 무망(无妄)의 감이 어디를 가겠는가? 천명이 돕지 않음을 행하겠는가?” 自:부터 자   之:갈 지   祐:도울 우   矣:어조사 의   哉: 어조사 재 무망 ( 无妄 ) 은 내괘 초구의 강이 밖으로부터 와서 안을 주장하니 , 괘덕 ( 卦德 ) 이 내괘 진 ( 震 ) ☳ 으로 움직이고 외괘 건 ( 乾 ) ☰ 으로 굳건한 상이다 .", "gwasangsa": "象曰 天下雷行하야 物與无妄하니 先王이 以하야 茂對時하야 育萬物하니라. 상왈 천하뇌행       물여무망      선왕    이       무대시       육만물 상전에 말하였다. “하늘 아래에 우레가 행해서 물건마다 무망(망녕됨이 없는 천성)을 주니, 옛 왕이 이를 본받아 성하게 때를 대해서 만물을 길렀다.” 與:줄 여   茂:우거질 무·성할 무·힘쓸 무   對:대할 대   育: 기를 육 외괘의 하늘 ☰ 아래에 우레 ☳ 가 행하여 망령됨이 없는 천성 ( 天性 ) 을 만물에 부여하는 자연의 원리를 보고 , 옛 왕들은 만물이 싹트는 봄 , 무성하게 자라는 여름 , 결실을 거두는 가을 , 원기를 봉장하는 겨울 등 각 때에 맞추어 만물을 길렀다 . 이는 천지자연의 법도에 따라 정치를 잘 하였다는 뜻이다 . 무망 ( 无妄 ) 괘는 하늘로부터 부여받은 성품을 어떻게 잘 가꾸어야 하는가를 알려주는 괘이다 . 효사 및 효상사", "hyosa": {"초효": "초구가 밖으로부터 왔다는 것은 다른 괘체에서 온 것이 아니라 , 외괘의 건천 ( 乾天 ) ☰ 으로부터 천성을 회복하여 왔다는 것을 의미한다 . 또한 외괘에서 중정한 구오 양이 내괘에서 중정한 육이 음과 잘 응하고 있으니 , 이것이 크게 형통하고 바른 것으로 곧 하늘의 명인 것이다 . ‘ 바르지 않으면 재앙이 있어 가는 바를 둠이 이롭지 않다 ’ 는 것은 바르지 못해서 망령된 상태에서는 그 무엇도 제대로 할 수가 없다 . 바르지 못하면 천명 ( 天命 ) 이 돕지 않으니 제대로 갈 수가 없는 것이다 . 初九는 无妄이니 往애 吉하리라. 초구    무망       왕   길 초구는 망령됨이 없으니, 감에 길할 것이다. 초구 양은 외괘 하늘 ☰ 의 천성 ( 天性 ) 을 그대로 부여받은 상태이다 . 천성을 그대로 간직하고 내괘 진 ☳ 으로 움직여 나가니 길하다 . 하고자 하는 뜻을 이룰 수 있다 . 象曰 无妄之往은 得志也리라. 상왈 무망지왕    득지야 상전에 말하였다. “무망의 감은 뜻을 얻을 것이다.” 六二는 不耕하야 穫하며 不菑하야 畬니 則利有攸往하니라.", "이효": "육이    불경      확       불치       여    즉이유유왕 육이는 밭을 갈지 않아서 거두며, 1년 밭을 갈지 않았는데도 3년 밭이 되니, 곧 가는 바를 둠이 이롭다. 耕:밭갈 경   穫:거둘 확   菑:1년 묵은 밭 치·일굴 치   畬:3년 묵은 밭 여·새밭 여 육이는 내괘에서 중정한 자리에 있고 , 외괘 건 ☰ 에서 중정한 구오와 잘 응하고 있다 . 하늘로부터 중정한 천성 ( 天性 ) 을 받아 천리 ( 天理 ) 에 순응하고 있으니 , 하고자 하는 모든 일이 저절로 이루어진다 . ‘ 치 ( 菑 ) ’ 는 1 년 묵은 밭을 말하고 ‘ 여 ( 畬 ) ’ 는 3 년 된 밭을 말한다 . 《 이아 ( 爾雅 )》 에 의하면 , 밭이 1 년 된 것을 ‘ 치 ( 菑 ) ’ 라 하고 2 년 된 것을 ‘ 신전 ( 新田 ) ’ 이라 하며 3 년 된 것을 ‘ 여 ( 畬 ) ’ 라 한다 ( 田 一歲曰菑 二歲曰新田 三歲曰畬 ). 1 년 농사를 다 짓지 않았는데도 3 년 농사가 이루어지듯 , 모든 일이 뜻하는 대로 저절로 잘 이루어진다는 뜻이다 . 즉 의도적으로 부를 축적하려고 하지 않아도 부 ( 富 ) 하게 되는 것이고 , 또는 천성 ( 天性 ) 에 따라 살아갈 뿐 욕심이 없는 상태를 말하는 것이기도 하다 . 여기에서 노자 ( 老子 ) 의 심법을 되새겨볼 필요가 있다 . 《 도덕경》 제 51 장에 다음과 같은 내용이 있다 . 道生之하고 德畜之하며 物形之하고 勢成之하니 是以로 萬物이 莫不尊道而貴德이라. 道之尊과 德之貴는 夫莫之爵而常自然이라. 故로 道生之하고 德畜之하며 長之育之하고 亭之毒之하며 養之覆之하니 生而不有하고 爲而不恃하며 長而不宰를 是謂玄德이니라. 도가 낳고 덕은 기르며, 물건을 형상하고 형세를 이루니, 이로써 만물이 도를 높이고 덕을 귀하게 하지 않음이 없다. 도의 높음과 덕의 귀함은 무릇 누가 부여함이 없이 항상 스스로 그러한 것이다. 그러므로 도가 낳고 덕이 기르며, 자라게 하고 이루어 주며, 형통하게 하고 성숙하게 하며, 길러주고 살피니, 낳아도 소유하지 않고, 하여도 자랑하지 않고, 길러도 주재하지 않음을 이를 일컬어 ‘현묘한 덕’이라 한다 . 象曰 不耕穫은 未富也라. 상왈 불경확    미부야 상전에 말하였다. “밭을 갈지 않아도 거둠은 (억지로) 안 해도 부하게 되는 것이다.” 하늘의 중정한 천성을 받아 천리에 맞게 순응하니 , 억지로 부유하려고 하지 않아도 부유하게 된다 . 또한 중정한 천성으로 욕심이 없이 바르게 사니 혼자 부유하려고 하는 것이 아니다 . 六三은 无妄之災니 或繫之牛하나 行人之得이 邑人之災로다.", "삼효": "육삼    무망지재    혹계지우       행인지득   읍인지재 육삼은 무망의 재앙이니, 혹 소를 매나 지나가는 사람의 얻음이 읍 사람의 재앙이로다. 或:혹 혹   繫:맬 계   得: 얻을 득 육삼은 양자리에 음으로 있어 부당하고 중도 얻지 못하여 , 바른 도를 잃고 천명에 어긋나 지극히 망령된 상태이다 . 이러한 상황에서는 재앙이 있게 되니 , 마치 동네 어귀에 소를 매놓았는데 지나가던 사람이 소를 가져가서 읍 사람의 재앙이 되는 것과 같다 . 육삼이 변하면 내괘가 이화 ( 離火 ) ☲ 가 되는데 이 ( 離 ) ☲ 는 동물로 소에 해당하기도 한다 ( 중화리괘 참조 ). 그런데 ‘ 소 ( 牛 ) ’ 는 인간의 정신 ( 精神 ) 을 의미하는 상징적인 표현이다 . 중도를 잃고 배회하다가 어느 종교나 신념에 정신을 매놓지만 , 정작 지나가던 다른 사람이 자기 정신을 채가니 , 자기 정신을 잃어버리는 재앙이 되는 것이다 . 《 맹자 ( 孟 子 ) 》 ｢ 고자장구상 ( 告子章句上 ) ｣ 에 다음과 같은 문장이 있다 . 孟子曰仁은 人心也오 義는 人路也니라. 舍其路而弗由하며 放其心而不知求하나니 哀哉라! 人이 有雞犬이 放則知求之호대 有放心而不知求하나니 學問之道는 無他라 求其放心而已矣니라. 맹자께서 말씀하셨다. “어짊은 사람의 마음이요, 의로움은 사람의 길이다. 그 길을 버리고 따르지 않으며, 그 마음을 잃어버리고 찾을 줄을 모르니, 애처롭다. 사람이 닭과 개가 도망가면 찾을 줄을 알되, 마음을 잃고서는 찾을 줄을 알지 못하니, 학문하는 방법은 다른 것이 없다. 그 잃어버린 마음(放心)을 찾는 것일 뿐이다.” 象曰 行人得牛 邑人災也라. 상왈 행인득우 읍인재야 상전에 말하였다. “지나가는 사람이 소를 얻음이 읍 사람의 재앙이다.” 중도를 잃고 천성을 상실한 망령된 상태에서 정신 ( 소 ) 을 매 놓지만 지나가던 사람이 채가니 , 누구를 탓할 수 없는 자기 자신의 재앙인 것이다 .", "사효": "九四는 可貞이니 无咎리라. 구사    가정      무구 구사는 가히 바르게 하니, 허물이 없을 것이다. 구사는 음자리에 양으로 있고 중을 얻지 못한 상태이나 외괘 건천 ☰ 에 있고 , 구사가 변하면 손 ☴ 이 되니 하늘의 명에 겸손하게 따르는 상이다 . 이렇게 바르게 하면 하늘로부터 받은 성품을 굳게 지켜서 허물이 없게 된다 . 象曰 可貞无咎는 固有之也일새라. 상왈 가정무구    고유지야 상전에 말하였다. “가히 바르게 해서 허물이 없음은 굳게 두기 때문이다.”", "오효": "九五는 无妄之疾은 勿藥이면 有喜리라. 구오    무망지질    물약      유희 구오는 무망의 병은 약을 쓰지 않으면 기쁨이 있을 것이다. 疾:병 질   藥:약 약   喜: 기쁠 희 구오는 외괘 건천 ( 乾天 ) ☰ 에서 중정한 자리이다 . 그런데 구오가 변하면 외괘가 이화 ( 離火 ) ☲ 가 되어 병이 있을 수가 있다 . 망령됨이 없는 상황에서도 미처 알지 못하는 뜻밖의 병이 있을 수 있다 . 천성 ( 天性 ) 을 닦아 나가는 수양을 하는 중에도 불시 ( 不時 ) 의 병이 생길 수 있는데 , 이러한 병은 약을 쓰지 않아도 때가 되면 저절로 낳게 된다 . 또한 천성에 따라 망령됨이 없이 살더라도 , 때로는 시련이 닥칠 수 있다 . 이러한 시련에 동요되지 않고 굳게 천성을 지켜 나가면 큰 기쁨이 있게 된다 . 수양하면서 나타나는 병과 망령됨이 없이 착하게 살다가도 닥치는 시련과 같은 것은 가히 시험할 수 없는 것이다 . 象曰 无妄之藥은 不可試也니라. 상왈 무망지약    불가시야 상전에 말하였다. “무망의 약은 가히 시험하지 못한다.” 試:시험할 시", "상효": "上九는 无妄애 行이면 有眚하야 无攸利하니라. 상구    무망    행      유생       무유리 상구는 무망에 가면 재앙이 있어서 이로운 바가 없다. 상구는 외괘 건천 ( 乾天 ) ☰ 의 극에 있어 도가 지나친 상태이다 . 상구가 변하면 태택 ( 兌澤 ) ☱ 이 되니 기운이 사라지고 훼절당하여 재앙이 된다 . 망령됨이 없는 상태 그대로 있어야 한다 . 아래 내괘에서 자리가 바르지 않고 중을 얻지 못한 육삼 음과 응하고 있으니 , 상구 자신은 망령됨이 없더라도 바르지 못한 육삼에게 가면 재앙이 있게 되어 이로운 바가 없다 . 이는 맨 위에서 궁하게 되어 오는 재앙인 것이다 . 象曰 无妄之行은 窮之災也라. 상왈 무망지행    궁지재야 상전에 말하였다. “무망의 감은 궁해서 재앙이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 330 ∼336 쪽 ."}}, {"num": 26, "ko": "산천대축", "hanja": "山天大畜", "lines": [1, 1, 1, 0, 0, 1], "url": "https://soosanss.tistory.com/178", "post_id": 178, "gwaui": "망령됨이 없는 상태에서 하늘이 산 속에 들어가듯이 성인의 언행을 익히고 덕을 크게 쌓아 도를 이루라 ( 多識畜德 ).", "gwamyung": "외괘가 간산 ( 艮山 ) ☶ , 내괘가 건천 ( 乾天 ) ☰ 으로 이루어진 괘를 ‘ 대축 ( 大畜 ) ’ 이라 한다 . 하늘과 같은 큰 덕을 크게 쌓았다 , 하늘을 그치게 할 정도로 도를 얻었다는 뜻이다 . 무망 ( 无妄 ) 괘는 하늘로부터 부여받은 성품을 간직하면서 자연에 순응하여 천성을 유지함을 나타낸 것이라면 , 대축 ( 大畜 ) 괘는 천리에 순하면서도 스스로를 강건하게 하여 크게 도를 통하는 것을 의미한다 .", "seogwa": "｢ 전 ｣ 은 천뢰무망괘 다음에 산천대축괘를 둔 이유를 다음과 같이 설명하고 있다 . 有无妄然後애 可畜이라 故로 受之以大畜하고 유무망연후    가축       고   수지이대축 망령됨이 없어진 뒤에 가히 쌓을 수 있다. 그러므로 대축으로써 받고 사람이 태어나 세상을 살아가면서 인욕으로 가려진 망령됨이 없어진 다음에 도 ( 道 ) 와 덕 ( 德 ) 을 쌓을 수 있다 . 그러므로 무망괘 다음에 대축괘를 두었다 .", "gwasa": "大畜은 利貞하니 不家食하면 吉하니 利涉大川하니라. 대축    이정       불가식      길       이섭대천 대축은 바르게 함이 이로우니, 집에서 먹지 않으면 길하니, 큰 내를 건넘이 이롭다. 畜:쌓을 축·기를 휵   家:집 가   食:먹을 식   涉:걸어건널 섭 도와 덕을 크게 쌓아감에는 바르게 함이 이롭다 . 도덕을 쌓아서 세상을 경륜하고 어진 이를 길러야 하니 , 한가로이 집에 머무를 수가 없다 . 이렇게 도덕을 크게 쌓는 이유는 민생을 구제하는 큰 일을 하기 위한 것이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 大畜은 剛健코 篤實코 輝光하야 日新其德이니 단왈 대축    강건    독실    휘광       일신기덕 剛上而尙賢하고 能止健이 大正也라 강상이상현       능지건    대정야 不家食吉은 養賢也오 利涉大川은 應乎天也라. 불가식길    양현야    이섭대천    응호천야 단전에 말하였다. “대축(大畜)은 강건하고 독실하고 빛나서 날로 그 덕을 새롭게 하니, 강(剛)이 올라가서 어진 이를 숭상하고, 능히 굳건함을 그치게 하니 크게 바르다. ‘집에서 먹지 않아서 길함’은 어진 이를 기르는 것이고, ‘큰 내를 건넘이 이로움’은 하늘에 응하는 것이다.” 篤:도타울 독   輝:빛날 휘   新:새 신   尙:숭상할 상   賢:어질 현   應: 응할 응 대축은 내괘가 건천 ( 乾天 ) ☰ 으로 강건하고 외괘 간산 ( 艮山 ) ☶ 으로 독실하여 , 외괘 간산 ( 艮山 ) ☶ 으로 내괘 하늘의 굳셈을 그치게 하니 사방에 빛을 내면서 날로 그 덕을 새롭게 한다 . 지구가 자전 ( 自轉 ) 하니 하늘은 주야 ( 晝夜 ) 가 번갈아 바뀌고 지구가 공전 ( 公轉 ) 하여 춘하추동 사시 ( 四時 ) 가 바뀌듯이 , 군자는 날로 그 덕을 새롭게 한다 . 《 대학 ( 大學 )≫ 의 다음 글을 음미해 보자 . 湯之盤銘曰 苟日新이어든 日日新하고 又日新이라. 탕왕의 반명에 이르길 “진실로 어느 날에 새로워졌거든 나날이 새롭게 하고 또 나날이 새롭게 하라.” 외괘 간 ( 艮 ) ☶", "gwasangsa": "象曰 天在山中이 大畜이니 君子 以하야 상왈 천재산중    대축      군자 이 多識前言往行하야 以畜其德하나니라. 다식전언왕행       이축기덕 상전에 말하였다. “하늘이 산 가운데 있음이 대축(大畜)이니, 군자가 이를 본받아 지나간 말과 간 행실을 많이 알아서 그 덕을 쌓는다.” 識:알 식   前:앞 전   往: 갈 왕 내괘의 건천 ( 乾天 ) ☰ 하늘이 외괘의 간산 ( 艮山 ) ☶ 속 ( 가운데 ) 에 있는 상이다 . 광대무변 ( 廣大無邊 ) 한 하늘이 산 속에 있을 정도이니 , 그 덕이 무한한 것이다 . 이러한 이치를 본받아 군자는 옛 성인들의 말과 행실을 많이 알아야 하고 또한 덕을 쌓아야 한다 . 성인 ( 聖人 ) 의 언행 ( 言行 ) 은 만사 ( 萬事 ) 의 귀감 ( 龜鑑 ) 이다 . 효사 및 효상사", "hyosa": {"초효": "初九는 有厲리니 利已니라. 초구    유려      이이 초구는 위태로움이 있을 것이니, 그침이 이롭다. 厲:위태로울 려   已: 그칠 이 대축 ( 大畜 ) 괘는 굳건한 하늘을 그치게 할 정도로 큰 덕을 쌓으며 수양하는 것을 의미한다 . 그런데 수양하는 데에는 음양 ( 陰陽 ) 이 서로 응하는 것이 방해된다 . 초구는 내괘 건천 ( 乾天 ) ☰ 의 맨 아래에 있고 외괘 육사 음 ( 陰 ) 과 응하고 있다 . 초구가 응하는 육사 음을 만나고자 하면 수양을 제대로 하지 못하게 되니 만나지 말라는 것이다 . 초구가 변하면 내괘가 손 ☴ 이 되니 가지 말고 들어가 있어야 한다 ( 巽 入也 ). 象曰 有厲利已는 不犯災也라. 상왈 유려이이    불범재야 상전에 말하였다. “위태로움이 있으니 그침이 이로움은 재앙을 범하지 않는 것이다.” 犯:범할 범 내괘의 하늘 ☰ 을 외괘의 산 ☶ 이 그치게 하는 대축괘에서 내괘 아래에 있는 초구가 망령되게 움직이면 , 크게 쌓는 도를 이룰 수 없을 뿐만 아니라 재앙을 범할 수도 있다 . 초구가 변하면 산풍고 ( 山風蠱 ) 괘가 되니 좀먹는 일이 생긴다 . 초구가 경솔하게 움직이는 것 , 망령되이 움직이는 것을 막는다 . 이는 인간이 수양하면서 지켜야할 계율 ( 戒律 ) 같은 것으로 볼 수도 있다 . 象曰 六四元吉은 有喜也라. 상왈 육사원길   유희야 상전에 말하였다. “육사가 크게 길함은 기쁨이 있는 것이다.” 六五는 豶豕之牙니 吉하니라. 초구가 아래에 있는 양으로 어린 송아지와 같다면 ,", "이효": "九二는 輿說輹이로다. 구이    여탈복 구이는 수레에 당토(當免)를 벗기도다. 輿:수레 여   說:벗길 탈(脫)   輹: 당토 복 구이는 내괘의 가운데에 있다 . 구이가 변하면 이화 ( 離火 ) ☲ 가 되어 수레가 되고 불이니 위로 올라가려고 하며 , 구이가 외괘 육오 음과 응하고 있으니 가만히 그쳐 수양하기가 힘들게 된다 . 그렇지만 구이는 중도를 지켜 스스로 가지 못하도록 수레의 당토 ( 當 免 ) 를 벗겨낸다 . 구이와는 달리 상구의 양이 구삼을 잘 이끌어 주는 스승이 된다 . 내괘 건천 ☰ 이 말이고 ( 乾爲馬 ), 외호괘가 진 ☳ 이니 좋은 말로 상구를 좇아가는 상이다 . 그러나 스승을 따라 수양하는 데는 어려운 가운데 바르게 해야 이롭다 . 날로 육체를 단련하고 정신을 수련하여 , 천명을 받아 세상일을 할 수 있도록 가는 바를 둠이 이롭다 . ‘ 수레 ( 輿 ) ’ 는 좋은 말이 싣고 갈 큰 지식이요 , ‘ 호위 ( 衛 ) ’ 는 말이 잘 달려갈 수 있도록 보호하는 기술을 말한다 . 본래 원문에는 ‘ 왈한여위 ( 曰閑輿衛 ) ’ 로 되어 있으나 , ‘ 일한여위 ( 日閑輿衛 ) ’ 로 하여 풀이한다 . 象曰 利有攸往은 上이 合志也일새라. 상왈 이유유왕    상    합지야 상전에 말하였다. “가는 바를 둠이 이로움은 위(上)가 뜻을 합하기 때문이다.” 구이는 보다 힘이 세어 돼지 어금니와 같다 . 그러나 돼지를 거세 ( 去勢 ) 하면 그 힘이 약화되어 망동하지 못하니 , 수양을 계속하게 되어 길하게 된다 . 象曰 六五之吉은 有慶也라. 상왈 육오지길    유경야 상전에 말하였다. “육오의 길함은 경사가 있는 것이다.”", "삼효": "九三은 良馬逐이니 利艱貞하니 曰閑輿衛면 利有攸往하리라. 구삼    양마축       이간정      일한여위    이유유왕 구삼은 좋은 말로 쫓아가니, 어렵게 하고 바르게 함이 이로우니, 날로 수레와 호위를 익히면 가는 바를 둠이 이로울 것이다. 良:좋을 량   逐:쫓을 축   艱:어려울 간   閑:익힐 한   衛: 지킬 위 구삼은 내괘 건천 ( 乾天 ) ☰ 의 위에 있다 . 중을 얻지는 못하였으나 , 양자리에 양으로 있어 굳건하며 , 외괘에서 응하는 상구가 음이 아니고 같은 양이니 , 구삼이 가는 바를 둠이 이롭다는 것은 상구가 구삼과 뜻을 같이하기 때문이다 . 六四는 童牛之牿이니 元吉하니라.", "사효": "육사 ․ 육사    동우지곡      원길 육사는 어린 소의 외양간(빗장)이니, 크게 길하다. 童:아이 동   牿:외양간(마구간) 곡 육사는 음자리에 음으로 제자리에 있고 외괘 간산 ( 艮山 ) ☶ 아래에 처하여 초구 양과 응하고 있다 . 외괘 간산 ☶ 은 내괘 건천 ☰ 의 양을 그치게 해야 이롭다 . 그래서 초구의 어린 소가 뿔을 들이대고 망동하지 못하도록 소의 뿔에 빗장을 대어 움직이지 못하게 하여 외양간 ( 우리 ) 에 가두는 것이다 . 즉 , 육사와 마찬가지로 내괘에서 응하고 있는 구이 양이 망동하지 못하도록 견제하는 역할을 한다 . 육사효의 효상사에서는 “ 기쁨이 있다 ( 有喜 ) ” 고 하였고 , 이 육오효 효상사에서는 “ 경사가 있다 ( 有慶 ) ” 고 하였다 . 육사에서 송아지를 우리에 집어넣고 망동하지 못하게 빗장을 대는 것은 대축 ( 大畜 ) 괘에서 도를 이루어 가는 첫 번째 단계라면 , 육사에서의 외양간 ( 牿 ) 은 지켜야 할 외적 ( 外的 ) 인 계율을 말한다면 , 육사에서의 계율을 지키면 기쁨 ( 喜 ) 이 있다고 한 반면에 , 육사에서 어린 소가 망동하지 못하게 하는 계율을 지키고 ,", "오효": "육오의 유혹에 넘어가지 않도록 스스로 억제하는 것이다 . 수레에서 당토 ( 當 免 ) 는 굴대의 중앙에 있어서 차체 ( 車體 ) 와 굴대를 연결하는 물건을 말하고 , 굴대의 좌우 양 끝에 있어서 차체와 굴대를 연결하는 물건은 복토 ( 伏 免 ․ 轐 ) 라고 한다 . 象曰 輿說輹은 中이라 无尤也라. 상왈 여탈복    중       무우야 상전에 말하였다. “수레에 당토를 벗김은 가운데 함이다. 허물이 없다.” 내괘 건천 ( 乾天 ) ☰ 의 중에 있는 구이가 스스로 망령되게 움직이지 않기 위해 수레의 당토를 벗기니 허물이 없는 것이다 . 육오의 음과 응하고 있는 초구 ․ 육오    분시지아    길 육오는 거세한 돼지의 어금니니 길하다. 豶:불깐돼지 분(거세한 돼지)   豕:돼지 시   牙: 어금니 아 육오는 외괘 간산 ( 艮山 ) ☶ 의 중을 지키고 있다 . 육오에서 돼지를 거세하는 것은 도를 이루는 두 번째 단계라고 할 수 있다 . 육오에서의 ‘ 거세한 돼지 어금니 ’ 는 지켜야 할 내적 ( 內的 ) 인 계율을 뜻한다 . 그래서 육사에서의 계율보다 육오에서의 계율이 더 엄격한 것이기 때문에 , 육오에서의 계율을 지키면 경사 ( 慶 ) 가 있다고 하였다 . 즉 , 육오에서 내괘 하늘의 강한 양기를 굳게 지키면 곧 상구에서 도통하는 큰 경사가 되는 것이다 . 육오에서 돼지가 망동하지 못하게 하는 계율을 지키며 수행을 하니 , 드디어 외괘 간산 ( 艮山 ) ☶ 의 맨 위에서 내괘 하늘을 그치게 하고 큰 덕을 쌓은 상황이 된다 . 그야말로 도를 통하여 하늘거리를 노니는 것이다 . 형통하고 그 도가 크게 행한다 . 다만 , 수양을 하지 않고 덕이 부족한 자가 예컨대 설시 ( 揲蓍 ) 를 해서 이러한 상황이 나오면 , 이는 아집과 독단에 빠져 안하무인 ( 眼下無人 ) 의 생활을 하거나 , 정신착란 ( 精神錯亂 ) 의 증세가 있는 것으로 해석될 수도 있다 . 象曰 何天之衢는 道 大行也라. 상왈 하천지구    도 대행야 상전에 말하였다. “어느 하늘의 거리인가라는 것은 도가 크게 행하는 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 337 ∼344 쪽 .", "상효": "상구의 강이 위로 올라가서 육사와 육오의 어진 이를 숭상하고 , 내괘 건천 ( 乾天 ) ☰ 의 굳셈을 능히 그치게 하니 , 크게 바르다 . 세상을 올바르게 이끌어 갈 어진 이를 길러야 하니 집에서 먹을 여유가 없고 , 큰 내를 건넌다는 것은 하늘의 명에 응하여 큰 일을 하는 것이다 . 《 논어 ( 論語 )》 ｢ 위령공 ( 衛靈公 ) 편 ｣ 에 다음과 같은 문장이 있는데 , 깊이 새겨 볼 내용이다 . 子曰 人能弘道요 非道弘人이니라. 공자께서 말씀하셨다. “사람이 도를 넓히는 것이요, 도가 사람을 넓히는 것은 아니다.” 上九는 何天之衢오 亨하니라. 상구    하천지구    형 상구는 어느 하늘의 거리인가！ 형통하다. 何:어찌 하   衢:큰 거리 구(네거리 )"}}, {"num": 27, "ko": "산뢰이", "hanja": "山雷頤", "lines": [1, 0, 0, 0, 0, 1], "url": "https://soosanss.tistory.com/179", "post_id": 179, "gwaui": "만물을 기르고 성인을 기르고 수양을 하는 데는 언어를 삼가고 음식을 조절해야 한다 ( 愼言節食 ).", "gwamyung": "외괘가 간산 ( 艮山 ) ☶ , 내괘가 진뢰 ( 震雷 ) ☳ 로 이루어진 괘의 이름을 ‘ 이 ( 頤 ) ’ 라 한다 . 턱을 형상하여 말한 것이다 .", "seogwa": "｢ 전 ｣ 은 산천대축괘 다음에 산뢰이괘를 둔 이유를 다음과 같이 설명하고 있다 . 物畜然後에 可養이라 故로 受之以頤하고 물축연후    가양       고    수지이이 물건이 쌓인 다음에 가히 기를 수 있다. 그러므로 이괘로써 받고 養:기를 양 물건이 크게 쌓이면 기르지 않을 수가 없다 . 그래서 기른다는 이괘를 산천대축괘 다음에 둔 것이다 .", "gwasa": "頤는 貞하면 吉하니 觀頤하며 自求口實이니라. 이    정       길      관이       자구구실 이(頤)는 바르게 하면 길하니, 기름을 보며 스스로 입의 실물을 구한다. 頤:턱 이·기를 이·어조사 이   觀:볼 관   求:구할 구  實:열매 실·참 실·찰 실 만물을 기르는 것은 바르게 해야 길하다 . 천지가 만물을 낳아 기르고 부모가 아이를 낳아 기르는 실정 ( 實情 ) 을 보되 , 이 세상에 태어나 하늘이 부여한 성품과 명을 이행하며 살아감에는 스스로 자기의 참 모습 ( 實 ) 을 찾는 것이 중요하다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 頤貞吉은 養正則吉也니 觀頤는 觀其所養也오 단왈 이정길    양정즉길야    관이    관기소양야 自求口實은 觀其自養也라. 자구구실    관기자양야 天地 養萬物하며 聖人이 養賢하야 以及萬民하나니 천지 양만물       성인    양현      이급만민 頤之時 大矣哉라. 이지시 대의재 단전에 말하였다. “‘이(頤)가 바르게 해서 길함’은 기름을 바르게 하면 길하니, ‘기름을 봄’은 그 길러지는 바를 보는 것이고, ‘스스로 입의 실물을 구함’은 그 스스로 기름을 보는 것이다. 천지가 만물을 기르며 성인이 어진 이를 길러서 만민에게 미치니, 기르는 때가 크다.” 及: 미칠 급 ‘ 기름을 바르게 해서 길함 ’ 은 바른 것을 길러야 길하다는 것이다 . ‘ 기름을 본다 ’ 는 것은 그 길러지는 바를 보는 것이다 . 즉 , 천지가 만물을 낳아 기르는 것 , 부모가 자식을 낳아 기르는 것 , 천지자연과 인간만사의 기르는 현상을 보는 것이다 . ‘ 스스로 입의 실상을 구함 ’ 은 스스로 기르는 것을 보는 것이다 . 즉 , 만물이 천지로부터 기름을 받고 있으면서도 그 각자는 스스로의 노력을 통해 스스로를 기르고 있다 . 인간의 삶이란 궁극적으로 어느 누구에게도 의존할 수 없으며 , 또한 어느 누구에게 자신을 맡길 수도 없다 . 이와 같이 천지는 만물을 낳아 기르고 , 성인은 어진 이를 길러서 만민에게 그 덕을 미치게 하니 , 기르는 때가 큰 의미가 있는 것이다 .", "gwasangsa": "象曰 山下有雷 頤니 君子 以하야 愼言語하며 節飮食하나니라. 상왈 산하유뢰 이    군자 이       신언어       절음식 상전에 말하였다. “산 아래에 우레가 있음이 이(頤)니, 군자가 이를 본받아 언어를 삼가며 음식을 조절한다.” 愼:삼갈 신   節:마디 절·절개 절·알맞을 절·존절할 절   飮: 마실 음 외괘 간산 ( 艮山 ) ☶ 의 산 아래에 내괘 진뢰 ( 震雷 ) ☳ 의 우레가 있는 상이 이괘 ( 頤卦 ) 이다 . 위에 있는 산은 위턱으로 그쳐 있으며 , 아래에 있는 우레는 아래턱으로 움직이면서 말을 하고 음식을 먹는 상이다 . 외괘 간 ☶ 의 그침 ( 艮爲止 ) 과 내괘 진 ☳ 의 움직임 ( 震爲動 ) 이 적절한 조화를 이루어야 한다 . 그래서 군자는 이러한 이치를 보고 언어를 삼가며 , 음식을 조절한다 . 효사 및 효상사", "hyosa": {"초효": "초구는 아래턱이고 상구는 위턱이며 , 안의 음효는 이 ( 齒 ) 를 나타내어 사람의 입을 형상하였다 . 모든 화 ( 禍 ) 와 복 ( 福 ) 은 입에서 나와서 입으로 들어간다 . 언어와 음식도 입에서 나와서 입으로 들어간다 . 언어와 음식을 통해 기르기도 하고 기름을 받는다 . 初九는 舍爾靈龜하고 觀我하야 朶頤니 凶하니라. 초구    사이영귀       관아      타이    흉 초구는 너의 신령한 거북이를 버리고 나를 보고서 턱을 움직이니, 흉하다. 爾:너 이   靈:신령 령   龜:거북 귀   朶:늘어질 타·움직일 타 초구는 맨 아래 양자리에 양으로 있어 실 ( 實 ) 하다 . 그래서 위에 있는 허한 음 ( 陰 ) 을 길러줘야 한다 . 그런데 초구가 양강 ( 陽剛 ) 하여 실함에도 불구하고 맨 아래에 있다 보니 , 응하고 있는 육사 음에게 오히려 기름을 받고자 망동하며 턱을 벌리고 있는 격이다 . 신령한 거북이라는 것은 초구 자신에게 영험한 실력이 있다는 것을 말하고 , ‘ 나를 보고 턱을 움직인다 ’ 는 것은 응하고 있는 육사를 보고 음식을 달라고 턱을 벌리는 것이다 . 초구가 실하여 귀함에도 불구하고 남에게 기대니 천하게 되는 꼴이다 . 모든 인간은 하늘로부터 천성 ( 天性 ) 을 부여받아 태어난 존재이다 . 누구에게나 불성 ( 佛性 )· 신성 ( 神性 )· 자성 ( 自性 )· 영성 ( 靈性 ) 의 신령스런 거북 ( 靈龜 ) 이 있다 . 그러나 인간은 이 세상을 살아가면서 자기의 실상을 망각하고 주변의 다른 존재에 의존하게 된다 . 스스로를 깨닫고 ( 自覺 ), 스스로의 존재 ( 입의 실상 ) 를 구하라는 뜻이다 . 象曰 觀我朶頤하니 亦不足貴也로다. 상왈 관아타이       역부족귀야 상전에 말하였다. “나를 보고 턱을 움직이니, 또한 족히 귀하지 못하도다.” 亦:또 역   貴: 귀할 귀 六二는 顚頤라 拂經이니 于丘에 頤하야 征하면 凶하리라. 초구에게 기대기도 하고 때로는 상구에게 기대기도 하면서 자신의 실속만 차리고자 한다면 , 동류 ( 同類 ) 에게 신뢰를 잃게 되어 어떠한 일도 같이할 수 없게 된다 . 분수를 알고 지조를 지켜야 한다 . 象曰 六二征凶은 行이 失類也라. 상왈 육이정흉    행    실류야 상전에 말하였다. “육이가 가면 흉함은 행함이 무리를 잃는 것이다.” 六三은 拂頤貞이라 凶하야 十年勿用이라 无攸利하니라.", "이효": "육이    전이    불경       우구   이       정       흉 육이는 엎어져서 기른다. 법을 거스르니, 언덕에 이(頤)해서(기름을 구해서) 가면 흉할 것이다. 顚:머리 전·미칠 전·넘어질 전·뒤집힐 전 ) ’ 라 한다 . 크게 지나쳤다· 큰 허물· 큰 것이 지나간다는 뜻이다 . 안에 양강 ( 陽剛 ) 한 네 효가 있으나 아래 위에 있는 음효 ( 陰爻 ) 둘이 허하게 있어 본 ( 本 ) 과 말 ( 末 ) 이 약하니 크게 지나친 것이고 , 또한 큰 허물이란 뜻이다 . 그리고 호괘가 중천건 ( 重天乾 ) 으로 하늘과 같이 큰 것이 지나간다는 뜻이다 .", "seogwa": "｢ 전 ｣ 은 산뢰이괘 다음에 택풍대과괘가 온 이유를 다음과 같이 설명하고 있다 . 頤者는 養也니 不養則不可動이라 故로 受之以大過하고 이자    양야   불양즉불가동       고    수지이대과 이(頤)란 기름이니, 기르면 가히 움직이지 않음이 없다. 그러므로 대과로써 받고 산뢰이 ( 山雷 頤 ) 괘에서 기름을 받고 또 길러주면 만물이 움직이지 않을 수가 없다 . 그래서 움직임이 지나쳐서 크게 지나간다는 택풍대과 ( 澤風大過 ) 괘를 산뢰이괘 다음에 두었다 .", "gwasa": "大過는 棟이 橈니 利有攸往하야 亨하니라. 대과    동    요   이유유왕       형 대과(大過)는 마룻대(기둥)가 흔들리니, 가는 바를 둠이 이로워서 형통하다. 過:지날 과   棟:마룻대 동(집의 용마루 밑에 서까래가 걸치게 된 나무로 집 가운데에서 가장 무게가 실리는 중요 부분) 橈:휠 요·꺾일 요· 약할 요 대과 ( 大過 ) 는 중천건 ( 重天乾 ) 순양 ( 純陽 ) 의 기둥에서 초효와 상효가 음으로 약하게 되니 , 기둥 ( 마룻대 ) 이 흔들리는 상이다 . 이렇게 기둥이 흔들리니 , 이미 살던 집을 떠나 새로운 터전을 찾아서 가는 바를 둠이 이롭다 . 안에 있는 괘 , 즉 호괘가 중천건이니 천도 ( 天道 ) 가 크게 변하고 있는 것이니 , 형통하다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 大過는 大者 過也오 棟橈는 本末이 弱也라. 단왈 대과    대자 과야    동요    본말   약야 剛過而中하고 巽而說行이라. 강과이중       손이열행 利有攸往하야 乃亨하니 大過之時 大矣哉라. 이유유왕       내형       대과지시 대의재 단전에 말하였다. “대과(大過)는 큰 것이 지나가는 것이고, 기둥이 흔들림은 본과 말이 약한 것이다. 강한 것이 지나치되 가운데하고, 겸손하고 기쁨으로 행한다. 가는 바를 둠이 이로워서 이에 형통하니, 대과의 때가 크도다.” 弱:약할 약   巽:공손할 손   說:기쁠 열   乃:이에 내 대과는 큰 것이 지나가는 것이다 . 또한 안에 있는 네 양효가 음효에 비해 지나쳐 있는 상이기도 하다 . 기둥이 흔들린다는 것은 초효와 상효가 음 ( 陰 ) 으로 본과 말이 약하니 , 안에 있는 양강한 기둥이 흔들리는 것이다 . 괘덕을 보면 전체 괘의 가운데에 양효 넷이 있어 비록 강한 것이 지나쳐 있지만 , 내괘 손풍 ( 巽風 ) ☴ 으로 겸손하면서 외괘 태택 ( 兌澤 ) ☱ 으로 기뻐하면서 ( 兌爲說 ) 간다 . 그러니 가는 바를 둠이 이로워서 형통하다 . 선천 ( 先天 ) 과 후천 ( 後天 ) 이 바뀌는 이 대과 ( 大過 ) 의 때가 큰 의미가 있다 .", "gwasangsa": "象曰 澤滅木이 大過니 君子 以하야 獨立不懼하며 遯世无悶하나니라. 상왈 택멸목    대과    군자 이       독립불구      돈세무민 상전에 말하였다. “연못이 나무를 멸하는 것이 대과(大過)니, 군자가 이를 본받아 홀로 서도 두려워하지 않으며, 세상을 멀리해도 번민하지 않는다.” 滅:멸할 멸   懼:두려워할 구   遯:도망할 둔(돈)   悶: 번민할 민 대과 ( 大過 ) 괘는 내괘가 손풍 ( 巽風 ) ☴ 으로 음목 ( 陰木 ) 이고 , 외괘가 태택 ( 兌澤 ) ☱ 으로 연못이니 , 마치 연못 속에 나무가 잠겨서 뿌리가 썩는 상이다 . 그래서 연못이 나무를 멸한다고 하였다 . 또한 후천팔괘의 원리로 보면 태 ☱ 는 서방 ( 西方 ) 금 ( 金 ) 기운이고 , 손 ☴ 은 동방 ( 東方 ) 목 ( 木 ) 기운이니 , 서방의 금기운이 동방의 목기운을 극하여 멸하고 있는 것이다 . 이것을 시대적으로 풀이하면 서양의 물질문명 ( 物質文明 ) 이 동양의 정신문화 ( 精神文化 ) 를 멸하고 있는 상황으로 볼 수도 있어 , 우리의 현 시대상을 그대로 보여주고 있다 . 이러한 대과 ( 大過 ) 시대에는 뒤에 나오는 중수감 ( 重水坎 ) ․ 중화리 ( 重火離 ) 의 큰 재앙이 있고 큰 변화가 있어 , 때로는 누구에게 의지할 수 없이 홀로 서야 하고 때로는 세상을 피해야 하는 어려운 상황이 있다 . 그래서 군자는 이러한 상황을 미리 알고 홀로 있어도 두려워하지 않으며 , 세상을 멀리해도 번민하지 않는 심법과 도를 갖춘다 . 효사 및 효상사 初六은 藉用白茅니 无咎하니라. 초륙    자용백모    무구", "hyosa": {"초효": "초육은 자리를 까는데 흰 띠를 쓰니, 허물이 없다. 藉:깔개 자·깔 자   茅: 띠 모 초육은 대과 ( 大過 ) 괘 맨 아래에 있고 양자리에 음으로 있어 , 유약한 백성을 의미하는 자리이다 . 크게 지나가는 대과에 있어 유약한 백성에게는 오로지 지극한 정성 ( 精誠 ) 이 필요하다 . 초육의 백성이 제사를 드리기 위해 자리를 까는데 화려하고 풍성하게 차리지 않고 , 소박하게 차리고 또한 흰 띠풀을 깔아서 제사를 올리는데 , 이는 지극한 정성을 나타내는 것이니 허물이 없다 . 외괘가 태 ( 兌 ) ☱ 로 연못이고 ( 兌爲澤 ), 내괘 손 ( 巽 ) ☴ 이 음목 ( 陰木 ) 이니 연못가에 나는 띠풀이 된다 . 이 자리가 중요하기에 공자는 ｢ 계사상전 ｣ 제 8 장에서 다음과 같이 설명하고 있다 . 初六藉用白茅니 无咎라하니 子曰 苟錯諸地라도 而可矣어늘 藉之用茅하니 何咎之有리오 愼之至也라. 夫茅之爲物이 薄而用은 可重也니 愼斯術也하야 以往이면 其无所失矣리라 . “초육은 (제사를 올리기 위해) 자리를 까는데 흰 띠를 쓰니 허물이 없다”고 하니, 공자께서 말씀하셨다. “진실로 저 땅에 두더라도 괜찮거늘 까는데 흰 띠를 쓰니 무슨 허물이 있겠는가? 삼감의 지극함이다. 무릇 띠의 물건됨이 박하나 쓰임은 가히 소중한 것이니, 이 방법을 삼가서 써 나가면 그 잃는 바가 없을 것이다.” 象曰 藉用白茅는 柔在下也라. 상왈 자용백모    유재하야 상전에 말하였다. “자리를 까는데 흰 띠를 씀은 부드러운 것이 아래에 있어서이다.”", "이효": "九二는 枯楊이 生稊하며 老夫 得其女妻니 无不利하니라. 구이    고양   생제        노부 득기여처   무불리 구이는 마른 버들이 싹을 내며, 늙은 사내가 그 여처를 얻으니, 이롭지 않음이 없다. 枯:마를 고   楊:버들 양   稊:싹 제   妻: 아내 처 구이는 내괘의 중을 얻은 자리이다 . 내괘가 손풍 ( 巽風 ) ☴ 으로 음목 ( 陰木 ) 이고 구이가 변하면 내괘가 간산 ( 艮山 ) ☶ 이 되니 , 외괘 태택 ( 兌澤 ) ☱ 연못가의 언덕에 있는 마른 버들이 된다 . 초효 음기운에 의해 구이의 마른 버들에 새 싹이 나오는데 , 마치 늙은 남자가 젊은 여자를 아내로 맞이하는 것과 같으니 , 이롭지 않음이 없다 . 늙은 남자와 젊은 여자가 만나는 것은 지나치긴 하지만 서로 더불 수 있다 . 여기에는 생각해야 할 많은 것이 숨어있다 . 마른 버들에 싹이 난다는 것은 사회적 현상으로 볼 때 , 대 환란에 의해 젊은 남자들이 없으니 여자가 늙은 남자와 결혼을 한다는 의미가 있다 . 또한 마른 버들이니 거의 죽음에 이른 것인데 , 다시 소생하게 된다는 의미도 있다 . 무엇보다도 의미있는 것은 《 주역》 의 체계에 있어 상경 ( 上經 ) 선천에서 하경 ( 下經 ) 후천으로 넘어가는 원리를 담고 있는 것이다 . 구이가 변하면 음으로 바뀌면서 지괘가 택산함 ( 澤山咸 ) 괘로 되는데 함괘 ( 咸卦 ) 는 바로 후천의 시작을 의미하는 하경 ( 下經 ) 첫 번째 괘이다 . 象曰 老夫女妻는 過以相與也라. 상왈 노부여처    과이상여야 상전에 말하였다. “늙은 사내와 아내(여처)는 지나침으로 서로 더부는 것이다.” 구이와 마찬가지로 구오효는 선천 상경 ( 上經 ) 을 마치는 대과시대에 후천 하경 ( 下經 ) 으로 넘어가는 원리가 내재되어 있다 . 즉 구오가 변하면 외괘가 진뢰 ( 震雷 ) ☳ 가 되어 지괘가 뇌풍항 ( 雷風恒 ) 괘로 되는데 , 항괘 ( 恒卦 ) 는 대과괘 구이가 변한 택산함 ( 澤山咸 ) 괘에 이어 하경 두 번째에 자리하고 있다 . 象曰 枯楊生華 何可久也며 老婦士夫 亦可醜也로다. 상왈 고양생화 하가구야    노부사부 역가추야 상전에 말하였다. “마른 버들에 꽃이 나옴이 어찌 가히 오래갈 것이며, 늙은 아내와 젊은 남편이 또한 추하도다.” 久:오랠 구   醜:추할 추 上六은 過涉滅頂이라 凶하니 无咎하니라. 상륙    과섭멸정       흉      무구", "삼효": "九三은 棟이 橈니 凶하니라. 구삼   동    요    흉 구삼은 기둥이 흔들리니, 흉하다. 구삼은 내괘 손 ☴ 체에 있으나 , 양자리에 양으로 과강하고 중에서 벗어나 지나치게 행하는 자리이다 . 구삼이 강하게 자리를 지켜야 하는데 지나치게 행하여 응하고 있는 상육 음 ( 陰 ) 에게 동요되니 , 기둥 전체가 흔들린다 . 전체 기운이 대과 ( 大過 ) 한 상태에서는 구삼이 지나치게 처신하는 것을 어느 누구도 도와줄 수가 없다 . 구삼이 변하면 지괘 ( 之卦 ) 가 택수곤 ( 澤水困 ) 괘로 되니 , 매우 곤궁한 상황이 된다 . 흉하게 되지 않으려면 굳게 자기 자리를 지켜야 한다 . 象曰 棟橈之凶은 不可以有輔也일새라. 상왈 동요지흉    불가이유보야 상전에 말하였다. “기둥이 흔들려 흉함은 가히 도움이 있지 못하기 때문이다.” 輔:광대뼈 보·덧방나무 보·도울 보", "사효": "九四는 棟隆이니 吉커니와 有它면 吝하리라. 구사    동륭      길          유타    인 구사는 기둥이 높아지니 길하지만, 다른 것을 두면 인색할 것이다. 隆:성할 륭·높을 륭   它:다를 타 구사는 내괘에서 외괘로 올라갔으니 , 기둥이 높아진 상태이다 . 마룻대 ( 기둥 ) 가 흔들려 위태로운 상태에서 구사는 외괘로 올라갔으니 , 흔들리는 위험에서 벗어난 상태이다 . 그런데 위로 올라가 자기 자리를 잘 지키고 있어야 함에도 불구하고 , 다른 것을 두면 , 즉 응하는 관계인 초육 음 ( 陰 ) 에게 마음을 두면 다시 흔들려 인색하게 된다 . 구사는 외괘에서 구오와 뜻을 같이 하여 굳게 자리를 지켜야 한다 . 象曰 棟隆之吉은 不橈乎下也일새라. 상왈 동륭지길    불요호하야 상전에 말하였다. “기둥이 높아져 길함은 아래에 흔들리지 않기 때문이다.” 구사가 높아져 길하게 되는 것은 아래에 있는 무리들 특히 초육 음에게 흔들리지 않기 때문이다 . 만일 아래에 있는 음에게 흔들리게 되면 인색할 뿐만 아니라 , 전체를 위험한 상황에 빠지게 하는 허물을 범할 수도 있다 .", "오효": "九五는 枯楊이 生華하며 老婦 得其士夫니 无咎나 无譽리라. 구오    고양    생화       노부 득기사부   무구    무예 구오는 마른 버들이 꽃을 피우며, 늙은 아내가 그 사부(젊은 남편)를 얻으니, 허물이 없으나 명예도 없을 것이다. 華:꽃 화   婦:지어미 부   夫:지아비 부   譽: 기릴 예 구오는 외괘 태 ☱ 에서 중정 ( 中正 ) 한 자리이다 . 호괘가 중천건 ( 重天乾 ) 이 되니 마른 버들인데 , 위에 있으니 꽃을 피우는 자리이다 . 구오는 태 ☱ 연못의 상효 음기운으로 때가 지났음에도 불구하고 늦게 꽃을 피우는 상이다 . 마치 늙은 여자가 젊은 남자를 얻어 결혼하는 것과 같으니 , 그 자체가 허물이 되는 것은 아니지만 명예로울 것도 없다 . 그렇지만 마른 버들에서 꽃을 피운들 오래갈 수는 없고 , 나이 많은 여자가 젊은 남자와 혼인하면 자녀를 잘 낳지 못한다 . 오늘날 현대사회에서 여성의 결혼연령이 높아지고 자기보다 어린 남자들과 결혼하는 예가 많은 것을 이와 관련해 생각해볼 수 있다 . 구오효가 변하면 하경 두 번째인 뇌풍항괘가 되어 후천을 의미하는 하경 ( 下經 ) 이 시작되는 첫 두 괘를 대과 ( 大過 ) 괘가 내포하고 있다 . 《 주역》 64", "상효": "상육은 지나치게 건너다 이마를 멸한다. 흉하니 허물할 데가 없다. 涉:건널 섭   滅:멸할 멸   頂: 정수리 정 대과괘에 있어 상육은 태 ☱ 의 맨 위에 처하여 이미 기운이 쇠한 상태이다 . 그런데 강한 양을 지
