 . 주왕의 폭정을 간하다가 유리 ( 羑里 ) 지방에 있는 옥 ( 獄 ) 에 갇히니 , 백성이 문왕의 덕을 기렸던 것이다 . 문왕은 옥 ( 獄 ) 에 갇혀 있으면서 역 ( 易 ) 을 연구하여 괘사 ( 卦辭 ) 를 지었다고 전해져 내려오고 있다 . '어렵게 하면서 바르게 함이 이롭다'는 것은 그 밝음을 그믐으로 하는 것이다 . 밝음을 그믐으로 한다는 것은 , 밝은 덕과 지혜가 있어도 그믐과 같이 어두운 체하며 어려운 상황을 이겨내는 것이다 . 이렇게 해서 안으로 어려우면서도 능히 뜻을 바르게 지키니 기자 ( 箕子 ) 가 그러했던 것이다 . 기자는 주왕의 숙부 ( 제을 帝乙 의 동생 ) 로 주왕의 폭정 ( 暴政 ) 에 거짓 미치광이 ( 佯狂 ) 노릇을 하며 목숨을 보전하였다 . 문왕의 아들인 무왕 ( 武王 ) 이 주 왕을 정벌하고 주나라를 세운 뒤 , 무왕이 기자를 찾아가 정치 ( 政治 ) 의 대법 ( 大法 ) 을 묻자 , 기자는 무왕 에게 ｢ 홍범구주 ( 洪範九疇 ) ｣ 를 전해 주었다고 한다 . 홍범구주는 《 서경 ( 書經 )》 ｢ 주서 ( 周書 ) ｣ 에 수록되어 있다 . ( 彖辭 ) 에 언급되었듯이 ‘ 용회이명 ( 用晦而明 ) ’ 을 한다 . 밝음이 상한 어려운 상황에서 상육과 가까이 있으니 , 바르게 함이 이롭다 . 은말주초의 시대적 배경에서는 은나라 말기 폭정으로 인해 암울한 상황에서도 기자 ( 箕子 ) 는 폭군 주왕의 잘못을 간하다 죽거나 멀리 떠나지 않고 , 거짓 미치광이 노릇을 하며 종이 되어 화를 면하면서도 안으로는 바름을 지켰으니 , 이것이 ‘ 기자의 밝음이 상한 것 ’ 이다 . 象曰 箕子之貞은 明不可息也라. 상왈 기자지정    명불가식야 상전에 말하였다. “기자의 바름은 밝음을 가히 쉬지 않는 것이다.” 기자가 바르게 했다는 것은 비록 미친 체하며 밝은 덕을 숨기고 있었지만 , 사실 안으로는 밝은 덕을 한시도 쉬지 않았던 것이다 . 《 논어 ( 論語 )》 ｢ 미자 ( 微子 ) ｣ 편에서 공자는 다음과 같이 언급하고 있다 . 微子는 去之하고 箕子는 爲之奴하고 比干은 諫而死하니라. 孔子 曰殷有三仁焉하니라 . 미자는 떠나가고 기자는 종이 되고 비간은 간하다가 죽었다. 공자께서 말씀하셨다. “은나라에 세 어진 이가 있었다.” 上六은 不明하야 晦니 初登于天하고 後入于地로다. 상륙    불명      회    초등우천       후입우지", "gwasangsa": "象曰 明入地中이 明夷니 君子 以하야 莅衆에 用晦而明하나니라. 상왈 명입지중   명이    군자 이       이중    용회이명 상전에 말하였다. “밝음이 땅 가운데 들어감이 명이(明夷)니, 군자가 이를 본받아 무리에 다다름에 그믐을 써서 밝힌다.” 莅:임할 리·다다를 이   衆:무리 중   晦: 그믐 회 밝음이 땅 속에 들어가 , 밝음이 상한 것이 명이 ( 明夷 ) 다 . 시대가 어려운 난국 ( 難局 ) 이고 , 폭군이 어두운 정치를 하니 , 현인 ( 賢人 )· 군자 ( 君子 ) 가 감히 세상에 나서지 못하는 때이다 . 이러한 때에 군자는 뭇 백성에 임함에 밝은 덕과 지혜가 있어도 이를 드러내지 않고 어둡고 어리석은 체하면서 백성을 밝게 깨우친다 . 소인 ( 小人 ) 이 득세하여 어려운 때에 군자가 처하는 도 ( 道 ) 는 매우 조심스럽다 . 여기서 위와 아래가 막힌 천지비 ( 天地否 ) 괘와 소인이 득세하는 천산돈 ( 天山遯 )", "hyosa": {"초효": "初九는 明夷于飛애 垂其翼이니 君子于行애 三日不食하야 有攸往애 主人이 有言이로다. 초구    명이우비    수기익      군자우행    삼일불식       유유왕    주인    유언 초구는 날고자 하는데 밝음이 상함에 그 날개를 드리우니, 군자가 감에 3일을 먹지 않아서, 가는 바를 둠에 주인이 말이 있도다. 飛:날 비   垂:드리울 수   翼:날개 익   攸:바 유 초구는 내괘 이화 ( 離火 ) ☲ 의 맨 아래에 있다 . 밝음이 상해 있는 상황에서 이화 ( 離火 ) ☲ 로 날아가고자 하지만 , 초구가 변하면 간산 ( 艮山 ) ☶ 이 되어 그치게 되니 날개를 접어 드리운다 . 명이 ( 明夷 ) 초구가 변하면 내괘 이화 ( 離火 ) ☲ 가 간산 ( 艮山 ) ☶ 으로 되니 , 날아가지 않고 산으로 들어가는 상이다 . 象曰 君子于行은 義不食也라. 상왈 군자우행    의불식야 상전에 말하였다. “군자가 가는 것은 의리가 먹지 않는 것이다.” 六二는 明夷에 夷于左股니 用拯馬 壯하면 吉하리라.", "이효": "육이효는 문왕 , 육이    명이   이우좌고    용증마 장       길 육이는 밝음이 상함에 왼쪽 다리를 상하니, 구원하는 말이 건장하면 길할 것이다. 股:넓적다리 고   拯:건질 증·도울 증   壯:씩씩할 장 육이는 내괘에서 중정한 자리에 있다 . 밝음이 상한 형국이지만 내괘에서 중정하여 덕을 지키니 , 상한 형국에서도 크게 다치지 않고 다만 뜻을 이루지 못하는 것이기에 ‘ 왼쪽 다리를 상한다 ’ 고 하였다 . 그러나 중정한 육이를 구원해주는 자가 건장하면 다시 육이의 뜻이 세상에 펼쳐질 수 있으니 길하다 . 육이를 구원해 주는 말은 구삼의 양 ( 陽 ) 이 된다 . 은말주초 ( 殷末周初 ) 의 시대적 상황으로 보면 , 주나라 문왕 ( 文王 ) 이 은나라 주왕의 폭정으로 유리 ( 羑 里 ) 지방에 있는 옥 ( 獄 ) 에 갇히니 , 세상에 나갈 수 없어 왼쪽 다리가 상해 있는 상황이다 . 그렇지만 구원하는 말이 건장하면 , 즉 문왕의 아들인 무왕 ( 武王 ) 이 군사를 일으켜 폭군 주왕을 정벌하면 문왕의 덕이 행해질 수 있으니 길한 것이다 . 문왕은 주왕에 의해 옥에 갇힌 어려운 상황에 있으면서도 순하게 때를 기다리고 중도 ( 中道 ) 로 마땅한 법도를 준칙으로 삼으니 길하게 된 것이다 . 象曰 六二之吉은 順以則也일새라. 상왈 육이지길    순이칙야 상전에 말하였다. “육이의 길함은 순함으로써 법하기 때문이다.”", "삼효": "구삼효는 무왕 , 九三은 明夷于南狩하야 得其大首니 不可疾貞이니라. 구삼    명이우남수      득기대수    불가질정 구삼은 밝음이 상함에 남쪽으로 사냥해서 그 큰 머리를 얻으니, 빨리 바르게 할 수 없다. 狩:사냥할 수 구삼은 양자리에 양으로 있어 강한 상태이다 . 밝음이 상해 있는 상황에서 외호괘 진뢰 ( 震雷 ) ☳ 로 군사를 일으켜 밝음을 상하게 하는 주체로 구삼과 응하고 있는 상육 음 ( 陰 ) 을 정벌하여 그 우두머리를 얻는다 . 지화명이괘에서는 상육이 실질적인 권력을 가진 왕이 되나 , 밝음을 상하게 하는 주체이기 때문에 왕이라 하지 않고 ‘ 대수 ( 大首 ) ’ 라고 하였다 . 구삼이 변하여 양이 음으로 바뀌면 지괘 ( 之卦 ) 가 지뢰복 ( 地雷復 ) 괘로 되니 다시 회복하는 상이다 . 은말주초의 시대적 상황으로 보면 , 문왕의 아들 무왕이 군사를 일으켜 은나라 마지막 왕인 폭군 주왕을 정벌하는 것을 말한다 . 그러니 폭군 주왕을 정벌하여 백성들을 위한 바른 정치를 하겠다는 뜻을 크게 얻는다 . 그런데 아무리 폭군이라 하여도 천자 ( 天子 ) 는 천자이니 , 천자를 신하가 정벌하는 것은 쉬운 일이 아니다 . 그래서 천리 ( 天理 ) 에 순하고 백성의 마음을 얻어야 하니 , 아무리 명분이 있더라도 급하게 할 수는 없다 . 또한 아무리 옳더라도 급격한 변화가 일어나면 백성이 불안하고 동요되기 때문에 , 구시대의 잘못된 인습을 바꾸기 위해서는 서서히 변화를 일으켜야 한다 . ‘ 질 ( 疾 ) ’ 은 ‘ 병들다 ’ 는 의미이나 여기서는 ‘ 빠르다 ’ 는 뜻으로 해석한다 . 象曰 南狩之志를 乃大得也로다. 상왈 남수지지    내대득야 상전에 말하였다. “남쪽으로 사냥하는 뜻을 이에 크게 얻도다.” 六四는 入于左腹하야 獲明夷之心하야 于出門庭이로다.", "사효": "육사효는 미자 , 육사    입우좌복      획명이지심       우출문정 육사는 왼쪽 배에 들어가서 밝음이 상하게 한 자의 마음을 얻어서 문밖 뜰에 나서도다. 腹:배 복   獲:얻을 획   庭: 뜰 정 육사는 외괘 곤지 ( 坤地 ) ☷ 의 아래에 있고 ( 坤爲腹 ), 육사가 변하면 외괘가 진 ( 震 ) ☳ 이 되는데 진 ( 震 ) ☳ 은 후천팔괘방위로 동쪽 즉 왼쪽이 되니 , 왼쪽 배에 해당한다 . 육사는 음 자리에 음으로 제자리를 얻어 전체 상황에서는 권력을 잡고 밝음을 상하게 하는 상육의 신하에 해당한다 . 그래서 밝음이 상하는 때에 육사가 상육의 심복 ( 心腹 ) 으로 생명을 보전하나 , 육사가 변하면 외괘가 진 ☳ 이 되니 끝까지 상육과 같이하지 않고 상육의 휘하에서 벗어나 문밖을 나서는 것이다 . 은말주초의 시대적 상황에서 볼 때 , 외괘 곤지 ( 坤地 ) ☷ 는 은 ( 殷 ) 나라에 해당하는데 당시 폭군 주왕의 서형 ( 庶兄 ) 인 미자 ( 微子 ) 가 주왕의 폭정을 자주 간하다가 끝내 말을 듣지 않자 , 나중에는 은나라의 신주 ( 神主 ) 를 훔쳐 은나라 왕궁을 나섰다는 의미이다 . 象曰 入于左腹은 獲心意也라. 상왈 입우좌복    획심의야 상전에 말하였다. “왼쪽 배에 들어감은 마음과 뜻을 얻는 것이다.” 六五는 箕子之明夷니 利貞하니라.", "오효": "육오효는 기자 , 육오    기자지명이    이정 육오는 기자의 밝음이 상한 것이니, 바르게 함이 이롭다. 육오는 외괘에서 중을 얻은 자리이다 . 일반적으로 오효가 왕의 자리가 되지만 , 명이괘는 밝음이 상하여 암울한 상황을 나타내는 것이기 때문에 , 암울함의 극치가 되는 상육효가 밝음을 상하게 하는 주체 , 즉 폭군이 된다 . 따라서 육오는 폭군의 바로 아래에 있기 때문에 , 스스로가 지닌 밝은 덕을 내세우면 상육에 의해 화를 입고 생명을 보전하기 어려운 상황이다 . 그래서 스스로 어두운 체하여 ,", "상효": "상육효는 폭군 주왕을 묘사하고 있다 . 상육은 밝지 않아서 그믐이니, 처음에는 하늘에 오르고 나중에는 땅에 들어가도다. 晦:그믐 회   登: 오를 등 상육은 외괘 끝에 처하여 명이 ( 明夷 ) 의 주인이 되고 , 지극히 밝음이 상한 곳에 해당하니 , 밝지 못해서 그믐이 되는 상이다 . 가장 높은 자리에 있으니 , 처음에는 하늘에 오르는듯하지만 나중에는 밝음이 상하여 땅으로 들어간다 . 은말주초의 시대적 배경으로 보면 , 상육의 자리는 은나라 마지막 왕인 폭군 주 ( 紂 ) 를 의미한다 . 주왕은 은나라의 천자 ( 天子 ) 로서 처음에는 정치를 잘 하였다고 하나 , 나중에는 폭정 ( 暴政 ) 으로 백성을 괴롭히고 나라를 어지럽히다가 결국에는 주나라 무왕에 의해 제위 ( 帝位 ) 에서 물러나게 된다 . 그러니 처음에는 하늘에 오르지만 나중에는 땅에 들어가는 격이다 . 즉 , 처음에는 천자가 되어 천하를 비추다가 뒤에는 법도를 잃어 땅속에 들어가게 된 것이다 . 응하는 자리인 구삼의 무왕 ( 武王 ) 이 상육의 주왕을 정벌하니 , 주왕을 끝으로 은나라 시대가 막을 내리고 주 ( 周 ) 나라 시대가 새롭게 열리게 되었다 . 象曰 初登于天은 照四國也오 後入于地는 失則也라. 상왈 초등우천    조사국야    후입우지    실칙야 상전에 말하였다. “처음에 하늘에 오름은 사국(천하)을 비추는 것이고, 뒤에 땅에 들어감은 법도를 잃었기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 421 ∼ 429 쪽 ."}}, {"num": 37, "ko": "풍화가인", "hanja": "風火家人", "lines": [1, 0, 1, 0, 1, 1], "url": "https://soosanss.tistory.com/189", "post_id": 189, "gwaui": "직장에서나 가정에서나 원만한 조화를 이루기 위해서는 저마다의 본분을 지키고 맡은바 역할을 충실히 수행하여야 한다 ( 言行有恒 ).", "gwamyung": "외괘가 손풍 ( 巽風 ) ☴ , 내괘가 이화 ( 離火 ) ☲ 로 이루어진 괘를 ‘ 가인 ( 家人 ) ’ 이라 한다 . 불이 바람을 타고 잘 타오르듯이 , 바람 ☴ 과 불 ☲ 은 한 집안이란 뜻이다 . 또한 불이 타면 따뜻한 바람이 일듯이 , 한 솥밥을 먹으며 화목한 집안을 가꾼다는 뜻이다 .", "seogwa": "｢ 전 ｣ 은 지화명이괘 다음에 풍화가인괘를 둔 이유를 다음과 같이 설명하고 있다 . 夷者는 傷也니 傷於外者 必反其家라 故로 受之以家人하고 이자    상야    상어외자 필반기가    고   수지이가인 이(夷)라는 것은 상함이니, 밖에서 상한 자는 반드시 그 집으로 돌아온다. 그러므로 가인으로 받고 명이 ( 明夷 ) 는 밝음이 상한 것이다 . 밖에 나가서 상하게 되면 반드시 집안으로 돌아와 안식 ( 安息 ) 을 하게 되니 , 지화명이괘 다음에 풍화가인괘를 두었다는 뜻이다 .", "gwasa": "家人은 利女貞하니라. 가인    이여정 가인(家人)은 여자가 바르게 함이 이롭다. 가인 ( 家人 ) 괘는 집안을 의미하고 , 집안 살림살이는 주로 여자로부터 이루어진다 . 내괘가 이화 ( 離火 ) ☲ 로 중녀 ( 中女 ) 이고 외괘가 손풍 ( 巽風 ) ☴ 으로 장녀 ( 長女 ) 이니 , 내괘와 외괘의 상이 모두 음괘 ( 陰卦 ) 로 이루어져 있다 . 그렇지만 가인괘에 있어서 각 효 자리의 역할은 , 내괘는 여자의 도로써 , 외괘는 남자의 도로써 풀이되고 있다 . 남존여비 ( 男尊女卑 ) 의 중세 봉건적인 이념을 차치하고 , 오늘날 남녀평등 ( 男女平等 ) 의 이념이 실현되고 있는 현대사회에 있어서도 여자의 바름이 이로운 것은 틀림없는 말이다 . 한편 , 풍화가인괘의 진정한 뜻은 각자가 본분을 지켜 마땅히 해야 할 역할을 충실히 하여야 한다는 것이다 . 따라서 괘사의 “ 利 女 貞 ” 을 여자가 바르게 해야 한다는 뜻으로만 한정할 것이 아니라 , 남자든 여자든 한 집안에서 각자의 역할을 바르게 해야 한다는 뜻으로 보아야 한다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 家人은 女 正位乎內하고 男이 正位乎外하니 단왈 가인    녀 정위호내       남    정위호외 男女正이 天地之大義也라. 남녀정    천지지대의야 家人이 有嚴君焉하니 父母之謂也라. 가인    유엄군언      부모지위야 父父子子兄兄弟弟夫夫婦婦而家道正하리니 부부자자형형제제부부부부이가도정 正家而天下 定矣리라. 정가이천하 정의 단전에 말하였다. “가인(家人)은 여자가 안에서 자리를 바르게 하고, 남자는 밖에서 자리를 바르게 하니, 남녀가 바르게 함이 천지의 큰 의리이다. 가인(家人)에 엄한 인군이 있으니 부모를 말한다. 아비는 아비답게, 자식은 자식답게, 형은 형답게, 동생은 동생답게, 남편은 남편답게, 아내는 아내답게 하여 집안의 도가 바르게 될 것이니, 집안을 바르게 하여야 천하가 정해질 것이다. 嚴:엄할 엄   謂:이를 위   兄:맏 형   弟: 아우 제 여자는 안에서 본분을 바르게 하고 남자는 밖에서 본분을 바르게 하는 것이 천지의 큰 뜻이다 . 천지 ( 天地 ) 는 자연의 본성에 따라 본분을 지켜 나갈 때 만물을 잘 생화하듯이 , 가정의 도는 각자의 역할과 본분에 충실하여야 한다 . 중세 봉건적 계급질서에서 인격평등의 현대사회로 전환되었어도 , 남녀가 각자 맡은 안팎의 역할을 바르게 해나가는 가인 ( 家人 ) 의 도는 바뀌지 않는다 . 천지의 조물주가 있고 나라를 이끄는 지도자가 있듯이 , 집안에는 엄한 인군이 있으니 가장 ( 家長 ) 으로서의 부모 ( 父母 ) 이다 . 아버지 , 자식 , 형 , 아우 , 남편 , 아내가 각자의 본분을 잘 지켜나갈 때 집안의 도가 바르게 되고 , 사회의 기본단위인 집안마다 가도 ( 家道 ) 가 바르게 되면 결국 나라가 바르게 되고 천하가 바르게 된다 . 《 대학 ( 大學 )》 ｢ 제가치국장 ( 齊家治國章 ) ｣ 에 있는 다음 구절을 음미해 볼 필요가 있다 . 所謂治國이 必先齊其家者는 其家를 不可敎오 而能敎人者 無之하니 故로 君子는 不出家而成敎於國하나니 孝者는 所以事君也오 弟者는 所以事長也오 慈者는 所以使衆也니라. 이른바 “나라를 다스림이 반드시 먼저 그 집안을 가지런히 함에 있다”는 것은 그 집안을 가르치지 못하고 능히 남을 가르칠 수 있는 자가 없으니, 그러므로 군자는 집을 나가지 않고 나라에 가르침을 이루니, 효(孝)는 인군을 섬기는 방법이요, 제(弟)는 어른을 섬기는 방법이요, 자(慈)는 무리를 이끄는 방법이다. 一家 仁이면 一國이 興仁하고 一家 讓이면 一國이 興讓하고 一人이 貪戾하면 一國이 作亂하나니 其機如此하니 此謂一言이 僨事며 一人이 定國이니라. 한 집안이 어질면 한 나라가 어짊을 흥기하고, 한 집안이 사양하면 한 나라가 사양함을 흥기하고, 한 사람이 탐하고 어그러지면 한 나라가 난을 일으키니, 그 기틀이 이와 같으니, 이것을 일러 ‘한 마디 말이 일을 그르치며, 한 사람이 나라를 안정시킨다’고 하는 것이다.", "gwasangsa": "象曰 風自火出이 家人이니 君子 以하야 言有物而行有恒하나니라. 상왈 풍자화출    가인      군자 이       언유물이행유항 상전에 말하였다. “바람이 불로부터 나오는 것이 가인(家人)이니, 군자가 이를 본받아 말에는 실지가 있고 행동에는 항상함이 있게 한다. 가인괘는 내괘가 이화 ( 離火 ) ☲ 로 불이고 , 외괘가 손풍 ( 巽風 ) ☴ 으로 바람의 상이다 . 불이 타오르면 기압 ( 氣壓 ) 에 차이가 생겨 기류 ( 氣 流 ) 가 형성되면서 바람이 일게 된다 . 불로부터 일어나는 바람은 따뜻한 바람이다 . 모닥불을 피워놓고 둘러앉아서 화목한 이야기를 나눈다 . 아름다운 정경이다 . 불은 인간의 정신 ( 精神 ) 이고 , 말과 행동은 정신으로부터 나온다 . 군자는 헛된 말을 하지 않고 행동에는 항상함이 있어 모든 사람이 믿고 따르게 한다 . 집안의 도나 정치의 도나 다 마찬가지이다 . 효사 및 효상사", "hyosa": {"초효": "初九는 閑有家면 悔 亡하리라. 초구    한유가    회 망 초구는 집에 있어서 익히면 후회가 없을 것이다. 閑:익힐 한· 막을 한 가인 ( 家人 ) 괘에 있어서 내괘 이화 ( 離火 ) ☲ 는 여자의 도리를 중심으로 말하고 , 외괘 손풍 ( 巽風 ) ☴ 은 남자의 도리를 중심으로 말하고 있다 . 초구는 내괘 맨 아래에 있으니 시집 안간 처녀를 의미한다 . 요조숙녀 ( 窈 窕 淑女 ) 로 집에 있으면서 예의범절과 가도 ( 家道 ) 를 익히면 나중에 결혼하여 가정을 잘 꾸려 나가게 되니 후회가 없다 . 집에서 가도 ( 家道 ) 를 익히는 것은 뜻을 저버리는 것이 아니라 , 뜻을 이루고자 하는 것이다 . 초구가 변하면 내괘가 간산 ( 艮山 ) ☶ 이 되니 집에 그쳐 있는 상이다 . ‘ 한 ( 閑 ) ’ 은 ‘ 막는다 ’ 는 뜻도 있으나 여기서는 ‘ 익힌다 ’ 는 뜻으로 새긴다 . 象曰 閑有家는 志未變也라. 상왈 한유가    지미변야 상전에 말하였다. “집에 있어서 익힘은 뜻이 변하지 않는 것이다.” 六二는 无攸遂오 在中饋면 貞吉하리라.", "이효": "육이    무유수    재중궤   정길 육이는 이루는 바가 없고, 집안에서 음식을 지으면, 바르게 해서 길할 것이다. 攸:바 유   遂:이룰 수   饋:먹일 궤 육이는 내괘에서 중정 ( 中正 ) 한 자리이다 . 집안에서 살림을 맡은 며느리이다 . 외괘에서 중정한 구오가 남편이 되니 , 내괘에서 중정한 아내는 집안의 살림을 맡아 제사를 받들고 ( 奉祭祀 ) 손님을 맞으면서 ( 接賓客 ) 가도를 실현한다 . 음 자리에 음으로 있어 바르고 중도를 지키니 , 순하고 공손하게 집안 살림을 잘 한다 . ‘ 궤 ( 饋 ) ’ 는 먹이다 ․ 드리다 ․ 식사 등의 뜻이 있고 , 《 주례 ( 周禮 )》 에는 높은 사람에게 물건을 진상하는 것을 궤라 하였다 ( 進物於尊者曰饋 ). ‘ 중궤 ( 中饋 ) ’ 는 집안에서 부녀자가 음식을 만드는 것 또는 그 음식 , 부인 또는 아내를 뜻한다 . 象曰 六二之吉은 順以巽也일새라. 상왈 육이지길    순이손야 상전에 말하였다. “육이의 길함은 순해서 공손하기 때문이다.”", "삼효": "九三은 家人이 嗃嗃하니 悔厲나 吉하니 婦子 嘻嘻면 終吝하리라. 구삼    가인    학학      회려    길       부자 희희    종린 구삼은 집 사람이 엄숙하게 하니 위태로움에 뉘우치나 길하니, 아내와 자식이 희희덕거리면 마침내 인색할 것이다. 嗃:엄할 학   嘻:웃을 희 구삼은 내괘 이화 ( 離火 ) ☲ 의 맨 위에 있으니 , 집안 여자 중에는 가장 연장자 ( 年長者 ) 로 시어머니를 뜻한다 . 시어머니로서 며느리에게 또한 딸에게 엄하게 하니 안쓰럽게 여겨 뉘우치기도 하고 때로는 갈등이 일어 위태롭기도 하지만 , 집안의 도를 세우고자 하는 것이니 길하다 . 그러나 시어머니의 엄숙한 기강 ( 紀綱 ) 이 없어 집안의 처자 ( 妻子 ) 들이 희희덕거리기만 하면 , 내내 즐거운 모습인 것 같지만 결국에 가서는 집안의 절도를 잃게 되어 인색하게 된다 . 오늘날의 이른바 핵가족 ( 核家族 ) 시대에 있어서도 집안 어른이 가풍 ( 家風 ) 을 전하고 , 후손은 집안 어른을 존중하는 예가 필요하다 . 象曰 家人嗃嗃은 未失也오 婦子嘻嘻는 失家節也라. 상왈 가인학학    미실야   부자희희    실가절야 상전에 말하였다. “집 사람이 엄함은 잃지 않는 것이요, 아내와 자식이 희희덕거림은 집안의 절도를 잃는 것이다.” 六四는 富家니 大吉하니라.", "사효": "육사   부가    대길 육사는 집을 부하게 하니, 크게 길하다. 육사는 외괘 손풍 ( 巽風 ) ☴ 에 있어 남자의 도를 나타낸다 . 음 자리에 음으로 자리가 마땅하고 , 외괘 손풍 ☴ 의 아래에 있어 지극히 순하니 , 밖에서도 겸손의 덕으로 일을 하여 집안을 부하게 한다 . 육사가 변하면 지괘 ( 之卦 ) 가 천화동인 ( 天火同人 ) 괘가 되니 , 밖에 나가서도 겸손하게 사람과 뜻을 같이하여 일을 한다 . 크게 길하다 . 象曰 富家大吉은 順在位也일새라. 상왈 부가대길    순재위야 상전에 말하였다. “집을 부하게 하여 크게 길함은 순함이 자리에 있기 때문이다.”", "오효": "九五는 王假有家니 勿恤하야 吉하리라. 구오    왕격유가   물휼       길 구오는 왕이 집안을 지극히 하니, 근심하지 말아서 길할 것이다. 假:빌 가·거짓 가·이를 격 구오는 외괘의 중정한 자리니 집안으로 보면 가장 ( 家長 ) 이지만 나라로 보면 왕 ( 王 ) 이다 . 나라를 다스리는 왕도 집안을 지극히 하니 , 모든 식솔 ( 食率 ) 이 근심을 하지 않고 길하다 . 집안을 지극히 한다는 것은 구오와 정응인 육이 아내와 사귀어 서로 사랑함과 더불어 가족 모두에게 사랑을 두루 베푸는 것을 말한다 . 가장 ( 家長 ) 이 사랑을 베풀어 집안을 지극히 하듯이 , 왕 ( 王 ) 은 정치를 잘 해서 백성과 나라를 지극히 한다 . ‘ 가 ( 假 ) ’ 는 ‘ 거짓 ’ 이라 할 때는 ‘ 가 ’ 로 발음하고 , ‘ 지극하다 ’ 고 할 때는 ‘ 격 ’ 으로 발음하니 , 여기서는 지극하다는 뜻이다 . 象曰 王假有家는 交相愛也라. 상왈 왕격유가    교상애야 상전에 말하였다. “왕이 집안을 지극히 함은 사귀어 서로 사랑하는 것이다.” 구오의 아들 가장 ( 家長 ) 이 집안을 잘 이끌어 갈 것이라는 믿음 , 시어머니 ( 할머니 ) 가 며느리와 딸들에게 가도 ( 家道 ) 를 잘 가르칠 것이라는 믿음 , 자식 ․ 손자들이 잘 클 것이라는 믿음을 두고 위엄을 지키면 마침내 길하게 된다 . 위엄 ( 威嚴 ) 이라는 것은 인생의 경륜에서 나오는 것이니 , 곧 그동안의 생애 ( 生涯 ) 와 경험을 돌이켜 반성하면서도 삶의 지혜를 후손에게 전해주는 것을 의미한다 . 象曰 威如之吉은 反身之謂也라. 상왈 위여지길    반신지위야 상전에 말하였다. “위엄있게 해서 길한 것은 몸을 반성함을 말한다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 430 ∼436 쪽 .", "상효": "上九는 有孚코 威如면 終吉하리라. 상구    유부    위여   종길 상구는 믿음을 두고 위엄있게 하면 마침내 길할 것이다. 威: 위엄 위 상구는 맨 위에 처하여 집안으로 보면 가장 높은 어른 , 즉 시아버지요 , 할아버지이다 . 집안의 가장 높은 어른으로서는 믿음을 두고 위엄을 지켜야 한다 ."}}, {"num": 38, "ko": "화택규", "hanja": "火澤睽", "lines": [1, 1, 0, 1, 0, 1], "url": "https://soosanss.tistory.com/190", "post_id": 190, "gwaui": "모든 만물은 태극에서 나와 하나이지만 , 현실의 세상사는 이해관계나 가치관에 따라 서로 다르다 . 어긋나 있는 상황을 풀어가는 지혜는 같게 할 것은 같게 하고 다르게 할 것은 다르게 하는 것이다 ( 同同異異 ). 돈독한 믿음으로 있던 상태에서 중부괘 육사 음이 위로 올라가 구오와 자리를 바꾸니 외괘의 중을 얻고 내괘 구이 양과 잘 응하게 되는데 , 그러나 이로 인해 전체 상황이 어긋나게 되어 육오와 구이가 잘 응하더라도 큰 일은 못하고 작은 일은 길한 것이다 . 하늘은 위에 있고 땅은 아래에 있어서 때로는 그 기운이 어긋나도 만물을 생화하는 일은 같으며 , 남자와 여자가 어긋나도 인간으로서의 삶을 구현하고 후손을 낳아 기르고자 하는 뜻은 통하며 , 만물이 어긋나도 보다 나은 상태로 행복하고 조화롭게 하려는 일은 같은 것이다 . 때문에 어긋남을 때에 맞게 활용하고 , 어긋남을 쓰는 것이 큰 의의가 있다 .", "gwamyung": "외괘가 이화 ( 離火 ) ☲ , 내괘가 태택 ( 兌澤 ) ☱ 으로 이루진 괘를 ‘ 규 ( 睽 ) ’ 라고 한다 . 어긋난다는 뜻이다 . 상황이 어긋나 있어 서로가 흘겨본다는 뜻으로 ‘ 규 ( 睽 ) ’ 라고 하였다 . 외괘의 이화 ( 離火 ) ☲ 불은 위에서 타오르고 , 내괘의 태택 ( 兌澤 ) ☱ 연못의 물은 아래로 내려가기만 하니 서로 어긋나기만 한다 .", "seogwa": "｢ 전 ｣ 은 풍화가인괘 다음에 화택규괘가 온 이유를 다음과 같이 설명하고 있다 . 家道 窮必乖라 故로 受之以睽하고 가도 궁필괴    고    수지이규 집안의 도가 궁하면 반드시 어긋난다. 그러므로 규로써 받고 乖:어그러질 괴 집안마다 가풍 ( 家風 ) 과 가도 ( 家道 ) 가 있다 . 아무리 어려운 상황에서도 가도와 가풍을 지켜나가야 대대손손 화목하고 번창한 집안을 이어갈 수 있다 . 그러나 이 집안의 도가 궁하게 되면 반드시 어그러지게 된다 . 그래서 가인괘 다음에 어긋난다는 규 ( 睽 ) 괘를 둔 것이다 .", "gwasa": "睽는 小事는 吉하리라. 규    소사   길 규(睽)는 작은 일은 길할 것이다. 睽:외면할 규·등질 규·부릅뜰 규 규 ( 睽 ) 는 상황이 어긋나 있는 때이다 . 어긋나 있는 상황에서는 큰 일을 할 수 없으며 , 어긋나 있는 상태를 조금씩 풀어나가는 작은 일은 길하다 . 상황이 어긋나게 되는 동기는 의외로 사소한 데서 비롯된다 . 말 한마디에 어긋나고 사소한 이해관계로 어긋난다 . 때문에 큰 일보다 오히려 작은 일을 잘 해결하면 길하다 . 어긋난 상황에서 어긋남의 실마리를 풀지 않고 크게만 나가려고 하면 더욱 어렵게 된다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 睽는 火動而上하고 澤動而下하며 二女 同居하나 其志 不同行하니라. 단왈 규    화동이상       택동이하      이녀 동거       기지 부동행 說而麗乎明하고 柔 進而上行하야 得中而應乎剛이라 是以小事吉이니라. 열이리호명       유 진이상행      득중이응호강       시이소사길 天地 睽而其事 同也며 男女 睽而其志 通也며 천지 규이기사 동야    남녀 규이기지 통야 萬物이 睽而其事 類也니 睽之時用이 大矣哉라. 만물    규이기사 류야      규지시용 대의재 단전에 말하였다. “규(睽)는 불은 움직여서 위로 오르고, 못은 움직여서 내려가며, 두 여자가 한 곳에 거하나 그 뜻이 같이 행하지 않는다. 기뻐해서 밝은 데에 걸리고 유(柔)가 나아가 위로 행해서 중을 얻어 강(剛)에 응하고 있다. 이로써 작은 일은 길하다. 천지가 어긋나도 그 일은 같으며, 남녀가 어긋나도 그 뜻은 통하며, 만물이 어긋나도 그 일은 같으니, 규의 때와 씀이 크도다.” 說:기쁠 열   麗:걸릴 리 규 ( 睽 ) 는 외괘의 불 ☲ 은 움직여서 위로 오르고 , 내괘의 연못 ☱ 은 움직여서 내려가니 , 서로가 뜻을 같이하지 못한다 . 또한 이화 ( 離火 ) ☲ 중녀 ( 中女 ) 와 태택 ( 兌澤 ) ☱ 소녀 ( 小女 ) 가 한 괘에 같이 있지만 , 그 뜻이 같이 행하지 못한다 . 괘덕을 보면 내괘 태택 ☱ 으로 기뻐하고 외괘 이화 ☲ 로 밝은 데 걸려있으며 ,", "gwasangsa": "象曰 上火下澤이 睽니 君子 以하야 同而異하나니라. 상왈 상화하택    규    군자 이      동이이 상전에 말하였다. “위에는 불 아래에는 연못이 규(睽)니, 군자가 이를 본받아 같으면서도 다르게 한다.” 위에는 불이 있어 타오르기만 하고 아래에는 연못이 있어 물이 아래로만 흐르듯이 , 각자 자기 일만 하고 자기 주장만 하니 , 집안이든 사회· 국가든 위와 아래가 어긋나 있는 것이다 . 이러한 상을 보고 군자는 같고 다름을 분별하여 같은 것은 같게 하고 다른 것은 다르게 하여 그 형평 ( 衡平 ) 을 도모한다 . 남자와 여자 , 경영자와 근로자 등 사회현상에는 각자의 역할에 따라 다른 상황이 존재하지만 , 바라는 희망과 인간으로서의 본질은 사실 같은 것이다 . 다른 것을 억지로 같게 하려고 하고 , 같게 해야 할 것을 억지로 다르게 하면 어긋나게 된다 . 이 규괘 ( 睽 卦 ) 는 사회정의 ( 社會正義 ) 를 구현하는 방법론을 제시하고 있다 . 같아야 할 것은 같게 하고 , 다르게 해야 할 것은 다르게 하라 . ◎ 규괘는 어긋나 있기 때문에 각 효는 서로 응하는 관계에 있는 자와 만나서 어긋남을 풀어야 하는 것으로 풀이된다 . 효사 및 효상사", "hyosa": {"초효": "初九는 悔 亡하니 喪馬하고 勿逐하야도 自復이니 見惡人하면 无咎리라. 초구    회 망      상마       물축          자복       견악인      무구 초구는 뉘우침이 없어지니 말을 잃고 쫓지 않아도 스스로 돌아오니, 악한 사람을 보면 허물이 없을 것이다. 悔:뉘우칠 회   喪:잃을 상   逐:쫓을 축   復:돌아올 복   惡: 악할 악 어긋나는 상황에 있어 초구는 아래에 있는 백성이다 . 초구 백성은 어긋나있는 상황을 능동적으로 해소할 수 없다 . 초구 백성은 응하는 자리에 있는 구사 대신 ( 大臣 ) 이 어긋난 상황을 잘 풀기만을 기다리면 된다 . 그래서 뉘우침이 없어지니 자기를 구해줄 말인 구사를 잃고 쫓지 않아도 , 초구에게 해를 입힐 수 있는 사람을 만나더라도 잘 하면 오히려 더 큰 화 ( 禍 ) 를 모면할 수 있다 . 이는 전화위복 ( 轉禍爲福 ) 이란 뜻이다 . 象曰 見惡人은 以辟咎也라. 상왈 견악인    이피구야 상전에 말하였다. “악한 사람을 봄은 허물을 피하는 것이다.” 辟:피할 피(避)·임금 벽·다스릴 벽", "이효": "九二는 遇主于巷하면 无咎리라. 구이    우주우항       무구 구이는 주인을 거리에서 만나면, 허물이 없을 것이다. 遇:만날 우   巷: 거리 항 구이 양 ( 陽 ) 은 내괘에서 중을 지키고 있고 , 외괘에서 중을 지키고 있는 육오 음 ( 陰 ) 과 잘 응하고 있다 . 위와 아래가 서로 어긋나 있는 상황에서 구이 선비가 육오 인군을 공개적으로 만나면 , 다른 대신 ( 大臣 ) 이나 백성이 오해할 소지가 있다 . 그래서 아무도 모르게 비공개적으로 육오 주인 ( 왕 ) 을 후미진 ‘ 거리 ’ 에서 만난다 . 《 증운 ( 增韻 )》 에 ‘ 곧은 길을 가 ( 街 ) 라 하고 굽은 길을 항 ( 巷 ) 이라 ’ ( 直曰街 曲曰巷 ) 고 하였듯이 , 항 ( 巷 ) 은 대로 ( 大路 ) 가 아닌 골목의 후미진 곳을 말한다 . 구이· 구이와 구사가 육삼이 상구를 만나러 오는 것을 못 가게 방해하고 또한 육삼이 형벌까지 받는 것이 , 마치 ‘ 돼지가 진흙을 짊어지고 귀신이 한 수레에 실려 오는 것 ’ 과 같이 보인다 . 그래서 처음에는 상구 자신을 해치려는 도적으로 보아 활로 쏘려다가 , 나중에 알고 보니 온갖 어려움을 무릅쓰고 상구를 만나자고 오는 것이니 , 활을 벗겨 육삼과 만나 해후 ( 邂 逅 ) 를 하여 길하게 된다 .", "삼효": "육삼    견여예    기우 체    기인   천차의    무초    유종 육삼은 수레를 끌고 그 소를 당기며 그 사람이 하늘하고 또 코 베임을 보니, 처음은 없고 마침은 있을 것이다. 輿:수레 여   曳:끌 예   掣:끌 체·당길 철   天:문신할 천(형벌)   劓:코벨 의 육삼은 양자리에 음으로 있고 중을 얻지 못하여 , 어긋난 상황에서 가장 어려운 자리이다 . 육삼이 어긋남을 해소하기 위해 응하고 있는 상구 양 ( 陽 ) 을 만나고자 온갖 노력을 다한다 . 그러나 육삼을 둘러싸고 있는 구이와 구사가 육삼이 행하는 것을 막는데 , 아래의 구이는 육삼이 가지 못하도록 수레를 뒤에서 당기고 , 육삼·", "사효": "구사 대신이 백성을 구하고자 스스로 오게 된다 . ‘ 악한 사람을 보면 허물이 없다 ’ 는 것은 어긋나있는 상황에서 허물을 피하고 흉함을 면하고자 하면 오히려 더욱 더 어긋나게 될 뿐이고 , 구사는 소가 가지 못하도록 앞에서 막고 있는 격이다 . 더 나아가서는 상구를 만나고자 하는 육삼이 ‘ 이마에 먹물을 넣어 표를 내거나 머리를 깎아버리는 형벌 ( 天 ) ’ 을 받고 또 코 베이는 형벌 ( 劓 ) 을 받으니 , 이렇게 처음에는 험난한 고난을 당하지만 나중에는 상구를 만나는 뜻을 이룰 수가 있다 . 象曰 見輿曳는 位不當也오 无初有終은 遇剛也일새라. 상왈 견여예    위부당야   무초유종    우강야 상전에 말하였다. “수레 끄는 것을 봄은 자리가 마땅하지 않은 것이고, 처음은 없고 마침은 있다는 것은 강을 만나기 때문이다.” 九四는 睽孤하야 遇元夫하야 交孚니 厲하나 无咎리라. 구사   규고       우원부       교부    려       무구 구사는 어긋남에 외로워서 원부(元夫)를 만나 미덥게 사귀니, 위태로우나 허물은 없을 것이다. 孤:외로울 고   遇:만날 우 구사는 외괘 이화 ( 離火 ) ☲ 에서 대신 자리에 있다 . 나라를 다스리는 각료로서 위아래가 어긋나서 나라 전체가 어려운 상황을 풀어야 한다 . 그런데 육오 인군과도 어긋나 있으니 , 책임은 있으나 공개적으로 해결해 나가기가 어려워 매우 외로운 상황이다 . 그래서 구사 대신으로서는 초구 백성인 원부 ( 元夫 ) 를 만나 미덥게 사귀면서 백성의 고충을 들어야 하니 , 때로는 위태롭지만 허물은 없다 . 이는 구사의 뜻이 행해지는 것이다 . 象曰 交孚无咎는 志行也리라. 상왈 교부무구    지행야 상전에 말하였다. “미덥게 사귀어 허물이 없음은 뜻이 행해지는 것이다.” 六五는 悔亡하니 厥宗이 噬膚면 往애 何咎리오. 구사 등 각각의 종당 ( 宗黨 ) 이 서로 문제를 해결하려고 만나고 다투는 상황 ( 噬 膚 ) 이 전개되면서 어긋남이 해소되려는 조짐이 보이면, 그때 육오 인군이 나서서 해결하게 되니 뉘우침이 없어진다 . 모두가 어긋남을 해소하고자 노력하는 과정에서 육오 인군이 결정적인 역할을 하니 , 나라로서는 큰 경사가 있게 되는 셈이다 . 象曰 厥宗噬膚는 往有慶也리라. 상왈 궐종서부    왕유경야 상전에 말하였다. “그 종당이 살을 씹음은 가서 경사가 있을 것이다.”", "오효": "육오의 유음 ( 柔陰 ) 이 나아가 위로 행하여 외괘에서 중을 얻어 내괘 구이 강 ( 剛 ) 과 응하고 있기 때문에 작은 일은 길하다 . 이는 괘변작용으로 설명한 것이다 . 풍택중부 ( 風澤中孚 ) 육오를 아무도 모르게 후미진 곳에서 만나는 것은 어긋남을 해소하기 위한 것이기 때문에 도 ( 道 ) 를 잃는 것이 아니다 . 어긋나 있는 상황을 타개하기 위해 비공개적인 회합을 마련하고 , 때로는 특사 ( 特使 ) 를 파견하는 것을 말한다 . 象曰 遇主于巷이 未失道也라. 상왈 우주우항    미실도야 상전에 말하였다. “주인을 거리에서 만남이 도(道)를 잃지 않는 것이다.” 六三은 見輿曳코 其牛 掣며 其人이 天且劓니 无初코 有終이리라. 육오    회망      궐종    서부    왕    하구 육오는 뉘우침이 없어지니 그 종당(宗黨)이 살을 씹으면 감에 무슨 허물이겠는가? 厥:그 궐   噬:씹을 서   膚:살 부 육오는 어긋난 상황에서 인군 자리에 있다 . 외괘 이화 ( 離火 ) ☲ 에서 중을 지키고 있고 밝은 덕을 지니고 있지만 , 양자리에 음으로 있기 때문에 유약하여 문제를 적극적으로 해결하기가 어렵다 . 결국 초구·", "상효": "上九는 睽孤하야 見豕負塗와 載鬼一車라. 상구    규고      견시부도    재귀일거 先張之弧라가 後說之弧하야 匪寇라 婚媾니 往遇雨하면 則吉하리라. 선장지호      후탈지호       비구    혼구    왕우우       즉길 상구는 어긋남에 외로워서 돼지가 진흙을 짊어진 것과 귀신을 한 수레 실은 것을 본다. 먼저는 활을 쏘려다가 뒤에는 활을 벗겨서, 도적이 아니라 혼인을 하자는 것이니, 가서 비를 만나면 곧 길할 것이다. 豕:돼지 시   負:질 부   塗:진흙 도   載:실을 재   張:베풀 장   弧:활 호   說:벗길 탈   寇:도적 구   婚:혼인할 혼 媾:화친할 구  遇:만날 우 외괘의 끝에 처한 상구 역시 어긋남에 외로운 상황이다 . 자기와 응하고 있는 육삼을 만나 어긋남을 해소해야 하는데 , 상구가 육삼을 만나 고통을 위로하고 어긋남을 해소하니 모든 의심이 없어진다 . 象曰 遇雨之吉은 群疑 亡也라. 상왈 우우지길    군의 망야 상전에 말하였다. “비를 만나 길함은 뭇 의심이 없어지는 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 437 ∼44 4 쪽 ."}}, {"num": 39, "ko": "수산건", "hanja": "水山蹇", "lines": [0, 0, 1, 0, 1, 0], "url": "https://soosanss.tistory.com/191", "post_id": 191, "gwaui": "산을 넘고 물을 건너듯이 , 어려움이 계속되는 상황에서는 몸을 돌이켜 반성하고 덕을 닦으며 때를 기다려라 ( 反身脩德 ).", "gwamyung": "외괘가 감수 ( 坎水 ) ☵ , 내괘가 간산 ( 艮山 ) ☶ 으로 이루어진 괘를 ‘ 건 ( 蹇 ) ’ 이라 한다 . 산을 넘어야 하고 산을 넘으면 또 큰 강물이 기다린다 . 산전수전 ( 山戰水戰 ) 을 거쳐야 하는 험난함이다 . 그래서 절고 전다고 하여 ‘ 건 ( 蹇 ) ’ 이라 하였다 . 또한 후천팔괘방위로 보면 외괘 감수 ( 坎水 ) ☵ 는 겨울 북방이고 , 내괘 간산 ( 艮山 ) ☶ 은 동북방이니 추운 한 겨울에 산 속을 헤매다 발이 꽁꽁 얼어붙는 상이다 .", "seogwa": "｢ 전 ｣ 은 화택규괘 다음에 수산건괘를 둔 이유를 다음과 같이 설명하고 있다 . 睽者는 乖也니 乖必有難이라 故로 受之以蹇하고 규자    괴야    괴필유난      고    수지이건 규(睽)란 어긋남이니, 어긋나면 반드시 어려움이 있다. 그러므로 건(蹇)으로 받고 乖:어그러질 괴   難:어려울 난 상황이 어긋나면 모두가 절고 저는 어려움에 빠지게 된다 . 그래서 규괘 ( 睽 卦 ) 다음에 건괘 ( 蹇卦 ) 를 둔 것이다 .", "gwasa": "蹇은 利西南하고 不利東北하며 利見大人하니 貞이면 吉하리라. 건    이서남      불리동북       이견대인       정       길 건(蹇)은 서남은 이롭고 동북은 이롭지 않으며 대인을 봄이 이로우니, 바르게 하면 길할 것이다. 蹇:절 건·어려울 건 절고 저는 건 ( 蹇 ) 의 상황에서는 험하지 않고 평평한 서남쪽이 이로우며 험준한 산이 많은 동북쪽은 이롭지 않다 . 험한 상황에 있으니 도와줄 대인을 찾아봄이 이롭고 , 험한 때일수록 더욱 바르게 하면 길하게 된다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 蹇은 難也니 險在前也니 見險而能止하니 知矣哉라. 단왈 건    난야    험재전야   견험이능지       지의재 蹇利西南은 往得中也오 不利東北은 其道 窮也오 건이서남    왕득중야    불리동북    기도 궁야 利見大人은 往有功也오 當位貞吉은 以正邦也니 이견대인    왕유공야    당위정길    이정방야 蹇之時用이 大矣哉라. 건지시용    대의재 단전에 말하였다. “건(蹇)은 어려운 것이니 험함이 앞에 있으니, 험함을 보아 능히 그치니 지혜롭다. 건(蹇)이 서남이 이로움은 가서 중을 얻은 것이고, 동북이 이롭지 않음은 그 도가 궁한 것이고, 대인을 봄이 이로움은 가서 공이 있음이요, 자리가 마땅해서 바르게 해서 길함은 나라를 바르게 하는 것이니, 건(蹇)의 때와 쓰임이 크다.” 難:어려울 난   險:험할 험   止:그칠지   往:갈 왕   邦:나라 방 산을 넘어야 하고 물을 건너야 하는 건 ( 蹇 ) 은 매우 어려운 상황이다 . 괘로 보면 외괘 감수 ( 坎水 ) ☵ 의 험함이 있는데 , 그 험함을 외호괘 이화 ( 離火 ) ☲ 로 밝게 보고 내괘 간산 ( 艮山 ) ☶ 으로 능히 그치니 , 이것을 지혜 ( 智慧 ) 라고 한다 . 험함을 미리 예견하고 그 험함에 빠지지 않는 지혜가 필요한 것이다 . 서남쪽이 이로움은 평평한 곳으로 가서 중도를 얻기 때문이고 , 동북쪽이 이롭지 않음은 그 도가 궁해지기 때문이다 . 효 ( 爻 ) 로 보면 외괘에서 구오가 중을 얻어 중도를 지키고 있으며 구오가 변하면 외괘가 곤지 ( 坤地 ) ☷ 로 되어 후천팔괘방위로 서남방이 되니 평평한 곳에서 무리를 얻는 상이다 . 대인을 봄이 이롭다는 것은 어려운 상황을 구제해 줄 수 있는 대인을 찾아서 어려움을 극복하니 공이 있다는 것이다 . 수산건 ( 水山蹇 ) 괘는 초효를 제외한 나머지 다섯 효가 모두 양자리에 양 , 음자리에 음으로 있어 자리가 마땅하다 . 바르게 해서 길하다는 것은 나라의 모든 백성이 바르게 하는 것을 말한다 . 어려움을 나타내는 건괘 ( 蹇卦 ) 는 그 때와 쓰임이 크다 . 나라를 위해 정치를 하고 백성을 이끌어가는 데는 흥망 ( 興亡 ) 의 질곡이 있는데 , 때로 닥치는 어려움을 잘 극복하면 중흥 ( 中興 ) 의 큰 전환기를 맞이할 수가 있다 .", "gwasangsa": "象曰 山上有水 蹇이니 君子 以하야 反身脩德하나니라. 상왈 산상유수 건       군자 이      반신수덕 상전에 말하였다. “산 위에 물이 있는 것이 건(蹇)이니, 군자가 이를 본받아 몸을 돌이키고 덕을 닦는다.” 反:되돌릴 반   脩:닦을 수(修) 건괘 ( 蹇卦 ) 는 산 ☶ 위에 물 ☵ 이 있는 형상이다 . 험준한 산 위에 또 물이 있으니 , 이렇게 험한 상황에 처하게 되면 스스로 몸을 돌이켜 반성하고 덕을 닦는다 . 모든 원인은 밖에 있는 것이 아니라 , 자기 자신에게 있는 것이다 . 《 맹자 ( 孟子 )》 ｢ 이루장구상 ( 離婁章句上 ) ｣ 에 다음과 같은 문장이 있다 . 孟子曰 愛人不親이어든 反其仁하고 治人不治어든 反其智하고 禮人不答이어든 反其敬이니라. 行有不得者어든 皆反求諸己니 其身正而天下歸之니라. 맹자께서 말씀하셨다. “사람을 사랑해도 친해지지 않거든 그 어짊을 돌이켜보고, 사람을 다스려도 다스려지지 않거든 그 지혜를 돌이켜보고, 사람에게 예를 해도 답례하지 않거든 그 공경을 돌이켜보아야 한다. 행하고도 얻지 못함이 있거든 모두 자신에게 돌이켜 찾아야 하니, 자신이 바루어지면 천하가 돌아온다.” 효사 및 효상사 初六은 往하면 蹇코 來하면 譽리라. 초륙    왕       건    래      예", "hyosa": {"초효": "초육은 가면 어렵고 오면 명예로울 것이다. 譽:기릴 예 초육은 내괘 간산 ( 艮山 ) ☶ 의 아래에 처해 있다 . 외괘가 험한 물 ☵ 의 형국이니 가면 위험에 빠지지만 , 오면 즉 그 자리에 있으면 오히려 명예롭게 된다 . 내괘가 간산 ☶ 이니 그쳐 있어야 하고 , 험함이 사라질 때까지 마땅히 기다려야 한다 . 초육이 변하면 내괘가 이화 ( 離火 ) ☲ 가 되니 밝은 지혜가 나온다 . 象曰 往蹇來譽는 宜待也니라. 상왈 왕건래예    의대야 상전에 말하였다. “가면 어렵고 오면 명예로운 것은 마땅히 기다리는 것이다.” 宜:마땅할 의   待:기다릴 대 六二는 王臣蹇蹇이 匪躬之故라.", "이효": "육이    왕신건건    비궁지고 육이는 왕과 신하가 어렵고 어려움이 몸의 연고가 아니다. 臣:신하 신   匪:아닐 비   躬:몸 궁   故:연고 고 육이는 내괘에서 중정한 자리에 있으면서 , 외괘에서 중정한 구오 왕과 잘 응하고 있다 . 육이 신하나 구오 왕이 다 중정 ( 中正 ) 하게 서로 응하고 있음에도 불구하고 어렵고 어려우니 , 그것은 신하 개인 때문에 그러한 것이 아니라 나라 전체 상황이 어렵기 때문이다 . 신하 개인의 잘못으로 어렵게 된 것이 아니니 , 어려움이 지나가면 허물은 없게 된다 . 象曰 王臣蹇蹇은 終无尤也리라. 상왈 왕신건건    종무우야 상전에 말하였다. “왕과 신하가 어렵고 어려움은 마침내 허물이 없을 것이다.” 終:마침내 종   尤:허물 우", "삼효": "九三은 往하면 蹇코 來하면 反이리라. 구삼    왕      건    래       반 구삼은 가면 어렵고 오면 돌아올 것이다. 구삼은 내괘에서 중을 얻지 못하였으나 , 양자리에 양으로 바른 자리에 있다 . 감수 ( 坎水 ) ☵ 의 험함이 밖에 있으니 , 내괘 초효와 이효의 음 ( 陰 ) 은 사실 양강 ( 陽剛 ) 한 구삼의 도움이 필요하다 . 구삼이 가면 외괘의 험함에 빠져 어렵게 되지만 , 돌아오면 초효와 이효 음들이 안에서 기뻐하며 어려움을 극복하게 된다 . 구삼이 변하면 곤지 ( 坤地 ) ☷ 가 되어 내괘 초효 이효 음과 같이 하는 것이고 , 지괘 ( 之卦 ) 가 수지비 ( 水地比 ) 가 되니 서로 돕는 상이 나온다 . 象曰 往蹇來反은 內 喜之也일새라. 상왈 왕건래반    내 희지야 상전에 말하였다. “가면 어렵고 오면 돌아오는 것은 안에서 기뻐하기 때문이다.” 喜:기쁠 희 구삼이 가면 외괘 험함에 빠져 구삼 스스로도 어렵게 되고 또한 전체 상황도 어렵게 되지만 , 돌아오면 구삼 스스로도 어려움에 빠지지 않을 뿐만 아니라 안에 있는 초육과 육이를 도와줄 수 있으니 , 안에서 기뻐하는 것이다 . 六四는 往하면 蹇코 來하면 連이리라.", "사효": "육사    왕      건    래       연 육사는 가면 어렵고 오면 이어질 것이다. 連:이어질 련(연) 육사는 외괘 감수 ( 坎水 ) ☵ 의 험함에 빠져 있는 상이다 . 그러나 그 험함의 아래에 처하여 있고 , 음 자리에 음으로 자리가 마땅하며 , 외호괘 이화 ( 離火 ) ☲ 에 있어 밝게 상황을 파악할 수 있다 . 육사가 밖으로 더 가면 어렵게 되지만 , 오면 밑에 있는 구삼과 연결되어 건실한 구삼의 도움을 받을 수 있다 . 象曰 往蹇來連은 當位 實也일새라. 상왈 왕건래연    당위 실야 상전에 말하였다. “가면 어렵고 오면 이어지는 것은 당한 자리가 실하기 때문이다.” 육사가 음자리에 음으로 마땅하고 , 또한 아래에 있는 구삼이 양자리에 양으로 실하게 있기 때문에 구삼 양의 도움을 받을 수 있는 것이다 .", "오효": "九五는 大蹇에 朋來로다. 구오    대건   붕래 구오는 크게 어려움에 벗이 오도다. 구오는 외괘에서 중정 ( 中正 ) 한 인군의 자리에 있으나 , 험한 가운데 빠져 있어 크게 절고 있는 형국이다 . 그렇지만 어려운 상황에서도 중도를 지키고 절도있게 하면 주위의 도움을 받을 수 있다 . 구오는 어려운 형국에 있으니 , 인군으로서의 위엄과 권력을 나타낼 수 없다 . 오히려 구오가 변하면 외괘가 곤지 ( 坤地 ) ☷ 가 되고 지괘 ( 之卦 ) 가 지산겸 ( 地山謙 ) 이 되니 , 겸손하게 모든 것을 스스로의 책임으로 돌리고 어려움을 이겨내야 한다 . 이렇게 인군 스스로가 겸손하게 중도를 지키고 절도있게 하면 어려움이 점차 사라지고 모든 백성이 구오를 따르게 된다 . 효 ( 爻 ) 관계로 보면 , 특히 구오가 응하는 자리인 육이 신하 ( 臣下 ) 와 구오와 같은 양 ( 陽 ) 인 구삼이 와서 도와준다 . 象曰 大蹇朋來는 以中節也라. 상왈 대건붕래    이중절야 상전에 말하였다. “크게 어려움에 벗이 오는 것은 중도로 절도있게 하기 때문이다.” 上六은 往하면 蹇코 來하면 碩이라 吉하리니 利見大人하니라. 상륙    왕       건    래      석       길         이견대인", "상효": "상육은 가면 어렵고 오면 크다. 길할 것이니, 대인을 봄이 이롭다. 碩:클 석 상육은 건괘 ( 蹇卦 ) 의 맨 위에 있어 어려움의 극에 처해 있다 . 한편 건괘 ( 蹇卦 ) 의 맨 위에 있기 때문에 어려운 상황에서 벗어나는 자리이기도 하다 . 그렇지만 , 초효부터 상효에 이르기까지 왕과 신하뿐만 아니라 온 백성이 모두 절고 저는 어려운 상황에서 상육이 홀로 간들 편할 리가 없고 더욱 어려움에 빠지게 된다 . 상육이 ‘ 오면 크다 ’ 라는 것은 모두가 어려운 상황에서 혼자 험함에서 벗어나려고 하지 않고 도우려고 하니 그 뜻이 큰 것이다 . 그러니 길하고 상육의 힘으로는 역부족이니 상육을 도와줄 수 있는 대인을 봄이 이롭다 . 象曰 往蹇來碩은 志在內也오 利見大人은 以從貴也라. 상왈 왕건래석    지재내야    이견대인    이종귀야 상전에 말하였다. “가면 어렵고 오면 크다는 것은 뜻이 안에 있는 것이고, 대인을 봄이 이로움은 귀함을 좇는 것이다.” 貴:귀할 귀 상육이 가지 않고 오면 크다는 것은 상육과 응하는 자리인 내괘 구삼 양을 만나는 것을 말하고 , 대인을 봄이 이롭다는 것은 귀한 구오 인군을 따르는 것이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 445 ∼ 451 쪽 ."}}, {"num": 40, "ko": "뇌수해", "hanja": "雷水解", "lines": [0, 1, 0, 1, 0, 0], "url": "https://soosanss.tistory.com/192", "post_id": 192, "gwaui": "천지가 막혔다가 풀리면 우레와 비를 베풀어 만물을 화생하듯이 , 어려운 상황이 풀리게 되면 그동안의 허물을 용서하고 죄를 너그럽게 다스리라 ( 赦過宥罪 ) . 상육은 주역 64 괘 384 효의 체계에 있어 특별한 의미를 지닌다 . 마지막 괘가 된다 . 정치사회적으로 어려운 상황에서 뇌수해괘 구이가 범죄인을 소탕하고 구사 대신이 백성의 어려움을 풀어주니 나라의 어려움은 해소된다 . 그렇다면 뇌수해괘 상육효의 의미는 무엇인가 ?", "gwamyung": "외괘가 진뢰 ( 震雷 ) ☳ , 내괘가 감수 ( 坎水 ) ☵ 로 이루어진 괘를 ‘ 해 ( 解 ) ’ 라 한다 . 어려움이 풀린다는 뜻이다 . 내괘 감수 ☵ 의 험함에서 외괘 진뢰 ☳ 로 움직여 빠져 나오니 어려움이 풀리게 된다 . 모두가 어려운 상황에서 풀리게 되면 화합 ( 和合 ) 을 도모하여야 한다 . 사회가 화합 ( 和合 ) 을 이루는 기본방향은 그동안의 허물을 용서하고 죄를 감해주는 것이다 .", "seogwa": "｢ 전 ｣ 은 수산건괘 다음에 뇌수해괘가 온 것을 다음과 같이 설명하고 있다 . 蹇者는 難也니 物不可以終難이라 故로 受之以解하고 건자    난야    물불가이종난      고    수지이해 건(蹇)이란 어려움이니, 물건이 끝까지 어렵지만은 못한다. 그러므로 해괘(解卦)로 받고 어려운 상황에 처하여 몸을 돌이켜 반성하고 덕을 쌓아 나가며 서로가 도와주면 어려움에서 벗어날 수가 있고 일이 잘 풀리게 된다 . 그래서 건괘 ( 蹇卦 ) 다음에 해괘 ( 解卦 ) 를 둔 것이다 .", "gwasa": "解는 利西南하니 无所往이라. 해    이서남      무소왕 其來復이 吉하니 有攸往이어든 夙하면 吉하리라. 기래복    길      유유왕          숙       길 해(解)는 서남쪽이 이로우니 갈 바가 없다. 와서 회복함이 길하니, 갈 바가 있거든 빨리하면 길할 것이다. 解:풀 해   夙:일찍 숙 어려운 상황에서 일이 풀리니 , 순탄한 서남쪽이 이롭다 . 이미 어려움에서 벗어났으니 갈 바가 없다 . 허둥대고 어려움에서 벗어나려고 하다가도 , 이미 어려움에서 벗어났다면 다시 와서 회복하는 것이 길하다 . 그러나 아직 풀어야 할 것이 남아 있으면 빨리 처리하면 길하다 . 계절로 보면 내괘 감수 ( 坎水 ) ☵ 의 북방 겨울이 지나가고 외괘 진뢰 ( 震 雷 ) ☳ 의 봄이 오니 , 만물이 해빙 ( 解氷 ) 되어 모든 싹이 자라나는 상이다 . 어려움이 지나가고 모든 일이 생동하는 때이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 解는 險以動이니 動而免乎險이 解라. 단왈 해    험이동       동이면호험    해 解利西南은 往得衆也오 其來復吉은 乃得中也오 해이서남    왕득중야    기래복길    내득중야 有攸往夙吉은 往有功也라. 天地 解而雷雨 作하고 유유왕숙길    왕유공야     천지 해이뇌우 작 雷雨 作而百果草木이 皆甲拆하나니 解之時 大矣哉라. 뇌우 작이백과초목    개갑탁         해지시 대의재 단전에 말하였다. “해(解)는 험해서 움직이니, 움직여서 험함을 벗어남이 해(解)이다. 해(解)가 서남이 이로움은 가서 무리를 얻기 때문이고, 와서 회복하여 길한 것은 이에 중을 얻기 때문이고, 갈 바가 있어 빨리하면 길함은 가서 공이 있는 것이다. 천지가 풀리매 우레와 비가 일어나고, 우레와 비가 일어나매 온갖 과실과 풀과 나무가 모두 열려서 터지니, 해(解)의 때가 크도다.” 險:험할 험   免:벗어날 면·면할 면   衆:무리 중   乃:이에 내  坼:터질 탁 상황이 험하면 움직여서 험한 데에서 벗어나야 한다 . ‘ 서남쪽이 이로움 ’ 은 순탄한 데로 가면 동류 ( 同類 ) 를 얻게 되고 , ‘ 와서 회복하면 길하다 ’ 는 것은 중도 ( 中道 ) 를 얻음을 말한다 . 갈 바가 있어 빨리하면 길하다는 것은 가서 어려움을 해결하는 공을 세우기 때문이다 . 만물이 얼어붙은 한 겨울에 천지가 풀리게 되면 우레와 비가 일어나게 되고 , 우레와 비가 일어나면 온갖 과실류와 풀· 나무들이 싹을 내게 된다 . 그러니 만물이 풀리는 해 ( 解 ) 의 때가 큰 것이다 .", "gwasangsa": "象曰 雷雨作이 解니 君子 以하야 赦過宥罪하나니라. 상왈 뇌우작    해    군자 이      사과유죄 상전에 말하였다. “우레와 비가 일어나는 것이 해(解)니, 군자가 이를 본받아 허물을 용서하고 죄를 감해 준다.” 赦:용서할 사   過:허물 과   宥:용서할 유   罪: 죄 죄 만물이 얼어붙은 겨울이 지나가고 우레와 비가 일어나면 , 만물이 싹을 트며 생화하게 된다 . 군자는 이러한 기운을 본받아 모두가 어려운 상황에서 빚어진 허물과 죄를 용서하고 감해주면서 사회의 화합 ( 和合 ) 을 이루고 생동력 ( 生動力 ) 을 이끌어 간다 . 효사 및 효상사 初六은 无咎하니라. 초륙    무구", "hyosa": {"초효": "초육은 허물이 없다. 어려움이 풀리는 상황에서 초육은 내괘 아래에 있어 백성에 해당한다 . 양 자리에 음으로 있어 자리는 바르지 않으나 , 초육 백성은 구사 대신이 이끄는 대로 순하게 따르니 허물이 없다 . 象曰 剛柔之際라 義无咎也니라. 상왈 강유지제    의무구야 상전에 말하였다. “강과 유가 서로 사귄다. 뜻이 허물이 없다.” 際:사이 제· 사귈 제", "이효": "九二는 田獲三狐하야 得黃矢니 貞하야 吉토다. 구이    전획삼호      득황시    정       길 구이는 사냥해서 세 여우를 잡아 누런 화살을 얻으니, 바르게 해서 길하도다. 田:사냥할 전(佃)   獲:얻을 획   狐:여우 호   黃:누를 황   矢:화살 시 구이는 음 자리에 양으로 있어 자리는 마땅하지 않으나 , 중 ( 中 ) 을 얻어 외괘 육오 음과 잘 응하고 있다 . 구이가 내괘의 중을 얻어 중도 ( 中道 ) 로 행하기 때문에 이런 역할이 부여되는 것이지만 , 그렇다 해도 더욱 바르게 해야 길하다 . 象曰 九二貞吉은 得中道也일새라. 상왈 구이정길    득중도야 상전에 말하였다. “구이가 바르게 해서 길함은 중도를 얻었기 때문이다.” 六三은 負且乘이라. 致寇至니 貞이라도 吝이리라. 구이 신하는 육오 인군의 명을 받아 사회를 해치는 범죄인을 다스리고 ,", "삼효": "구삼    부차승       치구지    정          인 육삼은 지고 또 탄다. 도적 이름을 이루니, 바르게 하더라도 인색할 것이다. 負:질 부   且:또 차   乘:탈 승   致:이룰 치   寇: 도적 구 육삼은 양 자리에 음으로 거하고 중도 얻지 못하여 , 분수를 모르고 함부로 행하는 상황이다 . 응하는 자리인 상육이 같은 음 ( 陰 ) 으로 서로 더불지 못하여 , 아래에 있는 구이 양 ( 陽 ) 을 타고 위에 있는 구사 양 ( 陽 ) 을 짊어지고 있는 격이니 , 매우 추한 양상이다 . 양자리에 음으로 거하여 능력이 부족함에도 불구하고 , 분수를 모르고 구이 양을 타고 구사 양을 짊어지고 있으니 , 도적이 가만있지 않을 것이다 . 스스로가 분수를 지키지 못하여 도적을 이르게 하니 , 설사 바르게 하더라도 인색하게 되고 누구를 탓할 바가 아니다 . 공자는 이 내용을 중시하여 ｢ 계사상전 ｣ 제 8 장에서 다음과 같이 설명하였다 . 易曰 負且乘이라 致寇至라하니 負也者는 小人之事也오 乘也者는 君子之器也니 小人而乘君子之器라 盜 思奪之矣며 上을 慢코 下를 暴라 盜 思伐之矣니 慢藏이 誨盜며 冶容이 誨淫이니 易曰 負且乘致寇至라하니 盜之招也라 . 공자께서 말씀하셨다. “역(易)을 지은 자가 그 도둑을 안다！ 역에 이르길 ‘져야 할 것이 또 탄다. 도적 이름을 이룬다’라고 하니, 지는 것은 소인의 일이요, 타는 것은 군자의 그릇인데, 소인이 군자의 그릇을 타기 때문에 도적이 빼앗을 것을 생각한다. 위를 거만하게 하고 아래를 사납게 하니, 도적이 칠 것을 생각한다. 감춤(창고 지킴)을 게을리 함이 도적을 부르는 것이며, 얼굴을 다듬는 것이 음탕함을 부르는 것이니, 역에 이르길 ‘져야 할 것이 또 타고 도적 이름을 이룬다’라고 하니 도적을 부르는 것이다.” 象曰 負且乘이 亦可醜也며 自我致戎이어니 又誰咎也리오. 상왈 부차승    역가추야    자아치융         우수구야 상전에 말하였다. “짊어지고 또 탐이 또한 추한 것이며, 나로부터 도적을 이루게 하니 또 누구를 허물하겠는가?” 亦:또 역   醜:추할 추   自:부터 자   戎:오랑캐 융   又:또 우  誰:누구 수", "사효": "구사 양 ( 陽 ) 과 응하고 있다 . 구사는 어려움이 풀린 사회를 이끌어가는 대신 ( 大臣 ) 이다 . 九四는 解而拇면 朋至하야 斯孚리라. 구사    해이무   붕지       사부 구사는 너의 엄지발가락에서 풀면, 벗이 이르러 이에 미더울 것이다. 而:말 이을 이·너 이   拇:엄지손(발)가락 무   斯:이 사   孚:미쁠 부 구사는 음 자리에 양으로 있어 자리가 마땅치 않으나 , 외괘 진뢰 ( 震 雷 ) ☳ 의 아래에 처하여 대신 ( 大臣 ) 으로서 어려운 상황을 능동적으로 풀어야 한다 . 즉 , 대신으로서 응하는 자리에 있는 초육 백성의 고충을 풀어주어야 한다 . 이 문장에서 ‘ 이 ( 而 ) ’ 는 ‘ 너 이 ’ 자로 풀이한다 . ‘ 무 ( 拇 ) ’ 는 엄지발가락을 의미한다 . 즉 대신 입장에서 몸의 엄지발가락에 해당하는 백성을 풀어주면 , 백성이 대신을 믿고 따르는 것이다 . 象曰 解而拇는 未當位也일새라. 상왈 해이무    미당위야 상전에 말하였다. “너의 엄지발가락에서 푸는 것은 자리가 마땅치 않기 때문이다.” 六五는 君子 維有解면 吉하니 有孚于小人이리라. 구사 대신은 초효 백성의 고충을 해결하여 나라 전체의 어려움을 해결한다 . 이렇게 구이와 구사의 노력으로 어려운 상황이 풀리면 ,", "오효": "육오의 유약한 인군의 뜻을 받들어 사냥을 해서 , 사회가 올바로 풀려 나가는 데 방해가 되는 범죄인들을 잡아들이고 심판을 하는 임무를 맡고 있다 . 사냥해서 세 여우를 잡는다는 것은 사회를 혼란케 하는 범죄인을 잡아들인다는 것이고 , ‘ 누런 화살을 얻었다 ’ 는 것은 공명정대한 심판을 하는 것을 의미한다 . 형벌을 밝히고 법을 제정하는 의미가 있는 상경 21 번째 화뢰서합 ( 火雷 噬嗑 ) 괘를 보면 사법심판을 하는 자리인 구사효에 ‘ 득금시 ( 得金矢 ) ’ 라는 표현이 있고 , 육오효에는 ‘ 득황금 ( 得黃金 ) ’ 이란 표현이 있다 . 따라서 ‘ 득황시 ( 得黃矢 ) ’ 는 죄인을 재판하여 적절한 형벌로 처벌하는 것을 말한다 . 육오    군자 유유해    길      유부우소인 육오는 군자가 오직 풀림이 있으면 길하니, 소인에게 믿음이 있을 것이다. 維:오직 유 육오는 외괘의 중을 얻어 인군 자리에 있으나 , 양 자리에 음으로 있기 때문에 나라의 어려움을 주도적으로 해결하기에는 힘이 부족한 상태이다 . 유약한 인군으로서는 오직 상황이 잘 풀리게 되면 길하다 . 뇌수해 ( 雷水解 ) 괘에서 어려운 상황을 푸는 자리는 내괘의 구이 양 ( 陽 ) 과 외괘의 구사 양 ( 陽 ) 이다 . 육오 인군은 길하게 된다 . 인군 ( 人君 ) 으로서는 어려운 상황이 잘 해결되면 , 허물을 용서하고 죄를 감형하는 등 , 그동안 사회의 해악 ( 害惡 ) 을 일삼았던 소인들을 용서함으로써 소인으로부터 믿음을 얻어야 한다 . 또한 구이가 범죄를 소탕하고 구사 대신은 백성의 고충을 잘 풀어주어 나라 일이 잘 풀리게 되니 , 더 이상 소인이 행세를 할 수 없어 스스로 물러나는 것이기도 하다 . 象曰 君子有解는 小人의 退也라. 상왈 군자유해    소인    퇴야 상전에 말하였다. “군자가 풀림이 있는 것은 소인의 물러남이다.” 退:물러날 퇴 上六은 公用射隼于高墉之上하야 獲之니 无不利로다. 상륙    공용석준우고용지상      획지    무불리", "상효": "상육은 공이 높은 담 위의 새매를 쏘아서 잡으니, 이롭지 않음이 없도다. 用:써 용(以)   射:쏠 석   隼:새매 준   墉:담 용   獲:잡을 획 뇌수해 ( 雷水解 ) 상육효가 변하면 외괘가 이화 ( 離火 ) ☲ 가 되어 지괘 ( 之卦 ) 가 화수미제 ( 火水未濟 ) 괘로 되는 데 , 화수미제괘는 64 상육이 변하면 이화 ( 離火 ) ☲ 가 되니 , 이 ( 離 ) ☲ 는 동물로 새에 해당한다 . ‘ 준 ( 隼 ) ’ 은 새매로 맹금류 ( 猛禽類 ) 를 말한다 . 공 ( 公 ) 이 높은 담 위에 있는 새매를 쏘아 잡는다고 했으니 , ‘ 높은 담 위의 새매 ’ 는 과연 무엇을 의미하는가 ? 상전 ( 象傳 ) 에는 어그러짐을 푸는 것 ( 解悖 ) 이라 하였다 . 독자의 판단에 맡긴다 . 공자 ( 孔子 ) 는 이 효사의 중요성을 강조하여 ｢ 계사하전 ｣ 제 5 장에서 다음과 같이 설명하였다 . 易曰 公用射隼于高墉之上하야 獲之니 无不利라하니, 子曰 隼者는 禽也오 弓矢者는 器也오 射之者는 人也니, 君子 藏器於身하야 待時而動이면 何不利之有리오. 動而不括이라 是以出而有獲하나니 語成器而動者也라. 역(易)에 이르길 “공이 높은 담 위의 새매를 쏘아서 잡으니, 이롭지 않음이 없다”라고 하니, 공자께서 말씀하셨다. “새매라는 것은 새이고, 활과 화살은 그릇(무기)이고, 쏘는 것은 사람이니, 군자가 그릇(무기)을 몸에 감추어서 때를 기다려 움직이면, 어찌 이롭지 않음이 있겠는가? 움직임에 막히지 않는다. 이로써 나가서 잡음이 있으니, 그릇을 이룬 후에 움직이는 것을 말한다.” 象曰 公用射隼은 以解悖也라. 상왈 공용석준   이해패야 상전에 말하였다. “공이 새매를 쏘는 것은 어그러짐을 푸는 것이다.” 悖:어그러질 패 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 452 ∼459 쪽 ."}}, {"num": 41, "ko": "산택손", "hanja": "山澤損", "lines": [1, 1, 0, 0, 0, 1], "url": "https://soosanss.tistory.com/193", "post_id": 193, "gwaui": "인생은 항상 이익만 있을 수 없다 . 때로는 손해를 보고 또한 베풀어야 할 때도 있다 . 인생살이에서 분함을 징계하고 욕심을 막는 것은 수양의 가장 기본적인 것이다 ( 懲忿窒欲 ).", "gwamyung": "외괘가 간산 ( 艮山 ) ☶ , 내괘가 태택 ( 兌澤 ) ☱ 으로 이루어진 괘를 ‘ 손 ( 損 ) ’ 이라 한다 . 아래에 있는 연못의 기운은 위로 올라가서 산에 보태고 , 위에 있는 산은 물 기운을 아래로 흘려보내 연못에 보탠다 . 전체로 보면 서로가 이익을 보는 것이지만 , 산이나 연못이나 각각 자신의 기운을 덜어내니 손해를 보고 있다 . 따라서 개인으로 볼 때 손해를 보는 것 같지만 , 전체로 보면 조화와 균형 속에 이익이 된다 . 그래서 보다 이상적인 사회를 만들어가는 하나의 좌표는 사익 ( 私益 ) 과 공익 ( 公益 ) 의 균형에 있는 것이다 . 천지인온(天地氤氳)과 남녀교합(男女交合) 산택손괘는 삼음삼양 ( 三陰三陽 ) 괘로 , 내괘가 건천 ( 乾天 ) ☰ 이고 외괘가 곤지 ( 坤地 ) ☷ 인 지천태 ( 地天泰 ) 괘에서 , 내괘 구삼 양을 덜어내 위로 올리니 산택손 ( 山澤損 ) 괘가 되어 아래가 손해를 보며 위를 보태는 양상이다 . 지천태괘는 상경 11 번째이고 , 산택손괘는 하경 11 번째이다 . 상경 ( 上經 ) 의 처음인 중천건 ( 重天乾 ) ․ 중지곤 ( 重地坤 ) 이 기운을 통하여 11 번째 지천태 ( 地天泰 ) 가 되고 , 하경 ( 下經 ) 의 처음인 택산함 ( 澤山咸 ) 에서 교합을 하여 뇌풍항 ( 雷風恒 ) 에서 부부가 되고 하경 11 번째 산택손 ( 山澤損 ) 으로 출산을 한다 .", "seogwa": "｢ 전 ｣ 은 뇌수해괘 다음에 산택손괘를 둔 이유를 다음과 같이 설명한다 . 解者는 緩也니 緩必有所失이라 故로 受之以損하고 해자    완야    완필유소실      고    수지이손 해란 느즈러짐이니, 느즈러지면 반드시 잃는 바가 있다. 그러므로 손(損)으로 받고 緩:느릴 완·느즈러질 완   失:잃을 실 모든 일이 어렵다가 잘 풀리면 해이해진다 . 이렇게 해이해지고 나태해지면 반드시 잃게 된다 . 그래서 뇌수해괘 다음에 산택손괘를 두었다 .", "gwasa": "損은 有孚면 元吉코 无咎하야 可貞이라. 손    유부    원길    무구      가정 利有攸往하니 曷之用이리오. 二簋 可用享이니라. 이유유왕       갈지용          이궤 가용향 손(損)은 믿음을 두면 크게 길하고 허물이 없어서 가히 바르게 한다. 가는 바를 둠이 이로우니, 어떻게 쓸 것인가? 두 대그릇에 가히 제사지낸다. 損:덜 손   曷:어찌 갈   用:쓸 용·써 용(以)   簋:제기 이름 궤(대그릇)   享: 제사지낼 향 아래를 덜어서 위를 보태는 손괘 ( 損卦 ) 는 나라로 보면 , 아래의 백성으로부터 세금을 거두어 위의 국가를 경영해나가는 것을 의미한다 . 나라 전체를 유지하기 위해서는 국가의 근간을 이루는 백성이 도와야 한다 . 백성으로서는 손해를 보지만 자기의 몫을 덜어내어 국가전체가 유지되니 , 믿음을 가지면 크게 길하고 허물이 없다 . 그러나 세금을 거두어들이고 손해를 보는 것은 공정하게 해야 하니 , 바르게 해야 한다 . 하경 ( 下經 ) 처음인 택산함 ( 澤山咸 ) 괘에서 빈 마음으로 사람을 받아들여 남녀가 교감을 하니 , 10 달이 되는 산택손괘에서 출산 ( 出産 ) 을 하게 된다 . 새로운 생명이 태어나니 믿음을 두면 크게 길하고 허물이 없으며 , 또한 바르게 키워야 한다 . 손해를 본다는 것은 누군가에게 이익을 주는 것이고 나중에는 보답을 받게 되는 것이 자연의 섭리 ( 攝理 ) 이다 . 산택손 ( 山澤損 ) 은 아래의 도 ( 道 ) 가 위로 오르는 것이니 , 백성 개개인이 손해를 보지만 나라 전체가 이익이 되는 것이고 따라서 가는 바를 둠이 이롭다 . 그런데 손해를 보는 때는 어떻게 해야 하는가 ? ‘ 두 대그릇에 가히 제사 지낸다 ’ 는 것은 손해를 보는 때에 믿음을 굳게 가지고 검소하게 지내야 한다는 것을 의미한다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 損은 損下益上하야 其道 上行이니 단왈 손    손하익상       기도 상행 損而有孚면 元吉无咎可貞利有攸往이니 손이유부    원길무구가정이유유왕 曷之用二簋可用享은 二簋 應有時며 損剛益柔 有時니 갈지용이궤가용향    이궤 응유시    손강익유 유시 損益盈虛를 與時偕行이니라. 손익영허    여시해행 단전에 말하였다. “손(損)은 아래를 덜어 위를 더하여 그 도가 위로 행하니, 더는데 믿음을 두면 ‘원길무구가정이유유왕(元吉无咎可貞利有攸往)’이니, ‘갈지용이궤가용향(曷之用二簋可用享)’은 두 대그릇이 응당 때가 있으며, 강(剛)을 덜어 유(柔)에 더함이 때가 있으니, 덜고 더하고 차고 비는 것을 때와 더불어 함께 행한다.” 益:더할 익   應:응할 응   盈:찰 영   虛:빌 허   偕: 함께 해 손괘 ( 損卦 ) 는 삼음삼양 ( 三陰三陽 ) 괘로 그 체는 지천태 ( 地天泰 ) 괘에 있다 . 지천태괘는 내괘가 건천 ( 乾天 ) ☰ 으로 견실하지만 , 외괘가 곤지 ( 坤地 ) ☷ 로 허하여 빈약함을 뜻한다 . 나라의 정치권력을 의미하는 위가 허하고 , 아래 즉 백성이 부유하고 견실하니 태평한 세상이다 . 그러나 백성 개개인이 부유한들 , 나라가 가난하면 그 태평함도 오래갈 수가 없다 . 그래서 부국강병 ( 富國强兵 ) 을 위해 아래의 백성이 세금 ( 稅金 ) 을 거두어 나라에 보태는 것이 산택손괘가 된다 . 이러한 기운의 양상을 나타내면 , 견실한 내괘 건천 ☰ 에서 구삼의 양을 위로 덜어내고 외괘 곤지 ☷ 의 상육을 아래로 내려 보내면 산택손괘가 되니 , ‘ 아래를 덜어 위를 보태서 그 도가 위로 행하는 것 ’ 이라고 하였다 . 이렇게 백성이 나라를 위해 덜어내는데 믿음을 두면 나라가 부강해져 ‘ 크게 길하고 허물이 없어서 가히 바르게 하고 가는 바를 둠이 이로운 것 ’ 이다 . ‘ 어디에 쓰는가 . 두 대그릇에 가히 제사를 지낸다 ’ 는 것은 두 대그릇 , 즉 덜어내는 것과 보탬을 받는 것이 응당 그 적절한 때가 있으며 , 부하고 실한 강 ( 剛 ) 을 덜어서 약하고 허한 유 ( 柔 ) 에 더하는 것도 때가 있는 것이다 . 춘하추동 사시 , 음양승강의 변화 , 해와 달의 교차 등 자연의 변화와 마찬가지로 , 덜어내고 더하고 차고 비우는 것을 때와 더불어 함께 해야 한다 . 내괘의 태택 ( 兌澤 ) ☱ 은 후천팔괘방위로 추수 ( 秋收 ) 하는 가을을 의미하니 , 세금도 추수가 끝나 결실을 맺는 때에 거두어야 한다 .", "gwasangsa": "象曰 山下有澤이 損이니 君子 以하야 懲忿窒欲하나니라. 상왈 산하유택    손      군자 이       징분질욕 상전에 말하였다. “산 아래 연못이 있는 것이 손(損)이니, 군자가 이를 본받아 성냄을 징계하며 욕심을 막는다.” 懲:징계할 징   忿:성낼 분   窒:막을 질   欲:하고자할 욕 산 아래에 연못이 있어서 , 연못의 기운이 위로 올라가니 산을 윤택하게 한다 . 또한 내괘 태 ( 兌 ) ☱ 로 기뻐하면서 외괘 간 ( 艮 ) ☶ 으로 덕을 쌓는 것이기도 하다 . 군자는 이러한 기운의 양상을 보고 , 손해를 보는 상황에서도 그 분함을 참으며 욕심을 막는다 . 또한 군자가 수양 ( 修養 ) 을 함에 있어서 기본적으로 가져야 할 계율은 성냄을 징계하고 사랑과 자비를 베풀며 , 사사로운 욕심을 막고 중생을 구제하는 것이다 . 효사 및 효상사", "hyosa": {"초효": "初九는 已事어든 遄往이라아 无咎리니 酌損之니라. 초구    이사      천왕          무구       작손지 초구는 일을 마치거든 빨리 가야 허물이 없을 것이니, 참작하여 덜어야 한다. 已:이미 이·그칠 이   遄:빠를 천   酌:참작할 작·따를 작·술 작 초구는 맨 아래에 있어 나라의 근간이 되는 백성의 자리이다 . 또한 양 자리에 양으로 바르고 실 ( 實 ) 하다 . 내괘가 태택 ( 兌澤 ) ☱ 으로 후천팔괘방위로 가을이니 추수를 하여 수확을 하는 계절이다 . 덜고 더하고 차고 비움을 때로 더불어 함께 행한다 ( 損益 盈 虛 與時偕行 ). 백성이 수확을 해서 결실을 거두었으면 , 나라를 위한 재정 ( 財 政 ) 에 빨리 보태야 허물이 없다 . 초구가 변하면 감수 ( 坎水 ) ☵ 겨울이 되니 , 겨울이 되기 전에 빨리 나라의 재정에 보태야 할 것이다 . 오늘날 현대사회에서 부과되는 각종 세금의 기본원리도 마찬가지이다 . 그러나 세금도 수확에 따라 공정하게 책정되어야 하니 , 많이 수확했으면 많이 내고 , 조금 수확했으면 조금 내어 민생 ( 民生 ) 과 나라의 재정이 균형을 이루어야 한다 . 그래서 참작해서 덜어내는 것이다 ( 酌損之 ). 象曰 已事遄往은 尙合志也일새라. 상왈 이사천왕    상합지야 상전에 말하였다. “일을 마치면 빨리 간다는 것은 위와 뜻이 합하기 때문이다.” 尙:오히려 상·숭상할 상·위 상(上) 백성이 나라에 세금을 내는 것은 나라의 안녕을 바라는 육사 대신과 뜻을 합하기 때문이다 . 대신 ( 大臣 ) 은 백성의 복지와 안녕을 위하는 마음을 가지고 , 백성은 부국강병을 위하니 서로 뜻을 합하는 것이다 . 조세 ( 租稅 ) 의 기본원리일 것이다 . 초구의 백성은 농사를 지어 수확의 결실을 맺지만 ,", "이효": "九二는 利貞코 征이면 凶하니 弗損이라아 益之리라. 구이    이정   정       흉       불손          익지 구이는 바르게 함이 이롭고 가면 흉하니, 덜지 않아야 더할 것이다. 征:칠 정·갈 정   弗:아닐 불 구이는 내괘의 중을 얻었으나 음 자리에 양으로 있어서 , 실상은 별 수확이 없는 가난한 자리이다 . 구이의 선비는 농사를 짓지 않으니 수확의 결실을 거두지 못한다 . 그러니 중 ( 中 ) 을 얻은 자리로 바르게 함이 이롭다 . 그리고 수확이 없는 자리 , 빈곤한 자리이니 함부로 가면 흉하다 .", "삼효": "육삼    삼인행    즉손일인   일인행     즉득기우 육삼은 세 사람이 감에는 곧 한 사람을 덜어내고, 한 사람이 감에는 곧 그 벗을 얻도다. 육삼 효사는 주역 전체의 윤곽을 설명하는 대표적인 문장으로 여기에는 두 가지 의미가 있다 . 첫째는 산택손 ( 山澤損 ) 괘가 지천태 ( 地天泰 ) 괘에서 변화한 것이라는 뜻이고 , 둘째는 택산함 ( 澤山咸 ) 괘 구사효에서 소남· 소녀의 동동왕래 ( 憧憧往來 ) 로 잉태되어 꼭 열 달이 되는 산택손괘 육삼효에서 출산 ( 出産 ) 을 한다는 의미이다 . 첫째로 지천태괘에서 내괘 건천 ( 乾天 ) ☰ 의 양 ( 陽 ) 세 사람이 가는데 한 사람을 덜어내 위로 보내니 산택손괘가 되고 , 위로 올라간 상구 양은 아래로 내려 온 육삼 음 ( 陰 ) 과 응하여 벗을 얻게 된다 . 둘째로 하경 ( 下經 ) 첫 번째 택산함괘에서 소남· 소녀가 서로 교감하여 구사효에서 동동왕래의 교합을 하니 잉태 ( 孕胎 ) 를 하게 되는데 , 그로부터 꼭 10 달을 의미하는 하경 10 번째 괘 60 번째 효가 되는 산택손괘 육삼효에서 출산을 하게 된다 . 세 사람이란 소남· 소녀가 만나 부부가 되어 잉태를 하니 세 사람이 되고 , 태어난 아이 한 사람이 자라나 또 짝을 만나는 것이 순리이니 그 벗을 얻게 되는 것이다 . 주역 64 괘 384 효의 배열이 무작위로 이루어진 것이 아님을 알 수 있다 . 부부교합지의(夫婦交合之義) 澤山咸卦:九四는 貞이면 吉하야 悔 亡하리니 憧憧往來면 朋從爾思리라. 자녀출산지의 ( 子女出産之義 ) 山澤損卦:六三은 三人行앤 則損一人코 一人行앤 則得其友로다. 공자 ( 孔子 ) 는 ｢ 계사하전 ｣ ( 繫辭下傳 ) 제 5 장에서 다음과 같이 설명하고 있다 . 天地 絪縕에 萬物이 化醇하고 男女 構精에 萬物이 化生하나니 易曰 三人行엔 則損一人코 一人行엔 則得其友라하니 言致一也라. “천지의 기운이 쌓임에 만물이 화하여 두터워지고, 남녀가 정수를 얽음에 만물이 화하여 생하니, 역(易)에 이르길 ‘세 사람이 감에는 곧 한 사람을 덜고, 한사람이 감에는 곧 그 벗을 얻는다’고 하니 하나를 이룸을 말한다.” 象曰 一人行은 三이면 則疑也리라. 상왈 일인행    삼      즉의야 상전에 말하였다. “한 사람이 감은 셋이면 곧 의심할 것이다.” 疑: 의심할 의 산택손괘 육삼 효사에 대한 이 효상전의 내용은 풀이하기가 명료하지 않다 . 누락된 글이 있을 것으로 생각된다 . 六四는 損其疾호대 使遄이면 有喜하야 无咎리라.", "사효": "육사    손기질      사천       유희       무구 육사는 그 병을 덜되, 빨리 하게 하면 기쁨이 있어서 허물이 없을 것이다. 疾:병 질   使:하여금 사   遄:빠를 천   喜:기쁠 희 육사는 음 자리에 음으로 있어 위가 마땅한 대신 ( 大臣 ) 이다 . 나라 일을 맡고 있는 대신으로서 병이 되는 것은 나라의 재정문제이다 . 육사가 변하면 화택규 ( 火 澤 睽 ) 괘가 되니 , 어긋나는 상황이 될 수도 있다 . 육사 대신으로서는 나라의 재정문제를 해결하기 위하여 재정이 빈약하면 초구의 백성을 독촉해서라도 빨리 세금을 거두어 재정이 빈곤해서 오는 병을 덜어내야 한다 . 그래야 나라에 기쁨이 있고 허물이 없게 된다 . 개인적으로 볼 때 , 진짜 병이 있어 빨리 치료해야 한다는 것으로 풀이될 수도 있다 . 象曰 損其疾하니 亦可喜也로다. 상왈 손기질      역가희야 상전에 말하였다. “그 병을 덜어내니 또한 가히 기쁘도다.” 六五는 或益之면 十朋之라. 龜도 弗克違하리니 元吉하니라. 육사 대신이 나라를 걱정하여 초구 백성으로부터 세금을 거두어서 나라 재정을 충실하게 하면 ,", "오효": "육오 인군의 뜻에 따라 응할 뿐 함부로 정치를 하겠다고 나서서는 안 된다 . 또한 수확이 없으니 덜지 말고 오히려 도움을 받아야 한다 . 옛 선비들이 가난한 가운데 뜻을 바로 하고 때를 기다리다가 , 나라 일을 하면서 국록 ( 國祿 ) 을 받아 사는 것과 같다 . 청렴해야 할 선비가 뇌물로 나라 일을 맡아 하게 되면 결국 나라를 해치는 도적이 될 뿐이다 . 象曰 九二利貞은 中以爲志也라. 상왈 구이이정    중이위지야 상전에 말하였다. “구이가 바르게 함이 이로움은 중으로써 뜻을 삼는 것이다.” 六三은 三人行앤 則損一人코 一人行앤 則得其友로다. 육오    혹익지    십붕지    귀    불극위          원길 육오는 혹 더하면 열 벗이다. 거북점도 능히 어기지 못할 것이니 크게 길하다. 或:혹 혹   龜:거북 귀   克:능할 극   違:어길 위 육오는 나라를 이끄는 지도자이다 . 나라가 빈약할 때에는 육오 인군 자신도 부 ( 富 ) 를 누릴 수 없다 . 육오 인군은 그 재정을 아래 백성에게 다시 더해 주어야 한다 . 이것이 국민의 복지 ( 福祉 ) 를 위하는 일이고 , 이렇게 하면 백성 모두가 인군을 사랑하는 벗이 된다 . 선정 ( 善政 ) 을 베풀면 나라가 잘 되고 백성이 행복하게 산다는 것을 , 거북점을 치더라도 어기지 못하니 크게 길하다 . 이 육오 효사에 대하여 “ 或益之 면 十朋之龜 라도 弗克違 하리니 元吉 하니라 ” 로 보아 “ 혹 더하면 값비싼 거북이라도 능히 어기지 못할 것이니 크게 길하다 ” 고 풀이하는 견해도 있다 . 인군이 선정을 하면 신비로운 효험이 있는 값비싼 거북점도 어기지 않을 것이라는 해석이니 그 의미는 같다 . 육오 인군 스스로는 외괘의 중 ( 中 ) 을 지켜 나라를 다스리는 자리에 있으나 , 양 자리에 음으로 허한 상태임에도 불구하고 백성에게 보태어 주어 길하게 되는 것은 , 또한 바로 위에 있는 실 ( 實 ) 한 상구가 도와주기 때문이기도 하다 . 象曰 六五元吉은 自上祐也라. 상왈 육오원길    자상우야 상전에 말하였다. “육오가 크게 길함은 위로부터 돕는 것이다.” 自:부터 자   祐:도울 우", "상효": "上九는 弗損코 益之면 无咎코 貞吉하니 利有攸往이니 得臣이 无家리라. 상구    불손   익지    무구    정길       이유유왕       득신    무가 상구는 덜지 말고 더하면 허물이 없고 바르게 하여 길하니, 가는 바를 둠이 이로우니, 신하를 얻음이 집이(경계가) 없을 것이다. 상구는 아래 백성들로부터 거두어들인 세금을 나라를 위해 비축하고 나라를 위해 써야 하는 자리이다 . 그래서 덜지 말고 더하면 허물이 없다고 하였다 . 백성으로부터 거두어들인 재정을 비축· 관리하는 자리이니 바르게 해야 길하고 , 나라를 위한 일에 써야 하니 가는 바를 둠이 이롭다 . 상구가 나라를 위한 재정을 공정하게 관리하고 바르게 하면 나라를 위해 일하고자 하는 선비들이 모여들게 되니 , 신하를 얻음이 경계가 없게 된다 . ‘ 집이 없다 ’ 는 것은 경계· 한계가 없다는 뜻이다 . 나라에 인재가 모여드니 크게 뜻을 얻게 된다 . 정자 ( 程子 ) 는 ｢ 역전 ( 易傳 ) ｣ 에서 산택손괘의 각 효에 대한 의의를 밝히면서 다음과 같이 설명하였다 . 凡損之義 有三하니 損己從人也와 自損以益於人也와 行損道以損於人也라. 損己從人은 徙於義也요 自損益人은 及於物也요 行損道以損於人은 行其義也니 各因其時하야 取大者言之라. 四五二爻는 取損己從人하고 下體三爻는 取自損以益人하니 損時之用은 行損道以損天下之當損者也라. 上九則取不行其損爲義하니 九居損之終하야 損極而當變者也라. 以剛陽으로 居上하니 若用剛以損削於下면 非爲上之道니 其咎 大矣어니와 若不行其損하고 變而以剛陽之道로 益於下면 則无咎而得其正且吉也니 如是則宜有所往이요 往則有益矣라. 在上하야 能不損其下而益之면 天下 孰不服從이리오. 從服之衆에 无有內外也라 故로 曰得臣无家라하니 得臣은 謂得人心歸服이요 无家는 謂无有遠近內外之限也라. [손괘]의 뜻이 세 가지가 있으니, 자기를 비우고 남을 따르는 것과, 자기 것을 덜어서 남을 더해 주는 것과, 더는 도를 행해서 사람들을 덜어내는 것이다. 자기를 비워 남을 따름은 의리를 따라가는 것이고, 자기 것을 덜어서 다른 사람을 더해 줌은 남에게 미치게 하는 것이며, 더는 도를 행해서 사람들을 덜어냄은 의로운 일을 행하는 것이니, 각각 그 때에 따라 큰 것을 취해서 말했다. ‘육사’와 ‘육오’ 두 효는 자기를 비워 남을 좇아감을 취했고, 하체의 세 효는 자기 것을 덜어서 남을 보태줌을 취했으니, 더는 때의 씀은 더는 도를 행함으로써 천하의 마땅히 덜어야 할 것을 더는 것이다. ‘상구’는 더는 것을 시행하지 않음을 취해서 뜻을 삼았으니, 구(양)가 ‘손괘(損卦)’의 끝에 있어서 더는 것이 극에 달함에 마땅히 변하는 자이다. 강한 양으로써 위에 거처하니, 만약 강을 써서 아랫사람의 것을 덜고 깎으면 윗사람 된 도리가 아니니 허물이 크다. 만약 (아래를) 덜어내는 것을 시행하지 않고, 변해서 강한 도로써 아랫사람에게 더해 주면 허물이 없어 바르고 또 길함을 얻을 것이니, 이와 같이 하면 가는 바를 둠이 이롭고 가면 유익함이 있을 것이다. 위에 있어서 아랫사람의 것을 덜지 않고 보태주면, 천하에 누가 복종하지 않겠는가? 복종함이 많음에 안과 밖이 없기 때문에, ‘신하를 얻음이 집이 없다’고 말한 것이니, ‘신하를 얻음’은 인심이 모이고 복종함을 얻음이고, ‘집이 없음’은 원근(遠近)과 내외(內外)의 경계가 없다는 말이다. 象曰 弗損益之는 大得志也라. 상왈 불손익지    대득지야 상전에 말하였다. “덜지 말고 더함은 크게 뜻을 얻는 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 460 ∼ 470 쪽 ."}}, {"num": 42, "ko": "풍뢰익", "hanja": "風雷益", "lines": [1, 0, 0, 0, 1, 1], "url": "https://soosanss.tistory.com/194", "post_id": 194, "gwaui": "복지정책이 잘 이루어져 사회가 안정될수록 잘못된 제도나 정책을 올바르게 바꾸려는 노력이 지속되어야 하고 , 인간도 평온한 삶을 계속 유지하기 위해서는 잘못을 고치고 선한 방향으로 실천해 나가야 한다 ( 改過遷善 ).", "gwamyung": "외괘가 손풍 ( 巽風 ) ☴ , 내괘가 진뢰 ( 震雷 ) ☳ 로 이루어진 괘를 ‘ 익 ( 益 ) ’ 이라 한다 . 이익이 있다 ․ 도움이 있다는 뜻이다 . 후천팔괘방위로 볼 때 진 ( 震 ) ☳ 은 동방 봄이요 , 손 ( 巽 ) ☴ 은 동남방 봄이니 , 내괘 진뢰 ☳ 로 파종하여 외괘 손 ☴ 으로 봄바람이 일면서 만물이 생화하여 풍성하게 되는 상이다 .", "seogwa": "｢ 전 ｣ 은 산택손괘 다음에 풍뢰익괘가 온 이유를 다음과 같이 설명하고 있다 . 損而不已면 必益이라 故로 受之以益하고 손이불이    필익      고    수지이익 덜어냄을 그만두지 않으면 반드시 더한다. 그러므로 익(益)으로 받고 덜어내는 것 , 손해를 보는 것이 영원할 수는 없다 . 더는 것 , 손해 보는 것이 그치면 반드시 더하는 이익이 있게 된다 . 인생과 사회의 기본원리이다 . 노자 ( 老子 ) 《 도덕경》 제 42 장 가운데 다음 구절을 음미해 볼 필요가 있다 . …人之所惡는 唯孤寡不穀이나 而王公以爲稱하니라. 故로 物은 或損之而益하고 或益之而損하니라.… …세상 사람이 싫어하는 바는 오직 고(孤: 외로운 사람)·과(寡: 덕이 부족한 사람)·불곡(不穀: 복이 없는 사람)인데, 왕공은 이 세 가지로 자신을 일컫는다. 그러므로 모든 상황(만물)은 혹 덜어내면 오히려 보태지며, 혹 보태면 오히려 덜어진다.…", "gwasa": "益은 利有攸往하며 利涉大川하니라. 익    이유유왕       이섭대천 익(益)은 가는 바를 둠이 이로우며, 큰 내를 건넘이 이롭다. 益:더할 익   涉: 건널 섭 앞으로의 모든 일에 도움이 있고 이익이 있는 익괘 ( 益卦 ) 의 상황에서는 가는 바를 둠이 이롭다 . 또한 큰 일을 하는 것이 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 益은 損上益下하니 民說无疆이오 自上下下하니 其道 大光이라. 단왈 익    손상익하       민열무강      자상하하       기도 대광 利有攸往은 中正하야 有慶이오 利涉大川은 木道 乃行이라. 이유유왕    중정       유경      이섭대천    목도 내행 益은 動而巽하야 日進无疆하며 天施地生하야 其益이 无方하니 익    동이손       일진무강      천시지생       기익    무방 凡益之道 與時偕行하나니라. 범익지도 여시해행 단전에 말하였다. “익(益)은 위를 덜어 아래에 더하니 백성의 기뻐함이 지경이 없고, 위로부터 아래로 내리니 그 도가 크게 빛난다. ‘가는 바를 둠이 이로움’은 가운데 하고 바르게 하여 경사가 있는 것이고, ‘큰 내를 건넘이 이로움’은 목도(木道)가 이에 행하는 것이다. 익(益)은 움직이고 겸손해서 날로 나아감이 지경이 없으며, 하늘이 베풀고 땅이 낳아서 그 더함이 방소가 없으니, 무릇 익(益)의 도가 때와 더불어 함께 행하는 것이다.” 說:기쁠 열   疆:지경 강   慶:경사 경   施:베풀 시   偕:함께 해 산택손 ( 山澤損 ) 괘와 마찬가지로 풍뢰익 ( 風雷益 ) 괘도 삼음삼양 ( 三陰三陽 ) 괘로 그 체는 천지비 ( 天 地 否 ) 괘에 있다 . 천지비괘는 하늘 기운은 위에 머물러 있고 땅 기운은 아래에 있어서 천기 ( 天氣 ) 와 지기 ( 地氣 ) 가 교류를 하지 못하여 위와 아래가 막혀 있고 , 이는 사회적으로 볼 때 상부층은 부유하지만 아래에 있는 일반 백성은 가난하여 부익부 ( 富益富 ) 빈익빈 ( 貧益貧 ) 의 상태에 있는 것이다 . 이러한 상황을 타개하기 위하여 천지비괘 구사 양 ( 陽 ) 이 아래로 내려오고 초육 음 ( 陰 ) 이 위로 올라가서 풍뢰익괘가 된다 . 이렇게 위를 덜어서 아래에 더하니 , 가난하던 백성이 이익을 누리게 되어 무한히 기뻐한다 . 또한 위에서 아래로 베푸니 그 도가 크게 빛나는 것이다 . ‘ 가는 바를 둠이 이롭다 ’ 는 것은 외괘에서 중정한 구오 인군과 이에 응하는 내괘 육이 신하가 역시 중정한 자리에 있어서 중도 ( 中道 ) 를 지키고 정치를 바르게 하니 나라에 경사가 있는 것이고 , ‘ 큰 내를 건넘이 이롭다 ’ 는 것은 동방 봄 원덕 ( 元德 ) 의 도 ( 道 ) 가 행하는 것이다 . 내괘 진 ( 震 ) ☳ 과 외괘 손 ( 巽 ) ☴ 은 후천팔괘원리의 오행으로 보면 동방 ( 東方 ) 목 ( 木 ) 이고 , 계절로는 봄에 해당하여 만물을 생화하는 시절이다 . 그래서 목 ( 木 ) 의 도 ( 道 ) 가 행하는 것이라고 하였다 . 그런데 정자 ( 程子 ) 는 ｢ 역전 ( 易傳 ) ｣ 에서 ‘ 목도 ( 木道 ) ’ 를 ‘ 익도 ( 益道 ) ’ 로 보아야 한다고 하였으니 참고하기 바란다 . 益을 誤作木이라. 或以爲上巽下震이라 故로 云木道라하니 非也라. ‘익(益)’자를 ‘목(木)’자로 잘못 썼다. 혹자가 “위의 ‘손(巽)’과 아래의 ‘진(震)’이 다 나무이기 때문에 ‘나무의 도(木道)’라고 했다고 하니, 이는 잘못된 말이다. 내괘 진뢰 ( 震雷 ) ☳ 로 움직이면서도 외괘 손풍 ( 巽風 ) ☴ 으로 겸손하니 , 봄의 원덕 ( 元德 ) 으로 날로 성장하고 발전하여 자라남이 지경이 없고 , 천지비괘에서 위의 하늘이 기운을 베풀고 아래의 땅이 만물을 생화하여 그 이익이 또한 경계가 없으니 , 만물을 생화하고 발전시키는 익 ( 益 ) 의 도가 때와 더불어 함께 행한다 .", "gwasangsa": "象曰 風雷 益이니 君子 以하야 見善則遷하고 有過則改하나니라. 상왈 풍뢰 익       군자 이      견선즉천       유과즉개 상전에 말하였다. “바람과 우레가 익(益)이니, 군자가 이를 본받아 착함을 보면 옮기고 허물이 있으면 고친다.” 遷:옮길 천   改: 고칠 개 외괘 손풍 ( 巽風 ) ☴ 은 바람이고 , 내괘 진뢰 ( 震雷 ) ☳ 는 우뢰이다 . 내괘 진 ☳ 으로 움직이면서 외괘 손 ☴ 으로 겸손하니 , 만물은 봄에 생기 ( 生氣 ) 를 돋으며 자라난다 . 인간의 품성이 자라나고 사회가 올바로 이루어지기 위해서는 , 보다 바람직한 선 ( 善 ) 을 지향해야 하고 허물이 있으면 바로 고쳐 나가야 한다 . 효사 및 효상사", "hyosa": {"초효": "初九는 利用爲大作이니 元吉이라아 无咎리라. 초구    이용위대작      원길          무구 초구는 크게 짓는 것이 이로우니, 크게 길하여야 허물이 없을 것이다. 作: 지을 작 초구는 내괘 진뢰 ☳ 의 아래에 처한 백성의 자리이다 . 산택손 ( 山澤損 ) 괘 초구와 대응하여 보면 , 산택손괘와 같이 나라 재정이 빈약할 때에는 추수를 마친 백성이 각자의 수확량을 헤아려 나라를 위해 세금을 낸다 . 산택손괘에서 백성의 노력으로 이루어진 나라의 재정을 풍뢰익괘에서 베풀게 된 것은 바로 나라의 근간이 되는 백성의 경제활동으로 인한 것이다 . 그래서 풍뢰익괘에서도 초구 백성은 익 ( 益 ) 의 도를 이루기 위해 크게 사업을 하는 것이 이롭다 . 백성의 사업은 곧 나라의 사업이다 . 초구가 잘 응하고 있는 육사 대신으로부터 나라의 중대한 일을 맡아 하니 , 크게 길해야 허물이 없다 . 象曰 元吉无咎는 下 不厚事也일새라. 상왈 원길무구    하 불후사야 상전에 말하였다. “크게 길해야 허물이 없는 것은 아래가 두터운 일을 못하기 때문이다.” 厚:두터울 후 사실 아래에 있는 초구 백성이 나라의 크고 두터운 일을 하지는 못하기 때문에 , 부국강병 ( 富國强兵 ) 을 위해 초구 백성이 크게 짓는 것은 결과적으로 크게 길해야 , 즉 크게 잘 되야 허물이 없다 . 六二는 或益之면 十朋之라. 龜도 弗克違나 永貞이면 吉하니 王用享于帝라도 吉하리라.", "이효": "육이    혹익지    십붕지    귀    불극위    영정       길      왕용향우제       길 육이는 혹 더하면 열 벗이다. 거북이도 능히 어기지 않으나 영구하게 바르게 하면 길하니, 왕이 상제께 제사지내더라도 길할 것이다. 克:능할 극   違:어길 위   享:제사지낼 향 육이는 내괘에서 중정한 자리에 있으면서 외괘에서 중정한 구오 인군과 잘 응하고 있다 . 중정한 구오 인군의 신임을 받고 또한 육이 자신이 중정한 도 ( 道 ) 로 사회에 이익을 주니 모든 국민이 따르게 된다 . 육이의 중정한 도를 거북점도 어기지 않을 정도로 어느 누구도 의심할 수 없으나 , 사회의 바른 공리 ( 公利 ) 를 위해서는 항상 바른 마음을 지켜야 길하다 . 이렇게 행하면 중정한 구오 왕도 육이를 절대 신임하여 천제 ( 天帝 ) 께 제사를 드리는 것까지도 맡길 정도가 되니 길하다 . 즉 인군이 나라의 중대사 ( 重大事 ) 를 육이 신하에게 맡기는 것을 말한다 . 象曰 或益之는 自外來也라. 상왈 혹익지    자외래야 상전에 말하였다. “혹 더한다는 것은 밖으로부터 오는 것이다.” 육이가 중정하게 나라와 사회의 이익을 위한 도를 펼치니 , 밖의 구오 인군도 신임할 뿐만 아니라 모든 백성이 따르고 더 나아가 하늘의 신명도 믿게 된다 . 六三은 益之用凶事엔 无咎어니와 有孚中行이라아 告公用圭리라.", "삼효": "육삼    익지용흉사    무구         유부중행          고공용규 육삼은 더함을 흉한 일에 쓰는 것은 허물이 없지만, 믿음을 두고 중도로 행하여야 공(公)에 고하여 규(신임장)를 쓸 것이다. 凶:흉할 흉   告:알릴 고   圭:홀 규 육삼은 중 ( 中 ) 에서 벗어나 있고 양 자리에 음으로 있으니 위태한 상황이다 . 나라 전체로 보면 지방 제후에 해당한다 . 지방에 있는 제후는 백성을 위하여 항상 재정과 식량을 비축해 두었다가 가뭄이나 홍수 등으로 인해 백성이 어려워질 때 비축된 재정과 식량을 써야 한다 . 또한 나라 전체로도 항상 예비비 ( 豫備費 ) 와 비상물품을 비축해 두고 지방에 어려움이 있을 때 방출하여야 한다 . 그래서 ‘ 더함을 흉한 일에 쓰는 것은 허물이 없다 ’ 고 한 것이다 . 그러나 지방제후로서는 지방 백성에게 그리고 중앙정부에 믿음을 두고 중도로 행하여야 중앙 정부가 신임하게 되니 ,", "사효": "육사    중행      고공종          이용위의    천국 육사는 중도로 행하면 공(公)에게 고해서 좇게 할 것이니, 의지하며 나라를 옮기는 것이 이롭다. 從:좇을 종   用:써 용(以)   依:의지할 의   遷:옮길 천 육사는 음 자리에 음으로 자리가 마땅한 대신 ( 大臣 ) 이고 초구 백성과 잘 응하여 , 백성을 위하고 나라를 위하는 마음으로 정치를 잘 하니 , 중정한 구오 인군에게 나라의 정사 ( 政事 ) 를 의논하고 건의함에 인군도 믿고 따르게 된다 . 나라 정치에 있어 근본은 백성이다 . 육사 대신이 나라를 위해 정치하는 것은 바로 아래에 있는 백성 초구에게 의지하는 것이다 . 항상 정책의 근본은 백성에게 있으니 백성의 마음을 헤아리고 백성에게 의지하며 , 또한 백성의 어려움이 심하여 나라를 보존함이 어려울 때에는 나라를 옮길 수도 있다 . 이 모든 것 , 나라를 옮기기까지 하는 정책은 바로 백성을 위한 것이고 , 백성의 안녕과 평화를 위한 뜻이다 . 象曰 告公從은 以益志也라. 상왈 고공종    이익지야 상전에 말하였다. “공에게 고하여 좇게 하는 것은 (백성에게) 더하려는 뜻이다.”", "오효": "구오 인군 ( 公 ) 에게 고하여 신임장 ( 信任狀 ) 을 써서 중앙정부에서 예비비를 방출하게 되는 것이다 . ‘ 규 ( 圭 ) ’ 라는 것은 오늘날의 신임장을 말한다 . 象曰 益用凶事는 固有之也일새라. 상왈 익용흉사    고유지야 상전에 말하였다. “더함을 흉한 일에 쓰는 것은 굳게 두기 때문이다.” 나라에 흉한 일이 있을 때 어려움에 빠진 백성을 구할 수 있게 재정을 풀 수 있는 것은 평상시에 근심될 것을 생각하여 미리 대비하고 준비하여 굳게 지키기 때문이다 . 六四는 中行이면 告公從하리니 利用爲依며 遷國이니라. 九五는 有孚惠心이라. 勿問하야도 元吉하니 有孚하야 惠我德하리라. 구오    유부혜심       물문          원길      유부       혜아덕 구오는 믿음을 두어 마음을 은혜롭게 한다. 묻지 않아도 크게 길하니, 믿음을 두어 나의 덕을 은혜롭게 여길 것이다. 惠:은혜 혜   問:물을 문 구오는 중정한 인군이다 . 중정한 도로 나라를 위한 선정 ( 善政 ) 을 베푸는데 , 정치를 잘 한다는 것은 바로 밑에서 나라의 일을 중정하게 하는 육사 대신 ( 大臣 ) 과 내괘에서 중정한 육이 신하 그리고 초구의 백성 모두에게 믿음을 두고 모든 사람의 마음을 은혜롭게 하는 것을 뜻한다 . 이렇게 정치를 하면 물을 것도 없이 크게 길하다 . 또한 인군이 모든 백성에게 믿음을 두니 백성 또한 인군에게 믿음을 두고 인군의 덕을 은혜롭게 여긴다 . 모든 백성이 인군의 덕을 은혜롭게 여기면 구오 인군으로서는 크게 뜻을 얻는 것이다 . 象曰 有孚惠心이라 勿問之矣며 惠我德이 大得志也라. 상왈 유부혜심      물문지의    혜아덕    대득지야 상전에 말하였다. “믿음을 두고 마음을 은혜롭게 하니 물을 것도 없으며, 나의 덕을 은혜롭게 여김이 크게 뜻을 얻는 것이다.”", "상효": "上九는 莫益之라. 或擊之리니 立心勿恒이니 凶하니라. 상구    막익지    혹격지       입심물항       흉 상구는 더하지 말라. 혹 치리니, 마음을 세움이 항상하지 못하니 흉하다. 莫:말 막   擊:칠 격   勿: 말 물 더하는 도에 있어 상구는 극에 처해 있으니 , 과욕 ( 過慾 ) 을 부리는 상황이다 . 익괘 ( 益卦 ) 의 맨 위에 있고 음 자리에 양으로 있으니 , 중도를 잃고 욕심을 부린다 . 또한 상구가 변하면 감수 ( 坎水 ) ☵ 로 되니 , 물욕 ( 物慾 ) 에 어두운 상태이다 . 그래서 더 이상 욕심내지 말라는 것이다 . 만일 더 욕심을 내면 해를 받게 되고 , 사회를 생각하고 인생을 생각하는 마음이 어두워져서 항상함이 없으니 흉하다 . 욕심이 지나치면 결국 누군가로부터 해를 받게 된다 . 《 논어 ( 論語 )》 ｢ 이인 ( 里仁 ) ｣ 장에서 공자는 “ 이익에 따라 행동하면 원망이 많다 ” 고 하였다 ( 子 曰放於利而行 이면 多怨 이니라 ). 한편 《 맹자 ( 孟子 )》 ｢ 양혜왕장구상 ( 梁惠王章句上 ) ｣ 에 있는 다음 문장을 음미해 볼 필요가 있다 . 孟子 見梁惠王하신대 王曰 叟 不遠千里而來하시니 亦將有以利吾國乎잇가. 孟子 對曰 王何必曰利잇고 亦有仁義而已矣니이다. 王曰 何以利吾國고하시면 大夫曰 何以利吾家오하며 士庶人이 曰何以利吾身고하야 上下 交征利면 而國이 危矣리이다. 萬乘之國애 弑其君者는 必千乘之家오 千乘之國애 弑其君者는 必百乘之家니 萬取千焉하며 千取百焉이 不爲不多矣언마는 苟爲後義而先利면 不奪하야난 不饜이니이다. 맹자께서 양혜왕을 뵈시니, 왕이 말씀하셨다. “노인께서 천리를 멀리 여기지 않고 오셨으니, 또한 장차 내 나라를 이롭게 함이 있겠습니까?” 맹자께서 대답하셨다. “왕은 하필 이(利)를 말씀하십니까? 또한 인의(仁義)가 있을 뿐입니다. 왕께서 어떻게 하면 내 나라를 이롭게 할까 하시면, 대부들은 어떻게 하면 내 집안을 이롭게 할까 하며, 선비와 백성은 어떻게 하면 내 몸을 이롭게 할까 하여, 윗사람과 아랫사람이 서로 이(利)를 취한다면 나라가 위태로울 것입니다. 만승의 나라(천자국)에 그 군주를 시해하는 자는 반드시 천승을 가진 공경의 집안이요, 천승의 나라(제후국)에 그 군주를 시해하는 자는 반드시 백승을 가진 대부의 집안이니, 만승에 천승을 취하며 천승에 백승을 취함이 많지 않은 것은 아니지만, 만일 의(義)를 뒤로 하고 이(利)를 먼저 하면, 빼앗지 않으면 [모두가] 만족해하지 않습니다.” 한편 공자는 이 효사를 중시하여 ｢ 계사하전 ( 繫辭下傳 ) ｣ 제 5 장에서 다음과 같이 설명하였다 . 子曰 君子 安其身而後에아 動하며 易其心而後에아 語하며 定其交而後에아 求하나니 君子 脩此三者故로 全也하나니 危以動하면 則民不與也코 懼以語하면 則民不應也코 无交而求하면 則民不與也하나니 莫之與하면 則傷之者 至矣나니 易曰 莫益之라 或擊之리니 立心勿恒이니 凶이라하니라. 공자께서 말씀하셨다. “군자가 그 몸을 편안히 한 뒤에 움직이며, 그 마음을 편안하게 한 뒤에 말하며, 그 사귐을 정한 뒤에야 구하니, 군자가 이 세 가지를 닦는 까닭에 온전하니, 위태함으로써 움직이면 곧 백성이 더불지 않고, 두려움으로써 말하면 곧 백성이 응하지 않고, 사귐이 없이 구하면 백성이 주지 않으니, 주는 이가 없으면 곧 상하게 하는 자가 이르니, 역(易)에 이르길 ‘더하지 마라. 혹 치리니 마음을 세워 항상하지 못하니 흉하다’라고 하였다.” 象曰 莫益之는 偏辭也오 或擊之는 自外來也라. 상왈 막익지    편사야   혹격지    자외래야 상전에 말하였다. “더하지 말라는 것은 편벽하다는 말이고, 혹 치는 것은 밖으로부터 오는 것이다.” 偏:치우칠 편   辭:말씀 사 상구에서 더하지 말라고 한 것은 상구가 익괘 ( 益卦 ) 의 맨 위에서 욕심을 부림이 편벽되다는 뜻이다 . 그렇게 해서 혹 치는 것은 밖으로부터 오는 것이다 . 밖으로부터 온다는 것은 지나치게 욕심을 부리다가 뜻밖의 재앙을 받는 것을 의미한다 . 이러한 상황에서는 하늘도 싫어할 것이다 . ▣ 산택손괘· 풍뢰익괘와 풍택중부괘의 상관성 산택손괘와 풍뢰익괘 그리고 풍택중부괘는 밀접한 상관성이 있다 . 산택손괘 오효가 변하면 풍택중부괘가 되고 , 풍뢰익괘 이효가 변하면 역시 풍택중부괘가 되는데 , 산택손괘 오효와 풍뢰익괘 이효에 “ 或益之 十朋之 ” 라는 문장이 있다 . 참고하기 바란다 . 山澤損卦 六五爻 動 → 風澤中孚卦 六五는 或益之면 十朋之라. 龜도 弗克違하리니 元吉하니라. 風雷益卦 六二爻 動 → 風澤中孚卦 六二는 或益之면 十朋之라. 龜도 弗克違나 永貞이면 吉하니 王用享于帝라도 吉하리라. ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 471 ∼ 480 쪽 ."}}, {"num": 43, "ko": "택천쾌", "hanja": "澤天夬", "lines": [1, 1, 1, 1, 1, 0], "url": "https://soosanss.tistory.com/195", "post_id": 195, "gwaui": "군자는 의롭지 못한 소인을 결단함에도 모두가 수긍할 수 있는 상태가 되어야 정당하게 결단한다 . 그러나 그러한 소인이 나오지 않도록 은혜를 베풀고 덕에 거하여 해서는 안될 일을 금기하여야 한다 ( 施祿居德 ).", "gwamyung": "외괘가 태택 ( 兌澤 ) ☱ , 내괘가 건천 ( 乾天 ) ☰ 으로 이루어진 괘를 ‘ 쾌 ( 夬 ) ’ 라고 한다 . 결단한다는 뜻이다 . 음양승강 ( 陰陽昇降 ) 의 이치로 보면 , 순음 ( 純陰 ) 으로 있던 중지곤 ( 重地坤 ) 괘에서 일양 ( 一陽 ) 이 생하여 자라나니 지뢰복 ( 地雷復 ), 지택림 ( 地澤臨 ), 지천태 ( 地天泰 ), 뇌천대장 ( 雷天大壯 ) 을 거쳐 택천쾌 ( 澤天夬 ) 괘에 이르러 마지막 남은 상육의 음 ( 陰 ) 소인을 결단하는 것이다 . 12 월괘로는 음력 3 월에 해당한다 .", "seogwa": "｢ 전 ｣ 은 풍뢰익괘 다음에 택천괘를 둔 이유를 다음과 같이 설명하고 있다 . 益而不已면 必決이라 故로 受之以夬하고 익이불이    필결      고    수지이쾌 더함을 그만두지 않으면 반드시 결단한다. 그러므로 쾌(夬)로써 받고 풍뢰익 ( 風雷益 ) 괘 상구효사를 다시 음미해 보면 , 맨 위에 거하여 물욕 ( 物慾 ) 에 어두워져 욕심만 부리면 반드시 해를 받게 되니 흉하다고 하였다 . 이와 같이 더하기만 하고 욕심만 부리면 반드시 결단을 받게 된다 . 그래서 결단한다는 쾌괘 ( 夬卦 ) 를 익괘 ( 益卦 ) 다음에 두었다 . 여기서 상경 ( 上經 ) 지산겸 ( 地山謙 ) 괘 단전 ( 彖傳 ) 의 내용을 다시 음미해 볼 필요가 있다 . 彖曰 謙亨은 天道 下濟而光明하고 地道 卑而上行이라. 天道는 虧盈而益謙하고 地道는 變盈而流謙하고 鬼神은 害盈而福謙하고 人道는 惡盈而好謙하나니 謙은 尊而光하고 卑而不可踰니 君子之終也라. 단전에 말하였다. “겸(謙)이 형통함은 하늘의 도가 아래로 내려서 광명하고, 땅의 도가 낮은데서 위로 행한다. 하늘의 도는 가득한 것을 이지러지게 하며 겸손한 데에는 더하고, 땅의 도는 가득한 것을 변하게 하며 겸손한 데로 흐르고, 귀신은 가득한 것을 해롭게 하며 겸손함에는 복을 주고, 사람의 도는 가득한 것을 미워하며 겸손한 것을 좋아하니, 겸(謙)은 높고 빛나고 낮아도 가히 넘지 못하니 군자의 마침인 것이다.”", "gwasa": "夬는 揚于王庭이니 孚號有厲니라. 告自邑이오 不利卽戎이며 利有攸往하니라. 쾌    양우왕정      부호유려        고자읍       불리즉융      이유유왕 쾌(夬)는 왕의 뜰에서 드날리니, 미덥게 부르짖어 위태롭게 한다. 읍으로부터 고함이요, 군사에 나아감은 이롭지 않으며, 가는 바를 둠이 이롭다. 夬:터놓을 쾌·결단할 쾌·깎지 결   揚:오를 양·날릴 양   號:부르짖을 호    厲:위태할 려   卽:나아갈 즉   戎:군사 융 민생 ( 民生 ) 을 괴롭히고 부정한 축재를 하는 등 나라에 해가 되는 일을 자행한 자를 결단할 때에는 나라의 모든 백성이 그 사실을 정확히 알도록 왕의 뜰에서 적시 ( 摘示 ) 하고 모두가 신뢰할 수 있도록 해야 하며 , 아울러 위엄이 있게 해야 한다 . 위태롭게 한다는 것은 위엄 있게 하라는 뜻이다 . 또한 ‘ 읍으로부터 고한다 ’ 는 것은 방방곡곡의 모든 백성이 다 알게 하고 또한 양심 ( 良心 ) 에 비추어 타당하게 해야 한다는 뜻이다 . 부정한 소인을 결단하는데 지나치게 강하게 하면 , 오히려 백성이 불안을 느끼게 되고 또한 부정함을 결단하는 취지에 어긋나기 때문에 , 군사를 쓰지 말라고 하였다 . 이제 마지막 남은 상육 소인을 결단하여 나라와 사회가 밝아지게 되니 , 가는 바를 둠이 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 夬는 決也니 剛決柔也니 健而說하고 決而和하니라. 단왈 쾌    결야    강결유야    건이열      결이화 揚于王庭은 柔 乘五剛也오 孚號有厲는 其危 乃光也오 양우왕정    유 승오강야    부호유려    기위 내광야 告自邑不利卽戎은 所尙이 乃窮也오 利有攸往은 剛長이 乃終也리라. 고자읍불리즉융    소상    내궁야    이유유왕    강장   내종야 단전에 말하였다. “쾌(夬)는 결단함이니, 강이 유를 결단하니, 굳세며 기뻐하고, 결단하고 화합한다. ‘왕의 뜰에서 드날림’은 유(柔)가 다섯 강(剛)을 탄 것이고, ‘미덥게 부르짖어 위태롭게 함’은 그 위태함이 이에 빛나고, ‘읍으로부터 고하고 군사에 나아감이 이롭지 않음’은 숭상하는 바가 이에 궁하고, ‘가는 바를 둠이 이로움’은 강한 것이 자라서 이에 마치는 것이다.” 決:터질 결·결정할 결·반드시 결·깎지 결   說:기쁠 열   和:화할 화  乘:탈 승   危:위태할 위   尙:숭상할 상   終:마칠 종 쾌는 결단하는 것이다 . 다섯 양 ( 陽 ) 군자가 마지막 남은 소인 음 ( 陰 ) 을 결단하는 것이다 . 괘덕 ( 卦德 ) 이 내괘 건천 ( 乾天 ) ☰ 으로 굳세고 외괘 태택 ( 兌澤 ) ☱ 으로 기뻐하니 , 과감하게 결단하되 나라의 화합을 도모하여야 한다 . 왕의 뜰에서 드날린다는 것은 음유 ( 陰柔 ) 한 소인이 강한 다섯 군자를 타고 능멸하기 때문이다 . ‘ 미덥게 부르짖어 위엄 있게 한다 ’ 는 것은 그 위엄 있게 함이 빛나고 밝은 것이다 . ‘ 읍으로부터 고하고 군사에 나아감은 이롭지 않다 ’ 는 것은 만일 나라의 모든 사람이 이 사실을 모르고 , 또한 소인을 결단하는데 군사를 동원하는 등 지나친 행동을 하면 결국 명분이 궁색하게 된다 . ‘ 가는 바를 둠이 이롭다 ’ 는 것은 강한 군자의 기세가 계속 자라나서 이에 양강 ( 陽剛 ) 한 군자들의 세상이 되기 때문이다 .", "gwasangsa": "象曰 澤上於天이 夬니 君子 以하야 施祿及下하며 居德하야 則忌하나니라. 상왈 택상어천    쾌    군자 이      시록급하       거덕       칙기 상전에 말하였다. “연못이 하늘에 오르는 것이 쾌(夬)니, 군자가 이를 본받아 국록(國祿)을 베풀음이 아래에 미치게 하며, 덕에 거하여 금기해야 할 것을 법으로 정한다.” 上:오를 상   施:베풀 시   祿:복 록   及:미칠 급   則:법칙 칙   忌:꺼릴 기 택천괘 ( 澤天夬 ) 괘는 외괘 태택 ( 兌澤 ) ☱ 의 연못이 내괘 건천 ( 乾天 ) ☰ 의 위에 있어 , 마치 연못이 하늘 위로 오르는 상이다 . 연못이 하늘에 올라 그 윤택한 기운을 아래로 내리듯이 , 군자는 이러한 기운의 양상을 보고 은혜를 베푸는 녹 ( 덕택 , 국록 ) 을 아래 백성에게 미치게 하며 , 항상 덕을 간직하되 금기 ( 禁忌 ) 해야 할 것 , 해서는 안 될 것을 법칙으로 정하여 바른 길로 나아간다 . 효사 및 효상사", "hyosa": {"초효": "初九는 壯于前趾니 往하야 不勝이면 爲咎리라. 초구    장우전지    왕      불승       위구 초구는 앞발에 씩씩하니, 가서 이기지 못하면 허물이 될 것이다. 壯:씩씩할 장   前:앞 전   趾:발지   勝:이길 승   咎:허물 구 양강 ( 陽剛 ) 한 기운이 굳세게 나아가 맨 위의 음 ( 陰 ) 소인을 척결하려는 쾌괘 ( 夬卦 ) 에서 , 초구는 맨 아래에 처해 있다 . 몸으로 보면 발에 해당한다 . 강한 괘체 ( 卦體 ) 에 있어 스스 로 강하게 생각하고 앞서지만 , 이기지 못하면 허물이 된다 . 초구가 변하면 손풍 ( 巽風 ) ☴ 이 되니 , 아직은 스스로 앞서나갈 만큼 힘이 있지 못한 상태이다 . 위에 있는 양 ( 陽 ) 들이 굳세게 나간다고 하여 , 초구도 함부로 나서면 안 된다는 뜻이다 . 象曰 不勝而往이 咎也라. 상왈 불승이왕   구야 상전에 말하였다. “이기지 못하면서 가는 것이 허물이다.”", "이효": "九二는 惕號니 莫夜애 有戎이라도 勿恤이로다. 구이    척호    모야    유융         물휼 구이는 두려워서 부르짖으니, 저문 밤에 군사가 있더라도 근심하지 말라. 惕:두려워할 척   號:부르짖을 호   莫:저물 모·없을 막   夜:밤 야  戎:군사 융·오랑캐 융   恤:근심할 휼 구이는 내괘에서 중을 얻은 자리이다 . 구이가 변하면 내괘가 이화 ( 離火 ) ☲ 로 되어 지괘 ( 之卦 ) 가 택화혁 ( 澤 火 革 ) 괘로 된다 . 잘못된 것을 결단하여 고치는 핵심자리이다 . 오늘날 마치 부패 정치인을 수사하느라고 밤을 지새는 검찰이라고나 할까 ? 象曰 有戎勿恤은 得中道也일새라. 상왈 유융물휼    득중도야 상전에 말하였다. “군사가 있어도 근심하지 말라는 것은 중도를 얻었기 때문이다.”", "삼효": "九三은 壯于頄하야 有凶코 獨行遇雨니 君子는 夬夬라 若濡有慍이면 无咎리라. 구삼    장우구      유흉    독행우우    군자    쾌쾌    약유유온       무구 구삼은 광대뼈에 씩씩해서 흉함이 있고, 홀로 가서 비를 만나니, 군자는 결단할 것은 결단한다. 젖는 듯해서 성냄이 있으면 허물이 없을 것이다. 頄:광대뼈 구   獨:홀로 독   遇:만날 우   濡:젖을 유   慍:성낼 온 구삼은 양자리에 양으로 자리가 바르나 중을 얻지 못하였고 , 또한 상육의 음 ( 陰 ) 소인과 홀로 응하고 있다 . 모두가 상육의 소인을 척결해야 한다고 주장하여 , 구삼도 목소리를 높이니 ‘ 광대뼈에 씩씩한 격 ’ 이다 . 그러나 중도를 지키지 못하는 구삼은 겉으로는 척결해야 한다고 목청을 높이지만 속으로는 상육 음 ( 陰 ) 과 응하여 내통 ( 內通 ) 하면서 모반 ( 謀叛 ) 할 가능성이 있으니 , ‘ 홀로 행하여 비를 만난다 ’ 고 하였다 . 즉 , 구삼은 상육 음 ( 陰 ) 과 응하고 있으니 , 중도를 잃으면 상육의 꼬임에 빠질 가능성이 있다 . 그러나 이러한 상황에서도 군자는 잘못된 것은 과감하게 결단해야 하니 , 구삼과 같은 처지에 있어도 군자와 소인의 행동은 다르게 나타난다 . 象曰 君子는 夬夬라 終无咎也니라. 상왈 군자    쾌쾌   종무구야 상전에 말하였다. “군자는 결단할 것은 결단한다. 마침내 허물이 없다.”", "사효": "九四는 臀无膚며 其行次且니 牽羊하면 悔 亡하련마는 聞言하야도 不信하리로다. 구사    둔무부    기행자저    견양      회 망             문언          불신 구사는 볼기에 살이 없으며 그 행함이 머뭇거리니, 양을 끌면 뉘우침이 없으련마는 말을 듣더라도 믿지 않을 것이다. 臀:볼기 둔   膚:살 부   次:버금 차·차례 차·머무를 차·나아가지 않을 차 且:또 차·구차스러울 차·머뭇거릴 저·어조사 저·공경스러울 저   牽:끌 견   聞:들을 문 구사는 음 자리에 양으로 처하여 자리가 부당하니 , 역량 ( 力量 ) 에 비해 맡은 업무가 과중한 격이다 . 그런데 대신 ( 大臣 ) 자리에 있으니 , 소인을 척결해야 하는 실질적인 업무를 맡고 있다 . 아래의 양강 ( 陽剛 ) 한 백성들이 구사 대신에게 상육을 척결하라고 사방에서 요구하나 , 어찌해야 할 바를 몰라 허둥대는 것이 ‘ 엉덩이에 살이 없고 행하는 것이 머뭇거리는 상 ’ 이다 . 그러나 구사 대신이 그 일을 해야 하는데 , 아래 양강한 백성들의 요구를 들어서 잘 이끌면 뉘우침이 없어지겠지만 , 아래 백성들의 말을 듣더라도 믿지 못하는 상황이다 . 외괘가 태 ( 兌 ) ☱ 이니 후천팔괘방위로 저녁이 되어 어두운 상이고 , 또한 구사가 변하면 양이 음으로 바뀌어 외괘가 감수 ( 坎水 ) ☵ 로 되니 , 총명함이 더욱 어두워져 믿지 못하는 상황이 된다 . ‘ 次且 ’ 는 나아가지 못하고 머뭇거리는 뜻을 나타내는 문자로 ‘ 자저 ’ 라고 읽는다 . 象曰 其行次且는 位不當也오 聞言不信은 聰不明也라. 상왈 기행자저    위부당야    문언불신    총불명야 상전에 말하였다. “그 행함이 머뭇거림은 자리가 마땅하지 않음이요, 말을 들어도 믿지 않음은 총명함이 밝지 않아서이다.” 聰:귀 밝을 총", "오효": "구오 인군 ( 人君 ) 의 명을 받아 부정을 일삼아 온 소인을 척결하고자 하는데 두려워서 부르짖는다 . 인군으로부터 받은 소임 ( 所任 ) 을 완수하고자 늦은 밤에도 일을 하니 , 이러한 업무를 방해하고자 하는 군사 ( 오랑캐 ) 가 있더라도 근심할 것은 없다 . 왜냐하면 구이의 일은 중도 ( 中道 ) 로 하는 것이기 때문이다 . 九五는 莧陸夬夬면 中行애 无咎리라. 구오    현륙쾌쾌    중행    무구 구오는 현륙을 결단하고 결단하면, 중을 행함에 허물이 없을 것이다. 莧:비름 현·자리공 현   陸:뭍 륙   莧陸(현륙):자리공 뿌리 구오는 외괘에서 중정한 인군자리에 있다 . 바로 위에 있는 음 ( 陰 ) 소인을 결단해야 하는 최종 결정권자이다 . ‘ 현륙 ( 莧 陸 ) ’ 은 상륙 ( 商陸 ) 이라고도 하는데 , 한약재로 쓰이는 음기 ( 陰氣 ) 가 많은 풀을 말하며 , 여기에서는 상육 음 ( 陰 ) 을 지칭하는 말이다 . 구오 양의 바로 위에 음이 있으니 , 구오의 마음이 흔들릴 우려가 있다 . 그렇지만 중도로 행하면 허물이 없게 된다 . 象曰 中行无咎나 中未光也라. 상왈 중행무구    중미광야 상전에 말하였다. “중을 행함에 허물은 없으나, 중이 빛나지는 못하다.” 중정한 구오 인군은 큰 정치를 해야 한다 . 그런데 상육의 소인을 척결해야 하는 상황에서 결단하지만 , 이러한 일 자체가 중도의 큰 정치에서 빛나는 일은 아니다 . 上六은 无號니 終有凶하니라. 상륙    무호    종유흉", "상효": "상육의 꼬임에 빠져드는 듯하다가도 불끈 성내며 바름을 지키면 허물이 없게 된다 . 쾌괘 ( 夬卦 ) 상육은 호소할 데가 없으니, 마침내 흉함이 있다. 아래의 양 ( 陽 ) 군자들 , 즉 인군으로부터 백성에 이르기까지 모두가 상육 음을 결단하고자 하니 , 상육으로서는 호소할 데가 없는 상황이다 . 이에 더 이상 갈 데가 없으니 마침내 흉하게 되고 , 그동안 누렸던 부귀와 권력도 한 거품 이슬로 사라지게 된다 . 상육이 변하면 중천건괘가 되니 건괘 ( 乾卦 ) 상구효사 “ 上九 는 亢龍 이니 有悔 리라 ” 를 되새겨 볼 필요가 있다 . 象曰 无號之凶은 終不可長也니라. 상왈 무호지흉   종불가장야 상전에 말하였다. “호소할 데가 없어 흉함은 마침내 가히 자라지 못하는 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 481 ∼ 488 쪽 ."}}, {"num": 44, "ko": "천풍구", "hanja": "天風姤", "lines": [0, 1, 1, 1, 1, 1], "url": "https://soosanss.tistory.com/196", "post_id": 196, "gwaui": "기존의 상황과 다른 새로운 조짐이 있을 때에는 모두가 알도록 공표하고 이러한 흐름을 견제하고 조화롭게 포용할 수 있는 대안을 마련하라 ( 命誥四方 ).", "gwamyung": "외괘가 건천 ( 乾天 ) ☰ , 내괘가 손풍 ( 巽風 ) ☴ 으로 이루어진 괘를 ‘ 구 ( 姤 ) ’ 라고 한다 . 순양 ( 純陽 ) 으로 되어 있던 중천건 ( 重天乾 ) 의 상태에서 맨 아래에 음 ( 陰 ) 기운이 들어오니 , 양 기운이 음 기운을 만나게 된다 . 기존의 상황과 다른 새로운 기운이 들어오면서 변화를 예고하는 만남이다 . 그러나 이 기운은 음 기운으로 기존의 입장에서는 부정적인 양상을 내포하고 있으니 잘 다스려야 한다 . 12 월괘중 하나로 음력 5 월에 해당한다 .", "seogwa": "｢ 전 ｣ 은 택천쾌괘 다음에 천풍구괘를 둔 이유를 다음과 같이 설명하고 있다 . 夬者는 決也니 決必有所遇라 故로 受之以姤하고 쾌자    결야   결필유소우    고    수지이구 쾌란 결단함이니, 결단함에 반드시 만나는 바가 있다. 그러므로 구괘(姤卦)로 받고 遇:만날 우 어떤 상황을 결정하고 매듭을 짓기 위해서는 그 상황에 직면하여야 한다 . 즉 직접 만나야 한다 . 또한 고정된 하나의 상황이 지속될 수는 없으며 , 항상 기존의 상황과 다른 새로운 양상을 만나게 된다 . 그래서 결단한다는 쾌괘 ( 夬 卦 ) 다음에 만난다는 구괘 ( 姤 卦 ) 를 두었다는 서괘전의 설명이다 .", "gwasa": "姤는 女壯이니 勿用取女니라. 구    여장      물용취녀 구(姤)는 여자가 씩씩하니 여자를 취하지 말라. 姤:만날 구   勿:말 물   用:써 용   取: 취할 취 구 ( 姤 ) 는 중천건 ( 重天乾 ) 괘 순양 ( 純陽 ) 의 상태에서 상대적으로 새로운 기운 , 즉 음 기운이 생하는 것이다 . 양 ( 陽 ) 은 남자요 음 ( 陰 ) 은 여자라는 대비 하에 여자가 씩씩하다고 하였으나 , 보다 바른 의미는 역동적인 자연과 사회현상에 있어서 현재의 안정적인 상황에 소용돌이를 일으킬 가능성이 있는 새로운 현상의 조짐이 나오는 것을 뜻한다 . 또한 현재의 상황과 대비할 때 부정적인 기운의 양상을 의미하기도 한다 . 그래서 순양 ( 純陽 ) 의 중천건 ( 重天乾 ) 이라는 긍정적인 상황을 유지하기 위해서는 음의 부정적인 현상을 취하지 말라는 뜻이다 . 한편 양 기운이 많은 상황에 음 기운이 나올 때 , 그 음 기운은 자신의 생존을 위한 생명력을 보다 강하게 키우기 마련이다 . 이것을 여자에 비유하면 , 뭇 남자에 대응하기 위하여 여자로서의 순한 도를 잃고 기운이 드센 상태를 의미한다 . 이러한 여자는 아내로서의 정순한 덕을 잃어 올바른 가정을 이끌 수 없으니 , 그러한 여자는 취하지 말라는 뜻도 된다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 姤는 遇也니 柔遇剛也라. 勿用取女는 不可與長也일새라. 단왈 구    우야    유우강야    물용취녀    불가여장야 天地相遇하니 品物이 咸章也오 천지상우       품물   함장야 剛遇中正하니 天下에 大行也니 姤之時義 大矣哉라. 강우중정      천하     대행야   구지시의 대의재 단전에 말하였다. “구(姤)는 만남이니, 유(柔)가 강(剛)을 만나는 것이다. 여자를 취하지 말라는 것은 가히 더불어 자라지 못하기 때문이다. 천지가 서로 만나니 모든 물건이 다 나타나고, 강이 중정(中正)함을 만나니 천하에 크게 행하니, 구(姤)의 때와 뜻이 크도다.” 品:물건 품   咸:다 함   章:문채 장·밝을 장·나타날 장 구 ( 姤 ) 는 아래의 음유 ( 陰柔 ) 가 위에 있는 양강 ( 陽剛 ) 을 만나는 것이다 . 양강한 기운이 많은 상황에서 들어오는 음 기운은 스스로의 생존을 위해 드센 기운의 양상을 가지게 되고 , 또한 안정적인 현상을 혼란스럽게 하는 요인이 되니 , 그러한 양상과는 함께 오래할 수 없다 . 천지자연의 이치로 볼 때 음 기운과 양 기운의 상호작용으로 만물이 생명을 유지하고 있다 . 사회현상도 보수 ( 保守 ) 와 진보 ( 進步 ) 의 역동성으로 인간사회가 유지· 발전되고 있다 . 구괘 ( 姤 卦 ) 에서 외괘의 구오 양이 중정한 자리를 만나니 , 중정한 도가 천하에 크게 행하고 있다 . 새로운 음 기운이 태동하는 구괘 ( 姤 卦 ) 의 때와 뜻이 매우 크다 .", "gwasangsa": "象曰 天下有風이 姤니 后 以하야 施命誥四方하나니라. 상왈 천하유풍    구    후 이      시명고사방 상전에 말하였다. “하늘 아래 바람이 있는 것이 구(姤)니, 후(임금)가 이를 본받아 명(命)을 베풀어 사방에 고한다.” 施:베풀 시   命:목숨 명·가르침 명·명할 명   誥: 고할 고 구괘 ( 姤 卦 ) 는 외괘 건천 ( 乾天 ) ☰ 하늘 아래에 손풍 ( 巽風 ) ☴ 바람이 일고 있으니 , 사회에 새로운 바람이 일고 있는 상이다 . 이러한 양상을 보고 나라와 사회를 이끄는 지도자는 새로운 기운이 일고 있다는 사실을 사방에 알리고 또한 명을 베풀어 이에 대비하게 한다 . 군자는 기미· 조짐이 있을 때 미리 대비하여야 한다 . 나라의 경제지표가 하강 ( 下降 ) 의 조짐을 보일 때 , 이를 미리 알리고 부정적인 상황에 빠지지 않도록 대책을 마련하고 준비를 해야 한다 . 효사 및 효상사 初六은 繫于金柅면 貞이 吉코 有攸往이면 見凶하리니 羸豕 孚蹢躅하니라. 초륙    계우금니    정   길    유유왕       견흉          이시 부척촉", "hyosa": {"초효": "초육은 쇠말뚝에 매면 바르게 함이 길하고, 가는 바를 두면 흉함을 볼 것이니, 여윈 돼지가 떠들며 머뭇거리는 것과 같다. 繫:맬 계   柅:고동목(말뚝) 니·성할 니   羸:여윌 리·고달플 리·앓을 리  豕:돼지 시 孚:미쁠 부·알깔 부·기를 부·달릴 부·떠들 부   蹢:머뭇거릴 척·굽 적   躅:머뭇거릴 촉·자취 탁 초육은 순양 ( 純陽 ) 으로 되어 있던 양상에서 음 기운이 맨 아래에 나타난 상태이다 . 사회현상에서 부정적인 기운의 조짐이 나타나면 , 이를 단단하게 쇠말뚝에 매놓고 바르게 해야 길하다 . 만일 그렇지 못하고 이 음 기운이 가는 바를 두게 되면 사회의 부정적인 양상이 계속 확산되어 혼탁하게 되는 흉한 상황을 보게 된다 . 이렇게 되면 마치 여윈 돼지가 꽥꽥거리며 날뛰듯이 , 사회를 혼탁하게 하는 무리들이 자기들 세상을 구축하기 위해 날뛰게 된다 . 새로 태동하는 이 음 기운을 잘 다스려야 한다는 뜻이다 . 여기서 중지곤 ( 重地坤 ) 괘 초효에 대한 ｢ 문언전 ｣ 의 구절을 음미해볼 필요가 있다 . 積善之家는 必有餘慶하고 積不善之家는 必有餘殃하나니 臣弑其君하며 子弑其父 非一朝一夕之故라. 其所由來者 漸矣니 由辨之不早辨也니 易曰 履霜堅冰至라하니 蓋言順也라. 선(善)을 쌓은 집안에는 반드시 남은 경사가 있고 선하지 못함을 쌓은 집안에는 반드시 남은 재앙이 있으니, 신하가 그 인군을 죽이고 자식이 그 아버지를 죽임이 하루아침 하루저녁의 연고가 아니다. 그 유래한 바가 차츰차츰함이니, 분별할 것을 일찍 분별하지 못함으로 말미암은 것이니, 역에 이르길 ‘서리를 밟으면 굳은 얼음이 이른다’라고 하니 대개 순함을 말한 것이다. 象曰 繫于金柅는 柔道 牽也일새라. 상왈 계우금니    유도 견야 상전에 말하였다. “쇠말뚝에 매는 것은 유(柔)의 도가 끌기 때문이다.” 牽:끌 견 초육의 음을 쇠말뚝에 매는 것은 음유 ( 陰柔 ) 의 도가 더 이상 확산되지 않게 하려는 것이다 . 초육이 응하는 구사 ( 손님 ) 에게 그 영향이 미치지 않도록 한다 . 군자는 부정한 기운이 있을 때 스스로 대책을 강구해야 하고 , 이를 남에게 미루지 않는다 . 이것이 의리 ( 義理 ) 인 것이다 . 반대로 만일 구이가 초육에게 감화되어 음 ( 陰 ) 소인으로 변하면 천산돈 ( 天山遯 ) 괘가 되어 군자들의 바른 정치가 사라지게 된다 . 象曰 包有魚는 義不及賓也라. 상왈 포유어    의불급빈야 상전에 말하였다. “꾸러미에 고기가 있음은 의리가 손님에게 미치지 못하게 하는 것이다.” 초육에서 새로운 조짐이 나타나니 ,", "이효": "九二는 包有魚면 无咎하리니 不利賓하니라. 구이    포유어    무구         불리빈 구이는 꾸러미에 고기가 있으면 허물이 없을 것이니, 손님에게는 이롭지 않다. 包:쌀 포·꾸러미 포   魚:고기 어   賓: 손 빈 구이 양 ( 陽 ) 은 내괘의 중을 얻어 아래의 초육 음 ( 陰 ) 과 바로 접하고 있다 . 기존의 질서에 부정한 변화를 가져오는 새로운 기운이 바로 아래에서 올라오니 , 구이가 초육 음 ( 고기 ) 을 잘 감싸서 바른 길로 인도하려는 노력을 하고 , 구이 군자가 초육 음을 감싸서 교화하려는 것은 초육의 부정한 기운이 구사의 대신 ( 손님 ) 에게 미치지 못하게 하려는 뜻이다 . 구이가 감싸서 잘 교화하려는 노력을 하고 구삼은 노심초사하고 구오는 덕으로 밝은 정치를 하고자 하는데 , 정작 상구는 높은 자리에 있지만 해야 할 역할이 없어 인색하게 된다 . 그렇다고 상구가 나서면 외괘가 태택 ( 兌澤 ) ☱ 이 되고 , 지괘 ( 之卦 ) 가 택풍대과 ( 澤風大過 ) 괘가 되니 잘못하면 큰 허물을 짓게 된다 . 이렇게 된 것은 맨 위에 처하여 궁해져서 인색한 것이지 , 어느 누구를 탓할 바는 아니다 . 象曰 姤其角은 上窮하야 吝也라. 상왈 구기각    상궁      인야 상전에 말하였다. “그 뿔에 만남은 위에서 궁하여 인색한 것이다.” 窮:궁할 궁 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 489 ∼ 496 쪽 .", "삼효": "九三은 臀无膚나 其行은 次且니 厲하면 无大咎리라. 구삼    둔무부    기행    자저   려       무대구 구삼은 볼기에 살이 없으나 그 행함은 머뭇거리니, 위태롭게 여기면 큰 허물이 없을 것이다. 臀:볼기 둔   膚:살 부   次:버금 차·차례 차·머무를 차·나아가지 않을 차 且:또 차·구차스러울 차·머뭇거릴 저·어조사 저·공경스러울 저 구삼은 양 자리에 양으로 있어 강하지만 중에서 벗어나 있다 . 맨 아래에서 음 기운이 자라나니 초육을 다스리려는 마음에 노심초사하지만 ( 臀无膚 ), 아래 구이가 초육을 맡아 견제하니 정작 행하지는 못하고 머뭇거리는 상이다 ( 其行 次且 ). 새로운 조짐에 위태롭게 여기고 조심하면 큰 허물은 없을 것이다 . ‘ 次且 ’ 는 나아가지 못하고 머뭇거리는 뜻을 나타내는 문자로 ‘ 자저 ’ 라고 읽는다 . 象曰 其行次且는 行未牽也라. 상왈 기행자저   행미견야 상전에 말하였다. “그 행함이 머뭇거림은 행함을 끌지 못하는 것이다.” 구삼이 구이 때문에 초육을 이끌지 못하니 , 그 행함이 머뭇거리는 것이다 . 구삼이 또한 노심초사 ( 勞心焦思 ) 하고 있으니 ,", "사효": "九四는 包无魚니 起凶하리라. 구사    포무어    기흉 구사는 꾸러미에 고기가 없으니, 흉함이 일어날 것이다. 起 : 일어날 기 구사는 음 자리에 양으로 있어 자리가 부당하다 . 대신 ( 大臣 ) 으로서 아래의 백성들을 포용하여 정치를 잘 해야 하는 자리이다 . 그런데 구괘 ( 姤 卦 ) 에서는 구이가 초육을 감싸고 있고 , 구사는 정작 대신으로서 해야 할 역할이 없게 된다 . 이러한 상태에서 구사 대신이 자신이 해야 할 역할을 계속 방기하면 , 결국 백성이 구사 대신을 멀리하게 되어 마치 꾸러미에 고기가 없는 격이 된다 . 이것이 원인이 되어 나중에는 대신으로서의 역할을 전혀 하지 못하게 되는 흉함이 일어나게 된다 . 象曰 无魚之凶은 遠民也일새라. 상왈 무어지흉    원민야 상전에 말하였다. “고기가 없어 흉함은 백성을 멀리하기 때문이다.” 遠:멀 원 고기가 없어 흉하다는 것은 구사가 백성을 포용하여 정치를 잘 해야 함에도 불구하고 백성을 멀리하기 때문에 흉하게 된다는 뜻이다 .", "오효": "九五는 以杞包瓜니 含章이면 有隕自天이리라. 구오    이기포과    함장      유운자천 구오는 버들나무로써 오이를 싸니, 빛남을 머금으면 하늘로부터 떨어짐이 있을 것이다. 杞:나무이름 기(소태나무·구기자나무·버들나무)   瓜:오이 과   含:머금을 함  章:빛날 장   隕:떨어질 운   自:부터 자 구오는 외괘에서 중정한 인군이다 . 마치 큰 버들나무가 그 가지를 길게 늘어뜨려서 밭에 있는 오이를 감싸듯이 , 천하 백성을 모두 감싸서 덕으로 정치하는 자리이다 . 천자 ( 天子 ) 로서는 백성들 사이의 이해관계에 편을 드는 것이 없이 공정하게 두루두루 모두를 사랑해야 한다 . 이렇게 밝은 덕을 머금고 정치를 하면 하늘로부터 천하를 맡기는 명 ( 命 ) 이 떨어진다 . 구오가 변하면 외괘가 이화 ( 離火 ) ☲ 로 되니 밝음을 머금은 상이다 . 象曰 九五含章은 中正也오 有隕自天은 志不舍命也일새라. 상왈 구오함장    중정야    유운자천    지불사명야 상전에 말하였다. “구오가 빛남을 머금음은 가운데하고 바르기 때문이고, 하늘로부터 떨어짐이 있음은 뜻이 명을 버리지 않기 때문이다.” 舍:버릴 사", "상효": "上九는 姤其角이라 吝하니 无咎니라. 상구   구기각       인       무구 상구는 그 뿔에 만난다. 인색하니 허물할 데가 없다. 角:뿔 각 吝:아낄 린· 인색할 린 상구는 구괘 ( 姤 卦 ) 의 맨 위에 있으니 , 몸체가 아닌 뿔에 있는 격이다 ."}}, {"num": 45, "ko": "택지취", "hanja": "澤地萃", "lines": [0, 0, 0, 1, 1, 0], "url": "https://soosanss.tistory.com/197", "post_id": 197, "gwaui": "큰 일을 도모하기 위해 많은 사람들 ( 多衆 ) 을 모이게 할 때에는 지극한 정성으로 순하고 기쁜 마음으로 따르게 하되 , 미처 생각하지 못하는 위험을 대비하여 만반의 준비를 하라 ( 警戒不虞 ).", "gwamyung": "외괘가 태택 ( 兌澤 ) ☱ , 내괘가 곤지 ( 坤地 ) ☷ 로 이루어진 괘를 ‘ 취 ( 萃 ) ’ 라고 한다 . 인류역사의 발전은 물 ( 강 ) 에서 비롯된다 . 모든 도시와 국가가 물 ( 하천 ) 을 중심으로 이루어지듯 , 땅 위에 연못이 있으니 천하백성이 연못으로 모여든다 . ‘ 취 ( 萃 ) ’ 는 ‘ 모인다 ’ 는 뜻이다 . 정치를 하는 입장에서는 백성을 하나의 마음으로 결집시키는 것이다 . 나라와 백성을 위한 마음을 정성스럽게 하여 백성이 편안하게 살도록 흥기시키는 것이다 .", "seogwa": "｢ 전 ｣ 은 천풍구괘 다음에 택지취괘가 온 이유를 다음과 같이 설명하고 있다 . 姤者는 遇也니 物相遇而後에 聚라 故로 受之以萃하고 구자    우야    물상우이후   취    고    수지이취 구(姤)는 만남이니, 물건이 서로 만난 뒤에 모인다. 그러므로 취(萃)로써 받고 聚: 모일 취 천지기운이 서로 만나든 , 현상계의 사물과 상황이 서로 만나든 , 서로 만나게 되면 모이게 된다 . 그래서 만난다는 구괘 ( 姤卦 ) 다음에 모인다는 취괘 ( 萃卦 ) 를 두었다 .", "gwasa": "萃는 (亨)王假有廟니 利見大人하니 亨하니 利貞하니라. 用大牲이 吉하니 利有攸往하니라. 취    (형)왕격유묘    이견대인      형       이정          용대생    길       이유유왕 취(萃)는 (형통하니) 왕이 사당을 둠에 지극히 하니, 대인을 봄이 이로우니, 형통하니, 바르게 함이 이롭다. 큰 희생을 씀이 길하니, 가는 바를 둠이 이롭다. 萃:모일 취(췌)   假:빌 가·거짓 가·아름다울 가·멀 하·이를 격   廟:사당 묘   牲:희생 생 취괘 ( 萃卦 ) 는 천하 백성 , 나라의 국민을 하나로 결집시키는 큰 뜻을 지니고 있다 . 이렇게 하려면 통치자는 나라의 근본을 의미하는 사당을 둠에 지극히 해야 하고 , 백성을 결집하는데 큰 힘이 되는 대인을 등용하는 것이 이롭고 형통하다 . 나라를 결집시키는 중대사이니 바르게 함이 이롭다 . 또한 국민을 결집하는데 있어서는 큰 잔치를 베풀거나 큰 행사를 치르는 것이 길하고 , 가는 바를 둠이 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 萃는 聚也니 順以說하고 剛中而應이라 故로 聚也니라. 단왈 취    취야    순이열       강중이응      고    취야 王假有廟는 致孝享也오 利見大人亨은 聚以正也일새오 왕격유묘    치효향야    이견대인형    취이정야 用大牲吉利有攸往은 順天命也니 용대생길이유유왕    순천명야 觀其所聚而天地萬物之情을 可見矣리라. 관기소취이천지만물지정    가견의 단전에 말하였다. “취(萃)는 모이는 것이니, 순해서 기뻐하고, 강한 것이 가운데 해서 응한다. 그러므로 모인다. ‘왕이 사당을 둠에 지극히 함’은 효성으로 제사를 이루는 것이고, ‘대인을 봄이 이롭고 형통함’은 모으는 것을 바름으로써 하기 때문이요, ‘큰 희생을 써서 길하여 가는 바를 둠이 이로운 것’은 천명을 따름이니, 그 모이는 바를 보아서 천지만물의 실정을 가히 볼 수 있을 것이다.” 聚:모일 취   說:기쁠 열   致:이룰 치   孝:효도 효   享:제사드릴 향 취 ( 萃 ) 는 모이는 것이다 . 내괘 곤지 ( 坤地 ) ☷ 로 순하고 외괘 태택 ( 兌澤 ) ☱ 으로 기뻐하는 상이다 . 그리고 외괘의 구오 인군이 강 ( 剛 ) 으로 중정하여 내괘 육이 신하와 잘 응하니 , 위와 아래가 순응하여 모인다 . ‘ 왕이 사당을 둠에 지극히 한다 ’ 는 것은 정성을 지극히 하여 제사를 이루는 것을 말하고 , 모이는데 바르게 하려면 구오 인군의 명을 받들어 백성을 바르게 흥기시켜 모이게 할 수 있는 대인 ( 大人 ) 을 등용시켜야 한다 . ‘ 큰 희생을 써서 길하고 갈 바를 둠이 이롭다 ’ 는 것은 천명에 순하게 따르는 것이니 , 그 시대와 사회의 순리에 따르는 것을 말한다 . 이렇게 백성이 뜻을 합하여 모이는 바를 잘 보면 천지만물의 실정도 가히 볼 수 있다 .", "gwasangsa": "象曰 澤上於地 萃니 君子 以하야 除戎器하야 戒不虞하나니라. 상왈 택상어지 취    군자 이      제융기       계불우 상전에 말하였다. “연못이 땅 위에 한 것이 취(萃)니, 군자가 이를 본받아 병기(兵器)를 수리하여 헤아리지 못함을 경계한다.” 除:섬돌 제·뜰 제·덜 제·다스릴 제·나눌 제   戒:경계할 계   虞:헤아릴 우 취괘 ( 萃卦 ) 는 연못이 땅 위에 있어 , 마치 땅 위로 샘이 솟는 상이다 . 샘이란 민생 ( 民生 ) 의 근원이다 . 모든 문명의 발상지는 하천 ( 河川 ) 을 끼고 있다 . 백성이 샘솟는 연못으로 모여들어 기뻐하며 생업을 꾸려나가고 , 인군은 백성을 흥기시켜 기운을 북돋아야 한다 . 그러나 이렇게 모든 백성이 모여들 때 , 군자는 항상 나라와 백성의 안녕을 생각하고 국방 ( 國防 ) 을 생각한다 . 그래서 백성을 보호하고 나라를 지키기 위한 병기를 수리하여 만일의 사태에 대비하여 경계한다 . ‘ 유비무환 ( 有備無患 ) ’ 이다 . 효사 및 효상사 初六은 有孚나 不終이면 乃亂乃萃하릴새 若號하면 一握爲笑하리니 勿恤코 往하면 无咎리라. 초륙    유부    부종      내란내취          약호       일악위소         물휼    왕       무구", "hyosa": {"초효": "초육은 믿음을 두나 끝까지 안하면 이에 어지럽고 이에 모이기 때문에, 만약 부르짖으면 조금 웃음거리가 될 것이니, 근심하지 말고 가면 허물이 없을 것이다. 亂:어지러울 란   號:부르짖을 호   握:쥘 악·주먹 악·장막 악   一握:한 줌, 조금, 약간   笑:웃을 소   恤:근심 휼 초육 백성은 양 자리에 음으로 있고 중을 얻지 못하여 중심을 잡기가 어렵다 . 백성의 마음은 군중심리 ( 群衆心理 ) 로 나타나는데 이합집산 ( 離合集散 ) 의 우려도 있고 , 한번 믿음을 두다가도 여론 ( 輿論 ) 의 흐름에 따라 민감하게 움직인다 . 그래서 백성이 믿음을 두지만 그 믿음을 끝까지 가지지 못하면 , 군중심리로 인해 어지럽게 흩어지고 또 모이는 현상이 있게 된다 . 이러한 상황에 만일 백성의 마음을 모으고자 크게 부르짖으면 여론몰이에 웃음거리가 될 수도 있지만 , 근심하지 말고 백성의 마음을 모아 나가면 허물이 없다 . 원래 백성의 뜻은 한결같지 않고 다양한 것이다 . 象曰 乃亂乃萃는 其志亂也일새라. 상왈 내란내취    기지란야 상전에 말하였다. “이에 어지럽고 이에 모이는 것은 그 뜻이 어지럽기 때문이다.” 六二는 引하면 吉하야 无咎하리니 孚乃利用禴이리라.", "이효": "육이    인      길       무구          부내이용약 육이는 이끌면 길하여 허물이 없을 것이니, 믿어서 이에 간략한 제사를 올림이 이로울 것이다. 引:끌 인   禴:종묘제사이름 약(여름제사·간략한 제사) 육이는 내괘에서 중정한 자리에 있고 , 외괘에서 중정한 구오 인군과 잘 응하고 있다 . 육이가 백성을 이끌 수 있는 것은 내괘의 중을 얻어 구오 인군과 나라를 위한 마음이 변하지 않기 때문이다 . 육이가 변하면 지괘 ( 之卦 ) 가 택수곤 ( 澤水困 ) 이 되니 , 육이 자신은 조금 고달프다는 것을 알 수 있다 . 象曰 引吉无咎는 中하야 未變也일새라. 상왈 인길무구    중       미변야 상전에 말하였다. “이끌면 길해서 허물이 없는 것은 가운데 해서 변하지 않기 때문이다.” 變: 변할 변 六三은 萃如嗟如라 无攸利하니 往하면 无咎어니와 小吝하니라.", "삼효": "육삼    취여차여    무유리      왕       무구         소린 육삼은 모이는데 탄식한다. 이로울 바가 없으니, 가면 허물이 없지만 조금 인색하다. 嗟:탄식할 차 육 삼은 지방제후에 해당하는 자리에 있으나 , 중을 얻지 못하였고 양 자리에 음으로 있어 부당한 상태이다 . 천하 백성이 모이는 때에 모든 백성이 구오 인군을 중심으로 모이니 , 지방제후인 육삼은 자기 자신을 따르는 이가 없어서 탄식한다 . 그래서 구삼 자신으로서는 이로울 바가 없다 . 그럼에도 불구하고 모두가 구오 인군을 믿고 모이는 때에 육삼 자신도 함께 가면 허물이 없지만 , 지방제후라는 자리에 연연하게 되면 조금 인색하게 된다 . 한편 구오 인군은 지방제후인 육삼이 자신의 백성을 구오 인군에게 빼앗김을 탄식한다는 것을 알고 있으면서도 , 육삼의 지방제후를 구오 인군이 겸손하게 받아들이니 , 가서 허물이 없게 된다 . 象曰 往无咎는 上이 巽也일새라. 상왈 왕무구    상    손야 상전에 말하였다. “가서 허물이 없다는 것은 위(구오)가 겸손하기 때문이다.” 巽:공손할 손", "사효": "九四는 大吉이라아 无咎리라. 구사    대길         무구 구사는 크게 길하여야 허물이 없을 것이다. 구사 대신 ( 大臣 ) 은 음 자리에 양으로 있어 자리가 마땅하지 않다 . 때문에 모두가 구오 인군을 중심으로 모이는 때에 지나친 언행을 할 수가 있다 . 구사 대신이 조금이라도 마음과 언행을 바르게 하지 못하면 매우 어렵게 되는 상황이다 . 그래서 이 자리에 있어서는 크게 길해야 허물이 없다고 하였다 . 위와 아래를 연결해 주는 대신의 자리는 언제나 조심스러운 것이다 . 象曰 大吉无咎는 位不當也일새라. 상왈 대길무구    위부당야 상전에 말하였다. “크게 길해야 허물이 없는 것은 자리가 마땅하지 않기 때문이다.”", "오효": "구오 인군의 명을 받들어 초육의 백성을 잘 이끌면 길하고 허물이 없다 . 백성의 마음을 모으는 데는 허례허식 ( 虛禮虛飾 ) 이 아니라 진실한 마음으로 정성을 기울이는 것이 이롭다 . ‘ 약 ( 禴 ) ’ 은 여름제사를 뜻하고 또한 간략한 제사로 그때그때 올리는 제사를 뜻한다 . 백성과 가까이 하면서 수시로 백성의 마음을 규합하기 위한 정성을 그때그때 올리는 것이다 . 구오 인군을 중심으로 모이지만 모든 백성이 인군과 만나는 길은 구사 대신을 통하게 되어 있으니 , 九五는 萃有位코 无咎하나 匪孚어든 元永貞이면 悔 亡하리라. 구오    취유위    무구      비부       원영정       회 망 구오는 모이는데 자리가 있고 허물이 없으나, 믿지 않거든 착하고 오래하고 바르게 하면 뉘우침이 없어질 것이다. 외괘에서 중정한 자리에 있는 구오 인군은 천하 백성을 모을 수 있는 자리이다 . 인군으로서 사당을 두는데 지극한 마음으로 하고 , 큰 희생을 써서 백성을 모은다 . 그러니 만일 백성이 믿지 않더라도 중정한 마음으로 백성이 신뢰를 가질 수 있도록 오래갈 수 있는 정책을 제시하고 또한 바르게 하면 뉘우침이 없어진다 . 구오의 자리가 중정하여 백성을 모으는 자리이지만 , 백성이 믿음을 두지 않을 수도 있는 것은 외괘가 태택 ( 兌澤 ) ☱ 으로 저물어가는 석양 ( 夕陽 ) 처럼 어두워지고 기울어지는 양상에 있어 , 그 뜻이 빛나지 않기 때문이다 . 象曰 萃有位는 志未光也일새라. 상왈 취유위    지미광야 상전에 말하였다. “모이는 데 자리가 있다는 것은 뜻이 빛나지 않기 때문이다.” 上六은 齎咨涕洟니 无咎니라. 상륙    자자체이    무구", "상효": "상육은 탄식하고 탄식하며 눈물콧물을 흘리니, 허물할 데가 없다. 齎:가져갈 자·탄식할 자(재)   咨:물을 자·탄식할 자   涕:눈물 체  洟: 콧물 이 상육은 천하백성이 다 모이는 때에 맨 위에 처하여 있다 . 자리는 높은 데 있지만 , 천하 백성이 모두 구오 인군을 따르니 어느 누구도 상육을 알아주지 않는다 . 이에 스스로를 한탄하며 탄식하고 슬픈 마음에 눈물콧물을 흘리는데 , 이는 어느 누구의 탓이 아니라 스스로의 업보이다 . 맨 위에 있지만 마음이 슬프기만 하고 편안하지 못하다 . 상육이 동하여 천하를 모이게 하려고 해도 , 지괘 ( 之卦 ) 가 천지비 ( 天地否 ) 괘가 되어 위와 아래가 오히려 막히게 되니 더욱 편안치 못하다 . 象曰 齎咨涕洟는 未安上也라. 상왈 자자체이    미안상야 상전에 말하였다. “탄식하고 탄식하며 눈물콧물을 흘리는 것은 위에서 편안하지 못하기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 497 ∼503 쪽 ."}}, {"num": 46, "ko": "지풍승", "hanja": "地風升", "lines": [0, 1, 1, 0, 0, 0], "url": "https://soosanss.tistory.com/198", "post_id": 198, "gwaui": "하나의 씨앗에서 아름드리나무가 이루어지듯이 모든 현상은 미미한데서 시작되어 크게 이루어진다 . 큰 것을 이루려면 항상 작은 것부터 충실히 하라 ( 積小高大 ).", "gwamyung": "외괘가 곤지 ( 坤地 ) ☷ , 내괘가 손풍 ( 巽風 ) ☴ 으로 이루어진 괘를 ‘ 승 ( 升 ) ’ 이라 한다 . 내괘의 손 ( 巽 ) ☴ 음목 ( 陰木 ) 이 외괘의 곤지 ( 坤地 ) ☷ 땅 위로 자라서 올라간다는 뜻이다 . 승진한다 ․ 올라간다 ․ 순탄하게 일이 잘 풀려나간다는 뜻이다 . 또한 내괘 손 ☴ 으로 겸손하면서도 외괘 곤 ☷ 으로 순한 덕을 갖추면 모든 일이 잘 풀린다 . 아울러 외호괘가 진뢰 ( 震雷 ) ☳ 이니 외괘의 순한 곤지 ( 坤地 ) ☷ 땅으로 역동성 있게 나아갈 수 있다 .", "seogwa": "｢ 전 ｣ 은 택지취괘 다음에 지풍승괘가 온 이유를 다음과 같이 설명하고 있다 . 萃者는 聚也니 聚而上者를 謂之升이라 故로 受之以升하고 취자    취야    취이상자    위지승      고    수지이승 취란 모임이니, 모여서 오르는 것을 승이라 한다. 그러므로 승(升)으로 받고 聚:모일 취   上:오를 상   謂:이를 위 만나서 함께 모여 뜻을 합해 나가면 물질적으로나 정신적으로나 모든 현상이 상승하게 된다 . 그래서 모인다는 취괘 ( 萃卦 ) 고 허물이 없게 된다 . 즉 , 이렇게 어려운 상황에서는 모두가 대인 ( 大人 ) 과 같은 심법 ( 心法 ) 을 가지라는 뜻이다 . 그렇지 않고 말만 하게 되면 어느 누구도 믿지 않는다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 困은 剛揜也니 險以說하야 困而不失其所亨하니 其唯君子乎인저. 단왈 곤    강엄야    험이열       곤이불실기소형      기유군자호 貞大人吉은 以剛中也오 有言不信은 尙口 乃窮也라. 정대인길    이강중야    유언불신    상구 내궁야 단전에 말하였다. “곤(困)은 강이 가려짐이니, 험하되 기뻐하여, 곤궁하되 그 형통한 바를 잃지 않으니, 그 오직 군자인저！ ‘바르게 해서 대인이라야 길함’은 강(剛)으로써 가운데 하기 때문이고, ‘말이 있으면 믿지 않음’은 입을 숭상함이 이에 궁한 것이다.” 揜:가릴 엄   說:기쁠 열   唯:오직 유   尙:숭상할 상   乃:이에 내 곤 ( 困 ) 이 어려운 것은 강하고 밝은 양 (", "gwasangsa": "象曰 澤无水 困이니 君子 以하야 致命遂志하나니라. 상왈 택무수 곤       군자 이      치명수지 상전에 말하였다. “연못에 물이 없는 것이 곤(困)이니, 군자가 이를 본받아 목숨을 다하여 뜻을 이룬다.” 致:이를 치·이룰 치·다할 치   遂:이룰 수·나갈 수· 드디어 수 외괘 태택 ( 兌澤 ) ☱ 의 연못에 내괘 감수 ( 坎水 ) ☵ 의 물이 계속 새어나가서 정작 있어야 할 물이 없는 것이 곤괘 ( 困卦 ) 의 상황이다 . 나라의 근본이 없어지고 민생의 근원이 다 말라있는 지극히 어려운 상황이다 . 이러한 상황에서는 보통 사람들은 자기의 생명을 부지 ( 扶 持 ) 하고자 약탈과 살인 등의 온갖 범죄를 자행할 수도 있다 . 그러나 군자는 이러한 상황에서도 나라의 경제를 회복하고 민생고를 해결하기 위하여 목숨을 바쳐서 뜻을 이룬다 . 우리는 이러한 격언을 잘 알고 있다 . “ 반드시 살고자 하면 죽게 되고 , 반드시 죽고자 하면 살게 된다 ( 必生卽死 必死卽生 ). ” 효사 및 효상사 初六은 臀困于株木이라. 入于幽谷하야 三歲라도 不覿이로다. 초륙    둔곤우주목       입우유곡       삼세       부적", "hyosa": {"초효": "초육 , 초육은 궁둥이가 나무뿌리에 곤하다. 그윽한 골짜기에 들어가서 3년이라도 보지 못하도다. 臀:볼기 둔   株:뿌리 주·줄기 주·그루 주·주식 주   幽:그윽할 유   谷:골 곡  覿:볼 적 초육은 내괘 감수 ( 坎水 ) ☵ 험한 아래에 처하여 있다 . 양 자리에 음으로 거하여 자리도 바르지 못하고 , 중을 얻지 못하여 어려운 상황에 마음을 잃고 있다 . 물이 없어 말라죽은 나무뿌리에 걸터앉아 모든 것을 체념한 상태이다 . 외괘의 구사 양과 응하고 있지만 곤괘 ( 困卦 ) 에서와 같이 지극히 곤궁한 상황에서는 구사도 초육을 도와줄 여력이 없다 . 오직 홀로 어두운 골짜기로 들어가 3 년이 되도록 아무도 보지 못하는 격이다 . 초육의 상황에 처하게 된 것은 어려운 상황에서도 마음의 형통함을 유지하여 굳게 이겨내야 하는데 , 마음이 어두워져 판단을 밝게 하지 못하기 때문이다 . 象曰 入于幽谷은 幽不明也라. 상왈 입우유곡    유불명야 상전에 말하였다. “그윽한 골짜기에 들어감은 그윽해서 밝지 못한 것이다.”", "이효": "구이 , 九二는 困于酒食이나 朱紱이 方來하리니 利用亨祀니 征이면 凶하니 无咎니라. 구이    곤우주식      주불    방래          이용향사    정       흉      무구 구이는 술과 음식에 곤하나 주불(임금)이 바야흐로 올 것이니, 제사를 올리는 것이 이로우니, 가면 흉하니 허물할 데가 없다. 酒:술 주   朱:붉을 주   紱:인끈 불   方:바야흐로 방   亨:제사드릴 향(享 ) 구이는 음 자리에 양으로 있으나 중 ( 中 ) 을 지키고 있어 마음의 형통함을 유지하고자 노력하는 상이다 . 비록 술과 음식에 곤한 상태이지만 중도를 지키니 , 때가 되면 구오 인군이 찾아오게 된다 . 오직 변치 않는 마음으로 지극한 정성을 드려 자리를
