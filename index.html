절불가정    기도 궁야 說以行險하고 當位以節하고 中正以通하니라. 열이행험       당위이절       중정이통 天地節而四時成하나니 節以制度하야 不傷財하며 不害民하나니라. 천지절이사시성          절이제도      불상재       불해민 단전에 말하였다. “‘절(節)이 형통함’은 강(剛)과 유(柔)가 나누어져 강(剛)이 중을 얻었기 때문이고, ‘괴로운 시절은 가히 바르게 하지 못하는 것’은 그 도(道)가 궁하기 때문이다. 기뻐함으로써 험한데 행하고, 자리가 마땅하여 절도가 있고, 중정함으로 통한다. 천지가 절도 있게 하여 사시(四時)가 이루어지니, 절도로써 법도를 지어서 재물을 상하게 하지 않으며, 백성을 해롭게 하지 않는다.” 說:기쁠 열   險:험할 험   制:마를 제   度:법도 도   傷:상할 상  財: 재물 재 수택절 ( 水澤節 ) 괘 역시 풍수환 ( 風水渙 ) 괘와 마찬가지로 삼음삼양 ( 三陰三陽 ) 괘이고 그 체는 지천태 ( 地天泰 ) 괘에 있다 . 내괘가 삼양 ( 剛 ) 이고 외괘 삼음 ( 柔 ) 인 지천태 ( 地天泰 ) 괘에서 강과 유가 나뉘어서 구삼의 강 ( 剛 ) 이 외괘로 가서 중을 얻었기 때문에 절 ( 節 ) 이 형통한 것이다 . 괴로운 시절 , 즉 어려운 때에는 그 도가 궁하기 때문에 가히 바르게 하지 못하고 또한 고집하지 못한다 . 괘덕으로 보면 내괘 태택 ( 兌澤 ) ☱ 의 기뻐함으로 외괘 감수 ( 坎水 ) ☵ 의 험한 데를 내호괘 진뢰 ( 震雷 ) ☳ 로 움직여 가고 , 외괘의 사효와 오효 상효가 모두 자리가 마땅하여 절도가 있고 , 또한 구오가 외괘의 중 ( 中 ) 을 얻어 양 자리에 양으로 중정 ( 中正 ) 하니 통하고 있다 . 천지 ( 天地 ) 가 절도 있게 하여 춘하추동 사시가 이루어지는 것과 같이 , 절도로써 각종 제도와 도수를 만들어 재물을 상하지 않게 하고 , 백성을 해롭게 하지 않는다 . 모든 것은 절도가 있어야 지나치지 않게 되고 , 따라서 상함이 없고 해로움이 없다 . 이것이 중용 ( 中庸 )· 중도 ( 中道 ) 의 묘용 ( 妙用 ) 이다 . 《 중용》 제 1 장에 다음과 같은 문장이 있다 . 喜怒哀樂之未發을 謂之中이오 發而皆中節을 謂之和니 中也者는 天下之大本也오 和也者는 天下之達道也니라. 致中和면 天地 位焉하며 萬物이 育焉이니라 . 기쁨·성냄·슬픔·즐거움이 아직 발하지 않은 것을 중(中)이라 이르고, 발해서 모두 절도에 맞는 것을 화(和)라 이르니, 중(中)이라는 것은 천하의 큰 근본이요, 화(和)라는 것은 천하의 통달한 도이다. 중화를 지극히 하면 천지가 자리하며(편안하며) 만물이 잘 길러진다.", "gwasangsa": "象曰 澤上有水 節이니 君子 以하야 制數度하며 議德行하나니라. 상왈 택상유수 절       군자 이      제수도       의덕행 상전에 말하였다. “연못 위에 물이 있는 것이 절(節)이니, 군자가 이를 본받아 도수와 법도를 지으며 덕행을 의논한다.” 制:마름할 제·지을 제   議:의논할 의 내괘 태택 ( 兌澤 ) ☱ 연못 위에 외괘 감수 ( 坎水 ) ☵ 물이 있는 것이 절괘 ( 節卦 ) 이다 . 즉 연못에 물이 고여 있는데 연못의 제방이 튼튼해야 물이 새지 않으며 , 또한 연못의 물이 적절해야 넘쳐흐르지 않게 된다 . 이러한 절괘 ( 節卦 ) 의 상을 보아 군자는 민생 ( 民生 ) 에 필요한 도수 ( 度數 ) 를 만들어 적절한 사회제도를 이루며 , 또한 덕행을 의논하여 사회의 올바른 예의범절 ( 禮儀凡節 ) 을 만든다 . 효사 및 효상사", "hyosa": {"초효": "初九는 不出戶庭이면 无咎리라. 초구    불출호정       무구 초구는 호정(집안 뜰)을 나서지 않으면 허물이 없을 것이다. 戶:지게 호·외짝문 호   庭: 뜰 정 초구는 수택절 ( 水澤節 )", "이효": "九二는 不出門庭이라 凶하니라. 구이    불출문정       흉 구이는 문정(대문앞 뜰)을 나서지 않는다. 흉하다. 수택절괘의 이효는 음 자리에 양으로 있어 자리가 부당하나 내괘의 중 ( 中 ) 을 얻은 상태이다 . 그런데 절도 ( 節度 ) 를 중시하는 절괘 ( 節卦 ) 에 있어서 초효는 위험한 상황이 앞에 있기 때문에 일을 주밀하게 하기 위해 문밖을 나서지 않으니 허물이 없다고 하였는데 , 정작 바로 위에 있는 이효에서는 때가 되었는데도 문밖을 나서지 않으니 때를 잃음이 극하여 흉하다고 하였다 . 그만큼 때를 포착하고 때에 맞게 움직이는 것이 어렵다는 것을 나타내고 있다 . 구이가 변하면 지괘 ( 之卦 ) 가 수뢰둔 ( 水雷屯 ) 괘가 되는데 , 둔괘 ( 屯卦 ) 육이 효사에도 때를 놓쳐서 10 년 만에 시집가는 것으로 묘사되고 있다 . 六二는 屯如邅如하며 乘馬班如하니 匪寇면 婚媾리니 女子 貞하야 不字라가 十年에야 乃字로다. 육이는 어려우며 머뭇거리는 듯하며 말을 타도 말이 서성거리니, 도적이 아니면 청혼해 오리니, 여자가 곧아서 시집가지 않다가 십년에야 이에 시집가도다. 한편 64 괘 384 효 가운데 이효 ( 二爻 ) 에서 ‘ 흉 ( 凶 ) ’ 하다는 단정사 ( 斷定辭 ) 를 쓴 곳은 수택절괘 구이 효사와 산지박 ( 山地剝 ) 괘 육이 효사가 있다 . 산지박괘 육이 효사는 “ 剝牀以辨 이니 蔑貞 이라 凶 토다 ” 라고 하였다 . 象曰 不出門庭凶은 失時 極也일새라. 상왈 불출문정흉    실시 극야 상전에 말하였다. “문정을 나서지 않아서 흉함은 때를 잃음이 극하기 때문이다.” 六三은 不節若이면 則嗟若하리니 无咎니라.", "삼효": "육삼    부절약       즉차약         무구 육삼은 절제하지 않으면 곧 탄식하게 될 것이니, 허물할 데가 없다. 嗟:탄식할 차 육삼은 양 자리에 음으로 있어 자리가 부당하고 중 ( 中 ) 도 얻지 못한 상태이다 . 육삼 자리는 내괘 태택 ( 兌澤 ) ☱ 연못의 위에 물이 담기는 곳이니 , 조절하지 못하면 물이 넘쳐 재앙이 되어 탄식하게 된다는 뜻이다 . 이는 절제하지 못한 자신의 잘못이므로 남을 탓할 일이 아니다 . 象曰 不節之嗟를 又誰咎也리오. 상왈 부절지차    우수구야 상전에 말하였다. “절제하지 못하여 탄식함을 또 누구를 허물하겠는가?” 又:또 우   誰:누구 수   咎: 허물 구 六四는 安節이니 亨하니라.", "사효": "육사    안절       형 육사는 편안한 시절이니 형통하다. 육사는 음 자리에 음으로 있어 제자리를 얻었다 . 내괘 태택 ☱ 연못 위에 고여 있는 물이 잔잔하듯이 편안한 상태이다 . 형통하다 . 또한 대신 ( 大臣 ) 의 자리에서 겸손하게 중정한 구오의 도를 이으니 형통하다 . 象曰 安節之亨은 承上道也라. 상왈 안절지형    승상도야 상전에 말하였다. “편안한 시절이 형통함은 위(구오)의 도를 잇는 것이다.” 承:이을 승·받들 승", "오효": "九五는 甘節이라. 吉하니 往하면 有尙하리라. 구오    감절       길       왕       유상 구오는 달콤한(즐거운) 시절이다. 길하니 가면 숭상함이 있을 것이다. 甘:달 감   尙:숭상할 상· 오히려 상 구오는 외괘에서 중정한 자리에 있다 . 중도 ( 中道 ) 를 지키니 초조하지 않고 즐거운 마음으로 잘 조절할 수 있다 . 길하니 그런 상태로 가면 정치를 잘하게 되어 숭상함이 있다 . 구오가 변하면 지택림 ( 地澤臨 ) 괘가 되는데 , 임괘 ( 臨卦 ) 육오효에는 “ 지혜롭게 임하니 대군의 마땅함이니 길하다 ( 六五 는 知臨 이니 大君之宜 니 吉 하니라 ) ” 고 하였다 . 象曰 甘節之吉은 居位中也일새라. 상왈 감절지길    거위중야 상전에 말하였다. “달콤한(즐거운) 시절이 길함은 거한 자리가 가운데하기 때문이다.” 上六은 苦節이니 貞이면 凶코 悔면 亡하리라.", "상효": "상육    고절       정      흉    회    망 상육은 괴로운 시절이니 고집하면 흉하고 뉘우치면 없어질 것이다. 상육은 절괘 ( 節卦 ) 의 극에 처하여 절도 ( 節度 ) 를 잃어 그 도 ( 道 ) 가 궁하게 된 상태이다 . 이러한 상태를 고집해가면 흉하고 , 뉘우쳐서 반성하고 절제를 하면 흉함이 없어진다 . 상육이 변하면 풍택중부 ( 風澤中孚 ) 괘가 되니 , 절도 ( 節度 ) 와 중도 ( 中道 ) 가 있는 돈독한 마음 ( 中孚之心 ) 을 유지하는 것이 필요하다 . 象曰 苦節貞凶은 其道 窮也일새라. 상왈 고절정흉    기도 궁야 상전에 말하였다. “괴로운 시절에 고집해서 흉함은 그 도가 궁하기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 619 ∼626 쪽 ."}}, {"num": 61, "ko": "풍택중부", "hanja": "風澤中孚", "lines": [1, 1, 0, 0, 1, 1], "url": "https://soosanss.tistory.com/213", "post_id": 213, "gwaui": "어떠한 상황에서도 중정하게 돈독한 마음을 지녀야 한다 . 올바르고 중정한 군자 ( 정치인 ) 라면 돈독한 마음으로 사회에 해악을 끼치는 자라도 용서하고 덕으로 교화할 수 있는 덕행을 해야 된다 ( 議獄緩死 ).", "gwamyung": "외괘가 손풍 ( 巽風 ) ☴ , 내괘가 태택 ( 兌澤 ) ☱ 으로 이루어진 괘를 ‘ 중부 ( 中孚 ) ’ 라고 한다 . 가운데에 믿음이 충실한 상태라는 뜻이다 . ‘ 부 ( 孚 ) ’ 자는 새가 알을 품고 있는 형상으로 어미가 자식을 사랑하는 돈독한 마음을 나타낸다 . 연못 위에 바람이 부니 , 바람 따라 물결이 파동을 일으킨다 . 하늘에서 신명 ( 申命 ) 이 행하니 아래에서는 기뻐하며 따른다 . 돈독한 믿음 , 신앙 ( 信仰 ) 의 본 뜻을 밝히고 있다 . 중수감 ( 重水坎 ) 괘에서 상효가 변하면 풍수환 ( 風水渙 ) 괘가 되고 , 초효가 변하면 수택절 ( 水澤節 ) 괘가 되며 , 초효와 상효가 함께 변하면 풍택중부 ( 風澤中孚 ) 괘가 된다 . 땅에서 물이 거듭하여 재앙이 되는 때에 돈독한 믿음을 가지는 것이 무엇보다 중요하다 . 사람만이 아니라 동물의 마음까지도 움직일 수 있는 믿음이 필요하다 .", "seogwa": "｢ 전 ｣ 은 수택절괘 다음에 풍택중부괘가 온 것을 다음과 같이 설명하고 있다 . 節而信之라 故로 受之以中孚하고 절이신지    고   수지이중부 절도가 있으면 믿게 된다. 그러므로 중부(中孚)로써 받고 수택절 ( 水澤節 ) 괘에서 나라와 백성을 위한 제도를 적절하게 만들고 , 덕행을 의논하여 모든 것을 조절하니 만 백성이 믿게 된다 . 그래서 돈독한 믿음을 나타내는 중부괘 ( 中孚卦 ) 를 절괘 ( 節卦 ) 다음에 두었다 .", "gwasa": "中孚는 豚魚면 吉하니 利涉大川하고 利貞하니라. 중부    돈어    길       이섭대천      이정 중부(中孚)는 돼지와 물고기까지 (믿게) 하면 길하니, 큰 내를 건넘이 이롭고 바르게 함이 이롭다. 豚:돼지 돈   魚: 물고기 어 마음으로부터 돈독하게 믿으면 , 그 믿음이 돼지나 물고기에까지 미치게 되어 길하다 . 그야말로 만 백성이 따르고 천하를 움직일 수 있는 믿음이니 길하고 , 큰 내를 건너가는 큰일을 함이 이롭다 . 그렇지만 돈독한 믿음으로 큰일을 도모함에도 바르게 해야 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 中孚는 柔在內而剛得中할새니 단왈 중부    유재내이강득중 說而巽할새 孚 乃化邦也니라. 열이손       부 내화방야 豚魚吉은 信及豚魚也오 利涉大川은 乘木고 舟虛也오 돈어길    신급돈어야    이섭대천    승목    주허야 中孚코 以利貞이면 乃應乎天也리라. 중부    이이정       내응호천야 단전에 말하였다. “중부(中孚)는 유(柔)가 안에 있고 강(剛)이 중을 얻었기 때문이니, 기뻐하고 겸손하기 때문에 믿음이 이에 나라를 화한다. ‘돼지와 물고기가 길함’은 믿음이 돼지나 물고기까지 미치는 것이고, ‘큰 내를 건넘이 이로움’은 나무를 타고 배가 비어 있음이요, 중부(中孚)하고 바르게 하여 이롭게 하면 이에 하늘에 응할 것이다.” 說 : 기쁠 열   巽 : 공손할 손   邦 : 나라 방   及 : 미칠 급   乘 : 탈 승  舟 : 배 주   虛 : 빌 허   應 : 응할 응 중부 ( 中孚 ) 는 육삼과 육사의 부드러운 음 ( 陰 ) 이 안에 있고 또한 구이와 구오의 강 ( 剛 ) 이 각각 내괘와 외괘에서 중을 얻어 있다 . 즉 안으로는 겸허하게 마음을 비워 만물을 수용할 듯한 믿음을 지니고 있으면서도 강직하게 중을 지키고 있는 상이다 . 괘덕 ( 卦 德 ) 이 내괘로는 태택 ( 兌澤 ) ☱ 으로 기뻐하면서 외괘 손풍 ( 巽風 ) ☴ 으로 겸손하니 , 그 믿음이 나라를 잘되게 한다 . 이러한 믿음을 지니면 돼지나 물고기와 같은 미물 ( 微物 ) 도 따르게 된다 . ‘ 큰 내를 건넘이 이롭다 ’ 는 것은 억조창생 ( 億 兆 蒼生 ) 을 구제하는 큰일을 하는 것이다 . 내호괘 진뢰 ( 震 雷 ) ☳ 로 강한 노를 만들고 외괘 손풍 ( 巽風 ) ☴ 음목 ( 陰木 ) 으로 배를 만들어 , 비어 있는 배 안에 외호괘 간산 ( 艮山 ) ☶ 으로 가득히 백성을 실어 구제하는 것이다 . 이렇게 중부 ( 中孚 ) 의 마음을 가지고 바르게 해 나가면 하늘도 감동하여 그 뜻에 응하게 된다 .", "gwasangsa": "象曰 澤上有風이 中孚니 君子 以하야 議獄하며 緩死하나니라. 상왈 택상유풍    중부    군자 이       의옥      완사 상전에 말하였다. “연못 위에 바람이 있는 것이 중부(中孚)니, 군자가 이를 본받아 옥사(獄事)를 의논하며 죽임을 늦춘다.” 議:의논할 의   獄:옥 옥   緩:느릴 완·부드러울 완· 늦출 완 내괘 태택 ( 兌澤 ) ☱ 연못 위에 외괘 손풍 ( 巽風 ) ☴ 바람이 있는 것이 중부괘 ( 中孚卦 ) 의 상이다 . 내괘로는 기뻐하면서 외괘로는 겸손하게 일을 행한다 . 풍택중부 ( 風澤中孚 ) 괘는 중수감 ( 重水坎 ) 괘 초효와 상효가 변하여 온 것이기에 , 억조창생 ( 億兆蒼生 ) 을 구제하라는 하늘의 명 ( 命 ) 이 위에서 행하는 것이다 . 도탄 ( 塗炭 ) 에 빠진 민생 ( 民生 ) 을 구제해야 하는 이 때에는 형벌을 엄하게 할 수 없다 . 죄 ( 罪 ) 의 경중 ( 輕重 ) 을 잘 헤아려 옥사 ( 獄事 ) 를 의논하고 설사 죽을 죄를 지었더라도 감형 ( 減刑 ) 하는 등 너그럽게 해야 한다 . 나라가 전체적으로 어려워 민생이 도탄에 빠져서 어쩔 수 없이 행해지는 범죄 ( 犯罪 ) 는 나라에 책임이 있는 것이기 때문에 무조건 엄한 형벌로 다스릴 수는 없다 . 효사 및 효상사", "hyosa": {"초효": "初九는 虞하면 吉하니 有他면 不燕하리라. 초구    우      길       유타    불연 초구는 헤아리면 길하니, 다름이 있으면 편안하지 못할 것이다. 虞:헤아릴 우·근심할 우·편안할 우·우제 우·벼슬이름 우(산택을 맡은 관리)·어진짐승 우 他:다를 타   燕:제비 연·잔치 연·편안할 연 초구는 민초 ( 民草 ) 의 자리이다 . 민심 ( 民心 ) 이 천심 ( 天心 ) 이다 . 초효가 변하면 풍수환 ( 風水渙 ) 괘가 되어 험난한 물의 재앙에 빠지게 되니 , 그저 아무 욕심이 없는 백성으로서는 어려운 지경에도 백성이 따르고 믿어야 할 인군 ( 人君 ) 이 누구인지를 잘 헤아려서 따라야 한다 . 그래야 민생을 구제할 인군은 백성을 믿고 큰일을 할 수 있다 . 만일 다른 데에 뜻을 두어 이합집산 ( 離合集散 ) 하게 되면 백성 모두가 편안하지 못할 것이다 . 중부괘 ( 中孚卦 ) 는 사사로운 관계를 의미하는 것이 아니기 때문에 , 음양 ( 陰陽 ) 이 합하는 것은 옳지 않다 . 그래서 초구가 양 ( 陽 ) 으로 육사 음 ( 陰 ) 과 잘 응하고 있지만 , 오히려 잘 헤아려서 인군인 구오를 따라야 하는 것이다 . 象曰 初九虞吉은 志未變也일새라. 상왈 초구우길    지미변야 상전에 말하였다. “초구가 헤아려서 길함은 뜻이 변하지 않기 때문이다.” 초구 백성이 구오 인군을 따르고 ,", "이효": "九二는 鳴鶴이 在陰이어늘 其子 和之로다. 我有好爵하야 吾與爾靡之하노라. 구이    명학    재음         기자 화지        아유호작       오여이미지 구이는 우는 학이 그늘에 있거늘, 그 자식이 화답하도다. 나에게 좋은 벼슬이 있어서 내가 너와 더불어 얽히노라. 鳴:울 명   鶴:학 학   和:화할 화   我:나 아   好:좋을 호   爵:잔 작·벼슬 작·참새 작   吾:나 오   爾:너 이 靡:쓰러질 미·화려할 미·다할 미·없을 미·나눌 미· 얽힐 미 구이는 음 자리에 양으로 있지만 내괘에서 중 ( 中 ) 을 얻어 , 돈독한 믿음으로 외괘 구오와 응한다 . 마치 새끼 학이 저 그늘에 숨어 울고 있는데 , 어미 학이 모이를 물고 새끼를 부르니 새끼 학이 화답하는 것과 같다 . 구이 신하는 마음으로 통하고 ,", "삼효": "육삼    득적       혹고혹파혹읍혹가 육삼은 적을 얻어서 혹 두드리고 혹 파하고 혹 울고 혹 노래하도다. 得:얻을 득   敵:원수 적   或:혹 혹   鼓:두드릴 고·북 고  罷:파할 파·그칠 파·물러갈 파   泣:울 읍   歌:노래할 가 육삼은 중 ( 中 ) 을 얻지 못하였고 양 자리에 음으로 있어 자리가 부당하다 . 돈독한 믿음이 있어야 하는 중부괘 ( 中孚卦 ) 에서 육삼은 중도 얻지 못하고 자리도 부당한 상태에서 상구 양 ( 陽 ) 과 사사로이 응하니 , 중부지심 ( 中孚之心 ) 이 이루어지지 못하여 마치 적을 얻은 것과 같다 . 부당하고 사사로이 처신을 하니 , 그저 상구를 만나 혹 두드리고 혹 파하고 혹 울고 혹 노래하는 등 스스로의 마음을 잃어버린 상태가 된다 . 象曰 或鼓或罷는 位不當也일새라. 상왈 혹고혹파    위부당야 상전에 말하였다. “혹 두드리고 혹 파하는 것은 자리가 마땅하지 않기 때문이다.” 六四는 月幾望이니 馬匹이 亡하면 无咎리라.", "사효": "육사    월기망       마필    망      무구 육사는 달이 거의 보름이니 말의 짝이 없어지면 허물이 없을 것이다. 幾:거의 기·기미 기   望:바랄 망·보름 망   匹:짝 필 육사는 중 ( 中 ) 을 얻지 못하였으나 , 음 자리에 음으로 자리가 바르다 . 또한 대신 ( 大臣 ) 의 자리에 거하여 중정한 구오 인군의 명을 잘 받들어야 한다 . 그런데 육사 입장에서는 초구의 양 ( 陽 ) 과 응하고 있으니 , 사사로운 관계에 매이는 격이다 . 그래서 말의 짝 , 즉 응하는 초구에 매이지 않으면 , 육사 대신은 또한 사사로운 관계를 끊고 구오 인군을 따르니 , 이는 구오 인군이 중정한 마음으로 믿음을 두기 때문이다 . 象曰 有孚攣如는 位正當也일새라. 상왈 유부연여    위정당야 상전에 말하였다. “믿음을 둠이 걸려 이어지는 듯함은 자리가 정당하기 때문이다.”", "오효": "구오 인군인 나에게 좋은 벼슬이 있으니 내가 구이와 더불어 얽혀서 큰일을 같이 하자는 것이다 . 중부 ( 中孚 ) 의 마음으로 구이가 원하니 , 구오 인군이 또한 중부 ( 中孚 ) 의 마음으로 화답한다 . 언어 ( 言 語 ) 이전에 마음의 중요성을 강조하여 공자 ( 孔 子 ) 는 ｢ 계사상전 ｣ 제 8 장에서 다음과 같이 설명하고 있다 . 鳴鶴이 在陰이어늘 其子 和之로다. 我有好爵하야 吾與爾靡之라하니 子曰君子 居其室하야 出其言에 善이면 則千里之外 應之하나니 況其邇者乎여. 居其室하야 出其言에 不善이면 則千里之外 違之하나니 況其邇者乎여. 言出乎身하야 加乎民하며 行發乎邇하야 見乎遠하나니 言行은 君子之樞機니 樞機之發이 榮辱之主也라. 言行은 君子之所以動天地也니 可不愼乎아. “우는 학이 그늘에 있거늘 그 자식이 화답하도다. 나에게 좋은 벼슬이 있어서 내가 너와 더불어 얽힌다”라고 하니, 공자께서 말씀하셨다. “군자가 그 집에 거해서 그 말을 냄에 선하면 천리 밖에서 응하니, 하물며 그 가까운데 있어서랴！ 그 집에 거하여 그 말을 냄에 불선하면 천리 밖에서 어기니, 하물며 그 가까운데 있어서랴！ 말이 몸에서 나와 백성에게 더하며, 행실이 가까운데서 발하여 먼 곳에서 나타나니, 언행(言行)은 군자의 추기(樞機)니, 추기(樞機)의 발함이 영예와 욕됨의 주가 된다. 언행(言行)은 군자가 이로써 천지를 움직이는 바니, 가히 삼가지 않을 수 있겠는가?” 象曰 其子和之는 中心願也라. 상왈 기자화지    중심원야 상전에 말하였다. “그 자식이 화답하는 것은 중심으로 원함이다.” 六三은 得敵하야 或鼓或罷或泣或歌로다. 구오 인군에게 돈독하게 부응할 수 있어 허물이 없다고 한 것이다 . ‘ 달이 거의 보름 ’ 이라는 것은 음 자리에 음으로 바르니 , 마치 보름에 가까운 달처럼 밝게 처신한다는 뜻이고 , 또 다 . 백성과 신하는 물론 육오 인군도 만나지 않고 지나쳐서 날아가는 새가 되어 떠나니 , 실로 현실을 버리고 환상 ( 幻像 ) 을 쫓아가는 것과 같아 흉하다 . 이렇게 현실을 버리고 허황된 망상 ( 妄想 ) 을 좇아 떠나는 것을 재앙 ( 災殃 ) 이라 하는 것이다 . 소과괘 ( 小過卦 ) 에서 초효와 상효에 모두 ‘ 비조 ( 飛鳥 ) ’ 가 나온다 . 초효와 상효의 나는 새 ( 飛鳥 ) 가 떠나면 바로 중화리 ( 重火離 ) 괘가 된다 . 소과괘가 상경 중화리괘와 밀접한 관련이 있음을 효사의 내용을 통해서도 알 수 있다 . 象曰 弗遇過之는 已亢也라. 상왈 불우과지    이항야 상전에 말하였다. “만나지 않고 지나쳐가는 것은 이미 올라간 것이다.” 已:이미 이   亢:목 항·지나칠 항· 올라갈 항 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 635 ∼642 쪽 ."}}, {"num": 63, "ko": "수화기제", "hanja": "水火旣濟", "lines": [0, 1, 0, 1, 0, 1], "url": "https://soosanss.tistory.com/215", "post_id": 215, "gwaui": "모든 것이 해결되고 완결되어 마무리되었을 때 다음을 생각하는 군자는 항상 근심될 것을 생각하여 미리 예방하여야 한다 ( 思患豫防 ).", "gwamyung": "외괘가 감수 ( 坎水 ) ☵ , 내괘가 이화 ( 離火 ) ☲ 로 이루어진 괘를 ‘ 기제 ( 旣濟 ) ’ 라고 한다 . 모든 것이 이미 가지런하게 됐다는 뜻이다 . 완결된 것이다 . 기제괘 ( 旣濟卦 ) 는 초효부터 상효에 이르기까지 모든 효가 제자리를 얻은 유일한 괘이다 . 모든 상황이 제자리를 찾아 정비가 완료된 상태이다 . 그러나 위에는 물이요 아래는 불이니 , 물불 ( 水火 ) 의 상호작용으로 완결된 기제 ( 旣濟 ) 의 상태는 오래 가지 못한다 . 《 주역 ( 周易 )》 의 구조는 체계적이고 원리적이다 . 상경 ( 上經 ) 이 산뢰이 ( 山雷 頤 )· 택풍대과 ( 澤風大過 )· 중수감 ( 重水坎 )· 중화리 ( 重火離 ) 로 마무리를 하고 있는데 , 이괘 ( 頤 卦 ) 는 이 ( 離 ) ☲ 의 상이고 , 대과괘 ( 大過卦 ) 는 감 ( 坎 ) ☵ 의 상이다 . 그리고 물이 거듭한 감괘 ( 坎卦 ) 와 불이 거듭한 이괘 ( 離卦 ) 로 끝을 맺고 있다 . 한편 하경 ( 下經 ) 을 보면 중부괘 ( 中孚卦 ) 는 이 ( 離 ) ☲ 의 상이고 , 소과괘 ( 小過卦 ) 는 감 ( 坎 ) ☵ 의 상이며 , 물불 ( 水火 ) 이 상호 작용하는 수화기제괘와 화수미제괘로 마무리하고 있다 .", "seogwa": "｢ 전 ｣ 은 뇌산소과괘 다음에 수화기제괘가 온 것을 다음과 같이 설명하고 있다 . 有過物者는 必濟라 故로 受之以旣濟하고 유과물자    필제    고   수지이기제 물건을 지나침이 있는 자는 반드시 건넌다. 그러므로 기제로써 받고 조금 지나친다는 뇌산소과 ( 雷山小過 ) 괘에서 지나침을 삼가고 중도를 잘 지키면 , 하고자 하는 일 또는 어려운 일을 반드시 이룰 수 있다 . 그러므로 이미 건넜다는 기제괘 ( 旣濟卦 ) 를 소과괘 ( 小過卦 ) 다음에 둔 것이다 .", "gwasa": "旣濟는 亨이 小니 利貞하니 初吉코 終亂하니라. 기제    형    소   이정       초길    종란 기제(旣濟)는 형통함이 작으니, 바르게 함이 이로우니, 처음은 길하고 마침은 어지럽다. 旣:이미 기   濟:건널 제   亂:어지러울 란 기제 ( 旣濟 ) 는 이미 모든 것이 제자리를 찾아 완료된 상태이기 때문에 , 더 이상 해야 할 일이 없는 것과 같다 . 그러니 정작 모든 것이 가지런하게 되면 , 그로 인한 형통함은 작은 것이다 . 또한 내괘 이화 ( 離火 ) ☲ 는 밝은 문명이나 외괘 감수 ( 坎水 ) ☵ 는 어둡고 어려운 상이니 , 밝은 문명인 내괘에서 중을 얻은 육이 음 ( 陰 , 작은 것 ) 이 형통한 것이다 . 그렇지만 바르게 함이 이로운데 내괘의 처음은 길하지만 외괘로 넘어가면 어렵게 되니 , 모든 일을 마치면 곧 어지럽게 되기 때문이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 旣濟亨은 小者 亨也니 利貞은 剛柔 正而位當也일새라. 단왈 기제형    소자 형야    이정    강유 정이위당야 初吉은 柔得中也오 終止則亂은 其道 窮也라. 초길    유득중야    종지즉란    기도 궁야 단전에 말하였다. “기제(旣濟)가 형통함은 작은 것이 형통하니, ‘바르게 함이 이로움’은 강(剛)과 유(柔)가 바르게 되어 자리가 마땅하기 때문이다. ‘처음은 길한 것’은 유(柔)가 중을 얻은 것이고, ‘마침내 그치면 곧 어지럽게 됨’은 그 도가 궁한 것이다.” ‘ 기제 ( 旣濟 ) 가 형통하다 ’ 는 것은 내괘 육이 음 ( 陰 ) 의 작은 것이 형통하다는 것이다 . ‘ 바르게 함이 이롭다 ’ 는 것은 기제괘 ( 旣濟卦 ) 는 초효부터 상효에 이르기까지 강 ( 陽 ) 과 유 ( 陰 ) 가 바르게 제자리에 있기 때문이다 . ‘ 처음에는 길하다 ’ 는 것은 내괘 육이 음이 중을 얻었기 때문이고 , ‘ 마침내 그치면 어지럽게 된다 ’ 는 것은 결국에 가서는 그 도가 궁해지기 때문이다 .", "gwasangsa": "象曰 水在火上이 旣濟니 君子 以하야 思患而豫防之하나니라. 상왈 수재화상    기제    군자 이       사환이예방지 상전에 말하였다. “물이 불 위에 있는 것이 기제(旣濟)니, 군자가 이를 본받아 근심될 것을 생각하여 미리 막는다.” 思:생각할 사   患:근심 환   豫:미리 예   防: 막을 방 물이 불 위에 있는 것이 기제괘 ( 旣濟卦 ) 의 상이다 . 그래서 내괘 이화 ( 離火 ) ☲ 의 문명함이 언제 외괘 감수 ( 坎水 ) ☵ 물에 의해 어둡게 될지 모른다 . 이에 군자는 항상 언제 닥칠지 모르는 환란 ( 患亂 ) 을 생각하여 미리 방비 ( 防備 ) 한다 . 모든 것이 가지런하게 되어 평화로울 때 , 군자는 어지러워질 것을 미리 대비한다 . ‘ 유비무환 ( 有備無患 ) ’ 을 말하는 것이다 . 노자 《 도덕경 ( 道德經 )》 제 64 장에 다음 구절이 있다 . 民之從事는 常於幾成而敗之하나니 愼終如始하면 則無敗事하니라. 백성이 일을 좇는 것은 항상 거의 완성되었을 때 패하게 되니, 삼가 마침을 비롯할 때처럼 하면 곧 패하는 일이 없다. 기제괘 ( 旣濟卦 ) 는 모두가 제자리에 있는 완성된 상태이기 때문에 , 그 자리를 잘 지키고 있어야 한다 . 때문에 초효부터 상효에 이르기까지 모두가 음양 ( 陰陽 ) 으로 잘 응하고 있지만 , 응하는 관계로 설명되지 않고 각자의 자리에서 본분을 지키는 것으로 설명되고 있다 . 효사 및 효상사", "hyosa": {"초효": "初九는 曳其輪하며 濡其尾면 无咎리라. 초구    예기륜      유기미    무구 초구는 그 수레를 끌며 그 꼬리를 적시면 허물이 없을 것이다. 曳:끌 예   輪:바퀴 륜·수레 륜   濡:젖을 유   尾:꼬리 미 모든 것이 완료된 기제괘 ( 旣濟卦 ) 에서 맨 아래에 있는 초구는 더 이상 해야 할 일이 없다 . 또한 외괘에 감수 ( 坎水 ) ☵ 의 험한 물이 앞에 있다 . 그래서 내괘 이화 ( 離火 ) ☲ 의 수레가 가지 못하도록 끌고 , 동물로 치면 물에 꼬리를 적셔서 험한 물을 건너지 못하는 것과 같이 하면 허물이 없다 . 초구가 변하면 내괘가 간산 ( 艮山 ) ☶ 이 되니 , 그 자리에 그쳐 있어야 한다 ( 艮爲止 ). 또한 초구가 변하면 지괘 ( 之卦 ) 가 수산건 ( 水山蹇 ) 괘가 되니 , 자칫하면 어려움에 빠져들게 된다 . 象曰 曳其輪은 義无咎也니라. 상왈 예기륜    의무구야 상전에 말하였다. “그 수레를 끄는 것은 의리가 허물이 없는 것이다.” 六二는 婦喪其茀이니 勿逐하면 七日애 得하리라.", "이효": "육이    부상기불      물축       칠일    득 육이는 지어미가 그 포장(얼굴을 가리는 것)을 잃으니, 쫓지 않으면 7일 만에 얻을 것이다. 婦:지어미 부   喪:잃을 상   茀:풀숲 불·다스릴 불·머리꾸미개 불·수레포장 불  逐: 쫓을 축 육이는 내괘에서 중정 ( 中正 ) 한 자리이다 . 역시 초효와 마찬가지로 모든 것이 가지런하게 완료된 상태에서 육이는 더 이상 해야 할 일이 없다 . ‘ 지어미가 외출할 때 얼굴을 가리는 포장을 잃어버렸다 ’ 는 것은 육이가 밖으로 나가지 못하게 되었다는 말이다 . 그 포장을 찾으려 하지 말고 기다리면 , 다시 순환 반복하여 돌아오는 주기 ( 週期 ) 가 되는 7 일에 얻게 된다 . 7 일은 반복 순환하는 자연의 정률 ( 定律 ) 이다 . 또한 육이가 변하면 지괘 ( 之卦 ) 가 수천수 ( 水天需 ) 괘가 되니 기다려야 한다 . 象曰 七日得은 以中道也라. 상왈 칠일득    이중도야 상전에 말하였다. “7일 만에 얻음은 중도(中道)로 하는 것이다.”", "삼효": "九三은 高宗이 伐鬼方하야 三年克之니 小人勿用이니라. 구삼    고종    벌귀방      삼년극지    소인물용 구삼은 고종(高宗)이 귀방(鬼方)을 쳐서 삼년 만에 이기니, 소인은 쓰지 말라. 伐:칠 벌   鬼:귀신 귀   克:이길 극 구삼은 나라로 보면 변방 ( 邊方 ) 을 지키는 지방 제후에 해당된다 . 외괘가 감수 ( 坎水 ) ☵ 로 험한 오랑캐가 있는데 , 나라의 평화를 지키기 위해 변방 ( 鬼方 ) 의 오랑캐를 정벌하는데 3 년 만에 이기게 된다는 말이다 . 고종 ( 高宗 ) 은 은 ( 殷 ) 나라의 왕 무정 ( 武丁 ) 을 말하는데 , 무정이 은나라를 지키기 위해 귀방 ( 鬼方 ) 의 오랑캐를 정벌하는데 오랜 기간에 걸쳐 힘들게 이겼다는 고사 ( 古事 ) 에서 인용된 문장이다 . 3 년 만에 이겼다는 것은 그만큼 힘들고 고달팠다는 뜻이다 . 구삼이 변하면 지괘 ( 之卦 ) 가 수뢰둔 ( 水雷屯 ) 괘가 되니 어려운 상황을 알 수 있다 . 천하를 평정하고 나라를 세우는 데는 항상 소인 ( 小人 ) 을 경계해야 한다 . 소인은 언제나 기회를 잡으면 나라를 어지럽히기 때문이다 . 전쟁을 묘사하고 있는 상경 ( 上經 ) 지수사 ( 地水師 ) 괘 상육효를 다시 깊이 음미해볼 필요가 있다 . 上六은 大君이 有命이니 開國承家애 小人勿用이니라.", "사효": "육사    유   유의여    종일계 육사는 새는데 헤진 옷(걸레)을 두고 종일토록 경계한다. 繻:고운명주 수(유)   濡:젖을 유·샐 유   袽:헤진옷 여·걸레 여   戒:경계할 계 육사는 외괘 감수 ( 坎水 ) ☵ 의 아래에 있으니 험한 물 기운이 스며들 수 있는 자리이다 . 그래서 육사 대신 ( 大臣 ) 은 혹 아래 이화 ( 離火 ) ☲ 의 밝음이 상하지 않도록 물이 스며드는 것을 방지하기 위해 걸레를 가지고 종일토록 경계하며 대비하는 것이다 . 이는 다시 말하면 북방 감수 ( 坎水 ) ☵ 에 처하여 오랑캐의 준동 ( 蠢動 ) 등 의심할 바가 있기 때문이다 . 육사가 변하면 지괘 ( 之卦 ) 가 택화혁 ( 澤 火 革 ) 괘가 되는데 , 방비 ( 防 備 ) 를 소홀히 하면 변혁이 일어나 나라에 큰 혼란이 생기게 된다 . 수 ( 繻 ) 자는 고운 명주를 의미한다 . 그런데 여기에서는 유 ( 濡 ) 자로 보아 젖어들고 새는 것으로 풀이하여야 한다 . 象曰 終日戒는 有所疑也라. 상왈 종일계    유소의야 상전에 말하였다. “종일토록 경계함은 의심할 바가 있는 것이다.” 疑:의심할 의", "오효": "九五는 東隣殺牛 不如西隣之禴祭 實受其福이니라. 구오    동린살우 불여서린지약제 실수기복 구오는 동쪽 이웃이 소를 잡는 것이 서쪽 이웃이 간략한 제사로 실제로 그 복을 받는 것만 같지 못하다. 隣:이웃 린   殺:죽일 살   禴:종묘제사이름 약(간략한 제사·여름 제사 ) 중정 ( 中正 ) 한 구오 인군은 나라가 평화로울 때에도 항상 종묘 ( 宗廟 ) 와 사직 ( 社稷 ) 을 지키고 백성의 안녕을 위하여 천제 ( 天帝 ) 께 제사를 드리는 정성을 다하여야 한다 . 그러나 성대한 음식과 겉치레가 중요한 것이 아니라 , 정작 필요한 때에 적절히 간략하게 준비하여 지극한 정성을 드리는 것이 중요하다 . 기제괘 ( 旣濟卦 ) 구오효가 변하면 지괘 ( 之卦 ) 가 지화명이 ( 地火明夷 ) 괘가 된다 . 지화명이괘는 은 ( 殷 ) 나라 말기 주 ( 周 ) 나라 초기에 혁명이 일어나는 시대적 상황을 그대로 효사에 옮긴 괘이다 . 그래서 기제괘 ( 旣濟卦 ) 구오 효사는 은나라와 주나라를 대비하여 설명한 것이다 . 동쪽 이웃은 은 ( 殷 ) 나라를 말하고 서쪽 이웃은 주 ( 周 ) 나라를 말한다 . 당시 상황으로 볼 때 , 은나라가 천자국 ( 天子國 ) 으로 성대하게 제사를 지내기 위해 소를 잡아 희생하는 것이 주나라가 필요한 때에 간략하게 지극한 정성으로 제사를 올려서 실제로 복을 받는 것만 같지 못하다는 뜻이다 . 이는 필요한 때에 적절히 대비할 수 있는 예방책 ( 豫防策 ) 의 중요성을 강조하는 것이다 . 나라 일이든 가정 일이든 개인 일이든 이른바 ‘ 사후약방문 ( 死後藥方 文 ) ’ 이 되어서는 안 된다 . 象曰 東隣殺牛 不如西隣之時也니 實受其福은 吉大來也라. 상왈 동린살우 불여서린지시야    실수기복    길대래야 상전에 말하였다. “동쪽 이웃이 소를 잡음이 서쪽 이웃의 때만 같지 못하니, 실제로 그 복을 받음은 길함이 크게 오는 것이다.” 上六은 濡其首라 厲하니라. 상륙    유기수    려", "상효": "상육은 대군이 명을 두니 나라를 열고 집을 이음에 소인은 쓰지 말라. 象曰 大君有命은 以正功也오 小人勿用은 必亂邦也일새라 상전에 말하였다. “대군이 명을 둠은 공을 바르게 하는 것이고, 소인을 쓰지 말라는 것은 반드시 나라를 어지럽히기 때문이다. 象曰 三年克之는 憊也라. 상왈 삼년극지    비야 상전에 말하였다. “삼년 만에 이김은 고달픈 것이다.” 憊:고달플 비 六四는 繻애 有衣袽코 終日戒니라. 상육은 그 머리를 적신다. 위태하다. 濡: 젖을 유 상육은 외괘 감수 ( 坎水 ) ☵ 의 물에 머리가 적셔진 상태이다 . 험한데 빠진 꼴이니 위태하다 . 기제괘 ( 旣濟卦 ) 에서 초구효와 육이효는 제자리를 지켜야 하고 구삼효와 육사효는 만일의 위험을 대비하여 경계해야 한다 . 그리고 오효는 나라와 백성을 위해 지극한 정성을 드려야 한다 . 그러나 상효는 어두움에 빠져 위태롭게 된 상태이다 . 또한 오효는 중정한 마음으로 지극한 정성을 다하여 제사를 드리는데 , 상효는 중도를 잃고 맹신 ( 盲信 ) 하는 광신적 ( 狂信的 ) 인 상태를 의미한다 . 즉 오효는 진정한 신앙 ( 信仰 ) 을 가지고 있는 것이고 , 상육은 잘못된 신앙 ( 信仰 ) 을 가지고 있는 것이다 . 어떠한 종교를 믿든 바른 신앙 ( 信仰 ) 의 자세를 가져야 한다 . 象曰 濡其首厲 何可久也리오. 상왈 유기수려 하가구야 상전에 말하였다. “그 머리를 적셔 위태함이 어찌 오래할 수 있겠는가?” 久: 오랠 구 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 643 ∼650 쪽 ."}}, {"num": 64, "ko": "화수미제", "hanja": "火水未濟", "lines": [1, 0, 1, 0, 1, 0], "url": "https://soosanss.tistory.com/216", "post_id": 216, "gwaui": "모든 것이 제자리를 잃어 정돈되지 않은 상황에서는 냉정하게 상황을 잘 판단하여 올바른 처신을 하도록 하라 ( 辨物居方 ). 괘상을 마음 속에 그려보면서 각 괘의 의미를 되새겨 보자 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 651 ∼660 쪽 .", "gwamyung": "외괘가 이화 ( 離火 ) ☲ , 내괘가 감수 ( 坎水 ) ☵ 로 되어 있는 괘를 ‘ 미제 ( 未濟 ) ’ 라고 한다 . 내괘가 감수 ( 坎水 ) ☵ 로 험한 상황을 아직 건너가지 못했다는 뜻이다 . 또한 64 괘 가운데 초효부터 상효에 이르기까지 모든 효가 제자리를 잃은 유일한 괘이다 . 대자연의 원리나 국가사회의 변화나 개개인의 인생사는 항상 기제 ( 旣濟 ) 와 미제 ( 未濟 ) 의 반복 순환이다 . 내괘가 감수 ( 坎水 ) ☵ 로 험하나 외괘는 이화 ( 離火 ) ☲ 로 밝으니 , 내괘를 건너 외괘로 넘어가야 한다 . 주역 64 괘가 수화기제괘가 아닌 화수미제 ( 火水未濟 ) 로 마무리됨으로써 , ‘ 마치면 곧 비롯함이 있는 것이 하늘의 운행 ( 終則有始 天行 ) ’ 이라는 법도 ( 法度 ) 를 그대로 나타내고 있다 . 즉 , 《 주역》 은 중천건괘에서 시작되어 64 번째 화수미제괘로 되어 있는데 , 마지막 괘인 화수미제괘가 괘명 그대로 미제 ( 未濟 ) 이니 다시 중천건괘로 돌아가서 주역 ( 周易 ) 의 파노라마는 계속 반복 순환하게 되는 것이다 .", "seogwa": "｢ 전 ｣ 은 수화기제괘 다음에 화수미제괘가 온 것을 다음과 같이 설명하고 있다 . 物不可窮也라 故로 受之以未濟하야 終焉하니라. 물불가궁야    고   수지이미제       종언 물건이 가히 궁하지만 못한다. 그러므로 미제(未濟)로 받아 마친다. 수화기제 ( 水火旣濟 ) 괘에서 모든 상황이 가지런하게 되어 있는 상태에서 어려움을 방비하지 못하면 결국 흩어지고 어지럽게 된다 . 그러나 모든 상황이 궁하게 되는 것만은 아니다 . 다시 부조화 ( 不調和 ) 에서 조화 ( 調和 ) 를 찾아가고 , 어지러움에서 안정된 상태로 가는 미제 ( 未濟 ) 의 상태가 되는 것이니 , 주역 64 괘가 이 미제 ( 未濟 ) 괘로써 마치는 것이다 . 즉 다시 중천건 ( 重天乾 ), 중지곤 ( 重地坤 ) 으로 비롯되어 반복 순환하는 천도 ( 天道 ) 와 인류역사 ( 人類歷史 ) 의 파노라마가 시작되는 것이다 .", "gwasa": "未濟는 亨하니 小狐 汔濟하야 濡其尾니 无攸利하니라. 미제    형      소호 흘제       유기미    무유리 미제(未濟)는 형통하니 작은 여우가 거의 건너서 그 꼬리를 적시니, 이로울 바가 없다. 未:아닐 미   狐:여우 호   汔:거의 흘   濡:젖을 유   尾:꼬리 미  攸: 바 유 미제 ( 未濟 ) 는 모든 것이 가지런하지 못한 상태이니 앞으로 해야 할 일이 많고 , 또한 지금은 혼란스런 상황이다 . 그래서 앞으로는 좋아지게 되는 상태가 되니 형통하다 . 그렇지만 현재의 상황은 마치 작은 여우가 물을 거의 건너가다가 꼬리를 적셔 일을 그르친 상태이니 , 이로울 바가 없다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 未濟亨은 柔得中也오 小狐汔濟는 未出中也오 단왈 미제형    유득중야    소호홀제    미출중야 濡其尾无攸利는 不續終也라. 雖不當位나 剛柔 應也니라. 유기미무유리    불속종야    수부당위    강유 응야 단전에 말하였다. “미제(未濟)가 형통함은 유(柔)가 중을 얻은 것이고, ‘작은 여우가 거의 건넌다’는 것은 가운데에서 나오지 못하는 것이고, ‘그 꼬리를 적셔 이로울 바가 없음’은 이어서 마치지 못하는 것이다. 비록 자리가 마땅하지 않으나 강(剛)과 유(柔)가 응하고 있다.” 續:이을 속   雖:비록 수   應:응할 응 미제 ( 未濟 ) 가 형통한 것은 육오의 음유 ( 陰柔 ) 가 외괘에서 중 ( 中 ) 을 얻었기 때문이다 . ‘ 작은 여우가 거의 건넌다 ’ 는 것은 내괘의 구이 양 ( 陽 ) 이 가운데에서 벗어나지 못하는 상태를 말한다 . ‘ 그 꼬리를 적셔 이로울 바가 없다 ’ 는 것은 앞의 일 또는 해야 할 일을 이어서 마치기 못하기 때문에 이로울 바가 없는 것이다 . 미제괘는 비록 초효부터 상효까지 모두 음 자리에 양이 있고 양 자리에 음이 있어 자리가 부당하지만 , 내괘와 외괘의 응하는 자리가 음과 양으로 서로 잘 응하고 있다 . 그렇지만 수화기제괘와 마찬가지로 , 화수미제괘는 모든 자리가 부당하니 서로 음양 ( 陰陽 ) 으로 잘 응하더라도 응하는 상대와 관련을 맺을 수 없다 . 모두가 자기가 있는 자리에서 최선을 다하여 제자리를 찾아가는 노력을 해야 한다 .", "gwasangsa": "象曰 火在水上이 未濟니 君子 以하야 愼辨物하야 居方하나니라. 상왈 화재수상    미제    군자 이      신변물       거방 상전에 말하였다. “불이 물 위에 있는 것이 미제(未濟)니, 군자가 이를 본받아 삼가 물건을 분별하여 방소에 거하게 한다.” 愼:삼갈 신   辨:분별할 변   居: 있을 거 외괘 이화 ( 離火 ) ☲ 의 불이 내괘 감수 ( 坎水 ) ☵ 의 물 위에 있는 것이 미제 ( 未濟 ) 괘이다 . 모든 자리가 마땅하지 않은 가운데 , 내괘는 물로 아래로 흐르고 외괘는 불로 위로 오르니 , 서로 어긋나고 조화를 이루지 못하는 상태이다 . 이러한 상을 보고 군자는 모든 물건과 상황을 신중하게 분별해서 모두 마땅한 장소에 있게 한다 . 아래 백성부터 인군에 이르기까지 , 모든 상황의 시작부터 마침에 이르기까지 , 마땅한 물건이 마땅한 장소에 있게 하는 것이다 . ‘ 적재적소 ( 適材適所 ) ’ 를 의미한다 . 효사 및 효상사 初六은 濡其尾니 吝하니라. 초륙    유기미    린", "hyosa": {"초효": "초육은 그 꼬리를 적시니 인색하다. 濡:젖을 유   尾:꼬리 미   吝:인색할 린(인 ) 초육은 미제 ( 未濟 ) 괘 맨 아래에 처하여 있다 . 내괘 감수 ( 坎水 ) ☵ 의 험하고 어두운 맨 아래에 있으니 , 마치 여우가 물을 건너려다가 그 꼬리를 적셔 건너지 못하는 격이다 . 어두운 감 ( 坎 ) ☵ 괘 아래에 있어 밝은 지혜가 없으니 , 알지 못함이 극한 상태이다 . 자리도 바르지 못하고 처신을 잘하지 못하니 인색할 뿐이다 . 초효가 변하면 지괘 ( 之卦 ) 가 화택규 ( 火澤 睽 ) 괘가 되니 , 어긋나는 상태가 된다 . 象曰 濡其尾 亦不知 極也라. 상왈 유기미 역부지 극야 상전에 말하였다. “그 꼬리를 적심이 또한 알지 못함이 극한 것이다.”", "이효": "九二는 曳其輪이면 貞하야 吉하리라. 구이    예기륜      정       길 구이는 그 수레를 끌면 바르게 해서 길할 것이다. 曳:끌 예   輪: 수레 륜 구이는 내괘에서 중을 얻어 중도 ( 中道 ) 를 지키고 있다 . 비록 내괘 감수 ( 坎水 ) ☵ 의 가운데 있어 위험한 상태에 있으나 , 내호괘 이화 ( 離火 ) ☲ 의 밝은 지혜로 어려움에서 벗어나려고 이화 ( 離火 ) ☲ 의 수레를 당기고 있다 . 그렇지만 어려운 한 가운데 있으니 , 바르게 해야 길하다 . 구이가 변하면 화지진 ( 火地晉 ) 괘가 되니 , 험한 데를 벗어나 위로 나아가고 승진하는 상태가 된다 . 象曰 九二貞吉은 中以行正也일새라. 상왈 구이정길    중이행정야 상전에 말하였다. “구이가 바르게 해서 길함은 중으로써 바름을 행하기 때문이다.” 六三은 未濟애 征이면 凶하나 利涉大川하니라. 九二는 困于酒食이나 朱紱이 方來하리니 利用亨祀니 征이면 凶하니 无咎니라. 火水未濟 괘", "삼효": "육삼    미제   정       흉       이섭대천 육삼은 건너지 못함에 가면 흉하나, 큰 내를 건넘이 이롭다. 征:칠 정· 갈 정 육삼은 양 자리에 음으로 자리가 부당하다 . 내괘 감수 ( 坎水 ) ☵ 의 위에 있어 어려움에서 벗어나려 하지만 , 외호괘가 또한 감수 ( 坎水 ) ☵ 이니 어려움에 또 빠져드는 격이다 . 그래서 가면 흉하다고 하였다 . 그렇지만 어려움을 무릅쓰고 위험에서 벗어나야 하고 벗어나면 외괘 이화 ( 離火 ) ☲ 의 밝은 상태가 되니 , 큰 내를 건넘이 이롭다고 하였다 . 어렵고 고통이 있고 험함에 또 빠지더라도 , 내괘에서 외괘로 넘어가는 큰일을 해야 한다 . 象曰 未濟征凶은 位不當也일새라. 상왈 미제정흉    위부당야 상전에 말하였다. “건너지 못함에 가면 흉한 것은 자리가 마땅하지 않기 때문이다.”", "사효": "九四는 貞이면 吉하야 悔 亡하리니 震用伐鬼方하야 三年에아 有賞于大國이로다. 구사    정       길      회 망          진용벌귀방       삼년      유상우대국 구사는 바르게 하면 길해서 뉘우침이 없어질 것이니, 움직여 귀방을 쳐서 삼년에야 대국에서 상이 있도다. 悔:뉘우칠 회   震:천둥소리 진·움직일 진   用:써 용   伐:칠 벌  賞:상줄 상 구사는 외괘 이화 ( 離火 ) ☲ 의 밝은 곳에 거하고 있다 . 그렇지만 외호괘가 감수 ( 坎水 ) ☵ 이니 밝은 가운데 어려움이 있는 상태이다 . 바르게 하면 길해서 뉘우침이 없어진다 . 미제 ( 未濟 ) 가 혼란하고 어려운 것은 내괘 감수 ( 坎水 ) ☵ 의 북방 ( 鬼方 ) 에 오랑캐가 있기 때문이다 . 구사 대신 ( 大臣 ) 이 나라를 위한 뜻으로 움직여 북방 오랑캐를 정벌하는데 , 3 년이라는 오랜 세월 끝에 이기게 되어 대국 ( 大國 ) 에서 상을 내리게 된다 . 미제 ( 未濟 ) 괘를 도전하면 기제 ( 旣濟 ) 괘가 되는데 , 미제괘 구사효는 도전하면 기제괘 구삼효에 해당한다 . 그래서 기제 ( 旣濟 ) 와 미제 ( 未濟 ) 의 같은 자리가 되는 효 ( 爻 ) 에 귀방 ( 鬼方 ) 을 쳐서 나라의 위태함을 막는 방비책 ( 防備策 ) 을 세워야 한다고 묘사하고 있는 것이다 . 象曰 貞吉悔亡은 志行也라. 상왈 정길회망    지행야 상전에 말하였다. “바르게 해서 길하고 뉘우침이 없어짐은 뜻이 행해지는 것이다.” 六五는 貞이라 吉하야 无悔니 君子之光이 有孚라 吉하니라.", "오효": "육오    정      길       무회    군자지광    유부    길 육오는 바르게 한다. 길해서 뉘우침이 없으니, 군자의 빛남이 미더움이 있다. 길하다. 육오는 외괘 이화 ( 離火 ) ☲ 의 중 ( 中 ) 에 있다 . 양 자리에 음으로 있으니 , 자리가 부당하여 뉘우치는 바가 있다 . 그러나 중도 ( 中道 ) 로 바르게 하니 길해서 뉘우침이 없어진다 . 또한 외괘 이화 ( 離火 ) ☲ 의 가운데에 처하여 군자로서의 중도 ( 中道 ) 를 지키니 그 빛에 온 백성이 믿음을 두게 된다 . 길하다 . 육오가 변하면 건천 ( 乾天 ) ☰ 이 되니 , 하늘에서 빛이 사방에 비춘다 . 象曰 君子之光은 其暉 吉也라. 상왈 군자지광    기휘 길야 상전에 말하였다. “군자의 빛은 그 빛남이 길하다.” 暉:빛 휘· 빛날 휘 九五는 需于酒食이니 貞코 吉하니라. 重水坎 괘 六四는 樽酒와 簋貳를 用缶하고 納約自牖면 終无咎하리라. 澤水困 괘", "상효": "上九는 有孚于飮酒면 无咎어니와 濡其首면 有孚에 失是하리라. 상구    유부우음주    무구         유기수    유부    실시 상구는 술을 마시는데 믿음을 두면 허물이 없지만, 그 머리를 적시면 믿음을 두는데 바름을 잃을 것이다. 飮:마실 음   酒:술 주   濡:젖을 유   首:머리 수   失:잃을 실  是: 옳을 시 64 괘 384 효 맨 마지막 효사 ( 爻辭 ) 이다 . 왜 하필이면 마지막 효사에 술을 이야기하고 있는가 ? 우선 《 주역》 이 은 ( 殷 ) 나라 말기 주 ( 周 ) 나라 초기의 시대적 배경을 띠고 있다는 점을 생각할 때 , 은나라 말 폭군 주왕 ( 紂王 ) 이 주색잡기 ( 酒色雜技 ) 에 빠져 정치를 어지럽혔다는 역사적 배경을 생각해 볼 수 있다 . 은나라 마지막 왕인 주왕이 애첩 ( 愛妾 ) ‘ 달기 ’ 에게 빠져서 잔혹하고 음난한 생활을 탐닉하였다고 하는데 , 이를 표현한 대표적인 고사성어가 ‘ 포락지형 ( 炮烙之刑 ) ’ 과 ‘ 주지육림 ( 酒池肉林 ) ’ 이다 . 이렇게 술과 여자에 빠져 나라를 어지럽혔으니 , 이를 경계하여 주역 64 괘 맨 마지막 효에다 “ 믿음을 두고 술을 마시면 허물이 없지만 , 그 머리가 젖도록 술에 빠지면 바름을 잃게 된다 ” 고 경계한 것이다 . 주역 ( 周易 ) 64 괘 384 효 가운데 ‘ 술 ( 酒 ) ’ 이 언급되고 있는 곳이 네 군데 있다 . 수천수 ( 水天需 ) 괘 구오 효사 , 중수감 ( 重水坎 ) 괘 육사 효사 , 택수곤 ( 澤水困 ) 괘 구이 효사 그리고 화수미제 ( 火水未濟 ) 괘 상구 효사이다 . 택수곤 ( 澤 水困 ) 괘는 연못에 물이 없는 곤궁한 상황이니 구이효에서 술과 음식에 곤하다고 한 것이고 , 중수감 ( 重水坎 ) 괘는 매우 어려운 상황에서 육사 신하가 구오 인군에게 실정을 바로 알리기 위해 간략하게 술을 바치는 것이며 , 수천수 ( 水天需 ) 괘 구오효는 때를 기다리는데 군자의 도를 지키며 유유자적 ( 悠悠自適 ) 하게 술을 마시는 것이고 , 화수미제 ( 火水未濟 ) 괘 상육효는 2 차 3 차 거듭하며 술을 지나치게 마셔 정신을 잃어버린 상태이다 . 水天需 괘 上九는 有孚于飮酒면 无咎어니와 濡其首면 有孚애 失是하리라. 또한 《 주역 ( 周易 )》 은 대자연의 이치와 사회의 원리를 그대로 나타낸 것이다 . 《 주역》 의 이치를 공부한다는 것은 자연과 사회와 인생을 이해하는 것이며 , 신 ( 神 ․ 宗敎 ) 을 이해하는 것이다 . 신 ( 神 ) 과 종교 ( 宗敎 ) 는 믿음 ( 信仰 ) 을 기초로 하고 있다 . 믿음은 어떠해야 하는가 ? 믿음의 도를 잃어 광신 ( 狂信 ) 과 맹신 ( 盲信 ) 에 빠지면 , 결국 바름을 잃게 된다는 것을 나타낸 것이 미제 ( 未濟 ) 괘 상구효사의 뜻이다 . 그래서 실질적으로 현상적인 파노라마를 매듭짓는 60 번째 수택절괘 다음부터 , 즉 풍택중부괘 (61)· 뇌산소과괘 (62)· 수화기제괘 (63)· 화수미제괘 (64) 의 4 괘는 모두 마지막 상효에 올바른 믿음을 상실한 상태를 묘사하여 경계하고 있다 . 중부괘 상구효사 , 소과괘 상육효사 , 기제괘 상육효사 , 미제괘 상구효사를 함께 비교해 보자 . 61. 풍택중부괘 上九는 翰音이 登于天이니 貞하야 凶토다. 상구는 나는 소리가 하늘에 오르니 고집해서 흉하다. 62. 뇌산소과괘 上六은 弗遇하야 過之니 飛鳥 離之라 凶하니 是謂災眚이라. 상육은 만나지 않고 지나치니, 나는 새가 떠난다. 흉하니, 이를 ‘재앙(災眚)’이라고 일컫는다. 63. 수화기제괘 上六은 濡其首라 厲하니라. 상육은 그 머리를 적신다. 위태하다. 64. 화수미제괘 上九는 有孚于飮酒면 无咎어니와 濡其首면 有孚에 失是하리라. 상구는 술을 마시는데 믿음을 두면 허물이 없지만, 그 머리를 적시면 믿음을 두는데 바름을 잃을 것이다. 한편 , 화수미제괘 상구효가 변하면 뇌수해 ( 雷水解 ) 괘가 된다 . 뇌수해괘 상육효사를 음미해 보자 . 上六은 公用射隼于高墉之上하야 獲之니 无不利로다. 象曰 公用射隼은 以解悖也라. 象曰 飮酒濡首 亦不知節也라. 상왈 음주유수 역부지절야 상전에 말하였다. “술을 마시고 머리를 적심이 또한 절도를 알지 못하는 것이다.” [하경 34괘 회광반조(回光反照)] 이제 《 주역》 하경 34 괘를 마무리하게 된다 . 다음의 하경 34"}}];

function animCoins(lines){[0,1,2].forEach(i=>{const el=document.getElementById('c'+i);el.classList.remove('spin','yang','yin');void el.offsetWidth;el.classList.add('spin',lines[i]?'yang':'yin');el.textContent=lines[i]?'☉':'☽';});}
function drawTri(svgId,lines){const svg=document.getElementById(svgId);svg.innerHTML='';const W=48,lh=6,gap=9;lines.forEach((v,i)=>{const y=50-i*(lh+gap);if(v===1){const r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x','0');r.setAttribute('y',y);r.setAttribute('width',W);r.setAttribute('height',lh);r.setAttribute('rx','2');r.setAttribute('fill','#222');svg.appendChild(r);}else{[0,W/2+2].forEach(x=>{const r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',W/2-2);r.setAttribute('height',lh);r.setAttribute('rx','2');r.setAttribute('fill','#222');svg.appendChild(r);});}});}
function drawHex(lines,d){const svg=document.getElementById('hex-svg');svg.innerHTML='';const W=48,lh=6,gap=8;lines.forEach((v,i)=>{const y=84-i*(lh+gap);const fill=(i+1===d)?'#c07a00':'#222';if(v===1){const r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x','0');r.setAttribute('y',y);r.setAttribute('width',W);r.setAttribute('height',lh);r.setAttribute('rx','2');r.setAttribute('fill',fill);svg.appendChild(r);}else{[0,W/2+2].forEach(x=>{const r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',W/2-2);r.setAttribute('height',lh);r.setAttribute('rx','2');r.setAttribute('fill',fill);svg.appendChild(r);});}});}
function stepDone(idx,label){const el=document.getElementById('step'+idx);el.classList.remove('active');el.classList.add('done');document.getElementById('s'+idx+'t').textContent=label;}
function mk(cls,txt){if(!txt||!txt.trim())return null;const d=document.createElement('div');d.className=cls;d.textContent=txt.trim();return d;}
function ap(c,el){if(el)c.appendChild(el);}

function parseHanjaItem(s){
  const m1=s.match(/^([\u4e00-\u9fff·]+)\s*:/);
  if(!m1)return{ok:false,hanja:s,rest:''};
  const after=s.slice(m1[0].length).trim();
  const m2=after.match(/^([\uAC00-\uD7A3]{1,6}\s[\uAC00-\uD7A3]{1}(?:\s*·\s*[\uAC00-\uD7A3]{1,6}\s[\uAC00-\uD7A3]{1})*)/);
  if(m2){return{ok:true,hanja:m1[1]+': '+m2[1],rest:after.slice(m2[0].length).trim()};}
  return{ok:false,hanja:s,rest:''};
}

function parseHanjaBlock(text){
  const parts=text.split(/\s{2,}/);
  const items=[];const bodyParts=[];let inBody=false;
  for(const p of parts){
    const pt=p.trim();if(inBody){bodyParts.push(pt);continue;}
    const{ok,hanja,rest}=parseHanjaItem(pt);
    if(ok){items.push(hanja);if(rest){bodyParts.push(rest);inBody=true;}}
    else{bodyParts.push(pt);inBody=true;}
  }
  return{items,rest:bodyParts.join(' ').trim()};
}

function parseText(raw){
  const text=raw.replace(/\xa0/g,' ').trim();
  const out={hanmun:'',dok:'',trans:'',hanja:[],body:''};
  let rest=text;
  if(/^[\u4e00-\u9fff]/.test(rest)){const m=rest.match(/^(.+?[니라다오하]\.\s*)/);if(m){out.hanmun=m[1].trim();rest=rest.slice(m[0].length).trim();}}
  const dokM=rest.match(/^([\uAC00-\uD7A3]{1,8}(?:\s{3,}[\uAC00-\uD7A3]{1,12})+)\s+/);
  if(dokM&&dokM[1].length<100){out.dok=dokM[1].trim().replace(/\s{3,}/g,'  ');rest=rest.slice(dokM[0].length).trim();}
  const transM=rest.match(/^([\uAC00-\uD7A3].{4,200}?[다라오]\.\s*)/);
  if(transM){out.trans=transM[1].trim();rest=rest.slice(transM[0].length).trim();}
  if(/^[\u4e00-\u9fff·]+\s*:/.test(rest)){const{items,rest:br}=parseHanjaBlock(rest);out.hanja=items;rest=br;}
  out.body=rest.trim();
  return out;
}

function renderBlock(t,container){
  const r=parseText(t);
  if(r.hanmun)ap(container,mk('wonmun-han',r.hanmun));
  if(r.dok)ap(container,mk('wonmun-dok',r.dok));
  if(r.trans)ap(container,mk('wonmun-ko',r.trans));
  if(r.hanja.length>0)ap(container,mk('wonmun-hanja',r.hanja.join('   ')));
  if(r.body){const sents=r.body.split(/(?<=[다라오\.。])\s+(?=[\uAC00-\uD7A3A-Z])/);sents.forEach(s=>{ap(container,mk('body-text',s.trim()));});}
}

function renderColorText(raw,container){
  container.innerHTML='';if(!raw)return;
  const text=raw.replace(/\xa0/g,' ');
  const sangIdx=text.indexOf('象曰');
  const parts=sangIdx>0
    ?[{sang:false,t:text.slice(0,sangIdx).trim()},{sang:true,t:text.slice(sangIdx).trim()}]
    :[{sang:false,t:text.trim()}];
  parts.forEach(({sang,t})=>{
    if(sang){const sep=document.createElement('div');sep.className='sang-divider';sep.textContent='象曰 (효상사)';container.appendChild(sep);}
    renderBlock(t,container);
  });
}

/* 아코디언 토글 */
function toggleSection(id){
  const body=document.getElementById(id+'-body');
  const btn=document.getElementById(id+'-btn');
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  btn.classList.toggle('open',!isOpen);
}

function onCast(){
  if(step===0){lower=roll3();animCoins(lower);drawTri('lower-svg',lower);const t=TMAP[lower.join('')];document.getElementById('lower-name').textContent=t?t.ko:'';document.getElementById('coin-label').textContent=lower.map(v=>v?'양(陽)':'음(陰)').join(' · ');stepDone(0,t?t.sym:'');document.getElementById('step1').classList.add('active');step=1;}
  else if(step===1){upper=roll3();animCoins(upper);drawTri('upper-svg',upper);const t=TMAP[upper.join('')];document.getElementById('upper-name').textContent=t?t.ko:'';document.getElementById('coin-label').textContent=upper.map(v=>v?'양(陽)':'음(陰)').join(' · ');stepDone(1,t?t.sym:'');document.getElementById('step2').classList.add('active');step=2;}
  else if(step===2){dong=Math.floor(Math.random()*6)+1;document.getElementById('coin-label').textContent='동효: '+EFF_LABELS[dong-1];[0,1,2].forEach(i=>{const el=document.getElementById('c'+i);el.classList.remove('spin','yang','yin');el.textContent='○';el.style.color='#bbb';});const ci=(dong-1)%3;document.getElementById('c'+ci).textContent='◉';document.getElementById('c'+ci).style.color='#c07a00';stepDone(2,EFF_KEYS[dong-1]);document.getElementById('cast-btn').disabled=true;document.getElementById('cast-hint').textContent='괘가 완성되었습니다';showResult();step=3;}
  if(step<3){document.getElementById('cast-btn').textContent=BTN_LABELS[step];document.getElementById('cast-hint').textContent=HINTS[step];}
}

function showResult(){
  const full=[...lower,...upper];
  const hex=DB.find(h=>h.lines.every((v,i)=>v===full[i]));
  if(!hex){alert('괘를 찾지 못했습니다');return;}
  drawHex(full,dong);
  document.getElementById('hex-num').textContent=`제 ${hex.num}괘`;
  document.getElementById('hex-title').textContent=`${hex.ko}(${hex.hanja})`;
  document.getElementById('hex-kw').textContent=KEYWORDS[hex.num]||'';
  document.getElementById('hex-dong').textContent='동효: '+EFF_LABELS[dong-1];

  // 괘의
  const guayi=document.getElementById('sec-gwaui-body');
  guayi.innerHTML='';renderColorText(hex.gwaui||'',guayi);
  document.getElementById('sec-gwaui-body').style.display='none';
  document.getElementById('sec-gwaui-btn').classList.remove('open');

  // 괘사
  const gwasa=document.getElementById('sec-gwasa-body');
  gwasa.innerHTML='';renderColorText(hex.gwasa||'',gwasa);
  document.getElementById('sec-gwasa-body').style.display='none';
  document.getElementById('sec-gwasa-btn').classList.remove('open');

  // 효사 (기본 열림)
  const effKey=EFF_KEYS[dong-1];
  document.getElementById('sec-hyosa-btn-label').textContent='효사 및 효상사 — '+EFF_LABELS[dong-1];
  const hyosa=document.getElementById('sec-hyosa-body');
  hyosa.innerHTML='';renderColorText(hex.hyosa?.[effKey]||'(효사 없음)',hyosa);
  document.getElementById('sec-hyosa-body').style.display='block';
  document.getElementById('sec-hyosa-btn').classList.add('open');

  document.getElementById('src-link').innerHTML=`<a href="${hex.url}" target="_blank">원문 보기 →</a>`;
  document.getElementById('ai-result').style.display='none';
  document.getElementById('ai-result').innerHTML='';
  aiLoaded=false;
  document.getElementById('result-wrap').classList.remove('hidden');
}

async function loadAI(){
  if(aiLoaded)return;
  const full=[...lower,...upper];
  const hex=DB.find(h=>h.lines.every((v,i)=>v===full[i]));
  const effKey=EFF_KEYS[dong-1];
  const hyosaText=hex?.hyosa?.[effKey]||'';
  const gwasaText=hex?.gwasa||'';
  const aiResult=document.getElementById('ai-result');
  aiResult.style.display='block';
  aiResult.innerHTML='<div class="loading"><span>AI 현대 해설 불러오는 중</span><span class="dots"><span></span><span></span><span></span></span></div>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,
        messages:[{role:'user',content:`주역 제${hex.num}괘 ${hex.ko}(${hex.hanja})이 나왔고, 동효는 ${EFF_LABELS[dong-1]}입니다.\n\n[괘사]\n${gwasaText.slice(0,300)}\n\n[동효 효사]\n${hyosaText.slice(0,400)}\n\n위를 바탕으로 현대적이고 실용적인 해설을 작성해 주세요:\n1. 이 괘가 현재 상황에서 의미하는 바 (2~3문장)\n2. ${EFF_LABELS[dong-1]}이 가리키는 변화와 핵심 메시지 (2~3문장)\n3. 구체적인 행동 조언 (2~3문장)\n친근하고 명확한 어투로 300자 내외로 작성해 주세요.`}]})});
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||'').join('');
    aiResult.innerHTML='<div class="ai-text-box">'+text.replace(/\n/g,'<br>')+'</div>';
    aiLoaded=true;
  }catch(e){
    aiResult.innerHTML='<div class="ai-text-box">AI 해설을 불러오는 중 오류가 발생했습니다.</div>';
  }
}

function resetAll(){
  step=0;lower=null;upper=null;dong=null;aiLoaded=false;
  [0,1,2].forEach(i=>{const el=document.getElementById('c'+i);el.classList.remove('spin','yang','yin');el.textContent='?';el.style.color='';});
  document.getElementById('coin-label').textContent='';document.getElementById('lower-name').textContent='';document.getElementById('upper-name').textContent='';
  document.getElementById('lower-svg').innerHTML='';document.getElementById('upper-svg').innerHTML='';
  ['step0','step1','step2'].forEach((id,i)=>{const el=document.getElementById(id);el.classList.remove('active','done');if(i===0)el.classList.add('active');document.getElementById('s'+i+'t').textContent='';});
  document.getElementById('cast-btn').disabled=false;document.getElementById('cast-btn').textContent=BTN_LABELS[0];document.getElementById('cast-hint').textContent=HINTS[0];
  document.getElementById('result-wrap').classList.add('hidden');
}

</script>
