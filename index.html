    미당야    동회유회    길행야 상전에 말하였다. “칡덩굴에 곤함은 마땅하지 않음이요, 움직여 뉘우치라하여 뉘우침이 있음은 길하게 행하는 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 512 ∼519 쪽 ."}}, {"num": 48, "ko": "수풍정", "hanja": "水風井", "lines": [0, 1, 1, 0, 1, 0], "url": "https://soosanss.tistory.com/200", "post_id": 200, "gwaui": "경제를 원활하게 하여 나라를 부유하게 하려면 백성을 위로하여 근면하게 하고 서로 돕기를 권장하여야 한다 ( 勞民勸相 ).", "gwamyung": "외괘가 감수 ( 坎水 ) ☵ , 내괘가 손풍 ( 巽風 ) ☴ 으로 이루어진 괘를 ‘ 정 ( 井 ) ’ 이라 한다 . 앞서 살펴 본 택수곤 ( 澤水困 ) 괘와 수풍정 ( 水風井 ) 괘는 표리 ( 表裏 ) 의 관계에 있다 . 택수곤괘가 연못에 있는 물이 새어 나가 나라의 재정이 파탄되는 것을 의미한다면 , 수풍정괘는 우물을 잘 관리하면 언제나 맑은 물을 마실 수 있듯이 나라 경제를 원활하게 유지할 수 있는 지혜를 알려주고 있다 . 수풍정괘는 우물과 샘을 상징적으로 표현하여 백성의 삶을 위한 경제정책을 나타내고 있다 .", "seogwa": "전은 택수곤괘 다음에 수풍정괘가 온 것을 다음과 같이 설명하고 있다 . 困乎上者 必反下라 故로 受之以井하고 곤호상자 필반하    고   수지이정 위에서 곤궁한 자는 반드시 아래로 돌아온다. 그러므로 정(井)으로 받고 지풍승 ( 地風升 ) 괘에서 뒤를 돌아보지 않고 오르기만 하면 결국 근본이 약해져 위에서 곤궁하게 된다 . 곤궁하게 되면 항상 근본을 다시 돌아보고 원천적으로 새로운 제도를 정비해야 하니 , 아래부터 다시 우물을 만드는 정괘 ( 井卦 ) 로 받았다는 뜻이다 .", "gwasa": "井은 改邑호대 不改井이니 无喪无得하며 往來 井井하나니 정    개읍      불개정       무상무득       왕래 정정 汔至亦未繘井이니 羸其甁이면 凶하니라. 흘지역미귤정       이기병      흉 정(井)은 고을(邑)은 고치되 우물은 고치지 못하니, 잃는 것도 없고 얻는 것도 없으며, 가고 오는 이가 우물을 우물로 쓰니, 거의 이름에 또 두레박줄이 우물에 닿지 않으니, 그 두레박(병)을 엎으면 흉하다. 井:우물 정   改:고칠 개   邑:고을 읍   喪:잃을 상   得:얻을 득  汔:거의 흘   亦:또 역   繘:두레박줄 귤(율) 羸:여윌 리·못할 리·엎을 리  甁:두레박 병· 병 병 나라의 경제정책이나 도시의 행정구역 및 선거제도와 같이 나라의 틀을 이루는 제도는 고칠 수 있지만 , 민생 ( 民生 ) 의 근본이 되는 우물은 고치지 못한다 . 우물이라는 것은 인간의 생존에 필수적인 근본으로 어느 누구나 향유해야 할 권리이다 . 따라서 우물과 같은 민생의 근본은 특정인이나 특정집단의 소유물이 아니다 . 그래서 잃을 것도 없고 얻을 것도 없으며 , 누구나 오고 가며 물을 마시는 우물을 공동으로 사용하는 것이다 . 그런데 정책이란 당장 효과가 나오는 것은 아니다 . 모든 정책은 서서히 집행되어 일정 기간이 지난 후에 그 결과가 나타난다 . 그럼에도 불구하고 두레박줄이 거의 우물 바닥에 이를 무렵에 성급하게 줄을 당기면 정작 두레박에 물이 없으니 시원한 물을 마실 수 없게 된다 . 그래서 당장 시원한 물을 마실 수 없다고 하여 그 병을 엎으면 ( 깨면 ) 결국 나라 경제가 망하고 민생이 곤궁해지니 흉하게 된다 . 국민의 의견을 수렴하여 합의로 이루어진 정책은 그 결과가 나올 때까지 안정성 있게 꾸준히 추진하는 것이 필요하다는 말이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 巽乎水而上水 井이니 井은 養而不窮也하니라. 단왈 손호수이상수 정       정   양이불궁야 改邑不改井은 乃以剛中也오 汔至亦未繘井은 未有功也오 개읍불개정    내이강중야    흘지역미귤정    미유공야 羸其甁이라 是以凶也라. 이기병      시이흉야 단전에 말하였다. “물에 들어가서 물을 올리는 것이 정(井)이니, 정(井)은 길러서 궁하지 않는 것이다. ‘고을은 고치되 우물은 고치지 않는다’는 것은 이에 강으로써 가운데 함이고, ‘거의 이르러 또 두레박줄이 우물에 닿지 않음’은 공이 있지 않은 것이고, ‘그 병을 엎는다’ 이로써 흉한 것이다.” 巽:들어갈 손(巽爲入)    上:올릴 상   養:기를 양 물을 마시려면 물이 있는 곳까지 두레박을 들여보내 물을 퍼 올려야 한다 . 민생의 안정을 유지하려면 진정 국민이 무엇을 필요로 하는가를 백성과 가까이 하면서 알아내어 그 요구를 들어야 한다 . 이렇게 진정한 민생의 요구를 들어주면 , 우물물이 마르지 않듯이 국민의 생활에 궁함이 없게 된다 . ‘ 읍은 고치되 우물은 고치지 않는다 ’ 는 말은 정괘 ( 井卦 )", "gwasangsa": "象曰 木上有水 井이니 君子 以하야 勞民勸相하나니라. 상왈 목상유수 정      군자 이       노민권상 상전에 말하였다. “나무 위에 물이 있는 것이 정(井)이니, 군자가 이를 본받아 백성을 위로하고 돕는 것을 권한다.” 勞:수고할 로·일할 로·위로할 로   勸:권할 권   相:서로 상·도울 상·정승 상 땅 아래에 나무로 우물을 짜고 위로 물이 모이게 하여 우물을 만들듯이 , 국민의 경제를 위해서는 의식주 ( 衣食住 ) 의 기본생활이 안정될 수 있는 정책의 틀을 잘 짜서 경제흐름이 원활하게 돌아가도록 해야 한다 . 그리고 경제의 안정과 부를 축적하기 위해서 , 나라를 다스리는 군자는 항상 백성을 위로하고 서로가 도와가며 열심히 일할 것을 권장한다 . 인간이 자아 ( 自我 ) 를 완성하고 평화로운 삶을 영위하기 위해서는 모든 집단이 저마다의 이해관계에 집착하지 말고 , 서로가 협력하는 것이 필요하다 . 경영자 ( 정치인 ) 는 근로자 ( 백성 ) 를 위로하여 복지혜택을 마련하고 , 근로자 ( 백성 ) 는 서로 도와가며 회사 ( 국가 ) 의 이익을 위해 노력하는 것 , 이것이 경제의 핵심이라 할 것이다 . 효사 및 효상사 初六은 井泥不食이라 舊井애 无禽이로다. 초륙    정니불식      구정    무금", "hyosa": {"초효": "초육은 우물이 진흙이어서 먹지 못한다. 오래된 우물에 새가 없도다. 泥:진흙 니   食:먹을 식   舊:옛날(예) 구·오랠 구   禽:날짐승 금 초육은 우물의 맨 아래에 있고 , 양 자리에 음으로 있으니 , 마치 우물 바닥에 쌓인 진흙과 같은 양상이다 . 이러한 진흙은 먹지 못한다 . 집안이나 , 회사 , 나라에 이르기까지 민생의 근본이 되는 경제 ( 經濟 ) 는 그 시대에 맞게 변화를 도모하면서 항상 맑은 샘물을 유지해야 한다 . 우물을 치지 않아 물이 고이면 물이 썩어서 새도 날아들지 않듯이 , 경제정책이 고착 ( 固着 ) 되면 결국 나라 경제가 썩는다 . 象曰 井泥不食은 下也일새오 舊井旡禽은 時舍也라. 상왈 정니불식    하야         구정무금    시사야 상전에 말하였다. “우물이 진흙이어서 먹지 못함은 아래이기 때문이고, 오래된 우물에 새가 없는 것은 때에 버려진 것이다.” 舍:버릴 사 정괘 ( 井卦 ) 에서 초육은 우물의 맨 아래에 있기 때문에 진흙이 쌓여 먹지 못하는 것이고 , 오래된 우물에 새가 없는 것은 그 우물이 오래되어서 버려졌기 때문이다 .", "이효": "九二는 井谷이라. 射鮒오 甕敝漏로다. 구이    정곡       석부    옹폐루 구이는 우물이 골짜기다. 붕어가 쏘고 독이 깨져서 새도다. 谷:골 곡   射:쏠 사·산 이름 야·맞힐 석·싫어할 역   鮒:붕어 부   甕:독 옹  敝:혜질 폐·깨질 폐   漏:샐 루 구이는 내괘 손풍 ( 巽風 ) ☴ 의 중 ( 中 ) 에 있으나 , 음 자리에 양으로 있다 . 일반적인 다른 괘의 상황에서는 내괘 이효는 중을 얻은 자리로 외괘 오효와 더불어 중요한 역할을 한다 . 그러나 우물을 상징한 정괘 ( 井卦 ) 에서 이효는 우물 바닥에서 바로 위에 있는 물의 상황을 뜻하고 , 또한 구이 입장에서는 초효의 음 ( 陰 ) 이 마치 독이 깨져서 물이 흘러나가는 상이다 . 그리고 내괘 손풍 ( 巽風 ) ☴ 이 인체 ( 人體 ) 로는 다리에 해당하고 ( 巽爲股 ), 구이효가 변하면 양이 음으로 되면서 내괘가 간산 ( 艮 山 ) ☶ 으로 되니 , 산에 있는 무릎은 계곡 ( 溪谷 ) 에 해당한다 . ‘ 우물이 계곡이라 ’ ( 井谷 ) 는 말은 우물의 물이 밖으로 흘러나간다는 말이다 . 그 흘러가는 물에 있는 물고기가 물이 부족하여 밖으로 뛰면서 물을 쏘고 있는 격이다 . 이는 우물의 독이 깨져서 새고 있는 것과 같은 것이다 . 즉 국가나 사회나 가정의 경제정책이 부실한 것을 뜻한다 . 象曰 井谷射鮒는 无與也일새라. 상왈 정곡석부    무여야 상전에 말하였다. “우물이 골짜기여서 붕어가 쏜다는 것은 더불음이 없기 때문이다.” 우물이 깨져 물이 새면서 흐르는 물에 붕어가 산들 얼마나 살겠는가 ? 경제정책이 부실하여 나라와 백성이 서로 함께하지 못하는 것이다 . 구이는 이제 조금 물이 고여 붕어나 뛰노는 정도이고 또한 물이 새고 있는 상황이다 . 삼효는 맑은 물이지만 알아주지 못해서 자신의 재질이 쓰이지 못함을 슬퍼한다 . 사효는 우물을 청소하여 맑은 샘물을 유지하게 하는 상태이다 . 이제 중정한 외괘 오효에 이르러 맑고 찬 샘물을 마시게 된다 .", "삼효": "九三은 井渫不食하야 爲我心惻하야 可用汲이니 王明하면 竝受其福하리라. 구삼    정설불식       위아심측      가용급       왕명       병수기복 구삼은 우물이 깨끗하되 먹지 못해서, 내 마음이 슬프게 되어, 가히 물을 길을만하니, 왕이 밝으면 아울러 그 복을 받을 것이다. 渫:칠 설·출렁출렁할 접   惻:슬퍼할 측   汲:길을 급   竝:아우를 병   受: 받을 수 구삼은 양 자리에 양으로 실 ( 實 ) 한 상태이다 . 우물의 중간에 이르러 깨끗이 청소하여 맑은 상태이나 아직은 알려지지 않아서 아무도 먹지 않으니 , 구삼의 입장에서는 쓰이지 못해 슬퍼하는 상황이다 . 구삼의 우물물은 가히 퍼서 먹을 수 있는 상태이니 , 만일 왕이 현명하여 구삼의 인재 ( 人才 ) 를 등용해서 쓰면 , 왕과 구삼의 신하가 아울러 복을 받게 된다 . 즉 , 아직 세상에 알려지지 않았지만 깨끗하고 유능한 인재를 발굴하여 등용하면 나라 정책이 잘 되어 모든 국민이 다 편안해진다는 말이다 . 象曰 井渫不食은 行을 惻也오 求王明은 受福也라. 상왈 정설불식    행    측야    구왕명   수복야 상전에 말하였다. “우물이 깨끗하되 먹지 않음은 (먹지 않고) 감을 슬퍼하는 것이고, 왕의 밝음을 구함은 복을 받는 것이다.” 惻:슬퍼할 측 六四는 井甃면 无咎리라.", "사효": "육사    정추    무구 육사는 우물을 치면 허물이 없을 것이다. 甃:벽돌 추·꾸밀 추·샘칠 추 육사는 외괘 감수 ( 坎水 ) ☵ 에 있고 음 자리에 음으로 있어 자리가 바르다 . 후천팔괘방위의 계절로 보면 내괘 손풍 ( 巽風 ) ☴ 은 봄이고 내호괘 태택 ( 兌澤 ) ☱ 은 가을이며 , 외호괘 이화 ( 離火 ) ☲ 는 여름이고 외괘 감수 ( 坎水 ) ☵ 는 겨울이니 , 춘하추동 ( 春夏秋冬 ) 사시에 맞추어 맑은 물을 유지할 수 있도록 우물을 청소하고 수리하여야 한다 . 특히 육사 자리를 중심으로 보면 내호괘가 태택 ☱ 가을이고 외호괘가 이화 ☲ 여름이며 외괘가 감수 ☵ 겨울이니 , 여름에서 겨울로 들어가는 길목인 가을에 우물을 깨끗이 청소하면 허물이 없는 것이다 . 象曰 井甃无咎는 修井也일새라. 상왈 정추무구    수정야 상전에 말하였다. “우물을 쳐서 허물이 없는 것은 우물을 닦기 때문이다.” 修:닦을 수", "오효": "구오가 외괘 감수 ( 坎水 ) ☵ 에서 중정하게 있듯이 , 나라 정책은 누구나 믿고 따를 수 있게 굳세고 강하고 중도 있게 추진되어야 한다는 것이다 . ‘ 거의 이르러 두레박줄이 우물에 닿지 않는다 ’ 는 것은 정책의 좋은 결과를 보지 못하니 공이 없는 것이고 , 그렇다고 민생 ( 民 生 ) 의 필수조건인 두레박을 깨면 결국 나라와 백성을 포기하는 것과 같기 때문에 흉하게 되는 것이다 . 九五는 井冽寒泉食이로다. 구오    정렬한천식 구오는 우물이 맑아 찬 샘물을 먹도다. 冽:찰 렬·맑을 례   寒:찰 한   泉: 샘 천 구오는 외괘 감수 ( 坎水 ) ☵ 에서 중정한 자리이다 . 정괘 ( 井卦 ) 초효는 진흙이 섞여 먹지 못하며 , 구오가 변하면 지괘 ( 之卦 ) 가 지풍승 ( 地風升 ) 이 되니 , 물을 퍼 올려 맑은 샘물을 마신다 . 象曰 寒泉之食은 中正也일새라. 상왈 한천지식    중정야 상전에 말하였다. “찬 샘물을 먹는 것은 가운데하고 바르기 때문이다.” 上六은 井收勿幕고 有孚라. 元吉이니라.", "상효": "상육    정수물막   유부     원길 상육은 우물을 거두어서 덮지 말고 믿음을 둔다. 크게 길하다. 收:거둘 수   幕:장막 막· 덮을 막 상육은 정괘 ( 井卦 ) 우물의 형상에서 맨 위에 있다 . 고을 ( 邑 ) 은 고쳐도 우물은 고치지 않는데 , 우물은 만인의 공변된 그릇이기 때문이다 . 즉 , 우물은 어느 누구의 소유물이 아니며 , 모든 백성이 맑은 물의 혜택을 받아야 한다 . 때문에 우물을 쓰지 못하게 거두어 뚜껑을 덮으면 만인을 위한 우물로서 사용될 수 없으니 , 뚜껑을 덮지 말고 믿음을 두어 어느 누구나 사용할 수 있게 하면 크게 길하다 . 경제를 원활히 하기 위한 제도 ( 制度 ) 도 마찬가지이다 . 규제 ( 規制 ) 위주로 정책을 펴면 어느 누구도 제도를 활용할 수가 없다 . 제도는 규제하기 위해 만드는 것이 아니라 , 만인이 보다 효율적으로 쓸 수 있도록 만들어야 한다 . 象曰 元吉在上이 大成也라. 상왈 원길재상    대성야 상전에 말하였다. “크게 길함이 위에 있음이 크게 이루는 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 520 ∼52 7 쪽 ."}}, {"num": 49, "ko": "택화혁", "hanja": "澤火革", "lines": [1, 0, 1, 1, 1, 0], "url": "https://soosanss.tistory.com/201", "post_id": 201, "gwaui": "제도를 개혁하고 사회를 변화시킬 때에는 대자연의 섭리에 맞추어 밝게 고쳐야 한다 ( 治歷明時 ). 덕으로 말하면 내괘 이화 ☲ 로 문명하고 외괘 태택 ☱ 으로 기뻐해서 크게 형통하고 바르게 하니 , 고쳐서 마땅하게 되고 그로 인한 뉘우침이 없어진다 . 천지 ( 天 地 ) 도 그 기운을 바꾸면서 춘하추동의 사시 ( 四 時 ) 를 이루며 , 탕왕 ( 湯王 ) 이 하 ( 夏 ) 나라 폭군 걸왕 ( 桀王 ) 을 정벌하여 은 ( 殷 ) 나라를 세우고 , 무왕 ( 武 王 ) 이 은 ( 殷 ) 나라의 폭군 주왕 ( 紂王 ) 을 정벌하여 주 ( 周 ) 나라를 세운 것이 모두 하늘의 이치에 순하고 백성의 마음에 응해서 이루어진 것이니 , 혁명의 때가 크다 .", "gwamyung": "외괘가 태택 ( 兌澤 ) ☱ , 내괘가 이화 ( 離火 ) ☲ 로 이루어진 괘를 ‘ 혁 ( 革 ) ’ 이라 한다 . 바꾼다 ․ 고친다 ․ 개혁한다는 뜻이다 . 연못 속에 불이 있어 기존의 상황을 완전히 바꾸어 놓는다 . 앞서 수풍정 ( 水風井 ) 괘에서는 ‘ 읍 ( 邑 ) 은 고치되 우물은 고치지 않는다 ’ 고 하여 민생 ( 民生 ) 의 근본인 우물의 원리에 대하여 말하였다 . 그러면 읍 ( 邑 ) 을 어떻게 고치는가 ? 나라의 정치제도나 사회제도를 어떻게 고쳐야 하는가를 바로 혁괘 ( 革卦 ) 에서 다루고 있다 .", "seogwa": "｢ 전 ｣ 은 수풍정괘 다음에 택화혁괘가 온 이유를 다음과 같이 설명하고 있다 . 井道 不可不革이라 故로 受之以革하고 정도 불가불혁      고    수지이혁 우물의 도는 가히 고치지 않을 수 없다. 그러므로 혁괘(革卦)로써 받고 앞서 수풍정 ( 水風井 ) 괘에서 ‘ 우물을 치면 허물이 없다 ’ 고 했다 . 민생의 근본인 맑은 물을 만인이 먹으려면 우물의 도 , 즉 제도를 새롭게 고쳐야 한다 . 그래서 고친다는 혁괘 ( 革卦 ) 를 정괘 ( 井卦 ) 다음에 두었다 .", "gwasa": "革은 已日이라아 乃孚하리니 元亨코 利貞하야 悔 亡하니라. 혁    이일         내부          원형    이정       회 망 혁(革)은 이미 날이어야 이에 믿을 것이니, 크게 형통하고 바르게 함이 이로워서 뉘우침이 없어진다. 革:가죽 혁·고칠 혁   已:이미 이 잘못된 사회를 바꾸고 잘못된 제도를 바꾸는 것은 , 바꾸어야 한다는 염원 ( 念願 ) 이 무르익은 상황에서 이미 바뀌고 난 뒤에야 백성이 믿음을 가지게 된다 . 잘못된 것을 바꾸는 것이니 크게 형통하고 , 새로운 제도와 사회를 만들어감에 있어서는 기존의 질서에 기득권을 누렸던 자들의 저항도 있으니 바르게 해야 이롭고 , 따라서 뉘우침이 없어지게 된다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 革은 水火 相息하며 二女 同居호대 其志不相得이 曰革이라. 단왈 혁    수화 상식      이녀 동거       기지불상득    왈혁 已日乃孚는 革而信之라. 이일내부   혁이신지 文明以說하야 大亨以正하니 革而當할새 其悔 乃亡하니라. 문명이열       대형이정      혁이당       기회 내망 天地 革而四時 成하며 湯武 革命하야 천지 혁이사시 성      탕무 혁명 順乎天而應乎人하니 革之時 大矣哉라. 순호천이응호인       혁지시 대의재 단전에 말하였다. “혁(革)은 물과 불이 서로 쉬게 하며, 두 여자가 함께 거처하되 그 뜻을 서로 얻지 못함이 가로되 혁(革)이다. ‘이미 날이어야 이에 믿음’은 고쳐서 믿게 함이다. 문명하고 기뻐하여 크게 형통하고 바르니, 고쳐서 마땅하기 때문에 그 뉘우침이 없어진다. 천지가 고쳐서 사시가 이루어지며, 탕왕(湯王)과 무왕(武王)이 명을 바꾸어서 하늘에 순종하고 백성에게 응하니, 혁(革)의 때가 크도다.” 息:숨쉴 식·그칠 식·쉴 식   居:살 거   說:기쁠 열   湯: 끓인물 탕·온천 탕·사람이름 탕(은왕조의 시조)   武:굳셀 무·무인 무 외괘가 태택 ( 兌澤 ) ☱ 이니 연못의 물이고 내괘가 이화 ( 離火 ) ☲ 불이니 , 물과 불이 서로 멸식 ( 滅息 ) 하는 것이 택화혁 ( 澤火革 ) 괘이다 . 또한 태 ( 兌 ) ☱ 소녀와 이 ( 離 ) ☲ 중녀가 같이 살고 있지만 , 상대방의 뜻을 서로 얻을 수 없는 것이 혁 ( 革 ) 이다 . ‘ 이미 날이어야 이에 믿는다 ’ 는 것은 바라던 것을 바꾸었기 때문에 믿는 것이다 .", "gwasangsa": "象曰 澤中有火 革이니 君子 以하야 治歷明時하나니라. 상왈 택중유화 혁      군자 이       치력명시 상전에 말하였다. “연못 가운데 불이 있는 것이 혁(革)이니, 군자가 이를 본받아 책력(冊曆)을 다스리고 때를 밝힌다.” 治:다스릴 치   歷:지낼 력·달력 력 외괘 태택 ( 兌澤 ) ☱ 의 연못 속에 내괘 이화 ( 離火 ) ☲ 의 불이 있는 것이 혁 ( 革 ) 이다 . 부패하고 타락한 물이 연못에 고여 있고 이 부패함을 맑게 하려는 불꽃이 연못 속에서 부글거리고 있으니 , 변화의 때가 되는 것이다 . 군자는 이러한 상을 보고 본받아 새로운 시대를 맞이하려는 계획을 세우고 이에 따른 일정을 마련하여 그때그때 상황에 맞게 밝게 다스려 나간다 . 예전에는 혁명 ( 革命 ) 을 하면 책력 ( 달력 ) 을 고쳐 그 정당성을 내세웠으나 , 오늘날에는 국가와 국민을 위한 중장기 계획을 수립하여 우선으로 해야 할 사업을 일정별로 준비하고 그 일정에 맞게 정책을 집행해 나가는 것으로 해석하여야 할 것이다 . 효사 및 효상사", "hyosa": {"초효": "初九는 鞏用黃牛之革이니라. 초구    공용황우지혁 초구는 굳게 누런 소의 가죽을 쓴다. 鞏:묶을 공·굳을 공   用:써 용(以)   黃:누를 황 牛: 소 우 초구는 연못 속에 있는 불기운의 아래에 처하여 , 아직 때가 무르익지 않은 상태이다 . 불기운으로 혁명하고 싶은 마음이 간절하나 아직 때가 아니니 , 그 마음을 굳게 지키기를 마치 황소의 가죽처럼 질기게 한다는 것이다 . 때가 이르지 않았는데 개혁을 도모하면 실패할 가능성이 많다 . 모름지기 굳게 입을 다물고 때를 기다린다 . 초구가 변하면 내괘가 간산 ( 艮山 ) ☶ 이 되니 혁명하고 싶은 마음이 있어도 나아가지 말고 그쳐 있어야 한다 . 象曰 鞏用黃牛는 不可以有爲也일새라. 상왈 공용황우    불가이유위야 상전에 말하였다. “굳게 누런 소를 씀은 가히 하지 못하기 때문이다.” 六二는 已日이어야 乃革之니 征이면 吉하야 无咎하리라.", "이효": "육이    이일         내혁지    정       길       무구 육이는 이미 날이어야 이에 고치니, 가면 길해서 허물이 없을 것이다. 육이는 내괘 이화 ( 離火 ) ☲ 에서 중정한 자리이다 . 고치고 싶은 열망이 무르익은 상태이다 . 또한 외괘에서 중정한 구오 대인과 응하여 , 아래 백성의 열망이 무르익어 혁명을 하는 적절한 때에 해당한다 . 그래서 이미 그 날이 도래해서 이에 혁명하고자 나아가니 길해서 허물이 없다 . 육이가 변하면 지괘 ( 之卦 ) 가 택천쾌 ( 澤天 夬 ) 가 되니 결단하는 상이 된다 . 바로 육이가 혁명을 일으키는 주체이다 . 때에 맞게 위와 아래가 응하여 혁명을 일으키니 그 결과는 아름답게 된다 . 象曰 已日革之는 行有嘉也라. 상왈 이일혁지    행유가야 상전에 말하였다. “이미 날이어서 고침은 감에 아름다움이 있는 것이다.” 嘉:아름다울 가", "삼효": "九三은 征이면 凶하니 貞厲할지니 革言이 三就면 有孚리라. 구삼    정       흉      정려          혁언    삼취    유부 구삼은 가면 흉하니, 바르게 하고 위태하게 여길 것이니, 고치자는 말이 세 번 나아가면 미더움이 있을 것이다. 征:칠 정·갈 정   厲:위태할 려   就:나아갈 취 구삼은 혁명을 일으키는 상황에서 중정한 상태를 벗어나 있다 . 양 자리에 양으로 있어 강하기만 하니 , 자칫하면 강함을 믿고 혁명을 도모할 가능성이 있다 . 무턱대고 혁명을 일으키면 실패하여 흉하게 되니 , 바르게 하고 위태로운 마음을 가지고 조심해야 한다 . 그러나 사방에서 고쳐야 한다는 말이 여러 번 나오면 혁명의 때가 무르익었음을 의미하고 , 또한 모두가 구삼을 따르니 믿음을 두고 혁명을 일으킨다 . 사방에서 고치자고 하니 , 그러한 백성의 마음을 두고 어디를 가겠는가 ? 백성의 뜻에 따르는 것이다 . 구삼이 변하면 지괘 ( 之卦 ) 가 택뢰수 ( 澤雷 隨 ) 괘가 되니 , 모두가 따르는 상이다 . 象曰 革言三就어니 又何之矣리오. 상왈 혁언삼취       우하지의 상전에 말하였다. “고치자는 말이 세 번 나아가니 또 어디를 가겠는가?” 又:또 우   何:어찌 하   之:갈지   矣: 어조사 의 384 효사를 풀이한 효상전 ( 소상전 ) 의 문장은 모두 ‘ 也 ’ 자로 매듭을 짓고 있는데 , 다만 이 택화혁괘 구삼 효상사와 상경의 수지비괘 육삼 효상사의 두 곳에만 달리 하고 있다 . 즉 , 택화혁괘 구삼 효상사는 ‘ 矣 ’ 자로 매듭지었고 , 수지비괘 육삼 효상사는 ‘ 乎 ’ 자로 매듭지었다 ( 象曰 比之匪人 이 不亦傷乎 아 ).", "사효": "九四는 悔亡하니 有孚면 改命하야 吉하리라. 구사    회망      유부    개명       길 구사는 뉘우침이 없어지니, 믿음을 두면 명을 고쳐서 길할 것이다. 구사는 혁명하는 때에 대신 ( 大臣 ) 에 해당하는 자리에 있다 . 음 자리에 양으로 있으니 , 혁명의 와중 ( 渦中 ) 에 뉘우침이 있을 수 있다 . 그러나 혁명이 끝나면 그 뉘우침이 없어지니 , 과거에 연연하지 말고 새로운 미래에 믿음을 두면 , 새로운 시대에 맞게 명을 고쳐서 길하게 된다 . 내괘는 바꾸려는 상황이고 외괘로 넘어오면 이미 바뀌어졌으니 , 새로운 제도를 만들어가는 명 ( 命 ) 을 두게 된다 . 구사가 변하면 수화기제 ( 水火旣濟 ) 괘가 되니 이미 혁명이 이루어진 것이다 . 象曰 改命之吉은 信志也일새라. 상왈 개명지길    신지야 상전에 말하였다. “명을 고쳐서 길함은 뜻을 믿기 때문이다.”", "오효": "九五는 大人이 虎變이니 未占애 有孚니라. 구오    대인    호변       미점   유부 구오는 대인이 호랑이로 변하니, 점을 하지 않음에 믿음이 있다. 虎:범 호   變:변할 변 구오는 혁명하는 때에 외괘에서 중정한 대인이다 . 혁명 ( 革命 ) 하는 때에는 정해진 자리가 없으니 왕이라 하지 않고 대인 ( 大人 ) 이라 하였다 . 새로운 시대를 개척하는 대인은 그 스스로가 호랑이같이 변하여 천하를 이끌어 간다 . 이러한 대인이 하는 일에는 의구심을 가지고 점을 하지 않더라도 , 모두가 믿음을 두게 된다 . 호랑이같이 변한 대인의 덕이 빛나기 때문이다 . 象曰 大人虎變은 其文이 炳也라. 상왈 대인호변 기문 병야 상전에 말하였다. “대인이 호랑이같이 변함은 그 무늬가 빛나는 것이다.” 炳:빛날 병·밝을 병 上六은 君子는 豹變이오 小人은 革面이니 征이면 凶코 居貞이면 吉하리라. 구오의 중정한 대인 ( 大人 ) 은 호랑이같이 변하여 새 시대를 이끌어 가는 주체가 되고 ,", "상효": "상육    군자    표변      소인    혁면       정       흉    거정      길 상육은 군자는 표범으로 변하고, 소인은 낯만 고치니, 가면 흉하고 바른데 거하면 길할 것이다. 豹:표범 표   面:낯 면 구시대 ( 舊時代 ) 가 가고 새로운 시대를 맞이하는데 , 상육의 군자 ( 君子 ) 는 표범같이 변하여 대인과 더불어 새 시대를 이끌어가는 일에 동참하게 된다 . 그러나 앞을 내다보지 못하는 소인 ( 小 人 ) 은 시대가 변함에 외양 ( 얼굴 ) 만 고치고 본질적으로 바꾸지 못하니 , 그러한 마음으로 가면 변화된 시대에 적응하지 못하여 흉하게 된다 . 그저 소인은 바른데 거하면 길하다 . 군자는 대인과 더불어 크게 일을 도모하니 무늬가 왕성하지만 , 소인이 낯만 고친다는 것은 그저 순하게 인군을 좇아가는 것을 말한다 . 象曰 君子豹變은 其文이 蔚也오 小人革面은 順以從君也라. 상왈 군자표변    기문    위야    소인혁면    순이종군야 상전에 말하였다. “군자가 표범같이 변함은 그 무늬가 성한 것이고, 소인이 낯만 바꿈은 순해서 인군을 좇는 것이다.” 蔚:성할 위·아름다울 위 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 528 ∼534 쪽 ."}}, {"num": 50, "ko": "화풍정", "hanja": "火風鼎", "lines": [0, 1, 1, 1, 0, 1], "url": "https://soosanss.tistory.com/202", "post_id": 202, "gwaui": "새로운 시대에 명을 베풀어 새로운 사회적 기틀을 만들어가는 데는 각자의 자리와 역할을 바르게 하고 맡은 바 임무를 충실히 해야 한다 ( 正位凝命 ). 혁명 ( 革命 ) 은 화풍정 ( 火風鼎 ) 응명 ( 凝命 ) 을 통하여 완성되는 것이다 . 구사효와 조응하는 개념이다 . 화풍정괘를 도전하면 정괘 ( 鼎卦 ) 의 구삼효가 혁괘 ( 革卦 ) 의 구사효로 된다 . 혁괘 ( 革卦 ) 상육효와 같은 의미이다 . 솥의 옥고리라는 것은 솥을 덮은 뚜껑의 고리를 말한다 .", "gwamyung": "외괘가 이화 ( 離火 ) ☲ , 내괘가 손풍 ( 巽風 ) ☴ 으로 이루어진 괘를 ‘ 정 ( 鼎 ) ’ 이라 한다 . 화풍정 ( 火風鼎 ) 괘는 솥의 형상을 바탕으로 그 기운의 양상을 표현하고 있다 . 인간이 먹을 밥을 짓기 위해서는 솥에 물과 쌀을 넣고 불을 지펴서 익혀야 한다 . 새로운 시대에 새로운 사회를 만들기 위해서는 솥이라는 새로운 제도를 만들고 그 제도에 맡게 사회의 모든 요소를 불로 담금질하여 익혀야 한다 . 인간이 새로운 명을 받아 새로운 삶을 살아가기 위해서는 자세를 바로 하고 하늘로부터 받은 명을 잘 응결하여야 한다 . 택화혁 ( 澤火革 )", "seogwa": "｢ 전 ｣ 은 택화혁괘 다음에 화풍정괘가 온 것을 다음과 같이 설명하고 있다 . 革物者 莫若鼎이라 故로 受之以鼎하고 혁물자 막약정      고    수지이정 물건을 고치는 것은 솥만한 것이 없다. 그러므로 정괘(鼎卦)로써 받고 莫:없을 막   若:같을 약 솥은 쌀을 밥으로 만들어내듯이 , 물건을 새롭게 고쳐내는 대표적인 그릇이다 . 그래서 택화혁 ( 澤火革 ) 괘 다음에 솥을 형상한 화풍정 ( 火風鼎 ) 괘를 둔 것이다 .", "gwasa": "鼎은 元(吉)亨하니라. 정   원(길)형 정(鼎)은 크게 (길하여) 형통하다. 鼎:솥 정· 바야흐로 정 인간이 먹을 수 있게 밥을 만들어 내며 , 인간이 사회에서 잘 살아가게 새로운 기틀을 마련하고 명 ( 命 ) 을 응결하는 화풍정 ( 火風鼎 ) 괘는 크게 형통하다 . ‘ 길 ( 吉 ) ’ 자는 필요 없는 글자이므로 해석하지 않는다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 鼎은 象也니 以木巽火 亨飪也니 단왈 정    상야    이목손화 팽임야 聖人이 亨하야 以享上帝하고 而大亨하야 以養聖賢하니라. 성인    팽       이향상제      이대팽       이양성현 巽而耳目이 聰明하며 柔進而上行하고 得中而應乎剛이라. 손이이목    총명       유진이상행      득중이응호강 是以元亨하니라. 시이원형 단전에 말하였다. “정(鼎)은 형상이니, 나무로써 불을 들여서 밥을 삶으니, 성인이 삶아서 상제께 제사올리고, 크게 삶아서 성현을 기른다. 겸손하고 귀와 눈이 총명하며, 유(柔)가 나아가 위로 행하고 중을 얻어 강(剛)에 응하고 있다. 이로써 크게 형통한 것이다.” 象:코끼리 상·모양 상   巽:들일 손·공손할 손  亨:형통할 형·제사드릴 향(享)·삶을 팽(烹)   飪:익힐 임   聰:귀밝을 총 정괘 ( 鼎卦 ) 는 솥의 형상과 같다 . 초효 음은 솥발이고 , 이효 ․ 삼효 ․ 사효의 양은 솥의 몸체로 음식을 담는 곳이 되고 , 오효 음은 솥을 잡는 귀가 되며 , 상효 양은 솥뚜껑의 고리가 된다 . 또한 솥으로 음식을 삶는 원리는 내괘 손풍 ( 巽風 ) ☴ 의 나무로 외괘 이화 ( 離火 ) ☲ 의 불을 들여서 밥을 삶는다 . 이러한 원리를 바탕으로 성인 ( 聖人 ) 이 음식을 삶아서 상제께 제사를 올리고 , 또한 크게 삶아서 성인과 현인을 길렀다 . 괘덕 ( 卦德 ) 을 보면 내괘 손풍 ☴ 으로 겸손하고 외괘 이화 ☲ 로 귀와 눈이 총명한 상이다 . 또한 부드러운 음 ( 陰 ) 기운이 아래에서 나아가 위로 행하여 외괘에서 중을 얻어 아래 구이의 양 ( 陽 ) 과 응하니 , 이로써 형통하다 . ‘ 柔進而上行 得中而應乎剛 ’ 은 괘변 ( 卦變 ) 을 말하는 것이 아니라 , 솥에서 음식이 삶아지는 원리를 표현한 것으로 보아야 한다 . 솥 안에 물과 쌀을 넣고 아래에 불을 지펴 끓이면 물 ( 陰 ) 이 끓으면서 수증기를 내며 위로 오르게 된다 . 솥 위의 육오효 음 자리에서 부글부글 끓으면서 아래 솥 안이 되는 구이효의 양 ( 陽 ) 즉 음식과 잘 응하여 조율이 되니 맛있는 음식이 되는 것이다 . 이렇듯이 음식을 삶아 제사를 올리고 성현을 기르는 것도 위와 아래가 잘 조응 ( 調應 ) 이 되어야 한다 . 그 기운은 아래로부터 위로 올라가 , 즉 제사를 올리는 성인의 마음이 아래로부터 하늘의 상제 ( 上帝 ) 에 이르러 , 상제와 아래에 있는 성인이 잘 조응되어야 하고 , 마찬가지로 성현의 마음과 정성에도 잘 조응되어야 한다 .", "gwasangsa": "象曰 木上有火 鼎이니 君子 以하야 正位하야 凝命하나니라. 상왈 목상유화 정       군자 이      정위       응명 상전에 말하였다. “나무 위에 불이 있는 것이 정(鼎)이니, 군자가 이를 본받아 자리를 바로해서 명을 엉긴다.” 凝: 엉길 응 내괘 손풍 ( 巽風 ) ☴ 의 나무 위에 외괘 이화 ( 離火 ) ☲ 의 불이 있는 기운의 양상으로 음식을 익히는 것이 솥의 원리이다 . 나무로 불을 지피고 그 위에 솥을 올려 음식을 삶으니 , 이러한 상을 보고 군자는 솥이 바르게 자리하여 음식을 잘 익게 하듯이 , 자리 ( 자세 ) 를 바르게 하고 천명 ( 天命 ) 을 잘 엉기게 한다 . 효사 및 효상사 初六은 鼎이 顚趾나 利出否하니 得妾하면 以其子无咎리라.", "hyosa": {"초효": "초육    정    전지   이출비       득첩       이기자무구 초육은 솥이 발이 엎어지나 비색한 것을 내놓음이 이로우니, 첩을 얻으면 그 자식으로써 허물이 없을 것이다. 顚:머리 전·넘어질 전·뒤집힐 전   趾:발 지   否:아닐 부·악할 비·막힐 비· 비색할 비 초육은 정괘 ( 鼎卦 ) 에 있어 맨 아래에 해당하니 솥발에 해당한다 . 그런데 솥으로 음식을 하는 순서에 있어서는 솥을 깨끗하게 닦아내는 처음에 해당한다 . 밥을 하기 전에 솥을 깨끗하게 청소하기 위해 솥을 엎어놓고 속에 있는 비색한 것을 밖으로 내놓는다 . 혁명 ( 革命 ) 을 하고 새로운 명을 엉기게 하는데 ( 凝命 ), 먼저 해야 할 일은 구태의연한 악습 ( 惡習 ) 을 제거하는 것이다 . ‘ 새 술은 새 포대에 담으라 ’ 고 했다 . 그리고 옛날 가도 ( 家道 ) 로 보면 , 본처 ( 本妻 ) 가 아이를 낳지 못하면 첩 ( 妾 ) 을 얻어서라도 자식을 낳으니 , 가문의 대 ( 代 ) 를 잇게 되어 허물이 없는 것과 같다 . 象曰 鼎顚趾나 未悖也오 利出否는 以從貴也라. 상왈 정전지    미패야    이출비    이종귀야 상전에 말하였다. “솥이 발이 엎어지나 어그러지지 않는 것이고, 비색한 것을 내놓음이 이로운 것은 귀함을 좇는 것이다.” 悖:어그러질 패   貴:귀할 귀 솥의 발을 엎는 것은 더러운 것을 씻어내 깨끗하게 하기 위한 것이니 도에 어긋나는 것이 아니다 . 또한 비색한 것을 닦아내어 구습 ( 舊習 ) 을 제거하는 것은 새로운 귀한 것을 좇기 위한 것이다 . 초육의 음 ( 陰 ) 은 아래에서 불이 달궈지니 병이 있는 것이요 , 초육과 육오가 구이에게 성급하게 가면 음식이 잘 익지 못하게 된다 . 그래서 초육과 육오가 구이에게 오지 못하도록 하면 길하게 되는 것이다 . 비록 짝이 되든 원수가 되든 구이로서는 제자리를 지키고 중도로써 삼가야 한다 . 象曰 鼎有實이나 愼所之也니 我仇有疾은 終无尤也리라. 상왈 정유실       신소지야    아구유질    종무우야 상전에 말하였다. “솥에 실물이 있으나 갈 바를 삼가니, 나의 짝이 병이 있음은 마침내 허물이 없을 것이다.” 愼:삼갈 신   尤:허물 우·더욱 우 솥에 있는 실물이 잘 익기 위해서는 급하게 하면 안 된다 . 서서히 순리에 맞게 삼가면서 가야 한다 . 또한 초효와 오효의 짝이 병이 있는 것은 순리에 맞게 참고 기다리면 결국 잘 익게 되어 허물이 없게 된다 .", "이효": "九二는 鼎有實이나 我仇 有疾하니 不我能卽이면 吉하리라. 구이    정유실      아구 유질       불아능즉       길 구이는 솥에 실물이 있으나, 내 짝이 병이 있으니, 나에게 능히 나아가지 못하게 하면 길할 것이다. 實:열매 실·찰 실   仇:짝 구·원수 구·해칠 구   疾:병 질   卽: 나아갈 즉 구이는 내괘에서 중 ( 中 ) 을 얻어 음식의 실물이 있는 자리이다 . 솥에 음식을 넣고 불로 끓이기 시작하면 불이 닿는 밑바닥이 뜨겁게 달궈지고 , 위에는 뜨거운 김이 모락모락 나오게 된다 . 구이로서는 아래에 있는 초효의 음 ( 陰 ) 과 구이가 응하고 있는 육오의 음 ( 陰 ) 이 신경 쓰인다 . 구이로서는 짝이 되는 음들이 모두 병이 있는 격이다 . 그렇지만 구이 실물은 가만히 제자리를 지켜 잘 익혀지기를 기다려야 하는데 ,", "삼효": "九三은 鼎耳 革하야 其行이 塞하야 稚膏를 不食하나 方雨하야 虧悔 終吉이리라. 구삼    정이 혁      기행    색       치고    불식       방우      휴회 종길 구삼은 솥귀가 바뀌어서 그 행함이 막혀 꿩 기름을 먹지 못하나, 바야흐로 비가 와서 이지러진 뉘우침이 마침내 길할 것이다. 塞:막힐 색   雉:꿩 치   膏:기름 고·은혜 고   方:바야흐로 방   虧:이지러질 휴·덜 휴   悔: 뉘우칠 회 구삼은 양 자리에 양으로 제자리에 있으나 , 중 ( 中 ) 을 얻지 못하였다 . 정괘 ( 鼎卦 ) 의 구삼효는 앞의 택화혁 ( 澤 火 革 ) 구삼이 양 자리에 양으로 실 ( 實 ) 하여 능력을 갖추고 있음에도 불구하고 중을 얻지 못하였으니 , 혁명의 상황에 제대로 적응하지 못하여 자기가 하고자 하는 일이 막히게 된 것이다 . 즉 , 나라에 등용되어 국록 ( 國祿 ) 을 받아먹지 못하게 되었다는 뜻이다 . 그렇지만 때는 바뀌어 새로운 명이 엉기고 있고 구삼 역시 실력이 있는 상태이니 , 때가 되면 비가 내리는 나라의 은덕을 받게 되어 후회가 사라지고 마침내 길하게 된다 . 구삼이 변하면 지괘 ( 之卦 ) 가 화수미제 ( 火水未濟 ) 가 되니 , 신중하게 때를 기다려야 한다 . 象曰 鼎耳革은 失其義也일새라. 상왈 정이혁    실기의야 상전에 말하였다. “솥귀가 바뀜은 그 뜻을 잃었기 때문이다.” 구삼이 솥귀가 바뀌는 혁명의 때에 부응하지 못했으니 , 원래 가지고 있던 뜻을 잃은 것이다 .", "사효": "구사효에 “ 뉘우침이 없어지니 믿음을 두면 명을 고쳐서 길할 것이다 ( 悔亡 하니 有孚 면 改命 하야 吉 하리라 ) ” 라고 하였다 . 즉 솥귀가 고쳐졌다는 것 ( 鼎耳 革 ) 은 혁명이 되어 이전의 제도가 바뀌어졌다는 것을 의미한다 . 九四는 鼎이 折足하야 覆公餗하니 其形이 渥이라 凶토다. 구사    정    절족      복공속       기형    악      흉 구사는 솥이 발이 부러져서 공의 밥을 엎으니, 그 얼굴이 젖는다. 흉하도다. 折:꺾을 절   覆:엎어질 복·뒤집힐 복·덮을 부   餗:솥안음식 속   形:형상 형·얼굴 형·나타날 형   渥:두터울 악·젖을 악 구사는 외괘 대신 ( 大臣 ) 자리에 처하여 있다 . 중 ( 中 ) 을 얻지 못하였고 또한 음 자리에 양으로 있으니 , 자칫 중도를 잃고 경솔하게 처신할 수가 있다 . 대신으로서 육오 ( 公 ) 의 명을 받아 구사가 응하고 있는 초육의 백성에게 일을 시켰는데 , 그만 초육이 일을 그르쳐 마치 공 ( 公 ) 의 밥을 엎은 격이 되었다 . 그러니 구사 대신의 얼굴이 죄책감에 땀으로 젖으니 흉하다 . 인군의 명 ( 命 ) 을 그르쳤으니 믿음을 잃게 되는 것은 당연한 일이다 . 주자 ( 朱子 ) 는 ‘ 얼굴 형 ( 形 ) ’ 을 ‘ 형벌 형 ( 刑 ) ’ 으로 보고 , 또한 ‘ 젖을 악 ( 渥 ) ’ 을 ‘ 목벨 옥 ( 剭 ) ’ 으로 보아 큰 형벌을 받아 흉하다고 해석하였으나 , 그 의미는 같다 . 공자 ( 孔子 ) 는 ｢ 계사하전 ｣ ( 繫辭下傳 ) 제 5 장에서 다음과 같이 설명하고 있다 . 子曰 德薄而位尊하며 知小而謀大하며 力小而任重하면 鮮不及矣나니 易曰 鼎이 折足하야 覆公餗하니 其形이 渥이라 凶이라하니 言不勝其任也라. 공자께서 말씀하셨다. “덕(德)은 낮은데 지위는 높으며, 지혜는 적은데 꾀하는 것은 크며, 힘은 작은데 책임이 무거우면 (禍에) 미치지 않을 이가 적으니, 역(易)에 가로되 ‘솥이 발이 부러져서 공의 밥을 엎으니, 그 얼굴이 젖어 흉하다’라고 하니, 그 책임을 이기지 못함을 말한다.” 象曰 覆公餗하니 信如何也오. 상왈 복공속       신여하야 상전에 말하였다. “공의 밥을 엎으니, 믿음이 어떠하겠는가?” 六五는 鼎黃耳金鉉이니 利貞하니라.", "오효": "육오의 음은 위에서 뜨거운 김이 나오면서 빨리 삶아지기를 애타게 기다리니 , 육오    정황이금현      이정 육오는 솥이 누런 귀에 금 고리니 바르게 함이 이롭다. 鉉:솥귀고리 현 육오는 외괘 이화 ( 離火 ) ☲ 에서 중 ( 中 ) 을 얻은 자리이다 . 솥으로 보면 상부 ( 上部 ) 옆에 누런 솥귀에 달린 금 고리에 해당한다 . 정괘 ( 鼎卦 ) 에서는 다른 괘에서와는 달리 육오 자리가 삼공 ( 三公 ) 에 해당하고 , 육오에서 음양 기운이 조화되어 밥이 잘 익고 ,", "상효": "상구효가 왕의 자리에 해당한다 . 또한 육오 음 ( 陰 ) 은 내괘의 구이 양 ( 陽 ) 과 잘 응하여 음양기운의 조화로 솥 안의 음식 ( 밥 ) 이 잘 익는 자리이다 . 다된 밥이 설지 않도록 더욱 더 바르게 함이 이롭다 . 일이 잘 완성되도록 중도 ( 中道 ) 로써 더욱 신중해야 한다 . 象曰 鼎黃耳는 中以爲實也라. 상왈 정황이    중이위실야 상전에 말하였다. “솥의 누런 귀는 중(中)으로써 실물이 되는 것이다.” 上九는 鼎玉鉉이니 大吉하야 无不利니라. 상구    정옥현      대길       무불리 상구는 솥이 옥고리니, 크게 길해서 이롭지 않음이 없다. 솥을 상징하는 정괘 ( 鼎卦 ) 의 맨 위에 있는 상구로서 , 왕의 자리에 해당한다 . 그래서 옥현 ( 玉鉉 ) 이라고 하였다 . 음 자리에 양으로 있고 중에서 벗어난 극에 처하여 있으나 , 정괘 ( 鼎卦 ) 에서의 상구는 잘 익은 음식을 퍼 올려 먹는 자리가 되니 크게 길한 자리이다 . 수풍정 ( 水風井 ) 상구에서는 뚜껑을 열어 밥을 퍼 먹게 되니 크게 길하고 이롭지 않음이 없다 . 이렇게 상구에 이르러 길하게 되는 것은 음식 재료를 넣고 물과 불의 조화로 잘 삶았기 때문이다 . 즉 , 강 ( 剛 ) 과 유 ( 柔 ) 가 잘 조절되어야 밥이 잘 익게 되는 것이다 . 국가사회내의 이해집단의 관계 , 국가정책과 제도의 실현 , 백성의 안녕과 질서 등 이 모든 것이 모두 강 ( 剛 ) 과 유 ( 柔 ) 의 조절작용을 통해서 잘 이루어지게 된다 . 象曰 玉鉉在上은 剛柔 節也일새라. 상왈 옥현재상    강유 절야 상전에 말하였다. “옥고리가 위에 있음은 강과 유가 조절되었기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 535 ∼543 쪽 ."}}, {"num": 51, "ko": "중뢰진", "hanja": "重雷震", "lines": [1, 0, 0, 1, 0, 0], "url": "https://soosanss.tistory.com/203", "post_id": 203, "gwaui": "인생의 의미를 바로 알고 ( 正位 ) 천명을 굳게 응집하여 ( 凝命 ) 천지의 급격한 변화에도 공경하는 마음으로 근신하고 스스로를 돌이켜 반성하며 수양하라 ( 恐懼修省 ). 솥은 인간의 생활에 필수적인 도구 가운데 가장 중요한 그릇이다 . 이러한 그릇을 주관하는 사람 가운데 , 가문 ( 家門 ) 을 잇고 가장 ( 家長 ) 이 되는 장자 ( 長子 ) 만한 사람은 없다 . 그래서 장남괘에 해당하는 중뢰진괘를 화풍정괘 다음에 둔 것이다 .", "gwamyung": "외괘가 진뢰 ( 震雷 ) ☳ , 내괘도 진뢰 ( 震雷 ) ☳ 로 우레가 거듭된 상을 ‘ 중뢰 ( 重雷 ) ’ 라 하고 괘명을 ‘ 진 ( 震 ) ’ 이라 한다 . 그야말로 안팎으로 우레가 거듭하여 진동하는 상이다 . 앞의 화풍정 ( 火風鼎 ) 괘에서 위를 바르게 하여 ( 正位 ) 명을 응결시키는 것 ( 凝命 ) 은 우레가 거듭하매 혼비백산 ( 魂飛魄散 ) 하는 위험을 대비하고자 하는 것이다 . 지진 ( 地震 ) 의 대재앙이다 . 인간으로서 어찌할 수 없는 천재지변 ( 天災地變 ) 이다 . 이러한 상황에 어떻게 대처해야 하는가 ?", "seogwa": "｢ 전 ｣ 은 화풍정괘 다음에 중뢰진괘가 온 것을 다음과 같이 설명하고 있다 . 主器者 莫若長子라 故로 受之以震하고 주기자 막약장자    고    수지이진 그릇을 주관하는 자는 장자만한 자가 없다. 그러므로 진(震)괘로써 받고 화풍정 ( 火風鼎 )", "gwasa": "震은 亨하니 震來애 虩虩이면 笑言이 啞啞이리니 震驚百里에 不喪匕鬯하나니라. 진    형      진래    혁혁       소언    아아(액액)  진경백리    불상시창 진(震)은 형통하니, 우레가 오매 두려워 하고 놀라면 웃는 소리가 막힐 것이니, 우레가 백리를 놀라게 함에 숟가락과 술을 잃지 않는다. 震:천둥소리 진·벼락칠 진·흔들 진·놀랄 진·지동 진   虩:두려워하는 모양 혁   笑:웃을 소 啞:벙어리 아·놀라는 소리 아·웃을 액   驚:놀랄 경   喪:잃을 상   匕:비수 비·화살촉 비·숟가락 비(시: 匙)   鬯:울창주 창 匕鬯:종묘제사에서 쓰는 제기(祭器)와 향주(香酒)·황태자(皇太子) 우레가 거듭하여 지진 ( 地震 ) 이 나는 것은 천지 ( 天 地 ) 의 자율작용이니 형통하다 . 이 땅에 얹혀살고 있는 인간은 천지에 비하면 미물 ( 微物 ) 에 불과하다 . 지진이라는 현상은 천지의 자화작용 ( 自化作用 ) 으로 일어나는 것이기에 인간으로서는 어찌할 수가 없다 . 지진이 나니 혼비백산 ( 魂飛魄散 ) 하여 놀라고 , 평온할 때 나오던 웃음소리도 막히게 된다 . ‘ 啞啞 ’ 를 깔깔거리는 소리 ( 액액 ) 로 대부분 풀이하고 있으나 , 자연의 큰 재난에 말문이 막히는 것 ( 아아 ) 으로 풀이하여야 한다고 본다 . 이렇게 우레와 지진이 백리를 놀라게 해도 , 인간 삶의 기본이 되는 숟가락과 죽은 생명에 대한 애도의 뜻을 표하는 술은 잃지 않는다 . ‘ 시창 ( 匕鬯 ) ’ 은 숟가락과 제사 때 올리는 향내가 나는 울창주로서 제사를 지내는 필수 도구이다 . 이것을 제사지내는 주체가 되는 장자 ( 長子 ), 나라의 주인이 되는 인군 ( 人君 ), 정신의 지도자가 되는 제사장 ( 祭司長 ) 등으로 다양하게 해석할 수 있지만 , 진정한 의미는 다음의 두 가지로 볼 수 있다 . 첫째는 화풍정 ( 火風鼎 ) 괘에서 ‘ 정위응명 ( 正位凝命 ) ’ 을 제대로 한 자이고 , 둘째는 지진의 재앙이 끝난 뒤에 살아남은 자이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 震은 亨하니 震來虩虩은 恐致福也오 笑言啞啞는 後有則也라. 단왈 진    형      진래혁혁    공치복야    소언아아    후유칙야 震驚百里는 驚遠而懼邇也니 진경백리    경원이구이야 出可以守宗廟社稷하야 以爲祭主也리라. 출가이수종묘사직       이위제주야 단전에 말하였다. “진(震)은 형통하니 ‘우레가 오매 두려워 하고 놀라는 것’은 두려워하여 복을 이루는 것이고, ‘웃는 소리가 막힘’은 뒤에 법칙이 있는 것이다. ‘우레가 백리를 놀라게 함’은 먼 곳을 놀라게 하고 가까운 데를 두려워하게 함이니, 나가서 종묘와 사직을 지켜 제주(祭主)가 될 것이다.” 恐:두려워할 공   則:법칙 칙   懼:두려워할 구   邇:가까울 이   廟:사당 묘  社:토지신 사   稷:기장 직·곡신 직 진 ( 震 ) 은 형통하다 . ‘ 우레가 오매 놀라고 놀라는 것 ’ 은 자연의 위대함에 두려워하는데 그 두려워하는 마음이 있기 때문에 결국 복 ( 福 ) 을 이루는 것이고 , ‘ 웃음소리가 막힌다는 것 ’ 은 지진이 끝난 뒤에 살아남은 자의 법이 있는 것이다 . ‘ 지진이 백리를 놀라게 한다 ’ 는 것은 지진이 나면 그 진앙지 ( 震央 地 ) 로부터 멀리 떨어져 있는 곳은 놀라게 하고 가까운 곳은 화를 입을까 두려워하는 것이다 . 지진이 끝남에 살아있는 자는 나가서 종묘 ( 宗廟 ) 와 사직 ( 社稷 ) 을 지켜 죽은 자를 위로하고 나라를 다시 일으키는 제주 ( 祭主 ) 가 된다 .", "gwasangsa": "象曰 洊雷 震이니 君子 以하야 恐懼修省하나니라. 상왈 천뢰 진      군자 이       공구수성 상전에 말하였다. “거듭한 우레가 진(震)이니, 군자가 이를 본받아 놀라고 두려워하며 닦고 반성한다.” 洊:이를 천·연거푸 천   省: 살필 성 우레가 거듭하고 지진이 거듭하는 것이 진 ( 震 ) 이다 . 군자는 이러한 자연의 큰 재앙이 있을 때 그 기미를 보아 놀라고 두려워하면서 재앙에 빠지지 않도록 수양하고 반성한다 .", "hyosa": {"초효": "初九는 震來虩虩이라아 後애 笑言啞啞하리니 吉하니라. 초구    진래혁혁         후    소언아아         길 초구는 지진이 오니 두려워 하고 놀라야 뒤에 웃음소리가 막힐 것이니 길하다. 초구는 중뢰진괘의 주효 ( 主爻 ) 로 내괘의 맨 아래에서 강력한 움직임이 있는 자리이다 . 강력한 지진이 일어나니 두려워 하고 놀란다 . 자연의 힘을 미물 ( 微物 ) 인 인간이 어찌 하겠는가 ? 지진이 일어나면 놀라고 , 또한 평온했던 웃음소리도 막히게 된다 . 지진이 나서 놀라는 것은 , 대재앙이 오는 상황에도 정신을 차리면 대비할 수 있다는 것을 말한다 . 그러니 두려워하면서도 대비를 잘 하면 살아남는 복을 이루게 되고 , 지진이 끝나면 삶의 의미를 새로이 느끼게 되니 길하다 . 그리고 지진이 끝나면 , 새로운 사회를 건설해야 하는 법칙이 있다 . 象曰 震來虩虩은 恐致福也오 笑言啞啞는 後有則也라. 상왈 진래혁혁    공치복야   소언아아    후유칙야 상전에 말하였다. “지진이 오니 두려워 하고 놀람은 두려워하여 복을 이루는 것이고, 웃음소리가 막힘은 뒤에 법칙이 있는 것이다.” 六二는 震來厲라. 億喪貝하야 蹄于九陵이니 勿逐하면 七日得하리라. 초구 ) 에서 다소 떨어진 곳에 있으니 , 지진이 지나가면 재앙은 없게 된다 . 또는 인근 지역에서 지진이 날 때 움직여 가서 피하면 재앙이 없게 된다 . 초구 강진 ( 强震 ) 에 이어 약하게 거듭되는 여진 ( 餘震 ) 이다 . 초구의 강진에 갈라지고 무너지는 재앙이 있고 , 초구에서 강진 ( 强震 ) 이 일어나고 구사에서 여진 ( 餘震 ) 이 일어나 , 지진이 가고 또 오니 위태롭다 . 그러나 진앙지에서 멀리 떨어진 자리에 있으니 , 지진의 상황과 재앙으로 인한 피해를 헤아릴 수 있는 상태이다 . 지진으로 인하여 죽거나 다치는 피해가 없으면 , 인명을 구조하고 피해를 복구하는 일을 해야 한다 . 象曰 震往來厲는 危行也오 其事 在中하니 大无喪也니라. 상왈 진왕래려    위행야    기사 재중      대무상야 상전에 말하였다. “지진이 가고 오매 위태로움은 위태롭게 행하는 것이고, 그 일이 가운데 있으니 크게 잃음이 없다.” 上六 은 震 이 索索 하야 視 矍矍 이니 征 이면 凶 하니 초구에서 강진 ( 强震 ) 이 일어난 후 구사에서 여진 ( 餘震 ) 이 일어나며 지진이 서서히 사라지는 것을 놀라운 마음으로 이리저리 두리번거리며 본다 . 그러나 마치 불구경하듯이 지진이 난 곳을 찾아가면 재앙을 당하여 흉하게 된다 . 지진의 재앙이 상육의 몸에 이르지 않고 그 이웃에 미치면 ,", "이효": "육이    진래려    억상패       제우구릉       물축       칠일득 육이는 지진이 오니 위태하다. 재물 잃을 것을 헤아려 구릉에 오르니, 쫓지 않으면 7일에 얻을 것이다. 厲:위태할 려   億:억 억·헤아릴 억   貝:조개 패·재물 패   躋:오를 제   陵:큰 언덕 릉   逐:쫓을 축 육이는 강진 ( 强震 ) 이 일어나는 초구에서 가장 가까운 자리에 있다 . 그렇지만 내괘에서 중정한 자리에 있다 . 강진이 오니 위태하다 . 재물 잃을 것을 생각하면서도 무엇보다 중요한 것은 자기 생명이다 . 내호괘가 간산 ( 艮山 ) ☶ 으로 목숨을 구하기 위해 높은 언덕에 올라가니 , 재물을 구하려고 쫓아가지 않으면 지진이 지나간 뒤에 얻을 수 있게 된다 . 지진이 일어나도 중정한 마음으로 정신을 차려 무엇보다 중요한 생명을 보존한다 . 우선 목숨부터 구하고 난 다음에 생각할 것이 재물이다 . 象曰 震來厲는 乘剛也일새라. 상왈 진래려    승강야 상전에 말하였다. “지진이 오니 위태로운 것은 강(剛)을 탔기 때문이다.” 지진이 나서 육이가 위태로운 것은 바로 강진이 일어난 초구 양을 타고 있기 때문이다 . 六三은 震蘇蘇니 震行하면 无眚하리라. 육이는 초구의 지진 ( 진앙지 ) 에서 가까운 자리에 있으니 높은 언덕에 올라가 피하지만 ,", "삼효": "육삼   진소소    진행       무생 육삼은 지진에 안절부절못하니, 지진이 가면 재앙이 없을 것이다. 蘇:차조기 소·깨날 소   蘇蘇:두려워하여 안절부절못하는 모양   眚: 재앙 생 육삼은 중을 얻지 못하였고 양 자리에 음으로 있으니 자리가 부당하다 . 그러나 초구 강진으로부터 비교적 멀리 떨어져 있다 . 인근지역에서 지진이 일어나니 , 깜짝 놀라 까무러치며 안절부절못한다 . 그러나 지진이 난 곳 ( 육삼은 구이보다 진앙지에서 더 떨어져 있으니 지진이 끝나기를 기다리거나 움직여서 다른 곳으로 이동하면 재앙이 없다 . 象曰 震蘇蘇는 位不當也일새라. 상왈 진소소    위부당야 상전에 말하였다. “지진에 안절부절못함은 자리가 마땅하지 않기 때문이다.”", "사효": "九四는 震이 遂泥라. 구사    진    수니 구사는 지진이 드디어 빠진다. 遂:이룰 수·나갈 수·따를 수·드디어 수   泥:진흙 니 구사는 외괘에서 첫 자리로 , 음 자리에 양으로 있으니 약한 지진이다 . 구사의 여진 ( 餘震 ) 에 갈라지고 무너진 건물이 더욱 가라앉아서 드디어 진흙처럼 모든 것이 폭삭 주저앉는다 . 지진도 약하게 된다 . 모든 것이 무너져 황폐하게 된다 . 象曰 震遂泥는 未光也로다. 상왈 진수니    미광야 상전에 말하였다. “지진이 드디어 빠짐은 빛나지 않도다.” 六五는 震이 往來 厲하니 億하야 无喪有事니라.", "오효": "육오    진    왕래 려      억       무상유사 육오는 지진이 가고 오매 위태로우니, 헤아려서 일을 잃음이 없게 한다. 육오는 양 자리에 음으로 있으나 , 외괘에서 중을 얻고 있다 .", "상효": "상육    진    삭삭      시 확확       정       흉 震不于其躬이오 于其隣이면 无咎리니 婚媾는 有言이리라. 진불우기궁       우기린      무구       혼구    유언 상육은 지진이 흩어지고 흩어져서 보는 것이 놀라서 두리번거리니, 가면 흉하니, 지진이 그 몸에 미치지 않고 그 이웃이면 허물이 없을 것이니, 혼인을 구하는 것은 말이 있을 것이다. 索:노 삭·흩어질 삭·두려워할 삭·찾을 색   索索:흩어져 없어지는 모양·불안한 보양   視:볼 시   矍:두리번거릴 확 躬:몸 궁   隣: 이웃 린 상육은 저 멀리서 지진이 나는 것을 지켜보는 자리이다 . 상육으로서는 화를 모면하여 허물이 없게 된다 . 그러나 이웃은 재앙을 당하여 깊은 슬픔에 잠겨 있는데 혼인을 구하는 것은 경우에 맞지 않으니 비난의 말을 듣게 된다 . 재난을 당한 이웃은 천지자연과 사람을 경계하게 된다 . 멀리 떨어져 있어 도와주지는 못할망정 재난을 애도하는 마음이 있어야 할 것이다 . 象曰 震索索은 中未得也일새오 雖凶无咎는 畏隣戒也일새라. 상왈 진삭삭    중미득야         수흉무구    외린계야 상전에 말하였다. “지진이 흩어지고 흩어짐은 중을 얻지 못하였기 때문이고, 비록 흉하나 허물이 없는 것은 이웃이 경계함을 두려워하기 때문이다.” 畏:두려워할 외   戒:경계할 계 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 544 ∼551 쪽 ."}}, {"num": 52, "ko": "중산간", "hanja": "重山艮", "lines": [0, 0, 1, 0, 0, 1], "url": "https://soosanss.tistory.com/204", "post_id": 204, "gwaui": "중뢰진괘와 같이 세상사의 번잡한 소용돌이 속에서도 존재의 의미를 반추하고 삶의 목적을 구현하기 위한 고요함이 있어야 한다 . 세상사를 잊고 조용히 그쳐 영혼을 관조하라 ( 無思無爲 ).", "gwamyung": "외괘가 간산 ( 艮山 ) ☶ , 내괘도 간산 ( 艮山 ) ☶ 으로 이루어진 괘를 ‘ 간 ( 艮 ) ’ 이라 한다 . 안에서 그치고 밖으로도 그친다 . 중뢰진 ( 重雷震 ) 은 강력한 움직임으로 지진이라는 재앙이 일어나는데 , 중산간 ( 重山艮 ) 괘는 모든 움직임을 그치고 그야말로 아무 생각도 없고 함도 없는 평정 ( 平靜 ) 의 세계이다 . 중산간괘는 수양방법론과 그 과정에 대한 내용을 담고 있다 . 중산간괘가 육체 ( 肉體 ) 의 평정 ( 平靜 ) 을 이루는 수양을 의미한다면 , 상경 ( 上經 ) 의 풍지관 ( 風地 觀 ) 괘는 육체의 그침으로 일어나는 정신계 ( 精神界 ) 의 작용을 설명하고 있는 괘이다 .", "seogwa": "｢ 전 ｣ 은 중뢰진괘 다음에 중산간괘가 온 것을 다음과 같이 설명하고 있다 . 震者는 動也니 物不可以終動하야 止之라 故로 受之以艮하고 진자    동야    물불가이종동      지지    고    수지이간 진(震)이란 움직임이니, 물건이 가히 끝까지 움직이지 못해서 그치게 된다. 그러므로 간(艮)으로 받고 중뢰진은 가장 강력하게 움직이는 기운을 내재하고 있다 . 천하의 운동은 상대성을 지니고 있다 . 움직임이 극에 이르면 도리어 그쳐서 고요한 평정 ( 平靜 ) 을 유지하게 된다 . 그래서 중뢰진괘 다음에 중산간괘를 둔 것이다 .", "gwasa": "艮其背면 不獲其身하며 行其庭하야도 不見其人하야 无咎리라. 간기배    불획기신      행기정          불견기인       무구 그 등에 그치면 그 몸을 얻지 못하며, 그 뜰에 행하여도 그 사람을 보지 못하여 허물이 없을 것이다. 艮:머무를 간·어려울 간   背:등 배   獲:얻을 획   身:몸 신   庭:뜰 정 인체에서 앞에는 모든 오감 ( 五感 ) 작용의 기관 ( 眼· 耳· 鼻· 舌· 身 ) 이 있어 외계 ( 外界 ) 에 현혹되기 쉬우나 , 뒤의 등에는 아무 기관이 없으니 욕심이 없다 . 그래서 아무 욕심이 없는 상태인 그 등에 그치면 감각기관의 느낌도 없으니 , 그 몸을 잊은 상태가 된다 . 또한 자기 자신을 잊을 뿐만 아니라 외계 ( 外界 ) 의 물상 ( 物像 ) 도 잊게 되어 , 뜰을 행하여도 다른 사람을 보지 못하는 상태가 된다 . 천하의 연고 ( 緣故 ) 를 깨우치기 위해 고요히 우주심 ( 宇宙心 ) 으로 향하니 , 자기 자신을 잊고 다른 사람을 잊으나 허물이 없는 것이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 艮은 止也니 時止則止하고 時行則行하야 단왈 간    지야   시지즉지       시행즉행 動靜不失其時 其道 光明이니 艮其(止)背는 止其所也일새라. 동정불실기시 기도 광명       간기(지)배    지기소야 上下 敵應하야 不相與也일새 상하 적응       불상여야 是以不獲其身行其庭不見其人无咎也라. 시이불획기신행기정불견기인무구야 단전에 말하였다. “간(艮)은 그침이니, 때가 그칠 때면 그치고 때가 행할 때면 행하여, 움직이고 고요함이 그 때를 잃지 않음이 그 도(道)가 광명하니, ‘그 등에 그침’은 그 곳에 그치기 때문이다. 위와 아래가 적으로 응하여 서로 더불지 못하기 때문이니, 이로써 그 몸을 얻지 못하며 그 뜰에 행하여도 그 사람을 보지 못하여 허물이 없는 것이다.” 止:발 지·그칠 지·머무를지   動:움직일 동   靜:고요할 정   失:잃을 실  敵: 원수 적 간 ( 艮 ) 은 그치는 것이다 . 그친다는 것도 항상 때와 상황에 적절하게 그쳐야 한다 . 그래서 그쳐야 될 상황에서는 그치고 행하여야 할 상황에서는 행하여 , 움직이고 고요함에 그 때를 잃지 않는 중도 ( 中道 ) 를 지니니 그 도 ( 道 ) 가 광명한 것이다 . ‘ 그 등에 그친다 ’ 는 것은 그쳐야 할 그 곳에 그치는 것이다 . ‘ 艮其 ( 止 ) 背 ’ 에서 ‘ 止 ’ 는 불필요한 연문 ( 衍文 ) 으로 풀이하지 않는다 . 중산간 ( 重山艮 ) 괘는 초효부터 상효에 이르기까지 모두 음양으로 상응 ( 相應 ) 하지 않고 적응 ( 適應 ) 하니 , 위와 아래가 마치 원수처럼 대응하여 서로 더불지 못한다 . 이는 행선 ( 行禪 ) 을 하든 , 주선 ( 住禪 ) 을 하든 , 좌선 ( 坐禪 ) 을 하든 , 와선 ( 臥禪 ) 을 하든지 간에 상체 ( 上體 ) 와 하체 ( 下體 )· 정신 ( 精神 ) 과 육체 ( 肉體 ) 가 서로를 느끼지 못하고 관여할 수 없기 때문에 , 서로 더불지 못하게 되는 것을 말한다 . 그래서 “ 그 몸을 얻지 못하고 그 뜰을 행하여도 그 사람을 보지 못하여 허물이 없다 ” 고 한 것이다 . 《 대학 ( 大學 )》 의 첫 머리에 다음 문장이 있다 . 大學之道는 在明明德하며 在親民하며 在止於至善이니라. 知止而后에 有定이니 定而后에 能靜하며 靜而后에 能安하며 安而后에 能慮하며 慮而后에 能得이니라. 대학의 도는 밝은 덕을 밝히는데 있으며, 백성을 친함(새롭게 함)에 있으며, 지극히 착한 곳에 그침에 있다. 그칠 줄을 안 뒤에 정함이 있으니, 정한 뒤에 능히 고요하며, 고요한 뒤에 능히 편안하며, 편안한 뒤에 능히 생각하며, 생각한 뒤에 능히 얻는다.", "gwasangsa": "象曰 兼山이 艮이니 君子 以하야 思不出其位하나니라. 상왈 겸산    간      군자 이       사불출기위 상전에 말하였다. “겹쳐있는 산이 간(艮)이니, 군자가 이를 본받아 생각이 그 자리를 벗어나지 않는다.” 兼:겸할 겸·쌓을 겸   思:생각할 사   位:자리 위 첩첩산중 ( 疊疊山中 ) 이다 . 후중 ( 厚重 ) 하게 자연의 기운이 그쳐 있는 곳 . 그치고 또 그쳐 있는 것이 간 ( 艮 ) 이니 , 군자는 이러한 기운의 양상을 보고 본받아 생각이 그 자리에서 벗어나지 않게 한다 . 그친다는 것은 아무 생각도 없고 함도 없는 이른바 ‘ 무사무위 ( 無思無爲 ) ’ 의 경지이다 . 생각이 끊어진 자리는 도 ( 道 ) 가 통하는 자리요 , 호흡이 끊어진 자리는 죽음의 자리이다 . 생각이 끊어진 자리와 호흡이 끊어진 자리의 경계는 어디인가 ? 인간은 나날이 계속되는 하루 24 시간을 생각에서 생각으로 꼬리를 물고 물어 끊임없는 사념 ( 思念 ) 작용을 일으킨다 . 세속사 ( 世俗事 ) 의 생각이 끊어진 자리 , 그 자리에서 생각이 나오지 않게 하는 것이 그침의 경지이다 . 공자 ( 孔子 ) 는 ｢ 계사상전 ｣ 제 10 장에서 다음과 같이 말하였다 . 易은 无思也하며 无爲也하야 寂然不動이라가 感而遂通天下之故하나니 非天下之至神이면 其孰能與於此리오. 역(易)은 생각함도 없으며 함도 없어서, 고요히 움직이지 않다가 느껴서 드디어 천하의 연고에 통하니, 천하의 지극한 신(神)이 아니면 그 누가 이에 참여하겠는가? 효사 및 효상사 初六은 艮其趾라. 无咎하니 利永貞하니라.", "hyosa": {"초효": "초육    간기지    무구       이영정 초육은 그 발에 그친다. 허물이 없으니, 영구히 바르게 함이 이롭다. 趾:발 지 자세를 바로 하고 고요히 좌선 ( 坐禪 ) 에 들어가는 처음 자리이다 . 발이 움직이면 몸이 움직이게 되니 , 발을 그쳐 자리를 정하고 좌선에 들어간다 . 허물이 없으니 추호의 흔들림이 없이 길이 바르게 하면 선정 ( 禪定 ) 을 얻을 수 있어 이롭다 . 초육이 변하면 내괘가 이화 ( 離火 ) ☲ 가 되어 화기 ( 火氣 ) 가 상승하면 마음이 움직이기 쉬우니 , 후중 ( 厚重 ) 한 산처럼 길이 바르게 하여야 한다 . 象曰 艮其趾는 未失正也라. 상왈 간기지    미실정야 상전에 말하였다. “그 발에 그침은 바름을 잃지 않는 것이다.” 六二는 艮其腓니 不拯其隨라. 其心不快로다.", "이효": "육이    간기비    부증기수    기심불쾌 육이는 그 장딴지에 그치니, 그 따름을 구원하지 못한다. 그 마음이 쾌하지 않도다. 腓:장딴지 비   拯:건질 증·도울 증   隨:따를 수   快:쾌할 쾌 육이는 신체로 보면 장딴지에 해당하는 자리이다 . 가부좌 ( 跏趺坐 ) 를 하고 좌선 ( 坐禪 ) 에 들어가니 , 초효에서 발꿈치에 그치고 이제 구이에서는 장딴지에 그치는 격이다 . 장딴지에 그치고자 하나 발이 아프고 , 발이 그치면 장딴지가 아프다 . 발과 장딴지가 서로 따르는 바가 되어 발이 장딴지에게 원하고 장딴지가 발에게 원하는 바가 있으나 , 물러나 듣지 못하고 서로 그 따름을 구원하지 못한다 . 모두가 그쳐야 하기 때문이다 . 발과 장딴지의 고통에 마음이 불쾌하다 . 육이가 변하면 내괘가 손풍 ( 巽風 ) ☴ 이 되어 다리가 되고 ( 巽爲股 ), 지괘 ( 之卦 ) 가 산풍고 ( 山風蠱 ) 괘가 되니 , 발과 장딴지가 서로 따름이 있어 움직이면 일이 생긴다 . 마음과 몸이 흐트러지는 것이다 . 象曰 不拯其隨는 未退聽也일새라. 상왈 부증기수    미퇴청야 상전에 말하였다. “그 따름을 구원하지 못하는 것은 물러나서 듣지 못하기 때문이다.” 未:아닐 미   退:물러날 퇴   聽:들을 청", "삼효": "九三은 艮其限이라 列其夤이니 厲 薰心이로다. 구삼    간기한      열기인       려 훈심 구삼은 그 허리에 그친다. 그 팔뚝을 벌리니, 위태함이 마음을 태우도다. 限:지경 한·한정 한·기한 한·허리 한   列:벌릴 열   夤:조심할 인·연줄 인·팔뚝 인 厲:위태할 려   薰:향기로울 훈·태울 훈 구삼은 내괘의 끝에 있어 신체로 보면 하체 ( 下體 ) 와 상체 ( 上體 ) 의 경계가 되는 곳 , 즉 허리에 해당한다 . 발과 장딴지를 거쳐서 , 드디어 허리에 그친다 . 하체 ( 下體 ) 가 그치니 상체 ( 上體 ) 의 등뼈와 허리가 뻐근하여 고통이 따른다 . 등과 허리의 고통을 완화하고자 팔뚝을 벌린다 . 또한 하체 ( 下體 ) 가 그치니 척추 ( 脊椎 ) 에서 기운이 뻗어 위로 올라간다 . 위태로움이 마음을 태우는 듯하다 . 그러나 간괘 ( 艮卦 ) 의 호괘 ( 互卦 ) 가 뇌수해 ( 雷水解 ) 이니 기운이 소통되지 않아 막혀있던 기혈 ( 氣血 ) 이 풀리고 , 외호괘가 진뢰 ( 震雷 ) ☳ 가 되니 척추 ( 脊椎 ) 의 강한 기운이 발동하기도 한다 . 象曰 艮其限이라 危 薰心也라. 상왈 간기한      위 훈심야 상전에 말하였다. “그 허리에 그친다. 위태로움이 마음을 태운다.” 六四는 艮其身이니 无咎니라.", "사효": "육사    간기신      무구 육사는 그 몸에 그치니 허물이 없다. 육사는 외괘의 처음으로 음 자리에 음 ( 陰 ) 으로 자리가 마땅하다 . 아래 발에서 그치고 장딴지에서 그치고 허리에 그쳐서 드디어 평정 ( 平靜 ) 을 이루고 몸 전체가 그쳐있는 상태가 된다 . 육사가 변하면 지괘 ( 之卦 ) 가 화산려 ( 火山旅 ) 가 되어 여행을 하게 되는데 , 그 여행은 정신적 ( 精神 的 ) 인 여행으로 , 바로 풍지관 ( 風地觀 ) 괘로 여행을 하는 것이다 . 상경 ( 上經 ) 풍지관괘의 동관 ( 童 觀 ), 규관 ( 闚觀 ), 관아생 ( 觀我生 ), 관국지광 ( 觀國之光 ), 관아생 ( 觀我生· 觀民 ), 관기생 ( 觀其生 ) 의 육관 ( 六觀 ) 을 각자의 근기에 맡게 여행하게 된다 . 象曰 艮其身은 止諸躬也라. 상왈 간기신    지저궁야 상전에 말하였다. “그 몸에 그침은 몸에 그치는 것이다.” 諸:모두 제·어조사 제·무릇 제(본음 ‘저’) 六五는 艮其輔라. 言有序니 悔亡하리라. 육사에서 풍지관 ( 風地觀 ) 으로 정신계 ( 精神界 ) 를 여행하니 , 말이 있게 된다 . 말 ( 言 ) 에는 차례가 있고 , 해서는 안 될 말도 있다 .", "오효": "육오    간기보    언유서    회망 육오는 그 광대뼈(볼)에 그친다. 말에 차례가 있으니 후회가 없을 것이다. 輔:광대뼈 보·바퀴덧방나무 보·도울 보· 재상 보 육오는 외괘의 중 ( 中 ) 을 얻은 자리로 인체에서는 얼굴의 광대뼈 , 볼에 해당한다 . 육오가 변하면 풍산점 ( 風山漸 ) 괘가 되니 , 차츰차츰 순서 있게 나아가야 한다 . 욕심은 엄하게 막아야 한다 . 한 순간에 깨우친다는 것도 헛된 망령이다 . 파상 ( 破相 ) 을 해야 한다 . 象曰 艮其輔는 以中으로 正也라. 상왈 간기보    이중      정야 상전에 말하였다. “그 광대뼈에 그침은 중(中)으로써 바른 것이다.”", "상효": "上九는 敦艮이니 吉하니라. 상구    돈간      길 상구는 도탑게 그치니 길하다. 敦:도타울 돈 상구는 드디어 도탑게 그친 평정 ( 平靜 ) 의 상태이다 . 세상사를 잊고 평정을 유지한다 . 《 대학》 의 ‘ 지극한 선에 그친 ( 止於至善 ) ’ 경지이다 . 선정 ( 禪定 ) 의 맛을 느끼니 길하다 . 상구가 변하면 지산겸 ( 地山謙 ) 괘가 되니 더욱 겸손해야 하며 , 선정 ( 禪定 ) 에 들어가 깨우쳤다고 입을 함부로 놀리면 도 ( 道 ) 가 어그러진다 . 깨달음이란 천하의 연고 ( 緣故 ) 를 통하는 것이다 . 풍지관 ( 風地觀 ) 의 관법 ( 觀法 ) 과 중산간 ( 重山艮 ) 의 지법 ( 止法 ) 이 하나로 통합이 되는 자리이다 . 象曰 敦艮之吉은 以厚終也일새라. 상왈 돈간지질    이후종야 상전에 말하였다. “도탑게 그쳐서 길함은 두터움으로 마치기 때문이다.” 厚:두터울 후   終:마칠 종 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 552 ∼559 쪽 ."}}, {"num": 53, "ko": "풍산점", "hanja": "風山漸", "lines": [0, 0, 1, 0, 1, 1], "url": "https://soosanss.tistory.com/205", "post_id": 205, "gwaui": "산 위에 바람이 부니 나무가 산들산들 흔들리며 아름다운 풍광을 드러내고 , 간괘 ( 艮卦 ) 에서 도탑게 그치니 하늘에서 명을 내린다 . 큰 산처럼 두터운 덕을 쌓고 세상을 아름답게 하라 ( 居德善俗 ). 상을 본받아 어진 덕에 거하고 풍속을 아름답게 한다 . 효사 및 효상사 初六은 鴻漸于干이니 小子 厲하야 有言이나 无咎니라.", "gwamyung": "외괘가 손풍 ( 巽風 ) ☴ , 내괘가 간산 ( 艮山 ) ☶ 으로 이루어진 괘를 ‘ 점 ( 漸 ) ’ 이라 한다 . 차츰차츰 나아간다는 뜻으로 , 절도에 맞게 질서 있게 나아간다 . 중산간 ( 重山艮 ) 괘에서 도탑게 그치고 나서 다시 현실로 돌아오는 데는 성급하게 움직이면 안 된다 . 천천히 기혈 ( 氣穴 ) 을 풀면서 서서히 움직여야 한다 . 깨우친다는 것은 천하의 연고에 통하는 것이고 , 천하의 연고에 통한 군자 ( 君子 ) 의 사업은 천하 백성을 일깨우는 것이다 . 속세를 벗어나 천하의 연고에 통하나 , 통해서는 다시 속세로 돌아와 백성을 구제하고 사회를 선하게 해야 한다 . 질서와 차례를 지켜 나아가는 도 ( 道 ) 의 가장 대표적인 것은 여자가 시집가는 절차이니 , 점괘 ( 漸卦 )", "seogwa": "｢ 전 ｣ 은 중산간괘 다음에 풍산점괘가 온 것을 다음과 같이 설명하고 있다 . 艮者는 止也니 物不可以終止라 故로 受之以漸하고 간자    지야   물불가이종지    고    수지이점 간(艮)이란 그침이니, 물건이 가히 끝까지 그치지는 못한다. 그러므로 점(漸)으로써 받고 간 ( 艮 ) 은 그치는 것이다 . 세상사의 모든 현상과 인간의 선정 ( 禪定 ) 도 하염없이 그쳐 있을 수만은 없다 . 그래서 차츰 나아간다는 풍산점 ( 風山漸 ) 괘를 간괘 ( 艮卦 ) 다음에 두었다 . 또한 앞의 중산간 ( 重山艮 ) 괘 육오효가 변하면 풍산점 ( 風山漸 ) 괘가 된다 . 중산간괘 육오효에 “ 六五 는 艮其輔 라 . 言有序 니 悔亡 하리라 ” 고 하여 , ‘ 말에 순서가 있어야 한다 ’ 고 하였다 . 그 순서는 풍산점 ( 風山漸 ) 으로 나타난다 .", "gwasa": "는 여자가 시집가는 것에 비유하고 있다 . 그리고 동물 가운데 질서와 차례를 대표하는 상징적인 동물이 기러기이니 , 효사에는 기러기가 자라나는 과정으로 묘사되고 있다 . 문명과 문화의 발전도 점진적으로 나아가야 한다 . 풍산점괘는 인류문명의 점진적인 발전을 묘사하고 있다 . 漸은 女歸 吉하니 利貞이니라. 점    여귀 길      이정 점(漸)은 여자가 시집감이 길하니, 바르게 함이 이롭다. 漸:차차 점·차례 점·나아갈 점·흐를 점·물들 점·적실 점·험할 참   歸:돌아갈 귀·시집갈 귀·마칠 귀 점차 나아가는 도 ( 道 ) 는 마치 여자가 시집가는 것처럼 예와 풍속에 맞게 나아가야 한다 . 예 ( 禮 ) 와 풍속 ( 風俗 ) 에 맞게 나아가는 데는 바르게 해야 길하다 . 풍산점 ( 風山漸 ) 괘와 다음에 나오는 뇌택귀매 ( 雷澤歸妹 ) 괘는 여자가 시집가는 것을 예 ( 例 ) 로 설명하고 있는데 , 점괘 ( 漸卦 ) 는 아름다운 절차와 예 ( 禮 ) 를 따라서 바르게 혼인하는 것이고 , 귀매괘 ( 歸妹卦 ) 는 혼탁한 세상에 바르지 못한 관계를 맺는 것으로 풀이된다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 漸之進也 女歸의 吉也라. 단왈 점지진야 여귀    길야 進得位하니 往有功也오 進以正하니 可以正邦也니 진득위       왕유공야   진이정       가이정방야 其位는 剛得中也라. 止而巽할새 動不窮也라. 기위    강득중야    지이손       동불궁야 단전에 말하였다. “점차 나아가는 것이 여자가 시집감의 길함이다. 나아가서 자리를 얻으니 가서 공이 있고, 나아감에 바름으로 하니 가히 나라를 바르게 하니, 그 자리는 강(剛)이 중(中)을 얻은 것이다. 그치고 겸손하기 때문에 움직여서 궁하지 않다.” 進:나아갈 진   邦:나라 방   巽:공손할 손 차츰차츰 예 ( 禮 ) 와 절도 ( 節度 ) 에 맞게 나아가는 것이 여자가 시집가는 바른 길이다 . 남녀가 만나 혼인을 하고 평생을 같이하는데 , 예와 절도가 없을 수 없다 . 점차 나아가서 자리를 얻으니 가서 해야 할 공이 있는 것이고 , 또한 나아가서 바르게 하니 나라를 바르게 할 수도 있다 . 이렇게 나라를 바르게 할 수 있는 자리는 외괘 구오로 강한 양 ( 陽 ) 이 중 ( 中 ) 을 얻었기 때문이다 . 괘덕으로 보면 내괘 간산 ( 艮山 ) ☶ 으로 그치고 또한 외괘 손풍 ( 巽風 ) ☴ 으로 겸손하기 때문에 , 움직여 나아가는데 궁함이 없다 . 그칠 줄 알고 겸손할 줄 알기 때문에 , 움직여도 궁색하지 않은 것이다 . 풍산점 ( 風山漸 ) 괘는 삼음삼양 ( 三陰三陽 ) 괘로 그 체 ( 體 ) 는 천지비 ( 天地否 ) 괘에 있다 . 위와 아래가 막혀 있는 비색한 상황에서 천지비괘의 구사 양 ( 陽 ) 과 육삼 음 ( 陰 ) 이 자리를 바꾸니 , 차츰차츰 비색함을 풀어나가는 상태가 된다 . 이것을 표현하고 있는 것이 “ 進得位 하니 往有功也 오 進以正 하니 可以正邦也 니 ” 라는 문장이다 . 천지비괘에서 육삼의 음이 사효로 나아가니 음 자리에 음으로 바른 자리를 얻게 되어 풍속을 착하게 하는 공이 있고 , 또한 나아가 바르게 하니 나라를 바르게 할 수 있는 것이다 .", "gwasangsa": "象曰 山上有木이 漸이니 君子 以하야 居賢德하야 善俗하나니라. 상왈 산상유목    점      군자 이       거현덕       선속 상전에 말하였다. “산 위에 나무가 있는 것이 점(漸)이니, 군자가 이를 본받아 어진 덕에 거해서 풍속을 착하게 한다.” 居:살 거·있을 거·집 거   賢:어질 현   俗:풍습 속·시속 속·속될 속· 바랄 속 내괘 간산 ( 艮山 ) ☶ 위에 손풍 ( 巽風 ) ☴ 의 나무 ( 陰木 ) 가 있는 것이 점괘 ( 漸卦 ) 이다 . 평지에서 높은 산으로 오르는 것과 , 한포기 싹에서 큰 나무를 이루는 것이 모두 차츰차츰 나아가는 도 ( 道 ) 이다 . 또한 내괘 간산 ☶ 으로 덕을 후하게 하고 외괘 손풍 ☴ 으로 아름다운 바람을 일으켜 , 사회를 맑게 한다 . 이렇게 군자는 풍산점 ( 風山漸 )", "hyosa": {"초효": "초육    홍점우간      소자 려       유언       무구 초육은 기러기가 물가에 나아가니, 어린 새(小子)가 위태해서 말이 있으나 허물이 없다. 鴻:큰 기러기 홍·클 홍   干:방패 간·구할 간·간여할 간·물가 간·천간 간 동물 가운데 가장 예 ( 禮 ) 와 절도 ( 節度 ) 가 있는 동물로는 기러기를 들 수 있다 . 그래서 점괘 ( 漸卦 ) 효사는 기러기를 예로 그 내용을 표현하고 있다 . 초효는 내괘 맨 아래에 있으니 기러기의 생애로 본다면 어린 기러기 ( 小子 ) 이다 . 내호괘로 감수 ( 坎水 ) ☵ 가 있고 초효가 변하면 이화 ( 離火 ) ☲ 가 되니 , 어린 기러기가 물가로 날아가려는 상이다 . 어린 기러기가 위험한 물가로 나아가니 위태로워서 조심하라는 말을 하게 되지만 , 기러기가 스스로의 생명력을 유지하기 위해 물가로 가려는 것은 자연한 본성이니 , 그 의리 ( 義理 ) 가 허물이 없다 . 인간으로 보면 , 간산 ( 艮山 ) ☶ 으로 집안에 거하여 가도 ( 家道 ) 를 익히던 처녀 ( 處女 ) 가 배우자 ( 配偶者 ) 를 찾아 밖으로 나아가는 것이다 . 집안에서 말이 있지만 , 그 의리는 허물이 없는 것이다 . 象曰 小子之厲나 義无咎也니라. 상왈 소자지려    의무구야 상전에 말하였다. “어린 기러기(小子)가 나아가서 위태로우나, 의리가 허물이 없다.” 六二는 鴻漸于磐이라. 飮食이 衎衎하니 吉하니라.", "이효": "육이    홍점우반       음식    간간       길 육이는 기러기가 반석에 나아간다. 음식이 즐거우니 길하다. 磐:너럭바위 반·넓을 반   飮:마실 음   衎:즐길 간   衎衎: 즐거운 모양 육이는 내괘에서 중정 ( 中正 ) 한 자리이다 . 기러기로 보면 잘 자라서 성숙한 상태이고 , 여자로 보면 가도 ( 家道 ) 를 잘 익혀 외괘 구오의 중정 ( 中正 ) 한 배우자를 만나서 정식으로 혼인하는 상태이다 . 기러기가 훨훨 날아서 넓고 큰 바위에 안전하게 나아가고 , 정숙한 여자가 중정 ( 中正 ) 한 배우자를 만나 혼인하여 반석 ( 磐 石 ) 같은 가정 ( 家庭 ) 을 꾸리는 것이다 . 혼인의 예 ( 禮 ) 를 올리니 , 맛있는 음식을 차려놓고 축하객과 함께 즐거운 잔치를 벌인다 . 육이가 변하면 지괘 ( 之卦 ) 가 중풍손 ( 重風巽 ) 괘로 된다 . 중풍손괘 구이효에는 “ 겸손함이 상 아래에 있으니 , 사 ( 史 ) 와 무 ( 巫 ) 를 씀이 많은 듯하면 길하고 허물이 없다 ( 九二 는 巽在牀下 니 用史巫紛若 하면 吉 코 无咎 리라 ) ” 고 하여 크게 잔치를 벌이는 것으로 묘사되고 있다 . 象曰 飮食衎衎은 不素飽也라. 상왈 음식간간    불소포야 상전에 말하였다. “음식이 즐거운 것은 헛되이 배부르고자 함이 아니다.” 素:흴 소·바탕 소·본디 소·한갓(헛되이) 소   飽:배부를 포· 만족할 포 육이가 음식을 차리고 즐거운 예 ( 禮 ) 를 올리는 것은 공연히 배부르고자 하는 것이 아니라 , 중정한 배우자를 만나 가정을 꾸리고 사회의 풍속을 아름답게 하기 위한 것이다 .", "삼효": "九三은 鴻漸于陸이니 夫征이면 不復하고 婦孕이라도 不育하야 凶하니 利禦寇하니라. 구삼    홍점우륙       부정      불복       부잉         불육       흉       이어구 구삼은 기러기가 뭍(육지)에 나아가니, 지아비가 가면 돌아오지 않고 지어미가 잉태하여도 기르지 않아서 흉하니, 도적을 막음이 이롭다. 陸:뭍 륙   夫:지아비 부   征:갈 정   婦:지어미 부   孕:아이밸 잉  育:기를 육   禦:막을 어   寇: 도적 구 구삼은 양 자리에 양으로 제자리에 있으나 , 중 ( 中 ) 에서 벗어나고 지나치게 강하여 망동 ( 妄動 ) 할 수 있다 . 기러기가 물가에서 반석 ( 磐 石 ) 으로 나아가고 , 반석에 있다가 육지 ( 陸地 ) 로 나아간다 . 그런데 기러기가 육지로 나아간다는 것은 또 다른 넓은 세상을 만나는 것이니 , 자기가 속해 있던 무리와 떨어질 수 있는 위험이 있다 . 자기의 무리를 떠나 다른 무리와 섞이게 되면 추하게 된다 . 마찬가지로 한 가정을 꾸리던 남편이 다른 데에 마음을 두고 돌아오지 않고 , 아내가 임신을 하여 잉태하더라도 기르지 않아서 흉하다 . 마치 기러기가 육지에 나아가 넓은 세상을 만나면 약육강식 ( 弱肉强食 ) 의 사슬고리에서 위험에 처하거나 불의의 유혹에 빠질 수 있듯이 , 사람도 새로운 상황에 처하여 자기의 본분을 망각하거나 유혹에 빠지는 위험이 도사리고 있다 . 그래서 도적을 막으면 이롭다고 하였다 . 象曰 夫征不復은 離群하야 醜也오 婦孕不育은 失其道也오 利用禦寇는 順相保也라. 상왈 부정불복    이군      추야    부잉불육    실기도야    이용어구    순상보야 상전에 말하였다. “지아비가 가서 돌아오지 않음은 무리를 떠나서 추한 것이고, 지어미가 잉태해서 기르지 않음은 그 도를 잃은 것이고, 도적을 막음이 이로움은 순하게 서로 돕는 것이다.” 離:떠날 리   醜:추할 추   保:지킬 보· 도울 보 한 지아비가 가정을 떠나 돌아오지 않으니 그 행세가 추할 것이고 , 한 지어미가 아이를 낳아 기르지 않으니 가도 ( 家道 ) 를 잃은 것이고 , 도적을 막음이 이롭다는 것은 위험과 유혹에 빠지지 않도록 마땅한 도리에 순하면서 서로가 격려하며 돕는 것을 말한다 . 六四는 鴻漸于木이니 或得其桷이면 无咎리라.", "사효": "육사    홍점우목      혹득기각       무구 육사는 기러기가 나무에 나아가니, 혹 평평한 가지를 얻으면 허물이 없을 것이다. 桷:서까래 각·가지 각(가로 뻗은 나뭇가지 ) 육사는 음 자리에 음으로 바른 자리에 있고 , 외괘 손풍 ( 巽風 ) ☴ 에 처하여 높은 나뭇가지에 앉는 격이다 . 기러기가 외괘 손풍 ☴ 의 나무에 나아가니 , 나무에 있는 가로 뻗은 평평한 가지를 얻어 앉으면 허물이 없다 . 인생과 사회 , 가정도 마찬가지이다 . 나무에 나아간다는 것은 자신의 활동무대가 되는 터전에 나아간다는 것이다 . 평평한 가지를 얻는다는 것은 자신의 의지 ( 意 志 ) 대로 운신 ( 運身 ) 을 할 수 있는 상태를 말한다 . 이렇게 자신의 역량을 편하게 발휘하기 위해서는 순하고 겸손한 덕이 필요하다 . 象曰 或得其桷은 順以巽也일새라. 상왈 혹득기각    순이손야 상전에 말하였다. “혹 그 평평한 가지를 얻음은 순하고 겸손하기 때문이다.”", "오효": "九五는 鴻漸于陵이니 婦 三歲를 不孕하나 終莫之勝이라 吉하리라. 구오    홍점우릉      부 삼세    불잉       종막지승       길 구오는 기러기가 언덕에 나아가니, 지어미가 3년을 잉태하지 못하나, 마침내 이기지 못한다. 길할 것이다. 陵:큰 언덕 릉   歲:해 세   莫:없을 막   勝:이길 승 구오는 외괘에서 중정 ( 中正 ) 한 자리이다 . 천하를 다스리고 사회를 착하고 아름답게 하는 주체이다 . 내괘에서 중정한 육이와도 잘 응하고 있다 . 마치 기러기가 높은 언덕에 올라 천하를 웅비 ( 雄飛 ) 하는 격이다 . 그런데 중정한 육이를 만나 결혼하여도 풍산점괘가 차츰차츰 나아가는 것이고 , 또한 점괘 ( 漸卦 ) 의 호괘가 화수미제 ( 火水未濟 ) 이니 오랜 동안 (3 년 ) 아이를 낳지 못한다 . 그러나 구오와 육이가 중정 ( 中正 ) 하기 때문에 그 뜻을 어느 누구도 이기지 못한다 . 즉 원하는 바를 이루니 길하다 . 象曰 終莫之勝吉은 得所願也라. 상왈 종막지승길    득소원야 상전에 말하였다. “마침내 이기지 못하여 길함은 원하는 바를 얻는 것이다.” 願:원할 원", "상효": "上九는 鴻漸于逵니 其羽 可用爲儀니 吉하니라. 상구    홍점우규    기우 가용위의   길 상구는 기러기가 큰 길(하늘)에 나아가니, 그 깃이 가히 모범이 되니 길하다. 逵:한길 규(아홉 군데로 통하는 길·대로)   羽:깃 우   儀:거동 의 드디어 기러기가 하늘의 큰 길 , 즉 창공 ( 蒼空 ) 으로 날아간다 . 기러기는 떼를 지어 날아오르는데 우두머리를 중심으로 종횡 ( 縱橫 ) 으로 줄을 지어 날아가니 , 질서와 예의 상징이 된다 . 사회의 아름다운 풍속은 질서 ( 秩序 ) 와 예 ( 禮 ) 에 있다 . 가정의 도 , 국가의 도가 다 마찬가지이다 . 상구는 차츰차츰 나아가 드디어 또 다른 세계로 향한다 . 象曰 其羽可用爲儀吉은 不可亂也일새라. 상왈 기우가용위의길    불가란야 상전에 말하였다. “그 깃이 가히 모범이 되어 길함은 어지럽지 않기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 560 ∼568 쪽 ."}}, {"num": 54, "ko": "뇌택귀매", "hanja": "雷澤歸妹", "lines": [1, 1, 0, 1, 0, 0], "url": "https://soosanss.tistory.com/206", "post_id": 206, "gwaui": "만상이 변화하여 무상한 현실세계에서 살고 있으면서도 , 인간은 진정한 영원성을 추구하기보다는 현실세계의 영원함을 추구하는 오류를 범하고 있다 . 현실세계는 항상 변하고 있다 . 또한 동등한 사회적 관계가 있는 반면에 불평등한 사회적 관계도 있다 . 이러한 모든 상황에 직면하여 대처해 나가는 군자가 되어야 한다 ( 永終知敝 ).", "gwamyung": "외괘가 진뢰 ( 震雷 ) ☳ , 내괘가 태택 ( 兌澤 ) ☱ 으로 이루어진 괘를 ‘ 귀매 ( 歸妹 ) ’ 라 한다 . 글자 그대로 보면 누이동생을 시집보낸다는 뜻이다 . 앞서 살펴보았듯이 점괘 ( 漸卦 ) 와 귀매괘 ( 歸妹卦 ) 는 여자가 혼인하는 것으로 그 뜻을 취하였는데 , 점괘 ( 漸卦 ) 는 정상적인 부부의 예로 설명한 것이라면 , 귀매괘 ( 歸妹卦 ) 는 비정상적인 남녀의 만남을 뜻한다 . 바른 예로 만나면 가히 모범이 되지만 , 비정상적인 만남은 모든 상황을 어렵게 하고 쉽게 헤어지고 쉽게 떨어진다 . 정자 ( 程子 ) 는 ｢ 역전 ( 易傳 ) ｣ 에서 택산함 ( 澤山咸 ) 괘와 뇌풍항 ( 雷風恒 ) 괘 , 풍산점 ( 風山漸 ) 괘와 뇌택귀매 ( 雷澤歸妹 ) 괘를 비교하면서 다음과 같이 설명하고 있다 . 咸恒은 夫婦之道요 漸歸妹는 女歸之義라. 咸與歸妹는 男女之情也니 咸은 止而說하고 歸妹는 動而說하니 皆以說也요 恒與漸은 夫婦之義也니 恒은 巽而動하고 漸은 止而巽하니 皆以巽順也니 男女之道와 夫婦之義 備於是矣라. ‘함괘’와 ‘항괘’는 부부의 도이고, ‘점괘’와 ‘귀매괘’는 여자가 시집가는 뜻이다. ‘함괘’와 ‘귀매괘’는 남녀의 정이니, ‘함괘’는 그쳐서 기뻐하고 ‘귀매괘’는 기뻐서 움직이므로 다 기뻐하는 것이고, ‘항괘’와 ‘점괘’는 부부의 뜻이니, ‘항괘’는 공손해서 움직이고 ‘점괘’는 그쳐서 공손하므로 다 손순한 것이다. 남녀의 도와 부부의 의리가 여기에 갖추어져 있다. 뇌택귀매괘는 풍산점괘와 마찬가지로 삼음삼양 ( 三陰三陽 ) 괘로 , 그 체는 지천태 ( 地天泰 ) 괘에 있다 . 지천태괘 구삼효와 육사효가 서로 자리를 바꾸게 되니 뇌택귀매괘가 되는데 , 뇌택귀매 육삼효는 양 자리에 음이 있어 부당하고 구사효 역시 음 자리에 양으로 있으니 부당하다 . 천지기운이 평안한 지천태괘에서 중간에 있어 인간사회를 의미하는 삼효와 사효가 자리를 바꾸면서 모두 자리가 부당하게 되니 , 모든 상황이 부적절하게 되는 것이다 .", "seogwa": "｢ 전 ｣ 은 풍산점괘 다음에 뇌택귀매가 온 것을 다음과 같이 설명하고 있다 . 漸者는 進也니 進必有所歸라 故로 受之以歸妹하고 점자    진야   진필유소귀    고    수지이귀매 점(漸)이라는 것은 나아감이니, 나아가면 반드시 돌아가는 바가 있다. 그러므로 귀매(歸妹)로써 받고 점 ( 漸 ) 은 나아가는 것이다 . 모든 상황이 나아가기만 할 수 없고 , 나아가기만 하다보면 반드시 다시 돌아가게 된다 . 그래서 돌아간다는 뜻을 취하여 누이가 시집간다는 귀매괘 ( 歸妹卦 ) 를 점괘 ( 漸卦 ) 다음에 두었다 .", "gwasa": "歸妹는 征하면 凶하니 无攸利하니라. 귀매   정       흉       무유리 귀매(歸妹)는 가면 흉하니, 이로울 바가 없다. 歸:돌아갈 귀·시집갈 귀   妹:누이 매   攸: 바 유 귀매 ( 歸妹 ) 는 내괘가 태택 ( 兌澤 ) ☱ 으로 기뻐하면서 , 외괘 진뢰 ( 震雷 ) ☳ 로 움직여 가는 상이다 . 풍산점 ( 風山漸 ) 괘와 비교해볼 때 , 점괘 ( 漸卦 ) 는 가만히 그쳐서 겸손하게 차츰 나아가는 상이지만 , 귀매괘 ( 歸妹卦 ) 는 기뻐함에 빠져서 망령되게 움직여 가는 상이다 . 중도 ( 中道 ) 를 잃고 바름을 잃었으니 , 가면 좋은 결과를 얻을 수 없고 흉한 상황만 있을 뿐이다 . 또한 초효와 상효를 제외하고 이효부터 오효까지 모든 자리가 부당하니 , 적절하지 못한 상황에서 기뻐하기만 하며 망령되게 움직여 가는 상이다 . 그러니 이로울 바가 없다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 歸妹는 天地之大義也니 단왈 귀매    천지지대의야 天地不交而萬物이 不興하나니 歸妹는 人之終始也라. 천지불교이만물    불흥         귀매    인지종시야 說以動하야 所歸 妹也니 征凶은 位不當也오 열이동       소귀 매야    정흉 위부당야 无攸利는 柔承剛也일새라. 무유리    유승강야 단전에 말하였다. “귀매(歸妹)는 천지의 큰 뜻이니, 천지가 사귀지 않으면 만물이 흥하지 않으니, 귀매(歸妹)는 사람의 마침과 시작이다. 기뻐함으로 움직여서 시집가는 바가 누이니, ‘가면 흉한 것’은 자리가 마땅하지 않은 것이고, ‘이로울 바가 없는 것’은 유(柔)가 강(剛)을 탔기 때문이다.” 義:뜻 의·옳을 의   交:사귈 교   興:일어날 흥   終:마칠 종   始:비롯할 시  說:기쁠 열   乘: 탈 승 귀매 ( 歸妹 ) 는 천지의 큰 뜻이다 . 천지가 항상 바르게 있는 것만은 아니다 . 통할 때도 있고 막힐 때도 있다 . 천지 ( 天地 ) 가 서로 사귀지 못하면 만물이 화생하지 못하듯이 , 인간사회의 모든 상황이 부당하여 제자리에 있지 못하고 이로움만 보고 배회하는 귀매괘는 사람의 마침과 비롯함이 된다 . 불합리한 인간사회가 종지부 ( 終止符 ) 를 찍고 새로운 사회로 변해야 하는 상황이다 . 괘덕으로 볼 때 내괘 태택 ( 兌澤 ) ☱ 으로 기뻐하면서 외괘 진뢰 ( 震雷 ) ☳ 로 움직이니 , 중도 ( 中道 ) 를 잃고 이로움만 앞세우거나 진정한 사랑보다는 말초적인 쾌락 ( 快樂 ) 만 추구하게 된다 . 남녀관계로 보면 , 정당한 부부로서의 만남이 아니라 첩 ( 妾 ) 으로 시집가거나 비정상적인 불륜관계 ( 不倫關係 ) 를 맺는 것이다 . 가서 흉하다는 것은 이효부터 오효까지의 모든 자리가 부당하기 때문이다 . ‘ 이로울 바가 없다 ’ 는 것은 귀매괘 각 효의 관계를 보건대 , 내괘 초구·", "gwasangsa": "象曰 澤上有雷 歸妹니 君子 以하야 永終하야 知敝하나니라. 상왈 택상유뢰 귀매    군자 이       영종      지폐 상전에 말하였다. “연못 위에 우레가 있는 것이 귀매(歸妹)니, 군자가 이를 본받아 길이 마쳐서 떨어짐을 안다.” 永:길 영   弊:해질 폐·버릴 폐· 피폐할 폐 내괘 태택 ( 兌澤 ) ☱ 의 연못 위에 진뢰 ( 震雷 ) ☳ 의 우레가 있는 것이 귀매괘이다 . 그저 마냥 기쁨만 추구하면서 움직이니 , 인간의 본성에서 벗어나면 끝내 황망히 인생을 마감하게 되고 이슬로 사라진다 . 또한 연못 위에 우레가 진동하니 , 연못의 평화로운 질서가 깨지고 큰 혼란에 빠지게 된다 . 군자는 이러한 기운의 양상을 보고 군자로서의 덕 ( 德 ) 으로 길이 마치고 , 질서가 어지럽고 혼탁해지면 사회가 무너지고 인생이 피폐해짐을 아는 것이다 . 효사 및 효상사", "hyosa": {"초효": "初九는 歸妹以娣니 跛能履라. 征이면 吉하리라. 초구    귀매이제    파능리    정       길 초구는 누이동생을 시집보내는데 제첩(娣妾)으로 보내니, 절름발이가 능히 밟는다. 가면 길할 것이다. 娣:여동생 제(손아랫동서)   跛:절름발이 파   履:밟을 리   征: 갈 정 초구는 양 자리에 양으로 있어 바르나 중 ( 中 ) 을 얻지 못하였다 . 귀매괘는 전체적인 양상이 부당한 상황이다 . 시집가는 것으로 보자면 누이동생을 시집보내는데 정실 ( 正室 ) 이 아닌 첩 ( 妾 ) 으로 보내는 것이다 . 정식 신부 ( 新婦 ) 에 딸려 온 여자를 제질 ( 娣姪 ) 이라 하고 , 첩을 제첩 ( 娣妾 ) 이라고 한다 . 이러한 상황에서는 정상적인 능력을 가지고 있더라도 마치 절름발이가 걷는 것처럼 부족한 듯하게 처신하면 , 첩으로 시집가더라도 길하다 . 즉 전체적으로 부당한 상황에서 , 초구는 비록 바르지 못한 상황에 처하여 있더라도 , 그 상황에서 잘 살아가려면 마치 절름발이처럼 부족한 듯 행세하여야 한다는 것이다 . 그렇게 해야 항상하게 자신을 지킬 수 있고 부당한 상황에서도 잘 이어갈 수 있다 . 象曰 歸妹以娣나 以恒也오 跛能履吉은 相承也일새라. 상왈 귀매이제   이항야    파능리길    상승야 상전에 말하였다. “누이동생을 제첩으로 시집보내나 항상하고, 절름발이가 능히 밟아 길함은 서로 잇기 때문이다.” 제첩 ( 娣妾 ) 살이를 하는 부당한 상황에서도 항상함을 유지하여 몸을 보전하여야 하며 , 부족한 듯 때로는 바보처럼 처신을 하여야 정실 ( 正室· 신부 ) 과 측실 ( 側室· 첩 ) 이 서로 뜻을 잘 이을 수 있다 . 즉 부당한 상황을 감내해야 함을 말한다 .", "이효": "구이의 양 ( 陽 ) 위에 육삼의 음 ( 陰 ) 이 있고 , 외괘 구사효의 양 ( 陽 ) 위에 오효· 상효의 음 ( 陰 ) 이 있으니 , 마치 아래에 있어야 할 음 ( 陰 ) 이 오히려 양 ( 陽 ) 을 깔고 타고 있는 격이기 때문이다 . 사회구조와 상황의 기본 틀이 본질에서 크게 벗어나 있음을 말한다 . 九二는 眇能視니 利幽人之貞하니라. 구이    묘능시    이유인지정 구이는 애꾸눈(소경)이 능히 보니, 유인(幽人)의 바름이 이롭다. 眇:애꾸눈 묘   視:볼 시   幽:그윽할 유 구이는 내괘의 중을 얻은 자리이다 . 그러나 음 자리에 양으로 자리가 부당하다 . 내호괘가 이화 ( 離火 ) ☲ 로 밝은 눈의 상이나 내괘가 태택 ( 兌澤 ) ☱ 이니 상하여 애꾸눈 ( 소경 ) 이 된 상이다 . 이는 세상이 온통 부당함에 구이로서는 마치 애꾸눈 ( 소경 ) 처럼 잘 보지 못하는 것처럼 행세하고 , 그저 속세 ( 俗世 ) 를 떠나 도 ( 道 ) 를 닦는 사람처럼 바르게 하면 이롭다는 뜻이다 . 象曰 利幽人之貞은 未變常也라. 상왈 이유인지정    미변상야 상전에 말하였다. “유인(幽人)의 바름이 이로움은 떳떳함을 변치 않는 것이다.” 六三은 歸妹以須니 反歸以娣니라.", "삼효": "육삼   귀매이수    반귀이제 육삼은 누이동생을 시집보내는데 기다림으로써 하니, 도리어 제첩(娣妾)으로 시집보낸다. 須:수염 수·기다릴 수·잠깐 수·모름지기 수 육삼은 양 자리에 음으로 있어 자리가 부당하고 중도 얻지 못한 상태이다 . 내호괘가 이화 ( 離火 ) ☲ 로 용모가 어여쁜 누이동생을 시집보내는데 , 부당한 상황임에도 불구하고 당치않게 바른 정실 ( 正室 ) 로 시집가려고 기다리다가 , 결국은 도리어 첩 ( 妾 ) 으로 시집을 보내는 격이다 . 象曰 歸妹以須는 未當也일새라. 상왈 귀매이수    미당야 상전에 말하였다. “누이동생을 시집보내는 데 기다리는 것은 마땅하지 않기 때문이다.”", "사효": "九四는 歸妹愆期니 遲歸 有時니라. 구사    귀매건기    지귀 유시 구사는 누이동생을 시집보내는데 기약이 어그러지니, 더디게 시집감이 때가 있다. 愆:허물 건·어그러질 건   期:기약할 기   遲:더딜 지 구사는 외괘 진뢰 ( 震雷 ) ☳ 의 첫 자리에 거하고 있는데 , 음 자리에 양으로 부당하고 중도 얻지 못하였다 . 우레처럼 빨리 누이동생을 시집보내려고 하지만 , 내괘가 태택 ( 兌澤 ) ☱ 으로 훼손당하고 외호괘가 감수 ( 坎水 ) ☵ 로 어두운 가운데 있으니 기약 ( 期約 ) 이 어그러지고 지켜지지 않는다 . 구사가 변하면 외괘가 곤지 ( 坤地 ) ☷ 로 되고 , 지괘 ( 之卦 ) 가 지택림 ( 地澤臨 ) 괘로 되니 , 결국 곤지 ( 坤地 ) ☷ 의 순한 마음으로 기다리다가 때에 임 ( 臨 ) 하여 더디게 시집보내게 된다 . 象曰 愆期之志는 有待而行也라. 상왈 건기지지    유대이행야 상전에 말하였다. “기약이 어그러지는 뜻은 기다림을 두어서 행하는 것이다.” 待:기다릴 대 이는 시집가는 데에도 때가 있기 때문에 기다림을 두어서 가야 함을 말한다 . 六五는 帝乙歸妹니 其君之袂 不如其娣之袂 良하니 月幾望이면 吉하리라.", "오효": "육오    제을귀매    기군지몌 불여기제지몌 양       월기망      길 육오는 제을(帝乙)이 누이동생을 시집보내니, 그 군(君)의 옷소매가 그 누이의 소매가 좋은 것만 같지 못하니, 달이 거의 보름이면 길할 것이다. 袂:소매 몌   良:좋을 량   幾:거의 기   望:바랄 망·보름 망   幾望:14일 달 육오는 외괘의 중 ( 中 ) 을 얻은 자리로 , 여자가 시집가는 귀매괘의 정황에서는 사회적으로 왕의 누이동생에 해당한다 . 제을 ( 帝乙 ) 은 은 ( 殷 ) 나라 말기 왕으로 상경 ( 上經 ) 에서 살펴 본 지천태 ( 地天泰 ) 괘 육오 효사에서도 등장하는 인물이다 ( 地天泰卦 六五 는 帝乙歸妹 니 以祉 며 元吉 이리라 ). 제을 왕이 누이를 지방의 제후인 내괘 구이에게 시집보내는 것이니 , 남편될 자 ( 君 ) 의 옷소매가 황실 ( 皇室 ) 에 사는 누이의 옷소매보다 좋지 못할 것은 당연하다 . 천자 ( 天子 ) 가 제후 ( 諸侯 ) 에게 귀한 누이를 시집보내는 것이다 . 그러나 누이로서는 거만함과 도도함을 버리고 , 마치 보름에 거의 이른 달처럼 조금 부족한 듯이 겸손하게 처신하면 길하다는 뜻이다 . 象曰 帝乙歸妹不如其娣之袂良也는 其位在中하야 以貴行也라. 상왈 제을귀매불여기제지몌양야    기위재중      이귀행야 상전에 말하였다. “제을(帝乙)이 누이동생을 시집보내는데 그 누이의 소매가 좋은 것만 같지 못한 것은 그 자리가 중에 있어 귀함으로써 행하는 것이다.” 上六은 女 承筐无實이라. 士 刲羊无血이니 无攸利하니라.", "상효": "상육    녀 승광무실       사 규양무혈       무유리 상육은 여자가 광주리를 이는데 실물이 없다. 선비가 양을 찔러도 피가 없으니, 이로울 바가 없다. 承:받들 승·이을 승   筐:광주리 광   士:선비 사   刲:벨 규·찌를 규   羊: 양 양 모든 상황이 비정상적인 귀매괘 ( 歸妹卦 ) 의 극에 처한 상육은 아무 소득이 없는 자리이다 . 여자로 보면 , 집안의 제사 ( 祭祀 ) 를 잘 받들어 가풍 ( 家風 ) 을 이어가야 하는데 , 제사를 지내려고 광주리를 이고 있지만 정작 그 속에 아무것도 없다 . 또한 남자 즉 선비로 보면 , 제사를 지내려고 희생 ( 犧 牲 ) 을 바치고자 양 ( 羊 ) 을 칼로 찔러도 피가 나오지 않으니 , 아무리해도 좋은 결과를 볼 수가 없다 . 즉 , 이로울 바가 없다 . 상육이 변하면 지괘 ( 之卦 ) 가 어긋난다는 화택규 ( 火 澤 睽 ) 괘가 된다 . 象曰 上六无實은 承虛筐也라. 상왈 상륙무실    승허광야 상전에 말하였다. “상육이 실물이 없음은 빈 광주리를 이은 것이다.” 虛:빌 허 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 569 ∼576 쪽 ."}}, {"num": 55, "ko": "뇌화풍", "hanja": "雷火豐", "lines": [1, 0, 1, 1, 0, 0], "url": "https://soosanss.tistory.com/207", "post_id": 207, "gwaui": "안으로는 공경하는 마음과 밖으로는 의로움이 겸비될 때 진정한 덕 ( 德 ) 으로 세상을 교화할 수 있다 . 하늘도 만물을 어진 덕으로 생화하지만 숙살지기로 결실을 거두듯이 , 국가를 유지하고 사회의 원만한 질서를 위해서는 때로는 엄격한 징벌이 필요하다 ( 折獄致刑 ).", "gwamyung": "외괘가 진뢰 ( 震雷 ) ☳ , 내괘가 이화 ( 離火 ) ☲ 로 이루어진 괘를 ‘ 풍 ( 豐 ) ’ 이라 한다 . 내괘는 불이요 , 외괘는 우레이다 . 뇌화풍 ( 雷火 豐 ) 괘와 다음의 화산려 ( 火山旅 ) 괘는 상경 ( 上經 ) 의 화뢰서합 ( 火雷 噬嗑 ) 괘· 산화비 ( 山火賁 ) 괘와 더불어 형벌 ( 刑罰 ) 을 의미한다 . 특히 화뢰서합괘와 뇌화풍괘는 형벌의 기본원칙을 정하고 있다 . 즉 화뢰서합괘에서는 ‘ 벌을 밝히고 법을 제정하고 ( 明罰勅法 ) ’ , 뇌화풍괘에서는 ‘ 옥을 판단하고 형벌을 이루는 ( 折獄致刑 ) ’ 것이다 . 뇌화풍괘는 형벌을 엄하게 집행하는 괘이다 . 뇌화풍괘와 화산려괘는 형벌과 관계되어 있고 , 또한 그 체는 중화리 ( 重火離 ) 괘에 있다 . 상경 택풍대과 ( 澤風大過 ) 의 시대에는 재앙이 있게 되는데 , 그 대표적인 재앙이 중수감 ( 重水坎 ) 의 물과 중화리 ( 重火離 ) 의 불이다 . 중화리괘 상효가 변하면 뇌화풍괘가 되고 중화리괘 초효가 변하면 화산려가 된다 . 또한 중화리괘 초효와 상효가 함께 변한 뇌산소과 ( 雷山小過 ) 괘 역시 중화리괘와 관련이 있다 . 중화리괘 , 뇌화풍괘 , 화산려괘 , 뇌산소과괘의 호괘 ( 互卦 ) 가 모두 택풍대과괘이다 .", "seogwa": "｢ 전 ｣ 은 뇌택귀매괘 다음에 뇌화풍괘가 온 것을 다음과 같이 설명하고 있다 . 得其所歸者 必大라 故로 受之以豐하고 득기소귀자 필대    고    수지이풍 그 돌아갈 바를 얻은 자는 반드시 커진다. 그러므로 풍(豐)으로써 받고 누이가 시집간다는 뇌택귀매 ( 雷澤歸妹 ) 괘에서 돌아갈 바를 얻게 되면 , 그 자리에서 커지게 된다 . 그래서 풍대 ( 豊大 ) 하다는 풍괘 ( 豐 卦 ) 를 다음에 둔 것이다 . ｢ 전 ( 序卦傳 ) ｣ 은 괘명 ( 卦名 ) 을 중심으로 그 의미를 순서대로 전달하고자 풀이하고 있다 . 그야말로 괘의 순서를 이해하는데 있어서는 도움이 되지만 , 본래의 의미와 다소 거리가 있는 설명이 있는데 바로 이 부분이 대표적이다 . 원리적으로 보면 , 뇌택귀매괘는 모든 사회현상이 매우 부당한 상황을 의미하니 , 이 혼란의 극치에 이르러 인간은 명 ( 命 ) 을 마치고 사라지게 됨을 알아야 한다고 경계한 것이다 ( 永終 知 敝 ). 그러한 귀매괘 다음에는 이른바 하늘의 재앙 즉 큰 형벌이 이른다 . 극도의 혼란을 징계하는 형벌은 하늘의 큰 형벌이다 . 이것은 인간이 정한 세속적 형벌과는 다르다 . 뇌화풍괘는 《 주역》 55 번째에 있다 . 55 수는 하도 ( 河圖 ) 수 ( 數 ) 의 총합이기도 하다 . ｢ 계사상전 ｣ 제 9 장은 다음과 같이 하도의 원리를 설명하고 있다 . 天一 地二 天三 地四 天五 地六 天七 地八 天九 地十이니 天數 五오 地數 五니 五位相得하며 而各有合하니 天數 二十有五오 地數 三十이라. 凡天地之數 五十有五니 此 所以成變化하며 而行鬼神也라. 하늘 하나, 땅 둘, 하늘 셋, 땅 넷, 하늘 다섯, 땅 여섯, 하늘 일곱, 땅 여덟, 하늘 아홉, 땅 열이니, 하늘 수가 다섯이요, 땅의 수가 다섯이니, 다섯 자리가 서로 얻으며 각각 합함이 있으니, 하늘 수는 25요, 땅의 수는 30이다. 무릇 천지의 수가 55니, 이것이 변화를 이루며 귀신을 행한다 .", "gwasa": "豐은 亨하니 王이아 假之하나니 勿憂홀전 宜日中이니라. 풍    형       왕      격지          물우       의일중 풍(豐)은 형통하니 왕이 이르니 근심치 말 것이니 마땅히 해가 가운데이다. 豐:풍성할 풍   假:이를 격   憂:근심할 우   宜: 마땅할 의 풍 ( 豐 ) 은 형통하다 . 지상 ( 地上 ) 에 만물이 풍대 ( 豊大 ) 하여 인간이 살기 좋기 때문에 형통하다는 뜻이 아니고 , 우레와 불로 하늘의 심판이 있으니 인간사회가 바르게 될 것이기 때문에 형통한 것이다 . 인간사회를 징벌하기 위해 왕 ( 王 ) 이 이르니 , 인간으로서는 근심할 필요가 없다 . 근심한다고 회피될 상황이 아니기 때문이다 . 물질문명이 풍대해지고 정신문명이 피폐해진 시대이니 , 인간의 잘못으로 인한 하늘의 징벌이 있기 때문이다 . 해가 중천 ( 中天 ) 에 떠 있으니 , 인간 위주의 물질문명이 곧 기울게 된다 . 왕은 어디에서 오는가 ? 선천을 의미하는 상경의 마지막 괘인 중화리 ( 重火離 ) 괘 상효가 변하면 뇌화풍 ( 雷火 豐 ) 괘가 되는데 , 중화리괘 상구효사에는 “ 왕이 나가서 치면 아름다움이 있을 것이니 , 머리를 끊고 얻는 것이 그 무리가 아니면 허물이 없을 것이다 ” ( 上 九 는 王用出征 이면 有嘉 니 折首 코 獲匪其醜 면 无咎 리라 ) 라고 했다 . 깊이 음미해볼 내용이다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 豐은 大也니 明以動이라 故로 豐이니 단왈 풍    대야    명이동      고    풍 王假之는 尙大也오 勿憂宜日中은 宜照天下也라. 왕격지    상대야    물우의일중   의조천하야 日中則昃하며 月盈則食하나니 天地盈虛도 與時消息이온 일중즉측       월영즉식          천지영허   여시소식 而況於人乎며 況於鬼神乎여. 이황어인호    황어귀신호 단전에 말하였다. “풍(豐)은 큰 것이니, 밝음으로써 움직인다. 그러므로 풍(豐)이니, ‘왕이 이른다’는 것은 숭상함이 큼이요, ‘근심하지 말 것이니 마땅히 해가 가운데이다’는 것은 마땅히 천하를 비추는 것이다. 해가 가운데하면 기울어지며, 달이 차면 먹히니, 천지가 차고 비는 것도 때로 더불어 줄고 불어나는데, 하물며 사람이며 하물며 귀신이랴！” 尙:숭상할 상   照:비출 조   昃:기울 측   盈:찰 영  食:먹을 식·지울 식·밥 사·기를 사 풍 ( 豐 ) 은 큰 것이다 . 내괘 이화 ( 離火 ) ☲ 로 밝게 하여 외괘 진뢰 ( 震 雷 ) ☳ 로 움직이니 풍대 ( 豊大 ) 한 것이다 . ‘ 왕이 이른다 ’ 는 것은 천하를 다스리는 왕으로서 숭상하는 것이 크다는 뜻이다 . ‘ 근심치 말고 마땅히 일중 ( 日中 ) ’ 이라는 것은 마땅히 천하를 밝게 비추기 위한 것이다 . 해가 중천에 뜨면 곧 기울어지고 달이 보름이 되면 곧 먹혀들어가듯이 , 천지가 차고 비는 것도 다 때와 더불어 줄어들고 불어나는데 , 하물며 인간사회며 , 하물며 귀신이랴 ！ 인간사회나 귀신이나 다 천지이치와 같다는 말이다 . “ 而況於人乎 며 況於鬼神乎 여 ” 라는 내용은 중천건 ( 重天乾 ) 괘 구오효사를 설명한 ｢ 문언전 ( 文言傳 ) ｣ 에 나온바 있다 . 중천건괘 구오효와 뇌화풍괘가 또한 밀접한 관련이 있음을 알 수 있다 . 다시 한번 깊이 음미해볼 내용이다 . 夫大人者는 與天地合其德하며 與日月合其明하며 與四時合其序하며 與鬼神合其吉凶하야 先天而天弗違하며 後天而奉天時하나니 天且弗違온 而況於人乎며 況於鬼神乎여. 무릇 대인은 천지와 더불어 그 덕을 합하며, 일월과 더불어 그 밝음을 합하며, 사시와 더불어 그 차례를 합하며, 귀신과 더불어 그 길흉을 합해서, 하늘보다 먼저 해도 하늘이 어기지 않으며, 하늘보다 뒤에 해도 하늘을 받드니, 하늘도 또한 어기지 않는데, 하물며 사람이며, 하물며 귀신이랴！", "gwasangsa": "象曰 雷電皆至 豐이니 君子 以하야 折獄致刑하나니라. 상왈 뇌전개지 풍      군자 이       절옥치형 상전에 말하였다. “우레와 번개가 다 이르는 것이 풍(豐)이니, 군자가 이를 본받아 옥(獄)을 판결하고 형벌을 이룬다.” 雷:우뢰 뢰   電:번개 전   皆:다 개   折:꺾을 절·결단할 절   獄:옥 옥 致:이를 치·이룰 치·다할 치·보낼 치·맡길 치·그만둘 치   刑:형벌 형 외괘 우레 ☳ 와 내괘 번개 ☲ 가 한꺼번에 다 이르는 것이 풍 ( 豐 ) 이다 . 이러한 기운의 양상을 보고 군자는 옥사 ( 獄事 ) 를 판결하고 형벌을 이룬다 . 즉 형벌을 엄하게 집행하는 것을 말한다 . 상경의 화뢰서합 ( 火雷 噬嗑 ) 괘는 죄형법정주의의 대원칙을 밝힌 것이라면 , 뇌화풍괘는 엄격한 형벌집행을 뜻한다 . 화뢰서합괘의 괘상전과 비교해 보자 . 火雷噬嗑卦 象曰 雷電이 噬嗑이니 先王이 以하야 明罰勅法하니라. 상전에 말하였다. “우레와 번개가 서합이니, 선왕이 이를 본받아 벌을 밝히고 법을 제정하였다.” ◈ 뇌화풍괘의 효사 ( 爻辭 ) 의 내용은 매우 난해 ( 難解 ) 하다 . 평상시의 내용이 아니기 때문에 , 마치 기독교 《 성경》 의 ｢ 요한계시록 ｣ 과 같은 신비적인 해석을 할 수밖에 없다 . 또한 뇌화풍괘의 각 효가 변한 지괘 ( 之卦 ) 는 모두가 큰 변화나 재앙 ( 災殃 ) 과 관련되어 있어 , 뇌화풍괘에 깊은 의미가 있음을 알 수 있다 . 효사 및 효상사", "hyosa": {"초효": "初九는 遇其配主호대 雖旬이나 无咎하니 往하면 有尙이리라. 초구    우기배주      수순       무구       왕       유상 초구는 그 짝이 되는 주인을 만나되, 비록 평등하게 하나 허물이 없으니, 가면 숭상함이 있을 것이다. 遇:만날 우   配:짝 배   雖:비록 수   旬:열흘 순·고를 순  尙:숭상할 상 초구는 일반 서민 ( 庶民 ) 의 자리이다 . 뇌화풍의 대변혁기 ( 大變革期 ) 에는 그동안 인간의 관점에서 형성되어 왔던 모든 위계질서 ( 位階秩序 ) 가 달라진다 . 마치 신 ( 神 ) 앞에서 모든 인간은 평등 ( 平等 ) 한 것과 같다 . 죄 없는 백성으로서는 하늘의 심판이 이루어지는 풍괘 ( 豐卦 ) 의 상황에서 백성을 구원해 줄 수 있는 주인 ( 配主 ) 을 만나 비록 과거의 처지가 다르더라도 이에 연연하지 않고 평등하게 대하면 허물이 없다 . 같은 인간이라면 인간 위에 군림 ( 君臨 ) 하는 인간은 없다 . 이렇게 나아가면 천성 ( 天性 ) 을 회복하여 숭상함이 있다 . 평등을 지나쳐 인간 위에 군림하고자 하면 재앙이 된다 . 효의 자리로 볼 때 , 초구의 짝은 구사가 된다 . 초구는 아래에 있으니 위 ( 位 ) 는 낮으나 양 자리에 양으로 제자리에 있고 , 초구와 구사는 이래저래 평등하다 . 우레와 번개가 함께 이르는 것이 풍괘이니 , 초구와 구사가 함께 만나 풍괘의 의의를 구현하는 것이다 . 象曰 雖旬无咎니 過旬이면 災也리라. 상왈 수순무구    과순       재야 상전에 말하였다. “비록 평등하게 하면 허물이 없으니, 평등함을 지나치면 재앙이 될 것이다.” 六二는 豊其蔀라. 日中見斗니 往하면 得疑疾하리니 有孚發若하면 吉하리라. 초구 ) 을 만나면 길하게 된다 . 초구와 구사는 뇌화풍괘에서 서로 만나 큰 일을 해야 할 상황에 있다 . 초효와 사효가 함께 변하면 지괘 ( 之 卦 ) 가 지산겸 ( 地山謙 ) 괘가 되는데 , 온갖 욕심을 버리고 본성을 찾아 겸손하고 겸손하면 길하다는 뜻으로 볼 수도 있다 . 또한 뇌화풍괘의 구사효는 괘변 ( 卦變 ) 을 나타내는 상징적인 의미가 있다 .", "이효": "육이    풍기부    일중견두    왕       득의질         유부발약       길 육이는 그 포장이 풍성하다. 한 낮에 두수(斗宿)를 보니, 가면 의심의 병을 얻을 것이니, 믿음을 두어 발하는듯하면 길할 것이다. 蔀:차양 부·덮개 부·일흔여섯해 부   斗:말 두·별이름 두    疑:의심할 의 육이는 내괘 이화 ( 離火 ) ☲ 에서 중정한 자리에 있다 . 극도로 문명한 풍괘 ( 豐 卦 ) 에서 이화 ( 離火 ) ☲ 는 포장 ( 겉치레 ) 이 풍성한 상태이다 . 이는 인간이 쌓아 온 물질문명이 극에 이른 상태를 말한다 . 이러한 때에 한낮에 동북방에 있는 두성 ( 斗星 ) 을 본다 . 두성은 28 수 가운데 북방칠수 ( 北方七宿 ) 의 하나이다 . 한낮에 별을 본다는 것은 천지가 크게 변하는 것을 말한다 . 이러한 큰 변화가 일어나면 대부분의 인간은 두려움과 공포에 꼼짝하지 못하게 되는데 , 이러한 때에 가면 인간들로부터 의심과 질투의 병을 얻게 된다 . 그러나 믿음을 두고 뜻을 발하면 모든 대중이 육이의 뜻을 따르게 되니 길하다 . 또한 형벌집행 ( 刑罰執行 ) 의 의미로 보면 , 깜깜한 형무소에 갇혀 있어 한낮에도 별을 보는 듯하니 , 가면 같은 형무소에 있는 죄인들로부터 의심의 병을 얻게 되지만 믿음을 두고 뜻을 발하면 길하다는 뜻으로 해석할 수도 있다 . 象曰 有孚發若은 信以發志也라. 상왈 유부발약    신이발지야 상전에 말하였다. “믿음을 두고 발하는듯함은 믿음으로써 뜻을 발하는 것이다.”", "삼효": "九三은 豐其沛라. 日中見沬오 折其右肱이니 无咎니라. 구삼    풍기패    일중견매    절기우굉       무구 구삼은 그 장막이 풍성하다. 한낮에 작은 별을 보고, 그 오른팔을 끊으니 허물할 데가 없다. 沛:늪 패·많을 패·성할 패·덮일 패·어두울 패·장막 패  沬: 땅이름 매·어둑어둑할 매·작은 별 매   折:꺾을 절   肱:팔뚝 굉 구삼은 중을 얻지 못하고 양 ( 陽 ) 자리에 양으로 강하게만 있어 , 온갖 장막과 깃발 등으로 풍성하게 가려져 어두워진 상태이다 . 그러니 마치 한낮에 작은 별을 보는 것과 같다 . 또한 그 오른 팔을 끊기는 형벌을 받으니 그 누구를 허물하겠는가 ? 장막에 풍성하다는 것은 인간으로서의 본성 ( 本性 ) 이 아닌 허례 ( 虛禮 ) 와 허식 ( 虛飾 ), 헛된 명예욕 ( 名譽慾 ) 등으로 가려진 상태를 말한다 . 역시 한낮에 작은 별을 볼 정도로 마음이 어두워졌다는 뜻이다 . 이는 또한 구이와 마찬가지로 형무소에 갇혀있는 상태를 의미하기도 한다 . 더 나아가 구삼은 오른팔을 끊기는 벌을 받으니 어찌하겠는가 ? 큰 일을 하지 못할 뿐만 아니라 , 마침내 아무 쓰임도 못된다 . 象曰 豐其沛라 不可大事也오 折其右肱이라 終不可用也라. 상왈 풍기패    불가대사야    절기우굉      종불가용야 상전에 말하였다. “그 장막에 풍성하다. 큰 일을 하지 못할 것이요, 그 오른팔을 끊는다. 마침내 쓰지 못한다.”", "사효": "구사는 위 ( 位 ) 는 높으나 음 자리에 양으로 부당하니 , 九四는 豊其蔀라. 日中見斗니 遇其夷主하면 吉하리라. 구사    풍기부    일중견두    우기이주       길 구사는 그 포장이 풍성하다. 한낮에 두성(斗星)을 보니, 그 평등한 주인을 만나면 길할 것이다. 夷:오랑캐 이·평평할 이·상할 이·떳떳할 이 구사는 외괘 진뢰 ( 震雷 ) ☳ 에 거하고 음 자리에 양으로 있어 자리가 부당하다 . 본성 ( 本性 ) 을 잃고 헛된 욕심이 극심하여 포장만 풍성하다 . 한낮에 두성을 보는 것과 같다 . 역시 형무소에 갇혀 있는 모습이다 . 그런데 초구가 ‘ 배주 ( 配主 ) ’ 인 구사를 만나듯이 , 마찬가지로 평등한 주인 ( 夷主 , 구사효가 변하면 지괘 ( 之卦 ) 가 지화명이 ( 地火明夷 ) 괘가 되니 , 이를 암시하여 ‘ 이주 ( 夷主 ) ’ 라고 한 것이다 . 즉 뇌화풍괘는 지화명이괘와 밀접한 관련이 있다 . 따라서 은나라 말기의 암울한 상황을 나타내고 있는 지화명이괘를 함께 고찰하면 , 뇌화풍괘의 의미를 보다 잘 파악할 수 있다 . 象曰 豊其蔀는 位不當也일새오 日中見斗는 幽不明也일새오 遇其夷主는 吉行也라. 상왈 풍기부    위부당야         일중견두    유불명야          우기이주    길행야 상전에 말하였다. “그 포장이 풍성함은 위(位)가 마땅하지 않기 때문이요, 한낮에 두성을 봄은 어두워서 밝지 못하기 때문이요, 그 평등한 주인을 만남은 길하게 행하는 것이다.” 幽:그윽할 유 六五는 來章이면 有慶譽하야 吉하리라.", "오효": "육오    래장      유경예       길 육오는 빛남을 오게 하면, 경사와 명예가 있어서 길할 것이다. 章:문채 장·밝을 장·나타날 장   慶:경사 경   譽:기릴 예 육오는 양 자리에 음으로 있어 자리는 부당하나 , 외괘에서 중 ( 中 ) 을 얻고 있다 . 겉으로는 불과 우레로 밝음이 풍대하지만 , 그 실상은 깊은 어두움에 빠져 있는 어려운 상황이 풍괘 ( 豐 卦 ) 이다 . 육오 인군으로서 진정한 밝음이 오게 하면 경사가 있고 명예가 있을 것은 말할 나위도 없다 . 길하다 . 육오가 변하면 지괘 ( 之卦 ) 가 택화혁 ( 澤火革 ) 괘가 되는데 , 혁괘 ( 革卦 ) 구오효사에 “ 대인이 호랑이같이 변하니 점을 하지 않음에 믿음이 있을 것이다 ( 九五 는 大人 이 虎變 이니 未占 애 有孚 니라 ) ” 라고 하였다 . 象曰 六五之吉은 有慶也라. 상왈 육오지길    유경야 상전에 말하였다. “육오의 길함은 경사가 있는 것이다.” 上六은 豐其屋하고 蔀其家라. 闚其戶하니 闃其无人하야 三歲라도 不覿이로소니 凶하니라.", "상효": "상육    풍기옥      부기가     규기호       격기무인      삼세       부적             흉 상육은 그 집을 풍대하게 하고 그 집을 덮는다. 그 문을 엿보니 고요해서 그 사람이 없어서 3년이라도 보지 못하니 흉하다. 屋:집 옥·지붕 옥·덮개 옥   蔀:덮을 부   窺:엿볼 규  戶:지게(외짝문) 호·방 호·집 호   闃:고요할 격   覿:볼 적 인간의 물질문명이 극에 달하니 고층빌딩이 도시를 가리고 작은 집을 덮어버린다 . 어느 집이든 문을 열고 엿보아도 사람을 찾아볼 수 없으니 3 년이 되도록 보지 못하니 , 흉하다 . 이 내용을 어떻게 보아야 할 것인가 ? 오늘날 고층빌딩 아파트 등 대도시의 현상을 그대로 말하고 있는 것이 아닐까 ? 마치 성경에 나오는 ‘ 바벨탑 ’ 의 교훈을 말하는 것 같다 . 상육이 변하면 중화리 ( 重火離 ) 괘가 된다 . 뇌화풍괘와 중화리괘의 의미를 깊이 새겨 볼 필요가 있다 . 象曰 豐其屋은 天際翔也오 闚其戶闃其无人은 自藏也라. 상왈 풍기옥    천제상야    규기호격기무인    자장야 상전에 말하였다. “그 집을 풍대하게 함은 하늘 끝까지 오름이요, 그 문을 엿보아 고요해서 그 사람이 없음은 스스로 감추어진 것이다.” 際:사이 제·가(변두리)제·닿을 제   翔:빙빙 돌아 날 상    藏:감출 장 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 577 ∼586 쪽 ."}}, {"num": 56, "ko": "화산려", "hanja": "火山旅", "lines": [0, 0, 1, 1, 0, 1], "url": "https://soosanss.tistory.com/208", "post_id": 208, "gwaui": "인간사회에서 상호간의 의견차이나 대립 그리고 사소한 범죄는 불가피할 경우가 있다 . 때문에 죄인에 대한 형벌이나 , 상대방에 대한 원망은 밝은 지혜로 삼가 신중해야 한다 ( 明愼用刑 ). 맨 위에 처한 상구는 음 자리에 양으로 있어 자리가 부당한데다 , 외괘 이화 ( 離火 ) ☲ 의 극에 처하여 마치 새가 그 집을 불사르는 격이다 .", "gwamyung": "외괘가 이화 ( 離火 ) ☲ , 내괘가 간산 ( 艮山 ) ☶ 으로 이루어진 괘를 ‘ 여 ( 旅 ) ’ 괘라 한다 . 여행한다는 의미이다 . 인생은 나그네이다 . 우주나그네라고 할까 . 그러나 인생 여행이라는 것은 정처 ( 定處 ) 없는 배회 ( 徘徊 ) 가 아니다 . 내괘 간산 ☶ 으로 그쳐 있으면서 외괘 이화 ☲ 로 걸려있으니 , 마치 태양을 중심으로 태양계의 항성이 일정한 궤도를 따라 도는 것과도 같다 . 또한 북두칠성을 중심으로 보든 별들이 선회하는 것과도 같다 . 여괘 ( 旅卦 ) 가 지닌 보다 분명한 의의는 형벌 ( 刑罰 ) 의 일종인 유배 ( 流配 ) 를 말하는 것으로 볼 수 있다 . 앞서 본 뇌화풍 ( 雷火 豐 ) 괘는 형무소에 가두는 형벌을 집행하는 것인 반면에 , 여괘 ( 旅卦 ) 는 나그네가 되어 다른 곳으로 유배를 보내는 형벌이다 . 또한 예전에 ‘ 여 ( 旅 ) ’ 는 군제 ( 軍制 ) 의 단위이고 전쟁 ( 戰爭 ) 을 의미하기도 하였다 ( 상경 지수사괘 참조 ). 뇌화풍괘와 마찬가지로 화산려괘는 중화리 ( 重火離 ) 괘와 밀접한 관련이 있어 , 화산려괘 초효가 변한 중화리괘 초구효사를 음미해 볼 필요가 있다 . 重火離卦", "seogwa": "｢ 전 ｣ 은 뇌화풍괘 다음에 화산려괘를 둔 것을 다음과 같이 설명하고 있다 . 豐者는 大也니 窮大者 必失其居라 故로 受之以旅하고 풍자    대야   궁대자 필실기거     고   수지이려 풍(豐)이란 큼이니, 큰 것이 다한 자는 반드시 그 거소를 잃는다. 그러므로 여괘로 받고 뇌화풍 ( 雷火 豐 ) 괘는 허례 ( 虛禮 ) 와 가식 ( 假飾 ) 이 풍대한 것이다 . 이렇게 인간으로서의 본성을 벗어나 겉치레만 풍성해지다가 그것이 다하게 되면 반드시 거처를 잃게 된다 . 그래서 떠돈다는 여괘 ( 旅卦 ) 를 둔 것이다 . 또한 뇌화풍괘의 상육효에서 ‘ 그 문을 엿보니 고요해서 그 사람이 없다 ’ 고 하였으니 , 왜 없는가 ? 풍괘 ( 豐 卦 ) 의 큰 것이 다하면 그 거소를 잃는다고 했으니 , 모두가 떠도는 나그네가 된 것이 아닌가 ? 上六은 豐其屋하고 蔀其家라. 闚其戶하니 闃其无人하야 三歲라도 不覿이로소니 凶하니라.", "gwasa": "旅는 小亨코 旅貞하야 吉하니라. 여    소형    여정      길 여(旅)는 조금 형통하고, 나그네가 바르게 해서 길하다. 旅:나그네 려·무리 려·군사 려(500명의 군사)·산신제지낼 려 나그네 인생으로서는 크게 형통할 리가 없다 . 다만 외괘에서 중을 얻은 오효 음 ( 小 ) 만이 형통하다 . 나그네로서는 바르게 해야 길하다 . 인생을 밟아나가는 길에는 흉하고 길한 모든 것이 섞여 있으니 , 그저 공경하는 마음을 가지고 바르게 해야 길하다 . 를 풀이한 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 旅小亨은 柔 得中乎外而順乎剛하고 止而麗乎明이라. 단왈 여소형    유 득중호외이순호강       지이리호명 是以小亨旅貞吉也니 旅之時義 大矣哉라. 시이소형여정길야    여지시의 대의재 단전에 말하였다. “여(旅)가 조금 형통한 것은 유(柔)가 밖에서 중을 얻어 강(剛)에 순하고, 그치고 밝음에 걸려 있다. 이로써 조금 형통하고 나그네가 바르게 해서 길한 것이니, 여(旅)의 때와 뜻이 크도다. 麗:걸릴 리· 고울 려 ‘ 나그네가 조금 형통하다 ’ 는 것은 육오의 음 ( 陰 ) 이 외괘에서 중 ( 中 ) 을 얻어 내괘 구이의 강 ( 剛 ) 과 응하니 ,", "gwasangsa": "象曰 山上有火 旅니 君子 以하야 明愼用刑하며 以不留獄하나니라. 상왈 산상유화 여    군자 이       명신용형      이불류옥 상전에 말하였다. “산 위에 불이 있는 것이 여(旅)니, 군자가 이를 본받아 형벌 씀을 밝게 하고 삼가며 옥사(獄舍)에 남기지 않는다.” 愼:삼갈 신   刑:형벌 형   留:머무를 류   獄: 옥 옥 내괘 간산 ( 艮山 ) ☶ 위에 외괘 이화 ( 離火 ) ☲ 불이 있는 것이 여괘 ( 旅卦 ) 이다 . 산 위에 불이 있으니 , 형벌의 불을 삼가지 않으면 온 산에 불의 재앙이 미쳐서 옳고 그름의 판단여지가 없이 모두가 재앙에 빠지게 되다 . 때문에 군자는 이러한 상을 보고 본받아 , 형벌 씀을 밝게 삼가고 너그럽게 하여 형무소에 가두는 중형보다는 필요에 따라서는 옥사 ( 獄舍 ) 에 머무르지 않게 하는 유형 ( 流刑 ) 즉 귀양을 보낸다 . 효사 및 효상사 初六은 旅??니 斯其所取災니라. 초륙    여쇄쇄    사기소취재", "hyosa": {"초효": "初九는 履 錯然하니 敬之면 无咎리라. 초구는 밟는 것이 섞이니, 공경하면 허물이 없을 것이다. 초육은 나그네가 자질구레하니, 이것이 그 재앙을 취하는 바이다. ?(瑣):자질구레할 쇄·천할 쇄·가루 쇄·쇠사슬 쇄   斯:이 사   取: 취할 취 초육은 양 자리에 음 ( 陰 ) 으로 있어 부당하다 . 내괘 간산 ( 艮山 ) ☶ 에 가만히 그쳐야 하지만 , 초구가 변하면 이화 ( 離火 ) ☲ 가 되니 부당한 처신으로 자질구레한 차림을 하고 떠난다 . 이렇게 부당한 가운데 아무 도움이 없이 누추하게 떠나가는 것이 바로 재앙을 취하는 것이 된다 . 象曰 旅??는 志窮하야 災也라. 상왈 여쇄쇄    지궁      재야 상전에 말하였다. “나그네가 자질구레함은 뜻이 궁해서 재앙이다.” 六二는 旅則次하야 懷其資하고 得童僕貞이로다.", "이효": "육이    여즉차       회기자      득동복정 육이는 나그네가 여관에 나아가서, 그 노자를 품고 아이 종(童僕)의 바름을 얻도다. 卽:곧 즉·나아갈 즉   次:버금 차·이을 차·여관 차·머무를 차·진영 차  懷:품을 회   資:재물 자   童:아이 동   僕: 종 복 육이는 내괘에서 중정 ( 中正 ) 한 자리에 있고 , 내호괘 손풍 ( 巽風 ) ☴ 으로 공경하며 겸손하게 처신한다 . 내괘 간산 ( 艮山 ) ☶ 의 여관에 내호괘 손풍 ( 巽風 ) ☴ 으로 들어가서 , 중정하게 처신하여 여행에 필요한 노자 ( 路資 ) 를 품고 또한 시중을 하는 동복 ( 童僕 ) 의 바름도 얻으니 , 나그네로서는 허물이 없는 상태이다 . 굳이 형벌로 말하지 않더라도 , 모든 인생이 우주 나그네가 되어 이 지구에 정착하면서 육신 ( 肉身 ) 이 머무를 집과 노자와 동복이 있으면 허물이 없는 인생을 살아가는 것과 같다 . 象曰 得童僕貞은 終无尤也리라. 상왈 득동복정    종무우야 상전에 말하였다. “아이 종의 바름을 얻음은 마침내 허물이 없을 것이다.” 終:마침내 종   尤:더욱 우·허물 우", "삼효": "九三은 旅焚其次하고 喪其童僕貞이니 厲하니라. 구삼    여분기차       상기동복정      려 구삼은 나그네가 그 여관을 불사르고, 그 동복(童僕)의 바름을 잃으니 위태하다. 焚:불사를 분   喪:잃을 상   厲: 위태할 려 구삼은 양 자리에 양으로 있어 강하기만 하고 중을 얻지 못하여 , 겸손과 공경의 도를 잃은 자리이다 . 또한 외괘 이화 ( 離火 ) ☲ 의 불에 가까운 자리에 있으니 , 자기가 처한 상황에 대한 분함을 이기지 못하여 자기가 머무르고 있는 여관을 불사르는 격이다 . 그러니 동복 ( 童僕 ) 의 바름도 함께 잃어버리게 되어 매우 위태롭게 된다 . 내괘 간산 ( 艮山 ) ☶ 이 여관이 되는데 구삼이 변하면 곤지 ( 坤 地 ) ☷ 로 되고 , 외괘 이화 ( 離火 ) ☲ 에 외호괘가 태택 ( 兌澤 ) ☱ 이니 여관이 불에 타 허물어진다 . 또한 간산 ( 艮山 ) ☶ 은 소남 ( 小男 ) 으로 동복 ( 童僕 ) 이 되는데 , 역시 태택 ( 兌澤 ) ☱ 으로 훼절당하니 동복을 잃어버리는 상이다 . 象曰 旅焚其次하니 亦以傷矣오 以旅與下하니 其義 喪也라. 상왈 여분기차       역이상의    이려여하      기의 상야 상전에 말하였다. “나그네가 그 여관을 불사르니 또한 상하고, 나그네로써 아래와 더부니 그 의리가 상한 것이다.” 傷:상할 상   與: 더불 여 자기가 거처하고 있던 여관이 불살라지니 몸이 온전할 수가 없고 , 또한 구삼 양 ( 陽 ) 이 나그네로서의 자기 주제를 모르고 아래에 있는 음 ( 陰 ) 과 함께 어울리려고 하니 그 뜻이 상한 것이다 . 육삼은 무망의 재앙이니 혹 소를 매나 행인이 얻음이 읍사람의 재앙이다. 또한 상구가 변하면 지괘 ( 之卦 ) 가 뇌산소과 ( 雷山小過 ) 괘가 되는데 , 소과괘 상육효를 같이 음미해 볼 필요가 있다 . 上六은 弗遇하야 過之니 飛鳥 離之라 凶하니 是謂災眚이라.", "사효": "九四는 旅于處하고 得其資斧하나 我心은 不快로다. 구사    여우처       득기자부      아심    불쾌 구사는 나그네가 거처하고, 그 노자와 도끼를 얻으나, 내 마음은 불쾌하도다. 處:머물 처   斧:도끼 부   快:쾌할 쾌 구사는 외괘 사효 음 자리에 양으로 거처하여 자리는 바르지 못하나 , 실 ( 實 ) 하게 노자와 도끼를 얻고 있는 상이다 . 구사가 변하면 외괘 이화 ( 離火 ) ☲ 가 간산 ( 艮山 ) ☶ 으로 되어 거처하는 것이 된다 . 그런데 노자와 도끼 , 즉 재력 ( 財力 ) 과 권력 ( 權力 ) 은 있으나 자리가 부당하여 구사 자신을 믿고 따르는 동복 ( 童僕 ) 이 없으니 , 마음이 불쾌하다 . 또한 나그네가 되어 유랑 ( 流浪 ) 함에 노자와 도끼를 얻은 것은 위안이 되지만 , 따르는 동복 ( 童僕 ) 이 없으니 마음이 유쾌하지 못하다 . 마치 전쟁에 필요한 무기와 자금은 있으나 , 정작 전투를 수행할 병사 ( 兵 士 ) 가 없는 것과 같다 . 象曰 旅于處는 未得位也니 得其資斧하나 心未快也라. 상왈 여우처    미득위야    득기자부      심미쾌야 상전에 말하였다. “나그네가 거처함은 (바른) 자리를 얻지 못한 것이니, 그 노자와 도끼를 얻으나 마음이 유쾌하지 못하다.” 六五는 射雉一矢亡이라. 終以譽命이리라.", "오효": "육오로서는 나그네 가운데 형통한 자리라는 것이다 . 여괘 ( 旅卦 ) 가 나그네가 되어 유랑하는 괘이지만 , 괘덕 ( 卦德 ) 으로 보면 내괘 간산 ( 艮山 ) ☶ 으로 그치고 외괘 이화 ( 離火 ) ☲ 로 밝은데 걸리게 되면 조금 형통하고 나그네가 바르게 해서 길하다 . 나그네로서 유형 ( 流刑 ) 을 당하고 , 혹은 모든 인생이 나그네가 되어 이 지구상에서 살아가는 그 때와 뜻이 크다 . 인생유전 ( 人生流轉 ) 이요 , 법륜상전 ( 法輪相轉 ) 이다 . 육오    석치일시망       종이예명 육오는 꿩을 쏘는데 하나의 화살로 없앤다. 마침내 명예와 명으로써 할 것이다. 射:쏠 석   雉:꿩 치   矢: 화살 시 육오는 외괘 이화 ( 離火 ) ☲ 에서 중을 얻고 있다 . 외괘 이화 ( 離火 ) ☲ 는 활의 상이고 외호괘 태택 ( 兌澤 ) ☱ 은 화살의 상이다 . 또한 이화 ☲ 는 동물로는 새를 의미한다 . 중도 ( 中道 ) 의 마음으로 활시위를 당겨 쏘아 화살 하나로 꿩을 잡으니 , 마침내 그 명성이 자자하여 위에 있는 인군 ( 人君 ) 이 알아보고 육오에게 명을 내려 명예롭게 된다 . 전쟁에 나아가 군사로서의 임무를 잘 수행하는 것이고 , 유배를 당하여 형을 받는 가운데에서도 나라를 위한 일을 하니 , 인군과 나라가 다 알게 된다 . ‘ 석치일시망 ( 射雉一矢亡 ) ’ 은 재미있는 문장 중 하나이다 . 글자를 풀어서 해석하면 꿩 ( 雉 ) 을 쏘아서 화살 하나 ( 矢 ) 를 잃으니 , ‘ 雉 ’ 자에서 ‘ 矢 ’ 를 빼면 ‘ 射雉一矢亡 ’ 은 ‘ 추 ( 隹 ) ’ 가 된다 . 象曰 終以譽命은 上逮也일새라. 상왈 종이예명    상체야 상전에 말하였다. “마침내 명예와 명으로써 함은 위에 미치기 때문이다.” 逮:미칠 체 육오는 화살 하나로 새를 잡아 공을 세워 명예를 누리게 된다 . 그러나 상구는 새가 자기 집을 불사르니 죽은 새를 거저 얻는다는 생각에 처음에는 좋아서 웃지만 , 새가 멀리 날아 도망가거나 , 잡아도 불에 그슬린 새를 얻게 되니 뒤에는 울부짖는 꼴이 된다 . 이는 자신의 노력이 없이 우연히 횡재 ( 橫財 ) 를 하려다가 오히려 재앙이 되는 격이다 . 인간으로서의 본성을 잃어버렸기 때문이다 . ‘ 소를 쉽게 잃는다 ’ 는 것은 인간으로서의 바른 심성과 정신을 잃어버렸다는 뜻이다 . 나그네로써 이화 ( 離火 ) ☲ 의 맨 위에 거하고 있으니 그 분함을 참지 못하고 , 또한 자기 정신마저 불태워버리니 이러한 지경은 듣지 못했다는 뜻이다 . 중화리 ( 重火離 ) 괘 괘사에 “ 암소를 기르면 길하다 ( 畜牝牛 吉 ) ” 고 하였는데 , 소는 인간의 정신을 의미하는 상징적인 표현이다 . 또한 천뢰무망 ( 天雷无妄 ) 괘 육삼 효사를 참고하기 바란다 . 六三은 无妄之災니 或繫之牛하나 行人之得이 邑人之災로다.", "상효": "上九는 鳥焚其巢니 旅人이 先笑後號咷라. 喪牛于易니 凶하니라. 상구    조분기소   여인     선소후호조    상우우이    흉 상구는 새가 그 집을 불사르니, 나그네가 먼저는 웃고 뒤에는 울부짖는다. 소를 쉽게 잃으니 흉하다. 鳥:새 조   焚:불사를 분   巢:새집 소·깃들일 소·망루 소   笑:웃을 소  號:부르짖을 호   咷:울 도(조)   易:쉬울 이 화산려 ( 火山旅 ) 상육은 만나지 않아서 지나가니, 나는 새가 떠난다. 흉하니 이를 재앙이라 이른다. 象曰 以旅在上하니 其義焚也오 喪牛于易하니 終莫之聞也로다. 상왈 이려재상       기의분야    상우우이      종막지문야 상전에 말하였다. “나그네로써 위에 있으니 그 의리가 불사르는 것이요, 소를 쉽게 잃으니 마침내 듣지 못하도다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 587 ∼594 쪽 ."}}, {"num": 57, "ko": "중풍손", "hanja": "重風巽", "lines": [0, 1, 1, 0, 1, 1], "url": "https://soosanss.tistory.com/209", "post_id": 209, "gwaui": "약한 바람이라도 거듭하여 계속 불게 되면 천하 만물을 움직이게 된다 . 겸손하고 겸손한 자세로 명을 펴서 일을 행하라 ( 申命行事 ). 신명 ( 申命 ) 은 아무 때나 부는 것이 아니다 . 신명이 행해지는 그 때를 밝히고 있는 것이 구오효이다 . 새로운 명을 베풀 때에는 바르게 하면 길해져서 그동안의 뉘우침이 없어지고 이롭지 않음이 없게 된다 . 과거지사 ( 過去之事 ) 는 과거로 흘러갈 뿐이다 . 오로지 처음은 없고 새로운 명을 펴기 위한 마침을 둘 뿐이다 . 그 때는 바로 경 ( 庚 ) 으로 먼저 삼일하고 경 ( 庚 ) 으로 뒤에 삼일하는 때이다 . 천간 ( 天干 ) 으로 경 ( 庚 ) 은 가을 후천 ( 後天 ) 을 의미한다 . 경 ( 庚 ) 으로 먼저 삼일은 여름에 해당하는 정 ( 丁 ) 이고 , 경 ( 庚 ) 으로 뒤에 삼일은 천간의 끝이자 겨울에 해당하는 계 ( 癸 ) 이다 . 그래서 처음은 없고 마침을 두는 것이다 . 맨 위에 있는 상구는 음 자리에 양으로 있어 자리가 부당하다 . 손괘 ( 巽卦 ) 의 맨 위에 처하고 있으면서 자신의 자리를 망각하고 그저 겸손하고자 하여 평상 아래에 있으니 , 이것은 겸손함이 지나친 것이다 . 그래서 상구가 가지고 있는 재물과 권력 ( 도끼 ) 마저도 잃게 되니 , 자신의 자리를 망각하고 마냥 겸손하려고 하는 것을 고집하면 흉하다 . 겸손함이 평상 아래에 있다는 것은 맨 위에 처하여 궁하기 때문이고 , 자신의 재물과 권력을 잃으니 바르지 못하고 흉한 것이다 . 象曰 巽在牀下는 上窮也오 喪其資斧는 正乎아 凶也라. 상왈 손재상하    상궁야    상기자부    정호   흉야 상전에 말하였다. “겸손함이 평상 아래에 있음은 위에서 궁한 것이고, 그 노자와 도끼를 잃는 것은 바르겠는가? 흉하다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 595 ∼603 쪽", "gwamyung": "외괘도 손풍 ( 巽風 ) ☴ , 내괘도 손풍 ( 巽風 ) ☴ 으로 이루어진 괘를 ‘ 손 ( 巽 ) ’ 괘라 한다 . 인사적 ( 人事的 ) 으로 보면 어려운 상황에서 겸손하고 겸손하며 일을 행하여 자기 명을 펴는 것이다 . 또한 자연의 이치로 보면 바람이 거듭하여 하늘의 명이 행하는 것이다 . 바람이 거듭하면 만물이 흔들리며 , 천하가 하늘의 명을 새로이 받게 된다 . 뇌화풍 ( 雷火 豐 ) 괘와 화산려 ( 火山旅 ) 괘에서 하늘이 심판을 하는 것은 과거의 죄를 처벌하는 것이었는데 , 이제는 새로이 하늘의 명을 편다 . 손괘 ( 巽卦 ) 는 64 괘 가운데 57 번째에 있고 하경 27 번째에 있어서 인사 ( 人事 ) 를 의미하는 하경을 마무리하는 중요한 자리이다 . 60 갑자로는 57 번째인 경신 ( 庚申 ) 에 해당한다 . 경신 ( 庚申 ) 이란 고쳐서 새롭게 편다는 의미이다 . 《 주역》 은 64 괘로 이루어져 있으나 , 실제로는 60 번째 수택절 ( 水澤節 ) 괘에서 모든 현상의 파노라마가 끝나게 된다 .", "seogwa": "｢ 전 ｣ 은 화산려괘 다음에 중풍손괘가 온 것을 다음과 같이 설명하고 있다 . 旅而无所容이라 故로 受之以巽하고 여이무소용      고    수지이손 나그네로 용납할 바가 없다. 그러므로 손괘(巽卦)로써 받고 화산려 ( 火山旅 ) 괘는 인생의 나그네로서 , 전쟁을 수행하는 병사로서 , 형벌을 받고 귀양 가는 죄인으로서 용납할 바가 없다 . 그러나 천하의 이치는 모든 것을 다시 거두어들인다 . 또한 아무리 나그네라 할지라도 겸손의 덕을 갖추고 공경하면 다시 받아들일 수 있게 된다 . 그래서 거듭 겸손하다는 손괘 ( 巽卦 ) 를 여괘 ( 旅卦 ) 다음에 둔 것이다 .", "gwasa": "巽은 小亨하니 利有攸往하며 利見大人하니라. 손    소형       이유유왕      이견대인 손(巽)은 조금 형통하니, 가는 바를 둠이 이로우며 대인을 봄이 이롭다. 巽:공손할 손·사양할 손 손 ( 巽 ) 은 겸손하고 또 겸손하게 하여 일을 하는 것이다 . 또한 바람이 거듭하며 하늘의 새로운 명을 펴는 것이다 . 조금 형통하다는 것은 겸손하게 낮추어야 형통하다는 뜻이다 . 새로운 명이 행해지니 가는 바를 두는 것이 이롭고 또한 대인을 보는 것이 이롭다 . 단전은 다음과 같이 설명하고 있다 . 에는 ‘ 갑 ( 甲 ) 으로 먼저 삼일하고 갑 ( 甲 ) 으로 뒤에 삼일한다 ’ 고 하여 시작의 의미를 밝히고 있다 . 蠱는 元亨하니 利涉大川이니 先甲三日하며 後甲三日이니라. 고(蠱)는 크게 형통하니, 큰 내를 건넘이 이로우니, 갑(甲)으로 먼저 삼일하고 갑(甲)으로 뒤에 삼일한다. 여기에 담긴 의미를 다 헤아릴 수는 없다 . 또한 해석에 있어서도 단순한 논리로 풀 문제는 아니다 . 이른바 깊은 수양을 통한 직관적 ( 直觀的 ) 판단 ( 判斷 ) 이 필요한 부분이다 . ｢ 역서 ( 易序 ) ｣ 의 다음 부분을 인용하여 깊은 뜻을 헤아리고자 한다 . 時固未始有一而卦未始有定象하고 事固未始有窮而爻亦未始有定位하니 以一時而索卦則拘於无變이면 非易也오 以一事而明爻則窒而不通이면 非易也오 知所謂卦爻彖象之義而不知有卦爻彖象之用이면 亦非易也라. 故로 得之於精神之運과 心術之動하야 與天地合其德하며 與日月合其明하며 與四時合其序하며 與鬼神合其吉凶然後에아 可以謂之知易也라. 雖然이나 易之有卦는 易之已形者也오 卦之有爻는 卦之已見者也니 已形已見者는 可以言知어니와 未形未見者는 不可以名求니 則所謂易者 果何如哉아. 此 學者所當知也라. 때는 진실로 처음부터 하나만 있지 않고, 괘는 처음부터 정해진 상이 있지 않으며, 일은 진실로 처음부터 궁함이 있지 않고, 효 또한 처음부터 정해진 자리가 있지 않으니, 한 때로써 괘를 찾은 즉 변화가 없음에 구애되면 역(易)이 아니고, 한 일로써 효를 밝힌 즉 막혀서 통하지 않으면 역(易)이 아니고, 이른바 괘효단상의 뜻을 알더라도 괘효단상의 쓰임을 알지 못하면 역시 역(易)이 아니다. 그러므로 정신의 운용과 마음의 움직임에 체득해서, 천지와 그 덕을 합하며, 일월과 그 밝음을 합하며, 사시와 그 차례를 합하며, 귀신과 그 길흉을 합한 뒤에야 가히 역(易)을 안다고 말할 수 있다. 비록 그렇지만, 역(易)에 괘가 있는 것은 이미 나타난 것이니, 이미 형상하고 이미 나타난 것은 안다고 말할 수 있지만, 형상하지 않고 나타나지 않은 것은 무어라 이름을 구할 수 없으니, 이른바 역(易)은 과연 어떠한 것인가? 이는 배우는 자가 마땅히 알아야 할 바이다. 象曰 九五之吉은 位正中也일새라. 상왈 구오지길   위정중야 상전에 말하였다. “구오의 길함은 자리가 바르고 가운데하기 때문이다.”", "danssa": "彖曰 重巽으로 以申命하나니 단왈 중손      이신명 剛이 巽乎中正而志行하며 柔 皆順乎剛이라. 강   손호중정이지행       유 개순호강 是以小亨하니 利有攸往하며 利見大人하니라. 시이소형       이유유왕      이견대인 단전에 말하였다. “거듭한 바람(겸손)으로 명을 거듭하니, 강(剛)이 중정(中正)에 겸손해서 뜻이 행하며, 유(柔)가 모두 강(剛)에 순하다. 이로써 조금(작은 것) 형통하니, 가는 바를 둠이 이로우며 대인을 봄이 이롭다. 重:거듭 중   申:거듭할 신·아뢸 신·펼 신·보낼 신 거듭한 바람과 거듭한 겸손으로 명을 펴는 것이 손 ( 巽 ) 이다 .", "gwasangsa": "象曰 隨風이 巽이니 君子 以하야 申命行事하나니라. 상왈 수풍    손      군자 이       신명행사 상전에 말하였다. “따르는 바람이 손(巽)이니, 군자가 이를 본받아 명을 거듭해서 일을 행한다.” 隨:따를 수 내괘 외괘로 바람이 거듭 부니 계속 바람이 따르는 상이 손괘 ( 巽卦 ) 이다 . 이러한 상을 보고 군자는 바람이 거듭하듯이 명을 거듭해서 일을 행한다 . 앞서 언급하였듯이 손괘 ( 巽卦 ) 는 57 번째로 60 갑자 순서로는 경신 ( 庚申 ) 에 해당한다 . 명 ( 命 ) 을 거듭하는 것은 명 ( 命 ) 을 고치는 것이다 . 이제 인사 ( 人 事 ) 를 의미하는 하경 ( 下經 ) 을 마무리하는 시점이니 , 새로운 명을 편다 . 선천이 끝나고 후천이 오는 중천시대 ( 中天時代 ) 에 중화리 ( 重火離 ) ․ 중수감 ( 重水坎 ) 의 재앙이 있는데 그 구체적인 내용이 뇌화풍 ( 雷火 豐 ) 과 화산려 ( 火山旅 ) 에서 나타나고 , 잘못된 구질서 ( 舊秩序 ) 를 단죄 ( 斷罪 ) 하고 새로운 질서를 세우기 위한 하늘의 명이 거듭한다 . 그야말로 신명 ( 神命· 神明 ) 의 바람이다 . 효사 및 효상사 初六은 進退니 利武人之貞이니라.", "hyosa": {"초효": "초육   진퇴    이무인지정 초육은 나아가고 물러나니, 무인(武人)의 바름이 이롭다. 進:나아갈 진   退:물러날 퇴   武:굳셀 무·무인 무 겸손하고 겸손한 손괘 ( 巽卦 ) 에서 초육은 맨 아래에 있고 양 자리에 음으로 있으니 지나치게 겸손하여 용단을 내리지 못하는 상황이다 . 그저 겸손하기만 하고 , 바른 판단을 하여 과감하게 행동하지 못하니 , 나아가기도 하다가 다시 물러난다 . 이러한 상황에서는 무인 ( 武人 ) 과 같은 용맹과 바름이 이롭다 . 나아가다가 물러나는 것은 뜻을 의심하기 때문이고 , 무인의 바름이 이롭다는 것은 나약한 뜻을 다스리라는 것이다 . 象曰 進退는 志疑也오 利武人之貞은 志治也라. 상왈 진퇴    지의야   이무인지정    지치야 상전에 말하였다. “나아가고 물러남은 뜻이 의심하는 것이요, 무인의 바름이 이로움은 뜻이 다스려짐이다.” 疑:의심할 의   治:다스릴 치", "이효": "구이와 구오의 양강 ( 陽剛 ) 이 중정한데 있으면서 겸손하여 그 뜻이 행해진다 . 초효와 사효의 음 ( 陰 ) 은 각각 내괘의 구이와 구삼 , 외괘의 구오와 상구의 강 ( 剛 ) 에 모두 순하고 있다 . 이렇기 때문에 조금 형통한 것이고 , 또는 작은 음 ( 陰 ) 이 형통한 것이다 . 그러니 가는 바를 둠이 이롭고 만인을 이끌어줄 대인을 봄이 이롭다 . 九二는 巽在牀下니 用史巫紛若하면 吉코 无咎리라. 구이   손재상하    용사무분약       길    무구 구이는 겸손함이 평상 아래에 있으니, 사(史)와 무(巫)를 씀이 어지러운 듯 하면 길하고 허물이 없을 것이다. 牀:평상 상   史:사관 사   巫:무당 무   紛:어지러울 분   若:같을 약 구이는 음 자리에 양으로 있으나 내괘의 중 ( 中 ) 을 얻고 있다 . 구이가 변하면 간산 ( 艮山 ) ☶ 이 되어 산 아래로 바람이 부는 것이 마치 평상 아래에 바람이 부는 것과 같다 . 이는 평상 아래에 바람이 솔솔 스며들듯이 , 겸손하게 자신을 낮추라는 의미이다 . 사 ( 史 ) 와 무 ( 巫 ) 는 옛날 제사를 주관하는 제사장 ( 祭司長 ) 을 의미한다 . 즉 제사장을 동원하여 제사를 올리는 것이 어지러운 듯 많게 하면 길하고 허물이 없다 . 이는 실질적으로 무당을 불러 굿하라는 것이 아니라 , 천명 ( 天命 ) 의 새로운 바람이 불어오니 겸손하게 지극한 정성으로 마음을 집중하여 천명에 응하기 위한 노력을 하라는 뜻이다 . 象曰 紛若之吉은 得中也일새라. 상왈 분약지길   득중야 상전에 말하였다. “어지러운 듯해서 길한 것은 중(中)을 얻었기 때문이다.”", "삼효": "九三은 頻巽이니 吝하니라. 구삼    빈손       인 구삼은 자주 겸손하니, 인색하다. 頻:자주 빈   吝:인색할 린 구삼은 중 ( 中 ) 에서 벗어나 있고 , 양 자리에 양으로 강하기만 하여 겸손하기가 어려운 상태이다 . 손괘 ( 巽卦 ) 의 덕은 겸손한 것이니 구삼도 겸손하려고 노력은 하지만 , 구삼 자체가 강하기만 하니 겸손하려다가도 강하게 처신하게 되어 제대로 겸손할 수가 없다 . 그래서 자주 겸손하다고 한 것이다 . 결국 진실로 겸손한 덕을 갖추지 못하니 인색하다 . 이는 구삼의 뜻이 궁색한 것이다 . 象曰 頻巽之吝은 志窮也라. 상왈 빈손지린    지궁야 상전에 말하였다. “자주 겸손하여 인색함은 뜻이 궁한 것이다.” 窮 : 다할 궁·궁할 궁 六四는 悔 亡하니 田獲三品이로다.", "사효": "육사    회 망       전획삼품 육사는 뉘우침이 없어지니, 사냥하여 삼품을 얻도다. 悔:뉘우칠 회   田:사냥할 전(佃)   獲:얻을 획   品: 물건 품 육사는 중 ( 中 ) 을 얻지 못하였으나 , 음 자리에 음으로 자리가 바르고 겸손하게 처신한다 . 새로운 명이 행해지는 과도기 ( 過渡期 ) 에 많은 어려움이 있고 따라서 미리 앞서서 행하지 못하는 뉘우침이 있으나 그 뉘우침도 없어진다 . 마침내 사냥해서 삼품 ( 三品 ) 을 얻는 공을 세우게 된다 . 삼품 ( 三品 ) 은 인군으로부터 등용되어 공직 ( 公職 ) 에 오른다는 의미이기도 하고 , 새로운 사회를 만들어 가는 데 필요한 것을 얻어 백성과 인군에게 베풀어주는 공을 세운다는 의미도 된다 . 항상 강유 ( 剛柔 ) 의 도를 겸하여야 한다 . 겸손하다는 것은 나약함을 말하는 것이 아니다 . 노자 《 도덕경 ( 道德經 )》 제 36 장 을 음미해 보자 . 將欲翕之인댄 必固張之요 將欲弱之인댄 必固强之며 將欲廢之인댄 必固擧之요 將欲取之인댄 必固予之니 是謂微明이라하니 柔弱은 勝剛强하니라 魚不可脫於淵이오 國之利器는 不可以示人이니라. 장차 거두고자 하려면 반드시 펴고, 장차 약하고자 하려면 반드시 강하며, 장차 폐하고자 하려면 반드시 흥하고, 장차 빼앗고자 하려면 반드시 주니, 이를 ‘미묘한 밝음’(微明)이라 일컬으니, 부드러움과 약함은 굳셈과 강함을 이긴다. 물고기는 가히 못에서 벗어날 수 없고, 나라의 이로운 그릇(나라를 다스릴 수 있는 미묘한 무기)은 가히 남에게 보여서는 안된다. 象曰 田獲三品은 有功也라. 상왈 전획삼품   유공야 상전에 말하였다. “사냥해서 삼품을 얻음은 공이 있는 것이다.”", "오효": "九五는 貞이면 吉하야 悔 亡하야 无不利니 无初有終이라. 先庚三日하며 後庚三日이면 吉하리라. 구오    정       길      회 망       무불리    무초유종       선경삼일       후경삼일       길 구오는 바르게 하면 길해서 뉘우침이 없어서 이롭지 않음이 없으니, 처음은 없고 마침은 있다. 경(庚)으로 앞서 삼일하며 경(庚)으로 뒤에 삼일하면 길할 것이다. 庚:일곱째천간 경·고칠 경·단단할 경 중풍손 ( 重風巽 ) 구오가 변하면 지괘 ( 之卦 ) 가 산풍고 ( 山風蠱 ) 가 되는데 , 고괘 ( 蠱卦 )", "상효": "上九는 巽在牀下하야 喪其資斧니 貞애 凶하니라. 상구    손재상하       상기자부   정    흉 상구는 겸손함이 평상 아래에 있어서, 그 노자와 도끼를 잃으니 고집함에 흉하다. 牀:평상 상   資:재물 자   斧:도끼 부 중풍손 ( 重風巽 )"}}, {"num": 58, "ko": "중택태", "hanja": "重澤兌", "lines": [1, 1, 0, 1, 1, 0], "url": "https://soosanss.tistory.com/210", "post_id": 210, "gwaui": "안에서 기뻐하고 밖에서도 기뻐하니 모두가 이구동성 ( 異口同聲 ) 으로 기뻐하는 상황이다 . 그러나 이렇게 기뻐서 들떠 있는 상황에서는 차분히 모여 함께 강습하는 것이 보다 현명한 일이다 ( 朋友講習 ). 괘명 및 괘상 내괘가 태택 ( 兌澤 ) ☱ , 외괘도 태택 ( 兌澤 ) ☱ 으로 이루어진 괘의 명칭을 ‘ 태 ( 兌 ) ’ 라 한다 . 안과 밖으로 모두 기뻐한다는 뜻이다 . 모두가 기뻐하면서 어려움을 잊고 있는 상이다 . 중풍손 ( 重風巽 ) 괘에서 새로운 명이 베풀어지니 이에 모두가 기뻐하면서 새로운 명 ( 命 ) 과 질서를 익힌다 . 새로운 질서를 잡아가는데 있어서 백성의 노고는 매우 크다 . 모든 백성이 그 노고 ( 勞苦 ) 를 잊을 정도로 고무진작 ( 鼓舞振作 ) 하여 백성을 기쁘게 한다 .", "gwamyung": "", "seogwa": "｢ 전 ｣ 은 중풍손괘 다음에 중택태괘가 온 것을 다음과 같이 설명하고 있다 . 巽者는 入也니 入而後애 說之라 故로 受之以兌하고 손자    입야    입이후   열지    고    수지이태 손(巽)이란 들어감이니, 들어간 후에 기뻐한다. 그러므로 태(兌)로써 받고 說:기쁠 열 손 ( 巽 ) 은 들어가는 것이다 . 나그네로 떠돌다가 거처함을 얻어 들어가니 기뻐하게 된다 . 그래서 손괘 ( 巽卦 ) 다음에 태괘 ( 兌卦 ) 를 두었다는 설괘전의 설명이다 . 보다 바른 뜻은 , 풍괘 ( 豐 卦 ) 와 여괘 ( 旅卦 ) 에서 기존의 나쁜 행태를 단죄 ( 斷罪 ) 하고 , 손괘 ( 巽卦 ) 에서 거듭 명을 행하여 새로운 질서를 세우니 , 모두가 기뻐하는 마음으로 새로운 질서를 익히는 것이기에 손괘 ( 巽卦 ) 다음에 태괘 ( 兌卦 ) 를 둔 것으로 볼 수 있다 .", "gwasa": "兌는 亨하니 利貞하니라. 태    형      이정 태(兌)는 형통하니, 바르게 함이 이롭다. 兌:기뻐할 태·통할 태·모일 태·구멍 태· 바꿀 태 새로운 명을 받아 새로운 질서를 세워 안팎으로 기뻐하고 기뻐하는 태 ( 兌 ) 는 형통하지만 , 바르게 함이 이롭다 . 안팎으로 기뻐하여 자칫 중도 ( 中道 ) 를 잃어 흉하게 될 수 있으니 , 기뻐하는 가운데 바르게 함이 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 兌는 說也니 剛中而柔外하야 說以利貞이라. 단왈 태    열야   강중이유외       열이이정 是以順乎天而應乎人하야 說以先民하면 民忘其勞하고 시이순호천이응호인       열이선민      민망기로 說以犯難하면 民忘其死하나니 說之大 民勸矣哉라. 열이범난       민망기사         열지대 민권의재 단전에 말하였다. “태(兌)는 기뻐하는 것이니, 강(剛)이 가운데하고 유(柔)가 바깥해서, 기뻐함으로 바르게 함이 이롭다. 이로써 하늘에 순하고 사람에 응해서, 기뻐함으로 백성에 먼저 하면 백성이 그 수고로움을 잊고, 기뻐함으로 어려움을 범하면 백성이 그 죽음도 잊으니, 기뻐함의 큼이 백성이 권하는 것이다.” 說:기쁠 열   忘:잊을 망   勞:수고할 로   犯:범할 범   難:어려울 난  勸: 권할 권 태 ( 兌 ) 는 기뻐하는 것이다 . 태괘 ( 兌卦 ) 의 재질을 보면 내괘의 구이 강 ( 剛 ) 과 외괘의 구오 강 ( 剛 ) 이 가운데하고 ,", "gwasangsa": "象曰 麗澤이 兌니 君子 以하야 朋友講習하나니라. 상왈 이택    태    군자 이      붕우강습 상전에 말하였다. “걸린 연못이 태(兌)니, 군자가 이를 본받아 벗(朋友)과 강습한다.” 麗:고울 려·빛날 려·붙을 려(리)·걸릴 리   澤:못 택   講:익힐 강   習: 익힐 습 연못이 위 아래로 붙어 걸려 있는 상이 태괘 ( 兌卦 ) 이다 . 내괘로 기뻐하고 외괘로 기뻐한다 . 태 ☱ 는 기뻐하는 것이고 , 말하는 것이고 , 입을 의미한다 . 그러니 안팎으로 벗이 모여 모든 국민이 하나가 되어 이구동성 ( 異口同聲 ) 으로 강습하는 것이다 . 효사 및 효상사", "hyosa": {"초효": "初九는 和兌니 吉하니라. 초구    화태    길 초구는 화해서 기뻐하니 길하다. 和:화할 화 초구는 기뻐하는 태괘 ( 兌卦 ) 에서 맨 아래에 처하여 백성에 해당한다 . 양 자리에 양으로 자리가 바르니 , 조화롭게 기뻐하여 길하다 . 초구는 자리가 바르고 , 백성으로서 기뻐하면서 구이를 따라 일을 하는데 의심할 바가 없다 . 象曰 和兌之吉은 行未疑也일새라. 상왈 화태지길    행미의야 상전에 말하였다. “화해서 기뻐하여 길한 것은 행함에 의심하지 않기 때문이다.”", "이효": "九二는 孚兌니 吉코 悔 亡하니라. 구이    부태    길    회 망 구이는 미덥게 기뻐하니 길하고, 뉘우침이 없어진다. 구이는 음 자리에 양 ( 陽 ) 으로 있어 자리가 부당하니 다소 뉘우침이 있다 . 그러나 내괘의 중 ( 中 ) 을 지켜 미덥게 기뻐하니 길하고 , 또한 초구 백성이 잘 화하여 구이의 뜻을 믿고 따르니 뉘우침이 없어진다 . 구이가 변하면 지괘 ( 之卦 ) 가 택뢰수 ( 澤雷隨 ) 가 되니 , 기뻐하면서 따르는 상이 나온다 . 象曰 孚兌之吉은 信志也일새라. 상왈 부태지길    신지야 상전에 말하였다. “미덥게 기뻐해서 길한 것은 뜻을 믿기 때문이다.” 六三은 來兌니 凶하니라.", "삼효": "육삼과 상육의 음 ( 陰 ) 은 바깥에 있다 . 그러니 기뻐하면서도 바르게 함이 이롭다 . 그리고 위로는 하늘에 순하고 아래로는 백성에 응해야 진정한 기쁨의 도가 된다 . 그래서 기뻐함의 도로써 백성보다 앞서 행하면 백성이 그 수고로움을 잊을 정도로 모두 따르고 , 또한 기뻐함으로써 백성을 흥기시켜 어려운 상황을 범하게 되면 백성이 그 죽음도 잊고 모두 따르게 되니 , 이 기뻐함의 큰 것 , 즉 나라를 기뻐하게 하고 백성을 기뻐하게 하고 하늘을 기뻐하게 하는 것이 바로 백성이 권하고 또한 백성에게 권해야 하는 것이다 . 나라가 어려우면 그 수고로움을 잊고 나라를 위해 기쁜 마음으로 일하게 될 때 진정 국난 ( 國難 ) 을 극복할 수 있다 . 육삼    래태    흉 육삼은 와서 기뻐하니 흉하다. 육삼은 중 ( 中 ) 을 얻지 못하였고 , 양 자리에 음으로 있어 자리가 마땅하지 않은 상태이다 . 그러니 모두가 기뻐하고 기뻐하는 상황에 육삼도 자리가 바르지 못한 상태에서 부화뇌동 ( 附和雷同 ) 하면서 이리저리 기웃거리며 기뻐한다 . 중도 ( 中道 ) 를 잃고 바름을 잃은 상태에서 부화뇌동하니 흉하다 . 象曰 來兌之凶은 位不當也일새라. 상왈 래태지흉    위부당야 상전에 말하였다. “와서 기뻐해서 흉한 것은 자리가 마땅하지 않기 때문이다.”", "사효": "九四는 商兌未寧이니 介疾이면 有喜리라. 구사    상태미녕       개질      유희 구사는 기쁨을 헤아려서 편안하지 않으니, 분별해서 미워하면 기쁨이 있을 것이다. 商:헤아릴 상   寧:편안할 녕   介:낄 개·도울 개·굳을 개·절개 개·분별할 개   疾:병 질   喜: 기쁠 희 구사는 음 자리에 양으로 거하여 자리가 바르지 못하나 , 전체로 보면 대신 ( 大臣 ) 자리에 있다 . 대신 역할을 해야 할 구사로서는 구오의 명 ( 命 ) 을 따라야 하는데 , 자리가 바르지 못하고 아래에 있는 육삼 음 ( 陰 ) 에 가까이 있어 마음이 흔들리고 있다 . 그래서 기쁜 상태에서 헤아리니 마음이 편하지 못하다 . 그러나 잘 분별해서 부당한 육삼의 유혹을 물리치면 기쁨이 있게 된다 . 나라 일을 하는 대신으로서 구사가 잘 분별해서 판단을 잘하여 구오 인군의 명을 따르면 나라가 잘 되는 것이니 , 구사의 기쁨이란 나라로 보면 경사가 되는 것이다 . 象曰 九四之喜는 有慶也라. 상왈 구사지희    유경야 상전에 말하였다. “구사의 기쁨은 경사가 있는 것이다.” 慶: 경사 경", "오효": "九五는 孚于剝이면 有厲리라. 구오    부우박       유려 구오는 깎는데 믿으면 위태함이 있을 것이다. 剝:벗길 박· 깎을 박 구오는 외괘에서 중정한 자리에 있는 인군 ( 人君 ) 이다 . 나라를 이끌고 천하 백성이 모두 기뻐하도록 정치를 잘 해야 한다 . 그런데 바로 위에 음 ( 陰 ) 이 있는데 , 이 음 ( 陰 ) 은 양 ( 陽 ) 을 깎는 부정한 것이다 . 그래서 만일 구오 인군이 상육 음 ( 陰 ) 에게 믿음을 두면 ,", "상효": "상육 음이 구오 양을 깎기 때문에 위태롭게 된다 . 이는 구오가 중정한 자리에 정당하게 있기 때문에 , 혹 있을 수 있는 일을 경계하는 것이다 . 象曰 孚于剝은 位正當也일새라. 상왈 부우박    위정당야 상전에 말하였다. “깎는데 믿는다는 것은 자리가 정당하기 때문이다.” 上六은 引兌라. 상륙    인태 상육은 이끌어서 기뻐한다. 引: 끌 인 상육은 기뻐하는 태괘 ( 兌卦 ) 의 극에 처하여 중도 ( 中道 ) 를 잃고 지나치게 기뻐하는 자리이다 . 그런데 사실 모든 백성은 구오의 중정 ( 中正 ) 한 정치에 기뻐하니 , 정작 상육을 알아주지 않는다 . 이에 상육이 구오 인군과 백성을 막 끌어당겨서 기뻐하는 격이니 , 그 도가 빛나는 것이 못된다 . 象曰 上六引兌 未光也라. 상왈 상륙인태 미광야 상전에 말하였다. “상육이 이끌어서 기뻐함이 빛나지 못한 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 604 ∼609 쪽 ."}}, {"num": 59, "ko": "풍수환", "hanja": "風水渙", "lines": [0, 1, 0, 0, 1, 1], "url": "https://soosanss.tistory.com/211", "post_id": 211, "gwaui": "너무 기뻐하다 보면 중심을 잃고 흩어진다 . 천하 백성을 모으기 위해서는 백성의 마음을 모으고 국가의 기강을 확립해야 한다 ( 享帝立廟 ).", "gwamyung": "외괘가 손풍 ( 巽風 ) ☴ , 내괘가 감수 ( 坎水 ) ☵ 로 이루어진 괘를 ‘ 환 ( 渙 ) ’ 이라 한다 . 내괘 감수 ( 坎水 ) ☵ 물 위로 바람이 부니 물결이 출렁이며 만물이 흩어진다는 뜻이다 . 이렇게 만물이 흩어지듯이 백성이 흩어지지 않게 하려면 어떻게 해야 하는가 ? 이것이 환괘 ( 渙卦 ) 의 화두 ( 話頭 ) 이다 . 나라의 백성이 마음을 두지 못하고 저마다 흩어질 때 , 나라를 다스리는 인군으로서는 백성을 하나로 모으는 방법을 강구해야 한다 . 앞서 살펴 본 뇌화풍 ( 雷火 豐 ) 괘와 화산려 ( 火山旅 ) 괘가 상경 ( 上經 ) 의 중화리 ( 重火離 ) 괘와 밀접한 관계가 있듯이 , 풍수환 ( 風水渙 ) 괘와 수택절 ( 水澤節 ) 괘는 상경 ( 上經 ) 의 중수감 ( 重水坎 ) 괘와 밀접한 관계가 있다 . 중수감괘의 상효가 변하면 풍수환괘가 되고 중수감괘의 초효가 변하면 수택절괘가 된다 . 중수감 ( 重水坎 ) 괘에서 상효가 변하면 풍수환괘가 되는데 물 위에 바람이 불고 백성이 수재 ( 水災 ) 를 당하여 민심 ( 民心 ) 이 흩어지니 백성을 구제해야 하는 뜻이고 , 초효가 변하면 수택절괘가 되니 물의 재앙이 닥치지 않도록 절도 있게 대비하는 뜻이다 . 더 나아가 중수감괘 초효와 상효가 함께 변한 풍택중부 ( 風澤中孚 ) 괘 역시 중수감괘와 관련이 있다 . 중수감 , 풍수환 , 수택절 , 풍택중부의 호괘 ( 互卦 ) 는 모두 산뢰이 ( 山雷 頤 ) 괘임을 알 수 있다 . ’ 에서는 괘의 의미상 뇌화풍괘와 화산려괘는 중화리 ( 重火離 ) 괘와 밀접한 관련이 있고 , 풍수환괘와 수택절괘는 중수감 ( 重 水坎 ) 괘와 관련이 되어 있음을 강조하여 , 각각 중화리괘와 중수감괘를 체로 하여 설명한 바 있다 . 풍수환 ( 風水渙 ) 괘 단전에서는 풍수환괘가 천지비괘에서 변화되어 온 것임을 밝히고 있다 . 즉 ‘ 환이 형통하다 ’ 는 것은 천지가 막혀 비색한 천지비 ( 天 地 否 ) 괘에서 구사의 강 ( 剛 ) 이 내괘 이효에 와서 궁하지 않고 , 천지비괘 육이 음 ( 陰 ) 은 위로 올라가 음 자리에 음으로 자리를 얻어 구오 상구의 양과 같이 하기 때문에 형통한 것이다 . 즉 천지비괘에서 육이 음 ( 陰 ) 과 구사 양 ( 陽 ) 이 서로 자리를 바꾸어 풍수환 ( 風水渙 ) 괘가 되었다는 설명이다 . 그렇지만 64 괘가 전개되는 의미와 해석상 풍수환괘와 수택절괘는 그 체가 중수감 ( 重水坎 ) 괘에 있음을 다시 한번 강조한다 . ‘ 왕이 사당을 둠에 지극히 한다 ’ 는 것은 구오의 왕이 중정한 자리에 있기 때문이고 , ‘ 큰 내를 건넘이 이롭다 ’ 는 것은 외괘 손풍 ( 巽風 ) ☴ 의 나무 ( 陰木 ) 를 타서 물에 빠져 휩쓸리고 있는 백성을 구제하는 공이 있는 것이다 .", "seogwa": "｢ 전 ｣ 은 중택태괘 다음에 풍수환괘가 온 이유를 다음과 같이 설명하고 있다 . 兌者는 說也니 說而後애 散之라 故로 受之以渙하고 태자    열야    열이후   산지    고    수지이환 태(兌)란 기뻐함이니, 기뻐한 후에 흩어진다. 그러므로 환(渙)으로써 받고 散:흩을 산 태 ( 兌 ) 는 기뻐하는 것이다 . 기뻐하기만 하면 마음과 몸이 다 흩어지게 된다 . 그래서 흩어진다는 풍수환 ( 風水渙 ) 괘를 중택태괘 다음에 두었다 . 그렇지만 보다 바른 의미를 보면 , 뇌화풍괘와 화산려괘에서 구시대 ( 舊時代 ) 를 심판하는 하늘의 재앙이 있게 되고 , 중풍손괘에서 새로운 명을 펴서 중택태괘에서는 백성을 기쁘게 하며 새 시대의 질서에 따르게 하는 의미가 연결되어 있었다 . 이제 보다 큰 차원으로 보면 , 풍수환괘는 중택태괘에서 기뻐하며 따르지 못하고 도탄에 빠져있는 백성을 위하여 기도 ( 祈禱 ) 를 하고 구제하려는 노력을 하는 의미가 있다 .", "gwasa": "渙은 亨하니 王假有廟며 利涉大川하니 利貞하니라. 환    형       왕격유묘    이섭대천      이정 환(渙)은 형통하니, 왕이 사당을 둠에 지극히 하며, 큰 내를 건넘이 이로우니, 바르게 함이 이롭다. 渙:흩어질 환   假:이를 격   廟:사당 묘   涉:건널 섭 물 위에 바람이 행하여 모든 것을 흩어지게 하는 환괘 ( 渙卦 ) 는 새로운 질서를 세우기 위한 것이기에 형통하다 . 나라의 인군이 백성의 흐트러진 마음을 모으기 위해서는 무엇보다도 나라의 근본인 사당을 둠에 지극히 해야 한다 . 흩어진 민심 ( 民心 ) 을 모으고 도탄에 빠진 백성을 구하기 위해 큰 내를 건너고 큰 일을 함이 이로우며 , 이렇게 어려운 시기에는 바르게 해야 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 渙亨은 剛이 來而不窮하고 柔 得位乎外而上同할새라. 단왈 환형    강    래이불궁       유 득위호외이상동 王假有廟는 王乃在中也오 利涉大川은 乘木하야 有功也라. 왕격유묘    왕내재중야    이섭대천    승목      유공야 단전에 말하였다. “환(渙)이 형통함은 강(剛)이 와서 궁하지 않고, 유(柔)가 밖에서 자리를 얻고 위와 같이 하기 때문이다. 왕이 사당을 둠에 지극히 함은 왕이 이에 가운데에 있는 것이고, 큰 내를 건넘이 이롭다는 것은 나무를 타서 공이 있는 것이다.” 乘:탈 승 원래 뇌화풍 ( 雷火 豐 ) 괘와 화산려 ( 火山旅 ) 괘 , 그리고 풍수환 ( 風水渙 ) 괘와 수택절 ( 水澤節 ) 괘는 모두 삼음삼양 ( 三陰三陽 ) 괘로서 , 그 체 ( 體 ) 는 지천태 ( 地 天 泰 ) 괘와 천지비 ( 天 地 否 ) 괘에 있다 . 그런데 앞의 ‘", "gwasangsa": "象曰 風行水上이 渙이니 先王이 以하야 享于帝하며 立廟하니라. 상왈 풍행수상    환       선왕   이       향우제       입묘 상전에 말하였다. “바람이 물 위에 행함이 환(渙)이니, 선왕(先王)이 이를 본받아 상제께 제사를 올리며 묘당(廟堂)을 세웠다.” 享:제사드릴 향   廟: 사당 묘 외괘 손풍 ( 巽風 ) ☴ 의 바람이 내괘 감수 ( 坎水 ) ☵ 의 물 위에 행하는 것이 환괘 ( 渙卦 ) 이다 . 내괘가 감수 ( 坎水 ) ☵ 의 물이니 아래에 있는 백성들이 물에 빠져있고 , 위로는 바람 ☴ 이 행하여 풍파 ( 風波 ) 가 휘몰아치니 천하 백성이 큰 재앙을 받고 있는 상이다 . 이러한 상을 보고 선왕 ( 先王 ) 은 도탄 ( 塗炭 ) 에 빠진 백성을 구하기 위해 , 무엇보다도 나라와 백성의 근간이 되는 상제 ( 上帝 ) 께 제사를 올리고 묘당 ( 廟堂 ) 을 세워 사직을 지켰다 . 이는 어려움에 빠져있는 백성을 구제하기 위해서는 우선 나라와 민족의 근본을 바로 세우고 , 백성의 마음을 한 곳으로 응집해야 함을 말한다 . 《 맹자 ( 孟子 )》 ｢ 이루장구상 ( 離婁章句上 ) ｣ 에 다음과 같은 문장이 있다 . 孟子曰 桀紂之失天下也는 失其民也니 失其民者는 失其心也라. 得天下 有道하니 得其民이면 斯得天下矣리라 得其民이 有道하니 得其心이면 斯得民矣리라. 得其心이 有道하니 所欲을 與之聚之오 所惡를 勿施爾也니라. 맹자께서 말씀하셨다. “걸왕과 주왕이 천하를 잃은 것은 백성을 잃었기 때문이니, 백성을 잃었다는 것은 그 마음을 잃은 것이다. 천하를 얻음에 길이 있으니, 백성을 얻으면 천하를 얻을 것이다. 백성을 얻음에 길이 있으니, 그 마음을 얻으면 백성을 얻을 것이다. 마음을 얻음에 길이 있으니, 원하는 바를 주어서 모이게 하고, 싫어하는 바를 베풀지 말아야 한다.” 효사 및 효상사 初六은 用拯호대 馬 壯하니 吉하니라. 초륙    용증      마 장       길", "hyosa": {"초효": "초육은 구원하되 말이 건장하니 길하다. 拯:건질 증·도울 증    壯:씩씩할 장 초육은 내괘 감수 ( 坎水 ) ☵ 의 맨 아래에 처하여 마치 홍수 ( 洪 水 ) 에 휩쓸려가는 백성과 같다 . 양 자리에 음으로 있으니 자리가 부당하고 , 물 아래에 있으니 도탄에 빠져있다 . 그러나 도탄 ( 塗炭 ) 에 빠진 백성을 구원하는 구이의 건장한 말이 있으니 , 구원을 받아 길하게 된다 . 초육 백성이 구이로부터 구원을 받아 길한
