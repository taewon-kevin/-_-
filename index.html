 . 비록 위 하늘 ☰ 과 아래 물 ☵ 이 어긋나 행하는 형국이 되어 지방 토후세력이 반란을 하는 경우가 있더라도 , 구오의 중정한 자리를 침탈할 수 없으니 크게 길하다 . 象曰 訟元吉은 以中正也라. 상왈 송원길    이중정야 상전에 말하였다. “송사에 크게 길한 것은 가운데하고 바르기 때문이다.”", "상효": "상육에서 드디어 ‘ 不速之客三人 ’ 이 되어 험한 데에서 벗어나 세상에 나오게 되니 , 드디어 경쟁의 현실에 부딪치게 된다 . 사회생활을 하면서 겪는 인생사의 경쟁이요 , 부족 ․ 민족 ․ 국가간의 경쟁이자 전쟁이기도 하다 . 내괘가 감수 ☵ 로 험한 상황을 의미하고 , 외괘는 건천 ☰ 으로 양강한 세상사를 의미한다 . 上九는 或錫之鞶帶라도 終朝三褫之리라. 상구    혹석지반대      종조삼치지 상구는 혹 반대(큰 띠)를 주더라도, 아침이 마치는 동안 세 번 빼앗을 것이다. 錫:줄 석   鞶:큰 띠 반   帶:띠 대   褫:빼앗을 치 상구는 외괘 건천 ( 乾天 ) ☰ 의 극에 처해 있으며 중을 얻지 못하고 음자리에 양으로 강하게 있어 처신을 지나치게 하는 상황이다 . 맨 위에 거하여 지나침을 모르고 무조건 힘으로 모든 것을 해결하려 하니 , 전쟁에서 이기지만 많은 불상사 ( 不祥事 ) 를 초래하게 된다 . 비록 전쟁에 이겨 천자가 상으로 주는 반대 ( 허리에 두르는 관대 ) 를 받더라도 힘으로 제어하는 상황에서 빚어진 원성 ( 怨聲 ) 때문에 반대를 도로 빼앗긴다 . 상구가 변하면 태 ( 兌 ) ☱ 가 되니 훼절당하여 빼앗기고 전성기가 기울어지는 상이다 . 象曰 以訟受服이 亦不足敬也라. 상왈 이송수복    역부족경야 상전에 말하였다. “송사로써 복종을 받음이 또한 족히 공경할만한 것이 아니다.” 受:받을 수   服:복종할 복   敬:공경할 경 상구가 맨 위에 있으면서도 덕으로 해결하지 않고 어떠한 상황이든 전쟁이나 송사를 통해 복종을 받는 것은 공경할만한 일은 아니다 . 송괘(訟卦)의 현대적 의미 송괘는 오늘날의 소송에도 해당하지만 , 원래의 의미는 천하를 쟁패하려는 전쟁이 횡행하던 전국시대 ( 戰國時代 ) 에 해당한다 . 오늘날의 정당 ( 政黨 ) 내 파벌 싸움이나 정당간의 싸움 , 이익단체들의 분쟁 , 나라와 나라 사이의 국제분쟁 등 모든 경우를 이 괘에 비추어 생각해 볼 수 있다 . 국제관계를 예시하면 , 강대국의 핵심이 구오라면 상구와 구사는 강대국과 동맹을 맺고 있는 나라들로 볼 수 있는데 , 상구가 호전적 ( 好戰的 ) 인 국가라면 구사는 구오 강대국의 정책에 순종하는 나라들이다 ."}}, {"num": 7, "ko": "지수사", "hanja": "地水師", "lines": [0, 1, 0, 0, 0, 0], "url": "https://soosanss.tistory.com/159", "post_id": 159, "gwaui": "전쟁 등 큰 일을 수행하기에 앞서 백성을 용납하고 각자의 역할에 맡는 기량을 습득하도록 훈련하라 ( 容民畜衆 ).", "gwamyung": "외괘가 곤지 ( 坤地 ) ☷ , 내괘가 감수 ( 坎水 ) ☵ 로 이루어진 대성괘의 명칭을 ‘ 사 ( 師 ) ’ 라고 한다 . ‘ 사 ( 師 ) ’ 는 무리· 군사를 의미한다 . 전쟁이나 분쟁의 소용돌이가 있게 되면 무리가 움직이고 군사를 일으키게 된다 . 원래 ‘ 사 ( 師 ) ’ 는 주나라 때 군제 ( 軍制 ) 의 한 단위로 2,500 명의 군사를 ‘ 사 ( 師 ) ’ 라 하였다 . 《 주례 ( 周禮 ) 》 ｢ 하관사마 ( 夏官司馬 ) ｣ 편에 다음과 같은 문장이 있다 . 무릇 군 제도에 12,500인이 군(軍)이 되는데, 왕(천자)은 6군(75,000인)이고, 큰 나라(大國)는 3군(37,500인)이고, 다음 나라(次國)는 2군(25,000인)이고, 작은 나라(小國)는 1군(12,500인)이다. 각 군의 장수는 다 경(卿)으로 명하였다. 2,500인이 사(師)가 되는데, 사(師)의 장수는 다 중대부(中大夫)로 하였다. 500인이 려(旅)가 되는데, 려(旅)의 장수는 다 하대부(下大夫)로 하였다. 100인이 졸(卒)이 되는데, 졸(卒)의 우두머리는 다 상사(上士)로 하였다. 25인이 량(兩)이 되는데 량(兩)의 사마(司馬)는 다 중사(中士)로 하였다. 5인이 오(伍)가 되는데, 오(伍)는 다 유장(有長)으로 하였다. 1군(軍)은 2부(府)․6사(史)․서(胥)10인․도(徒)100인으로 구성되었다. (凡制軍에 萬有二千五百人爲軍하니 王은 六軍이요 大國은 三軍이요 次國은 二軍이요 小國은 一軍이라. 軍將은 皆命卿으로 하니라. 二千有五百人爲師니 師帥는 皆中大夫로 하니라. 五百人爲旅니 旅帥는 皆下大夫로 하니라. 百人爲卒이니 卒長은 皆上士로 하니라. 二十五人爲兩이니 兩司馬는 皆中士로 하니라. 五人爲伍니 伍는 皆有長으로 하니라. 一軍은 則二府六史胥十人徒百人이니라.) 천수송 ( 天水訟 ) 괘는 분쟁의 전체적인 정세 ( 政勢 ) 라고 한다면 , 지수사 ( 地水師 ) 괘는 군사를 일으켜 전쟁을 수행하는 병법 ( 兵法 ) 에 해당한다 .", "seogwa": "｢ 전 ｣ 은 천수송괘 다음에 지수사괘가 온 것을 다음과 같이 설명하고 있다 . 訟必有衆起라 故로 受之以師하고 송필유중기    고    수지이사 송사는 반드시 무리로 일어난다. 그러므로 사(師)로써 받고 분쟁이나 전쟁이 있게 되면 반드시 무리로 일어나 대항하게 된다 . 그렇기 때문에 천수송괘 다음에 지수사괘를 둔 것이다 .", "gwasa": "師는 貞이니 丈人이라아 吉코 无咎하리라. 사    정      장인          길    무구 사(師)는 바름이니, 장인(丈人)이라야 길하고 허물이 없을 것이다. 師:군사 사(무리, 스승)   丈:어른 장 ‘ 사 ( 師 ) ’ 는 전쟁에 임하는 것이니 군율 ( 軍律 ) 로써 바르게 해야 하며 , 전쟁을 수행하는 자는 ‘ 장인 ( 丈 人 ) ’ 즉 건장한 성인이어야 길하고 허물이 없게 된다 . 이에 대해 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 師는 衆也오 貞은 正也니 단왈 사    중야    정    정야 能以衆正하면 可以王矣리라. 능이중정       가이왕의 剛中而應하고 行險而順하니 강중이응       행험이순 以此毒天下而民이 從之하니 吉코 又何咎矣리오. 이차독천하이민    종지       길    우하구의 단전에 말하였다. “사(師)는 무리요, 정(貞)은 바름이니, 능히 무리를 바르게 하면 가히 왕이 될 수 있을 것이다. 강한 것이 가운데 해서 응하고, 험함을 행하여도 순하게 하니, 이로써 천하를 괴롭혀도 백성이 따르니 길하고 또 무슨 허물이 있겠는가?” 衆:무리 중   能:능할 능   矣:어조사 의   毒:괴롭힐 독   又:또 우  咎: 허물 구 전쟁은 많은 군사가 동원되는 것이고 군율로 바르게 해야 한다 . 이렇게 무리를 바르게 하면 전쟁에 이겨 , 가히 천하를 다스릴 수 있게 된다 . 사괘 ( 師卦 ) 는 일양오음 ( 一陽五陰 ) 괘인데 ‘", "gwasangsa": "象曰 地中有水 師니 君子 以하야 容民畜衆하나니라. 상왈 지중유수 사    군자 이       용민휵중 상전에 말하였다. “땅 가운데 물이 있는 것이 사(師)니, 군자가 이를 본받아 백성을 용납하고 무리를 기른다.” 容:받아들일 용   畜:기를 휵(쌓을 축)   衆: 무리 중 외괘가 곤지 ( 坤 地 ) ☷ 땅이고 내괘가 감수 ( 坎水 ) ☵ 물이니 , 땅 가운데 물이 있는 상이다 . 땅 가운데 있는 물을 중심으로 모든 생물이 모여들듯이 , 군자는 이러한 상을 보고 본받아 백성을 받아들이고 무리를 기른다 . 지수사 ( 地水師 ) 괘는 일양오음 ( 一陽五陰 ) 괘로 사괘 ( 師卦 ) 의 체 ( 體 ) 는 중지곤 ( 重地 坤 ) 괘에 있다 . 중지곤괘 괘상전과 육이효사의 내용을 음미해 보자 . 象曰 地勢 坤이니 君子 以하야 厚德으로 載物하나니라 . 상전에 말하였다. “땅의 형세가 곤이니, 군자가 이를 본받아 두터운 덕으로 만물을 실어야 한다.” 六二는 直方大라 不習이라도 无不利하니라.", "hyosa": {"초효": "초육은 군사가 나가는데 율령(律令)으로써 하니, 그렇지 않으면 착하더라도 흉하다. 律:법 률   否:아닐 부   臧:착할 장   凶: 흉할 흉 초육은 사괘 ( 師卦 ) 의 맨 아래에 있어 군사가 되는데 , 양자리에 음으로 있어 약하니 , 전쟁에 대비한 훈련을 해야 하는 자리이다 . 군사가 전쟁에 임함에는 군율 ( 軍律 ) 로 엄격한 규칙을 지켜야 하니 , 만일 그렇지 않으면 아무리 전쟁에서 이기고자 노력해도 이길 수 없다 . 象曰 師出以律이니 失律하면 凶也리라. 상왈 사출이률       실률      흉야 상전에 말하였다. “군사가 나가는데 율령으로써 하니, 군율을 잃으면 흉할 것이다.” 失: 잃을 실 군대를 조직하여 군사를 훈련함에 군율을 잃으면 전쟁을 제대로 수행할 수 없게 되니 흉하다 .", "이효": "구이 ’ 효만 강한 양으로 내괘의 중에 있어 나머지 다섯 음의 무리를 통솔하여 전쟁을 수행하는 자리가 된다 . 이렇게 강한 ‘ 구이 ’ 가 내괘에서 가운데하고 응하는 관계인 유약한 인군 ‘ 육이는 곧고 모나고 크다. 익히지 않더라고 이롭지 않음이 없다. 효사 및 효상사 初六은 師出以律이니 否면 臧이라도 凶하니라. 초륙    사출이률      부    장          흉 九二는 在師하야 中할새 吉코 无咎하니 王三錫命이로다. 구이    재사       중      길    무구       왕삼석명 구이는 군사에 있어 가운데 하기 때문에 길하고 허물이 없으니, 왕이 세 번 명을 주도다. 在:있을 재   錫:줄 석   命: 명령 명 구이는 지수사 ( 地水師 ) 괘에 있어 유일한 양 ( 陽 ) 으로 내괘의 중에 있고 , 내호괘가 진 ( 震 ) ☳ 으로 장남 ( 長男 ) 이니 총사령관이 되어 모든 군사를 통솔하는 자리가 된다 . 그래서 구이 사령관이 군위 ( 君位 ) 에 있는 오효 인군의 명을 받아 전쟁을 수행한다 . 내괘의 중을 얻어 길하고 허물이 없으며 , 왕이 여러 번 명을 베풀어 구이를 독려 ( 督勵 ) 한다 . 구이가 변하면 중지곤 ( 重地坤 ) 괘 이효가 되니 , 그 효사에 “ 六二 는 直方大 라 不習 이라도 无不利 하니라 ” 고 되어 있다 . 象曰 在師中吉은 承天寵也오 王三錫命은 懷萬邦也라. 상왈 재사중길    승천총야    왕삼석명    회만방야 상전에 말하였다. “‘재사중길’은 하늘의 은총을 잇는 것이고, ‘왕삼석명’은 만방을 품는 것이다.” 承:이을 승   寵:괼 총(사랑, 은혜)   懷:품을 회  邦:나라 방 ‘ 군사에 있어 중을 얻어 길하다 ’ 는 것은 인군인 육오의 은총을 받는 것이고 , ‘ 왕으로부터 세 번 명을 받는다 ’ 는 것은 왕의 명을 받아 군사를 이끌어 전쟁에 이기니 만방을 품는 것을 의미한다 . 六三은 師或輿尸면 凶하리라. 구이는 내괘의 중을 지켜 군사를 거느리는 장군이다 .", "삼효": "육삼    사혹여시    흉 육삼은 군사가 혹 여럿이 주장하면 흉할 것이다. 或:혹 혹   輿:수례 여·많을 여   尸:주검 시·주장할 시 육삼은 양자리에 음으로 있고 중을 얻지 못하여 , 군대의 기강이 문란하고 통솔의 계통이 무너져 있음을 뜻한다 . 그러니 전략을 세우고 전쟁에 임함에 서로 주장하는 바가 분분하여 일관된 전쟁을 수행할 수 없다 . 이런 상태로 전쟁에 임하면 패하게 되니 흉하다 . 육삼이 변하면 음이 양으로 바뀌어 내괘가 손 ( 巽 ) ☴ 이 되니 사방에 바람이 일어나 의견이 분분하며 , 내호괘가 태 ( 兌 ) ☱ 가 되니 훼절당하는 상이다 . ‘ 여시 ( 輿尸 ) ’ 는 또한 수레에 죽은 시체를 싣고 오는 것과도 통하니 , ‘ 전쟁에서 패하여 수레에 시체만 가득 싣고 오는 것 ’ 을 뜻하기도 한다 . 象曰 師或輿尸면 大无功也리라. 상왈 사혹여시    대무공야 상전에 말하였다. “군사가 혹 여럿이 주장하면 크게 공이 없을 것이다.” 六四는 師左次니 无咎로다.", "사효": "육사    사좌차    무구 육사는 군사가 진영으로 물러나니 허물이 없도다. 左:왼 좌(물러나다)   次:버금 차(진영 ) 육사는 음자리에 음으로 있어 전쟁을 수행함에 전반적인 군사력이 약화된 상황이다 . 육사가 변하면 음이 양으로 바뀌어 외괘가 진 ( 震 ) ☳ 이 되는데 , 후천팔괘에서 진 ☳ 은 동방으로 좌측이 된다 . 좌 ( 左 ) 는 물러나는 것이고 우 ( 右 ) 는 나아가는 것이다 . ‘ 차 ( 次 ) ’ 는 병영 ․ 진영을 의미한다 . 또한 육사가 변한 상태에서 내호괘가 이 ( 離 ) ☲ 가 되니 , 육사 자신의 상항을 밝게 분별하는 상이다 . 그래서 자신의 전력 ( 戰力 ) 이 약함을 알고 전략적으로 진영으로 물러나는 것이니 허물이 없다 . 육사는 진영에 물러나 그동안 지친 병사들을 위로하고 전력을 재정비하여야 한다 . 육사가 변하면 지괘 ( 之卦 ) 가 뇌수해 ( 雷水解 ) 로 되는 데 그 구사 효사에는 다음과 같이 풀이하고 있다 . 九四는 解而拇면 朋至하야 斯孚리라. 구사는 너의 발가락에서 풀면 벗이 이르러 이에 믿을 것이다. 象曰 左次无咎는 未失常也라. 상왈 좌차무구    미실상야 상전에 말하였다. “진영으로 물러나 허물이 없는 것은 떳떳함을 잃지 않는 것이다.” 육사가 물러나는 것은 자신의 전력을 헤아려 작전상 후퇴하는 것이니 , 군사로서의 떳떳함을 잃은 것이 아니다 . 나아갈 줄만 알고 물러날 줄을 모르면 결국 크게 뉘우침만 있을 뿐이다 . 六五는 田有禽이어든 利執言하니 无咎리라.", "오효": "육오 ’ 의 명에 따르고 , 험한 전쟁을 수행하여도 순하게 하는 것이다 . 천하를 괴롭히는 전쟁이라는 가장 험한 일을 수행하여도 백성이 이에 따르니 , 길하고 또 무슨 허물이 있겠는가 ? 육오    전유금         이집언       무구 長子 帥師니 弟子 輿尸하면 貞이라도 凶하리라. 장자 솔사    제자 여시       정         흉 육오는 밭에 새가 있거든 말을 잡음(주장함)이 이로우니, 허물이 없을 것이다. 장자가 군사를 거느리니, 제자가 여럿이 주장하면, 바르게 하더라도 흉할 것이다. 禽:날짐승 금   執:잡을 집   帥:장수 수·거느릴 솔   弟:아우 제 육오는 외괘의 중을 얻어 천하를 다스리는 인군의 자리에 있지만 , 양자리에 음으로 거하여 유약한 인군이다 . 그래서 전쟁에 임하여 육오와 응하고 있는 구이 사령관 ( 장자 ) 에게 명을 내린다 . ‘ 밭에 새가 있다는 것 ’ 은 곡식을 해치는 새가 있는 것이니 적 ( 敵 ) 이 있다는 뜻이고 , ‘ 말을 잡음 ( 주장함 ) 이 이롭다 ’ 는 것은 그 새 ( 적 ) 를 몰아내라고 명을 내리는 것이다 . 그래서 구이 장자 ( 長子 ) 즉 총사령관이 군사를 거느림에 만일 휘하 ( 麾下 ) 의 장군들이 여럿이 주장하게 되면 , 명령 계통이 흩어지게 되어 전쟁에서 바르게 하더라도 흉하게 될 것이다 . 이는 육오 인군이 나약하기 때문에 혹 주변의 말들에 미혹되어 명령에 혼선이 빚어질 수 있음을 경계한 것으로 , 나라를 구해줄 구이 사령관 ( 장자 ) 을 확실히 신임하고 군율이 제대로 서도록 하라는 뜻이다 . 象曰 長子帥師는 以中行也오 弟子輿尸는 使不當也라. 상왈 장자솔사    이중행야    제자여시   사부당야 상전에 말하였다. “장자가 군사를 거느림은 중으로써 행하는 것이고, 제자가 여럿이 주장함은 부림이 마땅하지 않은 것이다.” 使:하여금 사(부릴 사)   當:마땅할 당 육오는 외괘의 중을 지켜 인군이 되고 , 육오나 구이 모두 왕과 사령관으로 중도 ( 中道 ) 로 행함을 말한다 . ‘ 제자가 여럿이 주장한다 ’ 는 것은 육오가 나약한 까닭에 혹 육사 대신 등 주변에서 나오는 말에 휘말리면 , 결국 인군으로서 명을 내려 부리는 것이 마땅치 않게 됨을 말한다 . 上六은 大君이 有命이니 開國承家애 小人勿用이니라. 상륙    대군    유명       개국승가    소인물용 육오 인군이 구이 장수를 잘 부려 전쟁에서 승리하게 되면 , 천하를 새로이 세우게 된다 . 그래서 천하를 통일한 대군 ( 大君 ) 이 명을 두는데 , 모름지기 나라를 열고 가문을 이음에는 소인 ( 小人 ) 을 써서는 안 된다 . 전쟁에 이기고 대군이 되기까지 아무리 충성을 바쳐 도왔다 할지라도 , 나라를 통치하고 경영할 수 있는 그릇이 못되는 소인에게 중책을 맡겨서는 안 된다 . 象曰 大君有命은 以正功也오 小人勿用은 必亂邦也일새라 상왈 대군유명    이정공야    소인물용    필란방야 상전에 말하였다. “대군이 명을 둠은 공을 바르게 하는 것이고, 소인을 쓰지 말라는 것은 반드시 나라를 어지럽히기 때문이다.” 功:공 공   必:반드시 필   亂: 어지러울 란 ‘ 대군이 명을 둔다 ’ 는 것은 그동안 전쟁의 참화를 딛고 승전한 장수들에게 그 공을 바르게 알리고 상을 내리는 것을 말하며 , ‘ 소인을 쓰지 말라 ’ 는 것은 만일 소인을 등용하게 되면 반드시 나라를 어지럽히기 때문이다 . 우리나라 현대 정치사에 있어 정치지도자들이 명심해야 할 경구 ( 警句 ) 이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 186 ∼ 193 쪽 .", "상효": "상육은 대군이 명을 두니, 나라를 열고 가문을 이음에 소인은 쓰지 말라. 開:열 개   承:이을 승   勿: 말 물 상육은 지수사괘의 맨 위에 있어 드디어 전쟁이 끝나고 천하를 얻는 자리이다 ."}}, {"num": 8, "ko": "수지비", "hanja": "水地比", "lines": [0, 0, 0, 0, 1, 0], "url": "https://soosanss.tistory.com/160", "post_id": 160, "gwaui": "전쟁이라는 고통을 딛고 천하를 평정하여 나라를 세우니 올바른 재상을 등용하고 지방 제후를 친히 하라 ( 建國親侯 ). 정쟁 ( 政爭 ) 과 지수사 ( 地水師 ) 전쟁 ( 戰爭 ) 을 거쳐 수지비 ( 水地比 ) 괘에서 천하를 세우게 되니 길하다 . 그러나 새롭게 천하를 세워나가야 하는 때이므로 , 착하고 오래 하고 바르게 하면 허물이 없을 것이다 . 건국이념 ( 建國理念 ) 을 올바로 세우고 , 나라를 세우는 목적을 길이 지켜나가고 또한 바르게 해야 한다 . 그래야 천하 백성도 마음을 편안히 하고 인군을 도와줄 수 있다 . ‘ 편안하지 못하여 바야흐로 온다 ’ 는 것은 중천건 ( 重天乾 ) 의 하늘과 중지곤 ( 重地坤 ) 의 땅이 서로 기운을 교감하여 수뢰둔 ( 水雷屯 ) 에서 만물을 낳아 초창 ( 初 創 ) 하게 되는데 , 이 때는 마치 갓난아기를 출산하여 노심초사 ( 勞心焦思 ) 하며 기르듯이 , 천지부모의 마음은 편안치 못한 것이다 . 그래서 수뢰둔 ( 水雷屯 ) 괘 단전에 “ … 天造草昧 에는 宜建侯 오 而不寧 이니라 ” 고 하였다 . 만물이 처음 나오는 ‘ 둔괘 ’ 에서의 편안치 못함이 산수몽 ( 山 水蒙 ) 정신교육 , 수천수 ( 水天需 ) 육체적 양육 , 천수송 ( 天水訟 ) 정략 , 지수사 ( 地水師 ) 전쟁을 거쳐 , 비로소 천하가 하나가 되어 안정된 평화를 찾게 되니 , ‘ 편안하지 못하다가 바야흐로 편안한 세상이 왔다 ’ 는 의미이다 . 그런데 이렇게 천하가 평화를 찾아 서로 도와나가야 하는 때에 동참하지 않고 뒷전에서 구경만 하게 되면 , 설사 세상을 경륜할 수 있는 대장부라 할지라도 때에 부응하지 못하여 흉하게 된다 . 단전은 다음과 같이 설명하고 있다 .", "gwamyung": "외괘가 감수 ( 坎水 ) ☵ , 내괘가 곤지 ( 坤地 ) ☷ 로 이루어진 괘를 ‘ 비 ( 比 ) ’ 라 한다 . ‘ 비 ( 比 ) ’ 는 돕는 것이다 . 천지 ( 乾坤 ) 의 기운으로 생하여 간둔지제 ( 艱屯之際 ) 를 지나 정신적 교육을 받고 ( 蒙 ) 육체적 기름을 받으면서 때를 기다리다가 ( 需 ) 천하를 쟁패하려는 구상을 하고 ( 訟 ), 드디어 일대 전쟁을 하여 ( 師 ) 천하를 열게 되었다 ( 比 ). 그러니 새로운 천하가 시작되는 ‘ 비 ( 比 ) ’ 괘는 그동안 어려웠던 시대를 마감하고 구오 천자 ( 天子 ) 를 중심으로 서로 도와가면서 나라를 바르게 세워 나가야 함을 뜻한다 .", "seogwa": "｢ 전 ｣ 은 지수사괘 다음에 수지비괘가 온 것을 다음과 같이 설명하고 있다 . 師者는 衆也니 衆必有所比라 故로 受之以比하고 사자    중야    중필유소비   고    수지이비 ‘사(師)’는 무리니, 무리는 반드시 돕는 바가 있다. 그러므로 비(比)로써 받고 군사나 일반 다중 ( 多衆 ) 이나 모두 무리인데 , 무리가 일정 방향으로 지향해 나가려면 반드시 서로 도와야 한다 . 그래서 ‘ 사괘 ’ 다음에 돕는다는 ‘ 비괘 ’ 를 둔 것이다 .", "gwasa": "比는 吉하니 原筮호대 元永貞이면 无咎리라. 비    길       원서      원영정       무구 不寧이어야 方來니 後면 夫라도 凶이리라. 불녕          방래   후    부       흉 ‘비(比)’는 길하니, 처음 점을 하되 원(元)하고 영(永)하고 정(貞)하면 허물이 없을 것이다. 편안하지 못하여 바야흐로 오니, 뒤에 하면 대장부라도 흉할 것이다. 比:견줄 비·도울 비   原:처음 원   筮:점칠 서   永:길 영   寧:편안할 녕  方:바야흐로 방  來:올 래   後:뒤 후   夫: 사내 부 천수송 ( 天水訟 ) 의 ‘ 後夫凶 ’ 이 되는 자리이다 .", "danssa": "彖曰 比는 吉也며 比는 輔也니 下 順從也라. 단왈 비    길야    비    보야   하 순종야 原筮元永貞无咎는 以剛中也오 원서원영정무구    이강중야 不寧方來는 上下 應也오 後夫凶은 其道 窮也라. 불녕방래    상하 응야    후부흉    기도 궁야 단전에 말하였다. “비(比)는 길하며 비는 돕는 것이니, 아래가 순하게 좇는 것이다. ‘원서원영정무구’는 강으로 가운데 함이요, ‘불녕방래’는 위와 아래가 응함이요, ‘후부흉’은 그 도가 궁한 것이다.” 補:도울 보   應:응할 응   窮:궁할 궁 수지비 ( 水地比 ) 괘는 내괘가 곤지 ( 坤 地 ) ☷ 로 백성이 순하고 외호괘가 간산 ( 艮山 ) ☶ 으로 덕을 갖추고 있으니 , 아래의 백성이 덕을 갖춘 인군에게 순종함을 의미한다 . 유일한 양인 구오가 외괘 오효 자리에 있어 중을 얻었으니 ,", "gwasangsa": "象曰 地上有水 比니 先王이 以하야 建萬國하고 親諸侯하니라. 상왈 지상유수 비    선왕    이      건만국       친제후 상전에 말하였다. “땅 위에 물이 있는 것이 비(比)니, 선왕이 이를 본받아 만국을 세우고 제후를 친히 하였다.” 建:세울 건   親:친할 친   諸:모두 제   侯: 제후 후 수지비 ( 水地比 ) 괘는 땅 위에 물이 있는 상이다 . 땅 위에 있는 물은 사방에 흘러 땅을 윤택하게 젖게 한다 . 예로부터 선대의 왕은 이러한 기운을 보고 지방에 제후를 봉하여 제후국 ( 諸侯國 ) 을 두면서 만국을 세우고 아울러 제후와 친교를 맺었다 . 이는 천자 ( 天子 ) 로서 평화를 선양하기 위해 이민족 ( 異民族 ) 의 땅에도 제후를 봉하여 나라를 세우고 또한 모든 제후와 선린정책 ( 善隣政策 ) 을 강화함으로써 나라를 안전하게 유지했다는 말이다 . 오늘날의 의미로 본다면 , 국내적으로는 지방정치를 잘하도록 지방 관료를 잘 선임해야 하고 또한 지방 관리들을 잘 독려해야 한다는 것이고 , 국제적으로 본다면 자기 나라의 정책에 잘 동조해 갈수 있는 동맹국 ( 同盟國 ) 을 두루 두어 그런 나라들과의 평화선린외교 ( 平和善隣外交 ) 를 잘 펼쳐 나가야 한다는 것을 의미한다 . 효사 및 효상사 初六은 有孚比之라아 无咎리니 有孚 盈缶면 終애 來有他吉하리라. 초륙    유부비지      무구       유부 영부    종    래유타길", "hyosa": {"초효": "초육은 믿음을 두고 도와야 허물이 없을 것이니, 믿음을 둠이 질그릇에 가득하면, 마침내 다른 길함이 있어 올 것이다. 孚:미쁠 부   盈:찰 영   缶:장군 부(질그릇)   他:다를 타 초육은 맨 아래 백성자리이다 . 양자리에 음으로 있어 오랜 전쟁의 소용돌이에서 피폐한 상태이다 . 백성 상호간에 서로 도와야 하고 응하는 자리인 육사 대신에게도 협조를 잘 해야 한다 . 잘 살수 있다는 믿음을 두고 서로 도와야 허물이 없고 , 그러한 믿음이 질그릇에 가득 찰 정도로 강하면 마침내 길하게 된다 . ‘ 다른 길함이 있어 온다 ’ 는 것은 하늘의 은총을 받는 것이고 , 또한 구오 왕으로부터 복을 받는다는 것을 뜻한다 . 象曰 比之初六은 有他吉也니라. 상왈 비지초륙    유타길야 상전에 말하였다. “‘비(比)의 초육’은 다른 길함이 있는 것이다.” 다른 길함이 있다는 것은 초육이 응하는 자리가 육사 대신이어서 초육이 육사 대신을 도와 열심히 일하지만 , 정작 육사 대신이 아닌 구오 천자로부터 복을 받는다는 것이다 . 천하의 근본은 백성이니 , 초육 백성이 구오 왕으로부터 복을 받는다는 것은 나라가 평화롭게 됨을 의미한다 . 六二는 比之自內니 貞하야 吉토다.", "이효": "육이    비지자내    정      길 육이는 돕는 것을 안으로부터 하니, 바르게 하여 길하도다. 自:부터 자·스스로 자 육이는 내괘의 중을 얻고 음자리에 음으로 있으니 중정 ( 中正 ) 하고 , 역시 외괘에서 중정한 구오 왕과 잘 응하고 있다 . 전쟁이 끝나고 천하가 서로 도와 나가야 하는 상황에서 , 육이는 스스로 구오 천자를 도와준다고 나서면 안 된다 . 즉 , 육이는 내괘에서 중도를 지키면서 초육 백성을 잘 도와야 한다 . 또한 마음의 중도를 잘 지켜 나가야 한다 . 象曰 比之自內는 不自失也라. 상왈 비지자내    부자실야 상전에 말하였다. “돕는 것을 안으로부터 하는 것은 스스로 잃지 않는 것이다.” 육이가 안으로부터 돕는다는 것은 육이가 중정한 마음으로 스스로의 본분을 잃지 않는 것이다 . 六三은 比之匪人이라.", "삼효": "육삼    비지비인 육삼은 돕는데 사람이 아니다. 匪:아닐 비 육삼은 양자리에 음으로 거하고 중도 얻지 못한 상태이며 ( 失位不中 ), 또한 상육과는 같은 음으로 응하지도 않는다 ( 不應 ). 그러니 모두가 협력하여 나가야 하는 시대적 상황에 전혀 부응하지 못하여 사람다운 역할을 하지 못하는 상황이다 . 象曰 比之匪人이 不亦傷乎아. 상왈 비지비인    불역상호 상전에 말하였다. “돕는데 사람 아님이 또한 상하지 않겠는가?” 亦:또 역   傷:상할 상   乎: 어조사 호 나라를 세우고 천하가 친화하는 때에 모두가 협력해 나가야 함에도 불구하고 ‘ 육삼 ’ 은 이러한 시대적 상황에 부응하지 못하여 사람 역할을 못하니 결국 상하게 된다 . 육삼이 변하면 음이 양으로 바뀌면서 수산건 ( 水山蹇 ) 괘로 되니 , 상하여 다리를 저는 양상이 된다 . 384 효사를 풀이한 효상전 ( 소상전 ) 의 문장은 모두 ‘ 也 ’ 자로 매듭을 짓고 있는데 , 다만 이 수지비괘 육삼 효상사와 하경의 택화혁괘 구삼 효상사의 두 곳에만 달리 하고 있다 . 즉 , 수지비괘 육삼 효상사는 ‘ 乎 ’ 자로 매듭짓고 , 택화혁괘 구삼 효상사는 ‘ 矣 ’ 자로 매듭지었다 ( 象曰 革言三就 어니 又何之矣 리오 ). 六四는 外比之하니 貞하야 吉토다. 육삼은 ‘ 比之匪人 ’ 이요 상육은 ‘ 比之无首 ’ 니 , 모두가 협력하여 도와야 하는 상황에서도 육삼과 같은 비협력자 ( 非協力者 ) 도 있고 상육과 같은 방관자 ( 傍觀者 ) 도 있는 것이다 . 象曰 比之无首 无所終也니라. 상왈 비지무수 무소종야 상전에 말하였다. “돕는데 머리가 없음은 마칠 바가 없는 것이다.” 모두가 돕는데 등을 돌리고 있으니 , 아무리 스스로 역량이 있다고 한들 그 역할을 제대로 할 수 없을 것이다 . 남들은 밥을 먹기 위해 협력하며 일하고 있는데 , 남들이 차린 밥을 앉아서 먹고자 하는 격이니 , 마칠 바가 있을 수 없다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 194 ∼20 1 쪽 .", "사효": "육사    외비지       정      길 육사는 밖으로 도우니, 바르게 하여 길하도다. 육사는 음 자리에 음으로 있어 자리가 바르고 ( 得位 ) 대신으로서의 역할을 하는 자리이다 . 밖으로 돕는다는 것은 육이가 내괘에서 안을 돕는 것과 마찬가지로 , 육사는 외괘에서 밖을 도와야 한다 . 특히 대신으로서 구오 왕을 도와야 함을 물론이다 . 象曰 外比於賢은 以從上也라. 상왈 외비어현    이종상야 상전에 말하였다. “밖으로 어진 이를 돕는 것은 위를 좇는 것이다.” 육사가 외괘에서 밖을 돕는 것은 어진 이를 돕는 것이고 , 이는 곧 위에 있는 구오 왕을 따르는 것이다 .", "오효": "구오 왕은 나라를 세우고 천하를 친히 함에 ‘ 처음부터 착하고 길이 바르게 해야 ’ 허물이 없다 . ‘ 편안하지 못하다가 바야흐로 편안한 세상이 오게 된 것 ’ 은 위의 인군과 아래의 백성이 서로 응하기 때문이다 . ‘ 뒤에 하면 대장부라도 흉하다 ’ 는 것은 모두가 구오를 도와 나라를 평화롭게 만들어가는 때에 상육효와 같이 때를 놓치고 함께 하지 못하면 그 도가 궁해짐을 말한다 . 九五는 顯比니 王用三驅에 失前禽하며 邑人不誡니 吉토다. 구오    현비    왕용삼구    실전금       읍인불계   길 구오는 나타나게 도우니, 왕이 세 군데로 모는 것을 씀에 앞의 새를 잃으며, 읍 사람이 경계하지 않으니 길하도다. 顯:나타날 현   驅:몰 구   誡:경계할 계 구오는 외괘에서 중정하여 천하를 다스리는 위치에 있다 . 만백성이 서로 도와 나아가고 있는 상황에서 구오 천자는 현명하게 밝게 처신하여 백성을 도와야 한다 . 천자로서 백성을 돕는 것은 정치를 잘하는 것이다 . 예컨대 왕이 사냥을 하여 짐승을 잡더라도 한 쪽을 열어 놓고 몰아가는 삼구법 ( 三驅法 ) 을 써서 살고자 하는 동물을 살려 보내면 , 사냥터 주변의 읍 사람도 그러한 인군의 덕에 감동하여 경계하지 않는다 . 이는 왕으로서 모든 백성에게 서로 도움을 권면하더라도 , 백성이 편안히 쉴 수 있는 여지를 만들어야 한다는 것을 의미한다 . 象曰 顯比之吉은 位正中也오 舍逆取順이 失前禽也오 상왈 현비지길    위정중야    사역취순    실전금야 邑人不誡는 上使 中也일새라. 읍인불계    상사 중야 상전에 말하였다. “나타나게 도와 길함은 자리가 바르고 가운데 하기 때문이고, 거스르는 것은 버리고 순한 것을 취함이 앞의 새를 잃음이요, 읍 사람이 경계하지 않음은 위에서 부림이 가운데 하기 때문이다.” 舍:버릴 사(집 사)   逆:거스를 역   取:취할 취   使: 부릴 사 육오 왕이 백성을 현명하게 돕는 것은 그 자리가 정중 ( 正中 ) 하기 때문이다 . 삼구법 ( 三驅法 ) 을 써서 살고자 하여 거스르는 것은 살게 놔두고 명이 다하여 순하게 잡히는 것을 취하는 것은 마치 살고자 하여 도망가는 앞의 새를 놔두는 것과 같다 . 읍 사람이 경계하지 않는 것은 왕으로서 중도로 정치를 잘 하기 때문이다 . 上六은 比之无首니 凶하니라. 상륙    비지무수    흉", "상효": "상육은 돕는데 머리가 없으니 흉하다. 首:머리 수 상육은 수지비괘의 맨 위에 처하여 자리만 높은 상태이다 . 모두가 구오를 중심으로 협력하고 있는데 , 상육은 뒷전에서 등을 돌리고 있으니 머리가 없는 것이다 ."}}, {"num": 9, "ko": "풍천소축", "hanja": "風天小畜", "lines": [1, 1, 1, 0, 1, 1], "url": "https://soosanss.tistory.com/161", "post_id": 161, "gwaui": "문명과 문화를 아름답게 하고 덕을 길러라 ( 懿文畜德 ). 쟁란이 끝나고 , 평화로운 세상이 되어 문명과 문화를 쌓아가는 것이 ‘ 소축 ’ 이니 형통하다 . 소축괘는 내괘가 건천 ( 乾天 ) ☰ , 내호괘가 태택 ( 兌澤 ) ☱ , 외호괘가 이화 ( 離火 ) ☲ , 외괘가 손풍 ( 巽風 ) ☴ 이다 . 이를 기운의 양상으로 살펴보면 , 내호괘 연못이 외호괘 불의 작용으로 수증기가 올라가 구름이 만들어지나 외괘의 바람 ( 西風 ) 이 불어서 구름이 비를 내리지 못하는 상이다 . 그래서 구름은 빽빽하게 생기지만 바람이 불어 비는 오지 않는 것이며 , 이는 아직 때가 이르지 않았음을 뜻한다 . ‘ 내가 서쪽 들로부터 함이라 ’ 는 것은 내호괘 태 ☱ 가 후천팔괘로 서방이니 서풍 ( 西風 ) 이 부는 것을 말한다 . ‘ 密雲不雨 自我西郊 ’ 는 또한 문왕 ( 文王 ) 이 서백 ( 西伯 ) 으로 있을 때 , 은나라 주왕 ( 紂王 ) 의 폭정에 백성들은 문왕의 선정 ( 善政 ) 을 갈구하지만 , 문왕이 유리지방에 있는 옥에 갇혀 있어 백성을 위한 정치를 하지 못하는 안타까움을 나타낸 문왕 자신의 표현으로 볼 수도 있다 . ‘ 密雲不雨 自我西郊 ’ 는 화두 ( 話頭 ) 요 공안 ( 公案 ) 이다 . 단전은 다음과 같이 설명하고 있다 .", "gwamyung": "외괘가 손풍 ( 巽風 ) ☴ , 내괘는 건천 ( 乾天 ) ☰ 으로 되어 있는 괘의 이름을 ‘ 소축 ( 小畜 ) ’ 이라 한다 . 내괘의 하늘 ☰ 위에 바람 ☴ 이 불듯이 ,", "seogwa": "｢ 전 ｣ 은 수지비괘 다음에 풍천소축괘를 둔 이유를 다음과 같이 설명하고 있다 . 比者는 比也니 比必有所畜이라 故로 受之以小畜하고 비자    비야    비필유소축      고    수지이소축 비(比)라는 것은 도움이니, 도우면 반드시 쌓는 바가 있다. 그러므로 소축으로 받고 畜 : 쌓을 축 서로 도우면 반드시 좋은 결실을 쌓아갈 수 있다 . 그렇기 때문에 수지비괘 다음에 풍천소축괘를 둔 것이다 .", "gwasa": "小畜은 亨하니 密雲不雨는 自我西郊일새니라. 소축    형       밀운불우   자아서교 소축은 형통하니 구름이 빽빽하되 비가 오지 않은 것은 내가 서쪽 들(西郊)로부터 하기 때문이다 . 畜:쌓을 축·기를 휵  密:빽빽할 밀   雲:구름 운   自:부터 자   郊:들 교(성 밖 ) ‘ 천수송 ’ 괘와 ‘ 지수사 ’", "danssa": "彖曰 小畜은 柔 得位而上下 應之할새 曰小畜이라. 단왈 소축    유 득위이상하 응지       왈소축 健而巽하며 剛中而志行하야 乃亨하니라. 건이손       강중이지행      내형 密雲不雨는 尙往也오 自我西郊는 施未行也라. 밀운불우    상왕야    자아서교    시미행야 단전에 말하였다. “소축(小畜)은 유(柔)가 제자리를 얻어 위와 아래가 응하기 때문에, 소축(小畜)이라 이른다. 굳건하고 겸손하며, 강한 것이 가운데하고 뜻이 행해서, 이에 형통하다. ‘구름이 빽빽하되 비가 오지 않는 것’은 오히려 가는 것이고, ‘내가 서교로부터 함’은 베풂이 행해지지 않는 것이다.” 健:굳셀 건   巽:공손할 손   乃:이에 내   尙:오히려 상   施: 베풀 시 소축 ( 小畜 ) 괘에서 유일한 음효인 육사가 음 자리에 제자리를 얻어 위의 양 (", "gwasangsa": "象曰 風行天上이 小畜이니 君子 以하야 懿文德하나니라. 상왈 풍행천상    소축       군자 이       의문덕 상전에 말하였다. “바람이 하늘 위에 행하는 것이 소축이니, 군자가 이를 본받아 문덕을 아름답게 한다.” 懿: 아름다울 의 소축괘는 바람이 하늘 위에 행하는 상이다 . 군자가 이러한 기운의 양상을 보고 본받아 , 문명과 문화의 덕을 아름답게 한다 . 문명과 문화는 하루아침에 이루어지는 것이 아니다 . 하늘 위로 바람이 불면서 천지 기운의 변화가 차츰 차츰 이루어지듯이 문명과 문화의 발전은 조금 조금씩 이루어진다 . 이는 또한 문왕의 덕을 아름답게 한다는 의미로 풀이할 수도 있다 . 효사 및 효상사", "hyosa": {"초효": "초구 ․ 初九는 復이 自道어니 何其咎리오 吉하니라. 초구    복    자도      하기구       길 초구는 회복함이 도(道)로부터 하니, 어찌 그 허물이겠는가? 길하다. 復: 돌아올 복 초구는 전쟁이 끝나고 천하가 평정해져 새로이 평화로운 세상을 만들어 가는 첫 자리이며 , 일반 백성의 자리이다 . 양자리에 양으로 제자리를 얻었으니 , 도 ( 道 ) 로 회복한다 . 한편 천하를 평정하려는 전쟁의 상황에서는 살인과 파괴가 불가피하게 행해졌지만 , 평화로운 질서로 나아가는 데는 인간 본연의 도 ( 道 ) 로 회복해야 한다 . 이렇게 하면 백성으로서 무슨 허물이 있겠는가 ? 象曰 復自道는 其義吉也라. 상왈 복자도    기의길야 상전에 말하였다. “회복함이 도로부터 함은 그 뜻이 길한 것이다.” 평화로운 세상을 만들고자 하는 뜻 , 문명과 문화를 발전시키고 인간의 본성을 회복한다는 뜻 자체가 길한 것이다 .", "이효": "구이 ․ 구이와 구오의 강이 내괘와 외괘에서 중을 얻어 그 뜻이 행해지니 이에 형통하다 . ‘ 구름이 빽빽하되 비가 오지 않는 것 ’ 은 구름이 머무르지 않고 오히려 바람때문에 지나가는 것이고 , ‘ 내가 서교로부터 ’ 라는 것은 문왕의 선정 ( 善政 ) 이 행해지지 않는 것이다 . 九二는 牽復이니 吉하니라. 구이    견복       길 구이는 이끌어서 회복하니 길하다. 牽:끌 견 두 번째 구이는 내괘의 중을 지켜 중도로 회복할 뿐만 아니라 , 아래 초구가 회복하는 것을 이끌어주는 자리이다 . 그러므로 길하다 . 象曰 牽復은 在中이라 亦不自失也라. 상왈 견복    재중       역부자실야 상전에 말하였다. “이끌어서 회복함은 가운데 있기 때문이다. 또한 스스로 잃지 않는다.” 구이가 초구를 이끌어 회복한다는 것은 구이가 내괘의 중을 지키고 있기 때문이고 , 또한 스스로의 본분을 잃지 않는 것이다 .", "삼효": "구삼 ) 이 응하기 때문에 ‘ 소축 ’ 이라 한다 . 즉 육사 음이 제자리를 얻고 나머지 다섯 양이 응하고 있으니 , 음 하나가 다섯 양을 그치게 하여 소축인 것이다 . 괘덕으로 보면 내괘 건천 ( 乾天 ) ☰ 으로 굳세고 외괘 손풍 ( 巽風 ) ☴ 으로 겸손하며 , 九三은 輿說輻이며 夫妻反目이로다. 구삼    여탈복       부처반목 구삼은 수레의 바퀴살을 벗기며 남편과 아내가 반목하도다. 輿:수레 여   說:벗길 탈(말씀 설)   輻:바퀴살 복   妻:아내 처   反: 뒤집을 반 문명을 차츰 이루어 감에 있어서도 , 설사 전쟁은 아니더라도 어긋나는 상황은 있다 . 소축괘의 호괘가 화택규 ( 火 澤 睽 ) 로 어긋나는 상황이 내재되어 있는데 그 핵심 자리가 구삼이다 . 구삼은 양자리에 양으로 있어 지나치게 강하고 중을 얻지 못하였다 . 모두가 화목하게 문화를 이루어야 하는데 , 구삼은 바로 위에 있는 육사 음을 능멸하며 불화 ( 不和 ) 를 초래한다 . 문명의 덕을 이루어가는 수레바퀴의 바퀴살을 벗겨 어긋나게 하고 또한 외괘의 육사를 꺼려 반목하는 상이다 . 象曰 夫妻反目은 不能正室也라. 상왈 부처반목    불능정실야 상전에 말하였다. “남편과 아내가 반목함은 능히 집안을 바르게 하지 못하는 것이다.” 能:능할 능   室: 집 실 구삼의 상태는 어긋나게 행하고 반목하여 집안을 바르게 하지 못하는 것이다 . 六四는 有孚면 血去코 惕出하야 无咎리라.", "사효": "육사 음 ( 陰 ) 이 다섯 양 ( 陽 ) 을 쌓아간다는 뜻이다 . ‘ 수뢰둔 ’ 괘에서 어렵게 시작된 경륜이 ‘ 수지비 ’ 괘에서 드디어 전쟁의 참화를 끝내고 만국을 세우게 되었으니 , 이제 아름다운 문명과 문화의 덕을 조금씩 쌓아나가는 것이다 . 파괴되는 것은 한 순간이지만 , 문명을 쌓아나가는 것은 차츰차츰 조금씩 쌓아 나가야 한다 . 육사    유부    혈거    척출      무구 육사는 믿음을 두면 피가 사라져 가고 두려운 데서 나와서 허물이 없을 것이다. 去:갈 거   惕:두려워할 척 육사는 소축괘의 유일한 음으로 다섯 양을 상대하고 있다 . 음 자리에 음으로 유약하지만 제자리를 얻어 대신 ( 大臣 ) 으로서의 본분을 수행하는 자리다 . 강한 다섯 양을 상대하고 또한 아래 구삼이 반목하고 무시하는 상황에서 위험한 상태도 있을 수 있으니 두려운 상황이다 . 그러나 믿음을 두고 구오 왕의 명을 받드는 대신 ( 大臣 ) 으로서의 본분을 지키면 , 위험이 사라지고 두려운 데서도 나오게 되어 허물이 없게 된다 . 음이기에 ‘ 피 ( 血 ) ’ 라 하였다 . 象曰 有孚惕出은 上合志也라. 상왈 유부척출    상합지야 상전에 말하였다. “믿음을 두어 두려운 데서 나옴은 위와 뜻이 합해서이다.” 육사가 위험하고 두려운 데에서 벗어날 수 있는 것은 대신으로서 구오 왕과 뜻을 합하기 때문이다 .", "오효": "구오 ․ 九五는 有孚라 攣如하야 富以其隣이로다. 구오    유부    연여      부이기린 구오는 믿음을 둔다. 이끌어서 부함을 그 이웃으로써 하도다. 攣:걸릴 련(이끌 련)   富:부할 부   隣:이웃 린 구오는 평화로운 문명세계를 이끌어가는 왕의 자리이다 . 외괘에서 중정한 자리에 있으니 천하를 잘 다스려 나가야 한다 . 설사 어긋나는 상황이 있더라도 모든 백성에게 믿음을 두고 잘 이끌어가야 하며 , 문명의 발전으로 이루어지는 부유 ( 富裕 ) 를 이웃과 함께 , 즉 백성과 함께 하여야 한다 . 이것이 올바른 정치 , 백성을 위한 정치의 표상이다 . 象曰 有孚攣如는 不獨富也라. 상왈 유부연여    부독부야 상전에 말하였다. “믿음을 두고 이끄는 것은 홀로 부하려 하지 않는 것이다.” 獨:홀로 독 구오 왕의 정치 , 즉 백성에게 믿음을 두고 이끌어가는 것은 천하를 위하고 백성을 위하는 마음을 실천으로 옮겨 , 홀로 부유하려고 하지 않는 것이다 .", "상효": "상구 ) 과 아래의 양 ( 上九는 旣雨旣處는 尙德하야 載니 婦 貞이면 厲하리라. 月幾望이니 君子 征이면 凶하리라. 상구    기우기처    상덕       재   부 정       려          월기망       군자 정       흉 상구는 이미 비가 오고 이미 그침은 덕을 숭상하여 가득하니, 아내가 곧게만 하면 위태할 것이다. 달이 거의 보름이니 군자가 가면 흉할 것이다. 旣:이미 기   處:곳 처·머무를 처   尙:숭상할 상   載:실을 재·가득할 재   婦:아내 부 厲:위태할 려   幾:거의 기   望:바랄 망·보름 망   征:갈 정·칠 정 상구는 구름이 빽빽한데 비가 오지 않는 상황이 극에 달하여 , 비가 내리다가 그치는 상태가 된다 . 상구가 변하면 감수 ( 坎水 ) ☵ 가 되어 비가 내린다 . 외괘 손풍 ☴ 은 후천팔괘로 동남방이니 동남방의 물은 비가 되어 내린다 . 은혜로운 비를 기다리는 민심에 응하여 비가 내리니 , 덕을 숭상하여 가득 실은 것이다 . 그렇지만 덕만 베풀어서는 오히려 위태롭게 된다 . 외괘가 손풍 ☴ 으로 장녀 ( 長女 ) 니 아내 ( 지어미 ) 라 한 것이고 , 음이 극성하여 드디어 비가 내리니 음덕 ( 陰德 ) 이 된다 . 소축괘가 안으로는 화택규 ( 火 澤 睽 ) 의 어긋남이 있으니 , 어긋남을 바로 잡는 노력도 있어야 한다 . 그리고 음기 ( 陰氣 ) 가 극성하여 마치 달이 거의 보름인 것과 같으니 , 이렇게 음이 극성할 때 군자가 가면 자신의 본 뜻을 발휘할 수 없어 흉하게 된다 . 기망 ( 幾望 ) 은 14 일 달이고 , 이망 ( 已望 ) 은 보름달이며 , 기망 ( 旣 望 ) 은 16 일 달을 말한다 . 象曰 旣雨旣處는 德이 積載也오 君子征凶은 有所疑也니라. 상왈 기우기처    덕    적재야 군자정흉    유소의야 상전에 말하였다. “이미 비가 오고 이미 그치는 것은 덕이 쌓여서 가득함이고, 군자가 가면 흉한 것은 의심할 바가 있는 것이다.” 積:쌓을 적   疑:의심할 의 이미 비가 오고 또 이미 그치는 것은 덕을 크게 쌓아 가득하기 때문이고 , 음기가 극성할 때 군자가 가는 것은 자기 뜻과는 무관하게 의심을 받게 되는 것이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 202 ∼20 9 쪽 ."}}, {"num": 10, "ko": "천택이", "hanja": "天澤履", "lines": [1, 1, 0, 1, 1, 1], "url": "https://soosanss.tistory.com/162", "post_id": 162, "gwaui": "밟아 온 이력과 역사를 보아 백성의 뜻을 잘 분별하여 정하라 ( 辯定民志 ).", "gwamyung": "외괘는 건천 ( 乾天 ) ☰ , 내괘는 태택 ( 兌澤 ) ☱ 으로 이루어진 괘를 ‘ 이 ( 履 ) ’ 괘라고 한다 . 밟아가는 것 , 밟아 온 이력 ( 履歷 ) 을 말한다 . 첫 번째인 중천건 ( 重天乾 ) 괘로부터 시작해 열 번째인 천택리 ( 天澤履 ) 괘에 이르기까지가 거대한 대하드라마이다 . 천지창조가 이루어지고 만물이 처음 생하면서 어렵고 몽매하고 기다리고 다투고 전쟁하고 만국을 세워 도와 나가고 문명을 쌓아가는 것이 인류 역사의 큰 줄거리가 된다 . 그 밟아 온 이력을 ‘ 천택리 ’ 괘에서 돌아보는 것이다 . 천간 ( 天干 ) 이 갑 ( 甲 ) 에서 시작하여 열 번째 계 ( 癸 ) 에서 끝나는 것과 같다 . 인생사 , 사회사 , 인류사가 다 이러한 과정으로 역사 ( 歷史 ) 를 이루어가고 있는 것이다 . 후천팔괘방위로 볼 때 건 ☰ 은 서북방이고 , 태 ☱ 는 서방이니 가을에 추수를 거두어 결실을 맺고 겨울의 휴식기에 들어가기에 앞서 , 봄부터 씨를 뿌리며 일해 온 이력을 돌이켜 보는 것이다 . 하늘은 위에 있고 연못은 아래에 있으니 , 하늘을 우러러 나의 심연 ( 心淵 ) 에 부끄럼이 있었는지 돌이켜 보는 것이다 . ‘ 천택리 ’ 괘는 ‘ 중천건 ’ 괘에 체 ( 體 ) 를 두고 있다 . 중천건괘 구삼효가 동하여 천택리괘가 되니 중천건괘 구삼효사를 다시 음미해 보자 .", "seogwa": "｢ 전 ｣ 은 풍천소축괘 다음에 천택리괘를 둔 이유를 다음과 같이 설명하고 있다 . 物畜然後에 有禮라 故로 受之以履하고 물축연후    유례    고    수지이리 물건을 쌓은 연후에 예가 있다. 그러므로 이괘(履卦)로써 받고 문명이 점차 쌓여 나가고 , 또한 물건이 쌓이게 되면 질서가 필요하고 예 ( 禮 ) 가 필요하다 . 경쟁과 전쟁을 겪고 천하를 쟁패하려고 하지만 , 서로를 인정하고 더불어 살아가는 지혜가 필요하며 이를 통해 공존공영 ( 共存共榮 ) 하는 사회적 징표는 예 ( 禮 ) 이다 . 그래서 소축괘 다음에 예 ( 禮 ) 를 의미하는 이괘 ( 履卦 ) 를 두었다 .", "gwasa": "履虎尾라도 不咥人이라 亨하니라. 이호미       부질인      형 호랑이 꼬리를 밟더라도 사람을 물지 않는다. 형통하다. 履:밟을 리   虎:범 호   尾:꼬리 미   咥:물을 질 인간의 삶은 아슬아슬하다 . 평범한 인간의 삶이란 한치 앞도 내다볼 수 없으며 , 그러한 존재들이 더불어 살고 있는 이 사회 역시 하루하루의 변화를 예측하기가 어렵다 . 그러니 , 마치 호랑이 꼬리를 밟고 있는 듯 조심조심 살아가야 한다 . 내괘 태택 ( 兌澤 ) ☱ 은 후천팔괘방위로 서방 ( 西方 ) 으로 백호 ( 白虎 ) 를 상징하니 호랑이를 의미한다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰履는 柔履剛也니 說而應乎乾이라 단왈리    유리강야    열이응호건 是以履虎尾不咥人亨이라. 시이이호미부질인형 剛中正으로 履帝位하야 而不疚면 光明也라. 강중정       이제위      이불구     광명야 단전에 말하였다. “이(履)는 유가 강에 밟힘이니, 기쁨으로 하늘에 응한다. 이로써 호랑이 꼬리를 밟아도 사람을 물지 않으니 형통하다. 강건하고 중정함으로 황제의 자리를 밟아 병폐가 없으면 광명하다.” 說:기쁠 열(말씀 설․벗길 탈)   應:응할 응   帝:임금 제   疚:오랜 병 구 ‘ 호랑이 꼬리를 밟는다 ’ 는 것은 육삼의 음 ( 陰 ) 이 외괘의 강한 하늘에 밟혀 있는 것을 말한다 . 그런데 내괘의 태 ☱ 가 기쁨으로 외괘의 하늘 ☰ 에 응하고 있기 때문에 , 호랑이 꼬리를 밟더라도 물지 않아 형통하다 . 특히 ‘ 이괘 ( 履卦 ) ’ 에서 구오는 외괘의 중정한 자리에 있는데 ,", "gwasangsa": "象曰 上天下澤이 履니 君子 以하야 辯上下하야 定民志하나니라. 상왈 상천하택    이    군자 이 변상하       정민지 상전에 말하였다. “위는 하늘이고 아래는 못이 이(履)니, 군자가 이를 본받아 위아래를 분별하여 백성의 뜻을 정한다.” 辯:분별할 변   定:정할 정   志:뜻 지 천택리괘는 외괘가 하늘 ☰ 내괘가 연못 ☱ 으로 되어 있고 , 내호괘가 이화 ( 離火 ) ☲ 요 외호괘가 손풍 ( 巽風 ) ☴ 이니 , 하늘에 있는 태양이 연못 위에 비추는데 바람에 물결이 일면서 빛이 반짝이는 상이다 . 태양은 하나이고 진실은 저기에 있건만 , 세간 ( 世間 ) 에 떠도는 풍문 ( 風聞 ) 이 진실처럼 느껴지고 온갖 착각의 환영 ( 幻影 ) 이 진실을 왜곡 ( 歪曲 ) 하고 있다 . 연못에 비치는 하늘이 진짜 하늘과 같이 보이니 , 군자는 이러한 상을 보고 위와 아래를 잘 분별하여 백성의 올바른 뜻을 정해야 한다 . 효사 및 효상사", "hyosa": {"초효": "初九는 素履로 往하면 无咎리라. 초구    소리    왕      무구 초구는 본래대로 밟아 나아가면 허물이 없을 것이다. 素:흴 소·본디 소   往: 갈 왕 초구는 양자리에 양으로 있어 제자리를 지키고 있는 백성이다 . 하늘의 성품을 그대로 부여받은 백성이 본래의 성품대로 소박하게 살아가면 허물이 없다 . 어느 누구에게 의지할 것 없이 타고난 성품과 명 ( 命 ) 을 실천해 나간다 . 象曰 素履之往은 獨行願也라. 상왈 소리지왕    독행원야 상전에 말하였다. “본래대로 밟아 감은 홀로 원함을 행하는 것이다.” 獨:홀로 독   願: 원할 원 본래대로 밟아가는 것은 어느 누구에게 의지함이 없이 하늘로부터 받은 성품과 명에 따라 홀로 삶의 목적을 구현해 가는 것이다 .", "이효": "九二는 履道 坦坦하니 幽人이라아 貞코 吉하리라. 구이    이도 탄탄      유인          정    길 구이는 밟는 도가 탄탄하니, 그윽한 사람(幽人)이라야 바르게 하고 길할 것이다. 坦:평평할 탄   幽:그윽할 유 구이는 내괘의 중을 얻은 자리로 , 구이가 변하면 내괘가 진뢰 ( 震雷 ) ☳ 가 되어 밟아 나가는 것이 탄탄하게 되며 , 또한 변한 상태에서 내호괘가 간산 ( 艮山 ) ☶ 이 되니 그윽한 산속으로 들어가는 상이다 . 그러니 구이는 밟는 도가 거침없이 탄탄하지만 , 마치 산 속에서 도를 닦는 유인 ( 幽人 ) 처럼 부귀공명 ( 富貴功名 ) 을 좇지 말고 바르게 살아야 길하다 . 象曰 幽人貞吉은 中不自亂也라. 상왈 유인정길    중부자란야 상전에 말하였다. “그윽한 사람이 바르게 해서 길함은 중(中)이 스스로 어지럽지 않아서이다.” 自:스스로 자   亂:어지러울 란 ‘ 그윽한 사람이 바르게 해서 길하다 ’ 는 것은 내괘의 중을 얻은 마음 ( 中道心 ) 을 스스로 어지럽히지 않는 것이다 . 六三은 眇能視며 跛能履라. 履虎尾하야 咥人이니 凶하고 武人이 爲于大君이로다.", "삼효": "九三은 君子 終日乾乾하야 夕惕若하면 厲하나 无咎리라. 구삼은 군자가 종일토록 굳세고 굳세어서 저녁에 두려운 듯하면 위태로우나 허물은 없을 것이다. 육삼    묘능시    파능리    이호미       질인       흉 무인    위우대군 육삼은 소경이 능히 보며 절름발이가 능히 밟는다. 호랑이 꼬리를 밟아서 사람을 무니 흉하고, 무인이 대군이 되도다. 眇:애꾸눈 묘   視:볼 시   跛:절름발이 파   咥:물을 질   武:굳셀 무· 무인 무 육삼은 내괘 태 ( 兌 ) ☱ 의 끝에 처해 있어 밝음이 상한 자리이다 . 양 자리에 음으로 처하고 또한 중도 얻지 못하였으니 , 자기 자신의 본분을 망각하고 망령되게 행동하여 그야말로 호랑이 꼬리를 밟는 자리이다 . 내호괘가 이화 ( 離火 ) ☲ 니 눈이 나오고 ( 離爲目 ), 외호괘가 손 ( 巽 ) ☴ 이니 다리가 나오며 ( 巽爲股 ), 내괘의 태 ☱ 는 화살의 상이고 내호괘 이화 ☲ 는 활의 상이니 전쟁을 하는 무인 ( 武人 ) 의 자리이기도 하다 . 따라서 육삼은 사실 앞을 제대로 보지도 못하는 소경임에도 마치 다 아는 것처럼 행동하고 , 제대로 걷지 못하는 절름발이임에도 잘 걷는 것처럼 행세하는 것이다 . 이렇게 자기 분수를 모르고 망령되게 행동하니 호랑이 꼬리를 밟아 사람이 물려 흉하게 될뿐더러 , 분수를 모르는 무인 ( 武人 ) 이 뜻만 강하여 무력으로 대군 ( 大君 ) 이 되고자 하는 것과 같다 . 象曰 眇能視는 不足以有明也오 跛能履는 不足以與行也오 상왈 묘능시    부족이유명야    파능리    부족이여행야 咥人之凶은 位不當也오 武人爲于大君은 志剛也라. 질인지흉    위부당야    무인위우대군    지강야 상전에 말하였다. “‘묘능시’는 족히 밝음이 있지 못한 것이고, ‘파능리’는 족히 더불어 행하지 못하는 것이고, ‘질인지흉’은 자리가 마땅하지 않은 것이고, ‘무인위우대군’은 뜻이 강한 것이다.”", "사효": "九四는 履虎尾니 愬愬이면 終吉이리라. 구사    이호미    삭삭      종길 구사는 호랑이 꼬리를 밟으니, 조심하고 조심하면 마침내 길할 것이다. 愬:하소연할 소·두려워할 색(삭) 구사는 내괘에서 외괘로 넘어간 첫 자리이다 . 음 자리에 양으로 거하니 자리가 마땅하지 않고 , 내괘 태 ☱ 호랑이 ( 西方 白虎 ) 바로 위에 있으니 호랑이 꼬리를 밟아 위태로운 상황이다 . 그렇지만 외괘 건 ☰ 체에 거하고 있으니 , 조심하고 조심하면 마침내 길하게 된다 . ‘ 愬愬 ’ 은 무서워하여 놀라는 모양을 뜻하는 형용어로 ‘ 삭삭 ’ 으로 읽는다 . 象曰 愬愬終吉은 志行也라. 상왈 삭삭종길    지행야 상전에 말하였다. “조심하고 조심해서 마침내 길함은 뜻이 행해지는 것이다.” 구사가 비록 음 자리에 양으로 거하여 내괘 태 ☱ 의 호랑이를 밟고 있는 형국이어서 위태롭지만 , 조심하고 조심해서 마침내 길한 것은 외괘 하늘 ☰ 의 뜻을 받들어 구사의 뜻이 행해짐을 말한다 .", "오효": "구오 강이 중정함으로 천제 ( 天帝 ) 의 자리를 밟아서 왕으로서의 병폐가 없으면 광명하다 . 九五는 夬履니 貞이라도 厲하리라. 구오    쾌리    정         려 구오는 결단해서 밟으니, 바르게 하더라도 위태할 것이다. 夬:결단할 쾌   厲: 위태로울 려 구오는 양 ( 陽 ) 이 외괘에서 중을 얻은 중정 ( 中正 ) 한 자리로 , 천제 ( 天帝 ) 에 해당한다 . 그야말로 중정하게 결단해 가면서 밟아가지만 , 항상 바르게 하더라도 위태롭게 여기는 마음을 가지고 신중하고 조심해야 한다 . 象曰 夬履貞厲는 位正當也일새라. 상왈 쾌리정려    위정당야 상전에 말하였다. “‘쾌리정려’는 자리가 정당하기 때문이다.” ‘ 결단해서 밟아감에 바르더라도 위태롭다 ’ 고 한 이유는 구오의 자리가 정당하기 때문에 더욱 조심하라는 뜻에서 경계한 것이다 .", "상효": "上九는 視履하야 考祥호대 其旋이면 元吉이리라. 상구    시리       고상      기선       원길 상구는 밟아온 것을 보아서 상서로움을 상고하되, 상서로움이 돌아오면 크게 길할 것이다. 考:상고할 고   祥:상서로울 상   旋:돌 선·두를 선 상구는 천택리괘의 밟아 온 이력을 최종적으로 상고하는 자리이다 . 초효부터 상효까지 , 중천건괘부터 천택리괘까지 , 창업에서 지금의 과정까지 , 민족의 탄생에서 오늘날에 이르기까지 , 그 밟아 온 이력을 보아서 상서로운 것을 상고하여 그 상서로움이 돌아오면 ( 두루 잘 했으면 ) 크게 길하다 . 象曰 元吉在上이 大有慶也니라. 상왈 원길재상    대유경야 상전에 말하였다. “크게 길함이 위에 있음이 크게 경사가 있는 것이다.” 慶:경사 경 천택리괘 상구효는 중천건괘로부터 시작하여 60 번째가 되는 효이다 . 중천건괘로부터 천택리괘까지를 천간 ( 天干 ) 의 시작인 갑 ( 甲 ) 에서 계 ( 癸 ) 로 끝나는 큰 과정으로 본다면 , 천택리괘 상구효까지의 60 효는 간지 ( 干支 ) 60 갑자가 마무리되는 것이다 . 이제 거대한 역사의 한 과정이 마무리되는 시점이다 . 지금까지의 과정을 돌이켜 보아 크게 길함이 위에 있으니 , 즉 마무리되는 시점에 있으니 , 크게 경사가 있는 것이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 210 ∼217 쪽 ."}}, {"num": 11, "ko": "지천태", "hanja": "地天泰", "lines": [1, 1, 1, 0, 0, 0], "url": "https://soosanss.tistory.com/163", "post_id": 163, "gwaui": "천기와 지기가 잘 교류하여 천하가 태평하듯이 , 사회 각계각층의 이해관계를 잘 조율하여 국가사회의 평화와 안전을 도모하라 ( 輔相天地 ).", "gwamyung": "외괘가 곤지 ( 坤地 ) ☷ , 내괘가 건천 ( 乾天 ) ☰ 으로 이루어진 괘의 명칭을 ‘ 태 ( 泰 ) ’ 라고 한다 . 사회가 태평하고 기운이 잘 소통됨을 의미한다 . 하늘은 위에 있고 땅은 아래에 있지만 , 천지기운이 교류하여 조화된다는 면에서 보면 , 하늘의 기운은 아래로 내려오고 ( 天氣下降 ) 땅의 기운은 위로 올라가서 ( 地氣上昇 ) 천기와 지기가 잘 교류하여 태평한 세상을 이루게 된다 . 사회적 양상도 마찬가지이다 . 통치자와 백성이 서로의 기운을 잘 소통하여 사회가 안정되고 있는 양상이다 . 아래에 있어야 할 백성의 기운이 위에 올라가 있고 , 위에 있어야 할 통치자의 기운이 아래로 내려와 있으니 , 위아래가 서로 기운을 잘 통하고 있는 것이다 .", "seogwa": "｢ 전 ｣ 은 천택리괘 다음에 지천태괘가 오는 것을 다음과 같이 설명하고 있다 . 履而泰然後에 安이라 故로 受之以泰하고 리이태연후    안      고    수지이태 이행하여 태평한 다음에 편안하다. 그러므로 태로써 받고 천택리 ( 天澤履 ) 괘 상구효사에 “ 밟아 온 것을 보아서 상서로운 것을 상고하되 그 상서로움이 돌아오면 ( 두루 잘했으면 ) 크게 길하다 ” 고 하였으니 , 마찬가지로 천기 ( 天氣 ) 와 지기 ( 地氣 ) 가 잘 교류되면 태평하게 되고 , 국가사회에 있어서도 통치자와 백성이 잘 교류하면 편안하게 되는 것이다 .", "gwasa": "泰는 小往코 大來하니 吉하야 亨하니라. 태    소왕    대래      길       형 태(泰)는 작은 것이 가고, 큰 것이 오니 길하여 형통하다. 泰 : 클 태· 편안할 태 곤 ( 坤 ) ☷ 음 ( 陰 ) 이 밖에 있으니 작은 것이 가는 것이고 , 건 ( 乾 ) ☰ 양 ( 陽 ) 이 안에 있으니 큰 것이 오는 것이다 . 큰 양 ( 陽 ) 의 기운이 안에 있으니 , 길하고 형통하다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 泰小往大來吉亨은 則是天地 交而萬物이 通也며 단왈 태소왕대래길형    즉시천지 교이만물    통야 上下 交而其志 同也라. 상하 교이기지 동야 內陽而外陰하며 內健而外順하며 內君子而外小人하니 내양이외음       내건이외순      내군자이외소인 君子道 長하고 小人道 消也라. 군자도 장       소인도 소야 단전에 말하였다. “‘태소왕대래길형’은 곧 이 천지가 사귀어 만물이 통하며, 위와 아래가 사귀어 그 뜻이 같다. 양이 안에 하고 음이 밖에 하며, 굳셈이 안에 하고 순함이 밖에 하며, 군자가 안에 하고 소인이 밖에 하니, 군자의 도는 자라나고 소인의 도는 사라진다.” 交:사귈 교   通:통할 통   長:길 장   消: 사라질 소 중세의 봉건적 계급질서에서 왕이 천하를 다스리는 세상이나 , 오늘날의 자유민주주의 정치제도에서 국가 원수가 국민을 다스리는 것이나 , 통치의 기본원리는 같다 . 천기가 내려오고 지기가 상승하여 서로 기운을 통하듯이 , 정치 지배층이 아래로 내려와 민심을 살피고 아래에 있는 민심이 위로 올라가 행하니 , 정치인이나 국민의 마음이 같은 것이다 . 국가를 통치하는 제도는 시대마다 나라마다 달라도 진정한 정치는 민심 ( 民心 ) 이 반영되고 민의 ( 民意 ) 가 행해지는 것이다 . 군자의 도 ( 道 ) 역시 마찬가지이다 . 안으로는 양명 ( 陽明 ) 하고 강하면서도 밖으로는 유순 ( 柔順 ) 하니 , 사회를 순하게 잘 다스리게 된다 . 사회에서 질서를 어지럽히고 당리당략 ( 黨利黨略 ) 이나 사리 ( 私利 ) 만을 위하는 소인 ( 小人 ) 들이 밖으로 물러나고 , 공리 ( 公利 ) 와 백성을 위하는 군자 ( 君子 ) 들이 안에 있어 자라나니 태평하다 .", "gwasangsa": "象曰 天地交 泰니 后 以하야 財成天地之道하며 상왈 천지교 태    후 이       재성천지지도 輔相天地之宜하야 以左右民하나니라. 보상천지지의      이좌우민 상전에 말하였다. “하늘과 땅이 사귐이 태(泰)니, 후(后: 임금)가 이를 본받아 천지의 도를 재단하여 이루며, 천지의 마땅함을 도와서 백성을 좌우한다.” 后: 임금 후(왕비)   財:재단할 재   補:도울 보   宜: 마땅할 의 천기와 지기가 잘 교류하는 태괘의 상을 고찰하여 , 옛 임금 ( 后 ) 은 천지의 법도를 재단하고 천지의 마땅함을 도와 백성을 다스렸다 . 즉 , 천지의 마땅한 법도를 잘 준칙 ( 準則 ) 하여 백성을 다스리는 법도로 제도화하고 이를 통해 백성을 다스렸다 . 천지의 도를 재단하고 도와서 백성을 좌우하는 것은 인간 위주의 제도를 만들고 인간만을 위한 근시안적 ( 近視眼的 ) 인 정책을 세우는 것이 아니라 , 장구한 세월에 걸쳐 자연과 공존할 수 있는 정책을 만들어 백성이 대대로 잘 살 수 있도록 다스리는 것이다 . 효사 및 효상사", "hyosa": {"초효": "初九는 拔茅茹라. 以其彙로 征이니 吉하니라. 초구    발모여    이기휘    정       길 초구는 띠 뿌리를 뽑는다. 그 무리로써 가니 길하다. 拔:뽑을 발   茅:띠 모   茹:뿌리 여   彙:무리 휘   征:갈 정(칠 정 ) 초구는 백성의 자리이다 . 태평한 세상에 국민이 다 편안하니 , 모두가 한 마음으로 통치자의 올바른 정치에 따른다 . 띠를 뽑으면 뿌리가 다 연결되어 얽혀 나오듯이 , 국민의 마음도 하나가 되어 통치자의 뜻에 따른다 . 초구가 변하면 내괘가 손 ☴ 이 되는데 , 손 ☴ 은 후천팔괘로 동남방에 처하고 부드러운 음목 ( 陰木 ) 이 되어 띠 뿌리의 상이 나오며 아울러 손순하게 통치자의 정책에 따르는 상이 된다 . 象曰 拔茅征吉은 志在外也라. 상왈 발모정길    지재외야 상전에 말하였다. “띠 뿌리를 뽑아 가서 길함은 뜻이 밖에 있는 것이다.” 초구 백성의 뜻은 외괘에 있는 통치자의 올바른 정치에 있다 . 초구의 백성들이 경계하지 않고 육사 대신을 믿는다 . 象曰 翩翩不富는 皆失實也오 不戒以孚는 中心願也라. 상왈 편편불부    개실실야    불계이부    중심원야 상전에 말하였다. “‘편편불부’는 모두 실질을 잃음이요, ‘불계이부’는 중심으로 원하는 것이다.” 皆:다 개(모두)   實: 실할 실 국민을 위한 마음으로 나는 듯이 국민에게 다가가는 것은 자기만이 실질을 얻으려는 사심 ( 邪心 ) 이 없는 것이다 . 경계하지 않아도 믿는 것은 모든 백성이 진정으로 바라기 때문이다 . 六五는 帝乙歸妹니 以祉며 元吉이리라.", "이효": "九二는 包荒하며 用馮河하며 不遐遺하며 朋亡하면 得尙于中行하리라. 구이    포황      용빙하       불하유       붕망      득상우중행 구이는 거친 것을 싸며, 하수(河水) 건넘을 쓰며, 먼 것을 버리지 않으며, 붕당(朋黨)을 없애면, 중도를 행함에 숭상함(합함)을 얻을 것이다. 包:쌀 포   荒:거칠 황   馮:걸어서 건널 빙   河:강 이름 하   遐:멀 하 遺:버릴 유   朋:벗 붕(무리)   亡:망할 망   得:얻을 득   尙:숭상할 상(합할 상) 구이 양 ( 陽 ) 은 내괘 가운데에 있고 , 외괘에서 통치하는 육오 음 ( 陰 ) 과 잘 응하고 있다 . 구이가 변하면 내괘가 이화 ☲ 로 되니 빛나는 것이 된다 . 천하를 포용하는 중도 ( 中道 ) 의 정치를 실현하느라고 구이 스스로는 쉴 새가 없는 고단한 생활일지라도 그 자체가 광대하다 .", "삼효": "九三은 无平不陂며 无往不復이니 艱貞이면 无咎하야 구삼    무평불피    무왕불복      간정       무구 勿恤이라도 其孚라 于食애 有福하리라. 물휼          기부   우식    유복 구삼은 평평해서 기울어지지 않음이 없으며, 가서 돌아오지 않음이 없으니, 어렵게 하고 바르게 하면 허물이 없어서, 근심하지 않더라도 미덥다. 먹는 데에 복이 있을 것이다. 陂:기울어질 피   艱:어려울 간   恤:근심할 휼   食:먹을 식   福:복 복 구삼은 내괘에서 외괘로 넘어가는 자리에 있다 . 아무리 태평한 세상일지라도 언젠가는 세상이 막혀 비색해진다는 것을 미리 염두에 두고 항상 바른 정치를 해 나가야 한다 . 평평하다가도 언덕이 있는 것이 자연의 지세 ( 地勢 ) 이며 , 좋은 세상이 있다가도 나쁜 세상이 오는 것이 세상사의 이치이다 . 그러니 태평할 때에 그 태평함을 계속 유지하기 위해서는 항상 어렵게 생각하는 마음으로 바르게 해야 허물이 없다 . 이렇게 항상 조심하고 바른 정치를 해 나가면 근심하지 않아도 백성이 믿게 되고 , 모든 백성이 편안하게 식생활을 영위해 나갈 수 있는 것이다 . 象曰 无往不復은 天地際也라. 상왈 무왕불복    천지제야 상전에 말하였다. “가서 돌아오지 않음이 없음은 천지가 사귀는 것이다.” 際:사귈 제 만물이 생화하는 따뜻한 봄과 여름이 지나가면 , 숙살지기 ( 肅殺之氣 ) 로 결실을 거두는 추운 가을과 겨울이 오기 마련이다 . 자연의 변화는 이렇게 끊임없이 반복 순환한다 . 천지가 사귀는 자연의 변화가 이렇듯이 세상사도 마찬가지이다 . 六四는 翩翩히 不富以其鄰하야 不戒以孚로다.", "사효": "육사    편편    불부이기린      불계이부 육사는 나는 듯이 부하려 하지 않고 그 이웃으로써 하여, 경계하지 않아도 믿도다. 翩:빨리 날 편   鄰:이웃 린   戒: 경계할 계 육사는 음 자리에 음으로 자리가 바른 대신 ( 大臣 ) 으로서 태평한 세상에 육오 인군의 명을 받아 나라를 위하고 국민을 위한 정치를 한다 . 육사가 응하고 있는 초구 백성에게 무슨 일이 있으면 나는 듯이 다가가 그 문제를 해결해 주며 , 높은 지위에 있다고 홀로 부와 권력을 누리려고 하지 않고 이웃 국민과 더불어 잘살 수 있는 복지정책을 쓰니 ,", "오효": "육오 인군의 명을 받들어 태평한 세상을 이루어 나가는 역할을 한다 . 태평성대를 이루기 위해서는 아무리 하찮은 존재라도 잘 포용해야 하며 , 때로는 물을 건너 외국과의 평화를 위한 선린외교 ( 善隣外交 ) 를 펼쳐야 하며 , 아무리 먼 변방에 있는 약소한 존재라도 그들을 존중해야 하며 , 또한 자기들만의 붕당 ( 朋黨 ) 을 만들어 세력화하지 말아야 한다 . 이렇게 중도 ( 中道 ) 로 폭넓은 정책을 펴서 잘 실행해 나가면 , 모두가 구이의 정치에 뜻을 합하고 숭상하게 된다 . 象曰 包荒得尙于中行은 以光大也라. 상왈 포황득상우중행    이광대야 상전에 말하였다. “‘포황득상우중행’은 빛나고 큰 것이다.” 내괘가 건천 ☰ 으로 큰 것이며 , 육오    제을귀매    이지    원길 육오는 제을이 누이동생을 시집보내니, 복이 되며 크게 길할 것이다. 歸:돌아갈 귀·시집갈 귀   妹:누이 매   祉: 복 지 육오는 외괘에서 중을 얻어 태평한 세상을 이끌어 가는 통치자이다 . 세상이 태평할 때에는 강력한 권력이 필요하지 않고 , 유약한 듯 순하게 정치를 하는 것이 필요하다 . 은나라 말기에 왕으로 있었던 제을 ( 帝乙 ) 은 태평한 세상을 유지하기 위해 자기 누이동생을 지방 제후에게 시집보냈다 . 이렇듯이 왕이 자신의 누이를 지방 제후에게 시집보낼 정도로 화목한 평화정책을 폈으니 복이 될뿐더러 크게 길한 것이다 . 평화를 유지한다는 것은 다른 존재를 인정하는 것이고 , 얻기 위해서는 먼저 줘야 한다 . 중세에 이르기까지 동서양을 막론하고 일반적으로 행해졌던 평화외교정책의 주요한 하나가 상호간에 혼인관계를 맺는 것이었다 . 오늘날 현대 국제사회의 정책으로 본다면 , 외국과의 선린외교정책을 펴고 , 다른 나라가 필요한 것은 주고 우리가 필요한 것을 얻는 것이다 . 중앙정부와 지방정부와의 관계도 마찬가지이다 . 象曰 以祉元吉은 中以行願也라. 상왈 이지원길    중이행원야 상전에 말하였다. “복이 되고 크게 길함은 중도로써 원함을 행하기 때문이다.” 上六은 城復于隍이라. 勿用師오 自邑告命이니 貞이라도 吝하니라. 상륙    성복우황       물용사    자읍고명       정         인", "상효": "상육은 성이 터에 돌아온다. 군사를 쓰지 말고 읍으로부터 명을 알리니, 바르게 하더라도 인색하다. 城:성 성   隍:해자(垓字) 황(터 황)   邑:고을 읍   告:알릴 고  吝: 인색할 린 상육은 태괘의 극에 처해 있어 , 태평한 세상이 그치고 쇠락해지는 상이다 . 상육이 변하면 외괘가 간산 ( 艮山 ) ☶ 이 되어 태평한 세상이 그친다 . 역사를 돌이켜 보면 , 수많은 민족과 국가의 흥망 ( 興亡 ) 이 있어 왔다 . 태평시대에 높게 쌓았던 성 ( 城 ) 이 무너져 ‘ 황성옛터 ’ 가 된다 . 이렇게 태평한 기운이 사라질 때에는 군대를 동원하여 억지로 그 시대를 돌이키려고 하지 말고 , 스스로를 반성하여 자기 잘못을 뉘우쳐야 한다 . 그동안 잘못된 정치로 인한 결과이니 뒤늦게 바르게 하려고 한들 인색할 뿐이다 . 오늘날에도 한 시대의 정치인이 자기 정책의 실수를 모면하려고 군대를 동원하여 외국을 공격하는 등 무리한 정책을 쓰는 경우를 종종 볼 수 있다 . 세상이 등을 돌리면 스스로를 반성할 뿐이다 . 象曰 城復于隍은 其命이 亂也라. 상왈 성복우황    기명    난야 상전에 말하였다. “성이 터에 돌아옴은 그 명이 어지러운 것이다.” 성이 무너져 터에 돌아옴은 이미 정치의 바른 명이 어지러워졌기 때문이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 218 ∼225 쪽 ."}}, {"num": 12, "ko": "천지비", "hanja": "天地否", "lines": [0, 0, 0, 1, 1, 1], "url": "https://soosanss.tistory.com/164", "post_id": 164, "gwaui": "태평한 시대가 지나가고 어렵고 비색한 때가 오면 , 어지러운 세태에 영합하여 부를 누리지 말고 어려움을 피하라 ( 儉德 辟 難 ).", "gwamyung": "외괘가 건천 ( 乾天 ) ☰ , 내괘가 곤지 ( 坤地 ) ☷ 로 이루어진 괘의 명칭을 ‘ 비 ( 否 ) ’ 라고 한다 . 하늘 기운은 위에만 있고 ( 天氣在上 ) 땅의 기운은 아래에만 있으니 ( 地氣在下 ), 천기와 지기가 교류하지 못하고 ( 天地不通 ) 막혀있어 비색하다는 뜻이다 . 정치 ․ 사회현실에 있어서도 위와 아래 , 정치인과 국민 , 경영자와 근로자가 서로 소통이 안 되고 막혀 있으니 비색한 상황이다 .", "seogwa": "｢ 전 ｣ 은 지천태괘 다음에 천지비괘가 온 것을 다음과 같이 설명하고 있다 . 泰者는 通也니 物不可以終通이라 故로 受之以否하고 태자    통야    물불가이종통      고    수지이비 태(泰)란 통함이니, 물건이 가히 끝까지 통하지는 못한다. 그러므로 비(否)로써 받고 화창한 기운이 있으면 암울한 기운이 오고 , 내리막이 있으면 오르막이 있듯이 , 태평한 시절만 있는 것이 아니라 비색한 시절도 있게 된다 . 모든 상황이 한없이 통할 수만은 없다 . 때문에 지천태괘 다음에 천지비괘를 둔 것이다 .", "gwasa": "否之匪人이니 不利君子貞하니 大往小來니라. 비지비인       불리군자정       대왕소래 비(否)가 사람이 아니니, 군자의 바름이 이롭지 않으니, 큰 것이 가고 작은 것이 온다. 否:아닐 부·막힐 비   匪: 아닐 비 천기 ( 天氣 ) 와 지기 ( 地氣 ) 가 막혀 교류되지 않고 위와 아래가 막혀 소통이 안 되니 , 사람이 사람행세를 할 수 없는 지경이다 . 이런 때에는 군자라도 군자로서의 행세를 하지 못하고 오히려 해로움을 받게 되니 이롭지 않으며 , 군자가 다스리던 태평하던 세월이 지나가고 소인이 지배하는 음울한 세상이 된다 . 이에 대해 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 否之匪人不利君子貞大往小來는 단왈 비지비인불리군자정대왕소래 則是天地 不交而萬物이 不通也며 上下 不交而天下 无邦也라. 즉시천지 불교이만물    불통야    상하 불교이천하 무방야 內陰而外陽하며 內柔而外剛하며 內小人而外君子하니 내음이외양       내유이외강      내소인이외군자 小人道 長하고 君子道 消也라. 소인도 장       군자도 소야 단전에 말하였다. “‘否之匪人不利君子貞大往小來’는 곧 이 천지가 사귀지 못해서 만물이 통하지 않으며, 위와 아래가 사귀지 못해서 천하에 나라가 없다. 음이 안에 하고 양이 밖에 하며, 유가 안에 하고 강이 밖에 하며, 소인이 안에 하고 군자가 밖에 하니, 소인의 도가 자라나고 군자의 도는 사라진다.” 邦:나라 방 천기와 지기가 사귀지 못하니 만물이 통하지 못하여 화생하지 않고 , 통치자와 국민· 경영자와 근로자 등 위와 아래가 서로 사귀지 못하니 정책과 경영이 안 되어 나라가 없는 지경에 이르렀다 . 밖은 화려한 것 같지만 안으로는 음울하며 , 밖은 강한 것 같지만 속은 약하며 , 군자는 밖에 물러나 있고 소인이 안에 자리하니 , 소인의 도가 자라나고 군자의 도는 사라지는 양상이다 .", "gwasangsa": "象曰 天地不交 否니 君子 以하야 儉德辟難하야 不可榮以祿이니라. 상왈 천지불교 비    군자 이       검덕피난       불가영이록 상전에 말하였다. “천지가 사귀지 못함이 비(否)니, 군자가 이를 본받아 덕을 검소하게 하고 어려움을 피해서, 가히 녹을 받는 것으로써 영화를 누리지 않는다.” 儉:검소할 검   辟:피할 피·임금 벽·비유할 비   難:어려울 난   榮:영화 영  祿: 복 록 천지가 막혀 사귀지 못해서 사회가 암울하고 소인이 득세하는 때에 군자는 군자로서의 덕을 함부로 내세우지 않고 오히려 아껴서 어려움을 피해야 하며 , 또한 소인이 지배하는 정치에 참여하여 녹을 받아가며 명예를 더럽히지 않는다 . 효사 및 효상사 初六은 拔茅茹라. 以其彙로 貞이니 吉하야 亨하니라. 초륙    발모여    이기휘    정       길       형", "hyosa": {"초효": "초육은 띠 뿌리를 뽑는다. 그 무리로써 바르게 하니 길해서 형통하다. 拔:뽑을 발   茅:띠 모   茹:뿌리 여   彙: 무리 휘 태평한 세상이나 비색한 세상이나 일반 백성은 무리로 움직인다 . 항상 군중 ( 群衆 ) 이 되어 사회의 모습을 그려낸다 . 위와 아래가 막혀 소통이 안 되니 , 무리로 움직여 세상의 올바름을 갈구한다 . 비록 소인이 득세하고 있지만 , 백성은 구오 군자의 바른 정치를 갈구한다 . 아무리 비색한 세상이라 할지라도 하늘은 백성을 버리지 않는다 . 象曰 拔茅貞吉은 志在君也라. 상왈 발모정길    지재군야 상전에 말하였다. “띠 뿌리를 뽑아 바르게 하여 길함은 뜻이 인군에게 있는 것이다.” 일반 백성은 언제나 구오 대인과 같은 어진 통치자가 나와 세상을 평화롭게 다스리기를 갈구하고 있다 . 六二는 包承이니 小人은 吉코 大人은 否니 亨이라.", "이효": "육이    포승      소인    길    대인    비    형 육이는 포용하여 이으니, 소인은 길하고 대인은 비색하니 형통하다. 包:쌀 포   承:이을 승 비색한 때에 소인은 끼리끼리 무리를 지어 붕당 ( 朋黨 ) 을 만들고 자기들의 뜻을 실현하고자 한다 . 그러한 소인은 한때나마 자기들 세상을 만들어 나갈 수 있기에 길하다 . 그러나 군자는 비색한 때의 정황을 알기에 붕당을 만들지 않고 그야말로 ‘ 검덕피난 ( 儉德 辟 難 ) ’ 을 하니 상황적으로는 비색하지만 결국은 형통하게 된다 . 소인이 지배하는 ‘ 천지비 ’ 괘 육이 효사와 군자가 다스리는 ‘ 지천태 ’ 괘 구이 효사를 비교해 보면, 소인과 군자가 정치하는 방법의 차이를 알 수 있다 . 태평한 정치를 구현해 나가는 지천태괘 구이 군자는 거칠고 먼 것까지도 다 아우르지만 붕당을 만들지 않는다고 했다 . 정당민주주의 ( 政黨民主主義 ) 를 표방하는 오늘날의 정치에서도 나라를 위하고 국민을 위한 보다 큰 이념을 실현하기 위하여 정당을 만들고 정치하는 것이 아니라 , 자기들만의 이익을 도모하기 위한 특정 집단의 붕당정치 ( 朋黨政治 ) 로 되고 있다는 현실을 찾아보게 된다 . 象曰 大人否亨은 不亂群也라. 상왈 대인비형    불란군야 상전에 말하였다. “대인이 비색하나 형통함은 무리를 어지럽히지 않는 것이다.” 亂:어지러울 란   群: 무리 군 비색한 때에 군자가 시대에 영합하지 않는 것은 난세 ( 亂世 ) 에 무리를 지어 백성과 나라를 어지럽히지 않기 위한 것이다 . 六三은 包 羞로다.", "삼효": "육삼    포 수 육삼은 싼 것이 부끄럽도다. 羞:부끄러울 수·나아갈 수·드릴 수 육삼은 양자리에 음으로 있어 자리가 부당하고 중도 얻지 못하여 , 비색한 세상에 온갖 부끄러운 짓을 도맡아 하는 소인이다 . 그러니 하는 모든 것이 부끄러울 따름이다 . 象曰 包羞는 位不當也일새라. 상왈 포수    위부당야 상전에 말하였다. “싼 것이 부끄러운 것은 자리가 마땅하지 않기 때문이다.”", "사효": "九四는 有命이면 无咎하야 疇 離祉리라. 구사    유명      무구       주 리지 구사는 명을 두면 허물이 없어서, 동무(무리)가 복에 걸릴 것이다. 疇:밭두둑 주·무리(동무) 주·같을 주   離:걸릴 리   祉: 복 지 천지비괘의 외호괘가 손풍 ( 巽風 ) ☴ 이고 구사가 변해서 외괘가 또 손풍 ☴ 이 되니 , 하늘의 명을 두는 자리이다 ( 重風巽卦 : 申命行事 ). 손 ( 巽 ) ☴ 은 바람 ( 風 ) 이고 바람은 하늘에서 부는 것이니 하늘의 명 ( 命 ) 으로 통한다 . 내괘에서 음유 ( 陰柔 ) 한 소인이 세 ( 勢 ) 를 얻었으니 , 군자로서 어찌할 수 없음을 깨닫는다 . 손순하게 때를 기다리면 허물이 없고 , 때가 되면 뜻을 같이 하는 무리와 더불어 명을 행하여 복을 받게 된다 . 象曰 有命旡咎는 志行也라. 상왈 유명무구    지행야 상전에 말하였다. “명을 두어 허물이 없음은 뜻이 행해지는 것이다.” 때가 되면 구사의 뜻을 이룰 수 있다 .", "오효": "九五는 休否라. 大人의 吉이니 其亡其亡이라아 繫于苞桑이리라. 구오    휴비    대인    길       기망기망         계우포상 구오는 비색함을 쉬게 한다. 대인의 길함이니 그 망할까 그 망할까 하여 우묵한 뽕나무에 맬 것이다. 休:쉴 휴․그칠 휴   繫:맬 계   苞:더부룩이날 포·밑(뿌리) 포·쌀 포   桑:뽕나무 상 구오는 외괘에서 중정한 대인으로 천하의 흐름을 볼 수 있는 자이다 . 소인이 득세하고 있는 비색한 세상이니 구오는 왕이라 할 수는 없다 . 비색한 세상에 중정한 대인이 비록 바른 정치를 행할 수는 없지만 , 그 비색한 상황을 사라지게 하려는 노력을 해야 한다 . 이러한 노력을 통해 비색한 세상이 그칠 때가 왔으니 대인의 길함이 있고 , 아울러 세상이 비색해져 망할 듯 하여도 대인은 나라와 민족과 백성의 근본을 단단한 뽕나무에 매어서 다음의 태평한 세상을 이끌어 간다 . 그러나 무엇보다도 편안할 때 위태로움을 잊지 않고 , 현존할 때 망할 것을 잊지 않고 , 잘 다스릴 때 어지러움을 잊지 않는 것이 몸을 편안히 하고 나라를 보전하는 지혜일 것이다 . ｢ 계사하전 ｣ 제 5 장에서 공자는 다음과 같이 설명하고 있다 . 공자께서 말씀하셨다. “위태할까 하는 자는 그 자리를 편안히 하는 것이요, 망할까 하는 자는 그 존함을 보존하는 것이요, 어지러울까 하는 자는 그 다스림을 두는 것이니, 이런 까닭에 군자가 편안하되 위태함을 잊지 않으며, 존하되 망함을 잊지 않으며, 다스리되 어지러움을 잊지 않는다. 이로써 몸이 편안하여 국가를 보존할 수 있으니, 역에 이르길 ‘그 망할까 그 망할까 하여 더부룩한 뽕나무에 맨다’고 하였다.”(子曰 危者는 安其位者也오 亡者는 保其存者也오 亂者는 有其治者也니 是故로 君子 安而不忘危하며 存而不忘亡하며 治而不忘亂이라. 是以身安而國家를 可保也니 易曰 其亡其亡이라야 繫于苞桑이라하니라.) 象曰 大人之吉은 位 正當也일새라. 상왈 대인지길    위 정당야 상전에 말하였다. “대인의 길함은 자리가 바르고 정당하기 때문이다.” 구오가 나라의 근본이 무너지지 않게 굳게 지켰기 때문이다 . 象曰 否終則傾하나니 何可長也리오. 상왈 비종즉경          하가장야 상전에 말하였다. “비색함이 마치면 곧 기울어지니, 어찌 가히 오래 가겠는가?” 그렇다 . 지천태 ( 地 天 泰 ) 괘 구삼효에서도 ‘ 평평해도 언덕지지 않음이 없고 가서 돌아오지 않음이 없다 ( 无平不陂 无往不復 ) ’ 고 했다 . 아무리 비색한 상황도 때가 되면 기울어지니 , 소인이 득세하여 세상을 어지럽히던 시절이 어찌 오래갈 수 있겠는가 ? ◎ 삼음삼양(三陰三陽)괘의 체(體)인 지천태·천지비 지천태괘와 천지비괘는 모두 삼음삼양괘로 양효와 음효가 각각 내괘 외괘로 나누어져 있다 . 주역 64 괘 가운데 음이 셋 양이 셋인 삼음삼양괘는 모두 20 괘가 있는데 , 일반적으로 삼음삼양으로 이루어진 괘는 그 근본 체 ( 體 ) 를 각각 지천태 ( 地天泰 ) 괘와 천지비 ( 天地否 ) 괘에 두고 있다 . 때문에 뒤에 나오는 삼음삼양괘를 고찰할 때에는 항상 그 근본 체가 되는 지천태괘와 천지비괘를 염두에 두고 고찰해야 한다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 226 ∼233 쪽 .", "상효": "上九는 傾否니 先否코 後喜로다. 상구    경비    선비    후희 상구는 비색함이 기울어지니, 먼저는 비색하고 뒤에는 기뻐하도다. 傾:기울 경   喜:기쁠 희 비색한 상황의 맨 위에 처하니 , 드디어 비색함이 기울어지는 때이다 . 앞의 상황은 비색하였지만 , 이제 비색함이 사라지니 편안한 웃음이 나온다 . 상구에서 편안한 웃음이 나올 수 있는 것은 구사가 명 ( 命 ) 을 두어 때를 기다리고 ,"}}, {"num": 13, "ko": "천화동인", "hanja": "天火同人", "lines": [1, 0, 1, 1, 1, 1], "url": "https://soosanss.tistory.com/165", "post_id": 165, "gwaui": "하늘 아래에 태양이 만물을 비추듯이 , 천하가 문명하여 함께 하면서도 각각 저마다의 성질과 특성을 헤아리고 상황을 잘 판단하라 ( 類族辨物 ).", "gwamyung": "외괘가 건천 ( 乾天 ) ☰ , 내괘가 이화 ( 離火 ) ☲ 로 구성된 괘의 이름을 ‘ 동인 ( 同人 ) ’ 이라 한다 . 하늘 아래에 태양이 비추듯이 모두가 만나 함께 한다는 뜻이다 . 소인이 득세하던 비색한 세상이 지나갔으니 , 저마다 뜻을 같이 하는 사람끼리 만나 일을 도모한다 . 동인 ( 同人 ) 괘는 일음오양 ( 一陰五陽 ) 괘로 그 체 ( 體 ) 는 중천건 ( 重天乾 ) 괘에 있다 . 중천건괘 구이효사를 음미해 보자 .", "seogwa": "｢ 전 ｣ 에서는 천지비괘 다음에 천화동인괘가 온 것을 다음과 같이 설명하고 있다 . 物不可以終否라 故로 受之以同人하고 물불가이종비    고    수지이동인 물건은 가히 끝까지 막히는 것은 아니다. 그러므로 동인으로 받고 천지자연의 변화와 세상사의 모든 일과 현상은 끝까지 막히는 것은 아니다 . 그리고 비색한 상황· 막힌 상황을 뚫기 위해서는 사람을 만나야 한다 . 그래서 천지비괘 다음에 천화동인괘를 두었다 .", "gwasa": "同人于野면 亨하리니 利涉大川이며 利君子의 貞하니라. 동인우야    형          이섭대천      이군자    정 사람과 같이 함을 들에서 하면 형통할 것이니, 큰 내를 건넘이 이로우며, 군자의 바름이 이롭다. 同:한가지 동   野:들 야   涉:걸어서 건널 섭 사람을 만나 일을 같이 하는 것은 마치 하늘 아래 태양이 환하게 비추듯이 명명백백 ( 明明白白 ) 하게 해야 한다 . 들에서 만난다는 것은 사심 ( 私心 ) 없이 공명정대 ( 公明正大 ) 하게 해야 한다는 것이다 . 공명정대하게 만나 일을 함께 하면 형통하니 , 이렇다면 큰일을 할 수가 있다 . 만나면 사사로운 정 ( 情 ) 이 생기고 사심 ( 邪心 ) 으로 일을 할 수도 있기 때문에 , 군자의 바름이 이롭다고 했다 . 이에 대해 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 同人은 柔 得位하며 得中而應乎乾할새 曰同人이라. 단왈 동인    유 득위      득중이응호건       왈동인 (同人曰)同人于野亨利涉大川은 乾行也오 (동인왈)동인우야형이섭대천    건행야 文明以健하고 中正而應이 君子正也니 문명이건       중정이응    군자정야 唯君子아 爲能通天下之志하나니라. 유군자    위능통천하지지 단전에 말하였다. “동인(同人)은 유(柔)가 위를 얻으며 중을 얻어서 하늘에 응하기 때문에 동인이라 말한다. (동인에 이르길) ‘同人于野亨利涉大川’은 굳세게 행함이요, 문명함으로 굳건히 하고 중정해서 응함이 군자의 바름이니, 오직 군자여야 능히 천하의 뜻을 통할 수 있다.” 應:응할 응   健:굳셀 건   唯:오직 유   能: 능할 능 동인괘는 일음오양 ( 一陰五陽 ) 괘로 음 하나가 두번째효에 있다 . 중천건괘 구이효가 변한 것으로 생각하면 된다 .", "gwasangsa": "象曰 天與火 同人이니 君子 以하야 類族으로 辨物하나니라. 상왈 천여화 동인       군자 이       유족      변물 상전에 말하였다. “하늘과 불이 동인(同人)이니, 군자가 이를 본받아 유(類)와 족(族)으로 물건을 분별한다.” 與:더불 여·및 여   類:무리 류   族:겨레 족·무리 족   辨: 분별할 변 동인 ( 同人 ) 괘는 외괘에 하늘 ☰ 이 있고 내괘에 불 ☲ 이 있는데 , 하늘은 위에 있고 불은 위로 오르니 하늘과 불이 함께 하는 상이다 . 또한 하늘에는 태양이 비추고 있는데 , 태양이 하늘에 있다고 하여 하늘 ☰ 과 태양 ☲ 이 같은 것은 아니며 , 하늘이 위에 있고 불이 위로 오른다고 하여 , 불이 곧 하늘인 것은 아니다 . 그리고 하늘 아래에 불이 환하게 비추니 , 만물이 그 유 ( 類 ) 와 족 ( 族 ) 으로 구분된다 . 이와 같은 양상을 체득하여 군자는 유 ( 類 : 큰 단위 ) 와 족 ( 族 : 작은 단위 ) 으로 물건과 상황을 분별하여야 한다 . 효사 및 효상사", "hyosa": {"초효": "初九는 同人于門이니 无咎리라. 초구    동인우문      무구 초구는 사람과 같이 함을 문에서 하니 허물이 없을 것이다. 초구는 제자리를 얻어 아무 스스럼없이 사람을 만난다 . 문 ( 門 ) 에서 한다는 것은 집 밖을 나서서 사람과 만나는 것이다 . 사심 ( 私心 ) 이 없는 일반 백성의 만남은 아무 허물이 없다 . 초구가 변하면 내괘가 간 ☶ 이 되는데 간 ☶ 은 문 ( 門 ) 의 형상이다 . 象曰 出門同人을 又誰咎也리오. 상왈 출문동인    우수구야 상전에 말하였다. “문에 나가서 사람과 같이하는 것을 또 누가 허물하겠는가?” 出:날 출   又:또 우   誰:누구 수   咎: 허물 구 六二는 同人于宗이니 吝토다.", "이효": "九二는 見龍在田이니 利見大人이니라. 구이는 나타난 용이 밭에 있으니, 대인을 봄이 이롭다. 육이가 음 자리에 음으로 있어 제자리를 찾고 또한 내괘의 중을 얻어 외괘 하늘에 순응하니 , 중정한 육이가 중정한 구오와 뜻을 같이 하는 것이다 . 그래서 동인이라 하였다 . ‘ 同人于野亨利涉大川 ’ 은 굳세게 일을 해 나가는 것이고 , 내괘 이화 ( 離火 ) ☲ 로 문명하고 외괘 건천 ( 乾天 ) ☰ 으로 굳세며 , 육이와 구오가 중정해서 서로 응하는 것이 군자의 바름이다 . 바로 이러한 군자라야 천하의 뜻을 통할 수 있다 . 사람을 만나 일을 같이 함에 있어서는 중정한 도리를 지켜야 큰일을 할 수 있다 . 육이    동인우종       인 육이는 사람과 같이 함을 종친에서 하니 인색하도다. 宗:겨레 종·마루 종·종묘(가묘) 종 육이는 동인괘에서 유일한 음 ( 陰 ) 으로 내괘에서 중정한 자리이다 . 또한 외괘의 중정한 구오와 잘 응하고 있다 . 그런데 정작 공명정대하게 들에서 사람을 만나야 한다는 동인괘에서 중정한 육이는 중정한 구오와 응한다는 것이 오히려 인색한 도가 된다 . 유일한 음으로 공명정대 ( 公明正大 ) 하게 다른 다섯 양을 두루 만나야 하는데 , 육이가 구오와의 만남에만 치중하게 되니 사람과 같이 하는 것을 마치 종당 ( 宗黨 ) 에서 특정인만을 만나는 격이 되어 인색하다고 한 것이다 . 象曰 同人于宗이 吝道也라. 상왈 동인우종    인도야 상전에 말하였다. “사람과 같이 함을 종친에서 함이 인색한 도이다.”", "삼효": "九三은 伏戎于莽하고 升其高陵하야 三歲不興이로다. 구삼    복융우망       승기고릉      삼세불흥 구삼은 군사를 숲에 매복시키고 그 높은 언덕에 올라 3년을 일어나지 못하도다. 伏:엎드릴 복·숨을 복·굴복할 복   戎:군사 융(오랑캐)    莽:풀숲 망·우거질 망   升:오를 승·되 승 陵:큰 언덕 릉   歲:해 세   興: 일어날 흥 구삼은 양 자리에 양으로 있어 강하고 중을 얻지 못하였다 . 또한 응하는 자리인 상구효가 같은 양이니 서로 응하지 못한다 . 그래서 육이 음 ( 陰 ) 이 바로 아래에 있어 육이를 취하고 싶으나 육이가 구오와 정응하여 구오만을 만나게 되니 , 구삼이 육이를 취하고자 술수를 부린다 . 나라로 치면 구오 왕이 육이만을 총애하고 있고 , 구삼은 이를 시기하여 구오를 정벌하고자 군사를 숲에 매복시키고 높은 언덕에 올라가 때를 기다리지만 , 구삼이 변하면 양이 음으로 바뀌어 내괘가 진 ☳ 이 되니 군사를 일으키려는 상이 되며 , 내호괘가 손 ☴ 이니 음목 ( 陰木 ) 으로 풀숲이 나온다 . 또한 구삼이 변한 상태에서 내호괘가 간산 ☶ 이 되니 높은 언덕에 오르는 상이 된다 . 象曰 伏戎于莽은 敵剛也오 三歲不興이어니 安行也리오. 상왈 복융우망    적강야    삼세불흥          안행야 상전에 말하였다. “군사를 숲에 매복시킴은 적이 강함이고, 삼년을 일어나지 못하니 어찌 행하겠는가?” 敵:원수 적   安:어찌 안·편안할 안 구삼에게 적이 되는 구오 왕이 중정하고 강하기 때문에 군사를 숲 속에 숨기고 기회를 노리지만 3 년이 되도록 일어나지 못하니 , 어찌 감히 구오 왕에게 대적하겠는가 ? 구삼과 구사가 만나지 못하게 방해를 하고 있다 . 그래서 처음에는 안타까운 마음에 울부짖지만 , 결국 만나게 되어 웃게 된다 . 다만 양강 ( 陽剛 ) 한 구삼과 구사가 대적하여 방해하고 있으니 , 큰 군사로 대비하여 이겨야 서로 만날 수 있다 . 동인괘를 배합하면 지수사 ( 地水師 ) 괘가 되니 , 일을 도모하려고 사람을 만나기 위해서는 준비를 단단히 해야 한다 . 정히 만나야 할 사람을 만나서 천하사 ( 天下事 ) 를 같이 한다는 것이 얼마나 아름다운 일인가 ? 공자는 ｢ 계사상전 ｣ 제 8 장에서 다음과 같이 설명하였다 . 사람과 같이 함(同人)이 먼저는 부르짖어 울고 뒤에는 웃는다 하니, 공자께서 말씀하셨다. “군자의 도가 혹 나아가고 혹 처하고 혹 침묵하고 혹 말하나, 두 사람이 마음을 같이하니 그 날카로움(이로움)이 쇠를 끊는다. 같은 마음의 말은 그 향기가 난초와 같다.”(同人이 先號咷而後笑라하니 子曰 君子之道 或出或處或黙或語나 二人이 同心하니 其利 斷金이로다 同心之言이 其臭 如蘭이로다.) 象曰 同人之先은 以中直也오 大師相遇는 言相克也라. 상왈 동인지선    이중직야    대사상우    언상극야 상전에 말하였다. “‘동인지선’은 가운데하고 곧기 때문이요, ‘큰 군사로 서로 만남’은 서로 이김을 말한다.” 直: 곧을 직", "사효": "九四는 乘其墉호대 弗克攻이니 吉하니라. 구사    승기용       불극공      길 구사는 그 담에 오르되 능히 치지 않으니 길하다. 乘:탈 승   墉:담 용   弗:아닐 불   克:능할 극·이길 극   攻: 칠 공 구사는 나라 전체로 보면 대신 ( 大臣 ) 에 해당하는데 , 음 자리에 양으로 있어 자리는 바르지 못하다 . 구사가 변하면 외괘가 손 ☴ 이 되니 손순하게 구오의 명에 따르게 된다 . 象曰 乘其墉은 義弗克也오 其吉은 則困而反則也라. 상왈 승기용    의불극야   기길     즉곤이반칙야 상전에 말하였다. “그 담을 오름은 의리가 이기지 못하는 것이고, 그 길함은 곧 곤해서 법에 돌아오는 것이다.” 克:이길 극   困:곤궁할 곤   反:돌아올 반   則:법칙 칙·곧 즉 높은 담 위에 올라 때를 노리지만 , 대신으로서의 의리로 볼 때 구오를 이길 수 없다 . 그동안 구오 왕에게 대적하고자 했던 곤함에서 벗어나 대신으로서의 법도로 돌아오기 때문에 길하다 .", "오효": "구오 왕이 정당하고 강하기에 끝내 군사를 일으키지 못한다 . 내괘인 이화 ( 離火 ) ☲ 의 끝에 구삼이 자리하니 불같은 욕심이 있고 , 구오 왕의 명을 받들어 정치를 하지만 , 구오 왕이 육이만을 총애하니 구사도 이를 시기하여 구오 왕에게 대적하려는 마음을 품게 된다 . 그래서 왕궁의 담에 올라 시기를 노리다가도 중정한 구오 왕의 힘에 마음을 돌이켜 치지 않으니 길하게 된다 . 九五는 同人이 先號咷而後笑니 大師克이라아 相遇로다. 구오    동인    선호조이후소    대사극         상우 구오는 사람과 같이 함이 먼저는 부르짖어 울고 뒤에는 웃으니, 큰 군사로 이겨야 서로 만나도다. 號:부르짖을 호   咷:울 도(조)   笑:웃을 소   遇:만날 우 구오는 외괘에서 중정하여 천하를 다스리는 자리이다 . 그런데 외괘에서 중정한 구오가 내괘에서 중정한 육이 음 ( 陰 ) 을 만나야 하지만 , 구오가 육이를 만나고자 하는데 먼저는 만나지 못하여 울다가 뒤에는 만나게 되어 웃는 것은 구오가 중정하고 곧기 때문이다 . 또한 큰 군사로 서로 만나는 것은 구오가 큰 군사로써 구삼과 구사를 이기고 육이를 만나는 것을 말한다 .", "상효": "上九는 同人于郊니 无悔니라. 상구    동인우교   무회 상구는 사람과 같이 함을 들에서 하니 뉘우침이 없다. 郊:들 교(성 밖)   悔:뉘우칠 회 상구는 사람과 같이 한다는 동인괘의 맨 위에 처하여 실질적인 역할을 하지 못하는 상태이다 . 마치 현직에서 물러나 옛날의 지인 ( 知人 ) 들을 한적한 곳에서 만나는 격이다 . 그 자체가 허물이 될 것은 아니기 때문에 뉘우침이 없다고 하였다 . 동인괘 초구가 문밖에서 만나는 것은 도읍지 안에서 사회의 실질적인 일을 하기 위하여 만나는 것이고 , 상구가 들에서 만나는 것은 , 들은 도읍지 밖에 있는 것이기에 실질적인 일을 하지는 못한다 . 象曰 同人于郊는 志未得也라. 상왈 동인우교    지미득야 상전에 말하였다. “사람과 같이 함을 들에서 하는 것은 뜻을 얻지 못하는 것이다.” 상구는 맨 위에 처하여 실질적인 역할을 하고 싶어도 그 뜻을 이루지 못한다 . 상구가 변하면 태 ☱ 가 되니 , 후천팔괘방위로 서방 ( 저녁 ) 이 되어 이미 왕성했던 기운이 석양 ( 夕陽 ) 처럼 기우는 상이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 234 ∼241 쪽 ."}}, {"num": 14, "ko": "화천대유", "hanja": "火天大有", "lines": [1, 1, 1, 1, 0, 1], "url": "https://soosanss.tistory.com/166", "post_id": 166, "gwaui": "태양이 하늘 위로 솟아 천하를 비추듯이 악함을 막고 선함을 드날려 하늘의 아름다운 명을 따르라 ( 順天休命 ).", "gwamyung": "외괘가 이화 ( 離火 ) ☲ , 내괘가 건천 ( 乾天 ) ☰ 으로 되어 있는 괘를 ‘ 대유 ( 大有 ) ’ 라 한다 . 하늘 위에 해가 솟아올라 만물을 비추듯이 천하에 큰 것을 두었다 . 중천건 ( 重天乾 ) 괘 구오효가 변하면 화천대유괘가 되니 구오 대인이 천하를 잘 다스리는 상이다 . 중천건괘 구오효사를 다시 음미해 보자 .", "seogwa": "｢ 전 ｣ 은 천화동인괘 다음에 화천대유괘가 온 것을 다음과 같이 설명하고 있다 . 與人同者는 物必歸焉이라 故로 受之以大有하고 여인동자    물필귀언      고    수지이대유 사람과 더불어 같이 하는 자에게는 물건이 반드시 돌아간다. 그러므로 대유로써 받고 與:더불 여  歸:돌아갈 귀  焉: 어조사 언 뜻이 같은 사람들이 함께 모여 일을 도모하면 사업이 이루어지고 재물이 모여 번창하게 된다 . 그래서 천화동인괘 다음에 화천대유괘를 두었다 . 사업을 해서 크게 이루려면 뜻이 같은 사람을 먼저 만나야 할 것이다 .", "gwasa": "大有는 元亨하니라. 대유    원형 대유는 크고 형통하다. 大:큰 대   有:둘 유 대유괘는 일음오양 ( 一陰五陽 ) 괘로 유일한 음 ( 陰 ) 이 외괘에서 중을 얻어 다섯 양을 거느리는 상이다 . 중천건 ( 重 天乾 ) 괘 구오 대인이 중정한 정치로 세상을 다스리는 것이다 . 그러니 대유는 크고 형통하다 . 이에 대해 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 大有는 柔 得尊位하고 大中而上下 應之할새 曰大有니 단왈 대유    유 득존위       대중이상하 응지       왈대유 其德이 剛健而文眀하고 應乎天而時行이라 是以元亨하니라. 기덕    강건이문명      응호천이시행       시이원형 단전에 말하였다. “대유(大有)는 부드러운 것이 존귀한 자리를 얻고 크게 가운데 하고 위와 아래가 응하기 때문에 대유라 하니, 그 덕이 강건하며 문명하고, 하늘에 응하여 때로 행한다. 이로써 크고 형통하다.” 尊:높을 존   應: 응할 응 대유는 육오의 음 ( 陰 ) 이 외괘 중을 얻어 천자 ( 天子 ) 의 존귀한 자리에 있고 , 크게 중도를 발휘하여 대신 ( 大臣 ) 과 백성 등 위 아래가 육오 인군에게 응하니 대유이다 . 전체의 괘덕 ( 卦德 ) 으로 보면 내괘 건천 ( 乾天 ) ☰ 으로 강건하면서도 외괘 이화 ( 離火 ) ☲ 로 문명하고 , 마치 태양이 강건하게 하늘의 때에 맞추어 운행하듯이 ,", "gwasangsa": "象曰 火在天上이 大有니 君子 以하야 遏惡揚善하야 順天休命하나니라. 상왈 화재천상    대유    군자 이       알악양선      순천휴명 상전에 말하였다. “불이 하늘 위에 있는 것이 대유니, 군자가 이를 본받아 악함을 막고 선함을 드날려서 하늘의 아름다운 명을 따른다.” 遏:막을 알   惡:악할 악   揚:오를 양·드날릴 양   休:아름다울 휴· 쉴 휴 외괘의 이화 ( 離火 ) ☲ 가 내괘 건천 ( 乾天 ) ☰ 위에 있으니 , 마치 불이 하늘 위에 있는 상이다 . 하늘 위에 환한 불이 있으니 , 천하 만상을 모두 비추고 천하를 품에 안은 것이다 . 군자는 이러한 상을 보고 본받아 천하를 비추는 밝은 지혜로 악함은 막고 선함을 드날리며 , 이를 통해 하늘이 천하 만물을 낳은 그 아름다운 명에 순하게 따른다 . 효사 및 효상사", "hyosa": {"초효": "初九는 无交害니 匪咎나 艱則无咎리라. 초구    무교해    비구    간즉무구 초구는 해로운 데에 사귐이 없으니 허물이 아니나, 어렵게 하면 허물이 없을 것이다. 交:사귈 교   害:해로울 해   匪:아닐 비   艱: 어려울 간 환하게 모든 것을 비추고 있는 대유한 세상에 백성에 해당하는 초구는 악한 일을 하지 않도록 해로운 것에 사귐이 없어야 허물이 없다 . 그러나 초구가 변하면 내괘가 손풍 ( 巽風 ) ☴ 으로 세간 ( 世間 ) 의 풍문 ( 風聞 ) 을 따라 자기도 모르게 휩쓸리는 경우가 있으므로 어렵게 하고 조심해야 허물이 없다 . 象曰 大有初九는 无交害也라. 상왈 대유초구    무교해야 상전에 말하였다. “대유의 초구는 해로운데 사귐이 없는 것이다.”", "이효": "九二는 大車以載니 有攸往하야 无咎리라. 구이    대거이재    유유왕      무구 구이는 큰 수레로써 실으니, 갈 바를 두어 허물이 없을 것이다. 車:수레 거   載:실을 재   攸: 바 유 구이는 비록 음 자리에 양으로 있으나 , 내괘의 중을 얻고 외괘의 육오 인군과 잘 응하고 있다 . 내괘 건천 ( 乾天 ) ☰ 의 중 ( 中 ) 에 있고 , 구이가 변하면 이화 ( 離火 ) ☲ 가 되니 큰 수레의 상이다 . 이 ( 離 ) ☲ 는 속이 비어 있는 상이어서 수레로 통한다 . 따라서 대유한 세상에서 큰 수레에 지식과 경륜을 가득 실어 육오 인군의 명을 받아 천하사를 도모할 수 있으니 , 갈 바를 두어 허물이 없는 것이다 . 象曰 大車以載는 積中不敗也라. 상왈 대거이재    적중불패야 상전에 말하였다. “큰 수레로써 실음은 가운데 쌓아서 패하지 않는 것이다.” 積:쌓을 적   敗: 패할 패", "삼효": "九三은 公用亨于天子니 小人은 弗克이니라. 구삼   공용향우천자    소인    불극 구삼은 공(公)이 천자에게 바침이니, 소인은 능하지 못한다. 亨:제사드릴 향(享)   弗:아닐 불   克:능할 극 구삼은 지방제후에 해당하는데 , 양이 양자리에 있고 중을 얻지 못하여 지나치게 강한 상태이다 . 구삼은 대유한 세상에 약한 육오 인군의 명을 받아 평화로운 세상을 일구어 나가야 한다 . 대유한 세상을 만들어 가는 정책 중의 하나가 지방의 재정 ( 財政 ) 을 공정하게 모아 나라에 보태는 것이다 . 그런데 구삼 자리가 중을 얻지 못하고 양 자리에 양으로 있어 지나치게 강하니 , 만일 이런 자리에 소인이 있다면 유순한 육오 인군에게 재정을 보태기는커녕 반역할 수도 있다 . 이런 자리에 유순한 인군을 도와 천하를 태평하게 하는 것은 군자라야 가능하다는 뜻이다 . 그래서 세상을 평정하여 나라를 세우는 수지비 ( 水地比 ) 괘 상육효에 “ 나라를 열고 가문을 이음에 소인은 쓰지 말라 ( 開國承家 小人勿用 ) ” 고 하였다 . 구삼이 변하면 양이 음으로 바뀌면서 화택규 ( 火澤 睽 ) 괘가 되니 , 이 자리는 자칫 나라의 평화를 어긋나게 하는 자리가 될 수도 있다 . 象曰 公用亨于天子는 小人은 害也리라. 상왈 공용향우천자    소인    해야 상전에 말하였다. “공이 천자에게 바치는 것은 소인은 해로울 것이다.” 소인이 구삼 즉 지방 제후 자리에 있다면 지나치게 강하여 육오 인군의 명을 어기게 되니 , 나라를 해칠 뿐 아니라 결국은 자기 자신을 해치게 된다 .", "사효": "九四는 匪其彭이면 无咎리라. 구사    비기방       무구 구사는 그 차지 않으면 허물이 없을 것이다. 匪:아닐 비   彭:곁 방·북치는 소리 방·많을 방·강성할 방·띵띵할 팽 구사는 유약한 인군을 보좌하는 대신 ( 大臣 ) 이다 . 그런데 음 자리에 양으로 있으니 위가 부당하여 때로는 지나친 욕심을 부릴 수도 있다 . 나라가 평안하고 부유하게 되려면 정부 관리가 사리사욕 ( 私利私慾 ) 을 버려야 한다 . 그래서 구사 자신이 사리사욕을 부려 권력과 재물을 축재하지 않으면 허물이 없다고 한 것이다 . 구사가 변하면 양이 음으로 되어 구사 자신은 비어 있는 상이지만 , 전체적으로는 괘상이 산천대축 ( 山天大畜 ) 으로 되니 나라 전체가 크게 쌓는 상이 된다 . 나라를 위해 정치하는 자가 어떠한 자세를 지녀야 진정 나라를 부강하게 할 수 있는가를 이를 통해 알 수 있다 . 象曰 匪其彭无咎는 明辨晢也라. 상왈 비기방무구    명변제야 상전에 말하였다. “그 차지 않아서 허물이 없음은 밝게 분별하는 지혜이다.” 辨:분별할 변   晢:밝을 절·별 반짝반짝할 제·지혜 제 구사 대신이 정치를 잘 하려면 자신의 치부 ( 致富 ) 에 욕심을 두지 말고 , 유약한 인군을 도와서 밝은 지혜로 나라 일을 잘 다스려야 한다 . 외괘가 이화 ( 離火 ) ☲ 이니 밝은 지혜의 상이다 . 六五는 厥孚 交如니 威如면 吉하리라.", "오효": "九五는 飛龍在天이니 利見大人이니라 . 구오는 나는 용이 하늘에 있으니, 대인을 봄이 이롭다. 육오의 정치가 하늘에 응하여 때에 맞게 행해지기 때문에 크고 형통하다 . 육오    궐부 교여    위여    길 육오는 그 미덥게 사귀니, 위엄이 있으면 길할 것이다. 厥:그 궐   如:어조사 여   威: 위엄 위 육오는 외괘의 중을 얻어 대유한 세상을 다스리는 천자 ( 天子 ) 이다 . 대유괘는 다섯 양이 강한 상황에 천자인 육오 인군만이 음 ( 陰 ) 으로 유약하다 . 이는 태평한 세상에서는 천자 왕의 역할이 그다지 강하지 않아도 된다는 것을 의미하기도 한다 . 그런데 유일한 음으로 백성과 신하 , 위아래의 다섯 양을 다스리기 위해서는 특정 계층에게만 믿음을 주어서는 안 되고 , 백성부터 신하에 이르기까지 두루 미덥게 사귀어 바른 정책의 은덕이 베풀어지게 해야 한다 . 그리고 천자 자리에 있지만 유약하기 때문에 구삼과 같이 반역 ( 叛逆 ) 의 조짐이 있을 수도 있으니 , 천자로서의 위엄을 갖추어야 길하다 . 象曰 厥孚交如는 信以發志也오 威如之吉은 易而无備也일새라. 상왈 궐부교여    신이발지야    위여지길    이이무비야 상전에 말하였다. “그 미덥게 사귐은 믿음으로써 뜻을 발하는 것이고, 위엄이 있어 길함은 안이하게 하면 갖추지 못하기 때문이다.” 信:믿을 신   易:쉬울 이   備: 갖출 비 천자 ( 天子 ) 가 대유한 세상에 정치를 잘 하기 위해서는 진정한 믿음으로 뜻을 나타내야 한다 . 마찬가지로 오늘날 정치현실에서도 진정한 믿음이 없이 공약 ( 公約 ) 이 아닌 공약 ( 空約 ) 을 남발해서는 안 된다 . 위엄을 보여야 한다는 것은 , 만일 유약하다고 안일하게 대처하면 천자의 자리뿐만 아니라 나라의 기강 ( 紀綱 ) 이 갖추어지지 못하게 되기 때문이다 .", "상효": "上九는 自天祐之라 吉无不利로다. 상구    자천우지    길무불리 상구는 하늘로부터 돕는다. 길하여 이롭지 않음이 없도다. 祐:도울 우 대유한 세상에 천하가 양강 ( 陽剛 ) 한데 다스리는 육오 인군은 유약하니 , 유약한 인군이 어떻게 양강한 천하를 다스릴 수 있겠는가 ? 이는 유약한 육오 인군을 상구가 잘 보필하여 주고 , 때로는 인군 대신 정치를 하기 때문이다 . 천하를 경륜해 온 선임자로서 유약한 인군을 도와서 나라를 대유하게 만드니 , 하늘로부터 도와서 길하고 또한 이롭지 않음이 없다 . 이에 대해 ｢ 계사상전 ｣ 제 12 장에서는 다음과 같이 설명하고 있다 . 역에 말하길 “하늘로부터 돕는다. 길해서 이롭지 않음이 없다”라 하니, 공자께서 말씀하셨다. “우(祐)라는 것은 돕는 것이니, 하늘이 돕는 바는 순함이요, 사람이 돕는 바는 믿음이니, 믿음을 이행하고 순함을 생각하고 또 어진 이를 숭상한다. 이로써 하늘로부터 도와서 길하여 이롭지 않음이 없는 것이다.”(易曰 自天祐之라 吉无不利라하니 子曰 祐者는 助也니 天之所助者 順也오 人之所助者 信也니 履信思乎順하고 又以尙賢也라 是以自天祐之吉无不利也니라.) 무왕 ( 武王 ) 이 은나라 마지막 왕 주 ( 紂 ) 왕을 정벌하고 주 ( 周 ) 나라 시대를 열었는데 , 무왕이 죽자 그 아들 성왕 ( 成王 ) 이 어린 나이에 제위 ( 帝位 ) 에 오르게 되었다 . 이때 무왕의 동생이자 성왕의 숙부가 되는 주공 ( 周公 ) 이 성왕을 보필하며 섭정 ( 攝 政 ) 하여 주나라를 이끌었는데 , 바로 이것이 화천대유 상육효의 대표적인 사례라 할 수 있다 . 주공이 나이 어린 성왕을 가르치는 한 단면을 《 예기 ( 禮記 ) 》 ｢ 문왕세자편 ｣ 에 있는 다음 내용을 통해 살펴볼 수 있다 . 성왕이 어려서 능히 제위에 임하지 못하니, 재상 주공이 제위를 밟아 다스리셨다. 세자가 되는 법을 (아들인) 백금에게 들어올리게 하니 성왕으로 하여금 부자·군신·장유의 도를 알게 하고자 함이었다. 성왕이 허물이 있으면 백금을 매질하시니 성왕에게 세자의 도를 보인 바이다. 이는 문왕이 세자된 것이다.(成王이 幼하야 不能涖阼하니 周公相이 踐阼而治하시니라. 抗世子法於伯禽케하니 欲令成王之知父子君臣長幼之道也라. 成王有過하면 則撻伯禽하시니 所以示成王世子之道也라. 文王之爲世子也라.) 象曰 大有上吉은 自天祐也라. 상왈 대유상길    자천우야 상전에 말하였다. “대유의 상구가 길함은 하늘로부터 돕는 것이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 242 ∼249 쪽 ."}}, {"num": 15, "ko": "지산겸", "hanja": "地山謙", "lines": [0, 0, 1, 0, 0, 0], "url": "https://soosanss.tistory.com/167", "post_id": 167, "gwaui": "후덕한 산이 땅 아래에 있듯이 부유함을 덜어서 가난함에 보태어 사회의 형평을 유지하고 , 상황을 잘 판단하여 공평하게 베풀어라 ( 稱物平施 ).", "gwamyung": "외괘가 곤지 ( 坤地 ) ☷ , 내괘가 간산 ( 艮山 ) ☶ 으로 이루어진 괘를 ‘ 겸 ( 謙 ) ’ 이라 한다 . 땅 위에 있어야 할 높은 산이 오히려 땅 아래에 있으니 , 겸손하게 자기를 낮추는 상이다 . 비 ․ 바람 등의 자연현상이 지나치면 재앙을 가져오게 되지만 순하면 만물의 생화작용이 편안하게 이루어진다 . 마찬가지로 세상사도 자기 자신을 지나치게 내세우면 시기와 질투를 받고 때로는 해로움도 당하지만 , 자신을 낮추어 겸손하게 하면 만인이 좋아하고 따르게 된다 . 지산겸괘는 일양오음 ( 一陽五陰 ) 괘로 그 체 ( 體 ) 는 중지곤 ( 重地坤 ) 괘에 있다 . 중지곤괘 육삼효가 변하면 지삼겸괘가 되니 , 곤괘 육삼효사를 음미해 보자 . 六三은 含章可貞이니 或從王事하야 无成有終이니라.", "seogwa": "｢ 전 ｣ 은 화천대유괘 다음에 지산겸괘를 둔 이유를 다음과 같이 설명하고 있다 . 有大者는 不可以盈이라 故로 受之以謙하고 유대자    불가이영      고    수지이겸 큰 것을 둔 자는 가히 채우지 못한다. 그러므로 겸으로써 받고 盈:찰 영 큰 것을 둔 자일수록 마음을 비우고 낮추어야 한다 . 중천건괘의 상구효사에서 살펴보았듯이 , 뉘우치는 용 ( 亢龍 ) 이 되지 않기 위해서는 스스로를 낮추어야 한다 . 그래서 겸손하다는 지산겸괘를 화천대유괘 다음에 두었다 .", "gwasa": "謙은 亨하니 君子 有終이니라. 겸    형      군자 유종 겸은 형통하니, 군자가 마침이 있다. 謙:겸손할 겸   終: 마칠 종 산과 같이 높은 능력과 지위가 있더라도 땅 아래에 처하듯이 겸손하니 , 모든 일이 형통하게 된다 . 또한 어떠한 일이든 잘 마칠 수 있다 . 그야말로 유종 ( 有終 ) 의 미 ( 美 ) 를 거두는 것이다 . 이에 대해 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 謙亨은 天道 下濟而光明하고 地道 卑而上行이라. 단왈 겸형    천도 하제이광명       지도 비이상행 天道는 虧盈而益謙하고 地道는 變盈而流謙하고 천도    휴영이익겸       지도    변영이유겸 鬼神은 害盈而福謙하고 人道는 惡盈而好謙하나니 귀신    해영이복겸       인도    오영이호겸 謙은 尊而光하고 卑而不可踰니 君子之終也라. 겸    존이광       비이불가유    군자지종야 단전에 말하였다. “겸이 형통함(謙亨)은 하늘의 도가 아래로 내려서 광명하고, 땅의 도는 낮은데서 위로 행한다. 하늘의 도는 가득한 것을 이지러지게 하며 겸손한 데에는 더하고, 땅의 도는 가득한 것을 변하게 하며 겸손한 데로 흐르게 하고, 귀신은 가득한 것을 해롭게 하며 겸손함에는 복을 주며, 사람의 도는 가득한 것을 미워하며 겸손한 것을 좋아하니, 겸(謙)은 높고 빛나고 낮아도 가히 넘지 못하니 군자의 마침이다.” 濟:건널 제   卑:낮을 비   虧:이지러질 휴   盈:찰 영   益:더할 익  變:변할 변   流:흐를 류   福:복 복 惡:미워할 오   好:좋을 호  尊:높을 존   踰: 넘을 유 하늘은 위에 있지만 그 기운은 아래로 내려서 세상을 광명하게 하고 , 땅은 아래에 있지만 그 기운은 위로 올라가 하늘과 합한다 . 높으면 높을수록 아래로 내려와야 그 덕이 광명하게 되고 , 자신을 낮추면 그 덕은 위로 올라간다 . 천도 ( 天道 )· 지도 ( 地道 )· 신도 ( 神道 )· 인도 ( 人道 ) 의 사법계 ( 四法界 ) 가 다 이러한 것이다 . 세상사의 모든 일이 겸손함으로 유종 ( 有終 ) 의 미 ( 美 ) 를 이룬다 .", "gwasangsa": "象曰 地中有山이 謙이니 君子 以하야 裒多益寡하야 稱物平施하나니라. 상왈 지중유산    겸       군자 이      부다익과       칭물평시 상전에 말하였다. “땅 가운데 산이 있음이 겸(謙)이니, 군자가 이를 본받아 많은 것을 덜어 적은 데에 더해서, 물건을 저울질하여 베풂을 고르게 한다.” 裒:덜 부·줄 부·모을 부·포로 부   寡:적을 과   稱:저울질할 칭   施:베풀 시 땅 위로 솟아 있어야 할 산이 땅 가운데에 낮게 처하니 , 이러한 상을 보고 군자는 많은 것은 덜어내어 적은 데에 더하고 , 모든 상황을 잘 저울질해서 사회의 형평 ( 衡平 ) 과 평등 ( 平等 ) 을 구현하여야 한다 . 사회정의 ( 社會正義 ) 의 기본 핵심은 형평과 평등에 있다 . 사회의 병폐가 되는 ‘ 부익부 ( 富益富 ) 빈익빈 ( 貧益貧 ) ’ 현상을 완화하기 위해 누진세 ( 累進稅 ) 등의 세금정책을 통해 재원 ( 財源 ) 을 마련하고 , 그 자금으로 가난한 자에게 복지혜택을 구현하는 것이 가장 대표적인 예이다 . 겸 ( 謙 ) 은 사회정의 ( 社會正義 ) 이고 평등 ( 平等 ) 을 구현하는 원리이다 . 효사 및 효상사 初六은 謙謙君子니 用涉大川이라도 吉하니라. 초륙   겸겸군자     용섭대천         길", "hyosa": {"초효": "초육은 겸손하고 겸손한 군자이니, 큰 내를 건너더라도 길하다. 用:써 용(以)·쓸 용   涉:걸어서 건널 섭 초육는 양자리에 음으로 있고 겸괘의 맨 아래에 있다 . 겸손한 괘체에서 맨 아래에 처하고 또한 음으로 있으니 겸손하고 겸손한 군자이다 . 이렇게 겸손하면 무슨 일을 하더라도 능히 감당할 수 있다 . 이러한 군자는 큰일을 시켜도 능히 이루어 낼 수 있다 . 象曰 謙謙君子는 卑以自牧也라. 상왈 겸겸군자    비이자목야 상전에 말하였다. “겸손하고 겸손한 군자는 낮춤으로써 스스로 기른다.” 牧: 기를 목 초육의 겸손하고 겸손함은 스스로를 낮추어 덕을 기르는 것이다 . 六二는 鳴謙이니 貞코 吉하니라.", "이효": "육이    명겸      정    길 육이는 겸손함을 울리니, 바르게 하고 길하다. 鳴:울 명·울릴 명 육이는 내괘에서 중정한 자리에 있어 억지로 겸손하려고 하지 않아도 겸손함이 저절로 울려 퍼지는 상이다 . 내괘의 간산 ( 艮山 ) ☶ 으로 덕이 있는 상태에 육이가 변하면 손풍 ( 巽風 ) ☴ 이 되니 더욱 겸손하다 . 象曰 鳴謙貞吉은 中心得也라. 상왈 명겸정길    중심득야 상전에 말하였다. “겸손함을 울림이 바르게 해서 길함은 중심을 얻은 것이다.”", "삼효": "육삼은 빛남을 머금어 가히 바르게 하니 혹 왕의 일을 좇아 이룸은 없지만 마침은 있다. 九三은 勞謙이니 君子 有終이니 吉하니라. 구삼    노겸      군자 유종       길 구삼은 수고로워도 겸손하니, 군자가 마침이 있으니 길하다. 勞:수고할 로 구삼은 일양오음 ( 一陽五陰 ) 의 겸괘 ( 謙卦 ) 에서 유일한 양 ( 陽 ) 이다 . 내괘 간산 ☶ 의 위에
