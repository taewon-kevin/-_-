. 그렇지만 그 빛과 열이 너무 심하여 재앙이 되기도 한다 . 중천건 ( 重天乾 ) 괘 구이효와 구오효가 변하면 중화리 ( 重火離 ) 괘가 된다 . 빛 , 태양 , 열은 하늘에 걸려 있다 . 중수감 ( 重水坎 ) 괘는 중지곤 ( 重地坤 ) 땅에 근원하여 오는 재앙이라면 , 중화리 ( 重火離 ) 괘는 중천건 ( 重天乾 ) 하늘에 근원하여 오는 재앙이다 . 중화리괘의 호괘가 택풍대과 ( 澤風大過 ) 이니 선후천의 변혁기에 나타나는 하늘의 재앙이다 .", "seogwa": "｢ 전 ｣ 은 중수감괘 다음에 중화리괘가 온 것을 다음과 같이 설명하고 있다 . 坎者는 陷也니 陷必有所麗라 故로 受之以離하니 離者는 麗也라. 감자    함야    함필유소리    고   수지이리       리자    리야 감(坎)은 빠지는 것이니 빠지면 반드시 걸리는 바가 있다. 그러므로 이(離)로써 받으니, 이(離)는 걸리는 것이다. 陷:빠질 함   麗:고울 려· 걸릴 리 거듭 험한 중수감괘에서 빠지면 끝없이 빠지는 것이 아니다 . 자연의 이치가 평평하면 언덕지게 되고 가면 돌아오듯이 , 빠지다 보면 걸리는 바가 있게 된다 . 그래서 빠진다는 중수감괘 다음에 걸린다는 중화리괘를 두었다는 설명이다 .", "gwasa": "離는 利貞하니 亨하니 畜牝牛하면 吉하리라. 리    이정       형      휵빈우       길 이(離)는 바르게 함이 이로우니, 형통하니, 암소를 기르면 길할 것이다. 離:떠날 리·붙을 리·걸릴 리   畜:기를 휵   牝: 암컷 빈 중천건 ( 重天乾 ) : 豐은 亨하니 王이아 假之하나니 勿憂홀전 宜日中이니라 . 그런데 중화리괘는 중수감괘와 더불어 천도가 선천에서 후천으로 변하는 택풍대과 시대에 나타나는 하늘의 재앙을 의미한다면 , 중화리괘 상효가 변하여 간 뇌화풍괘는 《 주역》 64 괘 가운데 형벌 ( 刑罰 ) 을 나타내는 대표적인 괘로서 특히 , 하늘에서 내리는 형벌 ( 심판 ) 을 뜻한다 . 이에 관한 자세한 내용은 하경 ( 下經 ) 뇌화풍괘를 참고하기 바란다 . [상경 30괘 회광반조(回光反照)] 30번째 중화리괘로서 《 주역》 상경 30 괘를 마무리하게 된다 . 다음의 상경 30", "danssa": "彖曰 離는 麗也 니 日月이 麗乎天하며 百穀草木이 麗乎土하니 단왈 리    리야     일월    이호천      백곡초목    이호토 重明으로 以麗乎正하야 乃化成天下하나니라. 중명       이리호정      내화성천하 柔 麗乎中正故로 亨하니 是以畜牝牛吉也라. 유 리호중정고    형      시이휵빈우길야 단전에 말하였다. “이(離)는 걸림이니, 해와 달이 하늘에 걸리며 백곡과 초목이 땅에 걸리니, 거듭 밝음으로 바른 데 걸려, 이에 천하를 화하여 이룬다. 부드러운 것이 중정한 데에 걸린 까닭에 형통하니, 이로써 암소를 기르면 길하다.” 麗:걸릴 리   穀:곡식 곡   重 : 거듭 중 이 ( 離 ) 는 걸리는 것이다 . 해와 달은 하늘에 걸려 빛나고 , 백가지 곡식과 초목은 땅에 걸려 생화하고 있다 . 이렇게 하늘과 땅이 내괘 이화 ( 離火 ) ☲ 와 외괘 이화 ( 離火 ) ☲ 의 거듭 밝음으로 바른 데 걸려 천하를 화하여 이루고 있다 . 내괘의 육이와 외괘의 육오 두 음 ( 陰 ) 이 중정 ( 中正 ) 한 데 걸려서 형통하니 , 암소를 기르면 길하다 .", "gwasangsa": "象曰 明兩이 作離하니 大人이 以하야 繼明하야 照于四方하나니라. 상왈 명량    작리      대인    이       계명       조우사방 상전에 말하였다. “밝은 것 둘이 이(離)를 지으니, 대인이 이를 본받아 밝음을 이어서 사방에 비춘다.” 作:지을 작   繼:이을 계   照: 비출 조 내괘도 이화 ( 離火 ) ☲ , 외괘도 이화 ( 離火 ) ☲ 니 , 밝은 것 둘이 이괘 ( 離卦 ) 를 지은 것이다 . 중화리괘는 또한 중천건 ( 重天乾 ) 의 구이와 구오가 변하여 이루어지니 , 중천건괘 구이와 구오 대인이 이러한 기운을 본받아 천지의 밝음을 이어서 사방을 비추며 중생을 구제하는 것이다 . 중천건괘 구이효사와 구오효사를 다시 음미해 보자 .", "hyosa": {"초효": "初九는 履 錯然하니 敬之면 无咎리라. 초구    리 착연      경지    무구 초구는 밟는 것이 섞이니, 공경하면 허물이 없을 것이다. 履:밟을 리   錯:섞일 착   敬:공경할 경 초구는 내괘 이화 ( 離火 ) ☲ 의 맨 아래에 있는 백성의 자리이다 . 세상을 살아가면서 밟아 온 이력이 이리저리 섞여 있다 . 일반 민초 ( 民草 ) 의 삶이란 이런 것이다 . 때로는 선하지 못한 일도 있고 , 때로는 불의 ( 不意 ) 의 재난도 받고 , 때로는 좋은 일도 하면서 그렇게 살아 온 이력이다 . 그러나 공경하는 마음으로 본성을 지키고자 노력하면 허물이 없다 . 깨닫지 못한 인생은 우주에 던져진 나그네일 뿐이다 . 신 ( 神 ) 에 대한 경외감이 항상 인간을 자성 ( 自省 ) 하게 할 뿐이다 . 象曰 履錯之敬은 以辟咎也라. 상왈 이착지경    이피구야 상전에 말하였다. “밟는 것이 섞임에 공경하는 것은 허물을 피하는 것이다.” 중화리괘 맨 아래 초효는 일반 민초 ( 民草 ) 의 삶을 의미한다 . 백성으로서 살아가는 인생에서 이런 일 저런 일이 많이 섞여 있지만 매사에 공경하는 마음을 가지고 살아가면 허물을 피할 수 있다 . 六二는 黃離니 元吉하니라.", "이효": "九二는 見龍在田이니 利見大人이니라. 구이는 나타난 용이 밭에 있으니, 대인을 봄이 이롭다. 육이    황리    원길 육이는 누렇게 걸리니 크게 길하다. 黃: 누를 황 육이는 내괘에서 중정 ( 中正 ) 한 자리이다 . 태양도 누런 빛이고 , 육이 중 ( 中 ) 의 자리도 누런 빛이다 . 마치 태양이 하늘 가운데 걸려 빛나듯이 , 중도 ( 中道 ) 를 지켜 살아 온 삶은 크게 길하다 . 육이가 변하면 화천대유 ( 火天大有 ) 괘가 된다 . 象曰 黃離元吉은 得中道也라. 상왈 황리원길    득중도야 상전에 말하였다. “누렇게 걸려 크게 길함은 중도를 얻은 것이다.”", "삼효": "육삼은 무망의 재앙이니, 혹 소를 매나 지나가는 사람의 얻음이 읍 사람의 재앙이로다. 단전은 다음과 같이 설명하고 있다 . 九三은 日昃之離니 不鼓缶而歌면 則大耋之嗟라 凶하리라. 구삼    일측지리    불고부이가    즉대질지차    흉 구삼은 해가 기울어져 걸리니, 장구를 두드리고 노래하지 않으면, 곧 큰 노인이 슬퍼한다. 흉할 것이다. 昃:기울 측   鼓:북 고·두드릴 고   缶:장군 부(질그릇)   歌:노래 가   耋:늙은이 질   嗟:탄식할 차 구삼은 내괘에서 외괘로 넘어가는 자리이다 . 중화리 ( 重火離 ) 괘에서 내괘는 오전· 선천이고 외괘는 오후· 후천이다 . 외호괘가 태택 ( 兌澤 ) ☱ 이니 , 태 ☱ 는 후천팔괘방위로 서방· 저녁으로 석양 ( 夕陽 ) 을 뜻한다 . 선천의 해가 기울어지고 있다 . 선천에서 후천으로 가는 전환기로서 새로운 세상을 맞이하기 위한 큰 변화가 오고 있다 . 이러한 때에 장구를 두드리고 노래하면서 새로운 세상이 옴을 알려야 한다 . 그렇지 않으면 하늘의 조화옹 ( 造化翁 ) 이 슬퍼하게 된다 . 왜냐하면 선천에서 후천으로 넘어갈 때 큰 변화가 일어나 재앙이 닥치며 세상을 심판하기 때문이다 . 구삼이 변하면 화뢰서합 ( 火雷噬嗑 ) 괘가 되니 , 하늘이 형벌 ( 刑罰 ) 을 내리는 것이다 . ‘ 질 ( 耋 ) ’ 은 칠십 팔십 세가 된 노인을 지칭하는데 , ‘ 대질 ( 大耋 ) ’ 은 큰 노인으로 곧 조물주 ( 造物主 )· 조화옹 ( 造化翁 )· 하느님을 상징하는 개념이다 . 象曰 日昃之離 何可久也리오. 상왈 일측지리 하가구야 상전에 말하였다. “해가 기울어져 걸림이 어찌 가히 오래하겠는가?” 해가 기울어져 걸려 있다는 것은 현 상황이 오래 가지 못하고 곧 큰 변화가 온다는 뜻이다 . 구삼에서 선천 ( 先天 ) 의 해가 기울어져 큰 변화가 있음을 북을 두드리고 노래하면서 알려야 한다고 했다 .", "사효": "九四는 突如其來如라 焚如니 死如며 棄如니라. 구사    돌여기래여   분여    사여    기여 구사는 돌연히 그것이 온다. 불사르니 죽이며 버린다. 突:갑자기 돌   焚:불사를 분   死:죽을 사   棄:버릴 기 구사는 드디어 후천 ( 後天 ) 을 맞이하는 큰 변화가 닥친다 . 구사에 와서는 이미 그 변화의 단계로 넘어와 있으니 , 갑작스럽게 불의 재앙이 오는 것이다 . 만물을 불사르고 , 생명을 죽이고 버린다 . 때를 모르고 헛된 인생을 살아가는 망령된 존재들을 어찌 용납하겠는가 ? 象曰 突如其來如는 无所容也니라. 상왈 돌여기래여    무소용야 상전에 말하였다. “돌연히 그것이 옴은 용납할 바가 없다.” 容:얼굴 용·용납할 용 六五는 出涕沱若하며 戚嗟若이니 吉하리라.", "오효": "九五는 飛龍在天이니 利見大人이니라. 구오는 나는 용이 하늘에 있으니, 대인을 봄이 이롭다. 효사 및 효상사 육오    출체타약      척차약       길 육오는 눈물 나옴이 물 흐르듯 하며, 슬퍼하고 탄식하는 듯하니 길할 것이다. 涕:눈물 체   沱:눈물흐를 타   若:같을 약   戚:슬퍼할 척   嗟: 탄식할 차 육오는 외괘에서 중을 지킨 왕공 ( 王公 ) 의 자리이다 . 외괘가 이화 ( 離火 ) ☲ 로 불의 재앙이요 , 육오가 변하면 외괘가 건천 ( 乾天 ) ☰ 의 하늘로 된다 . 세상이 크게 변하고 인간으로서 어찌할 수 없는 재앙이 하늘로부터 닥치니 , 도탄에 빠진 중생을 보며 왕으로서 눈물만 흘릴 수밖에 없다 . 뭐라 표현할 수 없는 근심과 슬픔이 왕공을 억누르나 , 왕공으로서도 어찌할 수 없는 상황이기에 왕공 ( 王公 ) 자신으로서는 길하다 . 象曰 六五之吉은 離王公也일새라. 상왈 육오지길    이왕공야 상전에 말하였다. “육오의 길함은 왕공에 걸려 있기 때문이다.” 육오 자리에서 왕공 ( 王公 ) 은 하늘로부터 내리는 재앙을 어찌할 수 없어 눈물만 흘릴 수밖에 없었다 . 올바른 세상을 구현하는 것은 단지 하늘의 징벌만으로 이루어지는 것은 아니다 . 세상의 악 ( 惡 ) 을 징벌하기 위해 드디어 하늘의 왕 ( 王 ) 이 나선다 .", "상효": "上九는 王用出征이면 有嘉니 折首코 獲匪其醜면 无咎리라. 상구    왕용출정      유가    절수    획비기추    무구 상구는 왕이 나가서 정벌하면 아름다움이 있으니, 머리를 결단하고, 얻는 것이 그 무리가 아니면, 허물이 없을 것이다. 征 : 칠 정 嘉 : 아름다울 가 折 : 꺾을 절· 결단할 절 獲 : 얻을 획 匪 : 아닐 비 醜 : 추할 추 · 무리 추 상구가 변하면 양이 음으로 바뀌면서 외괘가 진뢰 ( 震 雷 ) ☳ 가 되니 군사를 일으켜 정벌에 나선다 . 이렇게 하여 세상을 평정하니 아름답게 된다 . 악한 무리를 징벌함에 그 수괴 ( 首魁 ) 만 처벌하면 되고 그를 따르던 무리는 살려두어야 한다 . 악한 지도자의 억압에 복종했던 무리들은 지도자가 바뀌면 곧 선하게 되기 때문이다 . 象曰 王用出征은 以正邦也라. 상왈 왕용출정    이정방야 상전에 말하였다. “왕이 나가서 정벌함은 나라를 바르게 하는 것이다.” 왕이 정벌하러 가는데 , 그 정벌은 어떻게 이루어지는가 ? 중화리 ( 重火離 ) 괘 상구효가 변하면 55 번째 ( 하경 25 번째 ) 에 있는 뇌화풍 ( 雷火豐 ) 괘가 된다 . 뇌화풍괘는 천벌 ( 天罰 ) 을 의미하는 대단히 중요한 괘이다 . 중화리괘와 뇌화풍괘의 관련성을 살펴보면 다음과 같다 . ◈ 상경 마지막괘 마지막효인 중화리괘 상구효와 하경 55번째 뇌화풍괘 중화리괘 상구효가 변하면 뇌화풍괘로 된다 . 중화리괘 상구효에서 “ 왕이 나가서 정벌한다 ( 王用出征 ) ” 고 하였고 , 뇌화풍괘 괘사에서는 “ 풍은 형통하니 왕이 이르니 , 근심치 말 것이니 , 마땅히 해가 가운데한다 ” 고 하여 중화리괘 상구효에서 출정 ( 出征 ) 한 왕이 뇌화풍괘에서 왕림한다는 것을 알 수 있다 . 重火離卦 上九는 王用出征이면 有嘉니 折首코 獲匪其醜면 无咎리라. 雷火豐卦"}}, {"num": 31, "ko": "택산함", "hanja": "澤山咸", "lines": [0, 0, 1, 1, 1, 0], "url": "https://soosanss.tistory.com/183", "post_id": 183, "gwaui": "연못과 산이 아무 사사로움이 없이 기운을 통하여 천기와 지기를 교류하듯이 , 남녀관계를 비롯한 인간의 사회적 관계에서도 마음을 비우고 서로의 기운을 교감하여 뜻을 통하라 ( 以虛受人 ).", "gwamyung": "외괘가 태택 ( 兌澤 ) ☱ , 내괘가 간산 ( 艮山 ) ☶ 으로 이루어진 괘를 ‘ 함 ( 咸 ) ’ 괘라 한다 . 연못과 산이 기운을 통하듯이 서로의 기운을 통하여 느끼는 것이다 . 상경 ( 上經 ) 은 천도 ( 天道 ) 의 광대한 기운 양상을 표현한 것이기에 중천건 ( 重天乾 ) 과 중지곤 ( 重地坤 ) 의 천지기운이 교감하는 것으로 시작하고 , 하경 ( 下經 ) 은 인사 ( 人事 ) 의 현실적인 교감을 나타낸 것이기에 남녀 ( 男女 ) 의 교감작용으로 시작하고 있다 . 외괘의 태 ☱ 소녀와 내괘의 간 ☶ 소남이 교감한다 . 또한 산 위에 연못이 있어 산의 기운과 연못의 기운이 서로 기운을 통하는 양상이다 ( 山澤通氣 ). 선천에서 후천으로 넘어가는 것을 나타낸 택풍대과 ( 澤風大過 ) 괘에 후천의 시작을 의미하는 택산함 ( 澤山咸 ) 괘와 뇌풍항 ( 雷風恒 ) 괘가 내재되어 있음을 살펴본 바 있다 .", "seogwa": "｢ 전 ｣ 은 하경 첫 번째로 택산함괘를 둔 이유를 다음과 같이 설명하고 있다 . 有天地然後에 有萬物하고 有萬物然後에 有男女하고 유천지연후    유만물      유만물연후    유남녀 有男女然後에 有夫婦하고 有夫婦然後에 有父子하고 유남녀연후    유부부      유부부연후    유부자 有父子然後에 有君臣하고 有君臣然後에 有上下하고 유부자연후    유군신       유군신연후   유상하 有上下然後에 禮義有所錯니라. 유상하연후    예의유소조 천지(天地)가 있은 다음에 만물이 있고, 만물(萬物)이 있은 다음에 남녀가 있고, 남녀(男女)가 있은 다음에 부부가 있고, 부부(夫婦)가 있은 다음에 부자가 있고, 부자(父子)가 있은 다음에 군신이 있고, 군신(君臣)이 있은 다음에 상하가 있고, 상하(上下)가 있은 다음에 예의(禮義)를 두는 바가 있는 것이다. 錯:둘 조·섞일 착 하늘과 땅이 있은 다음에 만물이 나온다 . 만물이 있은 다음에 인간으로서의 남자와 여자가 생기고 , 남녀가 있으니 서로 기운을 통하여 부부가 되고 , 부부가 된 연후에 자식이 생기니 부모와 자식이 있게 된다 . 부모와 자식간에는 위와 아래의 위계가 있고 , 또한 자식이 생기니 인간이 모여 더불어 사는 사회가 이루어진다 . 따라서 사회를 유지하기 위한 질서가 생기면서 인군과 신하가 있게 된다 . 인군과 신하가 있은 다음에 위와 아래의 사회질서가 생기고 , 위와 아래의 사회질서가 있기에 그 질서를 유지하기 위해 예의를 두게 되는 것이다 .", "gwasa": "咸은 亨하니 利貞하니 取女면 吉하리라. 함    형      이정       취녀    길 함(咸)은 형통하니 바르게 함이 이로우니, 여자를 취하면 길할 것이다. 咸:느낄 함·다 함   取:취할 취 산과 연못의 기운이 서로 통하고 남자와 여자가 서로 느끼는 데에는 만물을 화생하는 형통함이 있다 . 그러나 천지기운도 지나치면 물과 불의 재앙으로 나타나고 , 남자와 여자의 느낌도 지나치면 도를 잃게 되니 바르게 해야 이롭다 . 서로 기운을 취하고 느끼는 것이니 남자는 여자를 취하고 여자는 남자를 취하면 길하다 . 하경 첫 번째 괘인 택산함괘 괘사에 “ 여자를 취하면 길하다 ” 고 하였다 . 우리는 상경 마지막 괘인 중화리괘 괘사에서 “ 암소를 기르면 길하다 ” 는 내용이 있음을 살펴본 바 있다 . 주역의 64 괘 384 효는 긴밀한 유기적 관련성을 맺고 있다 . 상경 마지막 중화리괘 괘사와 하경 처음 택산함괘 괘사를 같이 비교해 보자 . 離는 利貞하니 亨하니 畜牝牛하면 吉하리라. 이는 바르게 함이 이로우니 형통하니, 암소를 기르면 길할 것이다. 咸은 亨하니 利貞하니 取女면 吉하리라. 함은 형통하니 바르게 함이 이로우니, 여자를 취하면 길할 것이다. 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 咸은 感也니 단왈 함   감야 柔上而剛下하야 二氣 感應以相與하야 止而說하고 男下女라 유상이강하       이기 감응이상여      지이열       남하여 是以亨利貞取女吉也니라. 시이형이정취녀길야 天地 感而萬物이 化生하고 聖人이 感人心而天下 和平하나니 천지 감이만물    화생      성인    감인심이천하 화평 觀其所感而天地萬物之情을 可見矣리라. 관기소감이천지만물지정    가견의 단전에 말하였다. “함(咸)은 느낌이니, 유(柔)가 올라가고 강(剛)이 내려와 두 기운이 느껴 응함으로써 서로 더불어, 그쳐서 기뻐하고, 남자가 여자에 아래 하였다. 이로써 형통하고 바르게 함이 이롭고 여자를 취하면 길하다. 천지가 느껴서 만물이 화생하고, 성인(聖人)이 인심(人心)을 느껴서 천하가 화평하니, 그 느끼는 바를 보아 천지만물의 정을 가히 볼 수 있을 것이다.” 感:느낄 감   與:더불 여   說: 기쁠 열 함 ( 咸 ) 은 느끼는 것이다 . 택산함괘는 삼음삼양 ( 三陰三陽 ) 괘로 그 체는 천지비 ( 天地否 ) 괘에 있다 . 천기 ( 天氣 ) 와 지기 ( 地氣 ) 가 막혀 교류를 못하니 , 천지비괘 육삼 음 ( 陰 ) 이 위로 올라가고 상구 양 ( 陽 ) 이 아래로 내려와서 , 그 기운이 감응하여 서로 더불게 된다 . 그래서 내괘가 간산 ( 艮山 ) ☶ 으로 그치고 외괘가 태택 ( 兌澤 ) ☱ 으로 기뻐하게 되며 , 간 ☶ 소남이 태 ☱ 소녀의 아래에 있게 된 것이다 . 이는 남자의 양 기운이 여자의 음 기운 아래에 있다는 의미이다 . 이렇기 때문에 형통하고 바르게 함이 이로워서 여자를 취하면 길하다고 한 것이다 . 천기와 지기가 그 기운을 서로 느껴서 만물을 화생하듯이 , 성인 ( 聖人 ) 은 백성 아래에 임하여 백성들의 마음을 느끼니 나라가 화평하게 된다 . 그러니 천지 ( 天地 ) 가 서로 느끼는 것과 성인이 백성의 마음을 느끼는 것을 보아서 , 천지만물의 실정을 볼 수 있는 것이다 .", "gwasangsa": "象曰 山上有澤이 咸이니 君子 以하야 虛로 受人하나니라. 상왈 산상유택    함      군자 이       허    수인 상전에 말하였다. “산 위에 연못이 있는 것이 함(咸)이니, 군자가 이를 본받아 비움으로 사람을 받아들인다.” 虛:빌 허   受:받을 수 택산함괘는 산 ☶ 위에 연못 ☱ 이 있는 상으로 , 연못의 음 기운이 산의 양 기운을 윤택하게 적셔주고 있다 . 인사적으로는 태소녀 ( 兌小女 ) 와 간소남 ( 艮小男 ) 이 교감하고 있다 . 천기와 지기가 기운을 통하고 남자와 여자가 교감하는 것에는 아무 사심 ( 邪心 ) 도 없고 아무 바람도 없어야 한다 . 사심과 욕심이 없는 빈 마음에서 천지가 만물을 낳는 큰 공을 이루고 , 남녀가 한 인간을 낳고 , 사회가 바른 공업을 이루게 된다 . 그야말로 빈 마음으로 받아들이는 것이다 . 인간과 인간의 교류에 있어서도 편견이나 선입감이 없이 인간의 본성 그대로 받아들인다 . 선천 ( 先天 ) 과 천도 ( 天道 ) 를 의미하는 상경의 중천건괘와 중지곤괘는 순양 ( 純陽 ) 과 순음 ( 純陰 ) 으로 , 중지곤의 허 ( 虛· 純陰 ) 로 중천건의 양 ( 實· 純陽 ) 을 받아들여 수뢰둔에서 만물을 생하게 되었다 . 후천 ( 後天 ) 과 인사 ( 人事 ) 를 의미하는 하경의 첫 번째 괘인 택산함에서는 바로 건곤 ( 乾坤 ) 의 이치를 본받아 모든 상황을 허 ( 虛 ) 로 받아들여 인간사회의 공업을 이룰 것을 강조하는 것이다 . 이와 관련하여 《 도덕경》 제 11 장에 있는 다음의 글을 음미해 보자 . 三十輻이 共一轂이나 當其無라야 有車之用이며, 埏埴以爲器나 當其無라야 有器之用이며, 鑿戶牖以爲室이나 當其無라야 有室之用이라. 故로 有之以爲利는 無之以爲用이니라. 서른 개의 바퀴살이 하나의 바퀴통에 함께 하나 그 없음(無:바퀴통 구멍의 빈 곳)에 당하여야 수레의 쓰임이 있으며, 진흙을 이겨 그릇을 만드나 그 없음(無:그릇 속의 공간)에 당하여야 그릇의 쓰임이 있으며, 문과 창을 뚫어 집을 만드나 그 없음(無:집 안의 빈 공간)에 당하여야 집의 쓰임이 있다. 그러므로 유형의 사물이 이롭게 되는 것은 무형(虛)으로써 쓰임이 되는 것이다. 효사 및 효상사 初六은 咸其拇라. 초륙    함기무", "hyosa": {"초효": "초육은 그 엄지발가락에 느낀다. 초육은 내괘 아래에 있어 인체로 비유하자면 발가락에 해당한다 . ‘ 무 ( 拇 ) ’ 는 엄지손가락을 뜻하나 , 초육이 함괘 ( 咸 卦 ) 맨 아래에 있고 , 인체의 맨 아래에 있는 것은 발이기 때문에 ‘ 엄지발가락 ’ 으로 풀이한다 . 함괘 ( 咸 卦 ) 는 남녀교합의 상을 취한 것이기에 초효부터 상효에 이르기까지 교합 ( 交合 ) 의 과정을 그대로 표현하고 있다 . 내괘가 간 ( 艮 ) ☶ 이니 아래에서 그쳐 있으면서 , 내괘 간소남과 외괘 태소녀가 교감하는데 엄지발가락에서부터 느끼기 시작한다 . 초효가 동하면 이화 ( 離火 ) ☲ 가 되니 가만히 그쳐 서로 발가락에서부터 느끼다가 서서히 달아오른다 . 象曰 咸其拇는 志在外也라. 상왈 함기무    지재외야 상전에 말하였다. “그 엄지발가락에서 느낌은 뜻이 밖에 있는 것이다.” 초육이 엄지발가락에서 느낀다는 것은 밖 ( 외괘 ) 의 소녀에게 뜻이 있기 때문이다 . 六二는 咸其腓면 凶하니 居하면 吉하리라.", "이효": "육이    함기비    흉      거       길 육이는 그 장딴지에서 느끼면 흉하니, 거하면 길할 것이다. 腓:장딴지 비 육이는 내괘의 가운데에 있고 , 육이가 변하면 손 ( 巽 ) ☴ 이 되니 다리가 된다 ( 巽爲股 ). 엄지발가락에서 진전되어 장딴지에서 느끼게 된다 . 장딴지에서 느끼면서 아울러 바람이 이니 호흡이 거칠어진다 ( 巽爲風 ). 남자든 여자든 처음 교감함에 각자의 정절 ( 貞節 ) 이 무너지는 흉함이 있으나 , 그대로 있으면 교감의 정을 느끼니 길하다 . 象曰 雖凶居吉은 順하면 不害也라. 상왈 수흉거길    순      불해야 상전에 말하였다. “비록 흉하나 거하면 길한 것은 순하면 해롭지 않기 때문이다.” 雖:비록 수   害:해로울 해 육이가 비록 흉하지만 그대로 있으면 길한 것은 순하면 해롭지 않기 때문이다 . 육이가 변하면 손 ☴ 이 되니 겸손하고 순하게 있어야 한다 .", "삼효": "九三은 咸其股라. 執其隨니 往하면 吝하리라. 구삼    함기고    집기수    왕       인 구삼은 그 넓적다리에서 느낀다. 그 따름을 잡으니, 가면 인색할 것이다. 股:넓적다리 고   執:잡을 집   隨: 따를 수 구삼은 장딴지를 지나 넓적다리에서 느낀다 . 구삼이 변하면 곤지 ( 坤地 ) ☷ 가 되어 땅이 되고 외괘가 태택 ( 兌澤 ) ☱ 이 되니 , 땅에 연못의 물 기운이 흐른다 . 넓적다리는 사타구니를 의미하니 남녀의 성기가 있는 곳이다 . 소녀는 소남을 , 소남은 소녀를 부둥켜안고 서로를 따른다 . 계속 나아가지 않고 물러나면 인색하다 . 구삼이 변한 상태에서 내호괘가 간 ( 艮 ) ☶ 이고 외호괘가 손 ( 巽 ) ☴ 이니 순하게 그쳐있어야 한다 . 象曰 咸其股는 亦不處也니 志在隨人하니 所執이 下也라. 상왈 함기고    역불처야   지재수인       소집    하야 상전에 말하였다. “그 넓적다리에서 느낌은 또한 그치지 못하니, 뜻이 따르는 사람에게 있으니, 잡는 바가 아래이다.” 그 넓적다리에서 느끼게 되니 심신이 요동하여 가만있지 못하게 된다 . 그러나 뜻이 서로 따르는 사람에게 있으니 , 서로가 잡는 바는 아래에 있는 교감처 ( 交感處 ) 이다 .", "사효": "九四는 貞이면 吉하야 悔 亡하리니 憧憧往來면 朋從爾思리라. 구사    정      길       회 망          동동왕래   붕종이사 구사는 바르게 하면 길해서 뉘우침이 없어질 것이니, 자주자주 오고 가면 벗이 네 뜻을 좇을 것이다. 悔:뉘우칠 회   憧:자주 동·그리워할 동   朋:벗 붕   爾:너 이 초효의 엄지발가락 , 이효의 장딴지 , 삼효의 넓적다리를 거쳐 사효에 이르러 드디어 교감 ( 交感 ) 이 이루어진다 . 천지기운의 교감이나 남녀의 교감이 모두 바르게 해야 길하다 . 지금까지 머뭇거렸던 모든 뉘우침이 없어지니 , 남녀간의 느낌이 자주자주 오고가면 서로의 생각을 좇게 된다 . 빈 마음으로 사람을 받아들이는 요처 ( 要處 ) 이다 . 산천구릉의 차이가 있고 , 기후의 차이가 있고 , 사람마다 다름이 있지만 , 천지만물지정 ( 天地萬物之情 ) 의 요처 , 즉 교감 ( 交感 ) 에는 모두가 같은 마음이다 . 천기와 지기가 교류하고 남녀의 정 ( 情 ) 이 통하는 이 핵심적인 자리에 대해 공자 ( 孔子 ) 는 ｢ 계사하전 ｣ 제 5 장에서 다음과 같이 설명하고 있다 . 易曰 憧憧往來면 朋從爾思라하니 子曰 天下 何思何慮리오. 天下 同歸而殊塗하며 一致而百慮니 天下 何思何慮리오. 日往則月來하고 月往則日來하야 日月이 相推而明生焉하며, 寒往則暑來하고 暑往則寒來하야 寒暑 相推而歲成焉하니, 往者는 屈也오 來者는 信也니 屈信이 相感而利生焉하니라. 尺蠖之屈은 以求信也오, 龍蛇之蟄은 以存身也오, 精義入神은 以致用也오, 利用安身은 以崇德也니, 過此以往은 未之或知也니 窮神知化 德之盛也라. 역에 이르길 “자주자주 오고 가면 벗이 네 생각을 좇는다”라고 하니, 공자께서 말씀하셨다. “천하에 어찌 생각하고 어찌 근심하겠는가? 천하가 돌아가는 곳은 같아도 길이 다르며, 이르는 것은 하나지만 백가지 생각이니, 천하에 어찌 생각하고 어찌 근심하겠는가? 해가 가면 달이 오고 달이 가면 해가 와서, 해와 달이 서로 밀어서 밝음이 나오며, 추위가 가면 더위가 오고 더위가 가면 추위가 와서, 추위와 더위가 서로 밀어서 해를 이루니, 가는 것은 굽힘이요 오는 것은 펴는 것이니, 굽히고 폄이 서로 느껴서 이로운 것이 생한다. 자벌레가 굽히는 것은 폄을 구함이요, 용과 뱀이 움츠리는 것은 몸을 보존함이요, 의리를 정미롭게 해서 신에 들어감은 씀을 이룸이요, 쓰는 것을 이롭게 하여 몸을 편안히 함은 덕을 숭상함이니, 이를 지나서 감은 혹 알지 못하니, 신을 궁구하여 화함을 앎이 덕의 성함이다.” 象曰 貞吉悔亡은 未感害也오 憧憧往來는 未光大也라. 상왈 정길회망    미감해야    동동왕래    미광대야 상전에 말하였다. “바르게 하면 길해서 뉘우침이 없어진다는 것은 느껴서 해롭지 않음이요, 자주자주 오고간다는 것은 빛나고 큰 것은 아니다.” 바르게 해서 길하고 뉘우침이 없어진다는 것은 남녀가 서로 느껴서 해롭지 않은 것이고 , 자주자주 오고간다는 것은 남녀가 교합하는 것인데 이는 사실 광대한 것은 아니다 .", "오효": "九五는 咸其脢니 无悔리라. 구오    함기매    무회 구오는 그 등심에서 느끼니, 뉘우침이 없을 것이다. 脢:등심 매 구오는 남녀가 ‘ 동동왕래 ( 憧憧往來 ) ’ 의 절정에서 느낌의 극치에 이른 것이다 . 느낌이 분출하여 등심에까지 뻗친다 . 외괘 태택 ( 兌澤 ) ☱ 에서 기쁨으로 젖다가 구오가 변하면 외괘가 진 ( 震 ) ☳ 으로 되니 사정 ( 射精 ) 이 이루어진다 . 象曰 咸其脢는 志末也일새라. 상왈 함기매    지말야 상전에 말하였다. “그 등심에서 느낌은 뜻이 끝에 있기 때문이다.” 末:끝 말 그 등심에서 느낀다는 것은 뜻이 끝에 있기 때문인데 , 이는 느낌의 극치라는 말이다 . 上六은 咸其輔頰舌이라. 상륙   함기보협설", "상효": "상육은 그 볼과 뺨과 혀에서 느낀다. 輔:광대뼈(볼) 보·덧방나무 보·도울 보   頰:뺨 협   舌:혀 설 상육은 남녀가 교감 ( 交感 ) 을 끝내고 후희 ( 後喜 ) 를 즐기는 것이다 . 서로를 위안하며 볼과 뺨과 혀를 비빈다 . 기쁨의 기운이 상기 ( 上氣 ) 되어 입으로 기뻐하는 것이고 , 말을 한다 . 외괘 태택 ☱ 은 입을 의미하고 기쁨을 의미하니 , 맨 위에서 마지막에 기뻐하면서 후희를 하는 것이다 . 象曰 咸其輔頰舌은 滕口說也라. 상왈 함기보협설    등구설야 상전에 말하였다. “그 볼과 뺨과 혀에서 느낌은 구설(혹은 구열)에 오르는 것이다.” 滕:오를 등   說:말씀 설·기쁠 열·벗길 탈 그 볼과 뺨과 혀에서 느낀다는 것은 입의 기쁨 ( 만족감 ) 에 오르는 것이고 , 말을 하는 것이다 . ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 381 ∼390 쪽 ."}}, {"num": 32, "ko": "뇌풍항", "hanja": "雷風恒", "lines": [0, 1, 1, 1, 0, 0], "url": "https://soosanss.tistory.com/184", "post_id": 184, "gwaui": "사랑은 서로가 만들어나가야 할 책임이다 . 신중하게 목표를 설정하고 목표를 세웠으면 함부로 바꾸지 말고 뜻을 이뤄라 ( 立不易方 ).", "gwamyung": "외괘가 진뢰 ( 震雷 ) ☳ , 내괘가 손풍 ( 巽風 ) ☴ 으로 이루어진 괘를 ‘ 항 ( 恒 ) ’ 괘라 한다 . 택산함 ( 澤山咸 ) 괘에서 소녀 ( 小女 ) 와 소남 ( 小男 ) 이 만나 교합을 하니 , 부부 ( 夫婦 ) 가 되어 가정을 꾸리고 항구하게 같이 살아간다 . 백년해로를 다짐하고 사랑과 책임으로 뜻을 이루는 부부 ( 夫婦 ) 의 도이다 . 외괘가 진 ☳ 장남 ( 長男 ) 이고 내괘가 손 ☴ 장녀 ( 長女 ) 이니 , 장남과 장녀는 부모의 뜻을 이어 집안을 이끌어가는 역할을 한다 . 한편 남녀노소를 불문하고 어떠한 일에 종사하든 , 인생을 살아가는 과정에는 많은 동요 ( 動搖 ) ☳ 와 풍파 ( 風波 ) ☴ 가 있지만 , 어떠한 어려움도 슬기롭게 극복하여 원래 세웠던 뜻과 목표를 항구한 덕으로 이루어야 한다 . 우주의 변화를 선천팔괘원도 ( 先天八卦圓圖 ) 에서 살펴보면 , 진 ( 震 ) 괘는 일양시생 ( 一陽始生 ) 하고 손 ( 巽 ) 괘는 일음시생 ( 一陰始生 ) 하는 자리로 지구의 자전축을 이루고 있다 . 또한 후천팔괘방위원도 ( 後天八卦方位圓圖 ) 에서는 진 ( 震 ) 은 동방이요 손 ( 巽 ) 은 동남방으로 나란히 거하고 있다 .", "seogwa": "｢ 전 ｣ 은 택산함괘 다음에 뇌풍항괘가 온 이유를 다음과 같이 설명하고 있다 . 夫婦之道 不可以不久也라 故로 受之以恒하고 부부지도 불가이불구야    고    수지이항 부부의 도는 가히 오래하지 않을 수 없다. 그러므로 항괘로써 받고 천지가 그 도를 항구하게 하니 만물이 생화하여 오랜 세월을 천지의 품에서 살아가듯이 , 부부의 도가 항구해야 자식이 그 부모 품에서 잘 자라고 화목한 가정이 이루어진다 . 그래서 함괘 다음에 항괘를 두었다 .", "gwasa": "恒은 亨하야 无咎하니 利貞하니 利有攸往하니라. 항    형       무구      이정       이유유왕 항(恒)은 형통해서 허물이 없으니 바르게 함이 이로우니, 가는 바를 둠이 이롭다. 恒:항상 항 부부가 만나 항구하게 사는 것은 형통한 것이다 . 인생을 살아가면서 많은 동요 ( 動搖 ) 와 풍파 ( 風波 ) 가 있지만 , 그 가운데에서도 바르게 해야 이롭다 . 또한 부부의 도를 갖추어 가정을 꾸려나가니 가는 바를 둠이 이롭다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 恒은 久也니 剛上而柔下하고 雷風이 相與하고 단왈 항    구야   강상이유하       뇌풍    상여 巽而動하고 剛柔 皆應이 恒이니 손이동      강유  개응    항 恒亨无咎利貞은 久於其道也니 天地之道 恒久而不已也니라. 항형무구이정    구어기도야    천지지도 항구이불이야 利有攸往은 終則有始也일새니라. 이유유왕    종즉유시야 日月이 得天而能久照하며 四時 變化而能久成하며 일월    득천이능구조      사시 변화이능구성 聖人이 久於其道而天下 化成하나니 성인    구어기도이천하 화성 觀其所恒而天地萬物之情을 可見矣리라. 관기소항이천지만물지정    가견의 단전에 말하였다. “항(恒)은 오래함이니, 강이 올라가며 유가 내려오고, 우레와 바람이 서로 더불고, 겸손해서 움직이고, 강과 유가 다 응하는 것이 항(恒)이니, ‘항이 형통해서 허물이 없어서 바르게 함이 이롭다’는 것은 그 도에 오래함이니, 하늘과 땅의 도가 항구하여 그치지 않는다. ‘가는 바를 둠이 이롭다’는 것은 마치면 곧 시작이 있기 때문이다. 해와 달이 하늘을 얻어서 능히 오래 비추며, 사시가 변화해서 능히 오래 이루며, 성인이 그 도에 오래해서 천하가 화하여 이루니, 그 항상한 바를 보아서 천지만물의 실정을 가히 볼 수 있을 것이다.” 久:오랠 구   皆:다 개   已:그칠 이   終:마칠 종   始:비롯할 시   照: 비출 조 항 ( 恒 ) 은 오래하는 것이다 . 뇌풍항괘는 택산함괘와 마찬가지로 삼음삼양 ( 三陰三陽 ) 괘로 그 체는 지천태 ( 地天泰 ) 괘에 있다 . 태평한 세상을 오래 유지하기 위한 하나의 방법으로 지천태괘에서 초구 양이 위로 올라가고 육사 음이 아래로 내려와 자리를 바꾸면 , 외괘가 진뢰 ☳ 로 되고 내괘가 손풍 ☴ 이 되어 우레와 바람이 서로 더불게 되고 , 괘덕은 손 ( 巽 ) ☴ 으로 겸손하고 진 ( 震 ) ☳ 으로 움직이는 상이 된다 . 또한 함괘 ( 咸卦 ) 와 같이 항괘 ( 恒卦 ) 는 초효부터 상효에 이르기까지 모두 강과 유가 서로 잘 응하고 있다 . ‘ 항구함이 형통해서 허물이 없어서 바르게 함이 이롭다 ’ 는 것은 자연의 도에 오래하는 것이니 , 천지 ( 天地 ) 의 도를 보건대 항구해서 그침이 없다 . ‘ 가는 바를 둠이 이롭다 ’ 는 것은 청춘남녀가 만나 부부의 도를 이루면 홀로의 삶은 마치지만 다시 부부와 가정의 도가 시작되듯이 , 자연사나 인간사가 모두 마치면 다시 시작된다 . 해와 달은 항구한 하늘을 얻었기 때문에 오래 천하를 비출 수 있으며 , 춘하추동 사시가 변화함에 만물의 생화작용이 항구하게 이루어진다 . 또한 성인이 자연의 도를 본받은 항구한 도에 오래해서 천하 백성을 화하여 이루니 , 그 항상한 도를 보면 천지만물의 실정을 가히 볼 수 있다 . 《 중용》 제 12 장의 다음 문장을 음미해보자 . 君子之道는 造端乎夫婦니 及其至也하여는 察乎天地니라 군자의 도는 단서가 부부에게서 시작되니, 그 지극함에 미쳐서는 천지에 밝게 드러난다.", "gwasangsa": "象曰 雷風이 恒이니 君子 以하야 立不易方하나니라. 상왈 뇌풍    항      군자 이       입불역방 상전에 말하였다. “우레와 바람이 항이니, 군자가 이를 본받아 서서 방소를 바꾸지 않는다.” 立:설 립   易:바꿀 역   方:방소 방 우레와 바람은 만물을 생화하는 자연의 항상한 변화이다 . 앞서 살펴보았듯이 선천팔괘방위에 있어 진뢰 ☳ 와 손풍 ☴ 은 양이 시작하고 음이 시작하는 항상한 자리로 지축 ( 地軸 ) 을 이루고 있다 . 또한 문왕팔괘방위에 있어 동방과 동남방으로 사계절중 봄의 계절에 위치하고 있다 . 이러한 자연의 원리에 입각하여 군자는 한번 뜻을 세우면 방소 ( 方所 ) 를 바꾸지 않는다 . 도 ( 道 ) 를 항구하게 함을 말한다 . 효사 및 효상사 初六은 浚恒이라 貞하야 凶하니 无攸利하니라. 초륙    준항      정       흉       무유리", "hyosa": {"초효": "초육은 항상함을 판다. 고집해서 흉하니 이로울 바가 없다. 浚:깊을 준·팔 준·빼앗을 준   攸:바 유 초육은 양자리에 음으로 있어 자리가 바르지 못하고 중을 얻지 못하였다 . 또한 구사가 양으로 초육 음과 잘 응하지만 , 초육 음은 내괘 손 ☴ 에서 손순하게 마냥 구사만을 믿고 있다 . 그렇게 고집하면 구사의 외도에 초육이 흉하게 되니 이로울 바가 없다 . 항상한 부부의 도 , 항상한 성인의 도 , 항상한 자연의 도는 적절한 상호관계에서 이루어진다 . 관계가 성숙되기 전에 처음부터 무턱대고 항상함을 고집하면 오히려 위태롭게 된다 . 즉 , 처음부터 너무 깊은 것을 구하면 적절하고 항상한 도를 이룰 수 없다는 뜻이다 . 象曰 浚恒之凶은 始애 求深也일새라. 상왈 준항지흉    시    구심야 상전에 말하였다. “항상함을 파서 흉함은 시작함에 깊은 것을 구하기 때문이다.” 深: 깊을 심 초육은 하염없이 구사만 믿지만 ,", "이효": "九二는 悔 亡하리라. 구이    회 망 구이는 뉘우침이 없어질 것이다. 구이는 음자리에 양으로 자리는 마땅하지 않으나 , 내괘의 중을 지키고 있다 . 또한 외괘의 육오 음과 잘 응하고 있다 . 구이가 변하면 내괘가 간산 ( 艮山 ) ☶ 이 되니 손순하게 중에 그쳐 ( 艮爲止 ) 항상하게 중도를 지키는 상이다 . 살아가면서 온갖 풍파가 있어도 능히 중 ( 中 ) 을 항구하게 지키니 뉘우침이 없어진다 . 象曰 九二悔亡은 能久中也라. 상왈 구이회망   능구중야 상전에 말하였다. “구이의 뉘우침이 없어지는 것은 능히 중에 오래하기 때문이다.”", "삼효": "九三은 不恒其德이라 或承之羞니 貞이면 吝하리라. 구삼    불항기덕      혹승지수    정       인 구삼은 그 덕에 항상하지 않다. 혹 부끄러움을 이으니 고집하면 인색할 것이다. 承:이을 승   羞:나아갈 수·드릴 수·부끄러울 수 구삼은 내괘 손 ( 巽 ) ☴ 의 손순한 괘체에 있으나 , 중을 얻지 못하였고 양자리에 양으로 강하기만 하다 . 중도를 지키지 못하여 덕을 항상하게 하지 못하니 , 혹 부끄러운 일을 자초하게 된다 . 그렇게 고집해 나가면 인색하게 되어 어느 누구도 용납하지 못하는 상황에 빠질 수가 있다 . 象曰 不恒其德하니 无所容也로다. 상왈 불항기덕      무소용야 상전에 말하였다. “그 덕에 항상하지 않으니 용납할 바가 없도다.”", "사효": "구사 역시 음자리에 양으로 있어 자리가 바르지 못하고 중을 얻지 못한 상태이다 . 외괘에 있는 구사 양은 초육 음을 버리고 진 ☳ 으로 발동하여 망령되게 외도 ( 外道 ) 를 하고 있는데 , 九四는 田无禽이라. 구사    전무금 구사는 밭에 새가 없다. 禽:날짐승 금 구사는 외괘 진 ( 震 ) ☳ 에 처하여 음자리에 양으로 있으며 , 중도 얻지 못하여 망동 ( 妄動 ) 하고 있는 상태이다 . 구사 양은 정처 없이 외도 ( 外道 ) 만 일삼는 격이다 . 이리저리 떠돌아다니기만 하니 어딜 가든 결실을 거두지 못한다 . 물론 자식을 낳고 가정을 꾸리지도 못하니 , 마치 밭에 곡식이 없어 새도 얼씬거리지 않는 격이다 . 象曰 久非其位어니 安得禽也리오. 상왈 구비기위       안득금야 상전에 말하였다. “그 자리가 아닌데 오래하니, 어찌 새를 얻겠는가?” 安:어찌 안 六五는 恒其德이면 貞하니 婦人은 吉코 夫子는 凶하니라.", "오효": "육오    항기덕       정      부인    길    부자    흉 육오는 그 덕에 항상하면 바르니, 부인은 길하고 남편은 흉하다. 육오는 자리는 부당하나 외괘에서 중 ( 中 ) 을 얻어 덕을 항상하게 하니 바른 상이다 . 아내의 경우는 일부종사 ( 一夫從事 ) 하듯이 항구하게 한 남편을 좇아서 가정을 이루니 길하다 . 하지만 남편은 가정 일이나 사회 일에 있어 의리 ( 義理 ) 를 기본으로 해야 하는데 , 모든 일에 부인이 하는 대로 좇아가기만 하면 흉하게 된다 . 육오가 변하면 음이 양으로 바뀌어 지괘 ( 之卦 ) 가 상경 ( 上經 ) 의 택풍대과 ( 澤風大過 ) 괘로 되는데 , 대과괘 구오효사에서는 “ 늙은 지어미가 젊은 남자를 얻으니 허물이 없으나 명예도 없다 ” 고 하였다 . 이 내용과 관련하여 항괘 ( 恒卦 ) 육오 효사를 보면 , 부인은 젊은 사내를 얻었으니 길하지만 , 남편 입장에서는 나이 많은 여자와 결혼하여 부인이 하는 대로 복종하다시피 하니 흉하게 됨을 알 수 있다 . 澤風大過 九五는 枯楊이 生華하며 老婦 得其士夫니 无咎나 无譽리라. 구오는 마른 버들이 꽃을 피우며 늙은 지어미가 그 사부(젊은 남자)를 얻으니, 허물이 없으나 명예도 없을 것이다. 象曰 婦人은 貞吉하니 從一而終也일새오 夫子는 制義어늘 從婦하면 凶也라. 상왈 부인    정길       종일이종야         부자    제의       종부      흉야 상전에 말하였다. “부인은 바르게 해서 길하니 하나를 좇아서 마치기 때문이요, 남편은 의리를 짓거늘 부인을 좇으면 흉하다.” 上六은 振恒이니 凶하니라. 상륙    진항       흉", "상효": "상육은 항상함을 떨치니 흉하다. 振:떨칠 진 상육은 자리는 마땅하나 중을 얻지 못하였고 외괘 진뢰 ( 震雷 ) ☳ 의 극에 처하여 망동하니 , 항상함을 떨쳐버린 상태이다 . 마치 가정이 파탄지경에 이르러 부부가 이혼하는 것으로 볼 수 있다 . 象曰 振恒在上하니 大无功也로다. 상왈 진항재상       대무공야 상전에 말하였다. “항상함을 떨침이 위에 있으니 크게 공이 없도다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 391 ∼398 쪽 ."}}, {"num": 33, "ko": "천산둔", "hanja": "天山遯", "lines": [0, 0, 1, 1, 1, 1], "url": "https://soosanss.tistory.com/185", "post_id": 185, "gwaui": "소인이 득세하여 군자의 뜻이 행해지지 않을 때에 , 군자는 ‘ 몸의 사사로움을 이겨 예에 회복하고 ’ ( 克己復禮 ), 소인을 대하기를 악하게 하지 말고 엄하게 하여 소인이 망동함을 경계하라 ( 不惡而嚴 ) .", "gwamyung": "외괘가 건천 ( 乾天 ) ☰ , 내괘가 간산 ( 艮山 ) ☶ 으로 이루어진 괘를 ‘ 돈 ( 遯 ) ’ 괘라 한다 . 은둔한다 , 도망한다는 뜻이다 . 순양 ( 純陽 ) 으로 되어 있던 중천건 ( 重天乾 ) 에서 음이 자라나 천풍구 ( 天風姤 ) 가 되고 다시 음이 내괘 가운데 효까지 이르니 , 양 ( 陽 ) 의 군자들이 음 ( 陰 ) 소인의 세력을 막지 못하고 피하게 된다 . 중효 ( 中爻 ) 가 이래서 중요하다 . 음효가 초효에 이어 내괘 중을 차지하니 , 상대적으로 많은 양의 기운도 어찌할 수 없이 물러나게 된다 . 돈 ( 遯 ) 괘와 상반된 양상 , 즉 양의 군자가 초효에서 내괘의 중인 이효까지 임하니 , 음 소인이 양 군자에게 감화되는 지택림 ( 地澤臨 ) 괘를 이미 살펴본 바 있다 . ‘ 돈 ’ 괘는 12 월괘로 음력 6 월괘에 해당한다 .", "seogwa": "｢ 전 ｣ 은 뇌풍항괘 다음에 천산돈괘를 둔 이유를 다음과 같이 설명하고 있다 . 恒者는 久也니 物不可以久居其所라 故로 受之以遯하고 항자    구야    물불가이구거기소   고    수지이돈 항(恒)이라는 것은 오래하는 것이니, 물건이 가히 그 곳에만 오래 거할 수 없다. 그러므로 돈으로써 받고 항 ( 恒 ) 이라는 것은 오래하는 것이다 . 그런데 물건이나 상황은 항상 변하는 것이기에 한 곳에만 오래 거할 수 없고 또한 한 상황이 오래 지속될 수는 없다 . 오래하면 물러나게 되니 , 항괘 다음에 물러나고 도망한다는 돈괘를 두었다 .", "gwasa": "遯은 亨하니 小利貞하니라. 돈    형      소리정 돈(遯)은 형통하니 바르게 하면 조금 이롭다. 돈(遯)은 형통하니 소인은 바르게 하면 이롭다. 遯:달아날 돈(둔) 아래에 두 음 기운이 내괘의 중효까지 올라와 실세 ( 實勢 ) 를 형성하니 , 양 ( 陽 ) 의 군자로서도 어찌할 수 없이 물러나지만 , 군자의 도가 사라지는 것이 아니기에 형통하다 . 나아갈 때면 나아가고 물러날 때면 물러나는 것이 군자의 도 ( 道 ) 이고 , 아무 거리낌 없이 때도 없이 나아가기만 하는 것이 소인의 도이다 . 《 중용》 제 2 장에 다음과 같은 구절이 있다 . 仲尼曰 君子는 中庸이요 小人은 反中庸이니라. 君子之中庸也는 君子而時中이요 小人之(反)中庸也는 小人而無忌憚也니라. 중니(공자)께서 말씀하셨다. “군자는 중용을 하고, 소인은 중용에 반대로 한다. 군자가 중용을 함은 군자이면서 때로 맞게 하기 때문이요, 소인이 중용에 반대로 함은 소인이면서 거리낌이 없기 때문이다.” 그런데 음의 기운이 자라나는 때에 군자가 바름과 덕을 지나치게 하면 오히려 해를 받을 수 있기 때문에 , 바르게 함이 조금 이롭다고 하였다 . 한편 , 돈괘 ( 遯卦 ) 는 음의 소인이 세력을 확장하는 것이기에 소인 ( 小人 ) 의 입장에서는 바르게 하면 이롭다고 풀이할 수도 있다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 遯亨은 遯而亨也나 剛當位而應이라 與時行也니라. 단왈 돈형    돈이형야    강당위이응      여시행야 小利貞은 浸而長也일새니 遯之時義 大矣哉라. 소리정    침이장야         돈지시의 대의재 단전에 말하였다. “돈(遯)이 형통함은 물러나서 형통한 것이나, 강한 것이 자리에 마땅해서 응하여 때로 더불어 행한다. ‘바르게 하면 조금 이롭다’는 것은 점차 길어지기 때문이니, 돈의 때와 뜻이 크도다.” 浸:잠길 침·차츰차츰 침 돈 ( 遯 ) 이 형통한 것은 군자가 물러날 때에 적절히 물러나서 형통하다 . 군자인 구오 양 ( 剛 ) 이 외괘에서 중정 ( 中正 ) 하여 내괘의 육이 음 ( 陰 ) 과 응하고 있어 적절하게 때와 함께 행한다 . ‘ 바르게 함이 조금 이롭다 ’ 는 것은 음 소인이 점차 자라나는 상황이기 때문이다 . 군자가 때와 상황에 중용 ( 中庸 ) 을 지키니 , 물러나는 때와 뜻이 크다 .", "gwasangsa": "象曰 天下有山이 遯이니 君子 以하야 遠小人호대 不惡而嚴하나니라. 상왈 천하유산    돈      군자 이       원소인       불악이엄 상전에 말하였다. “하늘 아래 산이 있는 것이 돈(遯)이니, 군자가 이를 본받아 소인을 멀리하되 악하게 하지 않고 엄하게 한다.” 遠:멀 원   惡:악할 악   嚴:엄할 엄 돈괘는 외괘 건천 ( 乾天 ) ☰ 아래에 내괘 간산 ( 艮山 ) ☶ 이 있는 상이다 . 하늘 아래에 산이 있으니 , 군자가 하늘과 같은 굳센 마음을 지키고 있지만 때가 아니어서 산 속에 은둔하고 있는 상이다 . 이러한 기운을 보고 군자는 세력이 커지고 있는 소인을 멀리한다 . 그런데 소인을 대함에는 군자의 덕을 내세워 소인에게 악하게 하면 안 되고 , 군자로서의 위엄을 지켜 엄하게 하여야 한다 . 소인이 점차 자라나는 상황에서 소인에게 군자의 도를 지나치게 내세우면 오히려 소인이 군자를 해치게 된다 . 따라서 군자는 군자로서의 위엄을 지켜 소인이 저절로 감화되기를 기다려야 한다 . 효사 및 효상사 初六은 遯尾라 厲하니 勿用有攸往이니라. 초륙    돈미    려      물용유유왕", "hyosa": {"초효": "초육은 도망하는데 꼬리이다. 위태하니 가는 바를 두지 말라. 尾:꼬리 미 초육은 돈괘의 맨 아래에 있는데 중을 얻지 못하고 양자리에 음으로 있으니 , 처신하기가 매우 어려운 상태이다 . 전체 상황에서 맨 아래가 되니 도망가는 동물의 꼬리에 해당한다 . ‘ 꼬리가 길면 잡힌다 ’ 는 속담이 있다 . 초육이 구사 양과 응하고 있어 구사 양이 도망함에 같이 가려고 하지만 , 초육은 꼬리에 해당하니 도망하려다 잡혀서 해를 받을 위험이 있다 . 초육으로서는 자기와 응하고 있는 구사가 도망하더라도 내괘 간산 ( 艮山 ) ☶ 의 덕을 지켜 가만히 그쳐 있어야 재앙이 없다 . 象曰 遯尾之厲는 不往이면 何災也리오. 상왈 돈미지려    불왕       하재야 상전에 말하였다. “도망하는 꼬리의 위태함은 가지 않으면 무슨 재앙이겠는가?” 六二는 執之用黃牛之革이라. 莫之勝說이니라.", "이효": "육이    집지용황우지혁       막지승설 육이는 잡는데 누런 소의 가죽을 쓴다. 이기어 말하지 못한다. 執:잡을 집   革:가죽 혁   莫:없을 막   勝:이길 승   說:말씀 설 육이는 내괘에서 중정한 자리에 있다 . 음으로서 양의 기운을 물러나게 하는 주체이다 . 소인이지만 중정한 자리에 있어 황소의 가죽처럼 질기고 단단하게 뜻을 굳게 하여 음의 세력을 잡아 나간다 . 특히 아래에 있는 초육의 마음이 흔들리지 않고 육이에게 복종하게 하여 음의 세력을 키워 나간다 . 육이에 의해 양의 기운이 물러나니 육이로서는 승승장구 ( 乘勝長驅 ) 한다 . 象曰 執用黃牛는 固志也라. 상왈 집용황우    고지야 상전에 말하였다. “잡는데 누런 소를 쓰는 것은 뜻을 굳게 하는 것이다.” 固:굳을 고 육이가 소인의 세력으로 자라나니 구오는 때를 알고 모든 상황을 조리하면서 아름답게 물러난다 .", "삼효": "九三은 係遯이라 有疾하야 厲하니 畜臣妾에는 吉하니라. 구삼    계돈      유질       려       휵신첩       길 구삼은 물러나는데 매인다. 병이 있어 위태하니 신하와 첩을 기르는 데는 길하다. 係:맬 계·매일 계   疾:병 질   畜:기를 휵   妾: 첩 첩 구삼은 양자리에 양으로 바른 자리이다 . 양 ( 陽 ) 으로서 아래 두 음의 세력이 커져 오니 물러나고 싶지만 , 내괘 간산 ( 艮山 ) ☶ 에 처하여 물러나지 못하고 그치게 된다 . 물러나고 싶은데 물러나지 못하니 , 마음에 병이 생겨 위태롭다 . 이러지도 못하고 저러지도 못하니 , 차라리 그 자리에 처하여 내괘의 음 소인들을 가급적이면 바르게 키우려고 노력한다 . 신하와 첩이라는 것은 초육과 육이의 음을 말한다 . 내괘 간산 ( 艮山 ) ☶ 의 위에 처한 구삼으로서는 큰 일을 할 수 있는 상황은 못 된다 . 구삼이 변하면 천지비 ( 天地否 ) 괘가 되니 위아래가 막히게 되고 , 구삼이 외괘의 양 군자들과 같이 하려해도 막혀서 서로 뜻을 통하지 못하게 된다 . 象曰 係遯之厲는 有疾하야 憊也오 畜臣妾吉은 不可大事也니라. 상왈 계돈지려    유질       비야   휵신첩길    불가대사야 상전에 말하였다. “물러나는데 매여서 위태로움은 병이 있어 고달픈 것이고, 신하와 첩을 길러 길함은 가히 큰 일을 못하는 것이다.” 憊:고달플 비 구삼이 물러나는데 매여서 위태로운 것은 구삼이 도망하고자 해도 아래 초육과 육이에 매이니 병이 생겨 고달픈 것이고 , 신하와 첩을 길러 길하지만 가히 큰 일을 하지는 못하는 것이다 . 구삼과는 같은 양으로 서로 응하지 않기 때문에 아무 미련 없이 물러날 수 있다 .", "사효": "九四는 好遯이니 君子는 吉코 小人은 否하니라. 구사    호돈       군자   길    소인    부 구사는 좋아도 물러나니 군자는 길하고, 소인은 그렇게 하지 않는다. 否:아닐 부 구사는 외괘 건천 ( 乾天 ) ☰ 에 처하여 하늘과 같이 큰 마음으로 소인들에게서 벗어날 수 있는 자리이다 . 그런데 구사는 아래 초육 음과 잘 응하고 있으니 , 남녀의 정으로는 초육 음에게 좋아하는 마음이 있게 된다 . 그러나 때가 소인의 세력이 커지는 때이니 , 군자는 전체의 흐름을 파악하여 초육 음이 아무리 좋아도 물러난다 . 그런데 이 자리에 소인 ( 小人 ) 이 있다면 초육 음에 마음이 끌려 소인배와 뜻을 같이하게 되니 결국은 비색하게 된다 . 권력을 잡아 통치하는 자가 누가 봐도 소인임에 틀림없는 상황에서도 , 항상 권력에 영합하여 세상을 어지럽게 하는 소인배들이 있다 . 象曰 君子는 好遯하고 小人은 否也리라. 상왈 군자    호돈      소인    비야 상전에 말하였다. “군자는 좋아도 물러나고, 소인은 비색할 것이다.” 否:아닐 부·막힐 비·비색할 비 ‘ 小人 은 否也 리라 ’ 에서 ‘ 부 ( 否 ) ’ 자를 ‘ 아니 부 ’ 로 풀어도 되고 , ‘ 비색할 비 ’ 로 풀어도 된다 . 즉 , 효사에서와 같이 ‘ 소인은 그렇게 ( 군자처럼 ) 하지 않을 것이다 ’ 라고 풀이할 수도 있고 , 군자처럼 하지 못하니 결국 ‘ 소인은 비색할 것이다 ’ 로 풀이할 수 있다 .", "오효": "九五는 嘉遯이니 貞하야 吉하니라. 구오    가돈      정       길 구오는 아름답게 물러나니 바르게 해서 길하다. 嘉:아름다울 가 구오는 외괘 건천 ( 乾天 ) ☰ 에서 중정한 자리에 있다 . 내괘에서 중정한 육이 음과 잘 응하고 있으나 , 구오가 물러나는 것은 모든 상황을 그냥 포기하고 물러나는 것이 아니다 . 군자는 물러날 때 물러나더라도 , 항상 전체를 생각하고 다음 일을 생각하여 미리 대비한다 . 象曰 嘉遯貞吉은 以正志也라. 상왈 가돈정길    이정지야 상전에 말하였다. “아름답게 물러나 바르게 해서 길함은 뜻을 바르게 하기 때문이다.” 구오 군자는 육이 음과 응하고 있으나 ,", "상효": "上九는 肥遯이니 无不利하니라. 상구    비돈       무불리 상구는 살찌게 물러나니, 이롭지 않음이 없다. 肥:살찔 비 상구는 물러나는 때에 외괘 건천 ( 乾天 ) ☰ 의 맨 위에 있고 , 상구 자신으로서는 이롭지 않음이 없는 상황이다 . 물러나는 때에 구사 군자는 초육 음과 응하고 , 상구만은 구삼 양과 응하지 않으니 상구가 처신함에 의심할 바가 없는 것이다 . 象曰 肥遯无不利는 无所疑也라. 상왈 비돈무불리    무소의야 상전에 말하였다. “살찌게 물러나 이롭지 않음이 없는 것은 의심할 바가 없다.” 疑:의심할 의 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 399 ∼406 쪽 ."}}, {"num": 34, "ko": "뇌천대장", "hanja": "雷天大壯", "lines": [1, 1, 1, 1, 0, 0], "url": "https://soosanss.tistory.com/186", "post_id": 186, "gwaui": "아무리 앞길에 막힘이 없어 승승장구하게 나갈지라도 항상 예가 아니면 행하지 마라 ( 非禮不履 ).", "gwamyung": "외괘가 진뢰 ( 震雷 ) ☳ , 내괘가 건천 ( 乾天 ) ☰ 으로 이루어진 괘를 ‘ 대장 ( 大壯 ) ’ 이라 한다 . 내괘의 건천 ☰ 이 굳세고 왜괘 진뢰 ☳ 가 강하게 움직이며 , 초효에서 구사까지의 양강 ( 陽剛 ) 한 기운이 거침없이 크게 뻗어가는 상이다 . 지나치게 강하여 거침이 없으니 , 중도 ( 中道 ) 를 지키지 않으면 오히려 크게 해를 입을 우려도 있다 . 대장괘는 12 월괘로 음력 2 월괘에 해당한다 .", "seogwa": "｢ 전 ｣ 은 천산돈괘 다음에 뇌천대장괘가 온 이유를 다음과 같이 설명하고 있다 . 遯者는 退也니 物不可以終遯이라 故로 受之以大壯하고 돈자    퇴야    물불가이종돈      고    수지이대장 돈이란 물러남이니, 물건이 가히 끝까지 물러나지는 않는다. 그러므로 대장으로써 받고 退:물러날 퇴 모든 상황이 끝까지 물러나는 것만은 아니다 . 자연과 사회의 모든 현상은 지나치면 다시 반작용이 있게 되어 물러나다가도 다시 크게 강장한 때가 오는 것이다 .", "gwasa": "大壯은 利貞하니라. 대장    이정 대장은 바르게 함이 이롭다. 壯:씩씩할 장 대장은 초효부터 사효에 이르기까지 강한 양이 자라서 계속 그 기운이 강하게 올라가는 상이다 . 강한 양이 거침없이 나아가니 형통하지만 , 양이 지나치게 강하여 오히려 부작용이 있을 수 있기 때문에 , 이것을 경계하여 바르게 함이 이롭다고 하였다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 大壯은 大者 壯也니 剛以動故로 壯하니 단왈 대장    대자 장야    강이동고    장 大壯利貞은 大者 正也니 正大而天地之情을 可見矣리라. 대장이정    대자 정야    정대이천지지정    가견의 단전에 말하였다. “대장(大壯)은 큰 것이 씩씩하니 강함으로써 움직이는 까닭에 씩씩하니, ‘대장이 바르게 함이 이로움’은 큰 것이 바름이니, 바르고 크게 해서 천지의 뜻을 가히 볼 수 있을 것이다.” 대장은 양 ( 陽 ) 큰 것이 씩씩한 것이다 . 내괘 건천 ( 乾天 ) ☰ 으로 강하고 외괘 진뢰 ( 震雷 ) ☳ 로 움직이니 , 거침없이 씩씩하다 . 바르게 함이 이롭다는 것은 큰 양이 바르게 나아가야 한다는 뜻이다 . 바름을 잃으면 오히려 나라를 어지럽게 하는 폐단이 된다 . 하늘의 도가 바르고 크듯이 , 양 ( 陽 ) 의 강장한 도가 바르게 하고 크게 하면 천지의 뜻을 볼 수 있는 것이다 .", "gwasangsa": "象曰 雷在天上이 大壯이니 君子 以하야 非禮弗履하나니라. 상왈 뇌재천상    대장      군자 이       비례불리 상전에 말하였다. “우레가 하늘 위에 있는 것이 대장(大壯)이니, 군자가 이를 본받아 예(禮)가 아니면 밟지 않는다.” 禮:예도 례   弗:아닐 불   履: 밟을 리 외괘 진뢰 ( 震雷 ) ☳ 우레가 내괘 건천 ( 乾天 ) ☰ 하늘 위에 있으니 , 강장한 양의 기운이 크게 움직이는 상이다 . 강함이 지나치면 오히려 그로 인한 폐단이 생기니 , 군자는 이러한 기운의 양상을 보고 예 ( 禮 ) 가 아니면 밟지 않는다 . 강하게 나아감에 있어서도 예가 있어야 한다 . 예 ( 禮 ) 를 잃으면 도 ( 道 ) 를 잃게 된다 . 이와 관련하여 정자 ( 程子 ) 는 ｢ 역전 ( 易傳 ) ｣ 에서 다음과 같이 설명하고 있다 . 雷震於天上하니 大而壯也라. 君子는 觀大壯之象하야 以行其壯하나니 君子之大壯者는 莫若克己復禮라. 古人이 云自勝之謂强이라하고 中庸에 於和而不流와 中立而不倚에 皆曰强哉矯라하니 赴湯火와 蹈白刃은 武夫之勇으로도 可能也어니와 至於克己復禮는 則非君子之大壯이면 不可能也라. 故로 云君子以非禮弗履라하니라. 우레☳가 하늘☰ 위에서 진동하니 크고 씩씩하다. 군자는 ‘대장’의 상을 보아서 그 씩씩함을 행하니, 군자의 대장(大壯)은 자기를 이겨서 예에 회복함 만한 것이 없다. 옛 사람이 말하기를 “자기 자신을 이기는 것을 강하다”라고 했고, 《중용》에 “화합하되 흐르지 않는다”와 “중립해서 치우치지 않는다”에 모두 “강하고 굳세다”고 했으니, 끓는 물이나 불에 뛰어 들어가는 것과 흰 칼날을 밟는 것은 무부(武夫)의 용맹으로도 할 수 있으나, 자기를 이겨서 예에 회복함은 군자의 대장(大壯)이 아니면 할 수 없다. 그러므로 “군자가 본받아서 예가 아니면 밟지 않는다”고 한 것이다. 한편 《 논어》 ｢ 안연 ( 顔淵 ) ｣ 편에는 다음과 같은 내용이 있다 . 顔淵問仁한대 子曰 克己復禮爲仁이니 一日克己復禮면 天下歸仁焉하리니 爲仁由己니 而由人乎哉아. 顔淵曰 請問其目하노이다. 子曰 非禮勿視하며 非禮勿聽하며 非禮勿言하며 非禮勿動이니라. 顔淵曰 回雖不敏이나 請事斯語矣리이다. 안연( 顔淵 : 공자의 제자, 이름은 回 ) 이 어짊(仁)을 묻자, 공자께서 말씀하셨다. “자기의 사욕을 이겨 예에 돌아감이 어짊(仁)을 하는 것이니, 하루라도 자기를 이겨 예로 돌아가면 천하가 어짊에 돌아갈 것이니, 어짊을 하는 것은 자기로 말미암으니, 남으로 말미암겠는가?” 안연이 “그 조목을 묻겠습니다”하고 말하자, 공자께서 말씀하셨다. “예가 아니면 보지 말며, 예가 아니면 듣지 말며, 예가 아니면 말하지 말며, 예가 아니면 움직이지 마는 것이다.” 안연이 말하였다. “제(回)가 비록 어리석으나 바라건대 이 말씀을 섬기겠습니다.” 효사 및 효상사", "hyosa": {"초효": "初九는 壯于趾니 征하면 凶이 有孚리라. 초구    장우지   정       흉    유부 초구는 발에 씩씩하니, 가면 흉함이 믿음을 둘 것이다(반드시 흉할 것이다). 趾:발 지 초구는 크게 씩씩한 괘체에 맨 아래에 있다 . 전체 기운이 크게 장하니 초구도 그 기운에 따라 용맹하게 나서려고 한다 . 그러나 초구는 맨 아래에 있어 몸으로 치면 발에 해당하는데 , 이러한 초구 입장에서는 이제 겨우 발에 조금 힘이 들어가 있는 상태일 뿐이다 . 자기 분수를 모르고 남이 하는 대로 따라가면 능력이 미치지 못하여 흉하게 될 것은 뻔한 일이다 . ‘ 흉함이 믿음을 둔다 ’ 는 것은 반드시 흉하게 된다는 뜻이다 . 자기 분수를 모르고 강한 것만 믿으니 , 그 믿음이 궁하다 . 초육이 변하면 손 ( 巽 ) ☴ 이 되니 겸손하게 있어야 한다 . 象曰 壯于趾하니 其孚窮也로다. 상왈 장우지      기부궁야 상전에 말하였다. “발에 씩씩하니 그 믿음이 궁하도다.”", "이효": "九二는 貞하야 吉하니라. 구이    정      길 구이는 바르게 해서 길하다. 구이는 내괘의 중을 지키고 있어 중도 ( 中道 ) 로 행하는 자리이다 . 강함으로써 중도를 취하고 있으니 하는 모든 일이 길하다 . 象曰 九二貞吉은 以中也라. 상왈 구이정길   이중야 상전에 말하였다. “구이가 바르게 해서 길함은 중으로 하기 때문이다.”", "삼효": "九三은 小人은 用壯이오 君子는 用罔이니 貞이면 厲하니 羝羊이 觸藩하야 羸其角이로다. 구삼    소인    용장      군자    용망       정       려      저양    촉번       이기각 구삼은 소인은 씩씩함을 쓰고 군자는 업신여김을 쓰니 , 곧게 하면 위태하니 , 숫양이 울타리를 들이받아 그 뿔이 걸리도다 . 罔:그물 망·없을 망·업신여길 망   羝:숫양 저   觸:닿을 촉·받을 촉  藩:울타리 번   羸:여윌 리·앓을 리· 엎을 리 구삼은 내괘 건천 ( 乾天 ) ☰ 의 강한 데에 맨 위에 처하고 , 양자리에 양으로 있어 매우 강한 상태이다 . 또한 중을 얻지 못하였으니 그 강함을 스스로 제어하기가 힘든 상황이다 . 이런 상황에 처하면 소인은 강한 것만 믿고 힘을 쓰고자 하고 , 군자라도 중도를 잃게 되어 안하무인 ( 眼下無人 ) 격으로 사람을 업신여기게 된다 . 소인이든 군자든 이렇게 고집해 나가게 되면 위태하게 되니 , 마치 저돌적인 숫양이 울타리를 들이받다가 그 뿔이 울타리에 걸려 이러지도 못하고 저러지도 못하는 상황에 빠지는 격이다 . 구삼이 변하면 태택 ( 兌澤 ) ☱ 이 되니 양이 나오고 ( 兌爲羊 ) 건천 ( 乾天 ) ☰ 에서 나온 양이니 숫양 ( 羝羊 ) 이 된다 . 또한 구삼이 변하면 내호괘가 이화 ( 離火 ) ☲ 가 되니 뿔이 울타리에 걸리는 상이다 . 象曰 小人은 用壯이오 君子는 罔也라. 상왈 소인   용장       군자    망야 상전에 말하였다. “소인은 씩씩함을 쓰고, 군자는 업신여긴다.”", "사효": "九四는 貞이면 吉하야 悔 亡하리니 藩決不羸하며 壯于大輿之輹이로다. 구사    정      길       회 망          번결불리      장우대여지복 구사는 바르게 하면 길해서 뉘우침이 없을 것이니, 울타리가 터져서 걸리지 않으며 큰 수레의 바퀴(당토)에 씩씩하도다. 決:터질 결   輿:수레 여   輹:당토 복 구사는 외괘 진 ( 震 ) ☳ 의 아래에 있어 강한 양이다 . 음 자리에 양으로 있으니 때로는 강유 ( 剛柔 ) 를 겸하여 처신을 한다 . 오효와 상효가 모두 음 ( 陰 ) 이기 때문에 구사 입장에서는 울타리가 열려 있어 뿔이 걸릴 염려가 없으니 거침없이 나아갈 수 있는 상이다 . 마치 수레의 당토 ( 바퀴 ) 에 힘이 있어 잘 나가는 상이다 . 象曰 藩決不羸는 尙往也일새라. 상왈 번결불리   상왕야 상전에 말하였다. “울타리가 터져 걸리지 않음은 가는 것을 숭상하기 때문이다.” 六五는 喪羊于易면 无悔리라.", "오효": "육오    상양우이   무회 육오는 양을 쉬운데 잃으면 뉘우침이 없을 것이다. 喪:잃을 상   易:쉬울 이 육오는 외괘의 중을 얻었으나 양자리에 음으로 있어 자리가 마땅하지 않으니 , 초효부터 사효까지의 강장 ( 强壯 ) 한 양 ( 陽 ) 을 다루기가 매우 힘든 상황이다 . 육오 입장에서는 저돌적으로 밀려오는 숫양들을 제어해야 하는데 , 양 ( 羊 ) 을 억제하는 방법은 오히려 간단하고 쉬운 것이다 . 외호괘가 태 ( 兌 ) ☱ 요 , 육오가 변해도 외괘가 태 ( 兌 ) ☱ 가 되니 계속 양 ( 兌爲羊 ) 이 몰려오는데 , 무리를 지어 몰려오는 양을 어떻게 억제하는가 ? 양 ( 羊 ) 무리의 맨 앞에 있는 우두머리만 제어하여 방향을 바꾸면 나머지 양들은 자연히 따르게 된다 . 象曰 喪羊于易는 位不當也일새라. 상왈 상양우이    위부당야 상전에 말하였다. “양을 쉬운데 잃음은 자리가 마땅치 않기 때문이다.” 上六은 羝羊이 觸藩하야 不能退하며 不能遂하야 无攸利니 艱則吉하리라. 상륙   저양    촉번       불능퇴       불능수       무유리    간즉길", "상효": "상육은 숫양이 울타리를 받아서, 능히 물러나지 못하며 능히 나가지도 못해서 이로울 바가 없으니, 어렵게 하면 길할 것이다. 退:물러날 퇴   遂:나갈 수   艱:어려울 간 상육은 대장 ( 大壯 ) 한 상황에 있어 맨 위에 처한 자리이다 . 맨 위에 처하니 숫양들이 몰려오는 상황을 잘 헤아리지 못하고 , 어찌할 바를 모른다 . 마치 숫양이 울타리를 들이받다가 뿔이 울타리에 걸려서 물러나지도 못하고 나아가지도 못하는 격이다 . 상육이 변화면 이화 ( 離火 ) ☲ 가 되니 뿔이 걸리는 상이다 . 현재의 상황이 이로울 바는 없지만 , 그러나 어렵게 해서 잘 이겨내면 길하게 된다 . 象曰 不能退不能遂는 不詳也오 艱則吉은 咎不長也일새라. 상왈 불능퇴불능수    불상야    간즉길    구부장야 상전에 말하였다. “능히 물러나지 못하며 능히 나가지도 못함은 헤아리지 못해서이고, 어렵게 하면 길함은 허물이 오래가지 못하기 때문이다.” 詳:자세할 상·헤아릴 상 ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 407 ∼ 413 쪽 ."}}, {"num": 35, "ko": "화지진", "hanja": "火地晉", "lines": [0, 0, 0, 1, 0, 1], "url": "https://soosanss.tistory.com/187", "post_id": 187, "gwaui": "땅 위로 태양이 솟아오르듯이 , 일이 잘 풀려 나갈 때일수록 스스로의 밝은 덕을 더욱 잘 밝혀라 ( 自昭明德 ).", "gwamyung": "외괘가 이화 ( 離火 ) ☲ , 내괘가 곤지 ( 坤地 ) ☷ 로 이루어진 괘를 ‘ 진 ( 晉 ) ’ 이라 한다 . 땅 위에 해가 솟아오르듯이 , 앞으로 나아가고 위로 올라간다는 뜻이다 . 승진하고 발전하는 것이다 . 사회적 상황과 인생의 과정이 전성기의 한 복판에 있다 .", "seogwa": "｢ 전 ｣ 은 뇌천대장괘 다음에 화지진괘가 온 것을 다음과 같이 설명하고 있다 . 物不可以終壯이라 故로 受之以晉하고 물불가이종장      고    수지이진 물건이 가히 끝까지 씩씩하지는 못한다. 그러므로 진으로써 받고 대장괘는 크게 강장 ( 强壯 ) 한 것이다 . 모든 상황이 강장 ( 强壯 ) 하기만 할 수 없고 , 강장하면 그 힘으로 나아가게 된다 . 때문에 나아간다는 진괘 ( 晉卦 ) 을 대장괘 다음에 둔 것이다 .", "gwasa": "晉은 康侯를 用錫馬蕃庶하고 晝日三接이로다. 진    강후    용석마번서      주일삼접 진(晉)은 나라를 편안케 하는 제후를 말을 많이 주고 하룻날에 세 번 만나도다. 晉:나아갈 진   康:편안할 강   侯:제후 후   錫:줄 석   蕃:많을 번  庶:여러 서   接:사귈 접·접할 접· 대접할 접 땅 위에 해가 솟아 밝은 세상이 되니 , 나라가 편안한 상태이다 . 이렇게 나라가 편안한 것은 각 지방을 다스리는 제후 ( 諸侯 ) 가 정치를 잘 하기 때문이다 . 그래서 인군이 나라를 편안하게 하는 제후에게 상을 여러 번 내린다 . 말을 준다는 것은 포상 ( 褒賞 ) 하는 것이다 . 공을 쌓을 때마다 공을 세운 공직자 ( 公職 者 ) 에게 포상을 한다 . 또한 하루에 세 번이라도 자주 만나서 공을 치하하고 , 나라 일을 함께 도모한다 . 단전은 다음과 같이 설명하고 있다 .", "danssa": "彖曰 晉은 進也니 明出地上하야 順而麗乎大明하고 柔進而上行이라. 단왈 진   진야    명출지상       순이리호대명       유진이상행 是以康侯用錫馬蕃庶晝日三接也라. 시이강후용석마번서주일삼접야 단전에 말하였다. “진(晉)은 나아가는 것이니, 밝음이 땅 위로 나와서, 순해서 크게 밝은 데에 걸리고, 유(柔)가 나아가 위로 행한다. 이로써 나라를 편안케 하는 제후를 말을 많이 주고 하룻날에 세 번 만나는 것이다.” 進:나아갈 진   麗:걸릴 리·고울 려 진 ( 晉 ) 은 나아가는 것이다 . 괘상을 보면 이화 ( 離火 ) ☲ 의 밝음이 곤지 ( 坤地 ) ☷ 땅 위에 나와 있고 , 괘덕을 보면 내괘 곤지 ☷ 로 순하고 외괘 이화 ☲ 로 큰 밝음이 걸려있는 상이다 . 진괘 ( 晉卦 ) 의 인군자리는 육오효가 되는데 , 부드러운 음이 나아가서 위로 행하여 외괘의 중 ( 中 ) 에 있어 나라를 다스리는 인군 자리에 있게 된 것이다 . ‘ 柔進而上行 ’ 은 괘변 ( 卦變 ) 의 정황을 설명하는 내용이다 . 이는 풍지관 ( 風地觀 ) 괘에서 육사가 나아가 위로 올라가 구오와 자리를 바꾸어 화지진 ( 火地晉 ) 괘가 되었다는 의미이다 . 풍지관괘에서 천하를 잘 살펴보고 인재를 등용하여 정치를 맡겨 그 공을 자주 치하하니 , 이로써 ‘ 나라를 편안하게 하는 제후에게 말을 많이 주고 하룻날에 세 번 만나는 것 ’ 이다 .", "gwasangsa": "象曰 明出地上이 晉이니 君子 以하야 自昭明德하나니라. 상왈 명출지상    진      군자 이       자소명덕 상전에 말하였다. “밝음이 땅 위에 나온 것이 진(晉)이니, 군자가 이를 본받아 스스로 밝은 덕을 밝힌다.” 昭: 밝을 소 밝음이 땅 위로 솟아올라 밝게 비추는 것이 진괘 ( 晉卦 ) 의 상이다 . 군자는 이러한 상을 본받아 스스로 하늘로부터 부여받은 천성 ( 天性 ) 의 밝은 덕을 밝힌다 . 자연의 이치를 본받아 행하는 것이 군자의 덕이다 . 《 대학 ( 大學 )》 의 삼강령 ( 三綱領 ) 을 음미해 보자 . 大學之道는 在明明德하며 在親(新)民하며 在止於至善하니라. 대인이 되는 학문인 대학의 도는 하늘로부터 부여받은 밝은 덕을 밝히는데 있고, 백성을 가까이 하여 새롭게 하는 데 있으며, 지극히 착한 데에 그침에 있다. 효사 및 효상사 初六은 晉如摧如애 貞이면 吉하고 罔孚라도 裕면 无咎리라. 초륙    진여최여    정      길       망부       유    무구", "hyosa": {"초효": "초육은 나아가는 듯 꺾이는 듯함에 바르게 하면 길하고, 믿음이 없더라도 넉넉하게 하면 허물이 없을 것이다. 摧:꺾을 최   罔:없을 망·그물 망   裕:넉넉할 유 초육은 내괘 곤지 ( 坤地 ) ☷ 의 맨 아래에 있어 백성의 자리이다 . 초육이 변하면 진뢰 ( 震雷 ) ☳ 가 되어 나아가는 듯하지만 , 내호괘가 간산 ( 艮山 ) ☶ 이니 나아가는 것이 그치고 꺾이는 듯하다 . 뜻을 세워 나아가다가도 때로는 뜻을 이루지 못하는 상황이다 . 비록 구사가 응하고 있지만 , 진괘 ( 晉卦 ) 에서는 모두가 위로 오르려고 하여 아래를 돌보지 않으니 구사의 도움을 받을 수 없다 . 또한 어느 누구의 도움을 받는 것이 아니라 , 인생이란 결국 홀로 바름을 행하여 나아가야 한다 . 그래서 바르게 하면 길하다 . 비록 위에서 인군이 알아주지 못하여 믿음을 주지 못하더라도 , 마음의 여유를 갖고 바르게 행하면 허물이 없다 . 인군이 알아주지 않고 믿음을 주지 않으니 , 아직 명 ( 命 ) 을 받아 일을 할 단계는 아니다 . 象曰 晉如摧如는 獨行正也오 裕无咎는 未受命也일새라. 상왈 진여최여    독행정야    유무구    미수명야 상전에 말하였다. “나아가는 듯 꺾이는 듯함은 홀로 바름을 행하는 것이고, 넉넉하게 하여 허물이 없음은 명을 받지 못하기 때문이다.” 六二는 晉如 愁如나 貞이면 吉하리니 受玆介福于其王母리라.", "이효": "육이   진여  수여    정      길          수자개복우기왕모 육이는 나아가는 듯 근심하는 듯하나 바르게 하면 길할 것이니, 이 큰 복을 그 왕모로부터 받을 것이다. 愁:근심 수   玆:이 자   介: 클 개 육이는 내괘에서 중정한 자리에 있다 . 모두가 나아가는 상황이니 중정한 육이도 더불어 나아가고자 한다 . 그러나 응하고 있는 육오 인군이 같은 음 ( 陰 ) 이고 , 또한 내호괘가 간산 ( 艮山 ) ☶ 이니 나아가지 못하는 근심이 있게 된다 . 또한 육이가 변하면 감수 ( 坎水 ) ☵ 가 되니 나아가지 못하여 근심이 된다 . 그러나 중정한 상황에 있으니 바르게 하면 길해서 , 결국은 육오의 왕모 ( 王母 ) 가 알아보고 큰 복을 내리게 된다 . 오효 인군이 음 ( 陰 ) 이기 때문에 ‘ 왕모 ( 王母 ) ’ 라고 하였다 . 象曰 受玆介福은 以中正也라. 상왈 수자개복   이중정야 상전에 말하였다. “이 큰 복을 받음은 가운데하고 바르기 때문이다.” 六三은 衆允이라 悔 亡하니라.", "삼효": "육삼    중윤      회 망 육삼은 무리가 믿는다. 뉘우침이 없어진다. 衆:무리 중   允:믿을 윤· 진실로 윤 육삼은 양자리에 음으로 있고 중도 얻지 못하여 앞으로 나아가지 못하는 상이다 . 그러나 아래에 있는 초육과 육이의 무리가 육삼을 믿고 따르니 , 나아가지 못하는 뉘우침이 없어지고 위로 올라가게 된다 . 육삼은 사실 위로 나아갈 자격과 상황이 못 되지만 , 밑에 있는 초육과 육이의 성원을 받아 올라가는 것이다 . 예컨대 회사로 보면 육삼은 과장이나 부장에 해당하는 데 스스로가 잘해서 승진하는 것보다는 아래에 있는 부원들의 도움으로 승진하는 것을 말한다 . 象曰 衆允之志는 上行也라. 상왈 중윤지지    상행야 상전에 말하였다. “무리가 믿는 뜻은 위로 가는 것이다.”", "사효": "九四는 晉如 鼫鼠니 貞이면 厲하리라. 구사    진여 석서    정      려 구사는 나아가는 것이 다람쥐와 같으니, 고집하면 위태할 것이다. 鼫:석서(다람쥐) 석   鼠:쥐 서 구사는 외괘 이화 ( 離火 ) ☲ 에 있으나 , 외호괘 감수 ( 坎水 ) ☵ 에 처하여 있다 . 또한 중을 얻지 못했고 음 자리에 양으로 있으니 , 자리가 바르지 못하다 . 구사는 앞으로 더 나아가고 싶어도 외호괘 감수 ☵ 의 가운데 빠져 있어 , 그 자리에서 맴도는 것이 마치 다람쥐가 쳇바퀴 돌듯이 한다 . 이는 더 이상 올라갈 수 없음을 의미하니 , 더 나아가는 것 , 승진을 고집하게 되면 오히려 위태롭게 된다 . 회사로 보면 고위관리직이요 , 정부로 치면 실장 차관 등에 해당하는 자리이다 . 象曰 鼫鼠貞厲는 位不當也일새라. 상왈 석서정려   위부당야 상전에 말하였다. “다람쥐가 고집해서 위태로운 것은 자리가 마땅치 않기 때문이다.” 六五는 悔 亡하란대 失得을 勿恤이니 往애 吉하야 无不利리라.", "오효": "육오    회 망         실득    물휼       왕    길      무불리 육오는 뉘우침이 없어질 것인데 잃고 얻음을 근심하지 말 것이니, 감에 길해서 이롭지 않음이 없을 것이다. 恤:근심할 휼 육오는 외괘에서 중을 지키고 있으나 , 양자리에 음으로 있어 약하기 때문에 전체를 다스리기에는 힘겨운 상태이다 . 때문에 땅 위에 솟아 천하를 밝게 비추는 일을 하기에 역부족 ( 力不足 ) 이라는 뉘우침이 있지만 , 중도로 행하기에 그러한 후회는 없어진다 . 왕으로서는 잃고 얻음을 헤아려 근심할 필요가 없고 , 공정하게 중도 ( 中道 ) 로 행하면 된다 . 천하 백성이 자기 자질과 역량에 따라 승진하고 나아가는 것이니 , 왕 자신도 사사로운 이익의 잃고 얻음에 근심할 것 없이 중도로 가면 길해서 이롭게 된다 . 육오는 인군의 자리이니 , 육오 왕이 이로운 것은 나라에 큰 경사가 있는 것과 같다 . 象曰 失得勿恤은 往有慶也리라. 상왈 실득물휼    왕유경야 상전에 말하였다. “잃고 얻음을 근심치 말라는 것은 가면 경사가 있을 것이다.”", "상효": "上九는 晉其角이니 維用伐邑이면 厲하나 吉코 无咎어니와 貞앤 吝하니라. 상구    진기각      유용벌읍       려       길    무구         정    인 상구는 그 뿔에 나아가니, 오직 읍을 치면 위태하나 길하고 허물이 없거니와, 고집하면 인색하다. 角:뿔 각   維:바 유·맬 유·오직 유   用:써 용(以)   伐:칠 벌 상구는 진괘 ( 晉卦 ) 의 맨 위에 처하여 더 이상 나아갈 길이 없는 상태이다 . 그러기에 머리 위에 있는 뿔에 나아갔다고 하였다 . 이런 상황에서는 자기 마음을 돌이키는 것이 중요하다 . ‘ 읍을 친다 ’ 는 것은 자기 마음을 다스린다는 뜻이다 . 그동안 이루어 왔던 성과와 명예를 생각할 때 더 나아가지 못하고 자기 자신을 돌이켜 반성한다는 것은 그 자체가 위태로운 것이지만 , 그 결과는 길하고 허물이 없게 된다 . 그러나 반성하지 않고 더 나아가기를 고집하게 되면 , 인색하여 막히게 된다 . 상구는 맨 위에 처하고 나아감의 극에 처하여 더 이상 도가 빛나지 못하기 때문이다 . 象曰 維用伐邑은 道未光也일새라. 상왈 유용벌읍   도미광야 상전에 말하였다. “오직 읍을 친다는 것은 도가 빛나지 못하기 때문이다.” ※ 수산 신성수 , 『 주역통해 』 , 대학서림 , 2005, 414 ∼ 420 쪽 ."}}, {"num": 36, "ko": "지화명이", "hanja": "地火明夷", "lines": [1, 0, 1, 0, 0, 0], "url": "https://soosanss.tistory.com/188", "post_id": 188, "gwaui": "밝음이 땅 속에 들어가 있듯이 소인이 세를 얻어 폭정을 하는 암울한 시기에는 스스로를 그믐같이 어둡게 하여 무리를 화합시키고 세상을 서서히 밝혀 나가라 ( 用晦而明 ). 괘상전 ( 卦象傳 ) 을 같이 음미해 볼 필요가 있다 . 象曰 天地不交 否니 君子 以하야 儉德辟難하야 不可榮以祿이니라. 상전에 말하였다. “천지가 사귀지 않는 것이 비(否)니, 군자가 이를 본받아 덕을 검소히 하고 어려움을 피해서 가히 녹을 받는 것으로써 영화를 누리지 않는다.” 象曰 天下有山이 遯이니 君子 以하야 遠小人호대 不惡而嚴하나니라. 상전에 말하였다. “하늘 아래 산이 있는 것이 돈(遯)이니, 군자가 이를 본받아 소인을 멀리하되 악하게 아니하고 엄하게 하여야 한다.” 효사 및 효상사 맨 아래에 있는 초구는 내괘 이화 ☲ 의 밝은 지혜로 밝음이 상하려는 기미를 미리 알고 세상에 나가지 않고 피하여 은둔하는 상이다 . 그러니 초구와 응하고 있는 육사 ( 주인 ) 가 일을 같이 못함을 안타까이 여기며 말을 하게 된다 . 은 ( 殷 ) 나라가 천하를 다스리던 당시 제후국인 주 ( 周 ) 나라의 무왕 ( 武王 ) 이 천자 ( 天子 ) 인 은나라 주왕 ( 紂王 ) 을 정벌하고자 할 때 , 고
